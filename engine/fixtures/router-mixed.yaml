# Mixed router: Alpha by class, remainder by weight [0.75, 0.25]
# Expected: airport=[40,40,40], general=[45,45,45], overflow=[15,15,15]
grid:
  bins: 3
  binSize: 1
  binUnit: hours
nodes:
  - id: total_arrivals
    kind: const
    values: [100, 100, 100]
  - id: splitter
    kind: router
    router:
      inputs:
        queue: total_arrivals
      routes:
        - target: airport
          classes: [Alpha]
        - target: general
          weight: 0.75
        - target: overflow_target
          weight: 0.25
classes:
  - id: Alpha
  - id: Beta
traffic:
  arrivals:
    - nodeId: total_arrivals
      classId: Alpha
      pattern:
        kind: const
        ratePerBin: 40
    - nodeId: total_arrivals
      classId: Beta
      pattern:
        kind: const
        ratePerBin: 60
