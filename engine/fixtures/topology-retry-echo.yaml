# Retry echo: CONV(errors, kernel) produces retry series
# kernel = [0.0, 0.6, 0.3, 0.1], constant errors=10
# Expected retry_echo: [0, 6, 9, 10, 10]
grid:
  bins: 5
  binSize: 1
  binUnit: hours
nodes:
  - id: arrivals
    kind: const
    values: [100, 100, 100, 100, 100]
  - id: served
    kind: const
    values: [90, 90, 90, 90, 90]
  - id: errors
    kind: const
    values: [10, 10, 10, 10, 10]
topology:
  nodes:
    - id: Service
      kind: serviceWithBuffer
      semantics:
        arrivals: arrivals
        served: served
        errors: errors
        retryEcho: retry_echo
        retryKernel: [0.0, 0.6, 0.3, 0.1]
  edges: []
  constraints: []
