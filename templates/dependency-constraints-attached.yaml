schemaVersion: 1
generator: flowtime-sim
metadata:
  id: 'dependency-constraints-attached'
  title: 'Dependency Constraints Attached'
  description: 'Option B dependency constraints attached to services without explicit dependency nodes.'
  narrative: 'Producer services are constrained by a shared dependency resource with explicit constraint series.'
  version: 1.0.0
  tags: [dependency, constraints, attached]
window:
  start: 2025-01-01T00:00:00Z
  timezone: UTC

grid:
  bins: 288
  binSize: 5
  binUnit: minutes

rng:
  kind: pcg32
  seed: 20250110

topology:
  nodes:
    - id: Router
      kind: router
      semantics:
        arrivals: router_arrivals
        served: router_served
        capacity: router_capacity
        processingTimeMsSum: router_processing_time_ms_sum
        servedCount: router_served
        aliases:
          arrivals: 'Incoming work'
          served: 'Dispatched work'
    - id: ProducerA
      kind: service
      constraints: [db_other]
      semantics:
        arrivals: producer_a_arrivals
        served: producer_a_served
        capacity: producer_a_capacity
        processingTimeMsSum: producer_a_processing_time_ms_sum
        servedCount: producer_a_served
        aliases:
          arrivals: 'Producer A work'
          served: 'Producer A served'
    - id: ProducerB
      kind: service
      constraints: [db_main]
      semantics:
        arrivals: producer_b_arrivals
        served: producer_b_served
        capacity: producer_b_capacity
        processingTimeMsSum: producer_b_processing_time_ms_sum
        servedCount: producer_b_served
        aliases:
          arrivals: 'Producer B work'
          served: 'Producer B served'
    - id: Consumer
      kind: service
      semantics:
        arrivals: consumer_arrivals
        served: consumer_served
        capacity: consumer_capacity
        processingTimeMsSum: consumer_processing_time_ms_sum
        servedCount: consumer_served
        aliases:
          served: 'Downstream completions'
    - id: ProducerC
      kind: service
      constraints: [db_other]
      semantics:
        arrivals: producer_c_arrivals
        served: producer_c_served
        capacity: producer_c_capacity
        processingTimeMsSum: producer_c_processing_time_ms_sum
        servedCount: producer_c_served
        aliases:
          arrivals: 'Producer C work'
          served: 'Producer C served'
  constraints:
    - id: db_main
      semantics:
        arrivals: db_main_arrivals
        served: db_main_served
        errors: db_main_errors
    - id: db_other
      semantics:
        arrivals: db_other_arrivals
        served: db_other_served
  edges:
    - id: router_to_producer_a
      from: Router:out
      to: ProducerA:in
      type: throughput
      measure: served
      weight: 0.4
    - id: router_to_producer_b
      from: Router:out
      to: ProducerB:in
      type: throughput
      measure: served
      weight: 0.35
    - id: router_to_producer_c
      from: Router:out
      to: ProducerC:in
      type: throughput
      measure: served
      weight: 0.25
    - id: producer_a_to_consumer
      from: ProducerA:out
      to: Consumer:in
      type: throughput
      measure: served
    - id: producer_b_to_consumer
      from: ProducerB:out
      to: Consumer:in
      type: throughput
      measure: served
    - id: producer_c_to_consumer
      from: ProducerC:out
      to: Consumer:in
      type: throughput
      measure: served

nodes:
  - id: router_arrivals
    kind: pmf
    pmf:
      values: [20, 35, 50, 70, 90, 100]
      probabilities: [0.08, 0.16, 0.24, 0.24, 0.18, 0.1]
    profile:
      kind: builtin
      name: hub-rush-hour
  - id: router_served
    kind: expr
    expr: "router_arrivals"
  - id: router_capacity
    kind: expr
    expr: "router_served"
  - id: router_processing_time_ms_sum
    kind: expr
    expr: "router_served * 30000"
  - id: producer_a_arrivals
    kind: expr
    expr: "router_served * 0.4"
  - id: producer_a_served
    kind: expr
    expr: "producer_a_arrivals"
  - id: producer_a_capacity
    kind: expr
    expr: "producer_a_served"
  - id: producer_a_processing_time_ms_sum
    kind: expr
    expr: "producer_a_served * 180000"

  - id: producer_b_arrivals
    kind: expr
    expr: "router_served * 0.35"
  - id: producer_b_served
    kind: expr
    expr: "db_main_served"
  - id: producer_b_capacity
    kind: expr
    expr: "producer_b_served"
  - id: producer_b_processing_time_ms_sum
    kind: expr
    expr: "producer_b_served * 180000"

  - id: producer_c_arrivals
    kind: expr
    expr: "router_served * 0.25"
  - id: producer_c_served
    kind: expr
    expr: "producer_c_arrivals"
  - id: producer_c_capacity
    kind: expr
    expr: "producer_c_served"
  - id: producer_c_processing_time_ms_sum
    kind: expr
    expr: "producer_c_served * 150000"

  - id: db_main_arrivals
    kind: expr
    expr: "producer_b_arrivals"
  - id: db_main_base_success
    kind: expr
    expr: "db_main_arrivals"
  - id: db_main_incident_success
    kind: expr
    expr: "db_main_arrivals * 0.4"
  - id: db_main_incident_mask
    kind: expr
    expr: "CONV(PULSE(96, 24, 1) + PULSE(192, 18, 0.8), [0.0, 0.5, 0.3, 0.2])"
  - id: db_main_served
    kind: expr
    expr: "db_main_base_success - db_main_incident_mask * (db_main_base_success - db_main_incident_success)"
  - id: db_main_errors
    kind: expr
    expr: "MAX(0, db_main_arrivals - db_main_served)"

  - id: db_other_arrivals
    kind: expr
    expr: "producer_a_arrivals + producer_c_arrivals"
  - id: db_other_served
    kind: expr
    expr: "db_other_arrivals"

  - id: consumer_arrivals
    kind: expr
    expr: "producer_a_served + producer_b_served + producer_c_served"
  - id: consumer_served
    kind: expr
    expr: "consumer_arrivals"
  - id: consumer_capacity
    kind: expr
    expr: "consumer_served"
  - id: consumer_processing_time_ms_sum
    kind: expr
    expr: "consumer_served * 120000"

outputs:
  - series: router_arrivals
    as: router_arrivals.csv
  - series: router_served
    as: router_served.csv
  - series: router_capacity
    as: router_capacity.csv
  - series: router_processing_time_ms_sum
    as: router_processing_time_ms_sum.csv
  - series: producer_a_served
    as: producer_a_served.csv
  - series: producer_a_capacity
    as: producer_a_capacity.csv
  - series: producer_a_processing_time_ms_sum
    as: producer_a_processing_time_ms_sum.csv
  - series: producer_b_served
    as: producer_b_served.csv
  - series: producer_b_capacity
    as: producer_b_capacity.csv
  - series: producer_b_processing_time_ms_sum
    as: producer_b_processing_time_ms_sum.csv
  - series: producer_c_served
    as: producer_c_served.csv
  - series: producer_c_capacity
    as: producer_c_capacity.csv
  - series: producer_c_processing_time_ms_sum
    as: producer_c_processing_time_ms_sum.csv
  - series: db_main_arrivals
    as: db_main_arrivals.csv
  - series: db_main_served
    as: db_main_served.csv
  - series: db_main_errors
    as: db_main_errors.csv
  - series: db_other_arrivals
    as: db_other_arrivals.csv
  - series: db_other_served
    as: db_other_served.csv
  - series: consumer_served
    as: consumer_served.csv
  - series: consumer_capacity
    as: consumer_capacity.csv
  - series: consumer_processing_time_ms_sum
    as: consumer_processing_time_ms_sum.csv
