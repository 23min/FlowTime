schemaVersion: 1
generator: flowtime-sim
metadata:
  id: 'transportation-basic-classes'
  title: 'Transportation Network with Hub Queue (Class Segments)'
  description: 'North/South origins feed a central hub with an outbound queue and airport retries.'
  version: 3.0.0
  captureKey: transportation-network-telemetry
  tags: [transportation, transit, queue, retries]

classes:
  - id: Airport
    displayName: "Airport Express"
    description: "Passengers destined for the airport shuttle"
  - id: Industrial
    displayName: "Industrial Corridor"
    description: "Workers headed to the industrial park"
  - id: Downtown
    displayName: "Downtown Commuters"
    description: "Riders bound for downtown/city center"
window:
  start: 2025-01-01T00:00:00Z
  timezone: UTC

parameters:
  - name: bins
    type: integer
    title: "Time Periods"
    description: "Number of 5-minute bins (24h default)"
    default: 288
    minimum: 12
    maximum: 288
  - name: binSize
    type: integer
    title: "Period Duration"
    description: "Minutes per bin"
    default: 5
    minimum: 5
    maximum: 60
  - name: splitAirport
    type: number
    title: "Hub → Airport Split"
    description: "Fraction of hub dispatch routed to Airport"
    default: 0.3
    minimum: 0.0
    maximum: 1.0
  - name: splitIndustrial
    type: number
    title: "Hub → Industrial Split"
    description: "Fraction of hub dispatch routed to Industrial Park"
    default: 0.2
    minimum: 0.0
    maximum: 1.0
  - name: hubRetryRate
    type: number
    title: "Airport Retry Rate"
    description: "Fraction of airport passengers requiring re-boarding"
    default: 0.12
    minimum: 0.0
    maximum: 1.0
  - name: hubRetryFailureRate
    type: number
    title: "Airport Failed Retry Rate"
    description: "Fraction of airport retry attempts that still fail"
    default: 0.25
    minimum: 0.0
    maximum: 1.0
  - name: telemetryDemandNorthSource
    type: string
    title: "Telemetry North demand source"
    description: "Optional file:// URI for North arrivals"
    default: ""
  - name: telemetryDemandSouthSource
    type: string
    title: "Telemetry South demand source"
    description: "Optional file:// URI for South arrivals"
    default: ""

grid:
  bins: ${bins}
  binSize: ${binSize}
  binUnit: minutes

rng:
  kind: pcg32
  seed: 20250327

traffic:
  arrivals:
  - nodeId: north_airport_demand
    classId: Airport
    pattern:
      kind: constant
      ratePerBin: 1
  - nodeId: north_industrial_demand
    classId: Industrial
    pattern:
      kind: constant
      ratePerBin: 1
  - nodeId: north_downtown_demand
    classId: Downtown
    pattern:
      kind: constant
      ratePerBin: 1
  - nodeId: south_airport_demand
    classId: Airport
    pattern:
      kind: constant
      ratePerBin: 1
  - nodeId: south_industrial_demand
    classId: Industrial
    pattern:
      kind: constant
      ratePerBin: 1
  - nodeId: south_downtown_demand
    classId: Downtown
    pattern:
      kind: constant
      ratePerBin: 1

topology:
  nodes:
    - id: OriginNorth
      kind: service
      semantics:
        arrivals: arrivals_north
        served: served_north
        errors: unmet_north
        capacity: cap_north
        processingTimeMsSum: origin_north_processing_time_ms_sum
        servedCount: served_north
        aliases:
          arrivals: "Northbound demand"
          served: "North → hub passengers"
          errors: "Unserved north riders"
    - id: OriginSouth
      kind: service
      semantics:
        arrivals: arrivals_south
        served: served_south
        errors: unmet_south
        capacity: cap_south
        processingTimeMsSum: origin_south_processing_time_ms_sum
        servedCount: served_south
        aliases:
          arrivals: "Southbound demand"
          served: "South → hub passengers"
          errors: "Unserved south riders"
    - id: CentralHub
      kind: service
      semantics:
        arrivals: arrivals_hub
        served: served_hub
        errors: unmet_hub
        capacity: cap_hub
        processingTimeMsSum: hub_processing_time_ms_sum
        servedCount: served_hub
        aliases:
          served: "Hub throughput"
          errors: "Hub overflow"
    - id: HubQueue
      kind: serviceWithBuffer
      semantics:
        arrivals: hub_queue_demand
        served: hub_dispatch
        errors: hub_queue_attrition
        queueDepth: hub_queue_depth
        aliases:
          arrivals: "Effective demand"
          served: "Dispatched riders"
          errors: "Queue attrition"
          queue: "Hub backlog"
      initialCondition:
        queueDepth: 20
    - id: HubDispatchRouter
      kind: router
      semantics:
        arrivals: hub_dispatch_router_arrivals
        served: hub_dispatch_router_served
        errors: hub_dispatch_router_errors
        capacity: hub_dispatch_router_capacity
        processingTimeMsSum: hub_dispatch_router_processing_time_ms_sum
        servedCount: hub_dispatch_router_served_count
        aliases:
          served: "Router dispatch"
    - id: AirportDispatchQueue
      kind: serviceWithBuffer
      semantics:
        arrivals: airport_dispatch_queue_demand
        served: airport_dispatch_queue_served
        errors: airport_dispatch_queue_attrition
        queueDepth: airport_dispatch_queue_depth
        aliases:
          arrivals: "Airport routing inflow"
          served: "Airport queue releases"
          queue: "Airport dispatch backlog"
      initialCondition:
        queueDepth: 0
      dispatchSchedule:
        periodBins: 6
        phaseOffset: 0
        capacitySeries: cap_airport
    - id: DowntownDispatchQueue
      kind: serviceWithBuffer
      semantics:
        arrivals: downtown_dispatch_queue_demand
        served: downtown_dispatch_queue_served
        errors: downtown_dispatch_queue_attrition
        queueDepth: downtown_dispatch_queue_depth
        aliases:
          arrivals: "Downtown routing inflow"
          served: "Downtown queue releases"
          queue: "Downtown dispatch backlog"
      initialCondition:
        queueDepth: 0
      dispatchSchedule:
        periodBins: 8
        phaseOffset: 2
        capacitySeries: cap_downtown
    - id: IndustrialDispatchQueue
      kind: serviceWithBuffer
      semantics:
        arrivals: industrial_dispatch_queue_demand
        served: industrial_dispatch_queue_served
        errors: industrial_dispatch_queue_attrition
        queueDepth: industrial_dispatch_queue_depth
        aliases:
          arrivals: "Industrial routing inflow"
          served: "Industrial queue releases"
          queue: "Industrial dispatch backlog"
      initialCondition:
        queueDepth: 0
      dispatchSchedule:
        periodBins: 10
        phaseOffset: 4
        capacitySeries: cap_industrial
    - id: LineAirport
      kind: service
      semantics:
        arrivals: arrivals_airport
        served: served_airport
        errors: errors_airport
        capacity: cap_airport
        attempts: airport_attempts
        failures: airport_retry_failures
        retryEcho: airport_retry_echo
        retryKernel: [0.0, 0.6, 0.3, 0.1]
        processingTimeMsSum: airport_processing_time_ms_sum
        servedCount: served_airport
        aliases:
          arrivals: "Airport-bound riders"
          served: "Airport departures"
          errors: "Failed departures"
          attempts: "Airport attempts"
          failures: "Airport failed retries"
    - id: HubLossQueue
      kind: serviceWithBuffer
      semantics:
        arrivals: hub_loss_inflow
        served: hub_loss_served_zero
        errors: hub_loss_attrition
        queueDepth: hub_loss_depth
        aliases:
          arrivals: "Unserved hub riders"
          queue: "Hub loss backlog"
      initialCondition:
        queueDepth: 0
    - id: AirportStrandedDlq
      kind: dlq
      semantics:
        arrivals: airport_dlq_inflow
        served: airport_dlq_served_zero
        errors: airport_dlq_attrition
        queueDepth: airport_dlq_depth
        aliases:
          arrivals: "Stranded airport riders"
          queue: "Airport DLQ"
      initialCondition:
        queueDepth: 0
    - id: LineDowntown
      kind: service
      semantics:
        arrivals: arrivals_downtown
        served: served_downtown
        errors: unmet_downtown
        capacity: cap_downtown
        processingTimeMsSum: downtown_processing_time_ms_sum
        servedCount: served_downtown
        aliases:
          served: "Downtown departures"
          errors: "Downtown overflow"
    - id: LineIndustrial
      kind: service
      semantics:
        arrivals: arrivals_industrial
        served: served_industrial
        errors: unmet_industrial
        capacity: cap_industrial
        processingTimeMsSum: industrial_processing_time_ms_sum
        servedCount: served_industrial
        aliases:
          served: "Industrial departures"
          errors: "Industrial overflow"
  edges:
    - id: north_to_hub
      from: OriginNorth:out
      to: CentralHub:in
    - id: south_to_hub
      from: OriginSouth:out
      to: CentralHub:in
    - id: hub_to_queue
      from: CentralHub:out
      to: HubQueue:in
    - id: queue_to_router
      from: HubQueue:out
      to: HubDispatchRouter:in
    - id: router_to_airport_queue
      from: HubDispatchRouter:out
      to: AirportDispatchQueue:in
    - id: router_to_downtown_queue
      from: HubDispatchRouter:out
      to: DowntownDispatchQueue:in
    - id: router_to_industrial_queue
      from: HubDispatchRouter:out
      to: IndustrialDispatchQueue:in
    - id: airport_queue_to_line
      from: AirportDispatchQueue:out
      to: LineAirport:in
    - id: downtown_queue_to_line
      from: DowntownDispatchQueue:out
      to: LineDowntown:in
    - id: industrial_queue_to_line
      from: IndustrialDispatchQueue:out
      to: LineIndustrial:in
    - id: hub_to_loss
      from: CentralHub:errors
      to: HubLossQueue:arrivals
      type: terminal
      measure: errors
    - id: airport_to_dlq
      from: LineAirport:failures
      to: AirportStrandedDlq:arrivals
      type: terminal
      measure: failures

nodes:
  - id: arrivals_north_base
    kind: pmf
    source: ${telemetryDemandNorthSource}
    pmf:
      values: [8, 12, 16, 20, 26]
      probabilities: [0.1, 0.2, 0.3, 0.25, 0.15]
    profile:
      kind: builtin
      name: hub-rush-hour
  - id: arrivals_south_base
    kind: pmf
    source: ${telemetryDemandSouthSource}
    pmf:
      values: [6, 10, 14, 18, 22]
      probabilities: [0.12, 0.24, 0.28, 0.22, 0.14]
    profile:
      kind: builtin
      name: hub-rush-hour
  - id: north_airport_demand
    kind: expr
    expr: "arrivals_north_base * 0.4"

  - id: north_industrial_demand
    kind: expr
    expr: "arrivals_north_base * 0.2"

  - id: north_downtown_demand
    kind: expr
    expr: "MAX(0, arrivals_north_base - north_airport_demand - north_industrial_demand)"

  - id: south_airport_demand
    kind: expr
    expr: "arrivals_south_base * 0.25"

  - id: south_industrial_demand
    kind: expr
    expr: "arrivals_south_base * 0.35"

  - id: south_downtown_demand
    kind: expr
    expr: "MAX(0, arrivals_south_base - south_airport_demand - south_industrial_demand)"

  - id: arrivals_north
    kind: expr
    expr: "north_airport_demand + north_industrial_demand + north_downtown_demand"

  - id: arrivals_south
    kind: expr
    expr: "south_airport_demand + south_industrial_demand + south_downtown_demand"

  - id: cap_north
    kind: pmf
    pmf:
      values: [12, 15, 18, 22, 26]
      probabilities: [0.08, 0.2, 0.32, 0.25, 0.15]
    profile:
      kind: builtin
      name: hub-rush-hour
  - id: cap_south
    kind: pmf
    pmf:
      values: [10, 13, 16, 19, 22]
      probabilities: [0.1, 0.22, 0.3, 0.24, 0.14]
    profile:
      kind: builtin
      name: hub-rush-hour
  - id: cap_hub
    kind: pmf
    pmf:
      values: [24, 28, 32, 36, 40]
      probabilities: [0.1, 0.2, 0.3, 0.25, 0.15]
    profile:
      kind: builtin
      name: hub-rush-hour
  - id: hub_dispatch_capacity
    kind: pmf
    pmf:
      values: [20, 24, 28, 32, 36]
      probabilities: [0.1, 0.2, 0.3, 0.25, 0.15]
    profile:
      kind: builtin
      name: hub-rush-hour
  - id: cap_airport
    kind: pmf
    pmf:
      values: [8, 10, 12, 14]
      probabilities: [0.15, 0.35, 0.3, 0.2]
    profile:
      kind: builtin
      name: hub-rush-hour
  - id: cap_downtown
    kind: pmf
    pmf:
      values: [10, 14, 18, 22]
      probabilities: [0.1, 0.25, 0.35, 0.3]
    profile:
      kind: builtin
      name: hub-rush-hour
  - id: cap_industrial
    kind: pmf
    pmf:
      values: [6, 8, 10, 12]
      probabilities: [0.15, 0.35, 0.3, 0.2]
    profile:
      kind: builtin
      name: hub-rush-hour

  - id: served_north
    kind: expr
    expr: "MIN(arrivals_north, cap_north)"
  - id: served_south
    kind: expr
    expr: "MIN(arrivals_south, cap_south)"
  - id: unmet_north
    kind: expr
    expr: "MAX(0, arrivals_north - cap_north)"
  - id: unmet_south
    kind: expr
    expr: "MAX(0, arrivals_south - cap_south)"
  - id: origin_north_processing_time_ms_sum
    kind: expr
    expr: "served_north * 40"
  - id: origin_south_processing_time_ms_sum
    kind: expr
    expr: "served_south * 40"

  - id: arrivals_hub
    kind: expr
    expr: "served_north + served_south"
  - id: served_hub
    kind: expr
    expr: "MIN(arrivals_hub, cap_hub)"
  - id: unmet_hub
    kind: expr
    expr: "MAX(0, arrivals_hub - cap_hub)"
  - id: hub_processing_time_ms_sum
    kind: expr
    expr: "served_hub * 55"

  - id: hub_queue_inflow
    kind: expr
    expr: "served_hub"
  - id: hub_queue_carry_raw
    kind: expr
    expr: "CONV(hub_queue_inflow - hub_dispatch_capacity, [1.0, 0.5, 0.25])"
  - id: hub_queue_carry
    kind: expr
    expr: "MAX(0, hub_queue_carry_raw)"
  - id: hub_queue_demand
    kind: expr
    expr: "hub_queue_inflow + hub_queue_carry"
  - id: hub_queue_attrition
    kind: expr
    expr: "MIN(hub_queue_carry, hub_queue_carry * 0.01)"
  - id: hub_dispatch
    kind: expr
    expr: "MIN(hub_dispatch_capacity, hub_queue_demand)"

  - id: hub_dispatch_router_arrivals
    kind: expr
    expr: "hub_dispatch"
    metadata:
      graph.hidden: "true"
  - id: hub_dispatch_router_served
    kind: expr
    expr: "hub_dispatch"
    metadata:
      graph.hidden: "true"
  - id: hub_dispatch_router_errors
    kind: expr
    expr: "0"
    metadata:
      graph.hidden: "true"
  - id: hub_dispatch_router_capacity
    kind: expr
    expr: "hub_dispatch_capacity"
    metadata:
      graph.hidden: "true"
  - id: hub_dispatch_router_processing_time_ms_sum
    kind: expr
    expr: "hub_dispatch_router_served * 25"
    metadata:
      graph.hidden: "true"
  - id: hub_dispatch_router_served_count
    kind: expr
    expr: "hub_dispatch_router_served"
    metadata:
      graph.hidden: "true"

  - id: hub_dispatch_router
    kind: router
    inputs:
      queue: hub_dispatch
    routes:
      - target: airport_dispatch_queue_demand
        classes: [Airport]
      - target: downtown_dispatch_queue_demand
        classes: [Downtown]
      - target: industrial_dispatch_queue_demand
        classes: [Industrial]

  - id: airport_dispatch_queue_attrition
    kind: expr
    expr: "0"
  - id: airport_dispatch_queue_demand
    kind: expr
    expr: "hub_dispatch_airport"
  - id: airport_dispatch_queue_served
    kind: expr
    expr: "airport_dispatch_queue_demand"
  - id: downtown_dispatch_queue_attrition
    kind: expr
    expr: "0"
  - id: downtown_dispatch_queue_demand
    kind: expr
    expr: "hub_dispatch_downtown"
  - id: downtown_dispatch_queue_served
    kind: expr
    expr: "downtown_dispatch_queue_demand"
  - id: industrial_dispatch_queue_attrition
    kind: expr
    expr: "0"
  - id: industrial_dispatch_queue_demand
    kind: expr
    expr: "hub_dispatch_industrial"
  - id: industrial_dispatch_queue_served
    kind: expr
    expr: "industrial_dispatch_queue_demand"
  - id: hub_dispatch_airport
    kind: expr
    expr: "hub_dispatch * ${splitAirport}"
  - id: hub_dispatch_industrial
    kind: expr
    expr: "hub_dispatch * ${splitIndustrial}"
  - id: hub_dispatch_downtown
    kind: expr
    expr: "hub_dispatch - hub_dispatch_airport - hub_dispatch_industrial"

  - id: arrivals_airport
    kind: expr
    expr: "airport_dispatch_queue_served"
  - id: arrivals_industrial
    kind: expr
    expr: "industrial_dispatch_queue_served"
  - id: arrivals_downtown
    kind: expr
    expr: "downtown_dispatch_queue_served"

  - id: airport_retry_attempts
    kind: expr
    expr: "${hubRetryRate} * arrivals_airport"
  - id: airport_attempts
    kind: expr
    expr: "arrivals_airport + airport_retry_attempts"
  - id: airport_capacity_served
    kind: expr
    expr: "MIN(airport_attempts, cap_airport)"
  - id: airport_retry_failures
    kind: expr
    expr: "${hubRetryFailureRate} * airport_retry_attempts"
  - id: served_airport
    kind: expr
    expr: "MIN(arrivals_airport, MAX(0, airport_capacity_served - airport_retry_failures))"
  - id: errors_airport
    kind: expr
    expr: "MAX(0, arrivals_airport - served_airport)"
  - id: airport_retry_echo
    kind: expr
    expr: "CONV(airport_retry_attempts, [0.0, 0.6, 0.3, 0.1])"
  - id: airport_processing_time_ms_sum
    kind: expr
    expr: "served_airport * 75"

  - id: served_downtown
    kind: expr
    expr: "MIN(arrivals_downtown, cap_downtown)"
  - id: unmet_downtown
    kind: expr
    expr: "MAX(0, arrivals_downtown - cap_downtown)"
  - id: downtown_processing_time_ms_sum
    kind: expr
    expr: "served_downtown * 60"

  - id: served_industrial
    kind: expr
    expr: "MIN(arrivals_industrial, cap_industrial)"
  - id: unmet_industrial
    kind: expr
    expr: "MAX(0, arrivals_industrial - cap_industrial)"
  - id: industrial_processing_time_ms_sum
    kind: expr
    expr: "served_industrial * 60"

  - id: hub_loss_inflow
    kind: expr
    expr: "unmet_hub"

  - id: hub_loss_served_zero
    kind: expr
    expr: "0"
    metadata:
      graph.hidden: "true"

  - id: hub_loss_attrition
    kind: expr
    expr: "0"

  - id: airport_dlq_inflow
    kind: expr
    expr: "airport_retry_failures"

  - id: airport_dlq_served_zero
    kind: expr
    expr: "0"
    metadata:
      graph.hidden: "true"

  - id: airport_dlq_attrition
    kind: expr
    expr: "0"

outputs:
  - series: arrivals_north
    as: north_demand.csv
  - series: arrivals_south
    as: south_demand.csv
  - series: hub_queue_depth
    as: hub_queue_depth.csv
  - series: hub_dispatch
    as: hub_dispatch.csv
  - series: served_airport
    as: airport_served.csv
  - series: airport_attempts
    as: airport_attempts.csv
  - series: airport_retry_failures
    as: airport_retry_failures.csv
  - series: served_downtown
    as: downtown_served.csv
  - series: hub_loss_depth
    as: hub_loss_backlog.csv
  - series: airport_dlq_depth
    as: airport_dlq_backlog.csv
  - series: served_industrial
    as: industrial_served.csv
  - series: "*"
