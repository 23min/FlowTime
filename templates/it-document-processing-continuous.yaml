schemaVersion: 1
generator: flowtime-sim
metadata:
  id: 'it-document-processing-continuous'
  title: 'IT Document Processing (Continuous, Classed)'
  description: 'Continuous document intake with classed routing, buffer ownership, retries, and DLQ capture across ingestion, processing, and delivery.'
  narrative: 'A steady stream of inbound documents (invoices, contracts, claims) enters an intake buffer, passes through database validation, and is routed by document type into specialized processing queues. Each stage owns its backlog and capacity, retries transient errors, and emits DLQ signals for exhausted failures. Processed documents are merged, enriched by an outbound database step, and delivered through a final dispatch buffer. This template exists to validate continuous (non-batched) ServiceWithBuffer behavior with class coverage and retry semantics.'
  version: 1.0.0
  captureKey: it-document-processing-continuous
  tags: [documents, queue, classes, retries, dlq]
window:
  start: 2025-01-01T00:00:00Z
  timezone: UTC

parameters:
  - name: bins
    type: integer
    title: "Time Periods"
    description: "Number of 5-minute bins (24h default)"
    default: 288
    minimum: 24
    maximum: 288
  - name: binSize
    type: integer
    title: "Bin Size (minutes)"
    description: "Duration of each bin"
    default: 5
    minimum: 5
    maximum: 60
  - name: invoiceRate
    type: number
    title: "Invoice arrival rate"
    description: "Average invoices per bin"
    default: 10
    minimum: 1
  - name: contractRate
    type: number
    title: "Contract arrival rate"
    description: "Average contracts per bin"
    default: 6
    minimum: 1
  - name: claimRate
    type: number
    title: "Claim arrival rate"
    description: "Average claims per bin"
    default: 4
    minimum: 1
  - name: intakeCapacity
    type: number
    title: "Intake capacity"
    description: "Max documents staged per bin"
    default: 22
    minimum: 1
  - name: ingressDbCapacity
    type: number
    title: "Ingress DB capacity"
    description: "Max validations per bin"
    default: 20
    minimum: 1
  - name: invoiceCapacity
    type: number
    title: "Invoice processing capacity"
    description: "Max invoices processed per bin"
    default: 12
    minimum: 1
  - name: contractCapacity
    type: number
    title: "Contract processing capacity"
    description: "Max contracts processed per bin"
    default: 8
    minimum: 1
  - name: claimCapacity
    type: number
    title: "Claim processing capacity"
    description: "Max claims processed per bin"
    default: 6
    minimum: 1
  - name: egressDbCapacity
    type: number
    title: "Egress DB capacity"
    description: "Max outbound enrichments per bin"
    default: 18
    minimum: 1
  - name: deliveryCapacity
    type: number
    title: "Delivery capacity"
    description: "Max outbound deliveries per bin"
    default: 18
    minimum: 1
  - name: retryRate
    type: number
    title: "Retry rate"
    description: "Fraction of served items that retry"
    default: 0.15
    minimum: 0
    maximum: 1
  - name: retryFailureRate
    type: number
    title: "Retry failure rate"
    description: "Fraction of retries that fail"
    default: 0.2
    minimum: 0
    maximum: 1
  - name: exhaustRate
    type: number
    title: "Exhausted retry rate"
    description: "Fraction of retry failures that exhaust"
    default: 0.35
    minimum: 0
    maximum: 1
  - name: maxAttempts
    type: integer
    title: "Max retry attempts"
    description: "Retry budget per item"
    default: 3
    minimum: 1
    maximum: 8

grid:
  bins: ${bins}
  binSize: ${binSize}
  binUnit: minutes

rng:
  kind: pcg32
  seed: 20250615

classes:
  - id: Invoice
    displayName: Invoice
  - id: Contract
    displayName: Contract
  - id: Claim
    displayName: Claim

traffic:
  arrivals:
  - nodeId: invoice_intake_demand
    classId: Invoice
    pattern:
      kind: constant
      ratePerBin: ${invoiceRate}
  - nodeId: contract_intake_demand
    classId: Contract
    pattern:
      kind: constant
      ratePerBin: ${contractRate}
  - nodeId: claim_intake_demand
    classId: Claim
    pattern:
      kind: constant
      ratePerBin: ${claimRate}

topology:
  nodes:
    - id: IntakeQueue
      kind: serviceWithBuffer
      semantics:
        arrivals: doc_intake_inflow
        served: intake_served
        errors: intake_errors
        attempts: intake_attempts
        failures: intake_retry_failures
        exhaustedFailures: intake_exhausted
        retryEcho: intake_retry_echo
        retryBudgetRemaining: intake_retry_budget_remaining
        queueDepth: self
        capacity: intake_capacity
        processingTimeMsSum: intake_processing_time_ms_sum
        servedCount: intake_served
        maxAttempts: ${maxAttempts}
        aliases:
          arrivals: "Incoming documents"
          served: "Staged documents"
          errors: "Intake drops"
          queue: "Intake backlog"
      initialCondition:
        queueDepth: 0
    - id: IngressDbQueue
      kind: serviceWithBuffer
      semantics:
        arrivals: ingress_db_inflow
        served: ingress_db_served
        errors: ingress_db_errors
        attempts: ingress_db_attempts
        failures: ingress_db_retry_failures
        exhaustedFailures: ingress_db_exhausted
        retryEcho: ingress_db_retry_echo
        retryBudgetRemaining: ingress_db_retry_budget_remaining
        queueDepth: self
        capacity: ingress_db_capacity
        processingTimeMsSum: ingress_db_processing_time_ms_sum
        servedCount: ingress_db_served
        maxAttempts: ${maxAttempts}
        aliases:
          arrivals: "Validation inflow"
          served: "Validated docs"
          errors: "DB rejects"
          queue: "Ingress DB backlog"
      initialCondition:
        queueDepth: 0
    - id: DocumentTypeRouter
      kind: router
      semantics:
        arrivals: doc_router_arrivals
        served: doc_router_served
        errors: doc_router_errors
        capacity: doc_router_capacity
        processingTimeMsSum: doc_router_processing_time_ms_sum
        servedCount: doc_router_served
        aliases:
          served: "Type routing"
    - id: InvoiceProcessing
      kind: serviceWithBuffer
      semantics:
        arrivals: invoice_queue_demand
        served: invoice_queue_served
        errors: invoice_queue_errors
        attempts: invoice_queue_attempts
        failures: invoice_queue_retry_failures
        exhaustedFailures: invoice_queue_exhausted
        retryEcho: invoice_queue_retry_echo
        retryBudgetRemaining: invoice_queue_retry_budget_remaining
        queueDepth: self
        capacity: invoice_capacity
        processingTimeMsSum: invoice_processing_time_ms_sum
        servedCount: invoice_queue_served
        maxAttempts: ${maxAttempts}
        aliases:
          arrivals: "Invoice inflow"
          served: "Invoice processed"
          errors: "Invoice rejects"
          queue: "Invoice backlog"
      initialCondition:
        queueDepth: 0
    - id: ContractProcessing
      kind: serviceWithBuffer
      semantics:
        arrivals: contract_queue_demand
        served: contract_queue_served
        errors: contract_queue_errors
        attempts: contract_queue_attempts
        failures: contract_queue_retry_failures
        exhaustedFailures: contract_queue_exhausted
        retryEcho: contract_queue_retry_echo
        retryBudgetRemaining: contract_queue_retry_budget_remaining
        queueDepth: self
        capacity: contract_capacity
        processingTimeMsSum: contract_processing_time_ms_sum
        servedCount: contract_queue_served
        maxAttempts: ${maxAttempts}
        aliases:
          arrivals: "Contract inflow"
          served: "Contract processed"
          errors: "Contract rejects"
          queue: "Contract backlog"
      initialCondition:
        queueDepth: 0
    - id: ClaimProcessing
      kind: serviceWithBuffer
      semantics:
        arrivals: claim_queue_demand
        served: claim_queue_served
        errors: claim_queue_errors
        attempts: claim_queue_attempts
        failures: claim_queue_retry_failures
        exhaustedFailures: claim_queue_exhausted
        retryEcho: claim_queue_retry_echo
        retryBudgetRemaining: claim_queue_retry_budget_remaining
        queueDepth: self
        capacity: claim_capacity
        processingTimeMsSum: claim_processing_time_ms_sum
        servedCount: claim_queue_served
        maxAttempts: ${maxAttempts}
        aliases:
          arrivals: "Claim inflow"
          served: "Claim processed"
          errors: "Claim rejects"
          queue: "Claim backlog"
      initialCondition:
        queueDepth: 0
    - id: EgressDbQueue
      kind: serviceWithBuffer
      semantics:
        arrivals: egress_db_inflow
        served: egress_db_served
        errors: egress_db_errors
        attempts: egress_db_attempts
        failures: egress_db_retry_failures
        exhaustedFailures: egress_db_exhausted
        retryEcho: egress_db_retry_echo
        retryBudgetRemaining: egress_db_retry_budget_remaining
        queueDepth: self
        capacity: egress_db_capacity
        processingTimeMsSum: egress_db_processing_time_ms_sum
        servedCount: egress_db_served
        maxAttempts: ${maxAttempts}
        aliases:
          arrivals: "Outbound enrich"
          served: "Enriched docs"
          errors: "Egress DB rejects"
          queue: "Egress DB backlog"
      initialCondition:
        queueDepth: 0
    - id: DeliveryQueue
      kind: serviceWithBuffer
      semantics:
        arrivals: delivery_inflow
        served: delivery_served
        errors: delivery_errors
        attempts: delivery_attempts
        failures: delivery_retry_failures
        exhaustedFailures: delivery_exhausted
        retryEcho: delivery_retry_echo
        retryBudgetRemaining: delivery_retry_budget_remaining
        queueDepth: self
        capacity: delivery_capacity
        processingTimeMsSum: delivery_processing_time_ms_sum
        servedCount: delivery_served
        maxAttempts: ${maxAttempts}
        aliases:
          arrivals: "Delivery inflow"
          served: "Delivered docs"
          errors: "Delivery rejects"
          queue: "Delivery backlog"
      initialCondition:
        queueDepth: 0
    - id: IntakeDlq
      kind: dlq
      semantics:
        arrivals: intake_dlq_inflow
        served: intake_dlq_served_zero
        errors: intake_dlq_attrition
        queueDepth: self
        aliases:
          arrivals: "Intake DLQ"
          queue: "Intake DLQ backlog"
      initialCondition:
        queueDepth: 0
    - id: IngressDbDlq
      kind: dlq
      semantics:
        arrivals: ingress_db_dlq_inflow
        served: ingress_db_dlq_served_zero
        errors: ingress_db_dlq_attrition
        queueDepth: self
        aliases:
          arrivals: "Ingress DB DLQ"
          queue: "Ingress DB DLQ backlog"
      initialCondition:
        queueDepth: 0
    - id: InvoiceDlq
      kind: dlq
      semantics:
        arrivals: invoice_dlq_inflow
        served: invoice_dlq_served_zero
        errors: invoice_dlq_attrition
        queueDepth: self
        aliases:
          arrivals: "Invoice DLQ"
          queue: "Invoice DLQ backlog"
