schemaVersion: 1
generator: flowtime-sim
metadata:
  id: warehouse-picker-waves
  title: Warehouse Picker Wave Dispatch
  description: Orders accumulate in staging and release in scheduled picker waves before final packing.
  version: 1.0.0
  captureKey: warehouse-picker
  tags: [warehouse, logistics, dispatch, backlog]

window:
  start: 2025-01-01T00:00:00Z
  timezone: UTC

parameters:
  - name: bins
    type: integer
    title: "Time Periods"
    description: "Number of 1-hour bins to model"
    default: 12
    minimum: 6
    maximum: 72
  - name: binSize
    type: integer
    title: "Minutes Per Bin"
    description: "Duration of each time bucket"
    default: 60
    minimum: 15
    maximum: 240
  - name: inboundPattern
    type: array
    arrayOf: number
    title: "Inbound Order Pattern"
    description: "Orders per bin arriving at intake"
    default: [120, 135, 150, 190, 210, 220, 205, 185, 170, 160, 150, 140]
  - name: intakeCapacity
    type: array
    arrayOf: number
    title: "Receiving Capacity"
    description: "How many orders intake can stage per bin"
    default: [130, 150, 160, 200, 210, 210, 195, 185, 175, 165, 155, 150]
  - name: wavePeriodBins
    type: integer
    title: "Picker Wave Period"
    description: "Bins between picker wave releases"
    default: 4
    minimum: 1
    maximum: 24
  - name: wavePhaseOffset
    type: integer
    title: "Picker Wave Phase"
    description: "Offset (bins) before the first picker wave fires"
    default: 0
    minimum: 0
    maximum: 24
  - name: waveCapacity
    type: integer
    title: "Orders Per Wave"
    description: "Per-wave dispatch capacity (orders)"
    default: 80
    minimum: 10
    maximum: 500
  - name: packCapacity
    type: integer
    title: "Pack & Ship Capacity"
    description: "Orders per bin the packing line can complete"
    default: 70
    minimum: 10
    maximum: 300

grid:
  bins: ${bins}
  binSize: ${binSize}
  binUnit: minutes

rng:
  kind: pcg32
  seed: 20251127

topology:
  nodes:
    - id: Intake
      kind: service
      semantics:
        arrivals: order_demand
        served: received_orders
        errors: intake_spill
        capacity: intake_capacity
        slaMin: 45
        aliases:
          arrivals: "Inbound orders"
          served: "Staged orders"
          errors: "Overflow"
    - id: PickerWave
      kind: queue
      semantics:
        arrivals: wave_stage_inflow
        served: picker_wave_release
        errors: wave_attrition
        queueDepth: picker_wave_backlog
        aliases:
          arrivals: "Wave staging"
          served: "Picker wave release"
          queue: "Staged backlog"
      initialCondition:
        queueDepth: 0
    - id: PackStagingQueue
      kind: queue
      semantics:
        arrivals: pack_arrivals
        served: pack_processed
        errors: zero_flow
        queueDepth: pack_queue_backlog
        aliases:
          arrivals: "Picker releases"
          served: "Pack throughput"
          queue: "Pack staging backlog"
      initialCondition:
        queueDepth: 0
    - id: PackAndShip
      kind: service
      semantics:
        arrivals: pack_demand
        served: pack_processed
        errors: pack_spill
        capacity: pack_capacity
        slaMin: 30
        aliases:
          arrivals: "Picker releases"
          served: "Packed & shipped"
          errors: "Unpacked"
  edges:
    - id: intake_to_wave
      from: Intake:served
      to: PickerWave:arrivals
      weight: 1.0
    - id: wave_to_pack_queue
      from: PickerWave:served
      to: PackStagingQueue:arrivals
      weight: 1.0
    - id: pack_queue_to_pack
      from: PackStagingQueue:served
      to: PackAndShip:arrivals
      weight: 1.0

nodes:
  - id: order_demand
    kind: const
    values: ${inboundPattern}
  - id: intake_capacity
    kind: const
    values: ${intakeCapacity}
  - id: received_orders
    kind: expr
    expr: "MIN(order_demand, intake_capacity)"
  - id: intake_spill
    kind: expr
    expr: "MAX(0, order_demand - intake_capacity)"
  - id: wave_stage_inflow
    kind: expr
    expr: "received_orders"
  - id: wave_attrition
    kind: expr
    expr: "0"
  - id: picker_wave_gate
    kind: expr
    expr: "PULSE(${wavePeriodBins}, ${wavePhaseOffset}, 1)"
  - id: picker_wave_buildup
    kind: expr
    expr: "wave_stage_inflow + SHIFT(wave_stage_inflow, 1) + SHIFT(wave_stage_inflow, 2) + SHIFT(wave_stage_inflow, 3)"
  - id: picker_wave_release
    kind: expr
    expr: "MIN(picker_wave_buildup, wave_dispatch_capacity) * picker_wave_gate"
  - id: wave_dispatch_capacity
    kind: expr
    expr: "${waveCapacity}"
  - id: picker_wave_backlog
    kind: backlog
    inflow: wave_stage_inflow
    outflow: picker_wave_release
    loss: wave_attrition
    dispatchSchedule:
      periodBins: ${wavePeriodBins}
      phaseOffset: ${wavePhaseOffset}
      capacitySeries: wave_dispatch_capacity
  - id: pack_capacity
    kind: expr
    expr: "${packCapacity}"
  - id: pack_arrivals
    kind: expr
    expr: "picker_wave_release"
  - id: pack_demand
    kind: expr
    expr: "SHIFT(pack_queue_backlog, 1) + pack_arrivals"
  - id: pack_processed
    kind: expr
    expr: "MAX(0, SHIFT(pack_queue_backlog, 1) + pack_arrivals - pack_queue_backlog)"
  - id: pack_queue_backlog
    kind: backlog
    inflow: pack_arrivals
    outflow: pack_capacity
  - id: zero_flow
    kind: expr
    expr: "0"
  - id: pack_spill
    kind: expr
    expr: "MAX(0, pack_demand - pack_processed)"

outputs:
  - series: order_demand
    as: inbound_demand.csv
  - series: picker_wave_backlog
    as: staged_backlog.csv
  - series: picker_wave_release
    as: picker_wave_release.csv
  - series: pack_queue_backlog
    as: pack_queue_depth.csv
  - series: pack_processed
    as: packed_orders.csv
