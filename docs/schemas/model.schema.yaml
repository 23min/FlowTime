# FlowTime Unified Model Schema (post-substitution)
# This file describes the single shape that FlowTime-Sim emits and FlowTime Engine
# consumes after parameter substitution. There is one C# type (`ModelDto`,
# src/FlowTime.Contracts/Dtos/ModelDtos.cs), one schema, one validator
# (`ModelSchemaValidator`). Authoring-time templates live under a separate schema
# (`template.schema.json`).

$schema: "https://json-schema.org/draft-07/schema#"
$id: "https://flowtime.dev/schemas/model.schema.yaml"
title: "FlowTime Unified Model Schema"
description: |
  Unified schema for FlowTime post-substitution models (the model both Sim emits and
  the Engine consumes). Source of truth for the field set is `ModelDto` in
  src/FlowTime.Contracts/Dtos/ModelDtos.cs. Every property declared here maps to a
  member on `ModelDto` (or one of its nested DTOs); every member on `ModelDto` has
  a declaration here. Keys are camelCase throughout.

type: object
required:
  - schemaVersion
  - grid
  - nodes

properties:
  schemaVersion:
    type: integer
    const: 1
    description: |
      Schema version identifier for evolution tracking. Always 1 for the current version.
      Consumer: `src/FlowTime.Core/Compiler/ModelCompiler.cs:129` propagates it onto the compiled
      `ModelDefinition` (`ModelParser.cs:537`). DTO source: `ModelDto.SchemaVersion`
      (`src/FlowTime.Contracts/Dtos/ModelDtos.cs:22`).

  grid:
    type: object
    description: |
      Time grid definition. DTO source: `GridDto`
      (`src/FlowTime.Contracts/Dtos/ModelDtos.cs:49`).
      Consumer: `src/FlowTime.Core/Models/ModelParser.cs:35-39` reads `bins`/`binSize`/`binUnit`
      to construct the `TimeGrid`; line 62 reads `start` via `ParseStartTime(model.Grid.Start)`.
    required:
      - bins
      - binSize
      - binUnit
    properties:
      bins:
        type: integer
        minimum: 1
        maximum: 10000
        description: |
          Number of time periods in the simulation. DTO source: `GridDto.Bins`.
          Consumer: `src/FlowTime.Core/Models/ModelParser.cs:39` and `:59` populate `TimeGrid.Bins`.
        examples:
          - 24      # 24 periods
          - 168     # 1 week worth
          - 365     # 1 year of daily data
          - 8760    # 1 year of hourly data

      binSize:
        type: integer
        minimum: 1
        maximum: 1000
        description: |
          Duration of each time period (magnitude). DTO source: `GridDto.BinSize`.
          Consumer: `src/FlowTime.Core/Models/ModelParser.cs:39` and `:60` propagate to `TimeGrid.BinSize`.
        examples:
          - 1       # Single unit
          - 5       # 5-minute or 5-hour bins
          - 15      # Quarter-hour bins
          - 2       # Two-day bins

      binUnit:
        type: string
        enum:
          - minutes
          - hours
          - days
          - weeks
        description: |
          Time unit for binSize duration. DTO source: `GridDto.BinUnit`.
          Consumer: `src/FlowTime.Core/Models/ModelParser.cs:38` parses via
          `TimeUnitExtensions.Parse` and feeds the result into the constructed `TimeGrid`.
        examples:
          - "hours"    # Most common
          - "minutes"  # High resolution
          - "days"     # Daily simulations
          - "weeks"    # Long-term planning

      start:
        type: string
        format: date-time
        description: |
          Optional ISO-8601 UTC timestamp anchoring bin 0. Models authored without `start`
          continue to validate (it is **not** in `grid.required`). DTO source:
          `GridDto.Start` (renamed from `StartTimeUtc` in m-E24-02 per A2; the
          `LegacyStart` shim was deleted in the same milestone per A1).
          Consumer: `src/FlowTime.Core/Models/ModelParser.cs:62` calls
          `ParseStartTime(model.Grid.Start)` and stores the result on the compiled
          grid metadata.
        examples:
          - "2025-01-01T00:00:00Z"

    additionalProperties: false

  topology:
    type: object
    description: |
      Optional declarative topology description (nodes + edges + constraints) used by
      Engine compile/analysis paths and the Time-Travel UI. DTO source: `TopologyDto`
      (`src/FlowTime.Contracts/Dtos/ModelDtos.cs:123`).
      Consumer: `src/FlowTime.Core/Compiler/ModelCompiler.cs:19` short-circuits when
      `Topology?.Nodes` is empty; `src/FlowTime.Core/Analysis/InvariantAnalyzer.cs:35`
      and `:50` walk nodes/edges; `src/FlowTime.Core/Models/ModelParser.cs:69-73`
      converts each list.
    properties:
      nodes:
        type: array
        description: |
          Topology node list. DTO source: `TopologyDto.Nodes` (`TopologyNodeDto`,
          `ModelDtos.cs:130`).
          Consumer: `src/FlowTime.Core/Compiler/ModelCompiler.cs:29` iterates each
          to materialize queue / retry-echo nodes.
        items:
          type: object
          required:
            - id
            - kind
            # rule from ModelParser.cs:93-94 — added m-E23-01
            - semantics
          properties:
            id:
              type: string
              minLength: 1
              description: |
                Topology node id. DTO source: `TopologyNodeDto.Id`.
                Consumer: `src/FlowTime.Core/Compiler/ModelCompiler.cs:42` (`ResolveProducerId`)
                and `src/FlowTime.Core/Models/ModelParser.cs:272` (initial-condition
                validation) reference it.
            kind:
              type: string
              # rule from ModelDtos.cs:133 — added m-E23-01
              default: service
              description: |
                Topology node kind (e.g. `service`, `serviceWithBuffer`, `queue`).
                DTO source: `TopologyNodeDto.Kind` (default `"service"`).
                Consumer: `src/FlowTime.Core/Compiler/ModelCompiler.cs:36`
                (`IsQueueLikeKind`) drives queue-node synthesis;
                `src/FlowTime.API/Services/GraphService.cs:241` calls `ResolveDisplayKind`.
            nodeRole:
              type: string
              description: |
                Optional role label (e.g. `source`, `sink`). DTO source:
                `TopologyNodeDto.NodeRole`. Consumer: graph layout in
                `src/FlowTime.API/Services/GraphService.cs`.
            group:
              type: string
              description: |
                Optional grouping tag for UI clustering. DTO source:
                `TopologyNodeDto.Group`. Consumer: graph layout in
                `src/FlowTime.API/Services/GraphService.cs`.
            ui:
              type: object
              description: |
                Optional UI hint block. DTO source: `TopologyNodeDto.Ui` (`UiHintsDto`,
                `ModelDtos.cs:204`). Consumer: graph rendering in
                `src/FlowTime.API/Services/GraphService.cs`.
              properties:
                x: { type: number, description: "X coordinate hint." }
                y: { type: number, description: "Y coordinate hint." }
              additionalProperties: true
            constraints:
              type: array
              description: |
                Optional list of constraint ids referenced by this node. DTO source:
                `TopologyNodeDto.Constraints`. Consumer:
                `src/FlowTime.Core/Analysis/InvariantAnalyzer.cs` constraint-matching pass.
              items:
                type: string
            semantics:
              type: object
              description: |
                Series bindings that drive analytical evaluation for this topology node.
                DTO source: `TopologyNodeDto.Semantics` (`TopologySemanticsDto`,
                `ModelDtos.cs:143`).
                Consumer: `src/FlowTime.Core/DataSources/SemanticLoader.cs:25-51` reads
                `arrivals`/`served`/`capacity`/`parallelism`/`servedCount`;
                `src/FlowTime.Core/Analysis/InvariantAnalyzer.cs:147-227` consumes the
                same surface for invariants; `src/FlowTime.Core/Compiler/ModelCompiler.cs:33-53`
                resolves `queueDepth` / `retryEcho` for queue-like nodes.
              # rule from ModelParser.cs:98-99 — added m-E23-01
              required:
                - arrivals
                - served
              properties:
                arrivals:
                  type: string
                  description: |
                    Series id (or `file:` reference) carrying arrival counts. DTO source:
                    `TopologySemanticsDto.Arrivals`. Consumer: `SemanticLoader.cs:25`,
                    `InvariantAnalyzer.cs:147`.
                served:
                  type: string
                  description: |
                    Series id carrying served counts. DTO source:
                    `TopologySemanticsDto.Served`. Consumer: `SemanticLoader.cs:26`,
                    `InvariantAnalyzer.cs:151`.
                errors:
                  type: string
                  description: |
                    Series id carrying error counts. DTO source:
                    `TopologySemanticsDto.Errors`. Consumer: `ModelCompiler.cs:50`
                    (used as queue `loss`); `InvariantAnalyzer.cs` flow checks.
                attempts:
                  type: string
                  description: |
                    Series id for attempt counts. DTO source: `TopologySemanticsDto.Attempts`.
                    Consumer: `InvariantAnalyzer.cs` retry-echo flow checks.
                failures:
                  type: string
                  description: |
                    Series id for failure counts. DTO source: `TopologySemanticsDto.Failures`.
                    Consumer: `ModelCompiler.cs:82` (retry-echo synthesis).
                exhaustedFailures:
                  type: string
                  description: |
                    Series id for exhausted-failure counts. DTO source:
                    `TopologySemanticsDto.ExhaustedFailures`. Consumer:
                    `InvariantAnalyzer.cs` exhausted-policy checks.
                retryEcho:
                  type: string
                  description: |
                    Series id producing retry echoes (synthesized when absent). DTO source:
                    `TopologySemanticsDto.RetryEcho`. Consumer: `ModelCompiler.cs:34`
                    drives synthesis when no node defines this series.
                retryBudgetRemaining:
                  type: string
                  description: |
                    Series id for remaining retry budget. DTO source:
                    `TopologySemanticsDto.RetryBudgetRemaining`. Consumer:
                    `InvariantAnalyzer.cs` retry-budget validation.
                retryKernel:
                  type: array
                  items:
                    type: number
                  description: |
                    Inline retry kernel coefficients used to synthesize a retry-echo node.
                    DTO source: `TopologySemanticsDto.RetryKernel`. Consumer:
                    `src/FlowTime.Core/Compiler/ModelCompiler.cs:90-101`
                    (`RetryKernelPolicy.Apply`).
                externalDemand:
                  type: string
                  description: |
                    Series id for external demand pressure. DTO source:
                    `TopologySemanticsDto.ExternalDemand`. Consumer: `InvariantAnalyzer.cs`
                    demand-balance checks.
                queueDepth:
                  type: string
                  description: |
                    Series id providing queue depth. The literal `"self"` resolves the
                    depth from the topology node itself. DTO source:
                    `TopologySemanticsDto.QueueDepth`. Consumer:
                    `src/FlowTime.Core/Compiler/ModelCompiler.cs:33-53` synthesizes a
                    queue node when no producer exists; `ModelParser.cs:278` and `:334`
                    propagate the binding to ServiceWithBuffer initial seeding.
                capacity:
                  type: string
                  description: |
                    Series id for capacity. DTO source: `TopologySemanticsDto.Capacity`.
                    Consumer: `SemanticLoader.cs:45`, `InvariantAnalyzer.cs:179`.
                parallelism:
                  oneOf:
                    - type: number
                      minimum: 1
                    - type: string
                  description: |
                    Parallelism factor (constant or series id). DTO source:
                    `TopologySemanticsDto.Parallelism` (`ParallelismReference`).
                    Consumer: `SemanticLoader.cs:47`,
                    `src/FlowTime.Core/Metrics/RuntimeAnalyticalEvaluator.cs:1059`.
                processingTimeMsSum:
                  type: string
                  description: |
                    Series id for cumulative processing time (ms). DTO source:
                    `TopologySemanticsDto.ProcessingTimeMsSum`. Consumer:
                    `InvariantAnalyzer.cs` latency derivations.
                servedCount:
                  type: string
                  description: |
                    Series id for served-count totals (when `served` carries rates).
                    DTO source: `TopologySemanticsDto.ServedCount`.
                    Consumer: `SemanticLoader.cs:51`.
                slaMin:
                  type: number
                  description: |
                    SLA minimum (target). DTO source: `TopologySemanticsDto.SlaMin`.
                    Consumer: `InvariantAnalyzer.cs` SLA breach checks.
                maxAttempts:
                  type: number
                  description: |
                    Maximum allowed retry attempts. DTO source:
                    `TopologySemanticsDto.MaxAttempts`. Consumer: `InvariantAnalyzer.cs`
                    retry-budget bounds.
                backoffStrategy:
                  type: string
                  description: |
                    Retry backoff strategy label. DTO source:
                    `TopologySemanticsDto.BackoffStrategy`. Consumer:
                    `InvariantAnalyzer.cs` retry-strategy checks.
                exhaustedPolicy:
                  type: string
                  description: |
                    Policy applied when retries are exhausted. DTO source:
                    `TopologySemanticsDto.ExhaustedPolicy`. Consumer:
                    `InvariantAnalyzer.cs` exhausted-policy checks.
                aliases:
                  type: object
                  description: |
                    Optional alias map (alias → canonical series id). DTO source:
                    `TopologySemanticsDto.Aliases`. Consumer: `InvariantAnalyzer.cs`
                    series-id resolution.
                  additionalProperties:
                    type: string
              additionalProperties: true
            initialCondition:
              type: object
              description: |
                Optional initial condition for queue-like topology nodes. DTO source:
                `TopologyNodeDto.InitialCondition` (`TopologyInitialConditionDto`,
                `ModelDtos.cs:174`).
                Consumer: `src/FlowTime.Core/Models/ModelParser.cs:336`
                (`topoNode.InitialCondition?.QueueDepth ?? 0d`) seeds the
                ServiceWithBuffer node.
              properties:
                queueDepth:
                  type: number
                  description: |
                    Initial queue depth seeded into the synthesized ServiceWithBuffer.
                    DTO source: `TopologyInitialConditionDto.QueueDepth`. Consumer:
                    `ModelParser.cs:336` and `:354`.
              additionalProperties: true
            dispatchSchedule:
              $ref: "#/$defs/dispatchSchedule"
          additionalProperties: true
      edges:
        type: array
        description: |
          Topology edges (flow / dependency relations). DTO source: `TopologyDto.Edges`
          (`TopologyEdgeDto`, `ModelDtos.cs:179`).
          Consumer: `src/FlowTime.Core/Analysis/InvariantAnalyzer.cs:50-79` walks
          edges for flow-balance checks; `src/FlowTime.TimeMachine/Orchestration/RunOrchestrationService.cs:720`
          (`EdgeFlowMaterializer.BuildEdgeFlowSeries`) materializes per-edge series.
        items:
          type: object
          # rule from ModelParser.cs:145-146 — added m-E23-01
          required:
            - from
            - to
          properties:
            id:
              type: string
              description: |
                Edge id. DTO source: `TopologyEdgeDto.Id`. Consumer:
                `InvariantAnalyzer.cs` edge-balance reporting.
            from:
              type: string
              description: |
                Source node id. DTO source: `TopologyEdgeDto.From`. Consumer:
                `InvariantAnalyzer.cs` edge walks.
            to:
              type: string
              description: |
                Target node id. DTO source: `TopologyEdgeDto.To`. Consumer:
                `InvariantAnalyzer.cs` edge walks.
            weight:
              type: number
              # rule from ModelService.cs:175-176 — added m-E23-01
              default: 1.0
              description: |
                Optional edge weight. DTO source: `TopologyEdgeDto.Weight`. Consumer:
                `EdgeFlowMaterializer` weight-scaling.
            type:
              type: string
              enum: [throughput, effort, terminal, dependency]
              description: |
                Edge type label. DTO source: `TopologyEdgeDto.Type`. Consumer:
                `EdgeFlowMaterializer` materialization branching.
            measure:
              type: string
              enum: [served, attempts, errors, failures, exhaustedFailures, load]
              description: |
                Series measure consumed by this edge. DTO source:
                `TopologyEdgeDto.Measure`. Consumer: `EdgeFlowMaterializer`
                series selection.
            multiplier:
              type: number
              description: |
                Optional flow multiplier. DTO source: `TopologyEdgeDto.Multiplier`.
                Consumer: `EdgeFlowMaterializer` flow-scaling.
            lag:
              type: integer
              description: |
                Optional bin lag applied at this edge. DTO source:
                `TopologyEdgeDto.Lag`. Consumer: `EdgeFlowMaterializer` SHIFT-style
                lag application.
          additionalProperties: true
      constraints:
        type: array
        description: |
          Topology-level constraint blocks. DTO source: `TopologyDto.Constraints`
          (`TopologyConstraintDto`, `ModelDtos.cs:191`). Consumer:
          `src/FlowTime.Core/Analysis/InvariantAnalyzer.cs:46` builds a constraint
          lookup keyed by id and matches against topology nodes.
        items:
          type: object
          required:
            - id
            - semantics
          properties:
            id:
              type: string
              minLength: 1
              description: |
                Constraint identifier. DTO source: `TopologyConstraintDto.Id`. Consumer:
                `InvariantAnalyzer.cs:46` constraint lookup.
            semantics:
              type: object
              description: |
                Constraint semantics block. DTO source:
                `TopologyConstraintDto.Semantics` (`ConstraintSemanticsDto`,
                `ModelDtos.cs:197`). Consumer: `InvariantAnalyzer.cs` constraint-binding
                pass.
              # rule from ModelParser.cs:178-179 — added m-E23-01
              required:
                - arrivals
                - served
              properties:
                arrivals:
                  type: string
                  description: |
                    Series binding for arrivals. DTO source:
                    `ConstraintSemanticsDto.Arrivals`. Consumer: `InvariantAnalyzer.cs`
                    constraint pass.
                served:
                  type: string
                  description: |
                    Series binding for served counts. DTO source:
                    `ConstraintSemanticsDto.Served`. Consumer: `InvariantAnalyzer.cs`.
                errors:
                  type: string
                  description: |
                    Series binding for errors. DTO source:
                    `ConstraintSemanticsDto.Errors`. Consumer: `InvariantAnalyzer.cs`.
                latencyMinutes:
                  type: string
                  description: |
                    Series binding for latency (minutes). DTO source:
                    `ConstraintSemanticsDto.LatencyMinutes`. Consumer:
                    `InvariantAnalyzer.cs` SLA / latency checks.
              additionalProperties: true
    additionalProperties: false

  nodes:
    type: array
    description: |
      Computation node list. DTO source: `ModelDto.Nodes` (`NodeDto`,
      `src/FlowTime.Contracts/Dtos/ModelDtos.cs:60`).
      Consumer: `src/FlowTime.Core/Compiler/ModelCompiler.cs:24` clones the list and
      may append synthesized queue / retry-echo nodes;
      `src/FlowTime.Core/Models/ModelParser.cs:341` materializes each into an
      `INode`; `src/FlowTime.Core/Services/GraphAnalyzer.cs:18-40` builds the graph.
    minItems: 1
    items:
      type: object
      required:
        - id
        - kind
      properties:
        id:
          type: string
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]*$"
          description: |
            Unique node identifier (must be a valid C-style identifier). DTO source:
            `NodeDto.Id`. Consumer: `src/FlowTime.Core/Models/ModelParser.cs:367-373`
            requires non-empty; node-id uniqueness enforced during compile.
          examples:
            - "demand"
            - "capacity"
            - "served_customers"
            - "avg_latency_ms"

        kind:
          type: string
          enum:
            - const
            - expr
            - pmf
            - serviceWithBuffer
            - router
          # rule from ModelDtos.cs:63 — added m-E23-01
          default: const
          description: |
            Node type. DTO source: `NodeDto.Kind` (default `"const"`). Consumer:
            `src/FlowTime.Core/Models/ModelParser.cs:370-378` (`ParseSingleNode`
            switch); `src/FlowTime.Core/Compiler/ModelCompiler.cs:36-57`
            (`IsQueueLikeKind`); `src/FlowTime.API/Services/GraphService.cs:241`
            (`ResolveDisplayKind`).

        # Properties for 'const' nodes
        values:
          type: array
          description: |
            Constant values, length must equal `grid.bins`. DTO source: `NodeDto.Values`.
            Consumer: `src/FlowTime.Core/Models/ModelParser.cs` const-node materialization;
            `src/FlowTime.Core/Artifacts/RunArtifactWriter.cs:457-513` writes per-bin
            CSVs.
          items:
            type: number
          # rule from ModelParser.cs:391-392 — added m-E23-01
          minItems: 1
          examples:
            - [100, 120, 150, 130]
            - [50.5, 60.2, 75.8, 80.0]

        # Properties for 'expr' nodes
        expr:
          type: string
          # rule from ModelParser.cs:399-400 — added m-E23-01
          minLength: 1
          description: |
            Expression formula (required for `kind: expr`). DTO source: `NodeDto.Expr`.
            Consumer: `src/FlowTime.Core/Models/ModelParser.cs:298` instantiates
            `ExpressionParser`; `src/FlowTime.Core/Services/GraphAnalyzer.cs:26`
            extracts dependencies; `src/FlowTime.Core/Artifacts/RunArtifactWriter.cs:514`
            preserves the source on the cloned definition.
          examples:
            - "MIN(demand, capacity)"
            - "MAX(0, arrivals - served + SHIFT(backlog, 1))"
            - "served / capacity * 100"
            - "demand * 0.95"

        # Properties for 'pmf' nodes
        pmf:
          type: object
          description: |
            Probability mass function definition (required for `kind: pmf`). DTO source:
            `NodeDto.Pmf` (`PmfDto`, `ModelDtos.cs:78`). Consumer:
            `src/FlowTime.Core/Pmf/PmfCompiler.cs:145` samples via `rng.NextDouble()`;
            `src/FlowTime.Core/Services/GraphAnalyzer.cs:40` recognizes the kind.
          required:
            - values
            - probabilities
          properties:
            values:
              type: array
              description: |
                Possible outcome values. DTO source: `PmfDto.Values`. Consumer:
                `PmfCompiler.cs` sample-table construction.
              items:
                type: number
              minItems: 1
              examples:
                - [0, 1, 2, 3]
                - [50, 100, 150, 200]
                - [0.0, 0.5, 1.0]

            probabilities:
              type: array
              description: |
                Probability for each value (must sum to 1.0). DTO source:
                `PmfDto.Probabilities`. Consumer: `PmfCompiler.cs` rejects
                non-normalized distributions.
              items:
                type: number
                minimum: 0
                maximum: 1
              minItems: 1
              examples:
                - [0.7, 0.2, 0.08, 0.02]
                - [0.25, 0.25, 0.25, 0.25]
                - [0.1, 0.6, 0.3]

          additionalProperties: false

        metadata:
          type: object
          description: |
            Per-node metadata bag (string-valued). DTO source: `NodeDto.Metadata`
            (`Dictionary<string,string>?`).
            Consumer: `src/FlowTime.API/Services/GraphService.cs:415` reads
            `origin.kind` via `TryGetMetadataValue`; `:441` reads `graph.hidden`;
            `:448` reads `ui.hidden`. `src/FlowTime.API/Services/StateQueryService.cs:2163`
            reads `series.origin`. `src/FlowTime.Core/Artifacts/RunArtifactWriter.cs:516`
            preserves the dictionary on the cloned node definition.
            `src/FlowTime.Core/Compiler/ModelCompiler.cs:65-69` and `:107-110`
            populate `graph.hidden` / `series.origin` on synthesized nodes.
          additionalProperties:
            type: string

        inputs:
          type: object
          description: |
            Router inputs configuration. DTO source: `NodeDto.Inputs` (`RouterInputsDto`,
            `ModelDtos.cs:210`). Consumer: router evaluator (registered via
            `ModelParser.ParseSingleNode` switch).
          properties:
            queue:
              type: string
              # rule from ModelParser.cs:467-470 — added m-E23-01
              minLength: 1
              description: |
                Source node routed by this router. DTO source: `RouterInputsDto.Queue`.
                Consumer: router evaluator.
          additionalProperties: false

        routes:
          type: array
          description: |
            Router route list. DTO source: `NodeDto.Routes` (`RouterRouteDto`,
            `ModelDtos.cs:215`). Consumer: router evaluator.
          minItems: 1
          items:
            type: object
            required:
              - target
            properties:
              target:
                type: string
                # rule from ModelParser.cs:479-481 — added m-E23-01
                minLength: 1
                description: |
                  Target node receiving this route. DTO source: `RouterRouteDto.Target`.
                  Consumer: router evaluator.
              classes:
                type: array
                description: |
                  Optional list of class IDs routed 100% to this target. DTO source:
                  `RouterRouteDto.Classes`. Consumer: router evaluator class-binding.
                items:
                  type: string
              weight:
                type: number
                # rule from ModelParser.cs:484-486 — added m-E23-01
                exclusiveMinimum: 0
                description: |
                  Weight used to split remaining classes when no `classes` list is provided.
                  DTO source: `RouterRouteDto.Weight`. Consumer: router evaluator
                  weight-based splitting.
            additionalProperties: false

        inflow:
          type: string
          description: |
            ServiceWithBuffer inflow node id (required when `kind: serviceWithBuffer`).
            DTO source: `NodeDto.Inflow`. Consumer:
            `src/FlowTime.Core/Models/ModelParser.cs:349` (`ServiceWithBufferNode`
            constructor); `src/FlowTime.Core/Analysis/InvariantAnalyzer.cs:1575`
            class-coverage gate.

        outflow:
          type: string
          description: |
            ServiceWithBuffer outflow node id (required when `kind: serviceWithBuffer`).
            DTO source: `NodeDto.Outflow`. Consumer:
            `src/FlowTime.Core/Models/ModelParser.cs:350`; `InvariantAnalyzer.cs:1586`.

        loss:
          type: string
          description: |
            Optional loss-sink node id for ServiceWithBuffer depletion. DTO source:
            `NodeDto.Loss`. Consumer:
            `src/FlowTime.Core/Models/ModelParser.cs:351`; `InvariantAnalyzer.cs:1587`.

        dispatchSchedule:
          $ref: "#/$defs/dispatchSchedule"

      # Per-kind structural constraints. oneOf is structurally airtight: an instance
      # whose `kind` value matches no arm fails validation cleanly. Adding a node
      # kind requires (1) extending the kind enum at the top of `nodes[].items.properties.kind`,
      # and (2) adding an arm here. Forgetting the arm causes a hard fail rather than
      # a silent skip — exactly the future-proof property we want.
      #
      # Each arm uses `additionalProperties: false` with an explicit allow-list of
      # property *names* (the property *schemas* — types, patterns, minItems, etc. —
      # remain at the outer `properties` block above and continue to apply via JSON
      # Schema property-evaluation order). Forbidden fields are expressed implicitly
      # by being absent from the arm's `properties` allow-list. This avoids the
      # `not`-keyword reporting blind spot in JsonEverything (D3, m-E23-01) for the
      # const/expr/pmf mutual-exclusion rules — `additionalProperties: false`
      # violations surface cleanly as standard validation errors.
      oneOf:
        # const nodes must have 'values'; 'expr' and 'pmf' are forbidden.
        - properties:
            id: true
            kind:
              const: const
            values: true
            metadata: true
            dispatchSchedule: true
          required:
            - values
          additionalProperties: false

        # expr nodes must have 'expr'; 'values' and 'pmf' are forbidden.
        - properties:
            id: true
            kind:
              const: expr
            expr: true
            metadata: true
            dispatchSchedule: true
          required:
            - expr
          additionalProperties: false

        # pmf nodes must have 'pmf'; 'values' and 'expr' are forbidden.
        - properties:
            id: true
            kind:
              const: pmf
            pmf: true
            metadata: true
            dispatchSchedule: true
          required:
            - pmf
          additionalProperties: false

        # router nodes require inputs.queue and at least one route. routes[]
        # entries must declare either `classes` or `weight` (or both).
        - properties:
            id: true
            kind:
              const: router
            inputs:
              required:
                - queue
            routes:
              items:
                anyOf:
                  - required: [classes]
                  - required: [weight]
            metadata: true
            dispatchSchedule: true
          required:
            - inputs
            - routes
          additionalProperties: false

        # serviceWithBuffer nodes require inflow and outflow; loss is optional.
        - properties:
            id: true
            kind:
              const: serviceWithBuffer
            inflow: true
            outflow: true
            loss: true
            metadata: true
            dispatchSchedule: true
          required:
            - inflow
            - outflow
          additionalProperties: false

      additionalProperties: false

  outputs:
    type: array
    description: |
      Output declarations. Each entry pins a series in the run result; entries that
      additionally set `as` are also exported as CSV. DTO source: `ModelDto.Outputs`
      (`OutputDto`, `src/FlowTime.Contracts/Dtos/ModelDtos.cs:116`).
      Consumer: `src/FlowTime.Core/Compiler/ModelCompiler.cs:134` clones the list onto
      the compiled model; `src/FlowTime.Core/Artifacts/RunArtifactWriter.cs:119`
      resolves series; `src/FlowTime.TimeMachine/TelemetryBundleBuilder.cs:279` and
      `src/FlowTime.TimeMachine/Capture/RunArtifactReader.cs:78` use `as` for CSV
      file naming.
    items:
      type: object
      required:
        - series
      properties:
        series:
          type: string
          description: |
            Node id (or wildcard) to retain as a result series. DTO source:
            `OutputDto.Series`. Consumer: `RunArtifactWriter.cs:119` series resolution;
            `TelemetryBundleBuilder.cs:290`; `RunArtifactReader.cs:81` alias-map
            construction.
          examples:
            - "demand"
            - "served"
            - "*"

        exclude:
          type: array
          description: |
            Optional list of series patterns to skip when expanding a wildcard `series`.
            DTO source: `OutputDto.Exclude`. Consumer: Sim's `SimModelBuilder`
            output-expansion (when wildcards are resolved against the node set).
          items:
            type: string

        as:
          type: string
          description: |
            Optional output filename. Presence opts the series in for CSV export.
            Auto-added outputs (e.g. semantics-derived pins) emit no `as` field —
            ratified Q3/A in m-E24-01: `as` is **optional**. DTO source: `OutputDto.As`
            (`string?`). Consumer: `src/FlowTime.TimeMachine/TelemetryBundleBuilder.cs:279`
            and `src/FlowTime.TimeMachine/Capture/RunArtifactReader.cs:78` use it as
            the on-disk file name.
          pattern: "^[a-zA-Z0-9_-]+\\.(csv|txt)$"
          examples:
            - "demand.csv"
            - "served.csv"
            - "metrics.csv"

      additionalProperties: false

  classes:
    type: array
    description: |
      Optional set of flow classes; when present, traffic arrivals must declare
      `classId`. DTO source: `ModelDto.Classes` (`ClassDto`,
      `src/FlowTime.Contracts/Dtos/ModelDtos.cs:84`). Consumer:
      `src/FlowTime.Core/Compiler/ModelCompiler.cs:131` propagates the list onto the
      compiled model; downstream class-aware evaluators read it.
      `minItems: 1` retained per m-E24-01 inventory; the empty-list emitter guard
      lands in m-E24-04.
    minItems: 1
    items:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          pattern: "^[A-Za-z0-9_-]+$"
          description: |
            Class identifier referenced by traffic definitions. DTO source: `ClassDto.Id`.
            Consumer: `src/FlowTime.Core/Artifacts/ClassAssignmentMapBuilder.cs:16`
            iterates `model.Traffic.Arrivals` and resolves `classId` to a `ClassDto`.
          examples:
            - "Order"
            - "Refund"
            - "Invoice"
        displayName:
          type: string
          description: |
            Human-readable class name for UI surfaces. DTO source:
            `ClassDto.DisplayName`. Consumer: UI layers reading the compiled model
            (no Engine runtime consumer).
          examples:
            - "Order Flow"
            - "Refund Flow"
        description:
          type: string
          description: |
            Optional class description. DTO source: `ClassDto.Description`.
            Consumer: UI display.
      additionalProperties: false

  traffic:
    type: object
    description: |
      Optional traffic definitions, including arrivals per class. DTO source:
      `ModelDto.Traffic` (`TrafficDto`, `src/FlowTime.Contracts/Dtos/ModelDtos.cs:91`).
      Consumer: `src/FlowTime.Core/Compiler/ModelCompiler.cs:132` propagates the
      block; `src/FlowTime.Core/Artifacts/ClassAssignmentMapBuilder.cs:11-16` builds
      the class-assignment map.
    properties:
      arrivals:
        type: array
        description: |
          Arrival rows. DTO source: `TrafficDto.Arrivals` (`ArrivalDto`,
          `ModelDtos.cs:96`). Consumer: `ClassAssignmentMapBuilder.cs:16` materializes
          per-class assignment vectors.
        minItems: 1
        items:
          type: object
          required:
            - nodeId
            - pattern
          properties:
            nodeId:
              type: string
              description: |
                Target node receiving these arrivals. DTO source: `ArrivalDto.NodeId`.
                Consumer: `ClassAssignmentMapBuilder.cs:16` per-arrival materialization.
            classId:
              type: string
              description: |
                Class identifier (required when `classes` is declared on the model).
                DTO source: `ArrivalDto.ClassId` (nullable). Consumer:
                `ClassAssignmentMapBuilder.cs:16` resolves the class binding.
            pattern:
              type: object
              description: |
                Arrival pattern descriptor. DTO source: `ArrivalDto.Pattern`
                (`ArrivalPatternDto`, `ModelDtos.cs:103`). Consumer:
                `ClassAssignmentMapBuilder.cs:16` materialization.
              required:
                - kind
              properties:
                kind:
                  type: string
                  enum:
                    - constant
                    - poisson
                  description: |
                    Arrival pattern kind. DTO source: `ArrivalPatternDto.Kind`.
                    Consumer: `ClassAssignmentMapBuilder.cs:16` switches on this.
                ratePerBin:
                  type: number
                  description: |
                    Arrivals per bin for constant patterns. DTO source:
                    `ArrivalPatternDto.RatePerBin`. Consumer:
                    `ClassAssignmentMapBuilder.cs:16` per-bin rate emission.
                rate:
                  type: number
                  description: |
                    Continuous-time arrival rate. DTO source:
                    `ArrivalPatternDto.Rate`. Consumer:
                    `ClassAssignmentMapBuilder.cs:16` rate emission.
              additionalProperties: true
          additionalProperties: false
    additionalProperties: false

  rng:
    type: object
    description: |
      Optional random number generator configuration. DTO source: `ModelDto.Rng`
      (`RngDto`, `src/FlowTime.Contracts/Dtos/ModelDtos.cs:11`). Consumer:
      `src/FlowTime.TimeMachine/Orchestration/RunOrchestrationService.cs:364-365`
      reads `kind`/`seed` for the input-hash and run identification;
      `src/FlowTime.Core/Pmf/PmfCompiler.cs:145` samples PMF values via
      `rng.NextDouble()`. The Engine treats this block as descriptive — Sim does the
      sampling.
    properties:
      kind:
        type: string
        # rule from ModelDtos.cs:13 — added m-E23-01
        default: pcg32
        description: |
          RNG algorithm name. DTO source: `RngDto.Kind` (default `"pcg32"`).
          Consumer: `RunOrchestrationService.cs:364`, `:572-577` (validation gate).
        enum:
          - pcg32
          - mt19937
          - xoshiro256
        examples:
          - "pcg32"

      seed:
        type: integer
        description: |
          Random seed for deterministic execution. DTO source: `RngDto.Seed`.
          Consumer: `RunOrchestrationService.cs:365`, `:377` (input-hash key
          contribution).
        minimum: 0
        maximum: 2147483647
        examples:
          - 12345
          - 42
          - 987654321

    additionalProperties: false

  provenance:
    type: object
    description: |
      Provenance metadata for traceability and reproducibility. Forensic data — no
      Engine runtime consumer reads it during evaluation. Sim emits it via
      `src/FlowTime.Sim.Core/Templates/SimModelBuilder.cs:40` (`BuildProvenance`).
      The shape is the seven-field nested camelCase form ratified in m-E24-01 (Q5/A4):
      `generator`, `generatedAt`, `templateId`, `templateVersion`, `mode`, `modelId`,
      `parameters`. `source` was collapsed into `generator`; `schemaVersion` is
      carried on the root, never duplicated here. DTO source: `ModelDto.Provenance`
      (`ProvenanceDto`, `src/FlowTime.Contracts/Dtos/ModelDtos.cs:238`).
    additionalProperties: false
    properties:
      generator:
        type: string
        description: |
          Producing system identifier (e.g. `"flowtime-sim"`). Replaces the prior
          `source` + `generator` duplicate pair. DTO source: `ProvenanceDto.Generator`.
          Consumer: `src/FlowTime.Sim.Service/Program.cs:1102` reads
          `model.Provenance` for downstream telemetry-manifest construction.
        examples:
          - "flowtime-sim"
          - "ui-builder"

      generatedAt:
        type: string
        format: date-time
        description: |
          ISO-8601 UTC timestamp at which the model was rendered from its template.
          DTO source: `ProvenanceDto.GeneratedAt`. Consumer:
          `src/FlowTime.Sim.Service/Program.cs:1102` reads the provenance block for
          telemetry-manifest construction.
        examples:
          - "2026-04-25T12:00:00Z"

      templateId:
        type: string
        description: |
          Template identifier (e.g. `"transportation-basic"`). Enables template-level
          regeneration and lookup. DTO source: `ProvenanceDto.TemplateId`. Consumer:
          `src/FlowTime.Sim.Service/Program.cs:1102` and downstream telemetry-manifest
          provenance.
        examples:
          - "it-system-microservices"
          - "manufacturing-line"
          - "supply-chain-multi-tier"

      templateVersion:
        type: string
        description: |
          Template version at render time. Enables version-pinned regeneration. DTO
          source: `ProvenanceDto.TemplateVersion`. Consumer:
          `src/FlowTime.Sim.Service/Program.cs:1102`.
        examples:
          - "1.0"
          - "2.1.0"

      mode:
        type: string
        description: |
          Template mode — `"simulation"` or `"telemetry"`. Survives here because it is
          a model-generation input, not a model-runtime field. DTO source:
          `ProvenanceDto.Mode`. Consumer: `src/FlowTime.Sim.Service/Program.cs:1102`.
        enum:
          - simulation
          - telemetry

      modelId:
        type: string
        description: |
          Stable identifier for this rendered model. Distinguishes two runs of the
          same template with different parameter values. DTO source:
          `ProvenanceDto.ModelId`. Consumer: `src/FlowTime.Sim.Service/Program.cs:1102`
          and downstream lookup by content hash.
        examples:
          - "model_20250925T120000Z_abc123def"
          - "sha256:0123456789abcdef..."

      parameters:
        type: object
        description: |
          Template parameter values at render time, serialized as a nested map. Values
          are forensic data, not a typed contract — `additionalProperties: true`.
          DTO source: `ProvenanceDto.Parameters` (`Dictionary<string, object?>?`).
          Consumer: `src/FlowTime.Sim.Service/Program.cs:1102` reads the block for
          telemetry-manifest construction; not consumed by the Engine runtime.
        additionalProperties: true
        examples:
          - bins: 12
            binSize: 1
            binUnit: hours
            loadBalancerCapacity: 300

additionalProperties: false

$defs:
  dispatchSchedule:
    type: object
    description: |
      Optional schedule controlling when ServiceWithBuffer nodes release flow.
      DTO source: `DispatchScheduleDto` (`src/FlowTime.Contracts/Dtos/ModelDtos.cs:222`).
      Consumer: `src/FlowTime.Core/Models/ModelParser.cs:512-519` reads
      `periodBins`/`phaseOffset`/`capacitySeries` to construct the
      `DispatchScheduleConfig` passed into the `ServiceWithBufferNode`.
    properties:
      kind:
        type: string
        enum:
          - time-based
        default: time-based
        description: |
          Schedule type (currently only `time-based`). DTO source:
          `DispatchScheduleDto.Kind`. Consumer: validation surface (no runtime
          branching today).
      periodBins:
        type: integer
        minimum: 1
        description: |
          Number of bins between dispatch events. DTO source:
          `DispatchScheduleDto.PeriodBins`. Consumer:
          `src/FlowTime.Core/Models/ModelParser.cs:519` (`DispatchScheduleConfig`
          period parameter).
      phaseOffset:
        type: integer
        # rule from ModelParser.cs:518 — added m-E23-01
        default: 0
        description: |
          Bin offset that determines the first dispatch bin (0-indexed, modulo
          period). DTO source: `DispatchScheduleDto.PhaseOffset`. Consumer:
          `src/FlowTime.Core/Models/ModelParser.cs:518` (`DispatchScheduleConfig`
          phase parameter).
      capacitySeries:
        type: string
        description: |
          Optional node id containing per-bin dispatch capacity overrides. DTO source:
          `DispatchScheduleDto.CapacitySeries`. Consumer:
          `src/FlowTime.Core/Models/ModelParser.cs:513-516` resolves the id to a
          `NodeId`.
    required:
      - periodBins
    additionalProperties: false

# Cross-block constraint: when `classes` is present, every traffic arrival must
# declare `classId`. Consumer: same validator that runs the rest of this schema —
# `src/FlowTime.Core/Models/ModelSchemaValidator.cs`.
allOf:
  - if:
      required:
        - classes
      properties:
        classes:
          type: array
          minItems: 1
    then:
      properties:
        traffic:
          properties:
            arrivals:
              items:
                required:
                  - classId

# Example valid models demonstrating schema capabilities. These exercise the unified
# camelCase shape post-m-E24-02 (no `window`, no top-level `mode`/`generator`/`metadata`;
# nested camelCase provenance).
examples:
  # Minimal model with constant and expression nodes
  - schemaVersion: 1
    grid:
      bins: 4
      binSize: 1
      binUnit: hours
    nodes:
      - id: demand
        kind: const
        values: [100, 120, 150, 130]
      - id: served
        kind: expr
        expr: "demand * 0.8"

  # Complete model with all node types and an RNG seed
  - schemaVersion: 1
    grid:
      bins: 8
      binSize: 1
      binUnit: hours
    nodes:
      - id: demand
        kind: const
        values: [100, 120, 150, 180, 160, 140, 110, 100]
      - id: capacity
        kind: const
        values: [200, 200, 200, 200, 200, 200, 200, 200]
      - id: failures
        kind: pmf
        pmf:
          values: [0, 1, 2]
          probabilities: [0.8, 0.15, 0.05]
      - id: effective_capacity
        kind: expr
        expr: "capacity - failures"
      - id: served
        kind: expr
        expr: "MIN(demand, effective_capacity)"
      - id: utilization
        kind: expr
        expr: "served / capacity * 100"
    outputs:
      - series: served
        as: served.csv
      - series: utilization
        as: utilization.csv
    rng:
      kind: pcg32
      seed: 42

  # Model with embedded provenance (template-generated). camelCase keys; nested
  # parameters map; no `source`, no duplicated `schemaVersion`.
  - schemaVersion: 1
    provenance:
      generator: "flowtime-sim"
      generatedAt: "2026-04-25T12:00:00Z"
      templateId: it-system-microservices
      templateVersion: "1.0"
      mode: simulation
      modelId: "sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      parameters:
        bins: 12
        binSize: 1
        binUnit: hours
        loadBalancerCapacity: 300
        replicaCount: 3
    grid:
      bins: 12
      binSize: 1
      binUnit: hours
    nodes:
      - id: incoming_requests
        kind: const
        values: [100, 120, 150, 180, 200, 220, 200, 180, 150, 120, 100, 90]
      - id: capacity
        kind: const
        values: [300, 300, 300, 300, 300, 300, 300, 300, 300, 300, 300, 300]
      - id: served
        kind: expr
        expr: "MIN(incoming_requests, capacity)"
    outputs:
      - series: served
        as: served.csv

  # Auto-added outputs (no `as` — pinning only, no CSV export)
  - schemaVersion: 1
    grid:
      bins: 4
      binSize: 1
      binUnit: hours
    nodes:
      - id: demand
        kind: const
        values: [100, 120, 150, 130]
    outputs:
      - series: demand   # pinned only; no CSV file produced

  # Model with a serviceWithBuffer queue
  - schemaVersion: 1
    grid:
      bins: 24
      binSize: 1
      binUnit: hours
    nodes:
      - id: arrivals
        kind: const
        values:
          [
            100, 120, 130, 140, 150, 160, 170, 180,
            190, 180, 170, 160, 150, 140, 130, 120,
            110, 100, 90, 80, 70, 60, 50, 40
          ]
      - id: capacity
        kind: const
        values:
          [
            150, 150, 150, 150, 150, 150, 150, 150,
            150, 150, 150, 150, 150, 150, 150, 150,
            150, 150, 150, 150, 150, 150, 150, 150
          ]
      - id: served
        kind: expr
        expr: "MIN(arrivals, capacity)"
      - id: backlog_queue
        kind: serviceWithBuffer
        inflow: arrivals
        outflow: served
    outputs:
      - series: served
        as: served.csv
      - series: backlog_queue
        as: backlog_queue.csv

# Notes
notes:
  validation_rules: |
    Adjunct semantic validation performed by FlowTime Engine beyond declarative schema:

    1. Node ID Uniqueness: All node IDs must be unique across the model.
    2. Const Node Length: `values` array length must equal `grid.bins` exactly.
    3. PMF Probabilities: Must sum to 1.0 (tolerance ±0.0001).
    4. Expression References: All node IDs in `expr` strings must exist.
    5. Dependency Order: No circular dependencies except through SHIFT.
    6. Output References: All `series` values must reference existing node IDs.

    Schema validates structural correctness; `ModelSchemaValidator` runs adjunct
    semantic checks (e.g. `ValidateClassReferences`).

  expression_syntax: |
    Supported expression operators and functions:

    Arithmetic: + - * /

    Functions:
      MIN(a, b)        - Minimum of two values
      MAX(a, b)        - Maximum of two values
      SHIFT(series, n) - Time-shifted reference (lag n bins)
      ABS(a)           - Absolute value
      SQRT(a)          - Square root
      POW(a, b)        - Power (a^b)

    References: Use node IDs directly (e.g., demand, capacity).
    Literals: Numeric constants (e.g., 100, 0.5, -10).

  time_unit_conversion: |
    Engine internal conversion to minutes:
    minutes → × 1
    hours   → × 60
    days    → × 1440
    weeks   → × 10080

  design_rationale: |
    Key design decisions (E-24 epic):

    1. Unified post-substitution model: one C# type (`ModelDto`), one schema, one
       validator. The previous `SimModelArtifact` / `ModelDefinition` split was
       accidental drift; m-E24-02 collapsed it.

    2. camelCase everywhere: no snake_case anywhere. The provenance block's
       previously snake_cased fields were renamed to camelCase in m-E24-03 — see
       `work/epics/E-24-schema-alignment/m-E24-03-schema-unification.md` for the
       per-field rename list.

    3. Schema declares only consumed fields (ADR-E-24-03): no decorative pass-through.
       Sim's prior `window` / top-level `mode` / `generator` / `metadata` had no
       Engine consumer and were dropped in m-E24-02.

    4. `outputs[].as` optional (Q3): presence means "also export this series as CSV";
       auto-added pins (e.g. `EnsureSemanticsOutputs`) emit no `as`.

    5. `nodes[].source` not declared (Q4): no Engine consumer until E-15 Telemetry
       Ingestion lands. E-15 will add the schema declaration and the consumer
       coherently.

    6. `provenance` is nested (Q5/A4): seven camelCase fields with `parameters` as a
       nested permissive map. `source` collapsed into `generator`; `schemaVersion`
       lives only at the root.

