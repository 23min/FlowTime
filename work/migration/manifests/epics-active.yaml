    id: M-043
    frontmatter:
      title: Heatmap View
      status: done
      parent: E-21
    body: |
      **Created:** 2026-04-23
      **Started:** 2026-04-23
      **Completed:** 2026-04-24
      ## Goal

      Deliver a nodes-x-bins heatmap view as a **sibling of topology** under `/time-travel/topology`, sharing the toolbar, class filter, metric selector, timeline scrubber, workbench sidebar, and pin state. Heatmap reuses the existing `GET /v1/runs/{runId}/state_window` endpoint — **zero backend changes**. Introduce a typed `ViewSwitcher` component, a shared view-state store that both views consume, and a shared full-window color-scale normalization so "bright red at (N, T)" on the heatmap matches "bright red on node N" on topology when the scrubber is at bin T.

      ## Context

      E-21's first five milestones delivered the workbench paradigm (M-038 foundation + click-to-pin cards), the metric selector + edge cards + class filter (M-039), and the `/analysis` analysis surfaces (M-040 sweep/sensitivity, M-041 goal-seek, M-042 optimize). What remains on the "views around the data" side of E-21 is:

      1. A second view of the same model — the heatmap — that reveals temporal patterns a single-bin topology snapshot cannot (a node that is fine in bins 1–4 but saturated in bins 5–8 is invisible on topology; the heatmap makes that obvious).
      2. A reusable view-switcher shape so later views (decomposition, comparison, flow-balance — all out of E-21 scope) can slot in without structural refactoring.

      The heatmap's data need (`state_window` per-node per-bin series) is already served by the Engine API. `ui/src/lib/api/flowtime.ts:101` already exposes `getStateWindow(runId, startBin, endBin)`. The topology page (`ui/src/routes/time-travel/topology/+page.svelte`) already calls it to populate sparklines. The heatmap calls it once per scenario, identically.

      ### Design decisions settled at planning (2026-04-23 Q&A)

      The 14-question Q&A on 2026-04-23 locked every design decision below. The key shape:

      - **View location (Q1):** Heatmap is a sibling of topology under `/time-travel/topology`, behind a view switcher on the canvas. Not an `/analysis` tab. Not its own route.
      - **Workbench integration (Q2):** Heatmap replaces the **canvas** when selected; toolbar + scrubber + workbench sidebar persist unchanged across view switches. Pin state and scrubber position survive view switches in both directions.
      - **Shared normalization (Q3):** Shared full-window color scale with 99th-percentile clipping. **Topology's per-bin normalization changes to match** — this is explicitly a cross-view parity change, captured under ADR-m-E21-06-02 below.
      - **Axis orientation (Q4):** Nodes as rows (Y, labels on left), bins as columns (X, left-to-right).
      - **View switcher (Q5, Q13):** Horizontal tabs above the canvas (`[ Topology | Heatmap ]`), shadcn-style underline, `Alt+1` / `Alt+2` shortcuts. Typed `<ViewSwitcher views={[...]} active={view}>` component with inline view array on the topology page — **no manifest registry, no Svelte context API**. Captured under ADR-m-E21-06-01.
      - **Class filter (Q6):** Full parity with topology — hides rows AND restricts metric computation AND domain computation. Adds a **row-stability toggle** that dims filtered rows in place (off by default).
      - **Row sort (Q7):** Topological order is the default; modes = topological / node id / max desc / mean desc / variance desc. Pin position is natural within the active sort; the pin glyph (AC10) is the pinned-row indicator. (Amended mid-implementation 2026-04-23 — see Confirmations item #5 below: the original "pinned-first modifier always-on" language was dropped in favor of pin-agnostic sort.)
      - **Cell states (Q8):** Three states — observed (colored), no-data-for-bin (neutral grey + subtle hatch), metric-undefined-for-node (row-level muted). Tooltip always disambiguates.
      - **Scrubber coupling (Q9):** Two-way. Scrubber position highlights the current-bin column in the heatmap; clicking a cell jumps the scrubber and pins the node.
      - **Pinned row markers (Q10):** Pin glyph in the row-label gutter, click-to-unpin. (Amended 2026-04-23: the glyph is the sole pinned-row indicator — there is no positional float; rows keep their natural sort position.)
      - **Bin-axis labels (Q11):** Sparse human time labels on the top axis; stride chosen by column pixel width × bin size. Absolute time when `StateWindowResponse.timestampsUtc` is populated (backend sends per-bin wall-clock timestamps), offset-from-start otherwise. Tooltip always shows both bin index and time.
      - **Accessibility baseline (Q12):** Keyboard nav, ARIA grid structure, focus ring, tooltip-on-focus, one keyboard Playwright spec. Pattern encoding / high-contrast / screen-reader polish deferred to M-045.
      - **Testing (Q14):** 13 Playwright critical-path specs + 5 vitest pure-logic suites.
      - **Node-mode toggle (Q15, added 2026-04-23 after Q14):** Shared toolbar toggle `[ Operational | Full ]` controlling the `mode` parameter on `GET /v1/runs/{runId}/state_window`. Operational (default) hides `expr`/`const`/`pmf` computed nodes — matches the Blazor UI's "operational nodes" toggle. Full exposes them; they render as row-level-muted rows under operational metrics (utilization, queue depth) per AC4, and as coloured rows under metrics that are defined for them (value / output). Toggle state lives in the shared view-state store and applies to **both** topology and heatmap (re-fetches `state_window` on change).

      ### API contract

      **GET /v1/runs/{runId}/state_window** — `src/FlowTime.API/Program.cs:1028`

      Query: `startBin`, `endBin` (required); optional `mode` (`operational` default, `full` available), `edgeIds`, `edgeMetrics`, `classIds`. Heatmap calls this **once per scenario** with `startBin=0`, `endBin=binCount-1`, no edge/class filter in the request (class filter is applied client-side to allow the toggle-in-place behaviour from Q6). `mode` is passed from the shared view-state store (AC15 node-mode toggle) and drives which node kinds appear in the response. Response is the same `StateWindowResponse` shape topology already consumes. No new endpoints, no additive response fields, no carve-outs needed.

      Client surface: `getStateWindow` gains an `mode?: 'operational' | 'full'` parameter (default `operational`, backward-compatible for existing call sites). The heatmap and topology both read `mode` from the shared store and pass it through.

      ## Acceptance Criteria

      1. **View switcher renders above the canvas.** `/time-travel/topology` shows a horizontal tab bar `[ Topology | Heatmap ]` above the DAG/heatmap area, implemented as a new `<ViewSwitcher views={[...]} active={view} onChange={...}>` component at `ui/src/lib/components/view-switcher.svelte`. Views are listed inline in the route's `<script>` block (not via a manifest file). `Alt+1` selects Topology, `Alt+2` selects Heatmap. Active view is visually indicated with a thin underline in shadcn style. Initial view is Topology on first load; active view is **not** persisted across page reloads in this milestone. (Q1, Q5, Q13)

      2. **Heatmap replaces the canvas only.** When Heatmap is active, the DAG area is replaced by the heatmap grid. The toolbar (run selector, metric selector, class filter, view switcher), timeline scrubber, and workbench panel all persist unchanged. Splitter ratio + workbench pins + scrubber position are preserved across view switches. Switching back to Topology restores the DAG with no loss of state. (Q2)

      3. **Heatmap grid renders correct dimensions.** For a scenario with `N` nodes and `B` bins, the grid renders `N` rows and `B` columns. Row labels (node ids) appear on the left in the active sort order; bin-axis labels appear on the top with a sparse stride chosen by a pure helper (`pickBinLabelStride(columnPixelWidth, binSize, binUnit)`). When the run response carries `StateWindowResponse.timestampsUtc`, bin labels are absolute times (`09:00`, `Mon 12:00`); otherwise they are offset-from-start (`+00:00`, `+03:30`). Tooltip on any cell shows both `Bin N · <time>`. **Horizontal fit contract (hard invariant):** the rendered SVG width never exceeds the container width. Two mechanisms:
          - **Auto-fit (default).** When the natural width at `CELL_W=18` would exceed the container (long runs — e.g. 288 bins on a narrow canvas), `CELL_W` auto-compresses to `max(1, min(18, (containerWidth − ROW_LABEL_W − RIGHT_MARGIN) / binCount))`. Uses fractional pixels (SVG handles sub-pixel widths fine) so cells fill the available width exactly; integer flooring left large right-side gaps at high bin counts. Reserves a small right-side margin (~4 px) so the rightmost cell doesn't sit flush with a scrollbar or border. Floors at 1 px so wider-than-container cases always fit; degraded cases show a density strip instead of scrolling.
          - **Fit-to-width toggle** (shared-toolbar checkbox, persisted in `localStorage` as `ft.heatmap.fitWidth`, default off). Forces compression even when content would fit naturally — useful when a user wants a consistent compressed look across runs of varied size.
          - Effective `shouldFit = fitWidth || (naturalWidth > containerWidth)`. When `shouldFit` is false, cells render at the default 18 px.

          Sliding-window scrubber (Blazor-parity zoom-and-pan for per-cell fidelity at wide runs) is deferred to a separate milestone (see `work/gaps.md`). (Q4, Q11; fit-to-width + auto-fit amended 2026-04-24)

      4. **Three cell states render correctly with disambiguating tooltips.**
          - **Observed** (including `0`): cell fill from the shared color scale. Tooltip: `<metric-label>: <value>` (e.g. `Utilization: 0.34` or `Utilization: 0 (observed)` for zeroes).
          - **No data for bin**: neutral grey fill with a subtle diagonal-hatch pattern (distinct from any color on the scale; excluded from the normalization domain). Tooltip: `<metric-label>: — (no data for this bin)`.
          - **Metric undefined for node**: if `state_window` returns no value for this metric across **all** bins of this node, render the **entire row** uniformly muted (row-level optimization — not per-cell hatch). If undefined for only some bins, collapse to the no-data rendering per cell. Tooltip for the muted-row state: `<metric-label>: not defined for this node`. The classifier keys are **per-(node, metric)** — a `const` node has no `utilization` metric and therefore renders as a row-level-muted row under the utilization metric, but may render normally under a `value` metric defined for it. When the node-mode toggle (AC15) is set to `full`, `expr`/`const`/`pmf` computed nodes appear as rows and typically surface as row-level-muted under operational metrics (utilization, queue depth).
          - Click on a non-observed cell is a no-op (no pin, no scrubber jump). Click on a row label is **not** a click-to-pin target; cells are the pinning surface (clicking the pin glyph in the gutter is the un-pin surface, per AC10). (Q8)

      5. **Shared color-scale normalization (full window, 99p-clipped, excluding non-observed and filtered).** Both topology and heatmap compute metric color with the same domain: `[min, 99th-percentile]` over the **full-window** cell set for the current metric and the current class filter, excluding cells in the no-data or metric-undefined states. Topology's previous per-bin normalization is replaced by this shared-window normalization; the topology-at-bin-T color of node N equals the heatmap cell color at (N, T). A shared helper `computeSharedColorDomain(cells, { classFilter, excludeNonObserved: true, clipPercentile: 99 })` owns this computation; topology's `buildMetricMapForDefFiltered` (and any downstream color mapper) is refactored to consume it rather than computing a per-bin domain. Fixed per-metric ranges and per-row normalization are **deferred** (tracked in `work/gaps.md`). (Q3, ADR-m-E21-06-02)

      6. **Row sort modes implemented; sort is pin-agnostic.** Sort modes shipped: **topological (default)** / node id (alphabetical) / max desc / mean desc / variance desc. Pinned rows sort by the active mode in their natural position — they are **not** floated to the top; the pin glyph (AC10) is the sole pinned-row indicator. Sort control appears in the heatmap toolbar (compact dropdown or segmented control). Topological order is derived from the graph's parent/child edges (same ordering topology uses as its natural top-to-bottom walk); the comparator falls back to node-id for topologically-equivalent nodes (deterministic tie-break). Changing the metric preserves the active sort mode and recomputes values (value-based modes reorder accordingly). Current-bin-value and trend/slope modes are **deferred** (tracked in `work/gaps.md`). (Q7; amended 2026-04-23 — see Confirmations item #5: original pinned-first float dropped in favor of pin-agnostic sort.)

      7. **Class filter with optional row-stability toggle.** Class filter (already present on the topology toolbar) hides heatmap rows by default, exactly as it hides topology nodes. Normalization domain recomputes over the filtered cell set. An empty-state message (`No nodes match the current class filter`) renders when the filter collapses the grid to zero rows. A new **row-stability toggle** (compact control in the heatmap toolbar, label "Keep filtered rows") is off by default; when **on**, filtered rows remain in the grid as dimmed placeholders: muted / italic row label, low-alpha grey fill across all cells (or subtle hatch — whichever reads cleaner against the active theme), excluded from the normalization domain, click on a dimmed cell is a no-op with tooltip `Node filtered by class`, filtered rows sink to the bottom of the grid (and are sorted independently by the active sort within the dimmed block). The toggle persists as a user preference in `localStorage` (`ft.heatmap.rowStability`). Pin state for filtered nodes persists across filter-toggle changes. The **node-mode toggle** (AC15) is a sibling toolbar control that governs a different dimension (node kind, not class); the two filters compose — a class-filtered row in `full` mode is still class-filtered. (Q6)

      8. **Click-a-cell pins node and jumps scrubber.** Click on an observed cell at (N, T) pins node N in the workbench and moves the scrubber to bin T. Both effects happen together (single click, atomic visually). Already-pinned → click → stays pinned (no unpin via cell click; unpin is via the pin glyph in the row gutter, AC10, or via the workbench card's existing close button). Scrubber-jump triggers the existing `loadBin(T)` flow, which refreshes topology's `stateNodes` and the workbench card's current-bin metrics — view-specific side effects (topology re-color, card refresh) happen automatically because they subscribe to `currentBin`. (Q2, Q9)

      9. **Scrubber-to-column highlight (two-way coupling).** Moving the scrubber draws a solid turquoise bar in the top-axis gutter above the current bin's column — a 3 px-high rectangle, one cell wide, using chrome-scale token `--ft-highlight` (distinct from `--ft-viz-teal` so it doesn't compete with data cells). The bar sits between the bin-axis labels and the first row; cell fills are left undisturbed. Updates in real time as the scrubber drags (no full grid re-render — a single SVG attribute update on one pre-rendered overlay rect). Clicking a cell jumps the scrubber, which automatically moves the highlight. (Q9; updated 2026-04-23 — reduced from a full-column outline to a top-bar marker per user UX feedback that full-column rendering competed with data and was partially obscured by cell fills.)

      10. **Pinned row glyph in the label gutter.** Pinned rows render a small pin/bookmark glyph next to their label in the row-label gutter (chrome color). Clicking the glyph unpins the node. The glyph is keyboard-focusable and Tab-reachable; Enter / Space on the glyph unpins. The pin glyph is the **only** pinned-row indicator; pinned rows keep their natural sort position (per revised AC6). (Q10; amended 2026-04-23 — see Confirmations item #5.)

      11. **Bin-axis labels with hover parity.** Top axis renders sparse human time labels with auto-chosen stride (`pickBinLabelStride`): labels step so that every label is clearly readable at the current column pixel width, and the stride uses sensible round units given `binSize × binUnit` (e.g. hourly ticks for a 5-minute grid; daily ticks for an hourly grid). Thin 1–2px tick marks render between labels. When `StateWindowResponse.timestampsUtc` is populated (`ui/src/lib/api/types.ts:246` — the backend sends per-bin wall-clock timestamps), labels are absolute (`09:00`, `Mon 12:00`); otherwise offset-from-start (`+00:00`, `+03:30`). Tooltip on any cell always shows **both** bin index and time, e.g. `Bin 42 · +03:30` or `Bin 42 · 12:30`. There is no `RunGrid.startTime` field on the current API types — `timestampsUtc` is the authoritative per-bin time source. (Q11)

      12. **Accessibility baseline — keyboard nav + ARIA grid + focus ring + tooltip-on-focus.**
          - **Keyboard nav:** Tab enters the grid (focus lands on the first cell of the first row in current sort order); arrow keys move focus between cells, respecting the active sort + filter; Enter / Space on an observed cell triggers the pin + scrubber-jump (same semantics as mouse click); Escape returns focus to the heatmap toolbar.
          - **ARIA structure:** `role="grid"` on the container, `role="row"` on rows, `role="gridcell"` on cells with `aria-label` containing node id + bin time + metric + value, or state (`no data for this bin`, `metric not defined for this node`, `filtered by class`).
          - **Focus ring:** clear visible focus indicator on the currently-focused cell; also visible on the pin glyph (AC10) when Tab lands there. The cell indicator is implemented as a custom SVG overlay rect (turquoise `--ft-highlight`, 2 px stroke) keyed to a **persistent `selectedCell` state on the shared view-state store** — not DOM focus — so the indicator survives window blur and keeps pointing at the last-focused cell until another cell is clicked or Tab/arrow-navigated to. The browser-default SVG `<g>` focus outline is suppressed via `outline: none` (it renders as an ugly beveled rectangle in Chromium and doesn't respect the `outline` token). The pin glyph still uses the browser's normal focus ring — it's a `<button>` element where `outline` works correctly.
          - **Workbench-card cross-link:** when `viewState.selectedCell.nodeId` matches a pinned card's `nodeId`, the card's title renders in the turquoise selection color (`--ft-highlight`), visually tying the selected tile to its card. `WorkbenchCard` takes a `selected?: boolean` prop; the route wires it off the shared `selectedCell`. Selection is set by **every pin gesture across both views** — heatmap cell click (AC8), topology node click (dag-map `onNodeClick`) — and cleared by every unpin gesture (heatmap pin glyph, topology re-click-to-toggle, card close button) via the shared `unpinAndClearSelection` helper. **Card ordering follows the active sort in BOTH views.** Pinned node cards use the shared `viewState.sortMode` (topological / id / max / mean / variance) regardless of whether the active view is heatmap or topology — sort is a graph-wide preference, not a heatmap-only knob. The sort dropdown only surfaces in the heatmap toolbar, but its effect carries over: pick "topological" in heatmap → switch to topology → cards stay in topological order. Edge cards unaffected (no sort equivalent for edges).
          - **Tooltip triggers on keyboard focus** in addition to mouse hover.
          - **One Playwright spec** proves the keyboard path end-to-end (AC14 spec #12).
          - **Homework check during implementation**: confirm whether the topology page today has comparable keyboard nav + ARIA. If it does, match its bar. If it does not, M-043 sets the bar going forward — record the finding in the tracking doc under a "Prior accessibility posture" note and file a gap against topology in `work/gaps.md`. Likewise confirm whether the M-039 data-viz color scales were validated for color-blind friendliness; if not, file a broader gap.
          - Pattern encoding (redundant hatch/stripe overlay for color-blind mode), high-contrast tuning, and NVDA/VoiceOver audit are **deferred to M-045**. (Q12)

      13. **Shared view-state store.** Introduce `ui/src/lib/stores/view-state.svelte.ts` exposing:
          - `selectedMetric` (already on workbench store — may be re-exposed / proxied here if the view store becomes the canonical reader)
          - `activeClasses` (currently route-local in topology — move into the view store so both views share one filter)
          - `currentBin`, `binCount`, `playing` (currently route-local — move into the view store)
          - `pinnedNodes`, `pinnedEdges` (already on workbench store — may continue to live there; view store can hold references/selectors)
          - `activeView` (`'topology'` | `'heatmap'`), `sortMode`, `rowStabilityOn`
          - `nodeMode` (`'operational'` | `'full'`, AC15) — drives the `mode` query parameter on `state_window` calls from both views

          The store is the single source of truth for what both views consume. Route `+page.svelte` becomes thin — it wires the store to the toolbar, view switcher, and active view's component. The existing `workbench` store stays authoritative for pin state; `view-state.svelte.ts` is additive. No breaking changes to `workbench.svelte.ts`'s public surface. (Q13)

      14. **Testing — 13 Playwright specs + 5 vitest pure-logic suites, every reachable branch covered.**
          - **Playwright** (live Rust engine + Svelte dev server, graceful-skip on probe, under `tests/ui/specs/svelte-heatmap.spec.ts` or extending `svelte-topology.spec.ts` — authoring choice at implementation time, but one file is fine):
              1. Loads a run and renders the grid with expected `(N nodes × B bins)` dimensions.
              2. Renders all three cell states (observed / no-data / metric-undefined) with correct disambiguating tooltips on a fixture known to exercise each state.
              3. Click-an-observed-cell pins the node in the workbench **and** moves the scrubber to that bin.
              4. Metric switch recolors cells **and** reorders rows under max-descending sort.
              5. View-switch state preservation: pin a node on topology → switch to heatmap → row is marked pinned (glyph present in the row-label gutter); row's sort position is unchanged → switch back to topology → pin is still in the workbench.
              6. Scrubber drag moves the column highlight in real time; clicking a cell jumps the scrubber and the highlight follows.
              7. Sort modes reorder rows: assert row order changes when cycling topological → node-id → max-desc → mean-desc.
              8. Class filter default = hide: rows disappear. Row-stability toggle ON = filtered rows render dimmed at the bottom with muted labels. Toggle OFF = filtered rows hidden again.
              9. Empty-state message appears when the class filter collapses the grid to zero rows.
              10. (Requirement on every spec, not a standalone test) Graceful skip when API / dev server is unavailable.
              11. **Correctness spec:** cell color matches the expected metric-value bucket for a known fixture. Assert via a `data-value-bucket` attribute on the cell (`low` / `mid` / `high` — the bucketing is a pure helper that lives alongside the color-scale code, with its own vitest coverage), **not** by parsing CSS color strings. Buckets are coarse by design; the vitest suite for `computeSharedColorDomain` + the bucket helper is what enforces normalization correctness at value level.
              12. Keyboard nav critical path — Tab into grid → arrow keys to a known cell → Enter → assert pin + scrubber jump happen (same observable effect as spec #3, different input modality).
              13. Node-mode toggle (AC15): default `operational` — grid shows N rows (service/queue/etc. only); toggle to `full` — grid row count grows to include `expr`/`const`/`pmf` nodes; under the `utilization` metric the newly-appearing computed-node rows render as row-level-muted; toggle back to `operational` — grid returns to N rows. Assert topology's visible node count matches the heatmap's row count under each toggle state (shared-state parity).
          - **Vitest pure-logic suites** (branch-covered per the hard rule):
              1. **Sort comparators** (`heatmap-sort.ts` / `.test.ts`): topological / id / max / mean / variance with **pin-agnostic sort** (pinned rows keep natural position — the pin glyph is the sole indicator). Exercises: empty input, single-node, all-equal metric values (tie-break to id), topological tie-break for siblings, and explicit "no pinned partitioning" coverage proving pinned rows do NOT float to the top.
              2. **Color-scale domain** (`shared-color-domain.ts` / `.test.ts`): shared-window 99p-clipped normalization excluding missing / undefined / filtered cells. Exercises: all-observed, mix of observed and missing, all-missing (domain is empty — caller must fall back), single-value domain (min == max), 99p edge cases (exactly 100 cells, fewer than 100 cells), class-filter exclusion.
              3. **Cell-state classifier** (`cell-state.ts` / `.test.ts`): observed (including 0) / no-data-for-bin / metric-undefined-for-node (row-level optimization). Exercises: undefined on all bins → row-level, undefined on some bins → per-cell no-data, zero value → observed.
              4. **Bin-axis label stride** (`bin-label-stride.ts` / `.test.ts`): `pickBinLabelStride(columnPixelWidth, binSize, binUnit)`. Exercises: 5-min grid wide columns → hourly ticks, 5-min grid narrow columns → larger stride, hourly grid → daily ticks, degenerate inputs (0 columns, 1 bin, huge binSize).
              5. **View-state store selectors** (`view-state.svelte.test.ts`): metric get/set, class filter add/remove/clear, scrubber set/move, pin/unpin proxies to workbench store, row-stability toggle persist, sort-mode set, active-view switch, node-mode toggle (operational ↔ full) with localStorage persistence.
          - **Branch audit** — line-by-line on the new UI + helpers, matching every reachable branch to a test, recorded in the tracking doc's Coverage Notes section (match M-042's audit structure). (Q14)

      15. **Node-mode toggle (operational / full).** A compact segmented-control toggle in the shared toolbar labelled `[ Operational | Full ]` (default `Operational`). The toggle's state lives in the shared view-state store as `nodeMode` and drives the `mode` query parameter on `GET /v1/runs/{runId}/state_window` calls from both topology and heatmap. Switching to `Full` re-fetches `state_window` with `mode=full`, which includes `expr`/`const`/`pmf` computed-node kinds in the response; switching back to `Operational` re-fetches with `mode=operational`, hiding them. Both views re-render under the new node set. Under operational metrics (utilization, queue depth), computed nodes surface as row-level-muted rows per AC4; under metrics defined for them (if any surface in the response), they colour normally. Pin state for a node that disappears when toggling to `Operational` persists in the workbench; the row simply stops rendering until the user returns to `Full`. Toggle value persists in `localStorage` (`ft.view.nodeMode`). Matches the Blazor UI's pre-existing "operational nodes" toggle — parity with that affordance is explicit. (Q15)

      ## Technical Notes

      - **Data loading.** Heatmap consumes the same `state_window` response topology already loads for sparklines (`windowNodes` in `ui/src/routes/time-travel/topology/+page.svelte:186`). No extra network call is introduced. If topology has not yet loaded `windowNodes` when the user switches to heatmap first, heatmap triggers the same load; both views then share the cached data via the view-state store.

      - **Rendering choice.** SVG. For the E-21 target scale (~20 nodes × ~100 bins = 2000 rects), SVG is well within limits. Virtualization is not in scope for this milestone. If a future real-world model exceeds ~50 nodes × ~300 bins and lag becomes visible, file a gap — do not pre-optimize.

      - **Client API change.** `getStateWindow` gains an `mode?: 'operational' | 'full'` parameter (appended to the query string when provided). Default remains `operational`. All existing call sites continue to work unchanged. Active use: both topology and heatmap call sites read `nodeMode` from the shared view-state store (AC13, AC15) and pass it through on every `state_window` fetch.

      - **Node-mode toggle placement and persistence.** A segmented-control style `[ Operational | Full ]` toggle lives in the shared toolbar on `/time-travel/topology`, next to the class filter. Persisted in `localStorage` as `ft.view.nodeMode` (default `operational`). Changing the toggle triggers a re-fetch of `state_window` — not a local re-filter — because `mode` selects which node kinds the API returns. Both topology and heatmap re-render against the fresh response. Parity target: the Blazor UI's "operational nodes" toggle; the Svelte UI has been missing this affordance.

      - **Normalization helper placement.** `computeSharedColorDomain` lives in `ui/src/lib/utils/shared-color-domain.ts` and is consumed by both views. Topology's `buildMetricMapForDefFiltered` (in `ui/src/lib/utils/metric-defs.ts`) is refactored to delegate the domain computation to this helper. The metric-to-cell-color mapper (which takes a domain + a value and returns a color token) also moves / aligns here so both views stay in sync. This is the "topology coloring behaviour changes" seam from ADR-m-E21-06-02.

      - **View switcher shape.**
          ```ts
          type View = { id: string; label: string; shortcut?: string; icon?: unknown; };
          // route usage:
          const views: View[] = [
            { id: 'topology', label: 'Topology', shortcut: 'Alt+1' },
            { id: 'heatmap',  label: 'Heatmap',  shortcut: 'Alt+2' },
          ];
          ```
          `<ViewSwitcher views={views} active={state.activeView} onChange={v => state.activeView = v} />`. No context API, no registry, no `supports(run)` predicates. Adding a future view = one inline array entry + one conditional render branch in the route.

      - **Scrubber coupling mechanics.** The column highlight is a single pre-rendered `<rect>` overlay (full grid height, 1-column wide) whose `x` attribute updates when `currentBin` changes. Zero grid re-render cost. Alternative implementation: a CSS class on the column's cells — but SVG class-toggling at scale is more expensive than a single `setAttribute` on one overlay rect. Use the overlay rect.

      - **Pin glyph.** Lucide icon (`PinIcon` or `BookmarkIcon`) rendered in the row-label gutter. Wrap in a `<button>` for keyboard focusability + click handling + accessible name (`aria-label="Unpin <node id>"`).

      - **Row-stability toggle storage key.** `ft.heatmap.rowStability` (follows the `ft.topology.split` convention already used on the topology page).

      - **Bin-label stride math.** Target ~8–12 visible labels across the typical viewport width. Pick the stride whose (`columnPixelWidth × stride`) is closest to `viewport / 10`, rounded to a "nice" multiple given `binSize × binUnit` (multiples of `60s` for seconds, multiples of `5min` / `15min` / `60min` for minutes, etc.). Helper is pure; vitest covers it.

      - **Topology homework during implementation.** Before declaring AC12 done, audit topology's current keyboard + ARIA posture. If the DAG area is not keyboard-navigable today, **don't retrofit it in this milestone** — just record the gap and match M-043's bar going forward.

      ## Out of Scope

      - **Any backend API changes.** `state_window` exists and suffices; no carve-outs needed (contrast with D-046 for M-040 and D-047 for M-041).
      - **Decomposition view, comparison view, flow-balance view.** All explicitly deferred in the E-21 epic spec; none are touched by this milestone.
      - **Pattern encoding / high-contrast / screen-reader polish / focus-indicator visual polish.** All deferred to M-045.
      - **Fixed per-metric color ranges.** Deferred (in `work/gaps.md`).
      - **Per-row color-scale normalization toggle.** Deferred (in `work/gaps.md`).
      - **Current-bin-value sort mode and trend/slope sort mode.** Deferred (in `work/gaps.md`).
      - **View-manifest registry / plug-in pattern / runtime view loading.** Deferred (in `work/gaps.md`); introduce when a third asymmetric view lands.
      - **User-configurable cell-rendering preferences** beyond the row-stability toggle.
      - **Export / snapshot functionality** (PNG / SVG export of the grid).
      - **Active-view persistence across page reloads.** Active view resets to Topology on reload. If this becomes a UX ask, extend after shipping.
      - **Heatmap virtualization / canvas rendering.** Not needed at E-21 target scale; file a gap if measured performance requires it.
      - **Edge-level heatmap** (edges × bins). Current scope is nodes × bins only; edges remain on the DAG.

      ## Dependencies

      - **M-038 Workbench Foundation** (complete) — density system, dag-map events, workbench store, pin-to-inspect.
      - **M-039 Metric Selector & Edge Cards** (complete) — metric selector, class filter, data-viz palette, timeline scrubber (the one we will share).
      - **Existing `GET /v1/runs/{runId}/state_window`** — `src/FlowTime.API/Program.cs:1028`. No changes required.
      - **Existing `flowtime.getStateWindow(...)`** — `ui/src/lib/api/flowtime.ts:101`. Gains an optional `mode` parameter; signature remains backward-compatible.
      - **Shared view-state store** — introduced in this milestone at `ui/src/lib/stores/view-state.svelte.ts`. Consumers added in this milestone: view switcher, heatmap grid, topology page (route refactor to consume the store instead of route-local `$state`).

      ## ADRs

      ### ADR-m-E21-06-01: View-switcher architecture is a typed component with inline view arrays (no registry, no context API)

      **Context.** Heatmap is the first of potentially several "views of the same model" (decomposition, comparison, flow-balance — all out of E-21 scope). There was a choice between (A) a manifest / registry file listing views with a plug-in shape, (B) a Svelte context API wrapping the active view, or (C) a typed `<ViewSwitcher>` component consuming an inline array on the parent route.

      **Decision.** Ship option (C). Views are listed inline in `/time-travel/topology/+page.svelte`; the switcher is a dumb typed component. Shared view state lives in a store (`view-state.svelte.ts`), not in a context. Adding a future view = one import + one array entry + one conditional render branch.

      **Consequences.** For 2–4 views with similar shape (all use toolbar + scrubber + workbench sidebar), this is the smallest possible shape. When a future view lands with real asymmetry (e.g. a comparison view that needs two runs + no single scrubber), the cost is graduating to a registry — tracked as a gap. No sunk cost in registry plumbing that turned out to be wrong.

      **Rejected alternatives.**
      - **Manifest / registry file.** Too much upfront indirection for two views.
      - **Svelte context API.** Adds hidden wiring; the store is more discoverable.
      - **`supports(run)` predicates / runtime view loading.** Solving a problem we don't have.

      ### ADR-m-E21-06-02: Topology color-scale normalization switches from per-bin to shared full-window 99p-clipped

      **Context.** Topology today computes its metric color domain **per bin** — every scrubber step recomputes `[min, max]` over the current bin's nodes. The heatmap needs a stable domain over the full window so that "bright red" is comparable across bins. Leaving topology per-bin and heatmap full-window would make the two views visually disagree at bin T and undermine the "same model, two views" contract.

      **Decision.** Both views adopt **shared full-window 99p-clipped normalization**, excluding cells in the no-data or metric-undefined states, and excluding cells filtered out by the active class filter. The single helper `computeSharedColorDomain` owns the computation; topology's existing mapper is refactored to delegate to it.

      **Consequences.** Topology's coloring changes visibly — a node that was "relatively hot" in bin T (because bin T's range was small) may now be muted if the full-window range is wider, and vice versa. This is the point: comparability across bins and across views is more valuable than within-bin contrast. Users who want per-bin / per-row normalization will get that as a follow-up toggle (tracked in `work/gaps.md`). The Playwright correctness spec (AC14 #11) proves the color-bucket stability; the vitest suite for `computeSharedColorDomain` proves the math.

      **Rejected alternatives.**
      - **Keep topology per-bin; let heatmap be full-window.** Breaks cross-view parity — the exact problem heatmap is supposed to solve.
      - **Make topology configurable with per-bin vs full-window vs fixed-per-metric.** Deferred. Ship one correct default first; layer toggles on after we have the default in users' hands.

      ## Confirmations at start (2026-04-23)

      Confirmed by user at `/wf-start-milestone` invocation:

      1. **ADR-m-E21-06-02 ships as a straight swap** (no `?normalization=per-bin` escape hatch). Topology's coloring visibly changes to match heatmap. Call out in milestone release notes.
      2. **Playwright #11 correctness spec uses the `data-value-bucket` assertion only.** Numeric-value correctness is enforced by the `computeSharedColorDomain` vitest suite.
      3. **AC12 homework surfaces file as separate gaps** in `work/gaps.md` rather than retrofitting topology's keyboard / ARIA posture or M-039 color-blind validation in this milestone.
      4. **Topological sort derivation:** prefer a topo-sorted list from dag-map if one is exposed; otherwise implement a small Kahn's-algorithm helper over `graph.edges` with node-id tiebreak.
      5. **Pinned-first row float removed (user decision, mid-implementation).** Pin glyph becomes the sole pinned-row indicator; row keeps its natural sort position. This is an amendment to AC6/AC10/AC14 post-start. The original Q7 / AC6 / AC10 language described a pinned-first modifier that was always-on; that contract was dropped after the UX surfaced the sort feeling "broken" (sort dropdown said "topological" but pinned rows jumped to the top regardless). Option C (no modifier at all) chosen over Option B (a toggle) because it gives the sort dropdown one unambiguous contract: the sort does exactly what the mode label says.
  - kind: milestone
    id: M-044
    frontmatter:
      title: Validation Surface (Svelte)
      status: done
      parent: E-21
    body: |
      **Created:** 2026-04-26
      **Started:** 2026-04-27
      **Completed:** 2026-04-28
      ## Goal

      Surface the per-run validation/analytics warnings that the Engine already attaches to every state-window response into the Svelte workbench, so the user sees model-level issues alongside the topology and heatmap they already inspect. The surface is read-only and consumer-side; it consumes the warnings that already arrive on `GET /v1/runs/{runId}/state_window` (the same response Svelte already requests for sparklines per M-043). There is no Svelte-side editing, no edit-time validation, no new endpoint, and no `POST /v1/run` shape change.

      ## Context

      ### Settled backend seam (decided 2026-04-26)

      After deep audit of the Blazor warning-surfacing path, the user has locked the Q1 backend-seam question to **Mirror Blazor**:

      - **Single endpoint reused:** `GET /v1/runs/{runId}/state_window` (handler at `src/FlowTime.API/Program.cs:1028`). The Svelte client already calls this endpoint for M-043 sparklines.
      - **Warnings in the response body, today:** `BuildWarnings` (`src/FlowTime.API/Services/StateQueryService.cs:4752`) merges two sources into the response's `warnings[]` array — (a) persisted `Warnings[]` from `data/runs/<runId>/run.json` (`RunManifest.Warnings`, written by `RunArtifactWriter` from tier-3 `TimeMachineValidator` analyse output) and (b) per-query analytical warnings derived inside `StateQueryService` while the window is built (e.g., stationarity, retry-budget, queue-saturation projections). `BuildEdgeWarnings` (line 4783) builds the parallel `edgeWarnings: { <edgeId>: StateWarning[] }` map from the same persisted `RunWarning.EdgeIds` field.
      - **Wire shape (what Blazor deserializes today):** `TimeTravelStateWarningDto` (`src/FlowTime.UI/Services/TimeTravelApiModels.cs:521`) — `{ code, message, severity, nodeId?, startBin?, endBin?, signal? }`. Blazor consumes this at `src/FlowTime.UI/Pages/TimeTravel/Topology.razor:175-209` (timeline-window tooltip) and `:965-1001` (inspector "Warnings" tab).
      - **Implication for Svelte:** every run already carries warnings on every `state_window` response Svelte requests. The task is purely to consume the fields that already arrive — no backend work, no new endpoint, no run-artifact persistence change.

      ### What the Svelte client deserializes today (drift to fix)

      `StateWindowResponse` in `ui/src/lib/api/types.ts:243` already declares `warnings: StateWarning[]`, but the Svelte `StateWarning` interface (line 69) is a **thinner shape** than what the API actually returns: `{ code, message, nodeId?, bins? }` — missing `severity`, `startBin`, `endBin`, `signal`, **and** the parallel `edgeWarnings` map is not declared on `StateWindowResponse` at all. The fields arrive on the wire and are silently dropped during deserialization. This milestone widens the type to mirror `TimeTravelStateWarningDto` exactly and adds the `edgeWarnings` map declaration so the data is actually reachable from Svelte components.

      ### Tier-1 / tier-2 errors do not reach this surface (matches Blazor)

      `POST /v1/run` calls `ModelSchemaValidator.Validate(cleanYaml)` first. Tier-1 (schema) and tier-2 (compile) failures **reject the run** at the API level — the user gets `400 { error: "..." }` from the run attempt, not a warnings-panel item. No run artifacts are written and no `state_window` response exists for a rejected run. Consequently, only tier-3 (analyse) warnings — the ones `RunArtifactWriter` persists into `run.json` plus the analytical warnings `StateQueryService` derives per query — ever reach this surface. Blazor behaves the same way; this milestone matches that behaviour and does not invent UX for failed runs.

      ### What exists in the Svelte workbench today

      - `/time-travel/topology` (the workbench surface). The route is structured as a single full-height flex column inside a `<main>` that sits next to the app-sidebar (the navigation rail rendered in `ui/src/routes/+layout.svelte` — Home / Time Travel / Analysis nav, shadcn collapsible-icon). The route's flex column holds, top-to-bottom: toolbar (run selector, metric selector, class filter, view switcher, node-mode toggle), view switcher, optional timeline scrubber strip, and a single `flex-1` split region whose top half is the canvas (DAG or heatmap, swapped by `<ViewSwitcher>`) and whose bottom half is the **workbench panel**. The workbench panel is the bottom region under the splitter.
      - **Workbench panel layout today** (`ui/src/routes/time-travel/topology/+page.svelte` ~line 567-600): a single `<div style="height: {100 - splitRatio}%" class="overflow-auto bg-background">` whose content is either the empty-state message (`Click a node or edge to inspect`) or a single horizontal flex row `<div class="flex gap-2 p-2 flex-wrap items-start">` of `WorkbenchCard` (pinned nodes) followed by `WorkbenchEdgeCard` (pinned edges). There is no left column or right column inside this panel today; cards just flex-wrap across the full width.
      - `ui/src/lib/api/flowtime.ts` — typed client; `getStateWindow(runId, startBin, endBin, mode?)` at line 109 is what M-043 uses. The response is typed as `StateWindowResponse`, which under-declares warnings as noted above.
      - `ui/src/lib/stores/view-state.svelte.ts` — shared view-state store. Owns `activeView`, `activeClasses`, scrubber state, sort/row-stability/fit-width/node-mode toggles, and `selectedCell: { nodeId, bin } | null`. **Pin state lives in `workbench.svelte.ts` and is exposed via proxies on the view-state store** — `pinNode(id, kind?)`, `unpinNode(id)`, `pinnedNodes`, `pinnedEdges`, `pinnedIds`, `isPinned(id)`. The pin proxies and `selectedCell` already compose: clicking a topology node calls `workbench.toggle(...)` and then `viewState.setSelectedCell(nodeId, currentBin)` so the workbench-card title cross-highlights.
      - `ui/src/lib/components/workbench-card.svelte` — per-node panel card; cross-links to selected cell via `selected` prop driven by `viewState.selectedCell?.nodeId === pin.id` (M-043 wiring).
      - No prior validation UI in Svelte.

      ### Why this milestone is unblocked now

      E-23 closed and merged 2026-04-26 — `ModelSchemaValidator` is the single validator and `TimeMachineValidator` writes tier-3 warnings into run artifacts. M-043 delivered the shared view-state store and the workbench-card cross-link convention. The merge of `milestone/m-E21-06-heatmap-view` into `epic/E-21-svelte-workbench-and-analysis` is the prerequisite to branching this milestone — handled at start-milestone time, not here.

      ### Settled scope (user-confirmed at planning, 2026-04-26)

      1. **Q1 — Backend seam: Mirror Blazor.** One consolidated view of all warnings carried in the `state_window` response. Errors-vs-warnings segregation is driven by the per-item `severity` field the API returns; tier classification is not surfaced (only tier-3 reaches the UI).
      2. **Q2 — Panel placement: layout option (b1) — left column inside the workbench panel.** The validation panel is a left column **inside the existing workbench panel** (the bottom region under the splitter — same region that holds pinned cards today). Pinned cards continue to fill the rest of the panel to the right of the warnings column. **Collapse-on-zero behaviour:** when the run has zero warnings, the warnings column **collapses to zero width** (or to a minimal collapsed-header glyph that can be expanded), so pinned cards reclaim the full panel width; when warnings exist, the column expands to a sensible default (recommend ~280-320 px) and renders the list. The previously-empty workbench-panel state (`Click a node or edge to inspect`) becomes a same-region message in the pinned-card area to the right of the (zero-or-minimal-width) warnings column. **Note:** the app-sidebar in `ui/src/routes/+layout.svelte` (Home / Time Travel / Analysis nav rail) is **not** where this lives.
      3. **Q3 — Severity rendering: flat list with per-row chip.** Mirror Blazor's inspector behaviour exactly — one merged warnings list, severity rendered as a per-row chip (`error` / `warning` / `info`), no divider segregation between severities. Sort order keeps errors first, warnings second, info third (driven by the `severity` field), then by `nodeId` (empty / null sorts last), then by `message`.
      4. **Q4 — No tier indicator.** Only tier-3 warnings ever reach this UI (tiers 1 & 2 reject `POST /v1/run` and surface as HTTP errors elsewhere). A tier indicator would be decorative noise — drop it entirely; rely on the severity chip alone.
      5. **Q5 — Empty-state string: `No validation issues for this run.`** This message is only briefly visible during the loading-but-not-yet-collapsed transition, since the panel collapses on zero warnings (decision 2). Keep the string for that transition window and for the optional minimal-header expanded state.
      6. **Q6 — Heatmap-row badges deferred.** Per-edge UI surfacing — heatmap-row badges, edge-card warnings tab — stays out of scope. The type widening at AC1 makes this the cheap follow-up the data already supports.
      7. **Topology graph indication — newly in scope.** Topology nodes and edges show warning/error indicators driven from the same `state_window` `warnings[]` + `edgeWarnings` source the panel reads. Node indicators come from the `nodeId` field on each warning; edge indicators come from the keyed `edgeWarnings` map. **Severity drives styling** (`error` vs `warning` vs `info`); when multiple warnings target the same node or edge, the most-severe wins.
      8. **Bidirectional cross-link — newly in scope.** The shared `view-state.svelte.ts` store carries the cross-link state (no new store; reuse existing fields and pin proxies where possible). Two directions:
          - **Warning row → graph + card.** Click a warning row → if the row has a `nodeId`, call the existing `viewState.pinNode(nodeId, kind?)` proxy (which delegates to `workbench.toggle`) and set `viewState.setSelectedCell(nodeId, viewState.currentBin)` so the workbench-card title cross-highlights, matching the topology-click handler at `+page.svelte:106-119`. If the row carries an edge identity (an `edgeWarnings` row), pin the corresponding edge via the workbench's edge-pin path.
          - **Node / edge → warnings panel.** When `viewState.selectedCell` (or the active pin) names a node, the warnings panel highlights the matching warning rows; analogously for an edge selection. The simplest read is "filter the panel to that node/edge while one is selected"; an alternative read is non-filter highlight (de-emphasize others). The exact pixel behaviour is an open implementation note in the tracking doc, not an open question — `selectedCell` already carries `nodeId`, and the panel can derive its highlight set from it without new store fields. If a new field (e.g. `selectedWarningId`) genuinely surfaces as needed during build, name it inline at that time.

      ### Tier-3 warning shape (what actually arrives in `state_window.warnings[]`)

      Each item: `{ code, message, severity ("warning"|"info"|"error" — default "warning"), nodeId?, startBin?, endBin?, signal? }`. Examples: queue-saturation projections, retry-budget exhaustion, stationarity failures, exhaust-path-with-no-sink. The UI must render `code`, `message`, optional `nodeId`, optional bin range; `nodeId` cross-links into the workbench's pin-by-node mechanism (AC7).

      The parallel `edgeWarnings: { <edgeId>: StateWarning[] }` map carries warnings tied to specific edges (constraint-edge issues, propagation anomalies). This milestone consumes both — node-keyed for node-side surfacing, edge-keyed for edge-side surfacing — and renders both sets in the same warnings panel.

      ## Acceptance Criteria

      1. **Svelte `StateWindowResponse` type widened to match the wire DTO.** `ui/src/lib/api/types.ts` `StateWarning` gains `severity`, `startBin?`, `endBin?`, `signal?` (mirroring `TimeTravelStateWarningDto`). `StateWindowResponse` gains `edgeWarnings: Record<string, StateWarning[]>`. The `bins?: number[]` field is removed (not in the wire DTO; was a phantom). No `getStateWindow(...)` signature change. Vitest covers a fixture-based round-trip parse asserting all fields populate.

      2. **Validation panel surface — left column of the workbench panel.** A new validation panel renders as a **left column inside the existing workbench panel** on `/time-travel/topology` (the bottom region under the splitter at `+page.svelte` ~line 567-600). Pinned `WorkbenchCard` / `WorkbenchEdgeCard` items continue to fill the rest of the panel, to the right of the warnings column. The panel is reachable from both Topology and Heatmap views (the workbench panel persists across view switches per M-043 AC2). The panel renders one merged list of items, sorted by severity (`error` → `warning` → `info` → unknown), then by `nodeId` (empty / null sorts last), then by `message`. Each item displays a chrome severity chip, the human-readable `message`, the `nodeId` when present, and a bin-range chip when `startBin` / `endBin` are present. Edge-keyed warnings (from `edgeWarnings`) render in the same flat list, identified by their edge identity (e.g. `from→to`) instead of `nodeId`. Items without `nodeId` and without an edge identity render with no pin affordance.

      3. **Collapse-on-zero behaviour.** When the loaded run has zero warnings (combined `warnings.length === 0` and empty `edgeWarnings` map), the warnings column **collapses to zero width** (or to a minimal collapsed-header glyph that can be expanded), so pinned cards reclaim the full panel width. When warnings exist, the column expands to a sensible default (recommend ~280-320 px) and renders the list. **Resize / collapse-toggle UX:** a minimum collapsed footprint (zero or a thin header strip) and an expanded default width are settled at start-milestone confirmation; if the column is user-resizable in this milestone, the resize handle behaviour and persistence are recorded as an implementation note in the tracking doc rather than a separate AC. Empty-state string `No validation issues for this run.` applies during the loading-but-not-yet-collapsed transition and to the optional minimal-header expanded state.

      4. **Empty-state versus no-data-state distinguished.** The panel distinguishes two states (the third — "no warnings field on the wire" — cannot occur because the field is non-optional in the API):
          - **Issues present:** items rendered per AC2.
          - **Empty (run completed, zero warnings):** column collapses per AC3; the explicit `No validation issues for this run.` string renders during the load transition and in any expanded minimal-header state.
          The classifier is a pure helper covered by vitest. (The "no run loaded yet" state is the existing pre-load empty surface and is owned by the surrounding workbench panel's `Click a node or edge to inspect` message, not this panel's concern.)

      5. **Trigger T1 — surface warnings after a run.** When a run completes via the existing Svelte run flow and `/time-travel/topology` loads the new run, the workbench validation panel renders the warnings from that run's `state_window` response without any additional fetch. Branch covered by Playwright (see AC11).

      6. **Trigger T2 — surface warnings when opening an already-run model.** When the user selects a run from the run-selector dropdown, the workbench validation panel renders the warnings from that run's `state_window` response. Branch covered by Playwright (see AC11).

      7. **Topology node warning styling.** Nodes whose `nodeId` matches at least one entry in the loaded `warnings[]` array render a chrome warning indicator (small badge / dot / glyph or border treatment on the topology node). The indicator uses **chrome-scale tokens distinct from the data-viz palette**: new tokens `--ft-warn` (severity `warning`) and `--ft-err` (severity `error`), mirroring the `--ft-pin` / `--ft-highlight` precedent from M-043. Severity drives the styling; when multiple warnings target the same node, the most-severe wins (`error` > `warning` > `info`). Nodes with no warnings render no indicator. The indicator is hidden (not rendered, not invisible) when the node has no warnings.

      8. **Topology edge warning styling.** Edges whose identity (`from→to` or matching `edgeId` form used by `edgeWarnings`) appears as a key in `edgeWarnings` render a chrome warning indicator on the topology edge — analogous to AC7 but for edges. Same chrome tokens (`--ft-warn` / `--ft-err`); same severity-max collapse. The exact visual treatment (recoloured stroke, dashed accent, badge on the edge midpoint, or a sibling glyph) settles in the tracking doc Design Notes alongside the M-043 conventions, but it must be visually distinct from the existing `--ft-viz-amber` selected-edge stroke at `+page.svelte:609-613`.

      9. **Click-a-warning-row to pin and cross-highlight.** Clicking an item in the validation panel:
          - **If the row has a `nodeId`:** pins that node into the workbench (calls `viewState.pinNode(nodeId, kind?)`, which delegates to `workbench.toggle`) and sets `viewState.setSelectedCell(nodeId, viewState.currentBin)` so the workbench-card title cross-highlight renders. Mirrors the topology-click handler convention at `+page.svelte:106-119`.
          - **If the row is an edge-keyed warning:** pins the corresponding edge into the workbench via the existing edge-pin path so a `WorkbenchEdgeCard` renders for it.
          - **If the row has neither identity:** renders with no pin affordance; clicking is a no-op.
          Clicking is independent of which view is active (Topology or Heatmap); both views are kept in sync via the shared store per M-043 AC13.

      10. **Bidirectional cross-link from selection to warnings panel.** When a node or edge is selected in the workbench (driven by `viewState.selectedCell` for node selection or by the existing edge-pin state for edges), the warnings panel highlights the matching warning rows so the user can see which warnings apply to the current selection. The exact pixel behaviour (filter-only-matching vs highlight-and-de-emphasize-others) is an implementation-note decision recorded in the tracking doc rather than an AC; the contract is "selection → matching warning rows are visually distinguished." No new fields on the shared view-state store are required for the contract — the panel derives the highlight set from `viewState.selectedCell?.nodeId` and from the workbench's pinned-edge state. If a `selectedWarningId` field ends up genuinely needed during build, it lives in `view-state.svelte.ts` alongside `selectedCell` and is named at that time.

      11. **Single source of truth.** Validation items for a given run live in exactly one place in the UI (one derived store keyed off the loaded `state_window` response). The warnings panel, the topology node styling (AC7), and the topology edge styling (AC8) all read from it. No duplicate fetching, no per-component re-derivation of "is this node warning-flagged?". Switching views (Topology ↔ Heatmap) does not refetch; selecting a different run does (because the underlying `state_window` call is what changes).

      12. **New chrome tokens land alongside existing chrome scale.** `--ft-warn` and `--ft-err` are added to the chrome-token CSS surface alongside `--ft-pin` and `--ft-highlight` (per M-043). Both light and dark themes; designed not to clash with the data-viz palette (per M-039) or with `--ft-pin` / `--ft-highlight`. An `--ft-info` token is optional in this milestone — add only if the chosen Playwright fixture exercises an `info`-severity warning; otherwise note it as a follow-up.

      13. **Tier-3-only scope explicit.** No tier-1 / tier-2 UX appears in this milestone. The user gets `400 { error }` from `POST /v1/run` for tier-1 / tier-2 failures via the existing run-orchestration surface; this milestone does not surface those failures in the workbench. (Captured in *Out of Scope*; restated as an AC so the build cannot quietly add a "validation failed" surface.)

      14. **Testing — Playwright + vitest, every reachable branch covered.** Per the project's UI-testing hard rule: Playwright drives every shipped trigger end-to-end in a real browser; vitest covers pure helpers. **Vitest:**
          - Widened-type round-trip parse (AC1).
          - State classifier `classifyValidationState({ warnings, edgeWarnings }): 'empty' | 'issues'` — both branches.
          - Item sort `sortValidationItems(items): items[]` — severity desc → nodeId / edge-id (empty last) → message; ties at every level.
          - Severity-to-chrome-token helper — `error` / `warning` / `info` / unknown-fallback.
          - Severity-max collapse `maxSeverityForKey(items): 'error' | 'warning' | 'info' | null` — every combination plus empty.
          - Cross-link state-transition helper that derives "rows matching the current selection" from `viewState.selectedCell` and the warnings array (covers nodeId-match, edge-match, neither-match, no-selection).

          **Playwright** (extending or siblinging `tests/ui/specs/svelte-topology.spec.ts`; graceful-skip on dev-server / API unavailability per the project rule):
          - Trigger T1 — run a model with zero warnings → after run loads, the warnings column collapses (zero width or minimal-header) and pinned cards fill the panel; no topology warning indicators visible.
          - Trigger T1 — run a model with at least one warning (fixture chosen to exercise tier-3 analyser output reliably) → warnings column expands → row lists `nodeId`, `message`, severity chip → corresponding topology node renders a warning indicator with the right severity token.
          - Trigger T2 — open an already-run model with persisted warnings → warnings column populates from that run's `state_window` response.
          - Click a node-attributed warning row → corresponding workbench card pins → workbench-card title cross-highlights (M-043 selected-state convention).
          - Click an edge-attributed warning row → corresponding `WorkbenchEdgeCard` pins → topology edge styled per AC8.
          - Click a topology node that has warnings → warnings panel highlights / filters to its rows (AC10).
          - Click a topology edge that has warnings → warnings panel highlights / filters to its rows (AC10).
          - Validation panel persists across view switch (Topology → Heatmap → Topology); node + edge indicators re-render correctly when switching back to Topology.
          - One spec asserting at least two distinct severities render with distinct chrome tokens (data fixture chosen to exercise both `warning` and `error` if a tier-3 fixture exists; otherwise skip with a clear message and file follow-up).
          A line-by-line branch audit of the new UI + helpers against tests is recorded in the tracking doc's Coverage Notes section, matching the M-042 / M-043 audit structure.

      ## Constraints

      - **No edit-time validation.** No live `POST /v1/validate` against an in-progress text edit. The Svelte UI has no model editor today; this is a guardrail against scope creep into the expert-authoring epic.
      - **No new backend endpoint and no `POST /v1/run` shape change.** Settled at planning (2026-04-26). The data already arrives on `GET /v1/runs/{runId}/state_window`; this milestone widens the consumer-side type and surfaces the fields. If a tier-1 / tier-2 / edit-time validation surface is wanted later, it is a separate milestone with its own backend decision (the live `POST /v1/validate` endpoint is already available for that future work).
      - **Single source of truth.** Validation items for a given run live in exactly one place in the UI (one store / one shape) keyed off the loaded `state_window` response. Warnings panel, topology node styling, and topology edge styling all read from it.
      - **Severity semantics come from the backend.** The Svelte UI does not invent or remap severities. The mapping is `severity` field → chrome token (`warning` → `--ft-warn`, `error` → `--ft-err`, `info` → optional `--ft-info` or default chrome treatment). If the backend ever introduces a new severity literal, the UI falls back to a default chrome treatment and the type widening at AC1 narrows the contract surface.
      - **No data-viz palette used for warning chrome.** Indicators and severity chips use chrome-scale tokens (`--ft-warn`, `--ft-err`) — never the metric data-viz hues (teal/cyan, magenta/pink, etc., per M-039's data-viz palette). Same reason as M-043's `--ft-pin` / `--ft-highlight` separation: chrome signals must not compete with data signals. The new edge-warning treatment must also be visually distinct from `--ft-viz-amber` (selected-edge stroke at `+page.svelte:609-613`).
      - **Cross-link state goes in the existing shared store.** No new store. Reuse `viewState.selectedCell` and the existing pin proxies; if a new field is genuinely needed during build (e.g. `selectedWarningId`), name it inline in `view-state.svelte.ts` at that time.
      - **Tier-1 / tier-2 errors are not surfaced here.** `POST /v1/run` rejects them with `400 { error }`. The user gets an HTTP error response from the run attempt; this milestone does not invent a new UX for failed runs (matches Blazor behaviour). Restated as AC13 so the build cannot quietly add it.
      - **Existing what-if and run-orchestration surfaces stay green.** This milestone touches the workbench surface (`/time-travel/topology`); it must not regress `/what-if`, `/run`, or any existing route.

      ## Design Notes

      - **Panel layout — left column inside the workbench panel.** The existing workbench panel today is a single horizontal `flex gap-2 p-2 flex-wrap items-start` of pinned cards (`+page.svelte` ~line 574). This milestone wraps the panel content in a two-column layout where the left column is the warnings panel and the right column is the existing pinned-card flex row. When the warnings column collapses to zero width, the pinned-card region reclaims the full panel width, preserving today's behaviour for runs with no warnings.

      - **Severity indicator candidates (panel rows + topology indicators):**
          - Coloured dot keyed to `--ft-warn` / `--ft-err` (chrome tokens, not data-viz). Most compact.
          - One-letter glyph chip (`E` / `W` / `I`).
          - Word label (`error` / `warning` / `info`) — most readable, highest chrome cost.
          Default leaning: **coloured dot** for the topology indicator; **dot + word label** for the panel-row chip — matches Blazor's chip-color convention. Locked at start-milestone confirmation. (Tier indicator from the prior draft is dropped per Q4.)

      - **Token additions (chrome scale):**
          - `--ft-warn` — warning indicator and panel-row chip background (yellow/amber family).
          - `--ft-err` — error indicator and panel-row chip background (red family).
          - `--ft-info` — optional info indicator (blue family); add only if the chosen Playwright fixture exercises an `info`-severity warning.
          All chrome-tone, both light and dark themes; designed not to clash with `--ft-pin` / `--ft-highlight` from M-043 or with `--ft-viz-amber`.

      - **Topology indicator implementation hints:** for nodes, an SVG `<g>` overlay rendered from a `warningsByNodeId` derived map; position top-right of each topology node (or whatever stays out of the way of the metric label and the pin glyph). For edges, settle at start-milestone whether the chrome lives on the edge stroke (recoloured / dashed accent) or as a sibling glyph at the edge midpoint — record the choice in the tracking doc.

      - **State-classifier helper:** pure function `classifyValidationState(input: { warnings: StateWarning[]; edgeWarnings: Record<string, StateWarning[]> }): 'empty' | 'issues'`. Empty when both `warnings.length === 0` and `Object.keys(edgeWarnings).length === 0`; otherwise `issues`. Vitest covers both branches.

      - **Sort helper:** pure function `sortValidationItems(items: ValidationRow[]): ValidationRow[]` — severity descending (`error` > `warning` > `info` > unknown), then keyed identity (`nodeId` for node rows, `edgeId` for edge rows; empty / null sorts last), then `message`. Vitest covers ties at every level.

      - **Severity-max collapse for indicators:** pure function `maxSeverityForKey(items: StateWarning[]): 'error' | 'warning' | 'info' | null`. Used identically for the per-node and per-edge severity-max computation. Vitest covers each combination plus the empty case.

      - **Cross-link derivation helper:** pure function `rowsMatchingSelection(items: ValidationRow[], selection: { nodeId?: string; edgeId?: string } | null): Set<string>` — returns the row-id set the panel highlights for the current selection. Vitest covers nodeId-match, edge-match, neither-match, no-selection.

      - **Survey-canary implication for fixtures:** all twelve shipped templates produce zero analyse-tier warnings today (`val-err == 0` is hard-asserted). Playwright fixtures for the "warnings present" scenarios must inject deliberately-broken inputs — either a fixture YAML that the analyser flags, or a contrived per-query analytical-warning trigger (e.g. retry-budget set to provoke a stationarity warning). Mechanism settles in the tracking doc at start-milestone.

      - **Cross-reference for downstream UI:** M-043's `viewState.selectedCell` cross-link convention is the model — workbench-card title turns turquoise when `selectedCell.nodeId` matches the card's `nodeId`. AC9's "click a row to pin and cross-highlight" reuses that exact convention and the existing pin proxies (`viewState.pinNode`, `workbench.toggle`). No new selection-state shape introduced for the contract; if one is needed during build it lives inline in `view-state.svelte.ts`.

      ## Out of Scope

      - **Edit-time validation.** No live `POST /v1/validate` against an in-progress text edit. The Svelte UI has no editor; the expert-authoring epic owns this when it lands.
      - **Tier-1 / tier-2 error surfacing.** Schema and compile errors reject the run at `POST /v1/run` with `400 { error }`; the user sees an HTTP error from the run attempt. Inventing a "validation failed before the run could start" UX is a separate milestone with its own backend decision (the live `POST /v1/validate` endpoint is available for that future work). Matches Blazor.
      - **Per-tier filter / per-tier collapse / per-tier toggle.** Only tier-3 reaches this surface; per-tier UX is not meaningful.
      - **Severity filter / severity-only-show toggle.** The list is sorted by severity; filtering is a follow-up after the surface has feedback.
      - **Warning grouping by `code` or by node.** Items render flat in this milestone. Grouping is a follow-up.
      - **Heatmap-row warning badges.** The widened type from AC1 carries the `edgeWarnings` map and this milestone consumes it for topology edge styling (AC8) and panel rows; the **heatmap row gutter does not get warning badges in this milestone.** This is the cheap follow-up the type widening enables — picked up in M-045 polish or a dedicated follow-up.
      - **Warning grouping in the panel by node / edge.** Flat list this milestone; grouping is a follow-up.
      - **Validation history per run.** No "validation re-ran on `<date>`" timeline.
      - **Re-run validation from the UI button.** No "re-validate" affordance. The surface is read; trigger is run.
      - **Inline error-message rich rendering.** Markdown / link rendering inside messages is out — messages are plain text with whitespace preserved.
      - **Validation diff between runs.** "These warnings are new since the previous run" is a real future ask but out of scope here.

      ## Open Questions

      None. All Q1-Q6 plus the topology-indication and bidirectional-cross-link decisions are settled in *Settled scope* above. Implementation-note items (exact panel-column resize behaviour, exact filter-vs-highlight pixel behaviour for the bidirectional cross-link, exact edge-indicator visual treatment) are recorded in the tracking doc's Design Notes section at start-milestone, not as open questions on the spec.

      ## Dependencies

      - **M-043 Heatmap View** must be merged into `epic/E-21-svelte-workbench-and-analysis` before this milestone branches. The shared view-state store, the workbench-card cross-link convention (M-043 AC12 / AC13), and the chrome-token additions (`--ft-pin`, `--ft-highlight`) are the seams this milestone composes against. The merge of `milestone/m-E21-06-heatmap-view` into the epic branch is handled at start-milestone time, not in this draft.
      - **`GET /v1/runs/{runId}/state_window`** at `src/FlowTime.API/Program.cs:1028` — confirmed live; already called by `flowtime.getStateWindow(...)` in `ui/src/lib/api/flowtime.ts:109`. This milestone consumes the `warnings[]` and `edgeWarnings` fields that already arrive on the response.
      - **`StateQueryService.BuildWarnings` + `BuildEdgeWarnings`** at `src/FlowTime.API/Services/StateQueryService.cs:4752,4783` — confirmed live; merges persisted manifest warnings (`RunManifest.Warnings`) with per-query analytical warnings, returns the unified list.
      - **`RunManifest.Warnings`** (`src/FlowTime.Adapters.Synthetic/RunManifest.cs:16`) — `RunWarning[] { Code, Message, NodeId?, Bins?, Value?, Severity ("warning" default), EdgeIds? }` — the persisted shape `RunArtifactWriter` writes into `data/runs/<runId>/run.json` from `TimeMachineValidator` tier-3 output.
      - **Wire DTO reference** — `TimeTravelStateWarningDto` (`src/FlowTime.UI/Services/TimeTravelApiModels.cs:521`) is the deserialization shape Blazor uses; Svelte's widened `StateWarning` type per AC1 mirrors this exactly.
      - **E-23 Model Validation Consolidation** (closed and merged to main on 2026-04-26): provides the consolidated `ModelSchemaValidator` that `TimeMachineValidator` (tier-3 analyse) sits on top of. This milestone consumes its output indirectly via the persisted run-artifact warnings; no further E-23 work required.
      - **Workbench / view-state stores** at `ui/src/lib/stores/workbench.svelte.ts` and `ui/src/lib/stores/view-state.svelte.ts` — pin-state and shared-view-state seams this milestone wires into via the existing `viewState.pinNode`, `viewState.selectedCell`, and `viewState.setSelectedCell` surface.

      ## ADRs

      None at draft time. The Q2-Q6 resolutions plus topology-indication and bidirectional-cross-link decisions are UX/chrome decisions that do not warrant ADRs (they live in the tracking-doc Design Notes section per the M-042 / M-043 precedent). If a downstream milestone surfaces tier-1 / tier-2 errors via `POST /v1/validate`, that backend seam decision will warrant an ADR at that time.
  - kind: milestone
    id: M-045
    frontmatter:
      title: Visual Polish & Dark Mode QA
      status: done
      parent: E-21
    body: |
      **Created:** 2026-04-28
      **Started:** 2026-04-28
      **Completed:** 2026-04-28
      ## Goal

      Close E-21 with a polish pass over the workbench and analysis surfaces: bring topology to the heatmap's accessibility bar (keyboard + ARIA), complete the bidirectional cross-link the M-043 / M-044 milestones started (node *and* edge selection now flows symmetrically between the panel, the cards, the topology DAG, and the heatmap), audit dark-mode + elevation tokens across every E-21 surface, fill the empty→populated flicker on `/time-travel/topology` and `/analysis` with skeletons, settle the transitions rule, and clean up two cheap follow-ups left in place by M-044. The milestone is the visual-polish + a11y gate before E-21 wraps; it ships no new analytical capability.

      ## Context

      ### What landed in the previous E-21 milestones

      - **Workbench paradigm (M-038 / M-039):** density tokens, dag-map click/hover events, click-to-pin node + edge cards, metric chip bar, class filter, dark/light theme.
      - **Analysis surfaces (M-040 → M-042):** `/analysis` route with sweep / sensitivity / goal-seek / optimize tabs; shared `AnalysisResultCard` + `ConvergenceChart`.
      - **Heatmap view (M-043):** typed `<ViewSwitcher>`, shared view-state store (`view-state.svelte.ts`) with `selectedCell`, full-window 99p-clipped color scale, shared node-mode toggle, `--ft-pin` / `--ft-highlight` chrome tokens.
      - **Validation surface (M-044):** widened `StateWarning` type, validation panel as left column inside the workbench panel, topology node + edge warning indicators, workbench-card warning dot + severity row tinting, validation-row click → pin + cross-highlight, FLIP card animations, `--ft-warn` / `--ft-err` / `--ft-info` chrome tokens.

      ### What is still open at epic-close

      Three deferred items in `work/gaps.md` are explicitly tagged for this milestone:

      1. **Topology DAG has no keyboard nav or ARIA structure** (`work/gaps.md` §"Topology DAG has no keyboard nav or ARIA structure"). The heatmap ships `role="grid"` / `role="gridcell"` with Tab + arrow-key reachability, focus ring, and `aria-label` containing `node id + bin + metric + value`. The topology DAG SVG (rendered via `{@html renderSVG(...)}` from dag-map) has no `tabindex`, no roles, and is mouse-only. Blazor's original topology had keyboard + ARIA — Svelte regressed against that bar. Without this retrofit the workbench cannot honestly claim a11y parity at epic close.

      2. **Bidirectional card ↔ view selection** (`work/gaps.md` §"Bidirectional card ↔ view selection (reverse cross-link)"). M-044 partially closed this for nodes — the workbench card's body click already calls `viewState.setSelectedCell(pin.id, viewState.currentBin)` (`+page.svelte:774`) and the card title turns turquoise via the `selected` prop. **What is still missing for nodes:** the topology DAG has no `.node-selected` stroke rule. When `selectedCell.nodeId` is set, the card title is turquoise but the corresponding graph node renders no visual change — the cross-link is asymmetric. **For edges:** the cross-link does not exist at all. The edge card's `selected` prop is driven by a "last-pinned-only" heuristic (`edgeIdx === workbench.pinnedEdges.length - 1` at `+page.svelte:794`); clicking an edge card calls `workbench.bringEdgeToFront(...)` — a card-stack reordering, not a global selection — and does not light up the topology edge or the heatmap. The existing `.edge-selected` topology class fires on every pinned edge, conflating "pinned" with "selected." This milestone introduces a single `selectedEdge` concept that mirrors `selectedCell` and is driven symmetrically from edge cards, validation rows, and topology edge clicks.

      3. **Data-viz palette colour-blind validation / pattern encoding** (`work/gaps.md` §"Data-viz palette not validated for color-blindness"). **Out of scope for this milestone** by user decision 2026-04-28 — the simulator pass and the `--ft-pattern-encode` toggle are deferred to a follow-up. Recorded here so the gap is not silently lost at epic close.

      ### Visual polish surfaces

      - **Dark mode audit.** Every E-21 surface — workbench cards, validation panel + severity row tints, topology indicators (`--ft-warn` / `--ft-err` / `--ft-info` / `--ft-pin` / `--ft-highlight`), heatmap, sweep / sensitivity / goal-seek / optimize panels, run-selector dropdown — needs a single sweep in dark mode looking for token-resolution bugs, contrast issues, and severity-row tints reading correctly against the dark background. M-044 designed severity-row backgrounds to be transparent in dark mode; the audit confirms it works as designed and surfaces any other dark-mode breakage.
      - **Loading skeletons.** Today, switching runs on `/time-travel/topology` and re-running sweep / sensitivity / goal-seek / optimize on `/analysis` produces an empty→populated flicker. The user reads this as "did it break?". Replace with `Skeleton` placeholders that match the eventual content geometry.
      - **Transitions audit.** M-044 added FLIP animations on workbench card insert/remove (`animate:flip` at `+page.svelte:761,782`). The audit produces a written rule for what gets motion (cards, result swaps), what stays instant (view-switcher, context changes), and applies the rule consistently to the analysis-tab result swap and the run-selector dropdown content swap.
      - **Elevation audit.** Quick pass over the shadow / border / layering tokens identifying any inconsistency across cards, panels, popovers, dropdowns; normalize to a single elevation scale.

      ### Cheap follow-ups

      - **`validation-panel.svelte:157` no-op terminal collapse.** `{#if row.kind === 'node'}{row.key}{:else}{row.key}{/if}` is a no-op left in by an in-flight refactor; collapse to `{row.key}`. Flagged in M-044 wrap audit.
      - **"Indicators absent on heatmap" Playwright assertion.** `tests/ui/specs/svelte-validation.spec.ts` does not currently assert that warning indicators are *absent* when `viewState.activeView === 'heatmap'`. The early-return guard at `+page.svelte:197` is exercised only indirectly today. Adding an explicit assertion tightens the contract for future surface authors.

      ### Why this milestone closes E-21

      The E-21 epic spec lists eight milestones; M-038 through M-044 are merged. M-045 is the last item on the table. It is the "Visual Polish & Dark Mode QA" milestone in the epic spec, and the deferred-gap items above (topology a11y, full bidirectional cross-link) are the substantive work that makes the epic honest at close. Loading skeletons, transitions, elevation, dark-mode audit, and the two cheap follow-ups are the polish work the milestone name implies. After M-045 lands, E-21 wraps.

      ## Acceptance Criteria

      1. **Topology keyboard navigation + ARIA structure (a11y parity with heatmap).** The topology DAG container exposes `role="application"` (or equivalent — settle in tracking doc) with an `aria-label` describing the surface as a topology graph. Each rendered node carries `tabindex="0"`, `role="button"`, and an `aria-label` containing at minimum the node id + class (when known) + the current metric value (matching the heatmap's `id + bin + metric + value` pattern from M-043). Tab + Shift-Tab walks the node set; Enter / Space activates pin (matching mouse click). A visible focus ring renders on the focused node — chrome-token, not data-viz, distinct from `--ft-pin` and `--ft-highlight`. Edges keep keyboard-reachability via the same scheme (`tabindex` + `role="button"` + `aria-label` "edge from X to Y") so click-to-pin-edge has a keyboard equivalent. Implementation may live in the topology Svelte component (post-render `$effect` injecting attributes onto the dag-map-emitted SVG) or in dag-map itself (library option) — settle in tracking doc; either is acceptable so long as the external contract is met.

      2. **Topology node selection stroke rule (closes one-way cross-link for nodes).** A new `.node-selected` global CSS rule applies a chrome-token stroke to topology nodes when the node id matches `viewState.selectedCell?.nodeId`. Token: `--ft-highlight` (matches the existing card-title turquoise convention from M-043). A `$effect` in `+page.svelte` toggles the class on the dag-map-emitted node group whenever `viewState.selectedCell` changes, mirroring the existing `.edge-selected` effect at `+page.svelte:156-172`. Visible on Topology view; not rendered on Heatmap view (the dag-map SVG is unmounted there). Cross-link directions covered:
          - Click a topology node (existing path at `+page.svelte:127-141`) → node strokes turquoise + card title turquoise.
          - Click a workbench card body (existing path at `+page.svelte:774`) → node strokes turquoise on the topology DAG.
          - Click a heatmap cell (existing path) → node strokes turquoise on the topology DAG when the user switches to Topology view.
          - Click a validation panel row with `nodeId` (existing path from M-044) → node strokes turquoise on the topology DAG.

      3. **Bidirectional edge cross-link via new `selectedEdge` field.** A new field `selectedEdge: { from: string; to: string } | null` on the shared view-state store, with `setSelectedEdge(from, to)` and `clearSelectedEdge()` setters. Semantics:
          - **Edge selection is independent of edge pinning.** A pinned edge is not necessarily selected; a selected edge is not necessarily pinned. Both can be true at once. Clicking a topology edge pins it (existing behaviour) *and* sets it as the `selectedEdge` (new behaviour).
          - **Topology rendering split into `pinned` and `selected` chrome.** The existing `.edge-selected` class (applied to every pinned edge today via `workbench.pinnedEdges`) is **renamed** to `.edge-pinned` with the same visual treatment it has today (`--ft-viz-amber` stroke). A new `.edge-selected` class with a distinct chrome treatment (settle in tracking doc — recommend `--ft-highlight` stroke + slightly heavier weight to distinguish from `.edge-pinned`) applies only to the single edge whose `from`/`to` matches `viewState.selectedEdge`. Both effects live side-by-side in `+page.svelte`; an edge can render both classes simultaneously (pinned + selected).
          - **Edge card `selected` prop driven from `selectedEdge`.** Replace the `edgeIdx === workbench.pinnedEdges.length - 1` heuristic at `+page.svelte:794` with `viewState.selectedEdge?.from === edge.from && viewState.selectedEdge?.to === edge.to`.
          - **Edge card body click sets the edge as selected.** Change `onSelect` at `+page.svelte:795` from `workbench.bringEdgeToFront(...)` to `viewState.setSelectedEdge(edge.from, edge.to)`. The `bringEdgeToFront` helper is preserved on the workbench store (other call sites may still rely on stack-ordering semantics) but is no longer wired to the edge-card body click.
          - **Validation panel edge rows wire `setSelectedEdge`.** When the user clicks a validation row whose identity is an edge (the `edgeWarnings`-keyed rows from M-044 AC9), the existing pin path is preserved *and* `viewState.setSelectedEdge(from, to)` is called — symmetric to the node path that already calls `setSelectedCell`. Edge rows whose edge id does not parse as `from→to` (rare; mismatched analyser output) preserve today's pin-only behaviour.
          - **Selection-clear on unpin.** When the selected edge is unpinned (via the edge card's ✕ button or any other unpin path), `clearSelectedEdge()` fires automatically — same shape as the M-043 `unpinAndClearSelection` helper for nodes.

      4. **Dark-mode audit across all E-21 surfaces.** Run a single sweep over the workbench, analysis, validation, and chrome surfaces in dark mode looking for token-resolution bugs, contrast issues, and breakage of M-044's transparent severity-row backgrounds. Surfaces in scope:
          - `/time-travel/topology` — workbench cards, validation panel (rows + chips + severity tints), topology indicators (`--ft-warn` / `--ft-err` / `--ft-info` / `--ft-pin` / `--ft-highlight`), heatmap (cells, focus ring, selected overlay, fit-width toggle), run-selector dropdown, view-switcher, metric chip bar, class filter, timeline scrubber.
          - `/analysis` — sweep / sensitivity / goal-seek / optimize panels (config forms, result tables, charts), shared `AnalysisResultCard` + `ConvergenceChart` + `interval-bar-geometry` siblings.
          - `/run` and `/what-if` — confirmed not regressed (touch only if dark-mode breakage is found).
          
          Findings catalogued in the tracking doc; fixes land inline with the AC. Playwright dark-mode smoke spec asserts at minimum that (a) the topology page renders with `data-theme="dark"` (or whatever the theme attribute uses), (b) at least one severity-row tint reads correctly against the dark background, (c) at least one topology indicator dot is visible. Deeper visual regression is out of scope (no pixel-snapshotting in this milestone).

      5. **Loading skeletons on workbench + analysis surfaces.** Replace the empty→populated flicker with `Skeleton` placeholders matching the eventual content geometry. Surfaces:
          - `/time-travel/topology`: while the `state_window` request for the selected run is in flight, the canvas region (topology *or* heatmap, whichever is active) renders a skeleton matching its eventual geometry; the workbench panel renders a row of skeleton cards proportional to the eventual pinned-card count (or a single placeholder if no pins yet).
          - `/analysis` sweep / sensitivity / goal-seek / optimize: while the corresponding compute call is in flight (`loading === true` already exists in the page state per `+page.svelte:86`), the result region renders a skeleton matching the eventual chart / table geometry. The "no result yet" empty state remains a separate concern (not a skeleton — matches current behaviour).
          - The `Skeleton` shadcn-svelte component is added under `ui/src/lib/components/ui/skeleton/` if not already shipped (verify at start-milestone; add if missing).
          - Vitest covers the loading-state classifier helper that decides skeleton-vs-content for each surface; Playwright smoke asserts a skeleton is present during a deliberately-slow run.

      6. **Transitions rule applied across the workbench.** Audit and document a single transition rule in the tracking doc, then apply it consistently. Initial proposal:
          - **Card insert / remove:** 220 ms FLIP + 160 ms fade-in / 120 ms fade-out (already shipped in M-044; ratify here).
          - **`/analysis` result swap:** 160 ms cross-fade when re-running sweep / sensitivity / goal-seek / optimize replaces the previous result with a new one.
          - **Run-selector dropdown content swap:** 160 ms cross-fade.
          - **View-switcher topology ↔ heatmap:** **no transition** (context change; instant is correct).
          - **Validation row highlight on selection (M-044 AC10 cross-link):** **no transition** (selection feedback should be instant).
          
          The exact durations and easing land in the tracking doc; the contract is that the rule is documented and applied consistently to every result-swap surface. Playwright covers at minimum one cross-fade assertion (compute-finished → result-rendered) on `/analysis` to prove the transition is wired.

      7. **Elevation audit + token normalization.** Single pass over the shadow / border / layering tokens used across the E-21 surfaces. Catalogue the current uses (border-only, `shadow-sm`, `shadow-md`, custom `box-shadow`, ring-1, …) in the tracking doc; pick a small canonical set (recommend: flat / `shadow-sm` for cards / `shadow-md` for popovers and dropdowns / no shadow on the topology canvas); apply consistently. Out of scope: introducing new elevation tokens; this is a normalization-to-existing pass.

      8. **`validation-panel.svelte:157` cosmetic collapse.** Replace `{#if row.kind === 'node'}{row.key}{:else}{row.key}{/if}` with `{row.key}`. Verify no behavioural change via the existing M-044 vitest tests on the panel.

      9. **"Indicators absent on heatmap" Playwright assertion.** Add an explicit assertion to `tests/ui/specs/svelte-validation.spec.ts` (or a sibling spec) confirming that when `viewState.activeView === 'heatmap'`, no `[data-warning-indicator]` elements are present in the canvas region. Closes the contract guard the M-044 wrap audit identified as covered indirectly today.

      10. **Testing — Playwright + vitest, every reachable branch covered.** Per the project's UI-testing hard rule. **Vitest:**
          - Topology a11y attribute helper (AC1) — node label assembly, edge label assembly, fallback when class / metric is unknown.
          - View-state `setSelectedEdge` / `clearSelectedEdge` — set, replace, clear, no-op-when-already-cleared, equality on existing selection.
          - Bidirectional matchers — "is this edge currently selected" (`isSelectedEdge(viewState, from, to)`) helper; covers both null and present cases.
          - Loading-state classifier (AC5) — skeleton-vs-content branch per surface.
          
          **Playwright** (extending or siblinging existing E-21 specs; graceful-skip on dev-server / API unavailability):
          - **AC1** — topology node receives focus via Tab; Enter pins the node.
          - **AC1** — focus ring visible on focused node (data attribute or computed style assertion).
          - **AC2** — clicking a workbench card body strokes the matching topology node turquoise (`.node-selected` present).
          - **AC2** — clicking a heatmap cell, then switching to Topology view, shows the matching node strokes turquoise.
          - **AC3** — clicking an edge card body sets `viewState.selectedEdge` and the topology edge gains `.edge-selected` chrome distinct from `.edge-pinned`.
          - **AC3** — clicking an edge-attributed validation row pins the edge, sets `selectedEdge`, edge card and topology edge both light up; unpin clears `selectedEdge`.
          - **AC4** — dark-mode smoke: topology page renders, severity tints + indicator dots are visible.
          - **AC5** — `/analysis` sweep run: skeleton visible during compute, result visible after.
          - **AC5** — `/time-travel/topology` run-switch: skeleton visible during `state_window` load.
          - **AC6** — `/analysis` re-run cross-fade asserted via element-level transition state.
          - **AC9** — heatmap view shows zero `[data-warning-indicator]` elements (explicit assertion).
          
          A line-by-line branch audit of the new UI + helpers against tests is recorded in the tracking doc's Coverage Notes section, matching the M-042 / M-043 / M-044 audit structure.

      ## Constraints

      - **No new analytical capability.** This is a polish milestone. No new analysis modes, no new data fields on responses, no new endpoints. AC3 introduces a new field on the *client-side* shared store (`selectedEdge`) but does not change any wire shape.
      - **No regression on what landed.** What-if (`/what-if`), run orchestration (`/run`), heatmap (`/time-travel/topology` heatmap view), validation panel, sweep / sensitivity / goal-seek / optimize must all stay green. Playwright suite must continue to pass.
      - **Chrome tokens, not data-viz tokens.** A11y focus ring, `.node-selected` stroke, `.edge-selected` (the new selection variant) all use chrome-scale tokens (`--ft-highlight` already exists; introduce new ones only if a clean visual demands it). Data-viz hues stay reserved for metric encoding.
      - **Library-versus-component placement.** Where dag-map a11y attributes belong (library option vs post-render component injection) is settled in the tracking doc, not here. Both are acceptable; library is preferable if the change stays general-purpose per ADR-E21-02.
      - **`bringEdgeToFront` is preserved as a workbench helper.** Only its wiring to the edge-card body click is changed. Future call sites (e.g. a "show this edge most recently inspected" mechanic) remain available.
      - **No pixel-snapshot regression suite.** The dark-mode audit is human + smoke-spec-verified; introducing a pixel-snapshot harness is out of scope for this milestone.
      - **Color-blind validation + pattern encoding deferred.** Per user decision 2026-04-28; remains an open gap in `work/gaps.md` and a candidate for a follow-up after E-21 wraps.

      ## Design Notes

      - **Topology a11y placement.** The topology Svelte component already runs a post-render `$effect` that injects warning-indicator SVG elements (`+page.svelte:188-303`). Adding a parallel post-render pass that walks `[data-node-id]` and `[data-edge]` and applies `tabindex` / `role` / `aria-label` is the lowest-friction path. Library-side support (a `renderSVG` option that emits these attributes natively) is also acceptable and preferable per ADR-E21-02 if dag-map maintenance bandwidth allows; settle at start-milestone.
      - **Focus management for topology keyboard nav.** The simplest model: nodes are in DOM order (dag-map's render order); Tab and Shift-Tab walk that order; the browser's built-in focus management does the rest. A more sophisticated model would walk topologically (sources first, sinks last) — out of scope for this milestone unless the simple model proves disorienting in user testing.
      - **`.node-selected` stroke style.** `stroke: var(--ft-highlight); stroke-width: 2; fill-opacity: 1;` — same hue as the workbench-card title cross-highlight, mirrors the M-043 convention. Avoid changing the node fill; the metric color stays the encoding signal, the stroke is the chrome signal.
      - **`.edge-selected` (new) vs `.edge-pinned` (renamed) chrome.** Recommend:
          - `.edge-pinned`: `stroke: var(--ft-viz-amber); stroke-width: 3;` (current `.edge-selected` treatment).
          - `.edge-selected`: `stroke: var(--ft-highlight); stroke-width: 4; stroke-dasharray: 0;` — distinct hue and slightly heavier so the user can distinguish "I have this edge pinned" from "this is my current edge selection" when both are present.
          Settled at start-milestone; locked in tracking doc.
      - **Edge identity normalization.** `selectedEdge` uses the `{from, to}` shape (matches the workbench's `pinnedEdges` shape and avoids the string-key parsing edge cases). The `edgeWarnings` map keys remain string-form (`from→to`), and the validation row → `setSelectedEdge` path normalizes by parsing on the arrow boundary (already done in M-044 at `+page.svelte:262-265`).
      - **Loading-skeleton component.** shadcn-svelte's `Skeleton` is a thin `<div>` with a pulse animation and a configurable shape. If the component is not yet vendored under `ui/src/lib/components/ui/skeleton/`, add it (one-file shadcn add) at start-milestone; do not invent a custom skeleton.
      - **Transitions library.** Svelte's built-in `transition:fade` and `animate:flip` cover every requirement here. No additional motion library is needed.
      - **Elevation token candidates.** Today's ad-hoc set: `border` only (validation panel), `shadow-sm` (workbench cards), implicit shadcn shadows (dropdown). Recommend the canonical set in AC7 above; settle in tracking doc.
      - **Dark mode audit method.** Manual visual sweep in the devcontainer with the theme toggle, page-by-page screenshot capture (not pixel-snapshotted; just for the tracking doc's findings table), Playwright smoke spec covering the highest-risk surfaces (topology indicators, validation severity tints).

      ## Out of Scope

      - **Color-blind validation + pattern encoding** (`--ft-pattern-encode` toggle, simulator pass). Deferred to a follow-up by user decision 2026-04-28.
      - **Heatmap sliding-window scrubber.** Tracked in `work/gaps.md` §"Heatmap sliding-window scrubber"; needs its own milestone.
      - **Topological focus order on topology Tab walk.** Simple DOM-order Tab walk in this milestone; topological order is a follow-up if the simple model proves disorienting.
      - **Pixel-snapshot regression suite for visual changes.** Manual + smoke-spec only; introducing a pixel-snapshot harness is a separate decision.
      - **New chrome tokens beyond what AC3 settles for `.edge-selected`.** No new token surface; reuse `--ft-highlight` and existing chrome scale.
      - **Mobile / responsive layout audit.** Out of E-21 scope per epic spec.
      - **Heatmap-row warning badges.** M-044 follow-up; not this milestone.
      - **Decomposition / comparison / flow-balance views.** Not E-21 scope.
      - **Editor-time validation surface.** Not E-21 scope; expert-authoring epic.

      ## Dependencies

      - **M-043 Heatmap View** — provides the shared view-state store (`view-state.svelte.ts`) that gains the `selectedEdge` field per AC3, the `selectedCell` field that AC2 reads, and the chrome-token convention (`--ft-pin`, `--ft-highlight`) that AC2 reuses.
      - **M-044 Validation Surface** — provides the validation panel, the severity-row click path that AC3 extends with `setSelectedEdge` for edge rows, the `--ft-warn` / `--ft-err` / `--ft-info` chrome tokens that AC4 audits, and the workbench-card severity dot + FLIP card animation that AC6 ratifies.
      - **dag-map library** at `ui/dag-map/` — AC1's a11y retrofit may add a `renderSVG` option for emitting `tabindex` / `role` / `aria-label` natively. If chosen as the implementation path, the library change must remain general-purpose per ADR-E21-02.
      - **shadcn-svelte `Skeleton`** — AC5 requires this component under `ui/src/lib/components/ui/skeleton/`. Add at start-milestone if not already vendored.

      ## ADRs

      None at draft time. AC1 placement (library vs post-render component) is settled in the tracking doc, not as an ADR — both options are within ADR-E21-02's general-purpose-library spirit. AC3's `.edge-pinned` rename + new `.edge-selected` semantics is a chrome-token decision recorded in tracking-doc Design Notes per the M-042 / M-043 / M-044 precedent.
  - kind: milestone
    id: M-046
    frontmatter:
      title: Rule-Coverage Audit
      status: done
      parent: E-23
    body: |
      ## Goal

      Prove — by file-and-line citation — that `docs/schemas/model.schema.yaml` plus `ModelSchemaValidator` (including any named adjuncts) together enforce every structural and semantic rule about the post-substitution model that any other component currently enforces. Identify every "embedded schema" — every place outside the canonical schema where model rules are re-encoded — and decide for each rule whether it (a) is already covered by the schema, (b) needs to move into the schema in this milestone, (c) needs to live as a named `ModelSchemaValidator` adjunct (alongside `ValidateClassReferences`), (d) is acceptable as parser/emitter logic with documented justification, or (e) is dead and can be dropped. No production code change in this milestone — output is a coverage-audit document that gates M-047. Schema or adjunct edits are landed only when the audit shows a rule would otherwise be lost.

      ## Context

      E-23's spirit, restated post-E-24: **`model.schema.yaml` is the only declarative source of structural truth about the post-substitution model; `ModelSchemaValidator` is the only runtime evaluator.** Any rule encoded elsewhere is an "embedded schema" — a parallel place where model truth lives, and therefore a place that can drift.

      E-24 closed two of the embedments: the *type* (`SimModelArtifact` + `ModelDefinition` collapsed to `ModelDto` in `FlowTime.Contracts`) and the *schema document* (`model.schema.yaml` rewritten top-to-bottom against `ModelDto`, hard-asserted at `val-err == 0` across the twelve templates). That is the foundation. The remaining embedments — the ones E-23 owns — are:

      1. **`src/FlowTime.Core/Models/ModelValidator.cs`** (214 lines) — hand-rolled imperative validator with ~25 rules. It is the validator that actually runs on `POST /v1/run`, the Engine CLI, and inside `TimeMachineValidator` tier-1 today. Sample of rules it enforces:
         - `binMinutes is no longer supported` (legacy field rejection — line 108)
         - `bins must be between 1 and 10000` (range — line 123)
         - `binSize must be between 1 and 1000` (range — line 137)
         - `binUnit must be one of: minutes/hours/days/weeks` (enum — line 155)
         - `expression field is no longer supported, use expr instead` (legacy field — line 175)
         - `schemaVersion must be 1` (const — line 60)
         - Top-level `arrivals`/`route` rejection (legacy shape — lines 39, 43)
      2. **`src/FlowTime.Core/Models/ModelParser.cs`** (733 lines) — parses YAML into `ModelDto` for the Engine. Any tolerated unknown field, any silently-applied default, any "if missing, do X" branch is an unwritten rule.
      3. **`src/FlowTime.Sim.Core/Templates/SimModelBuilder.cs`** (458 lines) — emits `ModelDto`. E-24 closed leaked-state emission (`window`, `generator`, top-level `metadata`, top-level `mode`); this milestone re-checks for any *remaining* implicit emission contract (e.g., default values, conditional field omission) that would constitute an unwritten rule.
      4. **`src/FlowTime.TimeMachine/Orchestration/RunOrchestrationService.cs`** and `src/FlowTime.Core/Graph/GraphService.cs` — post-parse paths that may apply rules (e.g., "node X must reference a defined class") which should either be schema-expressible or live as a named `ModelSchemaValidator` adjunct.

      `ModelSchemaValidator` already runs schema evaluation plus the `ValidateClassReferences` adjunct. If a rule from the audit cannot be expressed declaratively in JSON Schema draft-07 (e.g., cross-reference checks), it lands as a sibling adjunct in `ModelSchemaValidator`. If it can be expressed, it lands in the schema. **There is no third option** — we do not retain a parallel imperative validator, and we do not leave rules implicit in parser/emitter code.

      After this milestone, M-047 has a written contract: every rule has a single canonical home, and that home is reachable from `ModelSchemaValidator.Validate`. The call-site migration is then a mechanical type-name swap.

      ## Acceptance Criteria

      1. **Full embedment inventory.** A machine-reviewable table in the milestone tracking doc enumerates every rule encoded in: (a) `ModelValidator.cs`, (b) `ModelParser.cs` (tolerations, silent defaults, conditional-omission rules), (c) `SimModelBuilder.cs` (post-E-24 — any remaining implicit emission contract), (d) `RunOrchestrationService.cs` and `GraphService.cs` post-parse model checks. Each entry cites file + line range, the rule in plain English, and the expression form (if any) currently in `model.schema.yaml`.
      2. **Per-rule disposition.** For every rule, the table records exactly one of:
         - **schema-covered** — already declared in `model.schema.yaml`, with a line-number citation.
         - **schema-add** — expressible in JSON Schema draft-07 and added to `model.schema.yaml` in this milestone, with a line-number citation to the new declaration.
         - **adjunct** — not expressible declaratively; added to `ModelSchemaValidator` as a named method alongside `ValidateClassReferences`, with a line-number citation to the new method.
         - **parser-justified** — left in parser/emitter code with a written rationale tying it to a `ModelDto` invariant or a YamlDotNet behavior that does not surface as a structural rule (e.g., scalar-style coercion is parser concern, not a model rule). The rationale is written into the audit doc, not just stated.
         - **drop** — has no live consumer and is removed in this milestone, with a one-line note on why dropping is safe.
      3. **Schema additions land.** Any rule classified `schema-add` is added to `docs/schemas/model.schema.yaml` in this milestone. Each addition is accompanied by a one-line citation comment in the schema (`# rule from ModelValidator.cs:N — added m-E23-01`) so future readers can trace the provenance.
      4. **Adjunct additions land.** Any rule classified `adjunct` is added to `ModelSchemaValidator` as a named method invoked from `Validate`. Each adjunct method has at least one unit test that exercises the rule in isolation (red → green from a deliberately-violating model snippet).
      5. **Coverage canary stays green.** After all schema and adjunct additions, `TemplateWarningSurveyTests.Survey_Templates_For_Warnings` continues to report `val-err == 0` across all twelve templates at `ValidationTier.Analyse`. The canary is the regression guard — adding rules must not break currently-valid templates.
      6. **Negative-case canary.** A new test (`tests/FlowTime.Core.Tests/Schema/RuleCoverageRegressionTests.cs` or equivalent location) feeds a deliberately-invalid model snippet for each non-trivial rule covered by the audit and asserts `ModelSchemaValidator.Validate(...).IsValid == false`. This is the proof that `ModelSchemaValidator` actually catches every rule the audit claims it covers, before M-047 routes production traffic through it.
      7. **No call-site migration in this milestone.** `grep -rn "ModelValidator\.Validate" --include="*.cs"` outside `.claude/worktrees/` returns the same call sites at the end of the milestone as at the start. The only allowed production-code diffs are: schema edits in (3), adjunct additions in (4), unit tests in (4) and (6). `ModelValidator.cs` is unchanged in this milestone — it is still the validator on the `/v1/run` and CLI paths.
      8. **No behaviour regression.** `dotnet test FlowTime.sln` is green (baseline + the new negative-case canary). UI suites untouched. `POST /v1/run` continues to accept every currently-valid template because `ModelValidator` — still the active `/v1/run` validator — is unmodified.
      9. **Audit doc committed.** The tracking doc `m-E23-01-rule-coverage-audit-tracking.md` lives in the epic folder and contains the full embedment table, per-rule disposition, schema-edit / adjunct-edit citations, and the negative-case test catalogue. Reviewable at PR time without running any tool.

      ## Constraints

      - **Schema-first preference.** When a rule is expressible in JSON Schema draft-07, it belongs in the schema, not as an adjunct. The schema already declares enums (`binUnit`), ranges (via `minimum`/`maximum`), const values (`schemaVersion: 1`), and additionalProperties policies. A rule should only become an adjunct when JSON Schema draft-07 *cannot* express it (cross-field references, conditional rules dependent on runtime data).
      - **No schema-draft bump.** The schema declares `$schema: "https://json-schema.org/draft-07/schema#"`. If a rule cannot be expressed in draft-07 but could be expressed in draft-2020-12, it lands as an adjunct, not a draft bump. Draft migration is a separate concern.
      - **Parser-justified is a written justification, not a default.** If a rule lands in `parser-justified`, the audit doc must answer: "why is it not a model rule?" Acceptable answers are narrow — typically "this is a YAML representation concern, not a model concern" (e.g., `ParseScalar` style handling, fixed by E-24 M-052). "It's hard to move" is not a justification.
      - **No reintroduction of deprecated fields.** `binMinutes` rejection stays. Legacy `arrivals`/`route` rejection stays. Legacy node-level `expression` rejection stays. These rules must have a home in the schema by milestone close.
      - **Cross-repo grep included.** The audit grep extends to sibling checkouts visible from this workspace (treated read-only). If `ModelValidator` is referenced from a sibling (`flowtime-sim-vnext`, MCP, etc.), the audit notes it; M-047 either absorbs the migration or coordinates deletion with the sibling.

      ## Design Notes

      - The audit is structured as one table-row per rule, not per file. A rule like "`bins` must be between 1 and 10000" gets one row even if it is enforced at multiple sites today; the disposition column then says where it ends up post-milestone.
      - For `ModelValidator.cs`, expect 20–25 rule rows (rough count from a glance at the file). For the parser and emitter, expect 5–15 rows each. For orchestration / graph services, expect 0–5 rows.
      - The negative-case canary tests are small and focused. One short model snippet per rule, deliberately violating the rule, asserting the validator catches it. Total file size under 500 lines.
      - Adjunct methods follow `ValidateClassReferences`'s shape: a `private static` method on `ModelSchemaValidator` that reads `ModelDto` (post-parse) and adds errors to the result. They run after JSON-schema evaluation, not before.
      - The tracking doc is the deliverable. The schema and adjunct edits are by-products of doing the audit honestly.

      ## Surfaces touched

      - `work/epics/E-23-model-validation-consolidation/m-E23-01-rule-coverage-audit-tracking.md` (new)
      - `docs/schemas/model.schema.yaml` (additions only, with citation comments)
      - `src/FlowTime.Core/Models/ModelSchemaValidator.cs` (adjunct additions only — no rewiring of existing logic)
      - `tests/FlowTime.Core.Tests/Schema/RuleCoverageRegressionTests.cs` (new, or analogous filename)

      ## Out of Scope

      - Any edit to `ModelValidator.cs`, any call-site migration, any deletion — M-047 and M-048 territory.
      - Any edit to Sim's emission shape beyond what the audit identifies as a rule. E-24 closed leaked-state emission; the audit only revisits the emitter if a rule is unwritten there.
      - Any UI change. Blazor and Svelte surfaces stay on their current contracts.
      - Rewording or restructuring of `ModelSchemaValidator`'s existing error messages — error-phrasing is M-047's concern.
      - Schema-draft migration (draft-07 → draft-2020-12).

      ## Dependencies

      - Epic E-23 spec ratified (this milestone is the audit gate; without it M-047 risks silent rule loss).
      - E-24 Schema Alignment closed (cleared 2026-04-25, `D-2026-04-25-038`).
      - Epic integration branch `epic/E-23-model-validation-consolidation` exists and is based on `main` post-E-24 merge.

      ## References

      - Epic spec: `work/epics/E-23-model-validation-consolidation/spec.md`
      - E-24 closure: `work/decisions.md` → `D-2026-04-25-038`
      - Truth Discipline (2026-04-23): `.ai-repo/rules/project.md` → `"'API stability' does not mean 'keep old functions around.'"` + `"Do not let adapter/UI projection become the only place where semantics exist"` + `"Do not restate a canonical contract in many places from memory"`
      - Current ModelValidator: `src/FlowTime.Core/Models/ModelValidator.cs` (214 lines)
      - Current ModelSchemaValidator: `src/FlowTime.Core/Models/ModelSchemaValidator.cs` (263 lines)
      - Current ModelParser: `src/FlowTime.Core/Models/ModelParser.cs` (733 lines)
      - Current SimModelBuilder: `src/FlowTime.Sim.Core/Templates/SimModelBuilder.cs` (458 lines)
      - Schema: `docs/schemas/model.schema.yaml`
      - Canary: `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs` (committed and hard-asserting per E-24 M-053)
  - kind: milestone
    id: M-047
    frontmatter:
      title: Call-Site Migration
      status: done
      parent: E-23
    body: |
      ## Goal

      Switch every production call site that invokes `ModelValidator.Validate` to `ModelSchemaValidator.Validate`, and migrate any test that exercises `ModelValidator` in isolation. Audit error-message phrasing and update API contract / test assertions where needed. `ModelValidator.cs` is left on disk but reaches zero production call sites at this milestone's close; deletion lands in M-048.

      ## Context

      After M-046 the schema and `ModelSchemaValidator`'s adjuncts together cover every rule the embedment audit identified — by construction, every rule that `ModelValidator` enforces also fails `ModelSchemaValidator`'s evaluation, proven by the negative-case canary catalogue. The two validators are now behaviourally compatible on both the success path (E-24's `val-err == 0` canary) and the failure path (M-046's negative-case canary).

      Call-site migration is mostly mechanical — replace the type name at each call site — but one concern is real: error phrasing differs. `ModelValidator` returns flat strings like `"Grid must specify bins"`; `ModelSchemaValidator` returns JSON-schema-shaped messages like `/grid/bins: Required properties are missing: [bins]`. Tests that assert on exact phrasing and any UI / CLI consumer that surfaces error strings verbatim must be audited and updated.

      This milestone intentionally stops before deletion so rollback is cheap. If something goes sideways, a single-commit revert takes the migration back to `ModelValidator` without losing the M-046 audit, schema additions, or adjunct methods.

      ## Acceptance Criteria

      1. **Call-site enumeration is fresh.** First action of the milestone: `grep -rn "ModelValidator\.Validate" --include="*.cs"` outside `.claude/worktrees/`. Record the live list in the tracking doc — line numbers must be the live ones at start-milestone time, not cached from this spec. Today's enumeration (subject to refresh at start) is three production sites and four test files:
         - `src/FlowTime.API/Program.cs` (`POST /v1/run` validation block)
         - `src/FlowTime.Cli/Program.cs` (Engine CLI `run` entry)
         - `src/FlowTime.TimeMachine/Validation/TimeMachineValidator.cs` (the redundant delegation alongside the existing `ModelSchemaValidator.Validate` call — remove the `ModelValidator` line, keep the `ModelSchemaValidator` line as the whole of tier-1 schema check)
         - `tests/FlowTime.Integration.Tests/SimToEngineWorkflowTests.cs`
         - `tests/FlowTime.Tests/Schema/TargetSchemaValidationTests.cs`
         - `tests/FlowTime.Tests/Schema/SchemaVersionTests.cs`
         - `tests/FlowTime.Tests/Schema/SchemaErrorHandlingTests.cs`
      2. **Production call sites migrated.** Each production call site (the three above, post-refresh) passes through `ModelSchemaValidator.Validate` instead. The production diff is small — type name swap plus, where needed, error-shape adaptation at the response site.
      3. **Test suite migrated.** The three `tests/FlowTime.Tests/Schema/*.cs` files referencing `ModelValidator.Validate` are rewritten to assert against `ModelSchemaValidator`. Each individual assertion falls into one of: (a) kept as-is because `ModelSchemaValidator` already covers it identically, (b) updated to match the new error-message format, (c) relaxed to assert on semantic properties (`IsValid == false`, at least one error containing a specified substring or matching a specified pattern) when exact phrasing is not contract-meaningful, (d) deleted because it asserts an internal `ModelValidator` detail not reachable from `ModelSchemaValidator`. The tracking doc records which bucket each assertion fell into. `SimToEngineWorkflowTests.cs` lines using `ModelValidator.Validate` are updated to `ModelSchemaValidator.Validate`.
      4. **Error-phrasing audit recorded.** The tracking doc includes a before/after table for the representative invalid-model corpus (missing `bins`, missing `grid`, wrong `schemaVersion`, legacy top-level `arrivals`, legacy node-level `expression`, legacy `binMinutes`): `ModelValidator` message vs. `ModelSchemaValidator` message, plus a note on any downstream consumer (UI, CLI stdout, API response) that surfaces the string directly.
      5. **API contract preserved.** `POST /v1/run` continues to return HTTP 400 with a `{ "error": "..." }` JSON body for invalid models. The `error` string may be differently phrased, but the shape — one JSON field, semicolon-joined on multi-error — is identical. API contract tests are green.
      6. **CLI stderr output preserved.** `dotnet run --project src/FlowTime.Cli` on an invalid model continues to write `Model validation failed:` followed by one `  - <msg>` line per error, returning exit code 1. Tests (if any) and manual smoke are green.
      7. **`ModelValidator` has zero production callers.** `grep -rn "ModelValidator\.Validate\|ModelValidator\b" --include="*.cs"` outside `.claude/worktrees/` returns matches only inside `src/FlowTime.Core/Models/ModelValidator.cs` itself. No `.cs` file outside that one references the type by name.
      8. **Full .NET suite green.** `dotnet test FlowTime.sln` passes. Both canaries — E-24's `TemplateWarningSurveyTests` (`val-err == 0`) and M-046's `RuleCoverageRegressionTests` — stay green. No Svelte/Blazor/UI regressions (those surfaces are unmodified but smoke-checked via existing Playwright specs running against a live engine).
      9. **Optional: latency delta recorded.** If measurable with reasonable effort (e.g., a single warm-run timing of `POST /v1/run` against a representative template before and after), the tracking doc records the `ModelValidator` → `ModelSchemaValidator` latency delta. Non-blocking; documented as informational.

      ## Constraints

      - No change to `ModelValidator.cs` in this milestone. It stays on disk unreferenced outside its own file so a revert-migration is a single commit.
      - No schema or adjunct addition — that was M-046's territory. If a rule gap surfaces during the phrasing audit, treat it as an M-046 scope escape and return to that milestone rather than fixing forward.
      - Do not "improve" `ModelSchemaValidator` error messages to match `ModelValidator`'s phrasing. The shape is the JSON-schema shape. If a consumer surfaces raw strings, that consumer updates — not the validator.
      - Do not introduce a `ModelValidator` → `ModelSchemaValidator` forwarding shim as a stepping stone. Direct call-site replacement only (per ADR-E-23-01).

      ## Design Notes

      - The `TimeMachineValidator.ValidateSchema` method currently invokes both validators and concatenates errors. After this milestone it invokes only `ModelSchemaValidator`. Confirm that the `TimeMachineValidator` tier-1 contract (schema-only checks) is semantically preserved — any test that sent a model with a legacy field like `arrivals` at root level and expected a tier-1 error must still receive a tier-1 error, because `ModelSchemaValidator` catches it via root `additionalProperties: false`.
      - When updating test phrasing, prefer semantic assertions (`errors.Should().Contain(e => e.Contains("bins"))`) over exact-string assertions where the exact string is not the contract.
      - The CLI and API both surface error strings to end users. Inspect the UIs (Blazor `ModelEditor.razor`, any Svelte form) to confirm no regex-parses the validator output. Spot-check via test, not just grep.

      ## Surfaces touched

      - `src/FlowTime.API/Program.cs`
      - `src/FlowTime.Cli/Program.cs`
      - `src/FlowTime.TimeMachine/Validation/TimeMachineValidator.cs`
      - `tests/FlowTime.Integration.Tests/SimToEngineWorkflowTests.cs`
      - `tests/FlowTime.Tests/Schema/TargetSchemaValidationTests.cs`
      - `tests/FlowTime.Tests/Schema/SchemaVersionTests.cs`
      - `tests/FlowTime.Tests/Schema/SchemaErrorHandlingTests.cs`
      - `work/epics/E-23-model-validation-consolidation/m-E23-02-call-site-migration-tracking.md` (new)

      ## Out of Scope

      - Deleting `ModelValidator.cs` — that is M-048.
      - Any error-message rewording inside `ModelSchemaValidator`.
      - Any schema or adjunct addition.
      - Any UI code change, unless the phrasing audit uncovers a regex-parse consumer, in which case the UI update is the minimum needed to preserve user-visible behaviour.

      ## Dependencies

      - M-046 complete and merged into `epic/E-23-model-validation-consolidation` (audit done; schema and adjuncts cover every rule).

      ## References

      - Epic spec: `work/epics/E-23-model-validation-consolidation/spec.md`
      - M-046 spec and tracking doc (rule audit + negative-case canary catalogue)
      - Tiered validator: `src/FlowTime.TimeMachine/Validation/TimeMachineValidator.cs`
      - ADR-E-23-01 (delete, do not delegate) in epic spec
  - kind: milestone
    id: M-048
    frontmatter:
      title: Delete `ModelValidator`
      status: done
      parent: E-23
    body: |
      ## Goal

      Delete `src/FlowTime.Core/Models/ModelValidator.cs` and any remaining tests that exist solely to exercise it. After this milestone, `ModelSchemaValidator.Validate` is the single model-YAML validator in the codebase.

      ## Context

      After M-047 `ModelValidator` has zero production callers and its dedicated test files have been rewritten to target `ModelSchemaValidator`. The type is dead weight — kept on disk only as a rollback seam during M-047. This milestone removes that seam.

      Per the 2026-04-23 Truth Discipline guard, retaining an unreferenced entry point "under the banner of keeping the existing surface stable" is explicitly disallowed. The Goal of this milestone is simply to enforce that guard on the `ModelValidator` case that motivated adding the guard in the first place.

      ## Acceptance Criteria

      1. **File deleted.** `src/FlowTime.Core/Models/ModelValidator.cs` is removed from the repository. `git log -- src/FlowTime.Core/Models/ModelValidator.cs` shows the deletion commit as most recent.
      2. **`ValidationResult` retained.** The `ValidationResult` class (currently defined at the bottom of `ModelValidator.cs`, lines 205–214) is moved to its own file `src/FlowTime.Core/Models/ValidationResult.cs` before the delete — it is shared between `ModelSchemaValidator`, `TimeMachineValidator`, and callers. The move is a pure relocation with no API change.
      3. **Zero `ModelValidator` references.** `grep -rn "ModelValidator\\b" --include="*.cs"` returns zero hits across the whole repository except for comments or commit messages that reference it by name historically. No `using` statement, no method call, no type reference.
      4. **Full test suite green.** `dotnet test FlowTime.sln` passes. `dotnet build FlowTime.sln` has no warnings about missing types (CS0246) and no warnings about unused usings introduced by the delete.
      5. **Both canaries still green.** `TemplateWarningSurveyTests.Survey_Templates_For_Warnings` reports `val-err == 0` across all twelve templates at `ValidationTier.Analyse` (E-24 M-053's hard-asserting survey canary), and `RuleCoverageRegressionTests` (M-046's negative-case catalogue) reports green — every rule the audit claimed `ModelSchemaValidator` covers, it still catches after the delete. Both canaries are the final confirmation that nothing depends on `ModelValidator` post-deletion.
      6. **Smoke verification across surfaces.** Manual smoke-run of: (a) `POST /v1/run` with a representative template via the Engine API, (b) the Engine CLI `dotnet run --project src/FlowTime.Cli` against the same template, (c) `POST /v1/validate` via the Time Machine surface, (d) one Blazor page that renders a validated model (e.g., Dashboard), (e) one Svelte page that validates a model indirectly (e.g., `/analysis` sweep configuration). All five behave identically to pre-delete.
      7. **Epic close.** On merge to `main`, the E-23 epic status flips from `in-progress` to `complete` and the epic folder is archived under `work/epics/completed/E-23-model-validation-consolidation/`. `ROADMAP.md`, `work/epics/epic-roadmap.md`, and `CLAUDE.md` Current Work are updated to reflect completion.

      ## Constraints

      - No functional change. The only allowed diffs are: (1) delete `ModelValidator.cs`, (2) move `ValidationResult` to its own file, (3) remove any now-unused `using` statements that referenced the deleted type, (4) remove any dedicated `ModelValidator`-only test files that survived M-047.
      - If step 3 or 4 requires more than trivial edits — e.g., an `.editorconfig` or `Directory.Build.props` rule references the deleted file — pause and check whether the original migration missed a call site, rather than forcing the delete forward.
      - Rollback must remain a single `git revert` for at least the M-048 merge commit. Keep the delete in one commit; do not mix in any other refactor.

      ## Design Notes

      - `ValidationResult` belongs to the validators; moving it to `ValidationResult.cs` keeps `FlowTime.Core.Models` tidy post-delete. Namespace stays `FlowTime.Core` (same as today — `ModelValidator.cs` declares its types in that namespace, not `FlowTime.Core.Models`).
      - Expect a handful of `using FlowTime.Core;` removals where the using was imported solely for `ModelValidator` and is now unused. Let the compiler find them.

      ## Surfaces touched

      - `src/FlowTime.Core/Models/ModelValidator.cs` (deleted)
      - `src/FlowTime.Core/Models/ValidationResult.cs` (new, content moved from deleted file)
      - Possibly a small number of unused-using cleanups across the solution
      - `work/epics/E-23-model-validation-consolidation/m-E23-03-delete-model-validator-tracking.md` (new)
      - `ROADMAP.md`, `work/epics/epic-roadmap.md`, `CLAUDE.md` (epic-completion housekeeping)

      ## Out of Scope

      - Any change to `ModelSchemaValidator.cs` — if the delete reveals `ModelSchemaValidator` is missing a rule the audit should have caught, treat that as an M-046 scope escape (the negative-case canary should have caught it; if it didn't, the audit was incomplete).
      - Any change to schema, API, CLI, UI, or Sim code.
      - Any refactor of validation beyond the delete — no folding of `TimeMachineValidator.ValidateSchema` into `ModelSchemaValidator`, no introduction of new validation surfaces.

      ## Dependencies

      - M-047 complete and merged into `epic/E-23-model-validation-consolidation`.
      - `ModelValidator` has zero production callers (M-047 AC6 is the precondition for AC3 here).

      ## References

      - Epic spec: `work/epics/E-23-model-validation-consolidation/spec.md`
      - M-047 tracking doc (final migration state)
      - Truth Discipline guard (2026-04-23): `.ai-repo/rules/project.md` → `"'API stability' does not mean 'keep old functions around.'"`
  - kind: milestone
    id: M-049
    frontmatter:
      title: Inventory and Design Decisions
      status: done
      parent: E-24
    body: |
      ## Goal

      Doc-only milestone. Produce the design-decision baseline the rest of E-24 executes against. Every field currently on `SimModelArtifact` and `ModelDefinition` gets a recorded decision (keep / drop / move into `provenance`) with rationale. The six open questions in the epic spec are resolved. The unified type's home, name, and provenance shape are named. The output is the resolution plan that M-050 through M-053 land without further design debate.

      ## Context

      The epic's Option E framing (unify `SimModelArtifact` and `ModelDefinition` into a single type, forward-only) is ratified at the strategy level. This milestone turns that strategy into actionable per-field decisions and answers every design question M-050 will need before it can start. Before unification changes any code, the foundational frame requires a written decision per field — the "easy option vs foundationally-right option" discipline from the user's "absolutely correct, future-proof. No fixes because they are easy. Do the right thing." direction.

      Input material:

      - **Investigation output (agent `a5aa3dfe26394aff5`):** the `SimModelArtifact` purpose analysis that established the split was accidental, not designed. Findings embedded in the epic spec's Context section.
      - **Survey output (agent `a07d52c12dcaf3538`):** the 16-row divergence table and full-shape audit in `work/epics/E-23-model-validation-consolidation/m-E23-01-schema-alignment-tracking.md` → "AC4 canary re-run, full-shape audit (2026-04-24)".
      - **Uncommitted M-046 schema edits on branch `milestone/m-E23-01-schema-alignment`:** three schema additions (`grid.start`, `nodes[].metadata`, `nodes[].source`) — re-examined here under the unification framework, not treated as commitments.

      The inventory covers the full union of fields on `SimModelArtifact` and `ModelDefinition` plus every distinct shape the survey identified. Each row ends with a named decision; no row remains open.

      ## Acceptance Criteria

      1. **Full-field inventory complete.** The milestone tracking doc contains a row-per-field table covering every public member of `SimModelArtifact` and `ModelDefinition`, plus every distinct shape the M-046 survey identified. Each row names: field path, emitter / producer (Sim or Engine), consumer (file:line if any) or "no consumer" (with grep verification note), current schema declaration, classification (keep-as-is / rename / move-to-provenance / drop / open), and decision column with chosen side.
      2. **The six epic-spec open questions resolved.** For each question in the epic spec's Open Questions table, the tracking doc records the decision, the rationale, and the rejected alternative(s). Minimum answers required:
         - Unified type home (`FlowTime.Core` vs `FlowTime.Contracts` vs new namespace).
         - Unified type name (does `ModelDefinition` stay, or does it get renamed).
         - `outputs[].as` semantics (optional + emitter omits, or required + emitter synthesizes with named convention).
         - `nodes[].source` forward contract (drop until E-15, or declare optional now).
         - Provenance shape (flat vs nested, specifically for `parameters`).
         - Canary variant for M-053 (integration test vs fast unit-style vs both).
      3. **Leaked-state fields have drop plans.** `window`, `generator`, top-level `metadata`, and top-level `mode` each have a decision row. Default disposition is "drop from emission" with grep evidence that no Engine consumer reads them. If any row deviates (e.g. "move into `provenance`"), the new location and reader are named.
      4. **`SimModelArtifact` satellite types have disposition plans.** `SimNode`, `SimOutput`, `SimProvenance`, `SimTraffic`, `SimArrival`, `SimArrivalPattern` each have a row naming whether they merge into the unified type's equivalents (`NodeDefinition`, `OutputDefinition`, etc.) as-is, with changes, or get deleted entirely. Any field asymmetries between Sim-side and Engine-side types (e.g. `SimNode` has fields `NodeDefinition` lacks, or vice versa) are flagged with a keep / drop decision.
      5. **`provenance` block is named in full.** The final list of fields on the unified `provenance` block is written out with camelCase keys. Each field has a consumer citation and a rationale for inclusion. `schemaVersion` duplicate is decided (default: drop from provenance — top-level owns). `mode` is decided (default: keep in provenance as traceability; drop from top-level emission since Engine does not read it).
      6. **Uncommitted M-046 schema edits re-examined.** `grid.start`, `nodes[].metadata`, `nodes[].source` each have explicit keep / modify / revert decisions with rationale:
         - `grid.start`: default keep (Engine consumer confirmed at `ModelParser.cs:62`). Verify under unification.
         - `nodes[].metadata`: default keep (`GraphService.ResolveDisplayKind`, `StateQueryService.cs:2162`, `RunArtifactWriter.cs:516` are all consumers). Verify.
         - `nodes[].source`: default revert (no consumer until E-15). Confirm E-15 starts aligned from this baseline.
      7. **Forward-only disposition confirmed.** The tracking doc names every code path that might read the old two-type YAML shape (fixtures, sample bundles, test helpers, any bundle reader) and its disposition: regenerate, delete, or (rarely) document as historical reference. No compatibility reader survives.
      8. **No production change.** Diff against `epic/E-24-schema-alignment` touches only this tracking doc, this milestone spec, and (optionally) reference-pointer updates in the epic spec. No edits to `src/`, `tests/`, `docs/schemas/`, or other code-bearing surfaces. Full `.NET` test suite is green throughout (untouched baseline).

      ## Constraints

      - **Decisions are recorded, not deferred.** Every row ends with a named resolution side. "Punt to E-15" is acceptable only when the decision itself is "defer the contract to E-15 and remove any forward-declared schema entry in the meantime" — i.e. a decision, not a question.
      - **"Easy option" is named even when rejected.** Every row documents what the reflex fix would have been (most commonly "schema-widen and accept the current emission"), so the reviewer and future readers see what we explicitly chose not to do. Without the rejected option on record, the epic loses the "right, not easy" frame.
      - **Unification is the baseline.** Every decision assumes the unified type exists. Rows do not leave open the possibility of preserving two types — Option A has been ratified rejected at the epic level. Rows can still debate where fields live inside the unified type (top-level vs provenance), but not whether to maintain two types.
      - **Forward-only is the baseline.** Every decision assumes no compatibility reader. Rows cannot resolve to "keep both shapes during a migration window" — migration windows are out of scope per the epic's constraints.
      - **Citation discipline.** Every claim that a field has a consumer includes a `file:line` pointer. Claims that a field has no consumer include a `grep` command so reviewers can reproduce. Claims that a field is load-bearing include a reader line that exercises it.
      - **No emoji, no icons, no time estimates.** Plain tables, plain prose.

      ## Design Notes

      - Drafting order:
        1. Read `SimModelArtifact.cs` and `ModelDefinition.cs` side-by-side. List every public member on each.
        2. Build the unified-field inventory as the union, flagging each as "shared" (present on both with matching shape), "Sim-only" (present only on `SimModelArtifact`), or "Engine-only" (present only on `ModelDefinition`).
        3. For every Sim-only field, check Engine consumers with `rg` against `src/FlowTime.Core` and `src/FlowTime.TimeMachine`. No consumer → default decision "drop from emission."
        4. For every Engine-only field, check Sim producers. If Sim never emits, the field remains optional in the unified type (Engine-computed or Engine-default).
        5. Named decisions: unified type home, unified type name, provenance shape.
        6. Satellite type disposition: one row per Sim-side satellite type (`SimNode` / `SimOutput` / `SimProvenance` / `SimTraffic` / `SimArrival` / `SimArrivalPattern`).
        7. Open-question answers: each of the six epic-spec questions gets its row.
        8. Re-examine the three uncommitted M-046 schema edits under the unification framework.
        9. Forward-only disposition: enumerate every consumer of the old two-type YAML shape and name its fate.
        10. Consistency check: walk the inventory and the satellite list; confirm no field is orphaned, duplicated, or contradicted.
      - The M-046 tracking doc's histogram (count, shape, category) is the authoritative source for which shapes surfaced in the canary. The inventory here extends those shapes into resolution columns.
      - The "easy option" for most Sim-only fields is "declare in the schema as optional pass-through." The "foundationally-right option" under Option E is "drop from emission because no Engine consumer reads it." Use this as the default frame; deviate only when there is a consumer.

      ## Surfaces touched

      - `work/epics/E-24-schema-alignment/m-E24-01-inventory-and-design-decisions-tracking.md` (new, on milestone start)
      - (optionally) `work/epics/E-24-schema-alignment/spec.md` — update references or ADR text if M-049 ratifies a candidate ADR

      ## Out of Scope

      - Any edit to `docs/schemas/model.schema.yaml` — that belongs to M-051.
      - Any edit to `SimModelArtifact`, `SimModelBuilder`, `ModelDefinition`, `ModelParser`, or emitter / parser logic — that belongs to M-050.
      - Any edit to `ModelSchemaValidator` or `TemplateSchemaValidator` — that belongs to M-052.
      - Any change to `TemplateWarningSurveyTests.cs` — that belongs to M-053.
      - Re-running the survey or the full-shape audit — the M-046 data is the input.
      - Writing the unified type. This milestone decides what to write; M-050 writes it.

      ## Dependencies

      - Epic `E-24-schema-alignment` spec approved (Option E framing ratified).
      - Epic integration branch `epic/E-24-schema-alignment` exists.
      - Access to the M-046 tracking doc (held on branch `milestone/m-E23-01-schema-alignment` as stashed / uncommitted input material).
      - Access to the `SimModelArtifact` purpose investigation output (embedded in the epic spec Context section).

      ## References

      - Epic spec: `work/epics/E-24-schema-alignment/spec.md` (Option E framing, the six open questions)
      - Investigation: agent `a5aa3dfe26394aff5` — `SimModelArtifact` purpose analysis; findings embedded in epic spec Context
      - Survey evidence: `work/epics/E-23-model-validation-consolidation/m-E23-01-schema-alignment-tracking.md` → "AC4 canary re-run, full-shape audit (2026-04-24)"
      - Survey agent: `a07d52c12dcaf3538`
      - Uncommitted M-046 schema edits: `docs/schemas/model.schema.yaml` at branch `milestone/m-E23-01-schema-alignment` (stashed)
      - Decision precedent: D-048 (E-23 ratification), D-049 (E-23 pause, E-24 creation, Option E ratified within E-24 planning)
      - Truth Discipline guards: `.ai-repo/rules/project.md`
  - kind: milestone
    id: M-050
    frontmatter:
      title: Unify Model Type
      status: done
      parent: E-24
    body: |
      ## Goal

      Collapse `SimModelArtifact` and `ModelDefinition` into a single unified post-substitution model type. `SimModelBuilder` emits the unified type directly; the Engine parses and consumes the unified type directly; no projection layer, no second type, no compatibility reader for the old two-type shape. `SimModelArtifact` and its satellite types (`SimNode`, `SimOutput`, `SimProvenance`, `SimTraffic`, `SimArrival`, `SimArrivalPattern`) are **deleted** in this milestone — Truth Discipline: no callers left, delete. Leaked-state fields identified in M-049 (`window`, `generator`, top-level `metadata`, top-level `mode`) are dropped from emission. Test fixtures and sample bundles are regenerated under the unified shape. This is the largest architectural change in E-24.

      ## Context

      M-049 ratified Option E and produced the per-field decision baseline:

      - The unified type's home and name are named.
      - Every field has a keep / rename / drop / move-to-provenance decision.
      - Every satellite Sim-side type has a disposition (merge into existing Engine-side equivalent, or delete).
      - `provenance` block's final field list is named with camelCase keys.
      - Forward-only disposition is confirmed for every code path that currently reads the old two-type YAML shape.

      This milestone implements those decisions. It is the single milestone where code shape changes — schema (M-051), validator (M-052), and canary (M-053) follow what this milestone builds.

      ## Acceptance Criteria

      1. **Unified type exists at its ratified home.** The type named in M-049 lives at its ratified namespace and name. A reader who opens `POST /v1/run`'s handler can follow the type reference to a single definition that represents the full post-substitution model.
      2. **`SimModelBuilder` emits the unified type directly.** `SimModelBuilder.Build(...)` returns the unified type (or an immutable value carrying it). No intermediate `SimModelArtifact` instance is constructed as a bridge. The serialization path produces YAML matching the unified schema shape.
      3. **Engine intake parses the unified type directly.** Every YAML → runtime model path on the Engine side passes through the unified type before reaching `ModelDefinition`. The canonical path is `ModelService.ParseYaml(yaml) → ModelDto → ModelService.ConvertToModelDefinition(dto) → ModelDefinition → ModelParser.ParseModel(ModelDefinition)`. No Engine-side site deserializes YAML directly into `ModelDefinition` or `SimModelArtifact`. `RunOrchestrationService.cs:627` (and siblings `:813`, `:838`, `:861`) and any other YAML-intake call site operates on `ModelDto`.
      4. **`SimModelArtifact` is deleted.** `src/FlowTime.Sim.Core/Templates/SimModelArtifact.cs` is removed from the repo. `grep -rn "SimModelArtifact" --include='*.cs'` returns zero hits.
      5. **Satellite Sim-side types are deleted.** `SimNode`, `SimOutput`, `SimProvenance`, `SimTraffic`, `SimArrival`, `SimArrivalPattern` are removed from the repo. Each satellite either merged into the unified type's equivalent (per M-049) or was deleted because it had no consumer. `grep -rn "SimNode\b\|SimOutput\b\|SimProvenance\b\|SimTraffic\b\|SimArrival\b\|SimArrivalPattern\b" --include='*.cs'` returns zero hits.
      6. **Leaked-state fields dropped from emission.** Per M-049's decisions, `window`, `generator`, top-level `metadata`, and top-level `mode` no longer appear in emitted YAML. Whatever traceability content was meaningful has been moved into `provenance`.
      7. **`POST /v1/run` byte-identical success.** For every template in `templates/*.yaml` with default parameters, `POST /v1/run` returns the same response body pre- and post-m-E24-02. The pre-/post-comparison is captured in the tracking doc as explicit evidence (JSON response diff on at least three representative templates: one minimal, one with PMF nodes, one with classes).
      8. **`POST /v1/validate` at Analyse.** The canary `TemplateWarningSurveyTests` is run pre- and post-m-E24-02. The non-`ParseScalar` portion of `val-err` (the four top-level leaked-state shapes, the provenance snake_case shapes, the outputs shapes, the empty-classes shape) drops to zero post-m-E24-02. The `ParseScalar` residual (~231 errors) remains until M-052 lands. The tracking doc captures the full residual histogram.
      9. **Fixtures and samples regenerated.** Every test fixture, sample bundle, and reference YAML under `tests/` and `docs/samples/` (or equivalent paths) is regenerated under the unified shape in this milestone. No compatibility reader survives. Any fixture that cannot be regenerated is deleted with a tracking-doc note explaining why.
      10. **`SimModelBuilder` tests updated in place.** Tests in `tests/FlowTime.Sim.Tests` that asserted the presence of `SimModelArtifact` fields (e.g. `window.start`, top-level `metadata`, provenance snake_case keys) are updated to assert against the unified shape or deleted if the test's only purpose was asserting drift.
      11. **Engine tests updated in place.** Tests in `tests/FlowTime.Core.Tests`, `tests/FlowTime.Api.Tests`, `tests/FlowTime.TimeMachine.Tests`, and `tests/FlowTime.Integration.Tests` that author `ModelDefinition` instances directly are updated to author the unified type.
      12. **Forward-only guard.** No compatibility reader for the old two-type YAML shape exists at epic-branch tip after this milestone. Any legacy-shape detection code that appeared during refactor is deleted in the same change.
      13. **Full `.NET` test suite green.** `dotnet test FlowTime.sln` passes. No new regressions beyond the known validator residuals (tracked in AC8) which close in M-051 and M-052.
      14. **Branch coverage complete.** Every reachable branch added or modified in `SimModelBuilder`, the unified type's serializer hooks, and the Engine's parser is exercised by at least one test. Node-kind variants (value / expr / pmf / inflow / outflow), empty-collection cases (no classes, no outputs, no provenance), and optional-field absence (`grid.start` omitted, `nodes[].source` omitted per M-049 decision) each have coverage.

      ## Constraints

      - **One type, one change.** The unified type exists after this milestone. No transitional phase where both `SimModelArtifact` and the unified type coexist. The delete happens in the same change that introduces the unified type.
      - **Forward-only is non-negotiable.** No compatibility reader for the old two-type YAML. No "accept either shape" branch. If a test or fixture authored the old shape, it is regenerated or deleted here.
      - **Byte-identical `/v1/run` success is non-negotiable.** The diff evidence in AC7 must be zero for the representative templates. A byte-level diff indicates a defect in the unification and blocks milestone wrap.
      - **Test-fixture churn is acceptable.** Tests that authored `SimModelArtifact` directly are rewritten. No compatibility reader in test helpers.
      - **Emission stays declarative.** YamlDotNet serialization attributes (`[YamlMember]`, `[YamlIgnore]`) plus `DefaultValuesHandling.OmitNull | OmitEmptyCollections` configured on the `SerializerBuilder` are the mechanism for omitting leaked-state and absent fields — not custom string manipulation. The emitter's behavior is inspectable from the type definition. **Note:** YamlDotNet does not honor a `ShouldSerialize{X}()` convention — that is a Json.NET / `XmlSerializer` pattern. Per D-m-E24-02-03, all `ShouldSerialize*` shims that survive into M-050 either die with their host type (`SimNode`, `LegacyStart`) or are replaced by nullable-property + `OmitNull` semantics.
      - **No Sim→Engine dependency inversion.** The unified type lives at its M-049 home. If that home is `FlowTime.Contracts`, both Sim and the Engine reference it — Sim already references `FlowTime.Contracts`, and the Engine likewise. If the home is `FlowTime.Core`, Sim adds the reference. The Engine never references Sim.

      ## Design Notes

      - **Order of work:**
        1. Introduce the unified type at its ratified home with all fields from M-049's final list.
        2. Switch the Engine side first: make `ModelParser.ParseFromCoreModel` read the unified type. Keep `SimModelArtifact` alive at this point.
        3. Switch `SimModelBuilder.Build` to emit the unified type. Now nothing reads `SimModelArtifact`.
        4. Delete `SimModelArtifact` and its satellites. Run `grep` to confirm zero callers.
        5. Regenerate fixtures. Run the full test suite and the canary.
      - **Emitter attributes.** YamlDotNet's camelCase naming convention (`CamelCaseNamingConvention.Instance`) is already the project default. `DefaultValuesHandling.OmitNull | OmitDefaults` on optional fields ensures that fields like `nodes[].source` (if M-049 decided "drop from emission when absent") do not appear in serialized output when unset. `ShouldSerialize{PropertyName}()` is available for empty-collection guards (e.g. omit `classes: []`).
      - **Provenance.** Per M-049, the `provenance` block is declared as a nested type on the unified model (or as a property on a flat unified model — the shape is M-049's decision). Either way, its camelCase keys match `SimProvenance`'s existing emission and `ProvenanceMetadata`'s existing reader.
      - **`nodes[].metadata`.** Stays as a load-bearing `Dictionary<string, string>` per M-049's keep decision. The unified node type exposes it as a declared property with the schema-description consumers (`GraphService`, `StateQueryService`, `RunArtifactWriter`).
      - **Fixture regeneration strategy.** For each test project, enumerate fixtures that author YAML literals. For each, rewrite by hand (forward-only) against the unified shape. For fixtures that use `SimModelBuilder` to produce YAML, re-run the builder and capture the new output. For reference samples in `docs/samples/`, regenerate by running the relevant CLI command against the new builder.

      ## Surfaces touched

      - The unified type's source file (new; location per M-049 — likely `src/FlowTime.Contracts/Models/` or extending `src/FlowTime.Core/Models/ModelDefinition.cs`)
      - `src/FlowTime.Sim.Core/Templates/SimModelBuilder.cs` (rewritten to emit the unified type)
      - `src/FlowTime.Sim.Core/Templates/SimModelArtifact.cs` (deleted)
      - Sim satellite types: `SimNode.cs`, `SimOutput.cs`, `SimProvenance.cs`, `SimTraffic.cs`, `SimArrival.cs`, `SimArrivalPattern.cs` (deleted per M-049 disposition)
      - `src/FlowTime.Core/Models/ModelParser.cs` (switched to unified type)
      - `src/FlowTime.Core/Models/ModelDefinition.cs` (becomes the unified type or is replaced — per M-049)
      - `src/FlowTime.Sim.Service/Program.cs:1079` (wire-serialization call site)
      - `src/FlowTime.TimeMachine/Orchestration/RunOrchestrationService.cs:627` (deserialization call site)
      - `src/FlowTime.Sim.Cli/Program.cs:418` (CLI call site — audit per M-049)
      - `tests/FlowTime.Sim.Tests`, `tests/FlowTime.Core.Tests`, `tests/FlowTime.Api.Tests`, `tests/FlowTime.TimeMachine.Tests`, `tests/FlowTime.Integration.Tests` (fixtures and tests regenerated)
      - `docs/samples/` (reference YAML regenerated if applicable)
      - `work/epics/E-24-schema-alignment/m-E24-02-unify-model-type-tracking.md` (new)

      ## Coverage notes

      Defensive-but-typesystem-unreachable branches (per `wf-tdd-cycle.md` audit
      guidance) introduced or carried forward by this milestone:

      - **`RunOrchestrationService.ParseYaml(...) ?? throw`** — `ModelService.ParseYaml`
        returns `Deserialize<ModelDto>(yaml)`; YamlDotNet's `Deserialize<T>` returns
        non-null for any non-empty YAML document. The `?? throw` mirrors the
        pre-step-3 defensive null guard that wrapped `Deserialize<SimModelArtifact>`
        for the same reason. Reachable only by literal `null` YAML documents,
        which the upstream `TemplateService.GenerateEngineModelAsync` does not
        produce.
      - **`RunOrchestrationService.ValidateSimulationModel`'s `model.Grid is null`
        guard** — `ModelDto.Grid` is non-nullable (`public GridDto Grid { get; set; }
        = new();`); the typesystem makes this branch unreachable for a constructed
        `ModelDto` instance. Kept for structural symmetry with the previous
        `artifact.Window is null` defensive check.
      - **`RunOrchestrationService.TryComputeDurationMinutes`'s `grid is null` and
        `OverflowException` catch** — same typesystem reasoning for the null path;
        the overflow path requires `Bins × BinSize > int.MaxValue` which
        `ValidateSimulationModel` rejects upstream and which no realistic model
        constructs. Kept for forward-compatibility with future high-resolution grids.

      ## Out of Scope

      - Schema edits — M-051 owns.
      - `ParseScalar` validator fix — M-052 owns.
      - Canary hard-assertion promotion — M-053 owns.
      - Any change to Blazor or Svelte UI.
      - `Template` (authoring-time, pre-substitution) redesign.
      - `ModelValidator` deletion — stays with E-23 M-048.

      ## Dependencies

      - M-049 landed. Unified type home, name, provenance shape, field dispositions, and satellite-type dispositions are all named in M-049's tracking doc before this milestone starts.

      ## References

      - Epic spec: `work/epics/E-24-schema-alignment/spec.md`
      - M-049 tracking doc: `work/epics/E-24-schema-alignment/m-E24-01-inventory-and-design-decisions-tracking.md`
      - ADR-E-24-01 (unify), ADR-E-24-02 (forward-only), ADR-E-24-03 (schema declares only consumed fields): epic spec "ADRs" section — ratified in M-049, implemented here
      - Type sources:
        - `src/FlowTime.Sim.Core/Templates/SimModelArtifact.cs` (slated for deletion)
        - `src/FlowTime.Core/Models/ModelDefinition.cs` (unification target)
      - Emitter: `src/FlowTime.Sim.Core/Templates/SimModelBuilder.cs`
      - Parser: `src/FlowTime.Core/Models/ModelParser.cs`
      - Wire site: `src/FlowTime.Sim.Service/Program.cs:1079`
      - Engine intake: `src/FlowTime.TimeMachine/Orchestration/RunOrchestrationService.cs:627,813,838,861`
