  - kind: milestone
    id: M-005
    frontmatter:
      title: ITelemetrySource Contract
      status: done
      parent: E-18
    body: |
      ## Goal

      Define `ITelemetrySource` as the formal input contract for the Time Machine's external data
      surface, with two concrete implementations from day one.  Satisfies the deferred portion of
      the spec's m-E18-01b scope (the tiered-validation half shipped as M-003; this delivers
      the source-contract half).

      ## Scope

      **`ITelemetrySource` interface** — in `src/FlowTime.TimeMachine/Telemetry/`:
      - `ITelemetrySource` — single method: `Task<TelemetryData> ReadAsync(CancellationToken)`
      - `TelemetryData` — typed payload: grid, series dictionary, optional provenance metadata

      **`CanonicalBundleSource : ITelemetrySource`** — reads the canonical bundle format
      (`manifest.json` + CSV series files) written by the existing `TelemetryBundleBuilder` in
      `FlowTime.Core`.  Concrete class (not behind a second interface).

      **`FileCsvSource : ITelemetrySource`** — reads `file:`-referenced CSV inputs, extracting
      the existing file-read logic already in `FlowTime.Core` into a named, injectable
      implementation.

      **In scope:**
      - `src/FlowTime.TimeMachine/Telemetry/ITelemetrySource.cs`
      - `src/FlowTime.TimeMachine/Telemetry/TelemetryData.cs`
      - `src/FlowTime.TimeMachine/Telemetry/CanonicalBundleSource.cs`
      - `src/FlowTime.TimeMachine/Telemetry/FileCsvSource.cs`
      - Unit tests: `tests/FlowTime.TimeMachine.Tests/Telemetry/`

      **Out of scope:**
      - `ITelemetrySink` — explicitly deferred per D-033
      - Real-world format adapters (Prometheus, OTEL, BPI) — m-E18 telemetry adapters milestone
      - Time Machine `Evaluate` / `Reevaluate` consuming the source — separate milestone
      - HTTP endpoint changes

      ## Contract

      ### `ITelemetrySource`

      ```csharp
      namespace FlowTime.TimeMachine.Telemetry;

      /// <summary>
      /// Input contract for external data fed into the Time Machine.
      /// Each implementation snapshots data from its source at ReadAsync time,
      /// returning a deterministic TelemetryData payload the Time Machine can consume.
      /// </summary>
      public interface ITelemetrySource
      {
          Task<TelemetryData> ReadAsync(CancellationToken cancellationToken = default);
      }
      ```

      ### `TelemetryData`

      ```csharp
      public sealed class TelemetryData
      {
          /// <summary>Grid definition (bins, binSize, binUnit).</summary>
          public required GridDefinition Grid { get; init; }

          /// <summary>Node-id → double[] series values (one per bin).</summary>
          public required IReadOnlyDictionary<string, double[]> Series { get; init; }

          /// <summary>Optional provenance: source path, captured-at timestamp, content hash.</summary>
          public TelemetryProvenance? Provenance { get; init; }
      }

      public sealed class TelemetryProvenance
      {
          public string? SourcePath { get; init; }
          public DateTimeOffset? CapturedAt { get; init; }
          public string? ContentHash { get; init; }
      }
      ```

      ### `CanonicalBundleSource`

      Reads a canonical bundle directory (containing `manifest.json` and `series/*.csv`).

      ```csharp
      public sealed class CanonicalBundleSource : ITelemetrySource
      {
          public CanonicalBundleSource(string bundleDirectory) { ... }
          public Task<TelemetryData> ReadAsync(CancellationToken cancellationToken = default) { ... }
      }
      ```

      ### `FileCsvSource`

      Reads a single CSV file as a named series.

      ```csharp
      public sealed class FileCsvSource : ITelemetrySource
      {
          /// <param name="filePath">Path to the CSV file.</param>
          /// <param name="seriesId">Node ID to assign the series to.</param>
          /// <param name="grid">Grid definition to validate series length against.</param>
          public FileCsvSource(string filePath, string seriesId, GridDefinition grid) { ... }
          public Task<TelemetryData> ReadAsync(CancellationToken cancellationToken = default) { ... }
      }
      ```

      ## Acceptance Criteria

      - [x] `ITelemetrySource` interface exists in `FlowTime.TimeMachine.Telemetry`
      - [x] `TelemetryData` carries Grid + Series + optional Provenance
      - [x] `CanonicalBundleSource.ReadAsync` reads a bundle directory and returns correct series values
      - [x] `FileCsvSource.ReadAsync` reads a single CSV and returns the series under the specified ID
      - [x] Both implementations compile and have passing unit tests (23 tests across 2 suites)
      - [x] `ITelemetrySink` is **not** introduced (explicitly documented as deferred)
      - [x] `rg "FlowTime\.Generator" src/ tests/` still zero (no regressions)
      - [x] `dotnet test FlowTime.sln` all green (72 TimeMachine tests, 0 failures)
  - kind: milestone
    id: M-006
    frontmatter:
      title: Parameter Sweep
      status: done
      parent: E-18
    body: |
      ## Goal

      Implement parameter sweep as a first-class Time Machine operation: given a model YAML, a
      const-node ID, and an array of values, evaluate the model once per value and return a
      structured table of (param_value → series outputs).

      Builds on:
      - M-001 `evaluate_with_params` in the Rust engine (compile-once foundation)
      - M-004 `FlowTime.TimeMachine` project (host for the sweep domain model)
      - M-005 `ITelemetrySource` (pattern for injectable evaluation contracts)

      ## Scope

      **`FlowTime.TimeMachine.Sweep` namespace** — in `src/FlowTime.TimeMachine/Sweep/`:
      - `IModelEvaluator` — injectable evaluation contract; decouples SweepRunner from the Rust binary in tests
      - `SweepSpec` — validated input: ModelYaml, ParamId, Values[], optional CaptureSeriesIds
      - `SweepPoint` — single evaluation result: ParamValue + Series dictionary
      - `SweepResult` — full sweep result: ParamId + SweepPoint[]
      - `ConstNodePatcher` — internal YAML DOM manipulation; patches a named const node's values array
      - `SweepRunner` — orchestrates N evaluations via injected `IModelEvaluator`
      - `RustModelEvaluator : IModelEvaluator` — wraps `RustEngineRunner`, maps series list to dictionary

      **`POST /v1/sweep`** — in `src/FlowTime.API/Endpoints/SweepEndpoints.cs`:
      - Request: `{ yaml, paramId, values: [double...], captureSeriesIds?: [string...] }`
      - Response (200): `{ paramId, points: [{ paramValue, series: { seriesId: double[] } }] }`
      - 400: missing yaml / paramId / values
      - 503: engine not enabled (RustEngine:Enabled=false)

      **In scope:**
      - `src/FlowTime.TimeMachine/Sweep/IModelEvaluator.cs`
      - `src/FlowTime.TimeMachine/Sweep/SweepSpec.cs`
      - `src/FlowTime.TimeMachine/Sweep/SweepResult.cs`
      - `src/FlowTime.TimeMachine/Sweep/ConstNodePatcher.cs`
      - `src/FlowTime.TimeMachine/Sweep/SweepRunner.cs`
      - `src/FlowTime.TimeMachine/Sweep/RustModelEvaluator.cs`
      - `src/FlowTime.API/Endpoints/SweepEndpoints.cs`
      - DI registration in `Program.cs`
      - Unit tests: `tests/FlowTime.TimeMachine.Tests/Sweep/`
      - API tests: `tests/FlowTime.Api.Tests/SweepEndpointsTests.cs`

      **Out of scope:**
      - Sensitivity analysis (numerical gradient) — follow-on
      - Multi-parameter sweeps (grid sweeps) — follow-on
      - Session-based compile-once optimization — follow-on (each sweep point uses subprocess eval)
      - Optimization / fitting — M-007+
      - Sweep result persistence / artifact writing — follow-on

      ## Design Notes

      ### Implementation approach

      Each sweep point calls `RustEngineRunner.EvaluateAsync(patchedYaml)` independently (one
      subprocess per point). The YAML is patched in-memory before each call via `ConstNodePatcher`,
      which uses YamlDotNet's representation model to substitute the const node's values array.

      This deliberately trades compile-once efficiency for implementation simplicity: the Rust
      session protocol requires a MessagePack NuGet dependency not yet in the tree, while the
      subprocess approach reuses existing infrastructure with no new dependencies.

      The `IModelEvaluator` abstraction isolates this choice from `SweepRunner`, so a future
      session-based evaluator can be dropped in without changing the sweep domain model or tests.

      ### ConstNodePatcher behaviour

      - Finds the first `nodes` entry where `id == nodeId` AND `kind == "const"`
      - Replaces its `values` sequence with `[value, value, ..., value]` (same bin count)
      - Returns the original YAML unchanged if the node is not found or is not a const node
      - Uses `InvariantCulture` formatting for decimal precision

      ## Acceptance Criteria

      - [x] `IModelEvaluator` interface exists in `FlowTime.TimeMachine.Sweep`
      - [x] `SweepSpec` validates: non-null/whitespace ModelYaml, non-null/whitespace ParamId, non-null/non-empty Values
      - [x] `ConstNodePatcher.Patch` correctly replaces const node values; returns original YAML for unknown/non-const nodes
      - [x] `SweepRunner.RunAsync` returns one `SweepPoint` per input value, with correct ParamValue and Series
      - [x] `SweepRunner` respects `CaptureSeriesIds` filter (null = all series)
      - [x] `SweepRunner` respects `CancellationToken` between evaluation points
      - [x] `RustModelEvaluator` wraps `RustEngineRunner` and maps series list to dictionary
      - [x] `POST /v1/sweep` returns 400 for missing yaml / paramId / empty values
      - [x] `POST /v1/sweep` returns 503 when Rust engine not enabled
      - [x] Unit tests pass: 28 sweep unit tests (SweepSpec ×9, ConstNodePatcher ×7, SweepRunner ×12)
      - [x] API validation tests pass: 7 tests (6×400, 1×503)
      - [x] `dotnet test FlowTime.sln` all green (105 TimeMachine, 235 API — pre-existing integration failures unrelated)
  - kind: milestone
    id: M-007
    frontmatter:
      title: Sensitivity Analysis
      status: done
      parent: E-18
    body: |
      ## Goal

      Add numerical sensitivity analysis as a Time Machine operation: given a model YAML, a set
      of const-node parameters, and a target metric series, compute ∂metric_mean/∂param for each
      parameter using a central-difference approximation. Answers "which parameter has the most
      impact on this metric?"

      Builds on:
      - M-006 `SweepRunner` + `ConstNodePatcher` — two-point sweep per parameter reuses the
        sweep infrastructure directly
      - `ConstNodePatcher` — YAML DOM manipulation already in place

      ## Scope

      **`FlowTime.TimeMachine.Sweep` namespace** (extending M-006's namespace):
      - `ConstNodeReader` — companion to `ConstNodePatcher`; reads the current scalar value of a
        named const node's first bin. Returns `null` if the node is not found or not a const node.
      - `SensitivitySpec` — validated input: ModelYaml, ParamIds[], MetricSeriesId, Perturbation (default 5%)
      - `SensitivityPoint` — single result: ParamId, BaseValue, Gradient (∂metric_mean/∂param)
      - `SensitivityResult` — `SensitivityPoint[]` sorted by `|Gradient|` descending
      - `SensitivityRunner` — composes `SweepRunner`; for each param: read base, 2-point sweep,
        central difference

      **`POST /v1/sensitivity`** — in `src/FlowTime.API/Endpoints/SensitivityEndpoints.cs`
      - Request: `{ yaml, paramIds: [string...], metricSeriesId, perturbation?: double }`
      - Response (200): `{ metricSeriesId, points: [{ paramId, baseValue, gradient }] }`
      - 400: missing yaml / paramIds (null or empty) / metricSeriesId
      - 503: engine not enabled

      **In scope:**
      - `src/FlowTime.TimeMachine/Sweep/ConstNodeReader.cs`
      - `src/FlowTime.TimeMachine/Sweep/SensitivitySpec.cs`
      - `src/FlowTime.TimeMachine/Sweep/SensitivityResult.cs`
      - `src/FlowTime.TimeMachine/Sweep/SensitivityRunner.cs`
      - `src/FlowTime.API/Endpoints/SensitivityEndpoints.cs`
      - DI registration in `Program.cs`
      - Unit tests: `tests/FlowTime.TimeMachine.Tests/Sweep/`
      - API tests: `tests/FlowTime.Api.Tests/SensitivityEndpointsTests.cs`

      **Out of scope:**
      - Multi-metric sensitivity — single metric per call
      - Distribution-based sensitivity (Morris method, Sobol indices) — follow-on
      - Forward-difference vs central-difference choice — central difference only
      - Optimization / fitting — M-008+

      ## Design Notes

      ### Gradient formula (central difference)

      For each parameter `p` with base value `b` and perturbation fraction `ε`:

      ```
      hi  = b × (1 + ε)
      lo  = b × (1 - ε)
      gradient = (mean(metric_series_at_hi) − mean(metric_series_at_lo)) / (hi − lo)
               = (mean_hi − mean_lo) / (2 × b × ε)
      ```

      **Zero-base edge case:** when `b == 0`, `hi == lo == 0` and the gradient is indeterminate.
      Gradient is set to `0.0` and a note is included in the point. The parameter is still included
      in the result so callers can see it was processed.

      **Missing metric series:** if the evaluator returns series that do not include `MetricSeriesId`,
      `SensitivityRunner` throws `InvalidOperationException` with a clear message. This is a caller
      error (wrong series ID), not a graceful skip.

      **Unknown param:** if `ConstNodeReader.ReadValue` returns `null` for a param ID (node not
      found or not a const node), that param is skipped (omitted from result). Callers can detect
      skipped params by comparing `spec.ParamIds.Length` vs `result.Points.Length`.

      ### `SensitivityRunner` composes `SweepRunner`

      `SensitivityRunner(SweepRunner sweepRunner)` — takes the full `SweepRunner` including its
      injected `IModelEvaluator`. Tests pass a `SweepRunner(fakeEvaluator)` — no additional
      test doubles needed.

      ## Acceptance Criteria

      - [x] `ConstNodeReader.ReadValue(yaml, nodeId)` returns the first-bin value for known const
            nodes; returns `null` for unknown nodes, non-const nodes, and missing `nodes` section
      - [x] `SensitivitySpec` validates: non-null/whitespace ModelYaml, non-null/non-empty ParamIds,
            non-null/whitespace MetricSeriesId, Perturbation in (0, 1) exclusive
      - [x] `SensitivityRunner.RunAsync` returns one `SensitivityPoint` per found param, sorted by
            `|Gradient|` descending
      - [x] Gradient computed correctly via central difference
      - [x] Zero-base param produces Gradient = 0.0 (no crash)
      - [x] Unknown param ID silently skipped (omitted from result)
      - [x] Missing metric series throws `InvalidOperationException`
      - [x] `SensitivityRunner` respects `CancellationToken`
      - [x] `POST /v1/sensitivity` returns 400 for missing yaml / paramIds / metricSeriesId
      - [x] `POST /v1/sensitivity` returns 503 when Rust engine not enabled
      - [x] Unit tests pass: 32 tests (ConstNodeReader ×8, SensitivitySpec ×12, SensitivityRunner ×12)
      - [x] API tests pass: 7 tests (6×400, 1×503)
      - [x] `dotnet test FlowTime.sln` all green (137 TimeMachine, 242 API)
  - kind: milestone
    id: M-008
    frontmatter:
      title: Goal Seeking
      status: done
      parent: E-18
    body: |
      ## Goal

      Add 1D goal seeking: given a model YAML, a const-node parameter, a metric series, and a
      target value, find the parameter value that drives the metric mean to the target via bisection.
      Answers "what arrival rate gives 80% utilization?" without a full parameter sweep.

      Builds on:
      - M-006 `SweepRunner` + `ConstNodePatcher` / `ConstNodeReader` (M-007)
      - Same `IModelEvaluator` seam

      ## Scope

      **`FlowTime.TimeMachine.Sweep` namespace:**
      - `GoalSeekSpec` — validated input: ModelYaml, ParamId, MetricSeriesId, Target, SearchLo,
        SearchHi, Tolerance (default 1e-6), MaxIterations (default 50)
      - `GoalSeekResult` — output: ParamValue, AchievedMetricMean, Converged, Iterations
      - `GoalSeeker` — bisection over `SweepRunner`; handles non-bracketed case gracefully

      **`POST /v1/goal-seek`** — in `src/FlowTime.API/Endpoints/GoalSeekEndpoints.cs`
      - Request: `{ yaml, paramId, metricSeriesId, target, searchLo, searchHi, tolerance?, maxIterations? }`
      - Response (200): `{ paramValue, achievedMetricMean, converged, iterations }`
      - 400: missing/invalid required fields (searchLo ≥ searchHi is invalid)
      - 503: engine not enabled

      **In scope:**
      - `src/FlowTime.TimeMachine/Sweep/GoalSeekSpec.cs`
      - `src/FlowTime.TimeMachine/Sweep/GoalSeekResult.cs`
      - `src/FlowTime.TimeMachine/Sweep/GoalSeeker.cs`
      - `src/FlowTime.API/Endpoints/GoalSeekEndpoints.cs`
      - DI registration in `Program.cs`
      - Unit tests: `tests/FlowTime.TimeMachine.Tests/Sweep/`
      - API tests: `tests/FlowTime.Api.Tests/GoalSeekEndpointsTests.cs`
      - Architecture doc: `docs/architecture/time-machine-analysis-modes.md` (written alongside)

      **Out of scope:**
      - Multi-dimensional optimization (Nelder-Mead) — M-009+
      - Constraint handling beyond the `[searchLo, searchHi]` range
      - Non-monotonic functions (bisection is undefined; `Converged=false` returned)

      ## Algorithm

      Bisection on the metric mean:

      ```
      1. Evaluate at searchLo → meanLo = mean(metric at searchLo)
      2. Evaluate at searchHi → meanHi = mean(metric at searchHi)
      3. If target not in [min(meanLo,meanHi), max(meanLo,meanHi)]:
             return best endpoint, Converged=false
      4. While iterations < maxIterations:
             mid = (lo + hi) / 2
             midMean = mean(metric at mid)
             if |midMean - target| < tolerance: return mid, Converged=true
             if (midMean - target) same sign as (meanLo - target): lo = mid, meanLo = midMean
             else: hi = mid, meanHi = midMean
      5. Return mid, Converged=false (max iterations reached)
      ```

      ## Acceptance Criteria

      - [x] `GoalSeekSpec` validates: non-null/whitespace ModelYaml/ParamId/MetricSeriesId;
            SearchLo < SearchHi; Tolerance > 0; MaxIterations ≥ 1
      - [x] `GoalSeeker.SeekAsync` converges on a linear model to within tolerance
      - [x] `GoalSeeker` returns `Converged=false` when target is not bracketed
      - [x] `GoalSeeker` returns `Converged=false` (best guess) when max iterations exhausted
      - [x] `GoalSeeker` respects `CancellationToken`
      - [x] `POST /v1/goal-seek` returns 400 for missing/invalid required fields
      - [x] `POST /v1/goal-seek` returns 503 when engine not enabled
      - [x] Unit tests pass: 26 tests (GoalSeekSpec ×14, GoalSeeker ×12)
      - [x] API tests pass: 8 tests (7×400, 1×503)
      - [x] `dotnet test FlowTime.sln` all green (163 TimeMachine, 250 API)
  - kind: milestone
    id: M-009
    frontmatter:
      title: Multi-parameter Optimization
      status: done
      parent: E-18
    body: |
      ## Goal

      Add multi-parameter optimization: given a model, a set of const-node parameters with search
      ranges, a metric series, and an objective (minimize or maximize), find the parameter values that
      drive the metric mean to its optimum using Nelder-Mead simplex — a derivative-free method that
      works for any number of parameters without needing gradients.

      Answers "what combination of arrival rate and capacity minimizes queue depth?" without a full
      multi-dimensional grid search.

      Builds on:
      - `IModelEvaluator` seam (M-006)
      - `ConstNodePatcher` for multi-parameter YAML mutation (M-006)
      - `ConstNodeReader` (M-007) — used in tests to read patched values

      ## Scope

      **`FlowTime.TimeMachine.Sweep` namespace:**
      - `OptimizeObjective` — `Minimize | Maximize` enum
      - `SearchRange` — `record(double Lo, double Hi)` with `Lo < Hi` invariant
      - `OptimizeSpec` — validated input: ModelYaml, ParamIds, MetricSeriesId, Objective,
        SearchRanges (one entry per ParamId), Tolerance (default 1e-4), MaxIterations (default 200)
      - `OptimizeResult` — output: ParamValues, AchievedMetricMean, Converged, Iterations
      - `Optimizer` — Nelder-Mead simplex over `IModelEvaluator`; patches all parameters
        simultaneously per evaluation; respects CancellationToken

      **`POST /v1/optimize`** — in `src/FlowTime.API/Endpoints/OptimizeEndpoints.cs`
      - Request: `{ yaml, paramIds, metricSeriesId, objective, searchRanges, tolerance?, maxIterations? }`
        where `searchRanges` is `{ "<paramId>": { "lo": N, "hi": N }, ... }`
        and `objective` is `"minimize"` or `"maximize"` (case-insensitive)
      - Response (200): `{ paramValues, achievedMetricMean, converged, iterations }`
      - 400: missing/invalid required fields, searchRange lo >= hi, unknown objective string
      - 503: engine not enabled

      **In scope:**
      - `src/FlowTime.TimeMachine/Sweep/OptimizeObjective.cs`
      - `src/FlowTime.TimeMachine/Sweep/SearchRange.cs`
      - `src/FlowTime.TimeMachine/Sweep/OptimizeSpec.cs`
      - `src/FlowTime.TimeMachine/Sweep/OptimizeResult.cs`
      - `src/FlowTime.TimeMachine/Sweep/Optimizer.cs`
      - `src/FlowTime.API/Endpoints/OptimizeEndpoints.cs`
      - DI registration in `Program.cs`
      - Unit tests: `tests/FlowTime.TimeMachine.Tests/Sweep/`
      - API tests: `tests/FlowTime.Api.Tests/OptimizeEndpointsTests.cs`
      - Architecture doc update: `docs/architecture/time-machine-analysis-modes.md`

      **Out of scope:**
      - Constraint handling (utilization < 0.8 etc.) — future milestone
      - Bayesian optimization — future milestone
      - Parallel evaluation of simplex vertices
      - Gradient-based methods (sensitivity-driven descent)

      ## Algorithm

      Nelder-Mead simplex (N parameters → N+1 vertices):

      ```
      Coefficients: α=1.0 (reflect), γ=2.0 (expand), ρ=0.5 (contract), σ=0.5 (shrink)
      Objective f(v) = metricMean(v)            for Minimize
                   f(v) = -metricMean(v)           for Maximize  (internally always minimize f)

      1. Build initial N+1 simplex:
         v[0]     = midpoint of all search ranges
         v[i]     = v[0] with param[i-1] shifted +5% of its range (clamped)

      2. Evaluate f at each vertex.

      3. Sort vertices so v[0] is best (lowest f) and v[N] is worst.

      4. Check pre-loop convergence: if |f[N] - f[0]| < tolerance → Converged(0 iterations)

      5. For iteration = 1 to MaxIterations:
         a. Compute centroid c of best N vertices (v[0]..v[N-1]).
         b. Reflect:  xr = c + α*(c - v[N]); clamp; fr = f(xr)
         c. if fr < f[0]:         expand: xe = c + γ*(xr-c); clamp; fe = f(xe)
                                   replace v[N] with (fe<fr ? xe : xr)
            elif fr < f[N-1]:     replace v[N] with xr
            else:                 if fr < f[N]: outside contraction
                                     xoc = c + ρ*(xr-c); clamp; foc = f(xoc)
                                     replace v[N] with xoc if foc <= fr, else shrink
                                  else: inside contraction
                                     xic = c + ρ*(v[N]-c); clamp; fic = f(xic)
                                     replace v[N] with xic if fic < f[N], else shrink
            shrink: v[i] = v[0] + σ*(v[i]-v[0]), clamp and re-evaluate for i=1..N
         d. Sort.
         e. if |f[N] - f[0]| < tolerance → Converged(iteration)
         f. if iteration == MaxIterations → NotConverged(best v[0], iteration)
      ```

      `Optimizer` takes `IModelEvaluator` directly (not `SweepRunner`) and applies
      `ConstNodePatcher.Patch` sequentially for all parameters before each evaluation.

      ## Acceptance Criteria

      - [x] `OptimizeSpec` validates: non-null/whitespace ModelYaml/MetricSeriesId; non-null/non-empty
            ParamIds; non-null SearchRanges with an entry for every ParamId (Lo < Hi for each);
            Tolerance > 0; MaxIterations ≥ 1
      - [x] `Optimizer.OptimizeAsync` converges on a 1D bowl function to within tolerance
      - [x] `Optimizer.OptimizeAsync` converges on a 2D bowl function to within tolerance
      - [x] `Optimizer.OptimizeAsync` supports Maximize objective (maximizes a linear metric)
      - [x] `Optimizer` returns `Converged=false` when MaxIterations exhausted before convergence
      - [x] `Optimizer` respects `CancellationToken`
      - [x] `POST /v1/optimize` returns 400 for missing/invalid required fields
      - [x] `POST /v1/optimize` returns 503 when engine not enabled
      - [x] Unit tests pass: 29 tests (OptimizeSpec ×17, Optimizer ×12)
      - [x] API tests pass: 10 tests (9×400, 1×503)
      - [x] `dotnet test FlowTime.sln` all green (192 TimeMachine, 260 API)
  - kind: milestone
    id: M-010
    frontmatter:
      title: SessionModelEvaluator
      status: done
      parent: E-18
    body: |
      ## Goal

      Replace per-point subprocess compile overhead with a single persistent engine session.
      Today, every `IModelEvaluator.EvaluateAsync` call spawns `flowtime-engine eval` as a fresh
      subprocess that re-parses YAML and re-compiles the Plan. For a sweep of 200 points this is
      200 compiles; for an optimization run it can be 100–1000 compiles. Each spawn is
      ~100–500 ms of pure compile overhead.

      `SessionModelEvaluator` uses the M-002 session protocol (MessagePack over stdin/stdout):
      compile once on the first call, then send `eval` with parameter overrides for every
      subsequent call. The expected speedup for large batches is ~10–50×.

      Also makes model fitting practical — fitting typically runs 100–1000 evaluations with
      the optimizer as the inner loop, which is not viable with per-point subprocess compile.

      ## Scope

      **Namespace:** `FlowTime.TimeMachine.Sweep`

      - `SessionModelEvaluator : IModelEvaluator, IAsyncDisposable` — persistent session bridge:
        - Lazy-spawns `flowtime-engine session` subprocess on first `EvaluateAsync`
        - First call: sends `compile` request with the (already-patched) YAML; captures the list
          of parameter IDs from the response; returns the series from the compile result
        - Subsequent calls: uses `ConstNodeReader` to read the current value of each captured
          parameter ID from the patched YAML; sends `eval { overrides: { ... } }`; returns series
          from the response
        - Serializes protocol I/O with `SemaphoreSlim` (one request at a time per instance)
        - MessagePack via the `MessagePack` package (already used in integration tests); encodes
          requests with `ContractlessStandardResolver` as `Dictionary<string, object>`
        - Wire framing: 4-byte big-endian length prefix + MessagePack payload (matches
          `engine/cli/src/protocol.rs`)
        - `DisposeAsync`: closes stdin, waits briefly for the subprocess to exit, kills the
          process tree if still alive after the timeout

      **DI registration** (`src/FlowTime.API/Program.cs`):
      - New config key `RustEngine:UseSession` (default `true`). Selects which `IModelEvaluator`
        implementation is registered:
        - `true` → `SessionModelEvaluator` (persistent session, compile-once)
        - `false` → `RustModelEvaluator` (stateless subprocess per eval — retained as fallback)
      - `IModelEvaluator`, `SweepRunner`, `SensitivityRunner`, `GoalSeeker`, `Optimizer` change
        from `AddSingleton` → `AddScoped`. Session lifetime must match the analysis run; Scoped
        gives one evaluator per HTTP request with automatic disposal. Even when `UseSession=false`
        the Scoped lifetime is harmless — runners are stateless wrappers.
      - `RustEngineRunner` remains `Singleton` (still used by E-20 bridge/parity tests and by
        `RustModelEvaluator`).

      **Why keep `RustModelEvaluator`:**
      - Fallback switch if the session protocol surfaces bugs in the wild (30 lines of code; negligible maintenance).
      - Diagnostic comparison path — "does the non-session path agree?" is a cheap bug-triage question.
      - Process isolation per eval is genuinely different behavior from a stateful session; both have legitimate deployment shapes (see cloud-deployment notes in `ROADMAP.md`).
      - Two production impls make `IModelEvaluator` a real seam, not a testing-only interface.

      **Package reference:**
      - Add `MessagePack` 3.1.4 to `src/FlowTime.TimeMachine/FlowTime.TimeMachine.csproj`
        (same version already used in `FlowTime.Integration.Tests`)

      **In scope:**
      - `src/FlowTime.TimeMachine/Sweep/SessionModelEvaluator.cs`
      - `src/FlowTime.TimeMachine/FlowTime.TimeMachine.csproj` (MessagePack package)
      - `src/FlowTime.API/Program.cs` (config switch + DI scope changes)
      - Unit tests: `tests/FlowTime.TimeMachine.Tests/Sweep/SessionModelEvaluatorTests.cs`
        (covers override extraction logic and error paths that do not require the subprocess)
      - Integration tests: `tests/FlowTime.Integration.Tests/SessionModelEvaluatorIntegrationTests.cs`
        (requires the Rust binary; skipped if not present, following the existing
        `EngineSessionWebSocketTests` pattern)
      - Milestone tracking doc
      - Update `docs/architecture/time-machine-analysis-modes.md` to note the new evaluator and config switch

      **Out of scope:**
      - Session pooling / reuse across HTTP requests — each request gets its own session
      - Auto-reconnect on session crash — if the subprocess dies, the next call surfaces the error
      - Chunked evaluation (Mode 6) — separate later milestone
      - Model-change detection (session always compiles the YAML it sees first; further calls
        assume the same base model, which holds for all current analysis runners)

      ## Design

      ### Lifecycle

      ```
      T=0   SessionModelEvaluator ctor (no I/O yet)
      T=1   SweepRunner calls EvaluateAsync(patchedYaml1)
            → lazy spawn subprocess
            → send compile { yaml: patchedYaml1 }
            → receive compile result { params: [...], series: {...} }
            → store paramIds from the response
            → return series
      T=2   SweepRunner calls EvaluateAsync(patchedYaml2)
            → use ConstNodeReader to read each paramId value from patchedYaml2
            → send eval { overrides: { ... } }
            → receive eval result { series: {...} }
            → return series
      ...
      T=N   HTTP request ends → DI scope disposes the evaluator
            → DisposeAsync: close stdin, wait 1s, kill if still alive
      ```

      ### Why the `overrides` approach works

      The compile result captures the initial parameter defaults from the YAML (including whatever
      values the first patch applied). On every subsequent call the evaluator sends an explicit
      override for every tracked parameter, so the session always evaluates with the current
      patched values. The compile-time defaults only matter for the very first call's return.

      ### Request/response shapes

      Requests are plain `Dictionary<string, object>` (contractless MessagePack). Responses
      are `Dictionary<object, object>` navigated by key. Matching the Rust protocol:

      | Method | Request params | Response `result` |
      |--------|----------------|-------------------|
      | `compile` | `{ yaml: string }` | `{ params: [...], series: { id: [double,...] }, bins, grid, graph, warnings }` |
      | `eval` | `{ overrides: { paramId: double } }` | `{ series: { id: [double,...] }, elapsed_us, warnings }` |

      Errors arrive as `{ error: { code, message } }` with no `result` key. The evaluator
      raises `InvalidOperationException` with the error code + message.

      ## Acceptance Criteria

      - [x] `SessionModelEvaluator` exists, implements `IModelEvaluator` and `IAsyncDisposable`
      - [x] Constructor validates engine path (non-null, non-whitespace)
      - [x] First `EvaluateAsync` call spawns the subprocess exactly once; subsequent calls reuse it
      - [x] First call sends `compile`; subsequent calls send `eval` with overrides extracted via `ConstNodeReader`
      - [x] Returned series dictionary uses case-insensitive keys (matches `RustModelEvaluator`)
      - [x] Error responses (`error` key present) raise `InvalidOperationException` with code + message
      - [x] `DisposeAsync` closes stdin, waits for exit, kills the process tree on timeout
      - [x] `DisposeAsync` is idempotent (safe to call multiple times)
      - [x] Calling `EvaluateAsync` after `DisposeAsync` throws `ObjectDisposedException`
      - [x] `CancellationToken` is observed during I/O
      - [x] Concurrent `EvaluateAsync` calls on one instance are serialized (no interleaved frames)
      - [x] DI: `IModelEvaluator`, `SweepRunner`, `SensitivityRunner`, `GoalSeeker`, `Optimizer` all registered as `Scoped`
      - [x] DI: `RustEngine:UseSession` config (default `true`) selects `SessionModelEvaluator`; `false` selects `RustModelEvaluator`
      - [x] `RustModelEvaluator.cs` retained as fallback; covered by an API test that flips the config switch
      - [x] Unit tests pass: 32 tests total
        - 6 constructor + disposal (SessionModelEvaluatorTests)
        - 3 BuildOverrides (empty / all-found / some-missing)
        - 5 ExtractResult (success / error-with-code-msg / error-missing-subfields / neither / malformed-result)
        - 4 ExtractParamIds (missing-key / not-array / valid / malformed-items)
        - 6 ExtractSeries (missing-key / not-dict / valid / case-insensitive / non-string-key / non-array-value)
        - 1 WriteFrameAsync (length-prefixed MessagePack)
        - 5 ReadFrameAsync (valid / zero / negative / excessive / truncated)
        - 2 ReadExactAsync (full-read / EOF-mid-read)
      - [x] Integration tests pass with the Rust binary present: 8 tests (SessionModelEvaluatorIntegrationTests)
        - [x] Compile-once / eval-many returns correct series after parameter override
        - [x] Parity on numeric values against per-eval path (keys differ by design — documented in `work/gaps.md`)
        - [x] `SweepRunner` drives `SessionModelEvaluator` end-to-end over a 5-point sweep
        - [x] Session subprocess does not leak after disposal
        - [x] Invalid model raises `InvalidOperationException` with engine error code
        - [x] Concurrent calls on one instance are serialized
      - [x] API DI tests pass: 4 tests (ModelEvaluatorRegistrationTests — default/true/false/scope lifetime)
      - [x] `dotnet build FlowTime.sln` green
      - [x] `dotnet test FlowTime.sln` all green (1,620 passed / 9 skipped)
      - [x] `docs/architecture/time-machine-analysis-modes.md` updated — now documents both evaluator paths, config switch, and scoped lifetime

      ## Coverage notes

      **Covered:** every reachable branch in the production implementation — 44 dedicated tests (32 unit + 8 integration + 4 DI). The unit tests deliberately exercise every parsing helper with hand-crafted protocol payloads that the real Rust engine would not produce (missing fields, malformed types, non-string keys, out-of-range frame lengths), because those are defense-in-depth paths against protocol corruption and must not fail silently.

      **Explicitly not covered (defensive paths, acceptable gaps):**

      | Path | Why untested |
      |------|--------------|
      | `DisposeAsync` graceful-timeout → `Process.Kill` (line ~380) | Requires simulating a stuck subprocess; no deterministic way in unit tests. Behavior is symmetrically correct with the kill-succeeds case which IS covered by `Dispose_TerminatesSubprocess`. |
      | `DisposeAsync` generic exception while waiting for exit (line ~385) | Defense-in-depth catch — unreachable in practice. `WaitForExitAsync` only throws `OperationCanceledException` (covered) or completes normally. |
      | `SpawnProcess` `Process.Start` returns null | Only happens on platform-level process creation failure with an executable path that exists. Not reproducible in test. |
      | `ExchangeAsync` `stdin`/`stdout` null guard | Defensive — caller always invokes after `SpawnProcess` has assigned both streams. Unreachable in practice. |
      | `EvaluateAsync` inner-after-mutex disposed check | Race between `DisposeAsync` and an in-flight `EvaluateAsync`. Hard to trigger deterministically. The outer check + mutex make this extremely narrow. |
      | `EvalAsync` error response | The Rust session only errors on `eval` when no model has been compiled (covered by compile-error path instead) or on a programmer bug that isn't otherwise reachable. |

      These six branches remain in the code as defense-in-depth and would be removed only with explicit evidence that they cannot occur under any future refactor.

      ## Dependencies

      - M-002 (engine session protocol) — delivered
      - M-005 (ITelemetrySource) — independent
      - M-006 (`IModelEvaluator` seam, `ConstNodePatcher`) — delivered
      - M-007 (`ConstNodeReader`) — delivered
      - `MessagePack` 3.1.4 — already in integration tests, add to TimeMachine

      ## Risks / notes

      - **Scope lifetime change.** Moving the four runners from `Singleton` → `Scoped` is a DI
        semantics change. Runners are stateless wrappers over `IModelEvaluator`, so the risk is
        low, but verify the minimal API endpoints still resolve them correctly.
      - **Test flakiness from subprocess I/O.** Integration tests must guard against slow spawn
        on first call; use a 5 s initial-compile timeout and skip cleanly if the binary is absent.
      - **Process leak on abnormal termination.** `DisposeAsync` kills the process tree; CI must
        not accumulate stray `flowtime-engine` processes between tests.
      - **MessagePack dependency surface.** Adding `MessagePack` to `FlowTime.TimeMachine` pulls
        it into the runtime surface. Acceptable — it is already transitively available through
        `FlowTime.Integration.Tests` and matches the wire format owned by the Rust engine.
  - kind: milestone
    id: M-011
    frontmatter:
      title: .NET Time Machine CLI
      status: done
      parent: E-18
    body: |
      ## Goal

      Expose the Time Machine analysis modes (validate / sweep / sensitivity / goal-seek /
      optimize) through the `FlowTime.Cli` binary as pipeable JSON-over-stdio commands.
      The CLI becomes the canonical pipeline entry point for Azure Functions custom handlers,
      Container Apps jobs, scripted regression suites, shell composition, and AI-assistant
      iteration — without requiring the ASP.NET API to be running.

      Spec success criterion from E-18:
      ```
      cat model.yaml | flowtime validate
      cat sweep-spec.json | flowtime sweep | jq '.points[].metricMean'
      ```

      ## Scope

      Five new commands under `src/FlowTime.Cli/Commands/` mirroring the `/v1/` API surface:

      | CLI command | Spec type | Runner | Matches API endpoint |
      |-------------|-----------|--------|----------------------|
      | `flowtime validate` | `TimeMachineValidator` (no wrapping spec) | `TimeMachineValidator` | `POST /v1/validate` |
      | `flowtime sweep` | `SweepSpec` | `SweepRunner` | `POST /v1/sweep` |
      | `flowtime sensitivity` | `SensitivitySpec` | `SensitivityRunner` | `POST /v1/sensitivity` |
      | `flowtime goal-seek` | `GoalSeekSpec` | `GoalSeeker` | `POST /v1/goal-seek` |
      | `flowtime optimize` | `OptimizeSpec` | `Optimizer` | `POST /v1/optimize` |

      ### JSON I/O contract

      Each command reads a JSON request on stdin (or via `--spec <path>`), runs the analysis,
      and writes a JSON response on stdout. The request/response shapes are **identical to the
      corresponding `/v1/` endpoint bodies** — byte-for-byte compatible, so `cat spec.json |
      flowtime sweep` produces the same payload as `curl -d @spec.json /v1/sweep`.

      `validate` is the exception: its input is raw YAML (on stdin or `--model <path>`),
      not JSON. Output is the same JSON response shape as `POST /v1/validate`.

      ### Unified options across commands

      - `--spec <path>` — read JSON request from a file instead of stdin (analysis commands)
      - `--model <path>` — read model YAML from a file (validate only)
      - `--output <path>` / `-o` — write JSON response to a file instead of stdout
      - `--no-session` — use `RustModelEvaluator` (stateless, subprocess-per-eval) instead of
        `SessionModelEvaluator` (default). Matches the `RustEngine:UseSession=false` config.
      - `--engine <path>` — override engine binary path (default: `FLOWTIME_RUST_BINARY` env
        var, then `<solution>/engine/target/release/flowtime-engine`)
      - `-h` / `--help` — command-specific help

      ### Exit codes

      - **0** — success
      - **1** — analysis produced an explicit failure (e.g., validate returned invalid,
        optimize didn't converge and exited cleanly). The JSON response is still written to
        stdout and describes the failure — stderr is clean.
      - **2** — input error: missing required args, invalid JSON, engine binary not found,
        spec failed validation. Error message on stderr; nothing on stdout.
      - **3** — engine/runtime error: session subprocess crashed, protocol error,
        `InvalidOperationException` from evaluator. Error message on stderr; nothing on stdout.

      ### Engine binary resolution

      Same precedence as the API, extracted to a shared helper:
      1. `--engine <path>` command-line flag
      2. `FLOWTIME_RUST_BINARY` environment variable
      3. `<solution>/engine/target/release/flowtime-engine` (found via `DirectoryProvider.FindSolutionRoot`)
      4. `flowtime-engine` on `$PATH` (fallback)

      Fail with exit 2 and clear stderr message if binary is not found or not executable.

      ### Shared infrastructure

      Extract two helpers to `src/FlowTime.Cli/Commands/`:

      - `CliEngineSetup` — resolves engine binary path, constructs the chosen `IModelEvaluator`
        as `IAsyncDisposable` (so callers can `await using`). Also exposes a factory for
        `RustEngineRunner` (needed by `RustModelEvaluator` fallback).
      - `CliJsonIO` — reads JSON from stdin-or-file, writes JSON to stdout-or-file, common
        serialization options matching the API (camelCase, web defaults).

      ### In scope

      - `src/FlowTime.Cli/Commands/ValidateCommand.cs`
      - `src/FlowTime.Cli/Commands/SweepCommand.cs`
      - `src/FlowTime.Cli/Commands/SensitivityCommand.cs`
      - `src/FlowTime.Cli/Commands/GoalSeekCommand.cs`
      - `src/FlowTime.Cli/Commands/OptimizeCommand.cs`
      - `src/FlowTime.Cli/Commands/CliEngineSetup.cs` (helper)
      - `src/FlowTime.Cli/Commands/CliJsonIO.cs` (helper)
      - `src/FlowTime.Cli/Program.cs` — command routing + `PrintUsage` updates
      - Unit tests per command: `tests/FlowTime.Cli.Tests/Commands/{Validate,Sweep,Sensitivity,GoalSeek,Optimize}CommandTests.cs`
      - Integration tests that exercise end-to-end with the Rust binary:
        `tests/FlowTime.Integration.Tests/TimeMachineCliIntegrationTests.cs`
      - Update `docs/architecture/time-machine-analysis-modes.md` — new "CLI surface" section
      - Update `CLAUDE.md` Current Work

      ### Out of scope

      - `fit` command (blocked on Telemetry Loop & Parity epic — not yet started)
      - `chunked-eval` command (explicitly deferred by spec)
      - `monte-carlo` command (explicitly deferred by spec)
      - `System.CommandLine` framework migration — keep the existing minimal-args convention
        used by the `run` and `artifacts` commands; introducing a library would be a separate
        refactor
      - YAML / CSV / table output formats — JSON only
      - Interactive REPL mode
      - Progress reporting beyond stderr status lines

      ## Design

      ### Command shape (every analysis command)

      ```csharp
      public static class SweepCommand
      {
          public static async Task<int> ExecuteAsync(string[] args)
          {
              var parsed = ParseArgs(args);                // spec path, output, no-session, engine
              if (parsed.ShowHelp) { PrintHelp(); return 0; }

              SweepSpec spec;
              try { spec = CliJsonIO.Read<SweepSpec>(parsed.SpecPath); }
              catch (JsonException ex) { Console.Error.WriteLine($"Invalid JSON: {ex.Message}"); return 2; }

              await using var evaluator = CliEngineSetup.CreateEvaluator(parsed);
              var runner = new SweepRunner(evaluator);

              try
              {
                  var result = await runner.RunAsync(spec);
                  CliJsonIO.Write(parsed.OutputPath, result);
                  return 0;
              }
              catch (InvalidOperationException ex) { Console.Error.WriteLine(ex.Message); return 3; }
          }
      }
      ```

      Each command is ~30-40 lines — parsing, spec deserialization, runner invocation, output.

      ### Why not `System.CommandLine`?

      The existing `FlowTime.Cli` uses hand-rolled arg parsing (see `Program.cs` — `for` loop
      over args). Adding `System.CommandLine` would be a larger refactor that touches the
      `run` command too. Keeping consistency is more important than getting the nicer library
      for this milestone. A future cleanup milestone can migrate all commands together.

      ### Why JSON-over-stdio and not flag-driven?

      Specs like `OptimizeSpec` carry search ranges (one entry per param with lo/hi), objective
      enums, tolerance, max iterations. Representing them as CLI flags is unergonomic:

      ```
      flowtime optimize --param arrivals --range-arrivals 0:100 --param capacity \
                        --range-capacity 1:20 --metric util --objective minimize \
                        --tolerance 1e-4 --max-iters 200
      ```

      vs.

      ```
      cat optimize-spec.json | flowtime optimize
      ```

      The JSON path is pipeline-native: compose with `jq`, store specs as fixtures, invoke
      from Azure Functions custom handlers, share spec files with the API.

      ## Acceptance Criteria

      - [x] Five CLI commands (`validate`, `sweep`, `sensitivity`, `goal-seek`, `optimize`) wired into `Program.cs` router
      - [x] Each command parses `--spec` / stdin, `--output` / stdout, `--no-session`, `--engine`, `--help`
      - [x] `validate` reads YAML (not JSON) via `--model` / stdin; outputs `ValidationResult` as JSON
      - [x] Each analysis command reads its matching `*Spec` as JSON and writes its matching result as JSON, byte-compatible with the corresponding `/v1/` endpoint
      - [x] `CliEngineSetup` helper resolves binary path via `--engine` → `FLOWTIME_RUST_BINARY` → solution-relative default → `$PATH`
      - [x] `CliEngineSetup` constructs `SessionModelEvaluator` by default; `--no-session` selects `RustModelEvaluator`
      - [x] `CliJsonIO` helper reads JSON from stdin-or-file and writes JSON to stdout-or-file with camelCase / web defaults matching the API; `JsonStringEnumConverter` added so `objective: "minimize"` etc. deserialize correctly
      - [x] Exit codes follow the 0/1/2/3 contract (success / analysis-failed / input-error / engine-error)
      - [x] Missing engine binary produces exit 2 with a readable stderr message
      - [x] Invalid JSON produces exit 2 with a stderr message; no partial stdout
      - [x] `--help` on any command prints command-specific usage and exits 0
      - [x] Unit tests pass: 72 new CLI unit tests
        - 15 CliJsonIO (read/write, file/stdin, camelCase, null literal, errors)
        - 14 CliCommonArgs (all flag variants, missing values, unknown flag, positional, dash-as-positional)
        - 8 CliEngineSetup (path precedence, evaluator selection, disposal idempotency)
        - 13 ValidateCommand (help, arg errors, tier, valid/invalid YAML, output)
        - 18 AnalysisCommandTests (help for each of 4 commands, shared error paths, IsOnPath, BarePath)
        - 4 deferred (covered by integration tests instead — see below)
      - [x] Integration tests pass with the Rust binary present: 10 tests (TimeMachineCliIntegrationTests)
        - [x] `flowtime validate` with valid and invalid YAML
        - [x] `flowtime sweep` end-to-end producing correct series (arrivals=10,20,30 → served=5,10,15)
        - [x] `flowtime sensitivity` end-to-end (∂served/∂arrivals = 0.5)
        - [x] `flowtime goal-seek` end-to-end (target served=25 → arrivals≈50)
        - [x] `flowtime optimize` converging on a `MAX(x-7,7-x)` bowl around arrivals=14
        - [x] Session vs. per-eval flag (`--no-session`) both work
        - [x] Output to file (`-o`) matches output to stdout
        - [x] Engine compile error (unknown function) produces exit 3
      - [x] Every reachable path in the new command classes and helpers is covered (line-by-line audited)
      - [x] `docs/architecture/time-machine-analysis-modes.md` — new "CLI surface" section documents the five commands, JSON I/O contract, exit codes, evaluator selection, engine resolution, and pipeline composition example
      - [x] `Program.cs` `PrintUsage` updated with the five new commands
      - [x] `dotnet build FlowTime.sln` green
      - [x] `dotnet test FlowTime.sln` all green — 1,702 passed / 9 skipped

      ## Coverage notes

      **Covered:** every reachable branch in the command classes, helpers, and the `AnalysisCliRunner` shared path. The 89 CLI unit tests explicitly exercise:

      - Help paths for all 5 commands
      - All `CliCommonArgs` flag variants (spec/model/output/no-session/engine/help) and their error paths (missing value, unknown flag)
      - Positional spec path AND `-` as a positional
      - JSON I/O to/from file and stdin/stdout; invalid JSON; null JSON literal; missing file
      - Engine path precedence (explicit/env/default); empty explicit falls through
      - Evaluator construction for both session and no-session; disposal idempotency for both
      - Input-error paths (exit 2): unknown flag, missing spec file, invalid JSON, invalid spec (ArgumentException), missing engine binary
      - `IsOnPath` branches (absolute / relative-with-separator / bare name)
      - Bare-name engine path bypasses file-existence check and reaches the spawn step

      Integration tests (8) cover success paths and the exit-3 engine-error path.

      **Explicitly not covered:**

      | Path | Why untested |
      |------|--------------|
      | `CliEngineSetup.ResolveEnginePath` fallback to bare `"flowtime-engine"` when `DirectoryProvider.FindSolutionRoot()` returns null | Would require environment manipulation to move outside any .git-rooted directory tree. The env-var and explicit paths are covered; the default-path branch is covered when run inside the repo. |

      This is a single acceptable gap for platform-edge behavior.

      ## Dependencies

      - M-003 (TimeMachineValidator) — delivered
      - M-006 (`IModelEvaluator`, `SweepRunner`, `ConstNodePatcher`) — delivered
      - M-007 (`SensitivityRunner`, `ConstNodeReader`) — delivered
      - M-008 (`GoalSeeker`) — delivered
      - M-009 (`Optimizer`, `OptimizeSpec`) — delivered
      - M-010 (`SessionModelEvaluator`, evaluator config switch) — delivered

      ## Risks / notes

      - **Argument parser consistency.** The existing CLI uses manual `for`-loop parsing. New
        commands should follow the same convention; don't introduce a parsing library in this
        milestone. A future cleanup epic can migrate all commands to `System.CommandLine`.
      - **Test isolation.** Integration tests spawn the Rust engine subprocess per test. Same
        skip-if-missing pattern as M-010 integration tests.
      - **Stdin handling in tests.** Tests should not actually redirect Console.In — use the
        `--spec <path>` flag with a temp file for test inputs. Reserve stdin testing for a
        single smoke test that sets `Console.SetIn`.
      - **Binary resolution on Windows.** Paths use `Path.Combine`; binary name on Windows is
        `flowtime-engine.exe`. The existing `DirectoryProvider` / `EngineSessionBridge` handle
        this correctly — reuse their logic.
  - kind: milestone
    id: M-012
    frontmatter:
      title: Compiled Semantic References
      status: done
      parent: E-16
    body: |
      ## Goal

      Introduce typed semantic references in the compiled/runtime model so FlowTime stops deriving runtime relationships from raw authoring strings inside API and analytical code. This milestone creates the first hard boundary between authoring syntax and runtime truth. It also types the `Parallelism` field, which currently uses `object?` and is parsed at runtime in both Core and API.

      ## Context

      Today runtime-facing semantics still preserve raw strings such as `file:SupportQueue_queue.csv` or `series:NodeId`, and later layers parse those strings again to recover meaning. That is the root cause behind the current logical-type drift and duplicate parsers in `StateQueryService`.

      Reference parsing is currently duplicated across four sites:
      - `SemanticLoader.IsFileUri()` / `LoadSeries()` — Core, combines reference resolution with file I/O
      - `ModelCompiler.IsFileReference()` — Core, reference detection only
      - `StateQueryService.TryResolveSeriesNodeId()` — API, extracts node IDs from references for logicalType promotion
      - `RunArtifactReader.NormalizeSeriesIdentifier()` — Generator, normalizes references during capture

      Runtime metadata recovery also still leaks across the authoring/runtime boundary:
      - `RunManifestReader.ExtractTelemetrySourcesFromText()` — Core, reparses raw YAML text to recover telemetry-source facts when artifact metadata is missing

      Before analytical purity can be enforced, the compiler must own semantic reference resolution once. This cut is forward-only: old runs, fixtures, and approved snapshots can be regenerated once the compiled runtime shape changes.

      ## Pre-flight Gate

      Before implementation begins, confirm these invariants are testable and will gate review:

      1. No new semantic string parsing helpers are introduced in API/UI for analytical identity. Remaining logical-type bridge helpers are isolated and explicitly deleted in M-014.
      2. No new `file:` / `series:` / `@` parsing helper outside the compiler.
      3. `Parallelism` is no longer `object?` — it is a typed reference resolved at compile time.
      4. SemanticLoader accepts typed references for data loading, not raw authoring strings.

      ## Acceptance Criteria

      1. Runtime-facing node semantics use typed references for the semantic fields that affect runtime behavior, including arrivals, served, queueDepth, capacity, processingTimeMsSum, servedCount, attempts, failures, retryEcho, and related analytical inputs.
      2. The compiler resolves self, node, file, and series references into one canonical representation with deterministic tests covering current repo-standard reference patterns.
      3. Raw source text is retained only for provenance/debug surfaces; runtime behavior no longer depends on reparsing those raw strings.
      4. Forward-only migration is explicit: existing run directories, generated fixtures, and approved snapshots that depend on the old runtime shape are regenerated; no compatibility reader or fallback path is added for the old analytical/runtime boundary.
      5. `StateQueryService` no longer contains raw-string semantic-reference parsing helpers for data loading, queue-source recovery, or parallelism resolution. Any remaining logical-type bridge code consumes compiled typed semantics and is tracked for deletion in M-014.
      6. `Parallelism` becomes a typed reference (numeric constant or series ref) resolved at compile time. The `object?` type on `NodeSemantics.Parallelism` is replaced.
      7. `SemanticLoader` is split: reference resolution moves to the compiler; data loading stays as I/O and takes typed references as input instead of raw strings.
      8. A grep-based audit confirms no `file:` / `series:` string parsing remains in API or adapter code for runtime analytical behavior.
      9. Runtime metadata readers no longer recover telemetry-source facts by reparsing raw YAML/model text once regenerated artifacts can carry those facts explicitly; raw-text fallback readers are deleted in the same forward-only cut.
      10. `dotnet build` and `dotnet test --nologo` are green.

      ## Guards / DO NOT

      - **DO NOT** add a compatibility reader or fallback parser for the old raw-string reference shapes. Forward-only.
      - **DO NOT** create a new reference-parsing helper in the API or adapter layer. If a new reference pattern is discovered, extend the compiler.
      - **DO NOT** keep `NodeSemantics.Parallelism` as `object?`. The loose typing is the problem, not a feature.
      - **DO NOT** make SemanticLoader parse raw strings itself. After this milestone, SemanticLoader receives typed refs for I/O.
      - **DO NOT** preserve raw-string parsing helpers such as `TryResolveSeriesNodeId` or `seriesFileRegex` as "temporary" helpers. Descriptor-driven logical-type deletion belongs to M-014; do not blur the slice by pulling that milestone forward.
      - **DO NOT** introduce adapter-side reference resolution "for convenience." The compiler owns reference resolution.
      - **DO NOT** keep raw-YAML fallback extraction in runtime metadata readers once regenerated artifacts can carry telemetry-source facts explicitly.

      ## Deletion Targets

      These specific code paths must be removed or replaced by this milestone's completion:

      | Target | Location | Why |
      |--------|----------|-----|
      | `TryResolveSeriesNodeId()` | StateQueryService.cs:5288 | Parses `file:`, `series:`, `@` in the adapter to extract node IDs |
      | `seriesFileRegex` | StateQueryService.cs:5250 | Regex for extracting filenames from `file:` URIs |
      | `IsFileUri()` (as reference resolution) | SemanticLoader.cs:185 | Data loader should not decide what a reference means |
      | `IsFileReference()` | ModelCompiler.cs:140 | Collapses into typed reference resolution in the compiler |
      | `ParseParallelismScalar()` | StateQueryService.cs | Runtime parsing of `object?` parallelism — compiler resolves it |
      | `BuildParallelismSeries()` | StateQueryService.cs:1694 | Runtime conversion of parallelism to series — compiler resolves it |
      | `ExtractTelemetrySourcesFromText()` fallback | RunManifestReader.cs | Runtime metadata must not recover telemetry facts by reparsing raw YAML |

      ## Test Strategy

      - **Reference resolution tests:** Cover all current reference patterns (`file:name.csv`, `series:NodeId`, `series:NodeId@Class`, self-reference, numeric literals for parallelism, node references for parallelism) with deterministic compiler-level tests.
      - **Round-trip parity tests:** Prove that compiled typed references produce the same runtime data loading as the old raw-string path, then delete the old path.
      - **Negative tests:** Verify that `StateQueryService` and adapter code do not contain reference-parsing helpers post-migration (grep-based audit as AC).
      - **Fixture regeneration:** All existing approved snapshots that depend on the old runtime shape are regenerated and re-approved.
      - **Runtime-metadata migration tests:** Regenerated runs prove telemetry-source facts are loaded from explicit artifact metadata, not raw-YAML fallback extraction.

      ## Execution Checklist

      Work these slices in order. Do not pull descriptor-era cleanup forward from M-014.

      ### Slice 1: Typed runtime reference model

      - [ ] Introduce the typed semantic reference model at the Core/compiler boundary.
      - [ ] Replace runtime-facing `object?` parallelism with an explicit typed shape in `src/FlowTime.Core/Models/NodeSemantics.cs`.
      - [ ] Update authored-model/template surfaces that currently carry loose parallelism values: `src/FlowTime.Contracts/Dtos/ModelDtos.cs`, `src/FlowTime.Sim.Core/Templates/Template.cs`, and the related template validation/substitution paths.
      - [ ] Preserve authored YAML/template syntax; authoring stays string/number friendly even though runtime semantics become typed.
      - Review gate: compiler tests cover `file:`, `series:`, `@`, self, numeric literal, and node/series-backed parallelism cases.

      ### Slice 2: Compiler owns reference resolution

      - [ ] Move runtime-relevant reference parsing/resolution into `src/FlowTime.Core/Compiler/ModelCompiler.cs`.
      - [ ] Narrow `src/FlowTime.Core/DataSources/SemanticLoader.cs` so it performs typed-ref I/O only, not reference interpretation.
      - [ ] Audit generator/run-orchestration call sites that currently depend on normalized raw references, including `src/FlowTime.Generator/Orchestration/RunOrchestrationService.cs`.
      - [ ] Remove raw-YAML telemetry-source fallback from `src/FlowTime.Core/TimeTravel/RunManifestReader.cs` once regenerated runtime metadata carries those facts explicitly.
      - Review gate: round-trip parity tests prove typed refs load the same runtime data as the old raw-string path before the old path is deleted.

      ### Slice 3: API stops reparsing semantics

      - [ ] Remove or replace `TryResolveSeriesNodeId()`, `seriesFileRegex`, `ParseParallelismScalar()`, and `BuildParallelismSeries()` usage in `src/FlowTime.API/Services/StateQueryService.cs`.
      - [ ] Audit `src/FlowTime.API/Services/GraphService.cs` so graph projection consumes compiled/typed semantics rather than normalizing raw parallelism references.
      - [ ] Keep any remaining logical-type bridge code isolated for M-014; this slice ends when raw reference parsing is gone, not when descriptor cleanup is complete.
      - Review gate: grep audit over `src/FlowTime.API` and adapters finds no new raw reference parsers for runtime behavior.

      ### Slice 4: Validation sweep

      - [ ] Core compiler/data-source tests: `tests/FlowTime.Core.Tests/Compiler/ModelCompilerTests.cs`, `tests/FlowTime.Core.Tests/Compiler/ModelCompilerParityTests.cs`, `tests/FlowTime.Core.Tests/DataSources/SemanticLoaderTests.cs`.
      - [ ] Sim/template tests: `tests/FlowTime.Sim.Tests/NodeBased/TemplateParserTests.cs` and any template substitution/validation coverage touched by typed parallelism.
      - [ ] API regression tests: `tests/FlowTime.Api.Tests/StateEndpointTests.cs` for service-with-buffer parallelism and current-state/state-window behavior.
      - [ ] Generator/integration smoke coverage: `tests/FlowTime.Generator.Tests/` plus at least one full-loop scenario in `tests/FlowTime.Integration.Tests/`.
      - [ ] Final gate: `dotnet build` and `dotnet test --nologo` green after forward-only fixture regeneration.

      ## Technical Notes

      - Introduce a `SeriesRef`-style value object or equivalent typed semantic reference model. Consider a discriminated union: `FileRef | SeriesRef | SelfRef | NodeRef | ConstantRef`.
      - Keep provenance-friendly raw text separate from runtime compiled semantics.
      - Centralize reference parsing in the compiler/parser boundary rather than adding new adapter helpers.
      - Prefer deleting and regenerating old runs/fixtures over carrying mixed old/new runtime shapes.
      - **SemanticLoader split:** `SemanticLoader.LoadSeries(string uri, int bins)` becomes `SemanticLoader.LoadSeries(SeriesRef ref, int bins)` or equivalent. The `UriResolver.ResolveFilePath()` call stays but receives a typed ref.
      - **Parallelism typing:** Replace `object? Parallelism` with a typed ref (e.g., `ParallelismRef` that is either a constant double or a series reference). Resolve at compile time. The 21-file cross-cut noted in gaps.md is acceptable because E-16 is the right place to do it.
      - **Milestone boundary:** Descriptor-driven deletions (`DetermineLogicalType`, `NormalizeKind`, `IsDlqKind`) happen in M-014 once the compiled descriptor exists. This slice stops at typed references and parallelism typing.

      ## Out of Scope

      - Public contract changes for analytical facts
      - Class-truth boundary cleanup
      - Consolidation of analytical evaluator logic
      - UI/client cleanup

      ## Dependencies

      - Builds on the existing compiler/model parser foundation in Core
  - kind: milestone
    id: M-013
    frontmatter:
      title: Class Truth Boundary
      status: done
      parent: E-16
    body: |
      ## Goal

      Separate real by-class truth from wildcard fallback before runtime analytical descriptors and evaluators depend on it. This milestone makes class truth explicit instead of letting later layers infer it from `*` and coverage side effects.

      ## Context

      The current class path mixes aggregation, coverage, warnings, and synthesized wildcard fallback. That is too late and too implicit for the rest of E-16: if evaluator and contract work build on it as-is, they will keep guessing whether a class result is real or synthesized.

      Wildcard handling is currently scattered across:
      - `StateQueryService` (line ~1711): blank class keys → `*`
      - `StateQueryService` (line ~4712): `*` and `DEFAULT` detection, skip logic to avoid double-counting
      - `Dashboard.razor.cs` `EnsureFallbackClassesFromWindow()`: client-side fallback class extraction

      ## Acceptance Criteria

      1. Internal class surfaces distinguish real by-class data, synthesized fallback, and no-class coverage explicitly via a typed representation (not just string key conventions).
      2. Wildcard fallback is represented as an explicit fallback fact rather than inferred solely from the `*` key or the absence of real class data.
      3. Analytical evaluation and projection code consume explicit class-truth facts instead of silently relying on wildcard fallback.
      4. Tests cover real multi-class fixtures separately from fallback projection cases, and approved outputs are regenerated forward-only where needed.
      5. A test or assertion proves that fallback-only data cannot be confused with real by-class analytical results in downstream evaluation.
      6. Forward-only regenerated runtime metadata carries explicit fallback labeling at the class boundary; legacy `*` / `DEFAULT` normalization helpers are deleted rather than retained as compatibility translators.
      7. `dotnet build` and `dotnet test --nologo` are green.

      ## Guards / DO NOT

      - **DO NOT** add `IsFallback` booleans to every DTO or scatter fallback awareness across unrelated types. Use a small explicit runtime shape (e.g., a tagged union or wrapper) at the class-data boundary.
      - **DO NOT** keep `*` as the sole signal for fallback. The `*` key may persist for serialization, but runtime code must not use string-equality checks against `*` or `DEFAULT` to decide truth vs fallback.
      - **DO NOT** unify `*` and `DEFAULT` by normalizing to one string. Replace the string convention with a typed fact.
      - **DO NOT** keep a legacy class-id normalization helper as a permanent ingest shim once regenerated artifacts can encode fallback explicitly.
      - **DO NOT** change the public API contract in this milestone. Class-truth is an internal boundary; contract publication comes in M-017.
      - **DO NOT** let tests pass by exercising only fallback projection. Real multi-class and fallback-only must be separate test categories.

      ## Deletion Targets

      | Target | Location | Why |
      |--------|----------|-----|
      | Blank-key → `*` string inference | StateQueryService.cs:~1711 | Replace with typed fallback fact at the source |
      | `*`/`DEFAULT` string-equality skip logic | StateQueryService.cs:~4712 | Replaced by typed class-truth discriminator |
      | `ClassEntry.FromLegacyClassId()` / `IsLegacyFallbackId()` | ClassEntry.cs | Forward-only runtime metadata should encode fallback explicitly, not via legacy string translation |

      ## Test Strategy

      - **Two distinct fixture categories:** (1) real multi-class data with 2+ named classes, (2) single-class or no-class data that produces fallback. Tests must not share fixtures.
      - **Fallback-is-labeled tests:** Assert that downstream evaluation code receives an explicit fallback marker, not just a `*` key string.
      - **No false parity tests:** A test that proves "by-class analytical results match expectations" must use real multi-class fixtures, not wildcard-only data.
      - **Negative assertion:** Grep-based check that no new `== "*"` or `== "DEFAULT"` string comparisons are added for analytical class-truth decisions.

      ## Technical Notes

      - Favor a small explicit runtime shape over spreading fallback booleans across unrelated DTOs. A tagged type like `ClassResult<T>` with `Real | Fallback` discriminator is one option.
      - Keep this milestone internal to Core/API surfaces; public analytical contract publication comes later.
      - If wildcard fallback remains visible externally at this stage, it must be labeled as fallback in the internal representation even if the external key is still `*`, and regenerated runtime metadata must carry that fact without relying on `*` / `DEFAULT` translation helpers.
      - Dashboard and other client fallback heuristics are deleted only when explicit fallback facts are published in M-017. Do not pull client migration into this internal boundary slice.

      ## Out of Scope

      - Public analytical contract redesign
      - Runtime analytical descriptor publication
      - Client heuristic deletion

      ## Dependencies

      - [M-012](M-012.md)
  - kind: milestone
    id: M-014
    frontmatter:
      title: Runtime Analytical Descriptor
      status: done
      parent: E-16
    body: |
      ## Goal

      Compile an authoritative analytical descriptor onto runtime nodes and make all analytical capability checks consume that descriptor. This removes adapter-owned logical-type reconstruction and turns analytical identity into a compiled invariant. The descriptor absorbs and replaces `AnalyticalCapabilities`.

      ## Context

      `AnalyticalCapabilities` is currently a useful bridge abstraction resolved at query time from `kind + logicalType` strings. Once typed semantic references exist and class truth is explicit, runtime nodes can carry an analytical descriptor that is authoritative instead of forcing `StateQueryService` to infer one from strings and fallback behavior.

      The descriptor absorbs `AnalyticalCapabilities` rather than sitting alongside it. `AnalyticalCapabilities.Resolve(kind, logicalType)` was the right bridge for M-057, but string-based resolution is exactly what E-16 eliminates. The descriptor is produced by the compiler using typed semantic references. The computation methods formerly on `AnalyticalCapabilities` (`ComputeBin`, `ComputeWindow`, etc.) now live on the analytical evaluator; broader evaluator consolidation continues in M-015.

      ## Structural Decision: Descriptor absorbs AnalyticalCapabilities

      | Aspect | AnalyticalCapabilities (current) | Analytical Descriptor (target) |
      |--------|----------------------------------|-------------------------------|
      | Resolution | `Resolve(string? kind, string? logicalType)` at query time | Produced by compiler at compile time from typed refs |
      | Capability flags | `HasQueueSemantics`, `HasServiceSemantics`, etc. | Same flags, now compiled facts |
      | `EffectiveKind` | String normalization bridge | Removed — replaced by typed analytical identity on the descriptor |
      | Computation methods | `ComputeBin`, `ComputeWindow`, etc. | Owned by the descriptor-backed analytical evaluator; extended further in M-015 |
      | Queue origin | Not captured — recovered by `TryResolveSeriesNodeId` in API | Compiled fact: source-node identity for queue depth |
      | Node category | Not captured — `GraphMapper.Classify()` and `TopologyCanvas.ClassifyNode()` reconstruct it | Compiled fact: expression / constant / service / queue / dlq / router |
      | Parallelism | Not captured — resolved at runtime from `object?` | Compiled fact: resolved from typed parallelism reference |

      ## Acceptance Criteria

      1. Runtime nodes carry a compiled analytical descriptor that captures: effective analytical identity, queue/service semantics, cycle-time applicability, warning applicability, queue-origin/source-node facts, node category, and resolved parallelism.
      2. Explicit `serviceWithBuffer` nodes and reference-resolved queue-backed nodes produce identical descriptors using typed references and real fixture shapes, not basename heuristics.
      3. Snapshot/window analytical paths, backlog warnings, flow-latency base composition, SLA helper logic, and internal state/graph projection paths consume the descriptor rather than reconstructing analytical identity from strings.
      4. `AnalyticalCapabilities` is deleted. Its capability flags are absorbed into the descriptor. Its computation methods live on the descriptor-backed evaluator surface.
      5. Adapter-side logical-type inference helpers used for runtime analytical behavior are deleted.
      6. Core and targeted API tests prove parity for both explicit and reference-resolved cases.
      7. Node category (expression/constant/service/queue/dlq) is a compiled descriptor field. No downstream code re-derives it from `kind` strings.
      8. `dotnet build` and `dotnet test --nologo` are green.

      ## Guards / DO NOT

      - **DO NOT** keep `AnalyticalCapabilities` alongside the descriptor. The descriptor replaces it.
      - **DO NOT** resolve the descriptor from `kind + logicalType` strings. It must be produced by the compiler using typed semantic references.
      - **DO NOT** put computation methods on the descriptor. Descriptor fields are facts, not deferred computations. Math moves to the evaluator.
      - **DO NOT** add a `string EffectiveKind` field to the descriptor. That was a bridge concept for string-based resolution. The descriptor captures identity directly.
      - **DO NOT** let any adapter or UI code reconstruct node category from `kind` strings after this milestone.
      - **DO NOT** design the descriptor as a bag of booleans. Prefer a structured type with explicit semantics over `bool HasX` proliferation where a richer type is clearer.

      ## Deletion Targets

      | Target | Location | Why |
      |--------|----------|-----|
      | `AnalyticalCapabilities` class | Core/Metrics/AnalyticalCapabilities.cs | Absorbed into the compiled descriptor |
      | `AnalyticalCapabilities.Resolve()` | Core/Metrics/AnalyticalCapabilities.cs:32 | String-based resolution replaced by compiler |
      | `DetermineLogicalType()` (if survived M-012) | StateQueryService.cs:5252 | Adapter-side logicalType inference |
      | `NormalizeKind()` (if survived M-012) | StateQueryService.cs:5240 | String normalization — descriptor has the identity |
      | `IsDlqKind()` (if survived M-012) | StateQueryService.cs:5354 | DLQ classification becomes a compiled fact |
      | `TryResolveServiceWithBufferDefinition()` | StateQueryService.cs:5267 | Queue-origin discovery from strings — now a compiled fact |
      | UI-side `IsServiceLike()` for analytical gating (if any exists) | Various | Replaced by descriptor fact; UI deletion completes in M-017 |

      ## Test Strategy

      - **Descriptor compilation tests:** Given a model with explicit `serviceWithBuffer`, reference-resolved queue, expression, constant, DLQ, and router nodes, prove the compiler produces correct descriptors.
      - **Parity tests:** Explicit `serviceWithBuffer` and reference-resolved queue-backed nodes produce identical descriptor fields.
      - **Adapter-does-not-reclassify tests:** Assert that `StateQueryService` and projection code read descriptor fields without re-deriving analytical identity.
      - **Category tests:** Prove that node category (expression/constant/service/queue/dlq) is a compiled fact, not inferred from strings downstream.
      - **Regression guard:** Grep-based check that no new `NormalizeKind`, `DetermineLogicalType`, or `kind.ToLowerInvariant()` patterns appear in API code.

      ## Technical Notes

      - Separate authoring `kind` from runtime analytical category. `kind` remains on the authored model; the descriptor owns the runtime truth.
      - Effective analytical identity is a typed descriptor fact, not a normalized string bridge.
      - Descriptor fields should be facts, not deferred computations.
      - Queue origin and source-node identity should come from compiled references rather than file-name or string-shape inference.
      - Consider an enum for node category rather than strings: `NodeCategory { Expression, Constant, Service, Queue, Dlq, Router }`.
      - Legacy projection hints may still be serialized for compatibility until M-017, but they must be derived from descriptor facts rather than reparsed semantics or local string heuristics.

      ## Out of Scope

      - Public contract publication of the descriptor (M-017)
      - Consolidation of emitted-series truth and warning facts into the evaluator (M-015, M-016)

      ## Dependencies

      - [M-013](M-013.md)
  - kind: milestone
    id: M-015
    frontmatter:
      title: Core Analytical Evaluation
      status: done
      parent: E-16
    body: |
      ## Goal

      Move analytical values, emitted-series truth, and graph-level analytical computation into a pure Core evaluation surface so the API projects analytical results instead of deciding them. This includes both per-node analytical evaluation (from `AnalyticalCapabilities`) and graph-level flow latency propagation (from `StateQueryService.ComputeFlowLatency`).

      ## Context

      `AnalyticalCapabilities` moved current math into Core, but emitted-series truth is still partially computed in the adapter. That leaves the most important projection question — what should actually be emitted for this node/window/class — split across Core and API.

      Additionally, `flowLatencyMs` — the cumulative flow latency from entry to a node through the queueing network — is currently computed in `StateQueryService.ComputeFlowLatency()` as a topological graph traversal with flow-volume-weighted accumulation. This is graph-level queueing theory (expected sojourn time through a network), not an adapter concern. The Core IS a graph engine; graph-level analytical computation belongs there.

      Effective capacity computation (`capacity x parallelism`) is also currently split between `InvariantAnalyzer` (Core) and `StateQueryService.GetEffectiveCapacity` (API). It should have one owner in Core.

      Metrics query resolution also still carries a duplicate analytical path: `MetricsService` first asks `StateQueryService` for a window, then falls back to `ResolveViaModelAsync()` and recomputes analytical behavior from the model when state-window resolution fails. That is still a second analytical execution path in the adapter and E-16 must delete it. E-16 stays forward-only here as well: legacy runs that depended on that path are removed and regenerated rather than supported through a special failure/upgrade mode.

      **Supersedes D-016** for `flowLatencyMs`: that decision was a bridge for M-057 scope. E-16 is the full purification — graph-level analytical computation moves to Core.

      ## Acceptance Criteria

      1. Core exposes an analytical evaluation surface for snapshot, window, and by-class values driven by the compiled analytical descriptor and explicit class-truth boundary.
      2. Core returns one consolidated internal analytical result surface with explicit nested sections for derived values, emitted-series truth, effective-capacity/utilization facts, and graph-level flow-latency outputs sufficient for projection.
      3. `StateQueryService` no longer computes analytical emission truth or per-node/per-class analytical math locally in the current state paths.
      4. `flowLatencyMs` computation moves to Core as a pure function: `(compiledTopology, perNodeCycleTime[], edgeFlowVolume[]) → perNodeFlowLatency[]`. The adapter passes inputs, Core owns the graph traversal and accumulation.
      5. Effective capacity computation (`capacity x parallelism`) has one owner in Core. The API's `GetEffectiveCapacity` / `GetParallelismValue` / `ComputeUtilizationSeries` delegation is replaced by Core evaluation.
      6. Tests prove analytical evaluation against both real multi-class fixtures and explicit fallback cases without conflating the two.
      7. `MetricsService` and analogous analytical query surfaces consume the same Core evaluation surface instead of maintaining a second model-evaluation fallback path for analytical behavior; legacy runs that depended on the fallback path are removed or regenerated as part of the forward-only cut.
      8. `dotnet build` and `dotnet test --nologo` are green.

      ## Guards / DO NOT

      - **DO NOT** leave `flowLatencyMs` in the adapter. It is graph-level queueing theory — expected sojourn time through a network — not an orchestration concern. The Core is a graph engine; this computation belongs there.
      - **DO NOT** leave partial computation in the adapter "for convenience." If the adapter computes any analytical value, that is a regression.
      - **DO NOT** keep `GetEffectiveCapacity()` or `ComputeUtilizationSeries()` in `StateQueryService`. Effective capacity (with parallelism) is a flow algebra concept.
      - **DO NOT** keep `MetricsService.ResolveViaModelAsync()` as a second analytical execution path once the unified Core evaluator exists.
      - **DO NOT** introduce an "unsupported legacy run" mode or regeneration hint path for analytical fallback cleanup. Delete old runs and regenerate future-version runs instead.
      - **DO NOT** make the evaluator depend on adapter types. The evaluator takes compiled descriptors + raw series data and returns analytical results. The adapter projects those results into DTOs.
      - **DO NOT** use ad hoc dictionaries or flag tuples for results. Prefer explicit result types and one consolidated internal result surface with nested sections over many partial policy-bearing result fragments.
      - **DO NOT** make `flowLatencyMs` depend on implicit node ordering. The Core evaluator should perform explicit topological sorting or receive an explicit order.

      ## Deletion Targets

      | Target | Location | Why |
      |--------|----------|-----|
      | `ComputeFlowLatency()` | StateQueryService.cs:2748 | Graph-level analytical computation moves to Core |
      | `BuildIncomingFlowEdges()` | StateQueryService.cs:2867 | Supporting method for flowLatencyMs — moves to Core |
      | `BuildEdgeFlowVolumeLookup()` | StateQueryService.cs:2921 | Supporting method for flowLatencyMs — moves to Core |
      | `GetEffectiveCapacity()` | StateQueryService.cs:2644 | Effective capacity moves to Core |
      | `GetParallelismValue()` | StateQueryService.cs:2666 | Parallelism resolution moves to Core (compiler) |
      | `ComputeUtilizationSeries()` | StateQueryService.cs:2595 | Utilization is derived from effective capacity — Core |
      | `ConvertClassMetrics()` local computation | StateQueryService.cs:1011 | Class analytical math moves to Core evaluator |
      | `ResolveViaModelAsync()` fallback | MetricsService.cs | Duplicate adapter-side analytical execution path must be deleted |
      | `AnalyticalCapabilities.ComputeBin/Window/ClassBin/ClassWindow` | AnalyticalCapabilities.cs (if not deleted in M-014) | These methods become the evaluator |
      | Per-node analytical math in snapshot/window builders | StateQueryService.cs | Replaced by Core evaluator calls |

      ## Test Strategy

      - **Evaluator unit tests:** Pure function tests — given descriptor + raw series data, assert correct analytical results for snapshot, window, and by-class.
      - **flowLatencyMs graph tests:** Given a small compiled topology with known cycle times and edge flow volumes, assert correct cumulative latency propagation.
      - **Effective capacity tests:** Given capacity series + parallelism (constant and time-varying), assert correct effective capacity and utilization.
      - **Adapter-is-projector tests:** Assert that `StateQueryService` calls Core evaluator and maps results to DTOs without computing any analytical values locally.
      - **Single analytical path tests:** Assert that metrics queries and state-window queries consume the same Core evaluator surface and do not diverge through an alternate model-fallback path.
      - **Multi-class vs fallback tests:** Evaluator tests must include both real multi-class and fallback-only fixtures as separate test cases.
      - **Parity tests:** End-to-end API tests prove the same analytical outputs as before the migration.

      ## Technical Notes

      - Keep pure math helpers where useful, but move policy composition out of the adapter.
      - Prefer one consolidated internal analytical result model with nested sub-results over many partial adapter-composed results.
      - Warning/analyzer facts are split into the next milestone so this slice stays independently shippable.
      - The flowLatencyMs evaluator should take explicit topological order or compute it from the compiled graph. Do not rely on implicit iteration order.
      - `flowLatencyMs` uses flow-volume-weighted accumulation: `upstream = sum(flow[i] * predLatency[i]) / sum(flow[i])`. This is the right formula — preserve it.

      ## Out of Scope

      - Warning/analyzer fact publication (M-016)
      - Public contract changes (M-017)
      - Client migration (M-017)

      ## Dependencies

      - [M-014](M-014.md)
  - kind: milestone
    id: M-016
    frontmatter:
      title: Analytical Warning Facts and Primitive Cleanup
      status: done
      parent: E-16
    body: |
      ## Goal

      Move analytical warning facts into the consolidated Core analytical result surface and finish the primitive ownership cleanup so analytical policy has one owner per concept.

      ## Context

      E16-04 correctly moved descriptor-backed analytical evaluation, emitted-series truth, effective capacity, utilization, and flow latency into Core. The remaining impurity is narrower: warning production and a few helper seams still leave the adapter and public helper APIs with partial analytical ownership.

      Current warning production is still split across adapter-local policy and Core predicates:
      - `BuildBacklogWarnings()` in `StateQueryService` assembles analytical warnings in the API.
      - `FindQueueGrowthStreak()`, `FindOverloadStreak()`, and `FindAgeRiskStreak()` still live in the adapter and compute analytical policy over evaluated series.
      - `BuildStationarityWarnings()` still constructs warning DTOs in the adapter after calling `RuntimeAnalyticalEvaluator.CheckStationarity()`.
      - Descriptor-backed warning eligibility is already in Core, but warning production itself is not.

      Current primitive ownership is also still split:
      - `RuntimeAnalyticalEvaluator` is already the public analytical owner for descriptor-backed evaluation and emitted truth.
      - `LatencyComputer` still duplicates `CycleTimeComputer.CalculateQueueTime()` in different units and is called both from the evaluator and directly from the API.
      - `CycleTimeComputer.CheckNonStationary()` still acts as the public stationarity policy implementation even though stationarity is now an evaluator/analyzer concern.
      - E16-04 already established one consolidated internal analytical result family. E16-05 must extend that surface with analytical warning facts rather than introduce a second parallel warning pipeline.

      ## Acceptance Criteria

      1. Stationarity, backlog growth, overload, and age-risk analysis consume compiled descriptors plus evaluated analytical facts from Core; no current-state API path reconstructs analytical warning applicability from raw semantics or payload shape.
      2. Core extends the consolidated internal analytical result surface with structured analytical warning facts for the relevant window/current-state paths. The API projects those facts into contract DTOs without building analytical warning policy locally.
      3. Primitive ownership is singular:
         - `RuntimeAnalyticalEvaluator`, or a tightly-scoped Core analyzer directly beneath it, is the only public analytical owner for latency and stationarity warning semantics.
         - `LatencyComputer` is deleted or reduced to private/internal helper math beneath the evaluator/analyzer surface; `StateQueryService` does not call it directly.
         - `CycleTimeComputer.CheckNonStationary()` is deleted or reduced to private/internal helper math; public stationarity policy is no longer exposed from `CycleTimeComputer`.
      4. `StateQueryService` no longer contains analytical warning producers such as `BuildBacklogWarnings()`, `BuildStationarityWarnings()`, `FindQueueGrowthStreak()`, `FindOverloadStreak()`, or `FindAgeRiskStreak()` for runtime analytical behavior.
      5. Duplicate analytical policy paths are removed. Each analytical concept relevant to this slice (`queueTimeMs`, `latencyMinutes`, stationarity, backlog growth, overload, age risk) has exactly one public owner in Core, and the API acts only as projector.
      6. `dotnet build` and `dotnet test --nologo` are green, with regenerated approved outputs where warning facts changed.

      ## Guards / DO NOT

      - **DO NOT** fold non-analytical warnings (e.g., configuration warnings, model validation warnings) into this milestone. Scope is analytical warnings only.
      - **DO NOT** move warning formatting/presentation into Core. Core returns analytical facts; the adapter projects those facts into DTOs.
      - **DO NOT** introduce a second parallel analytical warning pipeline or result surface beside the consolidated internal analytical result family established in M-015.
      - **DO NOT** keep `FindQueueGrowthStreak`, `FindOverloadStreak`, `FindAgeRiskStreak`, or `BuildStationarityWarnings()` in the adapter. These are analytical policy over evaluated facts — they belong in Core.
      - **DO NOT** let `LatencyComputer.Calculate()` survive as a public semantic owner parallel to `RuntimeAnalyticalEvaluator`.
      - **DO NOT** keep `CycleTimeComputer.CheckNonStationary()` as a public analytical seam once stationarity ownership is moved behind the evaluator/analyzer layer.
      - **DO NOT** add new analyzer policies in the adapter. If a new warning type is needed, it goes in Core.

      ## Deletion Targets

      | Target | Location | Why |
      |--------|----------|-----|
      | `BuildBacklogWarnings()` | StateQueryService.cs | Adapter-local analytical warning assembly moves to Core |
      | `BuildStationarityWarnings()` | StateQueryService.cs | Adapter-local stationarity warning construction moves to Core |
      | `FindQueueGrowthStreak()` | StateQueryService.cs | Backlog growth analyzer policy moves to Core |
      | `FindOverloadStreak()` | StateQueryService.cs | Overload analyzer policy moves to Core |
      | `FindAgeRiskStreak()` | StateQueryService.cs | Age-risk analyzer policy moves to Core |
      | Direct `LatencyComputer.Calculate()` API call | StateQueryService.cs | API stops calling analytical primitives directly for warning production |
      | Public `LatencyComputer` semantic ownership | LatencyComputer.cs | Little's Law latency has one public owner in Core |
      | Public stationarity policy on `CycleTimeComputer` | CycleTimeComputer.cs | Stationarity becomes evaluator/analyzer-owned rather than a public helper seam |

      ## Test Strategy

      - **Core warning-fact tests:** Evaluator/analyzer tests prove structured warning facts for stationarity, backlog growth, overload, and age risk from descriptor-backed inputs.
      - **Projector tests:** API tests prove `state_window` warnings are projected from Core warning facts rather than assembled from adapter-local streak helpers.
      - **Ownership audit:** Grep-based check that no analytical warning detection logic or direct analytical primitive calls remain in `StateQueryService`.
      - **Helper-boundary tests:** If helper math survives internally, public behavior tests move to the evaluator/analyzer surface; helper tests do not assert those helpers are the public analytical owner.
      - **Golden/API parity:** Existing backlog/stationarity endpoint coverage and approved outputs are regenerated from Core-produced warning facts as needed.

      ## Technical Notes

      - Extend the consolidated analytical result family from M-015 rather than inventing a second analytical warning surface.
      - Keep warnings as analyzers over evaluated facts, not as ad hoc projection helpers.
      - If helper math survives, make it private/internal beneath evaluator/analyzer ownership rather than a public analytical seam.
      - Avoid folding unrelated non-analytical warnings into this milestone.
      - Use explicit analytical warning facts nested under the Core analytical result surface; the adapter maps those facts to warning DTOs.

      ## Out of Scope

      - Public contract redesign (M-017)
      - UI/client heuristic deletion (M-017)

      ## Dependencies

      - [M-015](M-015.md)
  - kind: milestone
    id: M-017
    frontmatter:
      title: Analytical Contract and Consumer Purification
      status: done
      parent: E-16
    body: |
      ## Goal

      Publish authoritative analytical and categorical facts in the current state and graph contracts and delete the first-party consumer heuristics in one forward-only cut.

      ## Context

      Internal purity is not enough if current consumers still classify analytical behavior or node category from `kind + logicalType`. This milestone makes the first-party consumer scope explicit so the cleanup does not balloon into a vague "fix the UI later" bucket.

      The current first-party consumers reconstruct node classification from strings across both state and graph surfaces:
      - `TimeTravelMetricsClient.IsServiceLike()` (line ~234) — filters nodes for metrics by string-matching kind/logicalType
      - `Dashboard.razor.cs.IsServiceLike()` (line ~382) — identical copy of the same heuristic
      - `Topology.razor` helpers (`IsComputedKind`, `IsSinkKind`, fallback-class extraction) — classify and patch topology state from string hints
      - `GraphMapper.Classify()` (line ~227) — categorizes nodes as Expression/Constant/Service from kind strings for layout
      - `TopologyCanvas.ClassifyNode()` (line ~499) — categorizes nodes for visual filtering with a broader enum
      - `TooltipFormatter` and `topologyCanvas.js` helpers — classify sink/queue/computed nodes in the rendering path

      All of these can be replaced by consuming compiled node category and analytical facts from the API contracts.

      ## Scope Clarification: State vs Graph Consumers

      `/state` and `/state_window` consumers need analytical applicability facts. `/graph` consumers need node category facts. Both are compiled domain facts and both are in scope for this cut.

      What stays in UI:
      - **Layout rules** that consume the category: spacing ratios (55%/70%/100%), lane assignment (left/center/right), rendering dimensions — these are visual presentation, not domain logic.
      - **Visibility toggles** (IncludeExpressionNodes, IncludeConstNodes, etc.) — these are user preferences, not domain classification.
      - **Rendering decisions** (IsQueueLikeKind for width, IsComputedKind for leaf circles) — these may consume the category from the contract instead of re-deriving it.

      What is deleted:
      - The `Classify()` and `ClassifyNode()` methods themselves — replaced by reading the category from the contract.
      - The `IsServiceLike()` methods — replaced by reading analytical facts from the contract.

      ## Acceptance Criteria

      1. `FlowTime.Contracts` and the current `/state`, `/state_window`, and `/graph` response shapes expose a compact authoritative fact surface sufficient to determine analytical behavior and node category without `kind + logicalType` inference. This includes at minimum: node category (expression/constant/service/queue/dlq/router/sink as needed by first-party consumers), analytical applicability flags (queue semantics, service semantics, cycle-time decomposition), fallback/class-truth labeling, and warning applicability.
      2. The explicit first-party consumer scope for this milestone is migrated to use engine-published facts: `src/FlowTime.UI/Services/TimeTravelMetricsClient.cs`, `src/FlowTime.UI/Pages/TimeTravel/Dashboard.razor.cs`, `src/FlowTime.UI/Pages/TimeTravel/Topology.razor`, `src/FlowTime.UI/Components/Topology/GraphMapper.cs`, `src/FlowTime.UI/Components/Topology/TopologyCanvas.razor.cs`, `src/FlowTime.UI/Components/Topology/TooltipFormatter.cs`, and `src/FlowTime.UI/wwwroot/js/topologyCanvas.js`.
      3. Old hint fields and targeted analytical heuristics are removed in the same forward-only cut once those consumers are migrated; runs, fixtures, and approved snapshots are regenerated rather than compatibility-layered.
      4. API/UI tests and a grep-based audit prove the targeted analytical classification helpers are deleted.
      5. Documentation and decision records are updated so E-10 Phase 3 can resume on the purified boundary.

      ## Guards / DO NOT

      - **DO NOT** expose the full internal Core descriptor type directly in the API contract. Prefer a compact fact surface designed for consumers, not a leak of internal types.
      - **DO NOT** keep `kind + logicalType` as the primary way consumers determine analytical behavior. The old hint fields may remain for backward-compatible display purposes, but analytical behavior must come from the new fact surface.
      - **DO NOT** grow scope implicitly. If another consumer surface appears before this milestone starts, add it explicitly to the consumer list or defer it with a documented reason.
      - **DO NOT** let `IsServiceLike()`, `Classify()`, or `ClassifyNode()` survive in any form. These are the heuristics this milestone exists to delete.
      - **DO NOT** move layout/rendering logic into Core. Layout spacing, lane assignment, and rendering dimensions stay in the UI — they consume the category, they don't define it.
      - **DO NOT** add a new `kind`-string-based classification method in the UI as a "simpler" replacement. The contract provides the category as a fact.

      ## Deletion Targets

      | Target | Location | Why |
      |--------|----------|-----|
      | `IsServiceLike()` | TimeTravelMetricsClient.cs:234 | String-based analytical node classification |
      | `IsServiceLike()` | Dashboard.razor.cs:382 | Duplicate of the above |
      | `EnsureFallbackClassMetadataFromWindow()` | Topology.razor | Client-side fallback class heuristic on the topology page |
      | `IsComputedKind()` / `IsSinkKind()` / related kind helpers | Topology.razor | String-based topology-page categorization |
      | `Classify()` | GraphMapper.cs:227 | String-based node categorization |
      | `ClassifyNode()` | TopologyCanvas.razor.cs:499 | String-based node categorization (broader enum) |
      | `IsQueueLikeKind()` | TopologyCanvas.razor.cs | String-based queue detection for rendering |
      | `IsComputedKind()` | TopologyCanvas.razor.cs | String-based expression detection for rendering |
      | `IsSinkKind()` | TopologyCanvas.razor.cs | String-based sink detection |
      | `IsSinkKind()` / dependency-kind helpers | TooltipFormatter.cs | String-based tooltip categorization |
      | `isComputedKind()` / `isQueueLikeKind()` / `isSinkKind()` | wwwroot/js/topologyCanvas.js | String-based canvas/rendering categorization |
      | `EnsureFallbackClassesFromWindow()` (if survived M-013) | Dashboard.razor.cs | Client-side class fallback heuristic |
      | Old `nodeLogicalType` hint field usage for analytical behavior | Contracts, consumers | Replaced by authoritative fact surface |

      ## Test Strategy

      - **Contract completeness tests:** Assert that the new fact surface on `/state`, `/state_window`, and `/graph` responses contains the category and analytical flags required by first-party consumers.
      - **Consumer migration tests:** Each named first-party consumer has tests proving it reads from the contract fact surface, not from `kind + logicalType` strings.
      - **Grep-based deletion audit:** `rg "IsServiceLike\|Classify\b\|ClassifyNode\|IsQueueLikeKind\|IsComputedKind\|IsSinkKind\|EnsureFallbackClassMetadataFromWindow\|isComputedKind\|isQueueLikeKind\|isSinkKind" src/FlowTime.UI/` returns zero matches.
      - **Negative contract test:** Assert that removing `nodeLogicalType` from the contract does not break any consumer's analytical behavior (display may degrade, but analytical classification must not).
      - **End-to-end parity:** UI integration tests (if present) show the same analytical behavior as before the migration.

      ## Technical Notes

      - Prefer a small explicit fact surface over leaking internal Core types directly. A nested `analytical` object on state nodes and a compact `category` fact on graph nodes is one option.
      - Visual presentation categorization that is unrelated to analytical truth may remain in the UI, but it must consume the contract-provided category rather than re-deriving it from strings.
      - If another consumer surface appears before this milestone starts, add it explicitly or defer it; do not grow scope implicitly.

      ## Out of Scope

      - General UI redesign unrelated to analytical truth
      - New analytical primitives
      - Svelte UI migration (E-11) — the four named files are Blazor UI

      ## Dependencies

      - [M-016](M-016.md)
  - kind: milestone
    id: M-018
    frontmatter:
      title: WebSocket Engine Bridge
      status: done
      parent: E-17
      depends_on:
        - M-002
    body: |
      ## Goal

      The .NET API exposes a WebSocket endpoint that proxies a client connection to a Rust engine session subprocess. The Svelte UI can connect, send compile/eval commands, and receive streaming results. This is the bridge between the browser and the headless engine.

      ## Context

      After M-002, the Rust engine has a `session` CLI mode: persistent process, MessagePack over stdin/stdout, commands for compile/eval/get_params/get_series. But there's no way for a browser to connect to it — browsers speak WebSocket, not stdin/stdout.

      The bridge is deliberately simple: the .NET API is a **transparent proxy**. It spawns one engine session process per WebSocket connection and pipes frames between the two. No protocol translation — the same MessagePack messages flow through. The API adds session lifecycle management (spawn on connect, kill on disconnect) but no business logic.

      ### Why proxy through .NET instead of direct WebSocket from Rust

      - The .NET API already runs, handles CORS, auth, logging, and health checks
      - Adding a WebSocket server to the Rust engine would require `tokio`/async runtime — heavyweight for a CLI tool
      - The proxy pattern keeps the engine as a pure stdin/stdout component, composable in pipelines
      - Future: the API can add session pooling, auth, and rate limiting without changing the engine

      ## Acceptance Criteria

      1. **AC-1: WebSocket endpoint.** `ws://localhost:8081/v1/engine/session` accepts WebSocket upgrade requests. Responds with 101 Switching Protocols on success.

      2. **AC-2: Engine process lifecycle.** On WebSocket connect, the API spawns `flowtime-engine session` as a subprocess. On WebSocket close (client disconnect or error), the subprocess is killed and resources cleaned up.

      3. **AC-3: Bidirectional proxy.** WebSocket binary frames are forwarded to the engine's stdin. Engine stdout data is forwarded as WebSocket binary frames. The MessagePack length-prefix framing is preserved end-to-end — the API does not parse or modify the payload.

      4. **AC-4: Multiple concurrent sessions.** Each WebSocket connection gets its own engine subprocess. Two clients can run independent sessions simultaneously.

      5. **AC-5: Error handling.** If the engine process crashes or exits unexpectedly, the WebSocket is closed with a 1011 (Internal Error) status code. If the engine binary is not found, the WebSocket is closed with 1013 (Try Again Later) and an error is logged.

      6. **AC-6: CORS compatibility.** The existing permissive CORS policy allows WebSocket connections from the Svelte UI origin (localhost:5173).

      7. **AC-7: Health check.** `GET /v1/engine/session/health` returns 200 with `{ "available": true/false }` indicating whether the engine binary is found and executable.

      8. **AC-8: Svelte WebSocket client.** A TypeScript client module in `ui/src/lib/api/engine-session.ts` that:
         - Connects to the WebSocket endpoint
         - Encodes requests as length-prefixed MessagePack
         - Decodes responses from length-prefixed MessagePack
         - Exposes typed async methods: `compile(yaml)`, `eval(overrides)`, `getParams()`, `getSeries(names?)`
         - Handles reconnection on disconnect

      9. **AC-9: Integration test.** A C# integration test that:
         - Starts the API with WebApplicationFactory
         - Connects a WebSocket client
         - Sends compile + eval sequence via MessagePack
         - Verifies correct series values in responses
         - Verifies WebSocket closes cleanly

      10. **AC-10: Svelte smoke test.** A minimal Svelte page at `/engine-test` that connects to the WebSocket, compiles a hardcoded model, displays the parameter list, and shows one series as numbers. This proves the end-to-end path works before M-019 builds the real UI.

      ## Technical Notes

      ### .NET WebSocket middleware

      ```csharp
      app.Map("/v1/engine/session", async (HttpContext context) =>
      {
          if (!context.WebSockets.IsWebSocketRequest)
          {
              context.Response.StatusCode = 400;
              return;
          }
          var ws = await context.WebSockets.AcceptWebSocketAsync();
          await ProxyToEngineSession(ws, enginePath, cancellationToken);
      });
      ```

      Requires `app.UseWebSockets()` in the middleware pipeline.

      ### Proxy implementation

      The proxy runs two concurrent tasks:
      1. **WS → stdin**: Read WebSocket binary frames, write to engine stdin
      2. **stdout → WS**: Read engine stdout, write as WebSocket binary frames

      Both tasks run until either side closes. Use `Task.WhenAny` to detect the first close and clean up both sides.

      ### MessagePack in TypeScript

      Use `@msgpack/msgpack` npm package:
      ```typescript
      import { encode, decode } from '@msgpack/msgpack';

      // Encode request with length prefix
      function encodeMessage(obj: unknown): Uint8Array {
          const payload = encode(obj);
          const frame = new Uint8Array(4 + payload.length);
          new DataView(frame.buffer).setUint32(0, payload.length);
          frame.set(payload, 4);
          return frame;
      }
      ```

      ### Engine binary path

      Reuse the existing `RustEngine:BinaryPath` configuration from Program.cs. Fall back to `engine/target/release/flowtime-engine` relative to solution root.

      ## Out of Scope

      - Parameter UI controls (M-019)
      - Chart/topology reactive updates (M-020)
      - Session pooling or sharing (multiple clients per session)
      - Authentication or authorization
      - Binary frame compression

      ## Key References

      - `engine/cli/src/session.rs` — engine session loop
      - `engine/cli/src/protocol.rs` — MessagePack framing
      - `src/FlowTime.API/Program.cs` — API startup and middleware
      - `ui/src/lib/api/client.ts` — existing Svelte HTTP client pattern
      - `docs/architecture/headless-engine-architecture.md` — protocol design
  - kind: milestone
    id: M-019
    frontmatter:
      title: Svelte Parameter Panel
      status: done
      parent: E-17
      depends_on:
        - M-018
    body: |
      ## Goal

      A polished Svelte page where the user picks a model, sees an auto-generated parameter panel (sliders + numeric inputs), and watches series values update live as they tweak parameters. This is the interactive what-if experience — the first real UI that exercises the WebSocket bridge at full speed.

      ## Context

      After M-018, the `/engine-test` smoke test page proves the plumbing works: browser → .NET WebSocket proxy → Rust engine session, round-trip in milliseconds. But the smoke test only tweaks one hard-coded parameter and displays series as flat text. It's a plumbing verification, not a user experience.

      M-019 builds the real interactive surface:
      - A proper page layout under the existing Svelte UI shell (sidebar + topbar)
      - Auto-generated controls from the parameter schema returned by `compile`
      - Reactive Svelte stores for each series, bound to UI updates
      - Debounced eval on slider drag (no flood of requests mid-drag)
      - Loading state while eval is in flight
      - Error surface for compile/eval failures

      The emphasis is **interactive feel**: the user should be able to grab a slider and see numbers move immediately. Chart/topology visualizations are M-020 — this milestone shows series as small-multiple sparklines or numeric tables that update on parameter changes.

      ## Acceptance Criteria

      1. **AC-1: Route `/what-if`.** A new SvelteKit route exists. The page uses the existing app layout (sidebar + topbar) and appears in sidebar navigation.

      2. **AC-2: Model picker.** The page shows at least 3 built-in example models the user can select (simple const+expr, queue with WIP limit, class-based decomposition). Selecting a model compiles it via the engine session. Built-in models are bundled as string constants, not loaded from disk or network.

      3. **AC-3: Parameter panel auto-generation.** After `compile`, the panel renders one control per parameter:
         - **Scalar parameters** (ConstNode with uniform values, ArrivalRate, WipLimit): numeric input + slider. Slider range: `max(0, default × 0.1)` to `max(default × 3, default + 10)`, step = `max(default / 100, 0.1)`.
         - **Vector parameters** (ConstNode with varying values): read-only display showing the default values (editing is out of scope for this milestone).
         - **Parameter ID** displayed as the label. **Default value** shown as a small annotation. **Kind** shown as a colored badge (ConstNode / ArrivalRate / WipLimit).

      4. **AC-4: Reactive series stores.** Each series from the compile/eval response is held in a Svelte writable store (or `$state` rune). When `eval` returns updated series, the stores are updated atomically and the UI re-renders.

      5. **AC-5: Live eval on parameter change.** Dragging a slider or typing in a numeric input triggers `session.eval({ paramId: newValue })`. The returned series update the stores. The full current override set is sent on every eval (not just the changed one), so the state is always consistent.

      6. **AC-6: Debounced slider updates.** During a continuous slider drag, eval requests are debounced to fire at most every 50ms. The final value after drag-end always triggers an eval to ensure the displayed state is accurate. Numeric-input changes (via typing) are debounced to 150ms.

      7. **AC-7: Loading and error states.** While an `eval` is in flight, the parameter panel shows a subtle loading indicator (spinner next to the active control, or a top progress bar). If an eval returns an error, the error message is displayed in an alert banner and the UI remains interactive. The old series values stay visible until the error is resolved.

      8. **AC-8: Reset button.** A "Reset to defaults" button resets all parameter controls to their defaults (from the parameter schema) and triggers a fresh eval.

      9. **AC-9: Series display.** For every non-internal series in the eval response, the UI shows:
         - The series name
         - The current values as a compact numeric list (e.g., `[10.0, 10.0, 10.0, 10.0]`)
         - A minimal inline sparkline (simple SVG path, not a full chart library) showing the shape over time
         The sparkline's y-axis auto-scales to the series' min/max. This is intentionally lightweight — full charting is M-020.

      10. **AC-10: Latency display.** The page shows the elapsed_us from the most recent eval response, prominently (e.g., "Last eval: 42 µs"). This is the "look how fast" badge of honor.

      11. **AC-11: Disconnect recovery.** If the WebSocket drops (e.g., API restarts), the next parameter change triggers automatic reconnect + replay (already handled by EngineSession). The UI shows a brief "reconnecting…" indicator, then resumes normal operation. No page reload required.

      12. **AC-12: Unit tests for debounce + control generation.** Vitest unit tests cover:
         - Debounce helper: multiple rapid calls collapse to one, trailing edge fires
         - Control config derivation: `ParamInfo` → `{ type, min, max, step, initial }`
         These are pure functions with no DOM dependencies.

      ## Technical Notes

      ### Debounce helper

      Write a simple `createDebouncer(ms)` utility that returns `{ schedule, flush, cancel }`. Use `setTimeout` + `clearTimeout`. Keep it in `ui/src/lib/utils/debounce.ts` as a shared primitive. Unit tests with `vi.useFakeTimers()`.

      ### Parameter control config

      A pure function:

      ```ts
      export function paramControlConfig(param: ParamInfo): ControlConfig {
          if (Array.isArray(param.default)) return { type: 'vector', values: param.default };
          const d = param.default;
          const min = Math.max(0, d * 0.1);
          const max = Math.max(d * 3, d + 10);
          const step = Math.max(d / 100, 0.1);
          return { type: 'scalar', min, max, step, initial: d };
      }
      ```

      Keep this in `ui/src/lib/api/param-controls.ts`. Test as pure function.

      ### Slider component

      shadcn-svelte doesn't have `slider` installed yet. Add via `pnpm dlx shadcn-svelte@latest add slider` or implement a minimal native `<input type="range">` wrapped in a Svelte component. Prefer the native approach for this milestone — one dependency less to wrangle, and full control over reactivity.

      ### Session lifecycle

      Create a single `EngineSession` instance per page load. Store it in a `$state` or a module-level variable (carefully — SvelteKit SSR wants client-only code). Close on `onDestroy` to kill the subprocess.

      ### Built-in models

      Keep the model YAML strings in `ui/src/lib/api/example-models.ts`. Three models:
      1. **Simple pipeline**: const arrivals + expr served = arrivals × 0.8 (4 bins)
      2. **Queue with WIP**: serviceWithBuffer topology, WIP limit 50, scalar inflow/outflow (6 bins)
      3. **Class decomposition**: traffic.arrivals with 2 classes, served = MIN(arrivals, 8) (4 bins)

      ### Sparkline

      No chart library dependency. A 120×30 SVG `<path>` with a single polyline drawn from min/max-normalized values. ~20 lines of Svelte.

      ## Out of Scope

      - Full interactive charts with hover, zoom, legends (M-020)
      - Topology graph visualization with heatmap (M-020)
      - Loading models from URL, file upload, or template library (future)
      - Editing vector parameters (editing per-bin const values) — show read-only
      - Saving/loading parameter snapshots (future)
      - Multi-model comparison views (future)
      - Authentication, user sessions, or per-user state
      - Model editing / YAML textarea — use the 3 built-ins only

      ## Key References

      - `ui/src/lib/api/engine-session.ts` — EngineSession WebSocket client (M-018)
      - `ui/src/routes/engine-test/+page.svelte` — smoke test pattern to build on
      - `ui/src/lib/components/app-sidebar.svelte` — existing sidebar nav
      - `ui/src/lib/components/ui/input/` — shadcn input primitive
      - `work/epics/E-17-interactive-what-if-mode/spec.md` — epic context
      - `docs/architecture/headless-engine-architecture.md` — WebSocket data flow

      ## Success Indicator

      Drag a slider in the parameter panel → watch the numeric series values update in real time, with `Last eval: <N> µs` staying under 100 µs. That's the interactive what-if experience working.
