    id: M-051
    frontmatter:
      title: Schema Unification
      status: done
      parent: E-24
    body: |
      ## Goal

      Rewrite `docs/schemas/model.schema.yaml` so it describes the unified type exactly. camelCase throughout. `provenance` is declared as a first-class block on the unified schema with camelCase keys. Every M-049 decision about `outputs[].as`, `classes: minItems`, `nodes[].source`, and provenance shape is applied. `docs/schemas/README.md` is rewritten to reflect the one-schema reality. Any architecture doc that described the two-schema world is corrected or archived.

      ## Context

      After M-050, the unified type exists and Sim emits it directly. The schema must describe that unified type — not the old `SimModelArtifact` shape, not the old `ModelDefinition` shape, but the single type both sides now share. Every snake_case field in the `provenance` block is renamed to camelCase per the project rule ("JSON payloads and schemas use camelCase"). Every field M-049 decided to keep gets a consumer citation in its description. Every field M-049 decided to drop from emission is absent from the schema. The schema becomes readable top-to-bottom as the single structural contract.

      ## Acceptance Criteria

      1. **Schema describes the unified type exactly.** Every property of the unified type (post-m-E24-02) has a declaration in `docs/schemas/model.schema.yaml`. Every schema declaration maps to a field on the unified type. No schema field exists that the unified type does not declare; no unified-type field is undeclared in the schema.
      2. **camelCase everywhere.** `grep -rn "generated_at\|model_id\|template_id\|template_version" docs/schemas/model.schema.yaml` returns zero hits. The `provenance` block uses `generatedAt`, `modelId`, `templateId`, `templateVersion` (and any other provenance keys per M-049's final list).
      3. **`provenance` block matches emitted shape.** Fields retained per M-049: the final list. The shape (flat vs nested, specifically for `parameters`) matches M-049's ratified shape. `additionalProperties: false` sits on the provenance block.
      4. **`grid.start` declared.** `start` is declared under `grid.properties` as `type: string, format: date-time`, not in `grid.required`. Models authored without `start` continue to validate.
      5. **`nodes[].metadata` declared.** Per M-049's keep decision. Under `nodes[].properties`, `metadata` is `type: object, additionalProperties: {type: string}` with a description citing `GraphService.ResolveDisplayKind`, `StateQueryService.cs:2162`, and `RunArtifactWriter.cs:516` as consumers.
      6. **`nodes[].source` resolved per M-049.** If decision was "drop": absent from schema (and from emission per M-050). If decision was "declare now as optional": present with forward-shape description cited. Default path is "drop."
      7. **`outputs[].as` cascade resolved per M-049.** If "Sim synthesizes `as`": schema retains `outputs[].required: [series, as]`. If "optional + emitter omits": schema uses `outputs[].required: [series]` with `as` optional. The chosen side is implemented here.
      8. **`classes: minItems` resolved per M-049.** Either `minItems: 1` stays and M-050 landed the empty-list emitter guard, or `minItems` is removed. Consistent with M-050's emitter behavior.
      9. **Leaked-state fields absent.** Root `additionalProperties: false` remains. The root `properties` list contains exactly the fields the unified type serializes — no `window`, no top-level `mode`, no top-level `metadata`, no `generator` (unless M-049 explicitly moved one of them into the unified submission type, which is not the default path).
      10. **`POST /v1/validate` at Analyse reports `val-err=0` on all twelve templates except ParseScalar residuals.** Post-m-E24-03, run the canary. Every template in `templates/*.yaml` with default parameters validates clean under `ModelSchemaValidator.Validate(...)` except for the ~231 `ParseScalar` residuals that M-052 fixes. Tracking doc records the full histogram.
      11. **Schema readability pass complete.** Every property's description field includes a one-line consumer citation so a reviewer opening the schema understands who reads each field.
      12. **`docs/schemas/README.md` rewritten.** The file describes the one-schema reality. The 2026-04-24 claim of two-schema parity is removed. Any reference to `SimModelArtifact` or the old two-type split is deleted or converted to historical-only language in `docs/archive/`.
      13. **Architecture docs audited.** `docs/architecture/` entries that described the two-schema world are either corrected or archived. The tracking doc lists every audited file and its disposition.
      14. **Full `.NET` suite green.** `dotnet test FlowTime.sln` passes. No regressions in `TimeMachineValidator`, `ModelSchemaValidator`, or schema-adjacent tests.

      ## Constraints

      - **Schema changes in one cut.** No schema-draft bump, no multi-version acceptance, no snake_case aliases. The provenance rename is forward-only.
      - **No new adjunct rules.** Every schema rule is either declarative JSON Schema (draft-07) or moved into `ModelSchemaValidator` as an adjunct following the existing `ValidateClassReferences` pattern if and only if it cannot be expressed declaratively. M-049 flagged any such cases; if none, no adjuncts are added.
      - **Description citations are precise.** "Consumer: `src/FlowTime.Core/Graphs/GraphService.cs:ResolveDisplayKind` reads `origin.kind`" — not "used by GraphService." Reviewers verify by opening the cited line.
      - **No decorative fields.** If a field has no Engine consumer, it does not appear in the schema. Sim-only fields live (at all) only if they survived M-050's drop pass, which should not happen under Option E.
      - **Pre- and post-canary captured.** Tracking doc records the canary histogram from M-050 close and M-051 close. The delta is M-051's contribution; the residual should be only the ParseScalar shapes.

      ## Design Notes

      - Work order: (1) apply provenance camelCase rename; (2) walk the schema top-to-bottom and reconcile every property with the unified type's public members; (3) remove leaked-state fields if any still appear; (4) apply each M-049 decision (outputs cascade, classes minItems, nodes source) in inventory order; (5) rewrite descriptions with consumer citations; (6) rewrite `docs/schemas/README.md`; (7) audit architecture docs.
      - The schema file is YAML, not JSON (matches existing style). Preserve block-scalar style for multi-line descriptions.
      - Canary run: use `TemplateWarningSurveyTests` against a live Engine API (`start-api` task). The test dumps per-template first-err and totals. Post-m-E24-03 the non-ParseScalar residuals should be 0; the ParseScalar residuals (~231) close in M-052.
      - If the canary surfaces a residual shape not in M-049's inventory, stop — do not widen scope silently. File as a gap or amendment, escalate to reviewer.

      ## Surfaces touched

      - `docs/schemas/model.schema.yaml` (rewrite)
      - `docs/schemas/README.md` (rewrite)
      - `docs/architecture/` entries that describe schemas (audit + update or archive per tracking doc)
      - `work/epics/E-24-schema-alignment/m-E24-03-schema-unification-tracking.md` (new)
      - Potentially `src/FlowTime.Core/Models/ModelSchemaValidator.cs` only if M-049 identified a rule requiring an adjunct; default path is no code changes

      ## Out of Scope

      - Code changes to the unified type — M-050 owns.
      - `ParseScalar` validator fix — M-052 owns.
      - Canary hard-assertion promotion — M-053 owns.
      - Any UI change.
      - `Template` (authoring-time) schema changes.

      ## Dependencies

      - M-050 landed. The unified type exists, Sim emits it, Engine parses it. The schema now has a target to describe.
      - M-049 decisions ratified.

      ## References

      - Epic spec: `work/epics/E-24-schema-alignment/spec.md`
      - M-049 tracking doc: `work/epics/E-24-schema-alignment/m-E24-01-inventory-and-design-decisions-tracking.md`
      - M-050 tracking doc: `work/epics/E-24-schema-alignment/m-E24-02-unify-model-type-tracking.md`
      - M-046 full-shape audit (histogram input): `work/epics/E-23-model-validation-consolidation/m-E23-01-schema-alignment-tracking.md` → "AC4 canary re-run, full-shape audit (2026-04-24)"
      - Schema file: `docs/schemas/model.schema.yaml`
      - Schema README (to be rewritten): `docs/schemas/README.md`
      - Canary test: `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs`
      - Project rule (camelCase): `.ai-repo/rules/project.md` → Coding Conventions → "JSON payloads and schemas use camelCase"
  - kind: milestone
    id: M-052
    frontmatter:
      title: Parser/Validator Scalar-Style Fix
      status: done
      parent: E-24
    body: |
      ## Goal

      Fix the `ParseScalar` defect in both `src/FlowTime.Core/Models/ModelSchemaValidator.cs:222-246` and `src/FlowTime.Sim.Core/Templates/TemplateSchemaValidator.cs:173-197` so both honor `YamlScalarNode.Style`. Quoted literals (`SingleQuoted`, `DoubleQuoted`) and block scalars (`Literal`, `Folded`) resolve as strings; only `Plain` scalars are candidates for type coercion. Mirror the fix in the test-side coercion helper at `tests/FlowTime.TimeMachine.Tests/TemplateSchemaValidationTests.cs:134-169` so test fixtures do not silently mask the runtime fix. After this milestone, the survey canary reports `val-err=0` across all twelve templates at `ValidationTier.Analyse`.

      ## Context

      The M-046 prior-art investigation (see `work/epics/E-23-model-validation-consolidation/m-E23-01-schema-alignment-tracking.md` → "Prior art for C (ParseScalar scalar-style defect)") established: both validators were born with identical unconditionally-coercing `ParseScalar` implementations in commit `51a99b9` / `c1fc49d` (2025-11-24). No later commit touched scalar-style handling. `src/FlowTime.Core/Models/ParallelismReference.cs:97` is the one precedent in the repo for honoring `ScalarStyle.Plain`, guarding a narrower scalar distinction (null detection); the pattern ports directly. No external consumer relies on integer-coerced quoted literals. No prior commit reverts a ScalarStyle-aware fix; this is green-field.

      The defect is independent of unification. Unification (M-050) and schema realignment (M-051) do not touch `ParseScalar`'s logic. The defect's blast radius (per M-046's full-shape audit): ~231 residual errors across four shape variants — `nodes/*/expr integer→string` (89), `nodes/*/metadata/graph.hidden boolean→string` (92), `nodes/*/metadata/pmf.expected number→string` (40), `nodes/*/metadata/pmf.expected integer→string` (10). Every residual collapses once `ParseScalar` respects `ScalarStyle`.

      ## Acceptance Criteria

      1. **`ModelSchemaValidator.ParseScalar` honors `ScalarStyle.Plain`.** Non-plain scalars resolve as strings. The guard is placed immediately after the `value is null` check and before the existing `bool.TryParse` call. Plain scalars continue to coerce as today (bool → int → double → string in that order).
      2. **`TemplateSchemaValidator.ParseScalar` is mirrored.** The identical guard lands in the Sim-side validator at `src/FlowTime.Sim.Core/Templates/TemplateSchemaValidator.cs:173-197`. Both validators use the same guard shape and semantics — no divergence.
      3. **Test-side coercion helper updated.** `tests/FlowTime.TimeMachine.Tests/TemplateSchemaValidationTests.cs:134-169` (`NormalizeYaml` / `TryConvertScalar`) is either updated to match the validator (ScalarStyle-aware) or replaced entirely by a delegate call into the fixed `ModelSchemaValidator`. Leaving the helper in its current aggressive-coerce state is not acceptable because it silently re-introduces the defect in the test layer.
      4. **Scalar-style test matrix — Engine side.** New tests in `tests/FlowTime.Core.Tests` (or appropriate home) cover at minimum: (a) quoted integer literal `expr: "0"` resolves as string and passes `nodes[].expr: type: string`; (b) unquoted integer `schemaVersion: 1` resolves as integer and passes `schemaVersion: type: integer`; (c) quoted boolean `"true"` resolves as string; (d) unquoted boolean `true` resolves as bool; (e) quoted null `"null"` resolves as the 4-character string; (f) unquoted null (`null` / empty) resolves as JSON null; (g) folded `>` and literal `|` block scalars resolve as strings. Each case is a distinct test method with an explicit test name describing the scalar style and expected resolution.
      5. **Scalar-style test matrix — Sim side.** Mirror test matrix in `tests/FlowTime.Sim.Tests` against `TemplateSchemaValidator`. Same case-by-case coverage; identical expectations.
      6. **Canary reports `val-err=0`.** `TemplateWarningSurveyTests.Survey_Templates_For_Warnings` reports `validator-errors=0` across all twelve templates at `ValidationTier.Analyse`. The total residual from the M-046 baseline (726) has collapsed to 0 after M-050 + M-051 (removed ~495 non-C) and M-052 (removed ~231 C-defect). The tracking doc records the final per-template histogram.
      7. **No regression in the broader validator behavior.** Tests that author plain-scalar integer/bool values (e.g. `schemaVersion: 1`, `bins: 24`, PMF values) continue to pass unchanged. The guard adds stricter handling only for non-plain scalars.
      8. **Full `.NET` suite green.** `dotnet test FlowTime.sln` passes. No new regressions. Any test that accidentally relied on quoted-literal coercion is updated in-milestone to author the scalar correctly (unquoted if integer was intended, quoted if string was intended).
      9. **Branch coverage complete.** The new `ScalarStyle.Plain` guard in each validator is exercised by at least the five non-plain style variants (SingleQuoted, DoubleQuoted, Literal, Folded, and where applicable FlowSingleQuoted / FlowDoubleQuoted if present in the YamlDotNet enum the project targets). The existing plain-path coercion has test coverage preserved (bool / int / double / string).

      ## Constraints

      - **Exactly one guard shape in both validators.** The check is `if (scalar.Style != ScalarStyle.Plain) return JsonValue.Create(value)!;` placed in the same position in both files. No second inference layer (e.g. tag-based `!!str` detection) — YAML's resolver already embeds the distinction in `Style`.
      - **No coercion-mode configuration.** Do not add a `coerceQuotedLiterals` opt-in flag. The correct behavior is the only behavior.
      - **Sync the test helper.** If `TemplateSchemaValidationTests.cs`'s `TryConvertScalar` is updated rather than replaced, apply the same `ScalarStyle.Plain` guard. If it is replaced, the replacement delegates to the validator's `ParseScalar` (either directly, via `internal` visibility and `InternalsVisibleTo`, or via a public test hook added in this milestone).
      - **Every test case has a named style.** Do not rely on YamlDotNet's automatic style inference in test fixtures. Test YAML strings are authored with explicit quoting so the parser's `ScalarStyle` is deterministic.
      - **Mirror is mandatory.** If only one validator is fixed, the survey canary will still show residuals sourced from the unfixed side — M-053 cannot close. The milestone wrap requires both fixed.

      ## Design Notes

      - Reference implementation path (paraphrased from `work/gaps.md` → "`ModelSchemaValidator.ParseScalar` does not honor YAML ScalarStyle" → "Proposed fix"):

        ```csharp
        if (scalar.Style != ScalarStyle.Plain)
        {
            return JsonValue.Create(value)!;
        }
        ```

        Place immediately after the `value is null` check, before the first `bool.TryParse` call. Apply identically to both validators.

      - `src/FlowTime.Core/Models/ParallelismReference.cs:97` uses `scalar.Style == ScalarStyle.Plain && string.IsNullOrWhiteSpace(scalar.Value)` — prior art for the guard pattern.
      - YamlDotNet's `ScalarStyle` enum values: `Any`, `Plain`, `SingleQuoted`, `DoubleQuoted`, `Literal`, `Folded`. The guard rejects everything non-`Plain`. `Any` is a parse-time sentinel that should not appear on scalars emitted from YamlDotNet's parser.
      - Test-fixture shape: use raw YAML string literals in `[Theory]` / `[InlineData]` for each scalar style so the style is visible in the test source. The test asserts `ModelSchemaValidator.Validate(yaml)` returns expected `ValidationResult` (error / no error) rather than inspecting the internal `JsonValue` — tests the observable behavior, not the implementation detail.
      - Run the canary post-fix and capture the residual histogram in the tracking doc. Confirm zero errors; every template green.

      ## Surfaces touched

      - `src/FlowTime.Core/Models/ModelSchemaValidator.cs:222-246` (`ParseScalar` fix)
      - `src/FlowTime.Sim.Core/Templates/TemplateSchemaValidator.cs:173-197` (mirrored fix)
      - `tests/FlowTime.TimeMachine.Tests/TemplateSchemaValidationTests.cs:134-169` (test helper update or replacement)
      - `tests/FlowTime.Core.Tests` (or appropriate Engine-side test project — scalar-style test matrix)
      - `tests/FlowTime.Sim.Tests` (scalar-style test matrix — Sim side)
      - `work/epics/E-24-schema-alignment/m-E24-04-parser-validator-scalar-style-fix-tracking.md` (new)

      ## Out of Scope

      - Schema edits — M-051 owns.
      - Unified type or emitter changes — M-050 owns.
      - Canary hard-assertion promotion — M-053 owns.
      - Any other validator behavior (tier logic, warning vs error, etc.) — out of epic scope.

      ## Dependencies

      - M-051 landed (or at least M-050) so the canary baseline reflects the unified schema + emitter state. The M-052 contribution is cleanly attributable to the ParseScalar fix. M-052 is logically independent of M-050 and M-051 and can be run in parallel; the conservative default is serial.
      - Prior-art investigation complete (it is — M-046 tracking doc).

      ## References

      - Epic spec: `work/epics/E-24-schema-alignment/spec.md`
      - Gap entry: `work/gaps.md` → "`ModelSchemaValidator.ParseScalar` does not honor YAML ScalarStyle"
      - Prior-art investigation: `work/epics/E-23-model-validation-consolidation/m-E23-01-schema-alignment-tracking.md` → "Prior art for C (ParseScalar scalar-style defect)"
      - Defect site (Engine): `src/FlowTime.Core/Models/ModelSchemaValidator.cs:222-246`
      - Defect site (Sim): `src/FlowTime.Sim.Core/Templates/TemplateSchemaValidator.cs:173-197`
      - Prior-art precedent: `src/FlowTime.Core/Models/ParallelismReference.cs:97`
      - Test-side coercion helper: `tests/FlowTime.TimeMachine.Tests/TemplateSchemaValidationTests.cs:134-169`
      - Canary: `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs`
  - kind: milestone
    id: M-053
    frontmatter:
      title: Canary Green and Hard Assertion
      status: done
      parent: E-24
    body: |
      ## Goal

      Close E-24. Promote `TemplateWarningSurveyTests.Survey_Templates_For_Warnings` from an informational diagnostic to a hard-asserting regression guard: a non-zero `val-err` count fails the build. Run the full `.NET` solution suite to confirm zero regressions. Update any documentation that still describes the pre-E-24 schema shape. E-23 becomes ready to resume with a byte-trivial M-047 + M-048.

      ## Context

      By this milestone:

      - M-050 unified `SimModelArtifact` + `ModelDefinition` into a single type and deleted the Sim-side satellite types.
      - M-051 realigned `docs/schemas/model.schema.yaml` to describe the unified type in camelCase and rewrote `docs/schemas/README.md`.
      - M-052 fixed `ParseScalar` in both validators.

      The canary reported `val-err=0` at M-052's wrap. This milestone makes that zero a permanent assertion and verifies every other test path is unaffected. After this milestone, schema-reality convergence is a live, enforced property of the build.

      ## Acceptance Criteria

      1. **Canary promoted to hard assertion.** `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs` is modified so `Survey_Templates_For_Warnings` asserts `val-err == 0` for every template at `ValidationTier.Analyse`. The current informational logging (`Totals: validator-errors=..., ...`) is retained for diagnostic visibility, but a non-zero count now fails the assertion. Graceful-skip behavior when port 8081 is unreachable is preserved (follows the existing `SkipUnless` / health-probe pattern).
      2. **Canary is green in-assertion.** Run the canary once against a live Engine API after M-052's close. Confirm `val-err=0` across all twelve templates. The tracking doc captures the verbatim "Totals" output as evidence.
      3. **Full `.NET` solution suite green.** `dotnet test FlowTime.sln` passes. All test assemblies report zero failures. Any pre-existing flakes (`RustEngine_CleansUpTempDirectory_OnFailure`, `SessionModelEvaluatorIntegrationTests.Dispose_TerminatesSubprocess` per M-046 baselines) remain the same flakes with the same transient-timing signature — no new timing sensitivity introduced by E-24.
      4. **Grep audits pass.** The following audits are captured in the tracking doc:
         - `grep -rn "generated_at\|model_id\|template_id\|template_version" docs/schemas/model.schema.yaml` returns zero hits.
         - `grep -rn "SimModelArtifact" --include='*.cs'` returns zero hits.
         - `grep -rn "SimNode\b\|SimOutput\b\|SimProvenance\b\|SimTraffic\b\|SimArrival\b\|SimArrivalPattern\b" --include='*.cs'` returns zero hits.
      5. **Documentation aligned.** Any architecture doc (`docs/architecture/*`) that still describes the pre-E-24 two-type / two-schema shape is updated to reflect the post-E-24 unified reality. Historical descriptions move to `docs/archive/` if they are still useful as history, or are deleted. `docs/schemas/README.md` (rewritten in M-051) is verified current. The tracking doc lists every audited file and its disposition.
      6. **E-23 pause is cleared.** `work/epics/E-23-model-validation-consolidation/spec.md` status flips from `paused` to `ready-to-resume` (or to `in-progress` — reviewer choice). The E-23 spec's amendment notes E-24's close and points to the canary green assertion as the entry condition for M-047. Same status-surface sweep across `ROADMAP.md`, `work/epics/epic-roadmap.md`, and `CLAUDE.md`.
      7. **Decisions logged.** A new decision entry records E-24's close and notes any deltas between M-049's design decisions and the final landed state (there should be none if the milestones executed as planned; if any, they are documented as sub-decisions). Candidate ID: `D-2026-MM-DD-NNN: E-24 Schema Alignment closed; E-23 ready to resume`.
      8. **No new validator features.** The canary's promotion is the only behavior change here. No new tiers, no line/column mapping, no suggestion hints. Out-of-scope work remains out.

      ## Constraints

      - **Assertion replaces informational log, not augments it.** The test fails the build on non-zero `val-err`. If reviewers want the diagnostic log to survive, it survives as stdout; the assertion is the gate.
      - **Zero-tolerance in the assertion.** `val-err == 0`. Not `val-err < 5`, not "every residual matches the C-defect shape" (the amended M-046 AC4 phrasing) — by the time M-053 runs, the C-defect is fixed by M-052. A template producing any validator error is a regression.
      - **Graceful-skip on infrastructure absence, not on assertion failure.** If the API is unreachable, `Skip(...)` with a clear message is correct. If the API is reachable and a template reports non-zero `val-err`, the test fails. Do not use `Skip` to mask assertion failures.
      - **No new test infrastructure.** The canary remains in `tests/FlowTime.Integration.Tests` using the existing health-probe-and-skip pattern shared with Rust engine integration tests. Do not move it to a new project or harness.
      - **E-23 pause lift is coordinated.** Flip E-23 status only after M-053's assertion is green on a live run and the full suite is green. The status-surface sync is atomic — all surfaces (spec, tracking, roadmap, epic-roadmap, CLAUDE.md) flip in one pass.

      ## Design Notes

      - The assertion pattern matches the project's integration-test idiom: `Assert.True(totals.ValErr == 0, $"Expected val-err=0, got {totals.ValErr}. Details: {totals}");` — include the template-by-template first-err detail in the message so a failure is actionable.
      - Documentation updates: walk `docs/` for references to the snake_case provenance shape, the `SimModelArtifact`-on-the-wire pattern, or the two-schema world. Update what is still current. Archive or delete what is not.
      - The E-23 status-surface update is a planner-scope operation (status-surface reconciliation); the actual M-047 restart is a separate start-milestone action in the next session.
      - After this milestone, the stashed M-046 input material (on `milestone/m-E23-01-schema-alignment`) becomes historical — its content has been absorbed by E-24's milestones and the canary green state. The branch can be retired when E-23 resumes.

