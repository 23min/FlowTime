    id: M-020
    frontmatter:
      title: Live Topology and Charts
      status: done
      parent: E-17
      depends_on:
        - M-019
    body: |
      ## Goal

      The What-If page shows a **topology graph** and **time-series charts** that both update reactively when parameters change. Topology node colors reflect current metrics (heatmap); charts show full time series with axes and hover tooltips. This is the "wow" moment: the user drags a slider, watches the graph recolor, and sees the chart curves animate in real time.

      ## Context

      After M-019, the What-If page has auto-generated parameter controls, reactive state, debounced eval, and sparklines that show series shapes as small SVG paths. The data pipeline is fully working and sub-millisecond fast. What's missing is the **visual richness** that makes the interactivity compelling:

      - **Topology graph**: no visualization yet. The user sees series names and values as text. For topology-heavy models (queue, class decomposition), understanding which node feeds which is impossible without a graph.
      - **Charts**: sparklines are 140×28 pixels. They convey shape but not exact values, no axes, no hover, no legend. For longer series or comparison across metrics, they're insufficient.

      M-020 replaces both: a proper topology graph (using the existing `dag-map-view` component with metric overlays) and a richer chart component (SVG-based, no external library) with axes, hover tooltips, and multi-series support.

      **Layout stability is critical.** The graph must re-layout only on *structural* changes (model switch, new parameters). On *value* changes (slider drag), only colors and chart data update — nodes don't move, edges don't rewire. This preserves the user's mental map and makes the experience feel alive rather than jittery.

      ## Acceptance Criteria

      1. **AC-1: Topology graph renders.** When a compiled model has 2+ nodes, the What-If page shows a DAG-style graph alongside the parameter panel and series list. Uses the existing `dag-map-view.svelte` component. Graph structure is derived from the compiled model's nodes + dependencies (not from a separate HTTP call).

      2. **AC-2: Graph structure from compile response.** The engine session `compile` command's response includes a `graph` field: `{ nodes: [{id, kind}], edges: [{from, to}] }`. The server derives this from the parsed model definition. The Svelte client stores it in state and passes it to the graph renderer.

      3. **AC-3: Layout stability on value changes.** Dragging a slider does NOT trigger a graph re-layout. The dag-map-view's computed positions are preserved across evals. This is verified by a Playwright test that checks node positions are identical before and after a parameter tweak.

      4. **AC-4: Reactive heatmap.** Each topology node is colored by its current series value (e.g., `served` for expression nodes, `queue_depth` for queue nodes). Colors update when the series store updates. A Svelte-derived store maps series → `Map<nodeId, NodeMetric>` for the graph overlay.

      5. **AC-5: Metric selection.** A small dropdown above the graph lets the user pick which metric drives the heatmap (e.g., "served", "queue_depth", "utilization"). The dropdown lists all non-internal series. Default selection is the first primary output series.

      6. **AC-6: Time-series chart component.** A new `<Chart>` component replaces the inline sparkline usage in the series panel:
         - SVG-based, no external library
         - Configurable width/height, default 300×120
         - X-axis: bin index labels
         - Y-axis: min/max labels (auto-scaled)
         - Hover: shows bin index + exact value at mouse position
         - Smooth line with optional point markers

      7. **AC-7: Chart updates are reactive.** When series data changes, the chart re-renders in place. The axis auto-scales to the new range. No flicker, no re-mount.

      8. **AC-8: Multi-series overlay (optional per chart).** A chart can render multiple series as overlapping lines with different colors and a legend. Default: one series per chart. Overlay mode is used for related metrics (e.g., arrivals vs served).

      9. **AC-9: Chart hover tooltip.** On mouseover, a crosshair line shows the current bin index, and a tooltip displays `{name}: {value}` for each series rendered in that chart. The tooltip follows the cursor and does not cause layout shift.

      10. **AC-10: Pure unit tests.** Vitest unit tests cover:
          - Graph derivation from compile response (node/edge mapping)
          - Metric map computation (series → heatmap metric)
          - Chart path computation (extending sparkline-path tests to include axis-aware layout)
          - Hover bin index resolution (cursor x → nearest bin)
          No DOM-level component tests required; pure functions only.

      11. **AC-11: Playwright E2E.** Extend `tests/ui/specs/svelte-what-if.spec.ts` with:
          - Topology graph renders when model is loaded
          - Drag slider → graph colors change (verify a specific node's fill attribute changes)
          - Drag slider → node positions don't change (layout stability)
          - Model switch → graph re-layouts (new structure)
          - Chart hover → tooltip appears with correct values

      12. **AC-12: Visual latency unchanged.** Tweaking a parameter to seeing the graph/chart update should still feel instant. Reuse the existing `Last eval: N µs` badge — it should stay under 1000 µs for the simple-pipeline model even with the new rendering.

      ## Technical Notes

      ### Graph in compile response

      Extend `engine/cli/src/protocol.rs` `CompileResult`:

      ```rust
      pub struct CompileResult {
          pub params: Vec<ParamInfo>,
          pub series: HashMap<String, Vec<f64>>,
          pub bins: usize,
          pub grid: GridInfo,
          pub graph: GraphInfo,  // NEW
      }

      pub struct GraphInfo {
          pub nodes: Vec<GraphNodeInfo>,
          pub edges: Vec<GraphEdgeInfo>,
      }

      pub struct GraphNodeInfo {
          pub id: String,
          pub kind: String,  // "const", "expr", "pmf", "queue", "router"
      }

      pub struct GraphEdgeInfo {
          pub from: String,
          pub to: String,
      }
      ```

      Graph derivation in session:
      - Iterate model.nodes → collect (id, kind) for `nodes`
      - For expr nodes → parse the expression to find referenced nodes → edges
      - For topology.nodes (queue/service) → add node with kind="queue", edges from semantics.arrivals source to the queue, from queue to semantics.served target
      - For router nodes → edges from `inputs.queue` source to each route target

      This is a one-shot derivation — cached per compile, not recomputed on eval.

      ### Client-side graph type mapping

      In `ui/src/lib/api/engine-session.ts`:

      ```typescript
      export interface CompileResult {
          params: ParamInfo[];
          series: Record<string, number[]>;
          bins: number;
          grid: GridInfo;
          graph: EngineGraph;
      }

      export interface EngineGraph {
          nodes: { id: string; kind: string }[];
          edges: { from: string; to: string }[];
      }
      ```

      In the what-if page, adapt to the `GraphResponse` shape that `dag-map-view` expects:

      ```typescript
      function adaptGraph(eg: EngineGraph): GraphResponse {
          return {
              nodes: eg.nodes.map(n => ({ id: n.id, kind: n.kind })),
              edges: eg.edges.map((e, i) => ({ id: `edge-${i}`, from: e.from, to: e.to })),
              order: [],  // dag-map-view computes its own order
          };
      }
      ```

      ### Metric map

      Pure function in `ui/src/lib/api/topology-metrics.ts`:

      ```typescript
      export function buildMetricMap(
          series: Record<string, number[]>,
          metricName: string,
          bins: number,
      ): Map<string, { value: number; label?: string }> {
          const map = new Map();
          for (const [seriesName, values] of Object.entries(series)) {
              if (isInternalSeries(seriesName)) continue;
              // Use the mean over all bins as the heatmap value
              const mean = values.reduce((a, b) => a + b, 0) / values.length;
              map.set(seriesName, { value: mean, label: seriesName });
          }
          return map;
      }
      ```

      Initially: heatmap colors every node by its series' mean. Future enhancement: let the user pick a bin slider (scrub through time).

      ### Chart component

      New `ui/src/lib/components/chart.svelte`:
      - SVG element sized to viewport
      - Pure derivation: `computeChartGeometry(values, { width, height, padding })` → `{ path, xTicks, yTicks, xScale, yScale }`
      - Hover: listen to `mousemove`, compute `binFromX(mouseX)`, render crosshair line + tooltip
      - Multi-series: accept `series: { name, values, color }[]` as prop

      Keep the pure geometry in `chart-geometry.ts`, testable without DOM. Follow the sparkline-path.ts pattern.

      ### Layout stability

      `dag-map-view.svelte` uses `$derived.by(() => ...)` to compute the DAG + layout when `graph` changes. As long as the parent passes the *same* graph object reference across evals (not a new one each time), Svelte's reactivity won't retrigger layout. Use `let graph = $state<GraphResponse | null>(null)` and only assign it in `compileModel`, never in `runEval`.

      Verify in Playwright by reading `cx`/`cy` (or `transform`) attributes of node elements before and after a slider drag — they should be identical.

      ### Playwright selectors

      Add `data-testid` to the graph container and tooltip in the component. For the dag-map-view, the nodes render as SVG elements; use `[data-node-id="..."]` or similar. Check what dag-map-view already exposes.

      ## Out of Scope

      - Animated transitions between values (ease-in color changes) — the page already feels instant at 42µs/eval; animation is pure polish and can come later
      - Zooming/panning the graph — future
      - Time scrubber (pick a specific bin for the heatmap) — future
      - Export chart as image — future
      - Comparison mode (multiple parameter snapshots side-by-side) — future
      - Editing graph structure in the UI — out of scope forever; models are YAML-authored
      - Replacing the chart component library later — we'll add uPlot or ECharts if the custom SVG chart proves insufficient, but that's a future concern

      ## Success Indicator

      Load the **queue-with-wip** model → see the topology graph with queue node and its inputs → drag the WIP limit slider → watch the queue node's color shift from green to orange as the queue depth increases → watch the `queue_queue` chart curve flatten at the new WIP cap. All in under 100ms from drag to visual update.

      ## Key References

      - `ui/src/lib/components/dag-map-view.svelte` — existing topology renderer
      - `ui/src/lib/api/types.ts` — `GraphResponse`, `GraphNode`, `GraphEdge` types
      - `ui/src/routes/what-if/+page.svelte` — target page for new additions
      - `ui/src/lib/components/sparkline-path.ts` — pattern for pure geometry functions
      - `ui/src/lib/api/engine-session.ts` — WebSocket client to extend with graph type
      - `engine/cli/src/protocol.rs` — session protocol types to extend
      - `engine/cli/src/session.rs` — session compile handler to extend
      - `work/epics/E-17-interactive-what-if-mode/m-E17-02-svelte-parameter-panel.md` — prior milestone
  - kind: milestone
    id: M-021
    frontmatter:
      title: Warnings Surface
      status: done
      parent: E-17
      depends_on:
        - M-020
    body: |
      ## Goal

      The What-If page surfaces engine warnings — conservation violations, queue mismatches, non-stationary arrivals, negative values — as banners and node badges. When the user tweaks a parameter to push the system past a limit, warnings light up in real time; when they pull it back, warnings clear. The interactive experience becomes a complete feedback loop: *see not just what changes, but what's wrong*.

      ## Context

      After M-020 the What-If page shows topology, charts, and a latency badge — but nothing tells the user when their model is broken or degenerate. The Rust engine already computes a rich set of warnings during `eval_model` (via `analyze()` in `analysis.rs`), but none of them make it through the session protocol. The `CompileResult` and `EvalResult` messages carry series and timing but drop warnings on the floor.

      ### Warnings the engine currently produces

      From `engine/core/src/analysis.rs`:

      | Code | Severity | Fires when | Node context |
      |---|---|---|---|
      | `arrivals_negative` | warning | `semantics.arrivals` contains `< -1e-6` in any bin | topology node |
      | `served_negative` | warning | `semantics.served` contains negative values | topology node |
      | `queue_negative` | warning | `queueDepth` column contains negative values | topology node |
      | `errors_negative` | warning | `errors` column contains negative values | topology node |
      | `served_exceeds_arrivals` | warning | `served > arrivals` in any bin (non-queue kinds only) | topology node |
      | `served_exceeds_capacity` | warning | `served > capacity` in any bin | topology node |
      | `queue_depth_mismatch` | warning | computed queue vs actual queue differs beyond tolerance | topology node |
      | `non_stationary` | warning | first-half vs second-half arrivals mean differs > 25% | topology node |

      Each warning has a `node_id`, `code`, `message`, `bins` (the affected bin indices), and `severity`.

      **Key property:** because warnings are computed in the post-eval pipeline (which runs on every `eval` call), they are already recomputed per parameter override. The only thing missing is transport + rendering.

      ## Acceptance Criteria

      1. **AC-1: Warnings in protocol — compile response.** `CompileResult` (Rust `protocol.rs`, TS `engine-session.ts`) includes a `warnings: WarningInfo[]` field. The session handler populates it from the initial eval's `result.warnings`. Each entry carries `node_id`, `code`, `message`, `bins`, `severity`.

      2. **AC-2: Warnings in protocol — eval response.** `EvalResultMsg` includes the same `warnings: WarningInfo[]` field, populated from the eval's `result.warnings`. The field is **always present** — empty array means "no warnings," not "unknown".

      3. **AC-3: Example model that triggers a warning.** A new example model `capacity-constrained.yaml` is added to `ui/src/lib/api/example-models.ts`:
         - `arrivals` const (default 15, tweakable)
         - `capacity` const (default 10, tweakable)
         - `served` expression forcing served equal to arrivals
         - Topology node with `semantics.capacity = capacity`
         - With defaults: `served=15 > capacity=10` → `served_exceeds_capacity` warning fires on bins 0..N
         - Dropping `arrivals` below `capacity` clears the warning
         - Raising `capacity` above `arrivals` clears the warning

      4. **AC-4: Warnings banner.** When the warnings array is non-empty, the What-If page shows a colored alert banner near the top (below the model picker). The banner shows:
         - Warning count
         - Compact list of `{node_id} · {code}` entries (up to 5, then "…and N more")
         - A severity color (amber for `warning`, red for future `error`)
         When the array is empty, the banner is hidden entirely (no empty state).

      5. **AC-5: Warning details panel.** Below the topology panel (or as a collapsible section within it), a `Warnings` list shows every warning:
         - Each row: severity icon, `node_id`, `code`, full `message`, affected bin count
         - Rows are grouped by `node_id`
         - The panel is hidden when there are no warnings

      6. **AC-6: Node badge on topology graph.** Each topology node with at least one warning is visually flagged:
         - A small ⚠ icon overlay in the top-right of the node, OR
         - A red/amber outline around the node
         - Implementation: Svelte-level SVG overlay on top of the dag-map-view SVG, using node positions exposed by dag-map-view (or computed from the DOM)
         - When the node has no warnings, no badge is rendered
         - Badges update reactively as the warnings array changes

      7. **AC-7: Warnings update reactively on eval.** When a parameter change clears a warning, the banner, panel, and node badge all disappear. When a change introduces a warning, they all appear. No page reload.

      8. **AC-8: Pure unit tests.**
         - `format.ts` or new `warnings.ts`: group-by-node helper, severity-to-class mapping (8+ tests)
         - Tests use fixtures with 0, 1, N warnings across multiple nodes
         - Unknown warning codes fall back to a default icon/color

      9. **AC-9: Playwright E2E.** New spec cases:
         - Load `capacity-constrained` model → warnings banner visible, panel has ≥1 entry, `Service` node shows the badge
         - Tweak `capacity` from 10 to 20 → banner disappears within 500ms, panel empty, badge gone
         - Tweak `capacity` back to 10 → banner returns
         - Load `simple-pipeline` → **no** banner, **no** panel (no topology warnings possible)

      10. **AC-10: Compile error surface unchanged.** Compile errors (invalid YAML, missing grid) still flow through the existing `error` field on the Response envelope — not the `warnings` array. Warnings are a separate, orthogonal channel. A model with compile errors produces an error response with no warnings; a valid model produces a result response with a (possibly empty) warnings array.

      ## Technical Notes

      ### Rust protocol extension

      Add to `engine/cli/src/protocol.rs`:

      ```rust
      #[derive(Debug, Serialize)]
      pub struct WarningMsg {
          pub node_id: String,
          pub code: String,
          pub message: String,
          pub bins: Vec<usize>,
          pub severity: String,
      }

      pub struct CompileResult {
          // ...existing fields...
          pub warnings: Vec<WarningMsg>,
      }

      pub struct EvalResultMsg {
          // ...existing fields...
          pub warnings: Vec<WarningMsg>,
      }
      ```

      In `engine/cli/src/session.rs` `handle_compile` and `handle_eval`, convert `result.warnings` (type `Vec<Warning>` from `analysis.rs`) to `Vec<WarningMsg>` before populating the message.

      ### TypeScript type

      Add to `ui/src/lib/api/engine-session.ts`:

      ```typescript
      export interface WarningInfo {
          node_id: string;
          code: string;
          message: string;
          bins: number[];
          severity: string;
      }

      export interface CompileResult {
          // ...existing...
          warnings: WarningInfo[];
      }

      export interface EvalResult {
          // ...existing...
          warnings: WarningInfo[];
      }
      ```

      Existing vitest tests that mock compile/eval responses need `warnings: []` added to their fixtures.

      ### Warnings helper module

      New file `ui/src/lib/api/warnings.ts`:

      ```typescript
      export interface WarningGroup {
          nodeId: string;
          warnings: WarningInfo[];
      }

      /** Group warnings by node_id, preserving insertion order within each group. */
      export function groupWarningsByNode(warnings: WarningInfo[]): WarningGroup[];

      /** True if any warning in the array references the given node. */
      export function nodeHasWarning(warnings: WarningInfo[], nodeId: string): boolean;

      /** Tailwind/CSS class suffix for a severity. Defaults to 'warning'. */
      export function severityClass(severity: string): 'warning' | 'error';
      ```

      Pure functions, fully unit-tested.

      ### Svelte UI changes

      - **Banner**: new inline block between model picker and topology panel. Uses existing `AlertCircleIcon` and color tokens. Conditionally rendered on `warnings.length > 0`.
      - **Panel**: new section below topology panel (or embedded in it). Iterates `groupWarningsByNode(warnings)`.
      - **Node badges**: this is the trickiest part. `dag-map-view` renders an SVG. The Svelte page has the graph container; I can overlay a second SVG positioned absolutely on top with badge circles at the same coordinates as the nodes. Node coordinates come from the dag-map layout — which dag-map-view doesn't currently expose.

        **Pragmatic approach**: query the rendered SVG after each metric update, find nodes by their dag-map-generated `data-node-id` or text label, read their bounding boxes, and render badges at those positions. Done via `bind:this` + `tick()` + `getBoundingClientRect`. Not ideal but avoids modifying `dag-map-view`.

        **Cleaner approach** (optional, if the pragmatic one is messy): extend `dag-map-view` to accept a `nodeBadges: Map<string, { icon, color }>` prop and render badges as part of its SVG. This is a cross-cutting change to the shared component.

        I'll start with the pragmatic approach and fall back to extending the component only if positioning is unreliable.

      ### Capacity-constrained example model

      Add to `ui/src/lib/api/example-models.ts`:

      ```typescript
      const CAPACITY_CONSTRAINED: ExampleModel = {
          id: 'capacity-constrained',
          name: 'Capacity constrained',
          description: 'Served forced equal to arrivals; exceeds capacity by default. Drop arrivals or raise capacity to clear the warning.',
          yaml: `grid:
        bins: 4
        binSize: 1
        binUnit: hours
      nodes:
        - id: arrivals
          kind: const
          values: [15, 15, 15, 15]
        - id: capacity
          kind: const
          values: [10, 10, 10, 10]
        - id: served
          kind: expr
          expr: "arrivals"
      topology:
        nodes:
          - id: Service
            kind: serviceWithBuffer
            semantics:
              arrivals: arrivals
              served: served
              capacity: capacity
        edges: []
        constraints: []
      `,
      };
      ```

      **Important:** verify this model actually produces the `served_exceeds_capacity` warning during Rust unit testing. Adjust values if needed.

      ### Field naming

      The Rust `Warning` struct uses `node_id` (snake_case). MessagePack serialization preserves the field name. On the TS side, I'll keep it as `node_id` rather than converting to `nodeId` — matches what's on the wire, matches the C# `RustWarning` DTO (which already uses `NodeId` but is a separate struct).

      ## Out of Scope

      - **Suggestion actions** — no "click to fix" — the user tweaks sliders manually.
      - **Animated badge transitions** — plain show/hide is fine.
      - **Bin-level warning visualization** — chart doesn't highlight the specific bins where warnings occurred (future polish).
      - **Warning history / timeline** — only the current state is shown.
      - **Custom warning rules / thresholds** — the engine's defaults stand.
      - **Editable severity mapping** — warning/error for now, future may add "info" or "critical".
      - **Error surface** — compile/protocol errors stay in their existing path.

      ## Key References

      - `engine/core/src/analysis.rs` — warning generation
      - `engine/core/src/compiler.rs` `eval_model` — runs analysis on every eval
      - `engine/cli/src/protocol.rs` — `CompileResult`, `EvalResultMsg`
      - `engine/cli/src/session.rs` — `handle_compile`, `handle_eval`
      - `ui/src/lib/api/engine-session.ts` — client types
      - `ui/src/lib/components/dag-map-view.svelte` — existing graph renderer
      - `ui/src/routes/what-if/+page.svelte` — target page
      - `work/epics/E-17-interactive-what-if-mode/m-E17-03-live-topology-and-charts.md` — prior milestone

      ## Success Indicator

      Load `capacity-constrained` → amber banner at top says "1 warning: Service · served_exceeds_capacity", `Service` node on the topology graph has a ⚠ badge, warnings panel shows the full message "served > capacity in 4 bins". Drag `capacity` slider from 10 up to 20 — banner disappears, badge gone, panel empty, charts still animate. Drop `capacity` back to 5 — warnings reappear. End-to-end under 200ms per change.
  - kind: milestone
    id: M-022
    frontmatter:
      title: Edge Heatmap
      status: done
      parent: E-17
      depends_on:
        - M-021
    body: |
      ## Goal

      Color the edges in the What-If topology graph by the throughput they carry, so the user can immediately see where flow is heavy, where it is throttled, and how it redistributes when parameters change.

      ## Context

      After M-021, the topology graph colors **nodes** by their series mean (utilization, queue depth, served rate). The edges between nodes are currently monochrome — a missed opportunity to show the *flow* on each connection.

      The `dag-map-view` component already accepts an `edgeMetrics?: Map<string, NodeMetric>` prop — the rendering support exists but has never been wired up. This milestone computes the edge metric map from the series data and passes it in.

      **What "flow on an edge" means here.** For an edge from node A to node B, the flow is the output series of A — the rate at which A produces values that travel toward B. This is the same series used to color A as a node, applied to its outgoing edges. The interpretation:

      - `const` node A → expr node B: A's series (the constant value) is the flow on the edge.
      - `expr` node A → topology node B (as `semantics.arrivals`): A's series is the arrival rate flowing into B.
      - Topology node Q → whatever consumes Q's served output: Q's `served` series (the `{snake(Q)}_served` column, or Q's own primary series if that's what the heatmap uses) is the edge flow.

      This interpretation is consistent and symmetric: a node that feeds into multiple downstream nodes will color all its outgoing edges with its own output series. The user sees "this value leaves A, flows along each edge to downstream nodes."

      ## Acceptance Criteria

      1. **AC-1: Edge metric map computation.** A new pure function `buildEdgeMetricMap` in `ui/src/lib/api/topology-metrics.ts`:

         ```typescript
         export function buildEdgeMetricMap(
             graph: EngineGraph,
             series: Record<string, number[]>,
         ): MetricMap;
         ```

         For each edge `{ from, to }` in `graph.edges`:
         - Look up the `from` node's primary series using the same `findNodeSeries` logic used for nodes.
         - Compute the mean across all bins.
         - Insert into the map with key `${from}->${to}` (see Technical Notes for key format).
         - If no series is found for `from`, omit the edge from the map (edge renders with default styling).

      2. **AC-2: Edge metric map normalization.** `normalizeMetricMap` (already exists, normalizes to `[0, 1]`) is applied to the raw edge metric map before passing to `dag-map-view`. The function is shared — no duplication.

      3. **AC-3: Edge metrics wired into `dag-map-view`.** In `+page.svelte`, a new `$derived.by` computes the normalized edge metric map and passes it as `edgeMetrics` to `<DagMapView>`. The map recomputes when `series` or `engineGraph` changes.

      4. **AC-4: Layout unaffected.** Adding `edgeMetrics` does not trigger a DAG re-layout. The `edgeMetrics` prop is consumed only in `renderSVG`, not in `layoutMetro`. This is the existing separation in `dag-map-view.svelte`. Verify: the `layout` derived store does not read `edgeMetrics`.

      5. **AC-5: Visual result.** Load the `capacity-constrained` model. The edge from `arrivals` to `Service` is colored (not gray/default). Dragging the `arrivals` slider shifts the edge color intensity. This is a visual smoke-test via Playwright.

      6. **AC-6: Edge key format confirmed.** The `dag-map` library's `edgeMetrics` key format is `${fromId}\u2192${toId}` — the Unicode right-arrow character `→` (`\u2192`) between node IDs (confirmed in `dag-map/src/render.js:151`). The `buildEdgeMetricMap` function uses this exact format. A comment in the source records this.

      7. **AC-7: Pure unit tests.** Vitest tests in `ui/src/lib/api/topology-metrics.test.ts` cover:
         - `buildEdgeMetricMap` with a simple two-node graph where `from` has a known series → map entry present with correct mean.
         - `buildEdgeMetricMap` with an edge whose `from` node has no series → edge omitted from map.
         - `buildEdgeMetricMap` with a multi-edge graph → correct keys for all edges.
         - Map has same size as number of edges with known series (no extra entries).
         - At least 8 tests total for the new function.

      8. **AC-8: Playwright E2E.** Extend `tests/ui/specs/svelte-what-if.spec.ts`:
         - After model load, the topology graph SVG contains at least one colored (non-default) edge element.
         - Dragging `arrivals` slider on `capacity-constrained` model changes an edge's visual attribute (color or stroke).
         - Layout stability: edge positions (path data or endpoint coords) do not change when a parameter is tweaked — only fill/stroke attributes change.

      9. **AC-9: No regression on prior ACs.** All 173 vitest and 19 Playwright tests from M-021 continue to pass.

      ## Technical Notes

      ### Edge key format in dag-map

      Before implementation, inspect the `dag-map` package to determine the key format for `edgeMetrics`. The two likely candidates are:

      - **`${from}->${to}`** — matches the deduplication key used inside `dag-map-view.svelte` (`const key = \`${from}->${to}\``).
      - **`e-${index}`** — matches the synthesized edge IDs in `graph-adapter.ts`.

      Run a quick spike: pass a known edge metric with both key formats to a rendered `<DagMapView>` in the engine-test page and observe which one colors the edge. Record the confirmed format as a comment near `buildEdgeMetricMap`.

      If `dag-map` uses a different format entirely, adapt accordingly and note it.

      ### `findNodeSeries` reuse

      `findNodeSeries` is currently a private function in `topology-metrics.ts`. Export it (or extract the lookup logic into a shared internal helper) so `buildEdgeMetricMap` can call it without duplicating the lookup order:

      1. `series[nodeId]` — exact match
      2. `series[\`${toSnakeCase(nodeId)}_queue\`]` — topology queue column
      3. `undefined` — omit

      ### Edge metric map key example

      For a model with:
      - `arrivals` const → `Service` topology node
      - `served` expr → `Service.semantics.served`

      The `EngineGraph.edges` produced by the Rust session will include `{ from: "arrivals", to: "Service" }`.

      The map entry: `"arrivals->Service" → { value: mean(series["arrivals"]), label: "arrivals" }`.

      ### Page-level derived store

      In `+page.svelte`:

      ```typescript
      const edgeMetricMap = $derived.by(() => {
          if (!engineGraph) return new Map();
          return normalizeMetricMap(buildEdgeMetricMap(engineGraph, series));
      });
      ```

      Pass to `<DagMapView graph={graphResponse} metrics={metricMap} edgeMetrics={edgeMetricMap} />`.

      The `edgeMetricMap` reacts to `series` changes on every eval — colors update in real time without re-layout.

      ## Out of Scope

      - Per-bin edge coloring (time scrubber drives this — M-023).
      - Edge labels (flow rate text on edges) — visual noise at current scale.
      - Animated edge color transitions.
      - Edge click / inspect interaction.
      - Separate edge metric selector (use same heatmap metric as nodes for now).

      ## Success Indicator

      Load `queue-with-wip` model → both nodes and edges have heatmap colors. Drag the WIP limit slider — node colors shift AND edge colors shift in tandem, both within 100ms. The topology graph "lights up" the whole flow network.

      ## Key References

      - `ui/src/lib/api/topology-metrics.ts` — `buildMetricMap`, `normalizeMetricMap`, `findNodeSeries` (to export)
      - `ui/src/lib/components/dag-map-view.svelte` — `edgeMetrics` prop (already present)
      - `ui/src/lib/api/graph-adapter.ts` — `adaptEngineGraph` (edge ID synthesis)
      - `ui/src/routes/what-if/+page.svelte` — page to update
      - `work/epics/E-17-interactive-what-if-mode/m-E17-04-warnings-surface.md` — prior milestone
  - kind: milestone
    id: M-023
    frontmatter:
      title: Time Scrubber
      status: done
      parent: E-17
      depends_on:
        - M-022
    body: |
      ## Goal

      Add a bin-position scrubber below the topology graph. Dragging it switches the heatmap from "mean across all bins" to "value at bin T", and stamps a crosshair on all charts at the same bin. The user can step through time and watch the model "breathe" — seeing exactly how node load and edge flow evolve bin by bin.

      ## Context

      After M-022, both nodes and edges in the topology graph are colored by the **mean** of their series across all bins. The mean is a useful summary, but it collapses time — users cannot see:

      - How does queue depth build up in early bins?
      - When does the capacity constraint first bite?
      - Where does flow peak in a variable-arrival model?

      The time scrubber answers these questions by letting the user "scrub" through the time axis just as a video scrubber steps through frames. All heatmap colors and the chart crosshair update immediately — no new eval, no new WebSocket round-trip.

      The M-020 spec explicitly noted this as a future enhancement:
      > *"Future enhancement: let the user pick a bin slider (scrub through time)."*

      ## Acceptance Criteria

      ### Scrubber state

      1. **AC-1: `selectedBin` state.** The What-If page introduces `let selectedBin = $state<number | null>(null)`. `null` means "mean mode" (existing behavior, unchanged). A number means "bin T mode".

      2. **AC-2: Scrubber control.** Below the topology panel (before the warnings panel), a scrubber section renders when a model is compiled and has `bins > 1`:
         - Label: `Bin: {T} / {bins - 1}` (or `Mean` when null).
         - A range `<input>` from `0` to `bins - 1`, step `1`, bound to `selectedBin` (0 when null).
         - A `Mean` toggle button / checkbox that sets `selectedBin` back to `null`.
         - When `selectedBin` is `null`, the slider displays at position 0 but is visually dimmed or labeled "Mean".
         - `data-testid="bin-scrubber"` on the range input, `data-testid="bin-mean-toggle"` on the reset button.

      3. **AC-3: Scrubber hidden when `bins === 1`.** Models with a single bin have nothing to scrub. The scrubber section is not rendered when `bins <= 1`.

      ### Heatmap integration

      4. **AC-4: `buildMetricMap` accepts optional bin.** The signature of `buildMetricMap` in `topology-metrics.ts` is extended:

         ```typescript
         export function buildMetricMap(
             graph: EngineGraph,
             series: Record<string, number[]>,
             bin?: number,   // undefined → mean mode
         ): MetricMap;
         ```

         When `bin` is a valid index, use `values[bin]` instead of the mean. When `bin` is out of range or undefined, fall back to the mean. The existing mean behavior is unchanged — no callers break.

      5. **AC-5: `buildEdgeMetricMap` accepts optional bin.** The same optional `bin` parameter is added to `buildEdgeMetricMap` (from M-022), with identical semantics.

      6. **AC-6: `metricMap` and `edgeMetricMap` react to `selectedBin`.** In `+page.svelte`, both derived stores read `selectedBin` and pass it to the metric builders. Svelte's reactivity ensures the topology recolors without re-layout when the scrubber moves.

      ### Chart crosshair

      7. **AC-7: `Chart` accepts `crosshairBin`.** The `<Chart>` component (in `chart.svelte`) gains a new optional prop:

         ```typescript
         interface Props {
             // ...existing...
             crosshairBin?: number;  // undefined → no crosshair
         }
         ```

         When set, a vertical SVG line is rendered at the x-position corresponding to `crosshairBin`. The line is styled as a light gray or muted dashed line that does not interfere with the hover tooltip or series paths.

      8. **AC-8: `crosshairX` pure helper.** A new export in `chart-geometry.ts`:

         ```typescript
         export function crosshairX(bin: number, geom: ChartGeometry): number | null;
         ```

         Returns the SVG x-coordinate for `bin`, or `null` if `bin` is out of range. Uses `geom.plotLeft`, `geom.plotRight`, and `geom.bins` for the linear interpolation. Fully unit-tested.

      9. **AC-9: All charts show crosshair at `selectedBin`.** In `+page.svelte`, every `<Chart>` is passed `crosshairBin={selectedBin ?? undefined}`. When the scrubber moves, all charts update the crosshair position in lockstep.

      ### Unit tests

      10. **AC-10: `buildMetricMap` per-bin tests.** New vitest cases in `topology-metrics.test.ts`:
          - `bin=0` → returns value at index 0, not mean.
          - `bin=N-1` → returns value at last index.
          - `bin=N` (out of range) → falls back to mean.
          - `bin=undefined` → returns mean (unchanged behavior, existing test keeps passing).
          - At least 6 new tests.

      11. **AC-11: `buildEdgeMetricMap` per-bin tests.** Same coverage as AC-10 but for edge metrics. At least 4 new tests.

      12. **AC-12: `crosshairX` tests.** In `chart-geometry.test.ts`:
          - Bin 0 → returns `plotLeft`.
          - Bin `bins-1` → returns `plotRight`.
          - Bin at midpoint → returns midpoint x.
          - Bin out of range (negative, >= bins) → returns `null`.
          - At least 5 tests.

      13. **AC-13: Chart crosshair render test (Svelte component smoke test).** Using the existing Vitest + jsdom setup (matching the chart-geometry tests), verify that when `crosshairBin` is set, a `<line>` element appears in the Chart SVG.

      ### Playwright E2E

      14. **AC-14: Scrubber visible and functional.** On the `queue-with-wip` model (multiple bins):
          - Scrubber is present with `data-testid="bin-scrubber"`.
          - Drag scrubber to bin `N/2` → topology node colors change (at least one node's fill differs from the mean-mode color).
          - All chart SVGs contain a `<line>` element (crosshair) after scrubber is moved.
          - Click `data-testid="bin-mean-toggle"` → crosshair disappears from charts, heatmap reverts to mean colors.

      15. **AC-15: Scrubber absent on single-bin model.** Load `capacity-constrained` model (4 bins — scrubber should appear). Load a hypothetical 1-bin model or verify by counting bins from the latency badge area. If no suitable model exists, verify the condition is covered by unit test only and note the gap.

      16. **AC-16: No regression.** All previous vitest (173+) and Playwright (19+) tests pass.

      ## Technical Notes

      ### `buildMetricMap` extension

      Current implementation:

      ```typescript
      export function buildMetricMap(
          graph: EngineGraph,
          series: Record<string, number[]>,
      ): MetricMap {
          const map = new Map<string, NodeMetric>();
          for (const node of graph.nodes) {
              const values = findNodeSeries(node.id, series);
              if (values === undefined) continue;
              map.set(node.id, { value: seriesMean(values), label: node.id });
          }
          return map;
      }
      ```

      Extended:

      ```typescript
      export function buildMetricMap(
          graph: EngineGraph,
          series: Record<string, number[]>,
          bin?: number,
      ): MetricMap {
          const map = new Map<string, NodeMetric>();
          for (const node of graph.nodes) {
              const values = findNodeSeries(node.id, series);
              if (values === undefined) continue;
              const value = pickValue(values, bin);
              map.set(node.id, { value, label: node.id });
          }
          return map;
      }

      function pickValue(values: number[], bin?: number): number {
          if (bin !== undefined && bin >= 0 && bin < values.length) {
              return values[bin];
          }
          return seriesMean(values);
      }
      ```

      `pickValue` is a pure helper extractable for direct unit testing.

      ### `crosshairX` implementation

      ```typescript
      export function crosshairX(bin: number, geom: ChartGeometry): number | null {
          if (bin < 0 || bin >= geom.bins) return null;
          if (geom.bins <= 1) return geom.plotLeft;
          return geom.plotLeft + (bin / (geom.bins - 1)) * (geom.plotRight - geom.plotLeft);
      }
      ```

      ### Chart crosshair SVG

      In `chart.svelte`, after the series `<path>` elements:

      ```svelte
      {#if crosshairBin !== undefined && crosshairX(crosshairBin, geom) !== null}
          <line
              x1={crosshairX(crosshairBin, geom)}
              x2={crosshairX(crosshairBin, geom)}
              y1={geom.plotTop}
              y2={geom.plotBottom}
              stroke="hsl(240 5% 64.9%)"
              stroke-width="1"
              stroke-dasharray="4 2"
              pointer-events="none"
              data-testid="crosshair"
          />
      {/if}
      ```

      The crosshair is rendered at pointer-events none so it doesn't interfere with hover.

      ### Scrubber position in page layout

      Insert between the topology panel and the warnings panel:

      ```svelte
      <!-- Time scrubber (m-E17-06) — only when bins > 1 -->
      {#if bins > 1}
          <div class="rounded-lg border p-4" data-testid="time-scrubber-panel">
              <div class="mb-2 flex items-center justify-between">
                  <div class="text-sm font-semibold">Time</div>
                  <div class="text-muted-foreground font-mono text-[11px]">
                      {selectedBin !== null ? `Bin ${selectedBin}` : 'Mean'}
                  </div>
              </div>
              <div class="flex items-center gap-3">
                  <input
                      type="range"
                      min="0"
                      max={bins - 1}
                      step="1"
                      value={selectedBin ?? 0}
                      oninput={(e) => selectedBin = parseInt((e.target as HTMLInputElement).value)}
                      class="flex-1"
                      data-testid="bin-scrubber"
                  />
                  <button
                      class="rounded border px-2 py-1 text-xs {selectedBin === null ? 'bg-blue-50 border-blue-400' : 'hover:bg-gray-50'}"
                      onclick={() => selectedBin = null}
                      data-testid="bin-mean-toggle"
                  >Mean</button>
              </div>
          </div>
      {/if}
      ```

      The `bins` value comes from the `CompileResult.bins` field — store it as `let bins = $state<number>(0)` and populate in `compileModel`.

      ### Derived store updates

      ```typescript
      const metricMap = $derived.by(() => {
          if (!engineGraph) return new Map();
          const bin = selectedBin !== null ? selectedBin : undefined;
          return normalizeMetricMap(buildMetricMap(engineGraph, series, bin));
      });

      const edgeMetricMap = $derived.by(() => {
          if (!engineGraph) return new Map();
          const bin = selectedBin !== null ? selectedBin : undefined;
          return normalizeMetricMap(buildEdgeMetricMap(engineGraph, series, bin));
      });
      ```

      No layout change — only metrics change. The `$effect` that applies `.has-warning` classes already runs after metric/graph updates, so warning badges remain correct at all scrubber positions.

      ## Out of Scope

      - Play/pause animation (auto-advancing the scrubber through bins) — future polish.
      - Highlighting the selected bin in the chart axes/ticks.
      - Per-bin warning filtering (show warnings only in the selected bin).
      - Synchronized scrubber across multiple chart panels.
      - Keyboard navigation of the scrubber (native range input handles this).

      ## Success Indicator

      Load `queue-with-wip` model. Drag the bin scrubber from bin 0 to bin 3. The topology nodes and edges shift colors as the queue builds up across time bins. All charts show a vertical crosshair at bin 3. Click "Mean" — crosshairs vanish, heatmap reverts to mean colors. The whole interaction is seamless: no eval, no network, just derived state recomputing.

      ## Key References

      - `ui/src/lib/api/topology-metrics.ts` — `buildMetricMap`, `buildEdgeMetricMap` (to extend)
      - `ui/src/lib/components/chart-geometry.ts` — add `crosshairX`
      - `ui/src/lib/components/chart.svelte` — add `crosshairBin` prop
      - `ui/src/routes/what-if/+page.svelte` — add `selectedBin` state, scrubber UI, wire `crosshairBin`
      - `work/epics/E-17-interactive-what-if-mode/m-E17-05-edge-heatmap.md` — prior milestone
  - kind: milestone
    id: M-024
    frontmatter:
      title: Supported Surface Inventory, Boundary ADR & Exit Criteria
      status: done
      parent: E-19
    body: |
      ## Goal

      Produce the authoritative inventory, boundary ADR, and retention/deletion decisions that govern the rest of E-19. When this milestone closes, every first-party compatibility and legacy seam outside E-16's analytical boundary has an explicit classification (supported / transitional / delete / archive), an owning downstream milestone, and a grep guard specification. No code is deleted in this milestone; decisions are locked so M-025, M-026, and M-027 can execute forward-only without re-litigating scope.

      ## Context

      E-16 purified the analytical truth and consumer fact surfaces. Everything else — Sim authoring/orchestration endpoints, server-side drafts, archived run bundles, Engine bundle import, runtime catalogs, deprecated schema/template/example material, and Blazor compatibility wrappers — is still present in the tree. None of it is analytical, so folding it back into E-16 is wrong. But leaving it unowned makes temporary compatibility shims harden into a de facto product support promise.

      This milestone does three things:

      1. **Inventories** every in-scope surface exhaustively so later milestones inherit a single source of truth.
      2. **Decides** the six open retention/responsibility questions the epic flagged (A1–A6), plus the responsibility-clarification framing for Engine/Core/Sim/Time Machine.
      3. **Publishes** the boundary ADR (extended) and a new supported-surfaces matrix, both as durable documents that later milestones cite instead of rediscovering.

      The spec also records the shared framing that governs every downstream E-19 milestone: no project renames in E-19, `FlowTime.TimeMachine` is a new separate component owned by E-18, `FlowTime.Core` stays pure, `FlowTime.API` stays as the query/operator surface over canonical runs, and Sim owns authoring (with transitional execution hosting until the Time Machine ships).

      ## Decisions Locked By This Milestone

      These are recorded here as the authoritative source. `work/decisions.md` gets corresponding short entries pointing at this spec.

      ### Shared Framing

      1. **No project renames in E-19.** `FlowTime.Core`, `FlowTime.Generator`, `FlowTime.API`, and `FlowTime.Sim.*` keep their names. The boundary ADR documents what each actually does.
      2. **`FlowTime.Core` is the evaluation engine.** Pure library. `ModelCompiler.Compile` + `ModelParser.ParseModel` + `Graph.Evaluate`, plus the authoritative validators (`ModelSchemaValidator`, `ModelValidator`) and the invariant analyzers. No HTTP, no orchestration, no storage, no client awareness. E-19 does not touch it. **Forward (post-E-18): Core remains pure and unchanged in these invariants.** The Time Machine depends on Core, never the reverse. Core is the library of deterministic operations (the "instruction set"); the Time Machine is the hosted component that composes those operations into first-class callable services. Nothing new gets added to Core that would reintroduce HTTP, orchestration, or client awareness. When the Time Machine needs a capability, it either composes existing Core primitives or — if Core is genuinely missing a pure computational primitive — the primitive is added to Core as a pure library function, not to the Time Machine as a parallel implementation.
      3. **`FlowTime.Generator` is today's shared orchestration layer** between `Sim.Service` and `API`. `RunOrchestrationService`, `RunArtifactWriter`, deterministic run ID logic, RNG seeding, and dry-run/plan mode all live here. **During E-19, Generator is unchanged — name, structure, and responsibilities all stay the same.** **Generator's forward fate is decided and scoped to E-18: Path B — extraction and deletion.** Most of Generator's current responsibilities (compile, evaluate, artifact write, run IDs, RNG seeding, dry-run) overlap the Time Machine's scope and cannot coexist with it. In E-18, Generator's execution-pipeline responsibilities are **extracted** into the new `FlowTime.TimeMachine` project, and `FlowTime.Generator` is **deleted** in the same milestone. No "Generator and Time Machine coexist in parallel" window is permitted — this matches the no-coexistence discipline established in E-16. The specific tier 3 analyser binding (`TemplateInvariantAnalyzer` currently in `FlowTime.Sim.Core.Analysis`) is also subject to the E-18 extraction: the invariant rules belong conceptually in Core, with the Time Machine composing them into the tier 3 validation surface. See decision D-032.
      4. **`FlowTime.API` is the query/operator surface over canonical run artifacts.** It reads canonical run artifacts and exposes the current read/query and operator endpoints. It does not execute models, and when an obsolete API write path is retired E-19 deletes it outright instead of preserving a 410 or advisory tombstone.
      5. **`FlowTime.Sim.Service` hosts authoring and, transitionally, execution.** Templates, parameter UX, provenance are permanent Sim responsibilities. Execution hosting is transitional — it exists in Sim only because no other HTTP host is wired to `FlowTime.Core` today.
      6. **The Time Machine (`FlowTime.TimeMachine`) is owned by E-18 and is a new separate component.** Responsibilities: compile, tiered validation (schema / compile / analyse), evaluate, reevaluate, parameter override with stable runtime parameter identity, artifact write. Surfaces: in-process SDK, CLI, optional sidecar protocol. Not analytical primitives, not template authoring, not query/analysis of past runs. The Time Machine does not live inside Sim or API. **Dependency direction: Time Machine → Core, never reverse.** The Time Machine composes Core's pure operations (`ModelSchemaValidator`, `ModelCompiler`, `ModelParser`, `Graph.Evaluate`, invariant analyzers) into first-class callable services with consistent request/response shapes. It never reimplements what Core already does. In the BEAM/JVM framing: Core is the instruction set and execution kernel as a pure library; the Time Machine is the hosted machine that loads programs (compiled graphs), drives them, exposes iteration and reevaluation protocols, and presents a client-agnostic API. Naming rationale: FlowTime's execution component is an abstract machine in the BEAM/JVM sense — instructions (compiled graph), state (time grid plus accumulating series), deterministic stepping through time. "Time Machine" also aligns with the existing Blazor "Time Travel" UI feature that navigates runs the Time Machine produces, and the reevaluation semantics (rewind a compiled model, run it forward with different parameters) are literally time travel.
      7. **When the Time Machine ships, Sim's orchestration endpoints are deleted by default.** If a temporary facade is kept at all, it must be justified by a concrete technical migration constraint, documented in the owning E-18 milestone, and treated as a short-lived bridge rather than a supported steady state. That migration is E-18's job. E-19 records the commitment so no new non-UI callers land on Sim orchestration in the meantime.
      8. **The Time Machine serves all clients on equal footing.** Sim UI, Blazor UI, Svelte UI, MCP servers, external AI agents, tests, and CI are all first-class callers of Time Machine operations. No client is privileged. In particular, validation (A6) is a client-agnostic operation; MCP servers and AI agents generating candidate models need the same validation contract that UIs need for editor-time feedback.
      9. **Telemetry is an adapter concern outside the Time Machine, with one exception.** The Time Machine itself does not contain external-telemetry-format-specific code (no Prometheus, no OTEL, no BPI event log parsing). External-format ingestion lives in adapter projects under `FlowTime.Telemetry.*`. The exception: writing the **canonical bundle** format (defined by E-15's schema, today produced by `TelemetryBundleBuilder` in Generator) is a Time Machine core capability, not a pluggable adapter, because it serves the **telemetry loop** that is fundamental to FlowTime's bootstrap, self-consistency, and AI-iteration use cases. The canonical run directory (`data/runs/<runId>/model/`, `series/`, `run.json`) and the canonical bundle (`model.yaml`, `manifest.json`, `series/`, CSV) are **two distinct artifacts with different purposes** — runs are the in-place clear-text debugging surface, bundles are the portable interchange format — and both are preserved by Path B. The bundle format may evolve independently of the run directory format. **`ITelemetrySource` is introduced** by E-18 m-E18-01b (after the Path B extraction cut in m-E18-01a creates the concrete `CanonicalBundleSource`), with multiple implementations once 01b ships (`CanonicalBundleSource`, `FileCsvSource`, plus future Prometheus/OTEL/event-log adapters under `FlowTime.Telemetry.*` delivered by M-003). **`ITelemetrySink` is explicitly deferred** until a second sink format exists; canonical bundle writing is a concrete Time Machine capability, not behind an interface. The **telemetry loop** (capture → bundle → replay → parity, established vocabulary from `work/epics/telemetry-loop-parity/spec.md`) is a first-class use case with three primary purposes: **specification/bootstrap** (generate target telemetry from a model to define what the real system must emit), **self-consistency testing** (round-trip verification of capture+replay correctness), and **AI iteration / model fitting** (compare model-generated telemetry to real observed telemetry, adjust model, iterate). Path B extracts both Generator's execution code (into the Time Machine) and Generator's telemetry-generation code (`TelemetryBundleBuilder`, `TelemetryCapture`, `CaptureManifestWriter`, `RunArtifactReader`) into the canonical bundle writer and `CanonicalBundleSource`. Existing public surfaces — `POST /telemetry/captures` API and `flowtime telemetry capture` CLI — are re-wired to the new home without changing their contracts. The parity harness itself, drift tolerance rules, and CI gating are not E-18's responsibility; they are owned by the Telemetry Loop & Parity epic.

      ### A1 — Sim orchestration endpoints

      **`/api/v1/orchestration/runs` remains supported as the Sim authoring + transitional execution host for first-party UIs (Blazor and Svelte).** `/api/v1/drafts/run` (inline source only) remains supported as a narrower inline-YAML execution surface.

      - `/api/v1/orchestration/runs` is the active first-party UI run path today.
      - `/api/v1/drafts/run` is retained for explicit inline-YAML "run this now" flows, not as the default UI orchestration path.
      - They are not the Time Machine contract, not the programmable contract, and not an external-integration surface.
      - No new non-UI callers during E-19.
      - No new responsibilities bolted onto them (no external auth, no batch APIs, no programmatic surfaces).
      - Explicit sunset hook to E-18 Time Machine: when the Time Machine ships, these endpoints are deleted by default. A temporary thin facade is allowed only if a concrete technical migration constraint is documented in the owning E-18 milestone.

      ### A2 — Stored drafts

      **Retire stored drafts entirely.** No UI exercises `/api/v1/drafts` CRUD today; the only callers are `DraftEndpointsTests.cs`. Active Blazor and Svelte run flows use `/api/v1/orchestration/runs`; retaining `/api/v1/drafts/run` is only about the inline-source "run this YAML right now" surface, not the default UI orchestration path.

      Deletion scope (executed by M-025):
      - `/api/v1/drafts` CRUD endpoints: GET, PUT, POST create, DELETE, list
      - `StorageKind.Draft` and `data/storage/drafts/` directory
      - `draftId` resolution branches in `/api/v1/drafts/validate`, `/api/v1/drafts/generate`, `/api/v1/drafts/run`
      - `DraftEndpointsTests.cs` tests for CRUD paths (inline-source tests survive)

      Retained: `/api/v1/drafts/run` with `DraftSource.type = "inline"` only. This is the narrow "run this YAML right now" surface. First-party template-driven run creation remains `/api/v1/orchestration/runs`.

      If real model versioning is wanted later, it must be designed against compiled-graph identity (E-18 territory), not resurrected drafts.

      ### A3 — `data/storage/runs` + `bundleRef`

      **Delete the ZIP/bundle archive layer.** Sim's post-hoc ZIP write to `data/storage/runs/<runId>` has no production reader; `bundleRef` is consumed only by `RunOrchestrationTests.cs` exercising Engine bundle import.

      Deletion scope (executed by M-025):
      - `StorageKind.Run` bundle ZIP writes in `RunOrchestrationService.CreateSimulationRunAsync`
      - `BundleRef` / `StorageRef` return values on `RunCreateResponse`
      - `data/storage/runs/` directory and backend write path for run bundles
      - Any Sim-side references to bundle ZIPs

      **Explicitly out of scope for deletion:** the canonical run directory layout at `data/runs/<runId>/` (`model/`, `series/`, `run.json`). That layout stays unchanged.

      ### A4 — Engine `POST /v1/runs` bundle import

      **Delete bundle-import branches.** Only `RunOrchestrationTests.cs` exercises them; no UI, CLI, background job, or production workflow depends on Sim-exports-bundle → Engine-imports-bundle. The "loop" is designed but never wired.

      Deletion scope (executed by M-025):
      - `bundlePath`, `bundleArchiveBase64`, and `BundleRef` branches in `RunOrchestrationEndpoints.cs` `POST /v1/runs`
      - `ExtractArchiveAsync` support helpers if unused after deletion
