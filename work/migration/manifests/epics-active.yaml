  - kind: milestone
    id: M-028
    frontmatter:
      title: Scaffold, Types, and Parsers
      status: done
      parent: E-20
    body: |
      ## Goal

      Stand up the Rust project, port all model types with YAML deserialization, port the expression parser, and extract reference model fixtures. After this milestone, the Rust crate can parse any FlowTime model YAML and any FlowTime expression — the complete data layer with no computation.

      ## Context

      No Rust code exists in the repo. The devcontainer does not have Rust installed. The C# engine defines ~22 model types in `ModelParser.cs` and a recursive-descent expression parser in `FlowTime.Expressions/`. Existing YAML model files in `examples/` and `fixtures/` serve as integration test fixtures.

      ## Acceptance Criteria

      1. **AC-1: Rust workspace and crate structure.** A Rust workspace at `engine/` (repo root) with two crates:
         - `engine/core/` — library crate (`flowtime-core`) containing model types, expression parser, and (future) compiler/evaluator.
         - `engine/cli/` — binary crate (`flowtime-engine`) that depends on `flowtime-core`. For this milestone, it only parses a model YAML and prints a summary (node count, grid dimensions).
         - `Cargo.toml` workspace at `engine/` level.

      2. **AC-2: Devcontainer Rust toolchain.** The devcontainer gains Rust support:
         - `rustup` and `cargo` available on `$PATH`.
         - `cargo build` and `cargo test` work from `engine/`.
         - Installation via devcontainer feature or post-create script — not manual.

      3. **AC-3: Model types with serde deserialization.** Rust structs mirroring every C# model type that participates in YAML deserialization:
         - `ModelDefinition`, `GridDefinition`, `NodeDefinition`, `TopologyDefinition`, `TopologyNodeDefinition`, `TopologyNodeSemanticsDefinition`, `TopologyEdgeDefinition`, `ConstraintDefinition`, `ConstraintSemanticsDefinition`, `ClassDefinition`, `TrafficDefinition`, `ArrivalDefinition`, `ArrivalPatternDefinition`, `OutputDefinition`, `RouterDefinition`, `RouterInputsDefinition`, `RouterRouteDefinition`, `DispatchScheduleDefinition`, `PmfDefinition`, `InitialConditionDefinition`, `UiHintsDefinition`.
         - All fields use camelCase JSON/YAML naming (matching existing schema).
         - Optional fields are `Option<T>`.
         - `serde_yaml` for deserialization.

      4. **AC-4: All existing model fixtures deserialize.** Every `.yaml` model file in `examples/` and `fixtures/` (excluding `examples/archive/`) parses into the Rust `ModelDefinition` without error. Test: `cargo test` includes a parameterized test that loads each fixture.

      5. **AC-5: Expression parser.** Port of the C# `ExpressionParser` (recursive descent) producing equivalent AST types:
         - AST: `Expr` enum with variants `Literal(f64)`, `ArrayLiteral(Vec<f64>)`, `NodeRef(String)`, `BinaryOp { op, left, right }`, `FunctionCall { name, args }`.
         - `BinaryOp`: Add, Subtract, Multiply, Divide.
         - Grammar: `Expression = Term (('+' | '-') Term)*`, `Term = Factor (('*' | '/') Factor)*`, `Factor = Number | Array | NodeRef | FunctionCall | '(' Expression ')'`.
         - Error reporting with position.

      6. **AC-6: Expression parser parity.** Every expression that appears in existing model fixtures and C# test fixtures parses correctly. Additionally, the following expressions must parse and produce correct AST structure (extracted from C# tests):
         - `"capacity"` → NodeRef
         - `"100.0"` → Literal
         - `"a + b"` → BinaryOp(Add)
         - `"a * b + c"` → precedence: Add(Mul(a, b), c)
         - `"(a + b) * c"` → Mul(Add(a, b), c)
         - `"SHIFT(demand, 1)"` → FunctionCall("SHIFT", [NodeRef("demand"), Literal(1)])
         - `"CONV(errors, [0.0, 0.6, 0.3, 0.1])"` → FunctionCall with ArrayLiteral
         - `"CLAMP(queue_depth / 50, 0, 1)"` → nested function + binary op
         - `"raw_arrivals * (1 - SHIFT(pressure, 1))"` → nested binary ops with function call
         - `"MIN(capacity, arrivals)"` → FunctionCall
         - `"MAX(0, SHIFT(queue_depth, 1) + arrivals)"` → nested

      7. **AC-7: Reference model fixtures extracted.** A directory `engine/fixtures/` containing YAML model files at graduated complexity levels, copied or symlinked from existing `examples/` and `fixtures/`. At minimum:
         - Simple: const-only model (e.g., `m0.const.yaml`)
         - Expression: model with expr nodes
         - Queue: model with serviceWithBuffer topology
         - PMF: model with PMF nodes
         - Router: model with router nodes
         - Constraint: model with constraints
         - Multi-class: model with class definitions
         - WIP limit: model with wipLimit/wipOverflow
         - These serve as the progressive parity test fixtures for M2-M6.

      ## Technical Notes

      - **Crate naming:** `flowtime-core` (library) and `flowtime-engine` (binary) follow Rust conventions (kebab-case crate names).
      - **Workspace location:** `engine/` at repo root keeps Rust separate from the .NET solution. `Cargo.lock` lives in `engine/`.
      - **serde field naming:** Use `#[serde(rename_all = "camelCase")]` on structs to match the existing YAML camelCase convention. Use `#[serde(default)]` for optional fields that have C# defaults.
      - **Expression parser:** The C# parser is 371 lines. The Rust port should be similar size. Use `&str` + byte position for error reporting.
      - **No computation:** This milestone deliberately excludes compilation, evaluation, and artifact writing. The types and parsers are the foundation; computation starts in M-029.
      - **Sim YAML models:** Some fixtures use Sim-specific fields (`metadata.generator`, `parameters`, etc.) that are not in `ModelDefinition`. Use `#[serde(flatten)]` or ignore unknown fields with `#[serde(deny_unknown_fields)]` disabled — existing models must parse without error.

      ## Out of Scope

      - Model compilation (topo sort, column map, plan generation) — M-029
      - Evaluation (matrix ops) — M-029+
      - Model validation (schema checks, initial condition validation) — M-029+
      - Artifact writing — M-033
      - WebAssembly compilation — future
      - Expression evaluation (only parsing) — M-029

      ## Dependencies

      - None (first milestone in E-20)
  - kind: milestone
    id: M-029
    frontmatter:
      title: Compiler and Core Evaluator
      status: done
      parent: E-20
    body: |
      ## Goal

      Compile simple FlowTime models (const + expr nodes, no topology) into an evaluation plan, execute the plan against a flat matrix, and produce correct series output. This is the first milestone where the Rust engine computes something — the "hello world" of the matrix model.

      ## Context

      M-028 delivered the Rust workspace, model types with YAML deserialization, and the expression parser. The crate can parse any model and any expression, but cannot compile or evaluate anything.

      The C# engine evaluates models via:
      1. `ModelParser.ParseNodes()` — creates `INode` instances from `NodeDefinition`
      2. `Graph(nodes)` — topological sort
      3. `Graph.Evaluate(grid)` — iterate in topo order, each node produces a `Series`

      The matrix engine replaces this with:
      1. Compiler: assign column indices, emit ops from node definitions
      2. Evaluator: iterate ops, execute against flat `f64[]` matrix

      ## Acceptance Criteria

      1. **AC-1: ColumnMap.** Bidirectional mapping between series names (strings) and column indices (usize). `name_to_index()` and `index_to_name()`. Constructed during compilation.

      2. **AC-2: Op enum and evaluator.** `Op` enum with variants for the element-wise operations needed by const + expr models:
         - `Const { out, values }` — write constant values to a column
         - `VecAdd { out, a, b }`, `VecSub`, `VecMul`, `VecDiv` — element-wise binary ops
         - `ScalarMul { out, input, k }`, `ScalarAdd { out, input, k }` — scalar ops
         - `VecMin { out, a, b }`, `VecMax { out, a, b }` — element-wise min/max
         - `Clamp { out, val, lo, hi }` — clamp to range
         - `Mod { out, a, b }` — modulo
         - `Floor { out, input }`, `Ceil { out, input }`, `Round { out, input }` — rounding
         - `Step { out, input, threshold }` — step function
         - `Pulse { out, period, phase, amplitude }` — periodic pulse
         
         Evaluator function: `fn evaluate(plan: &[Op], bins: usize, series_count: usize) -> Vec<f64>` — allocates matrix, iterates ops, returns filled matrix.

      3. **AC-3: Expression compiler.** Compile an expression AST (`Expr`) into a sequence of `Op`s given a `ColumnMap`. Each binary op and function call emits one or more ops, using temporary columns for intermediate results. Node references resolve to column indices via the ColumnMap.

      4. **AC-4: Model compiler (const + expr).** `fn compile(model: &ModelDefinition) -> Result<(Plan, ColumnMap), CompileError>`:
         - Assigns a column index to each node's output series.
         - Topological sort based on expression dependencies.
         - Emits `Const` ops for `kind: "const"` nodes.
         - Emits expression ops for `kind: "expr"` nodes.
         - Returns the plan (ordered ops) and column map.

      5. **AC-5: End-to-end evaluation.** `fn eval_model(model: &ModelDefinition) -> Result<EvalResult, Error>` that compiles and evaluates, returning named series. Test with the `hello.yaml` fixture:
         - `demand` = [10, 10, 10, 10, 10, 10, 10, 10]
         - `served` = demand * 0.8 = [8, 8, 8, 8, 8, 8, 8, 8]

      6. **AC-6: Parity with C# on simple models.** Create a parity test that evaluates a model with both the Rust engine and the C# engine (via pre-computed reference outputs) and compares series values. At minimum:
         - Const-only model: all series match
         - Const + expr model: expression results match (binary ops, scalar multiply)
         - Nested expressions: `MIN(a, b)`, `MAX(a, b)`, `CLAMP(x, lo, hi)`
         - Multiple dependent expressions (chain: a → b → c)

      7. **AC-7: Plan inspection.** `fn format_plan(plan: &Plan, column_map: &ColumnMap) -> String` that prints a human-readable plan. The CLI `flowtime-engine plan <model.yaml>` command uses this. Output shows op type, column names (not just indices).

      ## Technical Notes

      - **Matrix layout:** Row-major `Vec<f64>` of size `series_count * bins`. Column `c` at bin `t` is at index `c * bins + t`. All bins for one series are contiguous.
      - **Temporary columns:** Expression compilation may need intermediate columns (e.g., `a + b` in `(a + b) * c` needs a temp column for `a + b`). The compiler allocates these from the column map with generated names like `__temp_0`.
      - **Topo sort:** Collect dependencies from expression AST (node references). Kahn's algorithm (same as C#). Reject cycles.
      - **Fixture update:** `simple-const.yaml` uses legacy field `expression` instead of `expr`. Update the fixture to use `expr` so it works with the Rust model types.
      - **No topology:** This milestone handles flat node lists only. Topology synthesis (serviceWithBuffer queue nodes) comes in M-030.
      - **PMF nodes:** `kind: "pmf"` computes a constant expected value from the distribution. Can be included here as a simple op, or deferred to M-030. Include if straightforward.

      ## Out of Scope

      - Topology synthesis (queue nodes, retry echo) — M-030
      - Sequential ops (QueueRecurrence, Shift, Convolve, DispatchGate) — M-030
      - Routing and constraints — M-031
      - Derived metrics — M-032
      - Artifact writing (CSVs, JSON) — M-033
      - SHIFT/feedback handling — M-030

      ## Dependencies

      - M-028 complete (model types + expression parser)
  - kind: milestone
    id: M-030
    frontmatter:
      title: Topology and Sequential Ops
      status: done
      parent: E-20
    body: |
      ## Goal

      Add topology synthesis and sequential operations to the Rust engine so it can evaluate models with queues, retry echo, dispatch schedules, WIP limits, overflow routing, and SHIFT-based backpressure. After this milestone, the matrix engine handles the core flow dynamics — everything except routing, constraints, derived metrics, and artifact writing.

      ## Context

      M-029 delivered the compiler and evaluator for flat models (const + expr + PMF). The compiler produces a plan of element-wise ops, the evaluator executes against a flat matrix. 38 Rust tests passing.

      The C# engine handles topology via:
      1. `ModelCompiler` — synthesizes `serviceWithBuffer` and `retryEcho` nodes from topology definitions
      2. `ServiceWithBufferNode.Evaluate` — sequential queue recurrence: `Q[t] = max(0, Q[t-1] + inflow - outflow - loss)`
      3. `ExprNode.EvaluateShiftFunction` — temporal shift: `out[t] = input[t - lag]`
      4. `DispatchScheduleProcessor` — gates outflow to dispatch bins only
      5. `WipOverflowEvaluator` — post-evaluation routing of WIP overflow to target queues
      6. `Graph.EvaluateFeedbackSubgraph` — bin-by-bin evaluation for SHIFT feedback cycles

      In the matrix model, all of these become ops in the plan. Sequential ops (QueueRecurrence, Shift, Convolve) process bins in order, reading from previous bins in the same matrix — feedback falls out naturally without special handling.

      ## Acceptance Criteria

      1. **AC-1: Sequential op variants.** Add to the `Op` enum:
         - `Shift { out, input, lag }` — `out[t] = input[t - lag]` (0 for t < lag)
         - `Convolve { out, input, kernel }` — causal convolution: `out[t] = Σ(k) input[t-k] * kernel[k]`
         - `QueueRecurrence { out, inflow, outflow, loss, init, wip_limit, overflow_out }` — sequential queue depth with optional WIP limit and overflow tracking
         - `DispatchGate { out, input, period, phase, capacity }` — gates output to dispatch bins, optionally capping at capacity

      2. **AC-2: Topology synthesis.** The compiler processes `model.topology.nodes` to synthesize queue and retry echo nodes (same logic as C# `ModelCompiler`):
         - For each `serviceWithBuffer`/`queue`/`dlq` topology node: synthesize a `QueueRecurrence` op from `semantics.arrivals`, `semantics.served` (or capacity), `semantics.errors`, and `initialCondition.queueDepth`.
         - For each topology node with `retryEcho` + `retryKernel`: synthesize a `Convolve` op.
         - Queue node ID follows the C# snake_case convention (`Queue → queue_queue`).
         - Dispatch schedule on topology node → `DispatchGate` op on the outflow before `QueueRecurrence`.

      3. **AC-3: WIP limits and overflow routing.**
         - `QueueRecurrence` op supports optional `wip_limit` column (scalar const or series) and `overflow_out` column.
         - Overflow routing: compiler resolves `wipOverflow` topology node ID to the target's inflow column, emits an additional `VecAdd` to inject overflow into the target's inflow.
         - Overflow cycle validation at compile time (same as C# `ValidateNoOverflowCycles`).

      4. **AC-4: SHIFT feedback.** Models with SHIFT-based cross-node feedback cycles evaluate correctly without special handling. The Shift op reads `state[input, t - lag]` which was written in a previous bin iteration since the evaluator processes ops in plan order and sequential ops process bins in order. Test: the backpressure model from E-10 p3b (queue → pressure → SHIFT → effective_arrivals → queue) produces the same stabilization pattern.

      5. **AC-5: Parity fixtures.** Create simulation-mode topology fixtures (with `grid` + inline `const`/`expr` nodes + topology) and verify parity with C# output:
         - Simple queue: const arrivals/served → queue depth matches hand-calculated values
         - Queue with WIP limit: overflow tracked correctly
         - Queue with dispatch schedule: outflow gated to period bins
         - Retry echo: CONV(failures, kernel) produces correct retry series
         - Backpressure feedback: SHIFT-based throttle stabilizes queue
         - Cascading WIP overflow: A→B→C overflow chain

      6. **AC-6: Existing tests unbroken.** All 38 existing Rust tests still pass. The compiler changes don't break const/expr compilation.

      ## Technical Notes

      - **Evaluation order for sequential ops:** The plan is still executed as a linear op list. Sequential ops (QueueRecurrence, Shift, Convolve) internally loop over bins. This is correct because the evaluator processes ops in dependency order (topo sort), and within a sequential op, each bin reads from previous bins that are already written. No special "feedback mode" needed.
      - **Overflow routing without re-evaluation:** Unlike the C# `WipOverflowEvaluator` (which iterates evaluate → override → re-evaluate), the matrix compiler can emit the overflow routing as additional ops after the queue ops. The QueueRecurrence op writes overflow to `overflow_out` column; a subsequent `VecAdd` adds it to the target's inflow. For cascading (A→B→C), the compiler orders the QueueRecurrence ops so A runs before B which runs before C. No iteration needed — single-pass.
      - **Topology node ID → queue column:** The compiler maintains a mapping from topology node ID to the synthesized queue column index, used for overflow routing and later for derived metrics (M-032).
      - **New fixtures needed:** Existing fixtures in `engine/fixtures/` are either flat models (hello, simple-const) or telemetry models (file: references). This milestone needs simulation-mode topology fixtures with inline data. Create them as Rust test inline YAML or as new fixture files.
      - **Dispatch schedule:** The C# `DispatchScheduleProcessor` zeros outflow on non-dispatch bins, then caps at capacity on dispatch bins. In the matrix model, this is a `DispatchGate` op applied to the outflow column before it reaches `QueueRecurrence`.

      ## Out of Scope

      - Routing (router flow materialization) — M-031
      - Constraints (proportional allocation) — M-031
      - Multi-class flows — M-031
      - Derived metrics (utilization, latency, etc.) — M-032
      - Invariant analysis — M-032
      - Artifact writing — M-033
      - File-based series references (`file:*.csv`) — future (telemetry mode)

      ## Dependencies

      - M-029 complete (compiler + evaluator + element-wise ops)
  - kind: milestone
    id: M-031
    frontmatter:
      title: Routing and Constraints
      status: done
      parent: E-20
    body: |
      ## Goal

      Add router flow materialization and constraint allocation to the Rust engine so it can evaluate models with routers (weight-based and class-based flow splitting) and shared-capacity constraints (proportional allocation when demand exceeds capacity). After this milestone, the matrix engine handles the full evaluation pipeline except derived metrics, invariant analysis, and artifact writing.

      ## Context

      M-030 delivered topology synthesis (QueueRecurrence, Shift, Convolve, DispatchGate), WIP overflow routing, and SHIFT-based backpressure feedback. The evaluator uses bin-major evaluation. 65 Rust tests passing.

      The C# engine handles routing and constraints via:
      1. `RouterFlowMaterializer.ComputeOverrides()` — distributes flows from a source to targets via class-based routing (priority 1) then weight-based routing (remaining flow, priority 2).
      2. `ConstraintAllocator.AllocateProportional()` — when total demand exceeds capacity, allocates proportionally: `allocated[node] = capacity * (demand[node] / totalDemand)`.
      3. `ConstraintAwareEvaluator` — applies router overrides first, then constraint overrides, then re-evaluates.
      4. `ClassContributionBuilder` — decomposes totals into per-class series, propagates through graph.

      In the matrix model, all of these become plan ops. Router splitting is `ScalarMul` (weight fractions) or direct column copying (class routing). Constraint allocation is a new `ProportionalAlloc` op that reads multiple demand columns + capacity and writes capped output columns. Multi-class is tracked as separate columns per class.

      ## Acceptance Criteria

      1. **AC-1: Router weight-based splitting.** The compiler processes `NodeDefinition.router` to split a source series across targets by weight:
         - For each route: `target_arrivals += source * (weight / totalWeight)`.
         - Routes without explicit weight default to 1.0.
         - Multiple routes to the same target accumulate via VecAdd.
         - The router's source is resolved from `router.inputs.queue` (the queue node whose outflow feeds the router) or the node's own series.
         - Emitted as ScalarMul + VecAdd ops — no new Op variant needed.

      2. **AC-2: Router class-based routing.** Routes with a `classes` list route per-class flow to specific targets:
         - The compiler resolves per-class arrival columns from `model.traffic.arrivals` (each entry has a `classId` and `nodeId`).
         - Class routes extract per-class columns and sum them for the target.
         - Remaining flow (after class routes) is distributed by weight among weight-only routes.
         - Per-class columns use the naming convention `{nodeId}__class_{classId}`.

      3. **AC-3: Constraint proportional allocation.** New `ProportionalAlloc` op:
         - Reads N demand columns + 1 capacity column.
         - Per bin: if `totalDemand > capacity`, writes `capped[i] = capacity * (demand[i] / totalDemand)`. Otherwise writes demands unchanged.
         - The compiler processes `topology.constraints` to emit ProportionalAlloc ops, connecting each constraint's `semantics.arrivals` (demand total) and `semantics.served` (capacity) to the constrained topology nodes via `topologyNode.constraints` lists.
         - Constrained nodes' inflow columns are replaced with the capped versions.

      4. **AC-4: Router → Constraint evaluation order.** The compiler emits router ops before constraint ops (matching C# `RouterAwareGraphEvaluator` → `ConstraintAwareEvaluator` order). Constraint allocation reads from router-adjusted columns. The unified topo sort orders: data nodes → router splits → constraint allocation → queue recurrence.

      5. **AC-5: Parity fixtures.** Create test models and verify parity with C# output:
         - Weight-based router: 3 routes with weights [0.5, 0.3, 0.2], verify target arrivals sum to source
         - Class-based router: 2 classes routed to different targets
         - Mixed router: some routes class-based, remainder weight-based
         - Simple constraint: 2 nodes sharing capacity, demand > capacity → proportional split
         - Constraint below capacity: demand < capacity → no capping
         - Router + constraint combined: router feeds constrained nodes

      6. **AC-6: Existing tests unbroken.** All 65 existing Rust tests still pass.

      ## Technical Notes

      - **Router source resolution:** A router node in the YAML has `router.inputs.queue` pointing to a queue node. The router distributes the queue's outflow (served series) across targets. Each target gets a fraction of the served flow as its arrivals.
      - **No new Op for routing:** Weight-based routing decomposes to ScalarMul + VecAdd (existing ops). Class routing decomposes to Copy + VecAdd. The compiler emits these standard ops — the router abstraction lives in the compiler, not the evaluator.
      - **New Op for constraints:** `ProportionalAlloc` is a genuinely new operation — it reads N+1 columns and writes N columns with per-bin conditional logic. This is similar in spirit to QueueRecurrence (reads multiple columns, writes with conditional logic) but operates on groups of columns.
      - **Per-class column naming:** `{nodeId}__class_{classId}` (double underscore to avoid collision with user-defined node IDs). These are internal columns that may not appear in outputs.
      - **Constraint topology nodes:** Each constraint in `topology.constraints` has `semantics.arrivals` (total demand reference) and `semantics.served` (capacity reference). Topology nodes reference constraints via their `constraints` list. The compiler maps constraint IDs to the topology nodes they constrain.
      - **Bin-major evaluation:** ProportionalAlloc processes one bin at a time (like all ops), reading demand[t] and capacity[t] and writing capped[t]. This is compatible with the bin-major evaluator from M-030.

      ## Out of Scope

      - Derived metrics (utilization, latency, etc.) — M-032
      - Invariant analysis — M-032
      - Artifact writing — M-033
      - File-based series references (`file:*.csv`) — future (telemetry mode)
      - Per-class output series in artifacts — M-033 (artifact layer decides what to write)

      ## Dependencies

      - M-030 complete (topology synthesis, sequential ops, bin-major evaluation)
  - kind: milestone
    id: M-032
    frontmatter:
      title: Derived Metrics and Analysis
      status: done
      parent: E-20
    body: |
      ## Goal

      Add derived metric computation and invariant analysis to the Rust engine. Derived metrics (utilization, cycle time, flow efficiency, Kingman approximation) are emitted as additional plan ops on the evaluation matrix. Invariant analysis (conservation checks, warnings) runs as a post-evaluation pass over the matrix columns. After this milestone, the engine produces all analytical output — only artifact writing and CLI remain.

      ## Context

      M-031 delivered routing and constraint allocation. The engine now handles the full evaluation pipeline: const/expr/PMF nodes, topology synthesis (queues, retry echo, dispatch), WIP overflow, SHIFT feedback, routers, and constraints. 78 Rust tests passing.

      The C# engine computes derived metrics in `RuntimeAnalyticalEvaluator` and runs invariant checks in `InvariantAnalyzer`. In the matrix model, derived metrics are additional columns computed from evaluation output. Invariant analysis is a read-only pass that produces warnings.

      ## Acceptance Criteria

      1. **AC-1: Utilization metric.** Compute `utilization[t] = served[t] / effectiveCapacity[t]` for topology nodes with capacity semantics. Emit as a derived column per node. Returns 0 when capacity is 0. Effective capacity = base capacity × parallelism (when parallelism is defined).

      2. **AC-2: Cycle time components.** Compute per-bin:
         - `queueTimeMs[t] = (queueDepth[t] / served[t]) × binMs` (0 when served ≤ 0)
         - `serviceTimeMs[t] = processingTimeMsSum[t] / servedCount[t]` (0 when servedCount ≤ 0)
         - `cycleTimeMs[t] = queueTimeMs[t] + serviceTimeMs[t]` (sum of available components)
         - `flowEfficiency[t] = serviceTimeMs[t] / cycleTimeMs[t]` (0 when cycleTime ≤ 0)
         - `latencyMinutes[t] = queueTimeMs[t] / 60000`
         - Which components are emitted depends on node category: queue-only → queueTime+latency, service-only → serviceTime, serviceWithBuffer → all.

      3. **AC-3: Kingman G/G/1 approximation.** Compute `E[Wq] ≈ (ρ/(1-ρ)) × ((Ca² + Cs²)/2) × E[S]` where:
         - `ρ` = utilization (must be in (0, 1))
         - `Ca` = coefficient of variation of arrivals
         - `Cs` = coefficient of variation of service
         - `E[S]` = mean service time (ms)
         - Returns 0 for invalid inputs (ρ ≥ 1, negative Cv, etc.)
         - Cv is computed from PMF nodes (σ/μ) or as 0.0 for constant series.

      4. **AC-4: Invariant warnings.** Post-evaluation analysis producing a `Vec<Warning>` struct:
         - **Non-negativity:** Flag bins where arrivals, served, errors, or queueDepth < -ε (ε = 1e-6)
         - **Conservation:** Flag bins where served > arrivals + ε (for non-queue nodes) or served > capacity + ε
         - **Queue balance:** Flag bins where computed queue depth diverges from actual (|computed - actual| > ε)
         - **Stationarity:** Flag when arrivals first-half vs second-half mean diverges > 25%
         - Warning struct: `{ node_id, code, message, bins, severity }`

      5. **AC-5: Derived metrics integration in compiler.** The compiler emits derived metric ops after topology ops, reading from queue depth, served, capacity, and other evaluation columns. A new `compile_derived_metrics` phase appends ops to the plan. The `EvalResult` includes a method to retrieve warnings.

      6. **AC-6: Parity tests.** Test models verifying:
         - Utilization: served=8, capacity=10 → utilization=0.8
         - Queue time: queueDepth=10, served=5, binMs=60000 → queueTimeMs=120000
         - Kingman: ρ=0.8, Ca=1.0, Cs=0.5, E[S]=10 → E[Wq]=25
         - Conservation violation: served > arrivals detected as warning
         - Stationarity: increasing arrivals flagged

      7. **AC-7: Existing tests unbroken.** All 78 existing Rust tests still pass.

      ## Technical Notes

      - **Derived columns naming:** `{nodeId}_utilization`, `{nodeId}_queue_time_ms`, `{nodeId}_cycle_time_ms`, `{nodeId}_flow_efficiency`, `{nodeId}_latency_min`, `{nodeId}_kingman_wq`.
      - **Bin duration:** Resolved from `grid.binSize` × `grid.binUnit` → milliseconds. Needed for queue time computation.
      - **Cv computation:** For PMF nodes, Cv = σ/μ computed at compile time from the PMF definition. For const nodes, Cv = 0. For expr nodes, Cv is not computed (future: sample Cv from evaluated series).
      - **Invariant analysis is read-only.** It does not modify the matrix. It returns a list of warnings. The warnings are stored alongside the EvalResult.
      - **No new Op for most derived metrics.** Utilization = VecDiv(served, capacity). Queue time = VecDiv(queueDepth, served) then ScalarMul by binMs. These compose from existing ops. Kingman may need a dedicated op or can be computed at compile time from scalar inputs.

      ## Out of Scope

      - Artifact writing (CSVs, index.json, run.json) — M-033
      - CLI commands — M-033
      - Per-class derived metrics — future
      - Window-level aggregation (multi-bin statistics) — future
      - Edge-specific warnings (edge flow conservation) — future
      - Streak detection (backlog growth, overload, age risk) — future (could add in M-032 if time permits)

      ## Dependencies

      - M-031 complete (routing, constraints, full evaluation pipeline)
  - kind: milestone
    id: M-033
    frontmatter:
      title: Artifacts, CLI, and Integration
      status: done
      parent: E-20
    body: |
      ## Goal

      Add artifact writing (per-series CSVs, index.json, run.json) and complete the CLI so the Rust engine can be invoked as a standalone binary that reads a YAML model and produces a run directory with all output artifacts. This is the final milestone — after it, the Rust engine is a complete standalone replacement for the C# evaluation pipeline.

      ## Context

      M-032 delivered derived metrics and invariant analysis. The engine now handles the full computation pipeline: parsing, compilation, evaluation, derived metrics, and warnings. 113 Rust tests passing.

      The CLI already has `parse`, `plan`, and `eval` commands. The `eval` command prints series to stdout. This milestone extends `eval` to write structured artifacts to an output directory, matching the C# engine's output format.

      ## Acceptance Criteria

      1. **AC-1: CSV series writer.** Write each named (non-temp) column as a CSV file:
         - Format: `bin_index,value\n` header, then `{t},{value}\n` per bin
         - File naming: `{seriesId}.csv` (using the column name from the column map)
         - Written to `{output}/series/` directory
         - Values formatted in invariant culture (`.` decimal separator, no thousands separator)

      2. **AC-2: series/index.json.** Write a JSON index of all output series:
         - Schema: `{ "schemaVersion": 1, "grid": {...}, "series": [{id, path, points}] }`
         - Grid: bins, binSize, binUnit from the model
         - One entry per non-temp series, referencing its CSV path

      3. **AC-3: run.json.** Write run metadata:
         - Schema: `{ "schemaVersion": 1, "engineVersion": "0.1.0", "grid": {...}, "warnings": [...], "series": [{id, path}] }`
         - Includes evaluation warnings from invariant analysis
         - Warning format: `{ "nodeId", "code", "message", "severity" }`

      4. **AC-4: CLI eval --output flag.** Extend the `eval` command:
         - `flowtime-engine eval <model.yaml> --output <dir>` — evaluates and writes artifacts to `<dir>`
         - Creates `<dir>/series/` directory structure
         - Writes CSVs + index.json + run.json
         - Without `--output`, prints summary to stdout (existing behavior)
         - Exit code 0 on success, 1 on error

      5. **AC-5: CLI validate command.** Add `validate` command:
         - `flowtime-engine validate <model.yaml>` — parses, compiles, and runs analysis without artifact writing
         - Prints warnings to stdout as JSON
         - Exit code 0 if no errors, 1 if compilation fails

      6. **AC-6: Round-trip parity test.** End-to-end test:
         - Load a reference model fixture, run `eval --output`, verify the CSV contents match expected values
         - Verify index.json is valid JSON with correct series count
         - Verify run.json contains grid and warnings

      7. **AC-7: Existing tests unbroken.** All 113 existing Rust tests still pass.

      ## Technical Notes

      - **New module: `writer.rs`** in `flowtime-core` handles artifact writing. It takes an `EvalResult` + `ModelDefinition` and writes to a directory. The CLI calls this module.
      - **CSV precision:** Use `{value}` default f64 formatting (full precision). The C# engine uses invariant culture which is equivalent.
      - **No hashing in this milestone.** The C# engine produces SHA256 hashes for series, model, and scenario. Deferring hashing to keep scope tight — can add in a follow-up.
      - **No manifest.json in this milestone.** The manifest includes RNG/provenance data that the Rust engine doesn't produce yet.
      - **No per-class series output.** Per-class columns use internal naming (`__class_`) and are not written as separate artifacts yet.
      - **Temp column filtering:** Columns starting with `__temp_` are internal intermediates and are not written.

      ## Out of Scope

      - SHA256 hashing of artifacts — follow-up
      - manifest.json (RNG, provenance) — follow-up
      - Per-class series output — follow-up
      - Parquet aggregate output — future
      - .NET subprocess bridge wiring — future (separate integration work)
      - stdin/stdout pipeline mode — future

      ## Dependencies

      - M-032 complete (derived metrics, analysis, warnings)
  - kind: milestone
    id: M-034
    frontmatter:
      title: .NET Subprocess Bridge
      status: done
      parent: E-20
    body: |
      ## Goal

      Bridge the Rust `flowtime-engine` binary into the .NET API as a subprocess call, with SHA256 hashing for provenance (per D-043), and a configuration switch to run the Rust engine alongside (not replacing) the C# engine.

      ## Context

      M-033 delivered the Rust CLI binary and artifact writer (CSVs, index.json, run.json). The E-20 spec lists the ".NET subprocess bridge" and "full parity harness" as in-scope deliverables (spec line 66). The epic was marked complete before these were built. This milestone delivers the bridge and foundational parity tests.

      D-043 established the provenance strategy: port SHA256 basics (model hash + per-series hashes in manifest.json) as part of the bridge work. Sim-specific provenance is deferred until the bridge is exercised by real Sim runs.

      ## Acceptance Criteria

      1. **AC-1: SHA256 hashing in Rust writer.** The Rust artifact writer computes:
         - SHA256 of the raw model YAML text (model hash)
         - SHA256 of each series CSV file (series hashes)
         - Writes `manifest.json` with `modelHash` and per-series `hash` fields
         - Hash format: `"sha256:{hex}"`
         - When no YAML text is available, `modelHash` is `null`

      2. **AC-2: RustEngineRunner in FlowTime.Core.** A subprocess bridge class that:
         - Writes model YAML to a temp file (UTF-8, no BOM)
         - Invokes `flowtime-engine eval <model.yaml> --output <dir>`
         - Reads back `run.json`, `manifest.json`, and series CSVs
         - Returns typed DTOs (grid, warnings, series values, manifest with hashes)
         - Cleans up temp directory on both success and failure (finally block)
         - Configurable process timeout (default 60s) with process tree kill on expiry
         - Clean `RustEngineException` for missing binary, non-zero exit, and timeout

      3. **AC-3: Configuration switch.** Opt-in via `appsettings.json`:
         - `RustEngine:Enabled` (default `false`)
         - `RustEngine:BinaryPath` (default: auto-discover from solution root)
         - DI registration in `Program.cs` when enabled
         - Does not replace C# evaluation path — both engines available side by side

      4. **AC-4: Integration tests.** At least one parity test plus error coverage:
         - C#/Rust parity on simple const+expr model
         - C#/Rust parity on topology model (serviceWithBuffer queue)
         - C#/Rust parity on negative/precision values
         - Empty model (0 nodes)
         - Invalid YAML error handling
         - Binary not found error handling
         - Process timeout handling
         - Temp directory cleanup on success and failure
         - Manifest hash presence and determinism

      ## Out of Scope

      - Replacing the C# evaluation path in `POST /v1/run`
      - Sim-specific provenance fields (template IDs, parameter bindings)
      - Plan hashing (deferred to E-17/E-18)
      - Per-class output support
      - Full C# parity harness across all fixture models

      ## Test Summary

      - 4 Rust unit tests (manifest structure, hash determinism, null hash, SHA256 correctness)
      - 14 C# integration tests (see AC-4)
      - All 123 existing Rust tests pass
      - All 1,301 existing .NET tests pass
  - kind: milestone
    id: M-035
    frontmatter:
      title: Full Parity Harness
      status: done
      parent: E-20
      depends_on:
        - M-034
    body: |
      ## Goal

      Establish an automated parity test that runs every Rust engine fixture (21 models) through both the Rust and C# engines and compares series values. Produces a green/red matrix showing exactly which models match and which diverge, and where. This is the baseline before any engine core work.

      ## Context

      M-034 delivered the .NET subprocess bridge and 3 parity tests (simple const+expr, topology queue, negative/precision values). The E-20 spec promises a "full parity harness" across reference models. Only 3 of 21 fixtures are tested today — topology, routing, constraint, PMF, and class-enabled models are untested.

      The `outputs:` filtering feature (YAML `outputs` section) is parsed by the Rust model but not used. Some models rely on it to select output series. This must be implemented for the harness to test those models correctly.

      ## Acceptance Criteria

      1. **AC-1: `outputs:` filtering in Rust compiler.** When the model has an `outputs` section, the Rust engine filters its output to only include the listed series. The `as` field renames the series in the output. When no `outputs` section is present, all non-temp series are included (current behavior).

      2. **AC-2: Parameterized parity test.** A single test method that:
         - Iterates over all `engine/fixtures/*.yaml` files
         - Evaluates each through the Rust engine (via `RustEngineRunner`)
         - Evaluates each through the C# engine (`ModelService.ParseAndConvert` → `RouterAwareGraphEvaluator.Evaluate`)
         - Compares shared series values bin-by-bin with configurable tolerance (default: 1e-10)
         - Uses case-insensitive series matching (Rust lowercases topology node IDs)
         - Reports per-fixture, per-series pass/fail with divergence details on failure

      3. **AC-3: All non-class, non-edge fixtures pass parity.** The following fixtures must produce identical series values in both engines:
         - `hello.yaml`, `simple-const.yaml` — trivial models
         - `complex-pmf.yaml`, `pmf.yaml` — PMF nodes
         - `http-service.yaml` — expression-based service
         - `topology-simple-queue.yaml`, `topology-backpressure.yaml`, `topology-cascading-overflow.yaml`, `topology-wip-limit.yaml`, `topology-dispatch.yaml`, `topology-retry-echo.yaml` — topology models
         - `constraint-below-capacity.yaml`, `constraint-proportional.yaml` — constraint allocation
         - `router-weight.yaml`, `router-with-constraint.yaml` — weight-based routing
         - `retry-service-time.yaml` — retry kernels
         - `order-system.yaml`, `microservices.yaml` — complex multi-node models

      4. **AC-4: Class and edge fixtures documented.** Fixtures that use classes (`class-enabled.yaml`, `router-class.yaml`, `router-mixed.yaml`) are tested but expected divergences are documented. The harness marks them as "known divergence — per-class decomposition not yet implemented" rather than failing the test run.

      5. **AC-5: Parity matrix output.** The test run produces a clear summary (in test output or a generated report) showing pass/fail status for each fixture. This becomes the baseline for M-036.

      ## Out of Scope

      - Per-class column decomposition (M-036)
      - Edge series materialization (M-036)
      - Artifact layout changes (M-037)
      - Any changes to the C# engine

      ## Key References

      - `engine/fixtures/` — 21 YAML fixtures
      - `engine/core/src/model.rs` — `OutputDefinition` struct (parsed, not yet used)
      - `tests/FlowTime.Integration.Tests/RustEngineBridgeTests.cs` — existing 14 bridge tests
      - `work/gaps.md` — Rust Engine Parity section
  - kind: milestone
    id: M-036
    frontmatter:
      title: Per-Class Decomposition and Edge Series
      status: done
      parent: E-20
      depends_on:
        - M-035
    body: |
      ## Goal

      The Rust engine core returns complete evaluation results including per-class series decomposition and per-edge metrics. After this milestone, the engine is feature-complete for evaluation — it computes everything the C# engine computes. This is the critical prerequisite for E-17 and E-18.

      ## Context

      The Rust engine currently computes class-based routing internally (using `__class_` prefixed temporary columns) but does not expose per-class series in its output. The C# engine uses `ClassContributionBuilder` (1,695 lines, 4-pass algorithm) and `EdgeFlowMaterializer` (764 lines) to produce per-class and per-edge series after evaluation.

      Per D-044, the engine core must return complete results. The artifact sink (M-037) then formats and persists them. This milestone focuses on the evaluation layer only.

      ### Design consideration: port vs. redesign

      The C# `ClassContributionBuilder` is a post-evaluation 4-pass algorithm that decomposes total series into per-class contributions using proportional allocation and expression-tree re-evaluation. In the Rust matrix engine, an alternative approach may be more natural:

      - **Option A (port):** Implement a post-evaluation decomposition pass similar to C#. Receives the evaluated state matrix and splits columns by class proportions.
      - **Option B (plan ops):** Extend the compiler to emit per-class columns as explicit plan operations during compilation. Each class gets its own columns, evaluated in the main bin-major loop. No post-processing needed.

      Option B leverages the matrix architecture — it's "classes as columns" rather than "classes as post-processing." But it may increase matrix size for models with many classes. The spec author should evaluate both approaches during implementation and choose based on correctness and simplicity. Document the choice in the tracking doc.

      ## Acceptance Criteria

      1. **AC-1: Class assignment map.** The engine extracts `traffic.arrivals` entries to build a node-to-class mapping. Equivalent to `ClassAssignmentMapBuilder` (trivial — 37 lines of C#).

      2. **AC-2: Per-class series in EvalResult.** The `EvalResult` struct (or its successor) includes per-class series: for each node that has class contributions, the result contains `(node_id, class_id) → f64[]` series values. At minimum, arrival nodes, expression nodes, and serviceWithBuffer nodes must have per-class decomposition.

      3. **AC-3: Expression-tree per-class evaluation.** For `expr` nodes, per-class decomposition must handle the expression tree correctly: binary ops (add, sub, mul, div), scalar ops, and functions (SHIFT, CONV, MIN, MAX, CLAMP). The per-class series must sum to the total series within floating-point tolerance.

      4. **AC-4: ServiceWithBuffer per-class decomposition.** Queue nodes produce per-class queue depth, per-class served, per-class arrivals. Queue depth decomposition follows proportional allocation based on arrival class fractions.

      5. **AC-5: Edge series in EvalResult.** The result includes per-edge metrics: `(edge_id, metric) → f64[]` where metric is one of: `flowVolume`, `attemptsVolume`, `failuresVolume`, `retryVolume`. Per-class edge decomposition: `(edge_id, metric, class_id) → f64[]`.

      6. **AC-6: Router per-class distribution.** Class-based routes distribute flow to their designated targets. Weight-based routes distribute remaining (non-class-assigned) flow by weight. Router diagnostics (leakage, accuracy) are available in the result.

      7. **AC-7: Parity harness green for class fixtures.** The 3 class-enabled fixtures (`class-enabled.yaml`, `router-class.yaml`, `router-mixed.yaml`) pass the parity harness from M-035. Known divergences resolved.

      8. **AC-8: Parity harness green for edge fixtures.** The 6 edge-bearing fixtures pass the parity harness with edge series comparison. Edge series values match C# `EdgeFlowMaterializer` output within tolerance.

      9. **AC-9: Normalization invariant.** For every node, the sum of per-class series equals the total series within 1e-10 tolerance. A Rust test asserts this invariant across all class-enabled fixtures.

      ## Out of Scope

      - Artifact directory layout changes (M-037)
      - Series ID naming convention (`{node}@{component}@{class}`) — that's sink concern
      - Per-class CSV file writing — that's sink concern
      - StateQueryService compatibility — that's sink concern
      - Sim-specific provenance (D-043 deferral still applies)

      ## Key References

      - `src/FlowTime.Core/Artifacts/ClassContributionBuilder.cs` — C# reference (1,695 lines)
      - `src/FlowTime.Core/Routing/EdgeFlowMaterializer.cs` — C# reference (764 lines)
      - `src/FlowTime.Core/Artifacts/ClassAssignmentMapBuilder.cs` — C# reference (37 lines)
      - `engine/core/src/compiler.rs` — existing class-aware routing (lines 397-533)
      - `engine/fixtures/class-enabled.yaml`, `router-class.yaml`, `router-mixed.yaml` — class fixtures
      - D-044 — three-layer architecture decision
  - kind: milestone
    id: M-037
    frontmatter:
      title: Artifact Sink Parity
      status: done
      parent: E-20
      depends_on:
        - M-036
    body: |
      ## Goal

      The Rust artifact sink produces the full directory layout that `StateQueryService` can read. After this milestone, the C# `RunArtifactWriter` is no longer needed for Rust-evaluated runs. E-17 and E-18 are unblocked.

      ## Context

      The Rust engine (after M-036) returns complete evaluation results: total series, per-class series, edge series, warnings, grid info, and metadata. The current `writer.rs` produces a minimal artifact set (bare series CSVs, simple index.json, run.json, manifest.json). The C# `RunArtifactWriter` produces a much richer layout that `StateQueryService` expects: `model/` directory, normalized `spec.yaml`, per-class CSV naming, full JSON schemas with class metadata, and provenance files.

      Per D-044, the artifact sink is a separate layer from the engine core. It receives the model input and EvalResult, and persists them durably. This milestone builds the full sink as a Rust library used by both the CLI and the .NET bridge.

      ## Acceptance Criteria

      1. **AC-1: `model/` directory.** The sink writes:
         - `model/model.yaml` — copy of the input model YAML
         - `model/metadata.json` — template metadata extracted from YAML provenance section and/or passed metadata: `{ schemaVersion, templateId, templateTitle, templateVersion, mode, modelHash, source, hasTelemetrySources, telemetrySources, nodeSources, parameters }`
         - `model/provenance.json` — written when provenance metadata is provided (pass-through). Omitted when absent (backward compatible).

      2. **AC-2: `spec.yaml` at run root.** Normalized model YAML with topology semantics rewritten to `file://` URIs pointing to series CSV paths. This is what `StateQueryService` reads to resolve topology node bindings.

      3. **AC-3: Series ID naming convention.** Series files use the format `{nodeId}@{COMPONENT_ID}@{CLASS_ID}.csv`:
         - Default (no class): `{nodeId}@{COMPONENT_ID}@DEFAULT.csv`
         - Per-class: `{nodeId}@{COMPONENT_ID}@{classId}.csv`
         - Edge: `edge_{edgeId}_{metric}@{COMPONENT_ID}@{classId}.csv`
         - Component IDs follow C# conventions: `ARRIVALS`, `SERVED`, `QUEUE`, `ERRORS`, etc.

      4. **AC-4: Full `series/index.json` schema.** Each series entry includes:
         - `id`, `kind` (flow/stock/ratio/time), `path`, `unit`, `componentId`, `class`, `classKind` (fallback/specific), `points`, `hash`
         - `formats` section with aggregates table reference
         - `classes` array with declared class definitions
         - `classCoverage` field (full/partial/missing)

      5. **AC-5: Full `run.json` schema.** Includes:
         - `schemaVersion`, `runId`, `engineVersion`, `source`, `inputHash`
         - `grid` (bins, binSize, binUnit, timezone, align)
         - `scenarioHash`, `modelHash`
         - `classesCoverage`
         - `warnings` array (nodeId, code, message, severity, bins)
         - `series` array (id, path, unit)
         - `classes` array (id, displayName, description)

      6. **AC-6: Full `manifest.json` schema.** Extends existing to include:
         - `rng` section (kind, seed)
         - `provenance` section (hasProvenance, modelId, templateId, inputHash)
         - `classes` array
         - `seriesHashes` (per-series SHA256)
         - `createdUtc` timestamp

      7. **AC-7: `aggregates/` directory.** Created as a placeholder (empty directory). Matches C# behavior.

      8. **AC-8: Deterministic run ID.** When deterministic mode is requested, run ID is derived from `sha256(normalized_spec + seed + bias)` truncated to 16 hex chars. Matches C# `DeterministicRunNaming`.

      9. **AC-9: StateQueryService integration test.** A C# integration test that:
         - Evaluates a class-enabled model through the Rust engine + sink
         - Loads the produced run directory via `StateQueryService.LoadContextAsync`
         - Verifies: topology resolved, per-class series loadable, provenance hash valid, warnings present
         - This is the definitive proof that the Rust sink is compatible.

      10. **AC-10: Parity with C# artifact layout.** For a reference model, produce artifacts from both C# `RunArtifactWriter` and Rust sink. Compare directory structures and file contents. Document any intentional differences.

      ## Out of Scope

      - Replacing `RunArtifactWriter` callers (that's wiring work for when the switch happens)
      - Parquet aggregates (placeholder only — future work)
      - Telemetry bundle building (stays in C# `TelemetryBundleBuilder`)
      - Template orchestration (stays in C# `RunOrchestrationService`)
      - Storage backend abstraction (filesystem only — S3/database is future)

      ## Key References

      - `src/FlowTime.Core/Artifacts/RunArtifactWriter.cs` — C# reference (1,287 lines)
      - `src/FlowTime.API/Services/StateQueryService.cs` — reads artifacts back (5,195 lines)
      - `src/FlowTime.Core/Artifacts/DeterministicRunNaming.cs` — run ID generation
      - `engine/core/src/writer.rs` — current minimal Rust writer
      - D-044 — three-layer architecture (engine core / artifact sink / consumer adapters)
      - D-043 — provenance strategy
  - kind: milestone
    id: M-038
    frontmatter:
      title: Workbench Foundation
      status: done
      parent: E-21
    body: |
      ## Goal

      Establish the compact design system, implement dag-map click/hover events in the library, and build the workbench panel with click-to-pin node inspection — the foundation that every subsequent E-21 milestone builds on.

      ## Context

      The Svelte UI has topology rendering (dag-map with heatmap mode), timeline scrubbing, run orchestration, and what-if parameter manipulation. But there is no way to click a node and inspect it. The layout uses shadcn-svelte's consumer-product defaults (generous padding, large text, wide sidebar) which waste space in a data-dense workbench.

      This milestone delivers three things in sequence:
      1. Compact design tokens that replace the spacious defaults
      2. dag-map library events so nodes/edges are clickable
      3. Workbench panel where clicked nodes show metrics and sparklines

      ### Prior art

      - dag-map already emits `data-node-id` and `data-edge-from`/`data-edge-to` attributes on SVG elements (`lib/dag-map/src/render.js`)
      - Topology page (`ui/src/routes/time-travel/topology/+page.svelte`) has timeline scrubbing and state API integration
      - What-if page (`ui/src/routes/what-if/+page.svelte`) has real-time metric display via WebSocket
      - `DagMapView.svelte` wraps dag-map with theme switching and metric mapping

      ## Acceptance Criteria

      ### Density system (AC1-AC5)

      1. **Main content area padding reduced.** The root layout no longer applies blanket `p-6`. Page-level padding is context-dependent: topology/workbench pages use minimal padding (`p-1` or `p-2`), form/config pages may use moderate padding.

      2. **Sidebar narrowed.** Expanded sidebar width ≤ 208px (from 280px). Collapsed width ≤ 40px. All nav items still readable and clickable.

      3. **Compact design tokens defined in `app.css`.** Two token layers:
         - **Chrome tokens:** `--ft-bg`, `--ft-bg-elevated`, `--ft-border`, `--ft-text`, `--ft-text-muted`, `--ft-text-emphasis`. Calm values. Dark mode: near-black backgrounds (`hsl(220 10% 4%)`-range), subtle borders, muted gray text. Light mode: warm light backgrounds, subtle borders, dark text.
         - **Data-viz tokens:** `--ft-viz-teal`, `--ft-viz-pink`, `--ft-viz-coral`, `--ft-viz-blue`, `--ft-viz-green`, `--ft-viz-amber` plus sequential/diverging scale entry points. Vivid against both dark and light backgrounds.
         - **Spacing tokens:** `--ft-space-xs` (2px), `--ft-space-sm` (4px), `--ft-space-md` (6px), `--ft-space-lg` (8px), `--ft-space-xl` (12px). Tighter than the current 4/8/12/16/24px scale.
         - **Border radius:** `--ft-radius` at `0.25rem` or less (from `0.5rem`).
         - **Type:** working text size is `text-xs` (12px). Emphasis is `text-sm` (14px). Headers use `text-sm font-semibold` or `text-base`.

      4. **shadcn component overrides applied.** Cards, buttons, inputs, and sidebar components use the compact tokens. No component uses raw `p-4`, `p-6`, `gap-4` etc. — spacing comes from the token scale.

      5. **Existing pages still function.** What-if page, run orchestration, topology page, health page all render correctly with the new density. Visual audit confirms no layout breakage. Vitest and Playwright suites still pass.

      ### dag-map library events (AC6-AC8)

      6. **`bindEvents()` exported from dag-map.** Given an SVG container element, `bindEvents(container, callbacks)` uses event delegation to fire:
         - `onNodeClick(nodeId, event)` — click on any `[data-node-id]` element
         - `onNodeHover(nodeId | null, event)` — mouseenter/mouseleave on node elements
         - `onEdgeClick(fromId, toId, event)` — click on any `[data-edge-from]` element
         - `onEdgeHover(fromId, toId | null, event)` — mouseenter/mouseleave on edge elements
         - Returns a cleanup function that removes all listeners.
         - Edge hit areas: edge paths are thin lines. `bindEvents` should set `pointer-events: stroke` and use a wider invisible stroke or a transparent hit-area overlay (≥ 8px clickable width) so edges are practically clickable.

      7. **`selected` render option in dag-map.** `renderSVG(dag, layout, { ..., selected: Set<string> })` draws a selection indicator (ring, outline, or highlight) on nodes whose ID is in the set. The selection visual must compose correctly with heatmap mode (heatmap fills + selection ring, not one replacing the other).

      8. **dag-map tests cover events and selection.** Unit tests (dag-map's existing test infrastructure) verify: `bindEvents` fires correct callbacks for node/edge clicks and hovers; `selected` set renders the selection indicator; selection composes with heatmap mode. dag-map version bumped and published (or linked via workspace protocol).

      ### Workbench panel (AC9-AC14)

      9. **Topology page restructured as split layout.** The topology page shows the DAG in the upper area and the workbench panel in the lower area, separated by a resizable split (drag to resize, reasonable default like 60/40 or 65/35). When no nodes are pinned, the workbench shows a minimal empty state hint ("Click a node to inspect").

      10. **Click-to-pin interaction.** Clicking a node in the topology DAG pins it to the workbench. The node appears with a selection indicator in the DAG (via `selected` set) and a card in the workbench. Clicking a pinned node again unpins it (removes card, removes selection indicator). Multiple nodes can be pinned simultaneously.

      11. **Node card content.** Each workbench card shows:
          - Node ID and kind (service, queue, dlq, source, router, etc.)
          - Key metrics at the current timeline bin: utilization, queue depth, arrivals, served, errors, capacity — as available from the state API response
          - Sparkline showing the selected metric over the full time window (all bins)
          - Values formatted with appropriate precision (see `format.ts` utilities)
          - Compact layout using the density tokens — the card should fit meaningful content in ~180-220px width

      12. **Timeline integration.** When the timeline scrubs (bin changes), all workbench card metric values update to the new bin. Sparklines show a position indicator (vertical line or dot) at the current bin.

      13. **Cards dismissible.** Each card has a small close/unpin control. Dismissing a card removes the node from the `selected` set and the workbench.

      14. **Auto-pin highest-utilization node on first load.** When a run loads and state data is available, the node with the highest utilization at bin 0 is auto-pinned to the workbench so it is never empty on first view. If utilization data is unavailable, skip auto-pin (empty state is acceptable).

      ### Cross-cutting (AC15-AC16)

      15. **Playwright test coverage.** At least one Playwright spec covering: (a) topology loads and renders, (b) clicking a node opens a workbench card, (c) clicking the close control removes the card, (d) scrubbing the timeline updates card values. Specs skip gracefully if the API or dev server is unavailable.

      16. **Vitest coverage for new pure logic.** Any new helper functions (metric extraction, card data shaping, sparkline data preparation) have vitest tests with branch coverage.

      ## Technical Notes

      ### Density system approach

      - Introduce the `--ft-*` custom properties alongside the existing shadcn `--background`, `--foreground` etc. variables. The shadcn variables can initially alias the `--ft-*` tokens, keeping component library compatibility while allowing the token layer to diverge.
      - The dark mode near-black should feel like the `.scratch/colors.png` reference: `hsl(220 10% 4%)` background, `hsl(220 8% 8%)` elevated, `hsl(220 6% 14%)` border. Text at `hsl(220 10% 65%)` for muted, `hsl(220 5% 85%)` for default.
      - Light mode: `hsl(220 10% 97%)` background, `hsl(0 0% 100%)` elevated, `hsl(220 10% 88%)` border. Text at `hsl(220 10% 40%)` for muted, `hsl(220 10% 15%)` for default.
      - Data-viz colors from `reference-palette.png` (epic folder) hue families: teal `#94E2D5`/`#2B8A8E`, pink `#F38BA8`/`#C45B4A`, coral `#EB6F92`, blue `#89B4FA`/`#3D5BA9`, green `#A6E3A1`/`#4A8C5C`, amber `#F9E2AF`/`#D4944C`. The dark-mode values are lighter/more vivid; light-mode values are darker/more saturated to maintain contrast.

      ### dag-map events

      - dag-map already emits `data-node-id` on station `<g>` groups and `data-edge-from`/`data-edge-to` on edge `<path>` elements. `bindEvents()` delegates from the SVG container using these attributes.
      - For edge hit areas: add an invisible wider stroke path (same shape, stroke-width 8-12px, `opacity: 0`, `pointer-events: stroke`) behind each visible edge path. This is a render-time addition in `render.js`, not a separate overlay.
      - The `selected` visual should be a ring or glow around the node circle/rect, using a dedicated CSS class (`dag-map-selected`) so consumers can override the style. Default: 2px outline in the theme's `ink` color, offset by 2px.

      ### Workbench panel

      - Implement the split as a CSS grid with `grid-template-rows` and a draggable splitter. No library dependency — a simple `mousedown` → `mousemove` → `mouseup` handler on a narrow divider element. Store the split ratio in `localStorage`.
      - Node cards are a new Svelte component (`WorkbenchCard.svelte`). They consume the state API response that the topology page already fetches.
      - Sparkline: reuse the existing `Sparkline.svelte` component. It already exists in `ui/src/lib/components/`.
      - The workbench state (pinned node IDs) lives in a Svelte store so it persists across route navigations within the same session. Not persisted to `localStorage` (ephemeral per session).

      ### What-if page audit

      - The what-if page (`/what-if`) uses its own layout with dag-map and parameter panels. It does NOT use the workbench. The density pass adjusts its spacing tokens but does not add workbench functionality to it. The what-if page is a standalone surface that predates the workbench paradigm.

      ## Out of Scope

      - Edge cards (M-039)
      - Metric selector chip bar (M-039)
      - Class filter (M-039)
      - Analysis tab surfaces (M-040/04)
      - Heatmap view (M-042)
      - Validation/warning surfaces (M-043)
      - Final visual polish and dark mode QA (M-044)
      - Color palette iteration beyond the initial token values (user will bring examples for future iteration)
      - dag-map layout engine changes (separate concern)
      - Expert authoring surface

      ## Dependencies

      - dag-map library (`lib/dag-map/`) — we own it; changes ship in this milestone
      - E-18 Time Machine APIs available on port 8081 (already merged to main)
      - E-17 what-if infrastructure (`/what-if` route, engine session API) — must not regress
      - E-11 M6 run orchestration (`/run` route) — must not regress
  - kind: milestone
    id: M-039
    frontmatter:
      title: Metric Selector & Edge Cards
      status: done
      parent: E-21
    body: |
      ## Goal

      Complete the workbench as a general inspection tool by adding a metric selector chip bar (choose which metric colors the topology), edge click-to-pin with edge cards, and a class filter dropdown.

      ## Context

      M-038 delivered the workbench foundation: density system, dag-map click/hover events, and node cards with utilization-based heatmap coloring. But the topology only colors by utilization (hardcoded), there's no way to inspect edges, and class filtering doesn't exist.

      This milestone adds the remaining "what am I looking at?" controls that the Blazor feature bar provided (15+ toggles) — but in the simplified workbench paradigm: one metric selector, one class filter, and edge inspection via pinning.

      ## Acceptance Criteria

      ### Metric selector (AC1-AC3)

      1. **Chip bar renders below the toolbar.** A horizontal row of metric chips: Utilization, Queue Depth, Arrivals, Served, Errors, Flow Latency. One active at a time (radio behavior). Default: Utilization.

      2. **Selecting a metric changes the topology heatmap coloring.** Each chip maps to a specific field in the state API response (`derived.utilization`, `metrics.queueDepth`, `metrics.arrivals`, `metrics.served`, `metrics.errors`, `derived.flowLatencyMs`). Selecting a chip re-extracts metrics from the current state data and passes them to DagMapView. Node metric labels update accordingly (e.g., "85%" for utilization, "14.5" for queue depth).

      3. **Workbench card sparklines reflect the selected metric.** When the selected metric changes, the sparkline in each pinned workbench card updates to show that metric's values over the full time window (requires fetching state window data or caching per-bin values).

      ### Edge cards (AC4-AC6)

      4. **Clicking an edge in the topology pins it to the workbench.** Uses the `bindEvents` `onEdgeClick` callback. Pinned edges appear as cards in the workbench alongside node cards. Clicking a pinned edge again unpins it.

      5. **Edge card content.** Each edge workbench card shows:
         - Source and target node IDs
         - Flow volume at current bin (from state API edge data if available, or from node-level served/arrivals)
         - Sparkline of flow volume over time (if data available)
         - Compact layout matching node cards

      6. **Edge selection indicator in DAG.** Pinned edges get a visual highlight in the topology (e.g., brighter color, thicker stroke, or glow). This uses a CSS class approach since dag-map doesn't have an `selectedEdges` option — the Svelte wrapper applies the class after render.

      ### Class filter (AC7-AC8)

      7. **Class filter dropdown appears when classes exist.** If the current run has per-class data (any node's state includes `byClass` entries), a dropdown/chip filter appears in the toolbar area. Lists all class IDs found in the data. Multi-select: toggle individual classes on/off.

      8. **Class filter controls topology visibility.** When classes are filtered, the topology heatmap shows metrics for only the selected classes (using `byClass[classId]` data instead of aggregate). If no class filter is active, show aggregate (default behavior).

      ### Cross-cutting (AC9-AC10)

      9. **Vitest coverage for new helpers.** Metric extraction by selected metric, edge data extraction, class discovery from state data — all have vitest tests.

      10. **Existing Playwright specs still pass.** The M-038 workbench specs and E-17 what-if specs continue to work.

      ## Technical Notes

      - The metric selector state lives in the workbench store (or a co-located topology store) — persists across bin scrubs but resets on run change.
      - For sparkline data across all bins: the simplest approach is to cache metric values per node as each bin loads. When the user scrubs, accumulate values. Full-window sparklines need either a state_window API call or progressive accumulation. Start with progressive (show what's been visited), upgrade to full-window fetch if it feels incomplete.
      - Edge data in the FlowTime state API: check if `/v1/runs/{id}/state?bin=N` returns edge-level metrics. If not, edge cards show source→target label only with node-level served/arrivals as proxy metrics.
      - Class discovery: scan `stateNodes[].byClass` keys across all nodes to build the class list.

      ## Out of Scope

      - Analysis tab surfaces (M-040/04)
      - Heatmap view (M-042)
      - Validation surface (M-043)
      - New dag-map layout changes
      - Edge metric labels on the DAG itself (edges show color only, detail in workbench)

      ## Dependencies

      - M-038 (complete) — workbench foundation, dag-map events, density system
      - FlowTime API state endpoint — already available on port 8081

      ## Coverage Notes

      Branches that are defensive or reachable only under rare runtime conditions; explicitly noted here per the branch-coverage rule.

      ### Pure logic (unit-tested)

      - `metric-defs.ts` — every reachable branch of `extractMetricValue`, `extractMetricValueFiltered`, `buildMetricMapForDef`, `buildMetricMapForDefFiltered`, `buildSparklineSeries`, `extractSeriesValues`, `discoverClasses`, `computeTicks`, `computePointerPct` has at least one explicit vitest test. Includes non-object intermediates (string, number), path-prefix stripping variants, class-filter empty/present/mixed-finite, array-length caps, non-array values, null/NaN/Infinity rejection, and empty-result short-circuits.
      - `workbench-metrics.ts` — `extractNodeMetrics`, `extractEdgeMetrics`, `findHighestUtilizationNode` — every null/undefined/non-finite/negative-errors/zero-failures branch covered.
      - `sparkline-path.ts` — NaN/Infinity gap handling covered for start/mid/end positions; all-NaN and empty cases short-circuit tested.
      - `workbench.svelte.ts` — full state machine tested in `workbench.svelte.test.ts` (pin/unpin/toggle idempotency, edge direction, metric reset on clear).

      ### Component rendering (Playwright-covered)

      - `metric-selector.svelte` — active vs inactive chip styling: covered by the "metric selector changes topology coloring" Playwright test.
      - `workbench-card.svelte` + `workbench-edge-card.svelte` — header/metrics/sparkline conditionals: covered by the click-to-pin Playwright tests.
      - `timeline-scrubber.svelte` — pointer rendering, controls rendering, drag state: covered by the topology-loads Playwright test (controls present in topology mode) plus the what-if page integration (pointer-hidden + no-controls mode, exercised by the existing what-if Playwright spec).

      ### Defensive / prop-default branches (documented, not explicitly tested)

      - `workbench-card.svelte` and `workbench-edge-card.svelte`: the `onClose === undefined` path (renders no close button). In production the topology page always supplies `onClose`; the optional prop exists so the component can be embedded in a read-only context later. Deleting the prop would require a contract change; keeping it is minimal-cost defense.
      - `workbench-card.svelte`: the `currentBin === undefined` path (no vertical indicator on sparkline). Auto-pin always supplies `currentBin`; the branch exists because the prop is optional.
      - `timeline-scrubber.svelte`: `binCount <= 1` disables the track. Every caller today only renders the component when `binCount > 0` and typically `> 1`; the tick helper still handles `binCount <= 1` correctly (tested in `computeTicks`).

      These branches are intentionally defensive — removing them would force callers to guard, which is worse. They are noted here rather than tested via component-driver scaffolding since the logic they guard is trivial (render vs. don't render) and the prop interface is stable.
  - kind: milestone
    id: M-040
    frontmatter:
      title: Sweep & Sensitivity Surfaces
      status: done
      parent: E-21
    body: |
      ## Goal

      Deliver the first two Time Machine analysis surfaces in Svelte: parameter sweep and sensitivity analysis. These are new capabilities that Blazor never had — the headline proof that the fork delivers value.

      ## Context

      E-18 shipped `POST /v1/sweep` and `POST /v1/sensitivity` against the Rust session engine. Until now there is no UI for either. This milestone introduces a new `/analysis` route with tabbed surfaces that let an expert:

      1. Pick a run → parse its model for sweepable parameters (const nodes)
      2. Run a sweep over a chosen parameter with a range of values → see result series per point
      3. Run sensitivity analysis across multiple parameters against a target metric → see ranked gradients

      The workbench paradigm established in M-038/02 sets the conventions: compact density, calm chrome with vivid data-viz colors, semantic tokens, `--ft-viz-*` palette, the shared `TimelineScrubber` and `Chart` components.

      ### API contracts (confirmed via code)

      **POST /v1/sweep**
      ```json
      Request:  { "yaml": "...", "paramId": "arrivals", "values": [10, 15, 20], "captureSeriesIds": ["served"] }
      Response: { "paramId": "arrivals", "points": [ { "paramValue": 10, "series": { "served": [8, 8, 8, 8] } }, ... ] }
      ```

      **POST /v1/sensitivity**
      ```json
      Request:  { "yaml": "...", "paramIds": ["arrivals", "capacity"], "metricSeriesId": "queue.queueTimeMs", "perturbation": 0.05 }
      Response: { "metricSeriesId": "queue.queueTimeMs", "points": [ { "paramId": "capacity", "baseValue": 50, "gradient": -2.35 }, ... ] }
      ```

      **Parameter discovery**: clients parse the model YAML and collect nodes with `kind: const`. Their `id` is the parameter name; `values[0]` is a reasonable baseline.

      ## Acceptance Criteria

      ### Analysis route shell (AC1-AC3)

      1. **New `/analysis` route.** SvelteKit page at `ui/src/routes/analysis/+page.svelte`. Accessible from the sidebar under Tools. Compact layout consistent with the workbench paradigm.

      2. **Run picker.** Dropdown at the top of `/analysis` to select a run. Defaults to the most recent run (same pattern as `/time-travel/topology`). Loading the model YAML for the selected run populates a param list.

      3. **Tab bar.** Four tabs: Sweep, Sensitivity, Goal Seek, Optimize. Only Sweep and Sensitivity are wired in this milestone; Goal Seek and Optimize render placeholder "coming in M-041" content. Tab state preserved in `localStorage` or URL query.

      ### Sweep surface (AC4-AC7)

      4. **Parameter selector.** Dropdown listing the run's const-node parameters discovered from the model YAML. Each option shows the parameter id and its baseline value. Empty state when no const nodes exist.

      5. **Value range inputs.** Three inputs (from, to, step) compute the sweep values. A text input for "or custom (comma-separated)" supersedes from/to/step when non-empty. A live preview shows the final value list and count; disallow runs > 50 points with an inline warning (soft cap, still runnable).

      6. **Run sweep and render results.** A "Run sweep" button calls `POST /v1/sweep`. While running, show a spinner. On result, render:
         - A line chart: x = param value, y = selected output series aggregate (mean per point) — picked via a series selector populated from response keys.
         - A per-point table: param value column + one column per captured series showing aggregate (mean) with a compact sparkline of that series across bins.
         - Reasonable handling for errors (API 400/503) with inline error messages.

      7. **Captured series filter.** Optional multi-select chip bar listing common series (`arrivals`, `served`, `errors`, `queue`, `utilization`, `flowLatencyMs`). Empty selection = capture all. Sends `captureSeriesIds` in the request.

      ### Sensitivity surface (AC8-AC10)

      8. **Param multi-select.** Chip-bar of all discovered const params. Clicking toggles selection. Defaults to all selected.

      9. **Target metric picker + perturbation.** A text input for the target series id (common ones offered as chips: `served`, `queue`, `flowLatencyMs`, `utilization`). A slider for perturbation (default 0.05, range 0.01–0.30).

      10. **Run sensitivity and render results.** A "Run sensitivity" button calls `POST /v1/sensitivity`. On result, render a horizontal bar chart sorted by |gradient| descending, colored by sign (positive/negative), with numeric gradient labels and the base value shown per row. Empty/error states handled.

      ### Cross-cutting (AC11-AC12)

      11. **Vitest coverage for pure logic.** New helpers (param discovery from YAML, sweep value range generator, aggregate/mean computation) have vitest tests with explicit branch coverage including error paths.

      12. **Playwright coverage.** New spec `svelte-analysis.spec.ts`: page loads, sweep can be configured and run against a real run, sensitivity can be configured and run. Graceful skip when infra is down.

      ## Technical Notes

      - **YAML parsing in browser**: `js-yaml` is already a transitive dep via other libs, but we should explicitly add it. Alternative: the API could provide a `/v1/runs/{id}/params` endpoint that returns const-node ids + baselines. For this milestone, browser-parse with `js-yaml`; if it proves fragile, promote to a server endpoint in a later milestone.
      - **Chart reuse**: existing `Chart.svelte` handles multi-series line data. Sweep result chart passes `{name: paramValue, values: [aggregate]}` per captured series — a new shape. Consider a dedicated `ParamSweepChart` wrapper that transposes sweep results into Chart's format.
      - **Bar chart**: no current component. Build a simple horizontal-bar SVG in `SensitivityBarChart.svelte` — pure SVG with the viz palette (coral for negative, teal for positive gradients).
      - **Analysis state**: small store `analysis.svelte.ts` to hold current run YAML, last sweep/sensitivity results, selected tab. Session-ephemeral.
      - **Loading state**: use existing `Loader2` icon from lucide; debounce run-button clicks.

      ## Out of Scope

      - Goal Seek + Optimize surfaces (M-041)
      - Server-side parameter discovery endpoint
      - Saving/re-running past analyses (history panel)
      - Exporting sweep/sensitivity results
      - Constraints on optimization (already out of scope globally per gaps.md)

      ## Dependencies

      - M-038/02 (complete) — workbench paradigm, chart component, density tokens
      - `POST /v1/sweep`, `POST /v1/sensitivity` — available on port 8081

      ## Coverage Notes

      (Filled at wrap time.)
  - kind: milestone
    id: M-041
    frontmatter:
      title: Goal Seek Surface
      status: done
      parent: E-21
    body: |
      **Started:** 2026-04-21
      **Completed:** 2026-04-22

      ## Goal

      Wire the `/analysis` Goal Seek tab to live Time Machine so single-parameter target-seeking is usable from the Svelte workbench, and extend `/v1/goal-seek` (plus its sibling `/v1/optimize`) with the per-iteration `trace` they already compute internally but currently discard. Ship the shared convergence chart + analysis result card components here so the subsequent Optimize milestone (M-042) consumes them directly.

      ## Context

      M-040 shipped the `/analysis` route shell with a four-tab bar (Sweep, Sensitivity, Goal Seek, Optimize). Goal Seek and Optimize currently render `coming in m-E21-04` placeholders. This milestone activates the Goal Seek tab and lands the two shared visualization components; the Optimize tab stays placeholder (pointing at M-042) until the follow-up milestone.

      The backend `trace` extension covers **both** `/v1/goal-seek` and `/v1/optimize` in one change because they ship under one decision (D-047). That work landed early in this milestone (commit `29ac3e9`); the optimize trace is ready for M-042 to consume without further backend work.

      Shared infrastructure already in place from M-040:

      - `ui/src/routes/analysis/+page.svelte` — run/sample picker, scenario card, tab bar, active-tab persistence
      - `ui/src/lib/utils/analysis-helpers.ts` — `discoverConstParams`, `ConstParam` type, numeric helpers
      - `ui/src/lib/api/flowtime.ts` — `flowtime.sweep(...)`, `flowtime.sensitivity(...)` methods
      - `GET /v1/runs/{runId}/model` — read-only model fetch (D-046)
      - Density tokens, `--ft-viz-*` palette, `Loader2` spinner pattern, inline-error pattern
      - `sensitivity-bar-geometry.ts` — template for pure-SVG geometry helpers with vitest coverage

      ### Scope split note

      This milestone was originally drafted as `m-E21-04-goal-seek-optimize` covering both Goal Seek and Optimize tabs. It was split on 2026-04-21 after Phase 1 backend landed: Goal Seek remains here; Optimize moved to a new **M-042 Optimize Surface**; heatmap / validation / polish renumbered to 06 / 07 / 08. Rationale: 16 ACs across backend + shared components + two surfaces was too large, and "Phase 1 / Phase 2" sub-phasing in the tracking doc was the smell. The backend trace change on `/v1/optimize` that landed here is kept; M-042 consumes it.

      ### API contracts — current and extended

      The existing endpoints already compute per-iteration state but discard it before returning. This milestone extends both response shapes with an additive `trace` field (see Decision Record below). Requests are unchanged. `POST /v1/sweep` and `POST /v1/sensitivity` are untouched.

      **POST /v1/goal-seek** — `src/FlowTime.API/Endpoints/GoalSeekEndpoints.cs`

      Request (unchanged):
      ```json
      {
        "yaml": "...",
        "paramId": "capacity",
        "metricSeriesId": "derived.utilization",
        "target": 0.8,
        "searchLo": 10,
        "searchHi": 100,
        "tolerance": 1e-6,
        "maxIterations": 50
      }
      ```

      Response (extended):
      ```json
      {
        "paramValue": 42.187,
        "achievedMetricMean": 0.7999,
        "converged": true,
        "iterations": 12,
        "trace": [
          { "iteration": 0, "paramValue": 10,  "metricMean": 0.42, "searchLo": 10,    "searchHi": 100   },
          { "iteration": 0, "paramValue": 100, "metricMean": 0.95, "searchLo": 10,    "searchHi": 100   },
          { "iteration": 1, "paramValue": 55,  "metricMean": 0.88, "searchLo": 10,    "searchHi": 55    },
          { "iteration": 2, "paramValue": 32.5,"metricMean": 0.72, "searchLo": 32.5,  "searchHi": 55    }
          /* ... */
        ]
      }
      ```

      Trace semantics:
      - Two `iteration: 0` entries for the initial boundary evaluations (`searchLo`, `searchHi`), in that order.
      - One entry per bisection step with `iteration: 1..N`, where the recorded `paramValue` is the midpoint evaluated at that step and `searchLo` / `searchHi` are the **post-step** bracket (after narrowing).
      - `metricMean` is the unsigned mean at that `paramValue` — same value that drives the bisection decision.
      - When the target is already hit at a boundary (converged in 0 iterations), the trace contains only the two boundary entries. When the target is not bracketed, the trace contains only the two boundary entries and the response reports `converged: false`, `iterations: 0`.

      400 / 503 behaviour unchanged.

      **POST /v1/optimize** — `src/FlowTime.API/Endpoints/OptimizeEndpoints.cs`

      The `trace` extension on `/v1/optimize` is owned by this milestone's backend AC (AC2) since it shares D-047 with goal-seek. The surface that consumes it — the Optimize tab — lives in M-042. **Full request/response shape is owned by M-042's spec** (`m-E21-05-optimize.md` → API contract section); do not duplicate it here. AC2's tests lock these trace invariants:

      - One entry per iteration (one post-sort entry before the main loop as `iteration: 0`, plus one per main-loop iteration after its post-iteration sort).
      - `paramValues` is the current best vertex (`simplex[0]`), `metricMean` is its **unsigned** mean — the internal minimize-sign flip is reversed at record time for maximize runs.
      - Trace length equals `iterations + 1` on every return path (pre-loop converged, main-loop converged, max-iterations exhausted).
      - 0-iteration convergence yields a single `iteration: 0` entry. The per-evaluation probe log (reflection / expansion / contraction / shrink intermediate vertices) is intentionally not exposed.

      ### Decision Record

      **D-047 — Additive `trace` field on `/v1/goal-seek` and `/v1/optimize`** — appended to `work/decisions.md` at start-milestone time (commit `5988f5c`). Scope covers both endpoints; implementation landed in commit `29ac3e9` of this milestone. No rewording needed for the split.

      ## Acceptance Criteria

      ### Backend — trace extension (AC1-AC3)

      1. **Goal-seek trace plumbed end-to-end.** `GoalSeeker.SeekAsync` records the two boundary evaluations and each bisection midpoint with the post-step bracket. `GoalSeekResult` gains a `Trace` property (`IReadOnlyList<GoalSeekTracePoint>`). `GoalSeekEndpoints` passes the trace through to the response. All five return paths (`Converged` at `searchLo`, `Converged` at `searchHi`, not-bracketed, tolerance hit mid-loop, max-iterations exhausted) return a trace whose shape matches the semantics above. Existing `GoalSeekEndpointsTests.cs` gains coverage for trace shape + ordering + post-step bracket invariants on each return path.

      2. **Optimize trace plumbed end-to-end.** `Optimizer.OptimizeAsync` records the post-sort best vertex once before the main loop (as `iteration: 0`) and once per iteration thereafter. `OptimizeResult` gains a `Trace` property (`IReadOnlyList<OptimizeTracePoint>`). `OptimizeEndpoints` passes the trace through. Maximize runs report unsigned `metricMean` on trace entries (sign reversed internally). Existing `OptimizeEndpointsTests.cs` gains coverage for trace shape + ordering + unsigned-metric invariant on both objectives + trace-length / iterations consistency. _The consuming Optimize surface is delivered in M-042._

      3. **`D-2026-04-21-034` appended to `work/decisions.md` at start-milestone time.** Body matches the draft in Context. E-21 epic spec Scope / Constraints updated in the same commit to reference the new decision alongside D-046 (read-only run-adjacent) and to list the additive compute-response change as the other explicit carve-out.

      ### UI — Tab activation + shared components (AC4-AC5)

      4. **Goal Seek placeholder replaced.** The `goal-seek` tab panel in `ui/src/routes/analysis/+page.svelte` renders live content (not the `coming in m-E21-04` stub). The `optimize` tab panel keeps its placeholder copy updated to reference **M-042**. `TAB_INFO` copy for Goal Seek stands as-is — "convergence info" now accurately describes what the UI renders.

      5. **Shared result card + shared convergence chart extracted up front.** `ui/src/lib/components/analysis-result-card.svelte` and `ui/src/lib/components/convergence-chart.svelte` land as reusable components in this milestone so M-042's Optimize surface can consume them without further extraction work. Required behaviours (exact prop/slot names are an implementation decision):
         - **Result card** — accepts a distinct header region, a primary-value region (large monospace), and a meta region for compact key-value pairs (iterations / converged badge / tolerance / direction / target / residual as applicable per surface).
         - **Convergence chart** — consumes a **normalized** input shape `Array<{ iteration: number; metricMean: number }>`; each caller adapts its response into that shape before passing it in. The chart does not branch on surface type. Goal Seek's bracket and (future) Optimize's `paramValues` are rendered elsewhere (interval bar, per-param table) and do not enter the chart. Required behaviours: optional horizontal reference line when a target is supplied (dashed); caller-supplied y-axis label; line colour reflects converged state (teal when converged, amber when not); the converged/final point is visually emphasized (e.g. a larger marker) relative to intermediate points.
         - Geometry lives in pure `.ts` siblings with vitest coverage, mirroring `sensitivity-bar-geometry`.

      ### UI — Goal Seek surface (AC6-AC9)

      6. **Parameter selector.** Single-select dropdown listing the current model's const-node parameters (reuses `discoverConstParams`). Each option shows `{id} (base {baseline})` — same format as the Sweep tab. Empty state when no const params exist (same copy as Sweep).

      7. **Search interval + target + advanced inputs.** Two numeric inputs `searchLo` and `searchHi` with inline validation (both required, `searchLo < searchHi`, defaults `0.5 × baseline` / `2 × baseline` of the selected parameter). Free-text input for `metricSeriesId` with the same chip shortcuts as Sensitivity (`served`, `queue`, `flowLatencyMs`, `utilization`). Numeric input for `target`. A collapsed "Advanced" disclosure exposes `tolerance` (default 1e-6) and `maxIterations` (default 50). All required fields must be valid before the Run button enables.

      8. **Run goal-seek and render results.** "Run goal seek" button calls `flowtime.goalSeek(...)` (new API method, response type includes `trace`). While running, show a spinner (`Loader2Icon`) and disable the button. On success, render:
         - The shared result card (AC5) with the final `paramValue`, `achievedMetricMean`, `target`, `|achieved − target|` residual, converged badge, and iteration count.
         - The shared convergence chart (AC5) plotting `metricMean` vs `iteration` as a line, with a horizontal reference line at `target`. Boundary evaluations (`iteration: 0`) are plotted as two initial points on the x-axis at position 0. The converged/final point is visually emphasized per AC5.
         - A **search-interval bar** (SVG) showing the original `[searchLo, searchHi]` range with a marker at the final `paramValue`, using `intervalMarkerGeometry` from `interval-bar-geometry.ts`. This is the Goal Seek consumer that justifies landing that geometry file in this milestone; Optimize reuses it for per-param mini bars in M-042.
         - 400 and 503 errors surfaced as inline messages using the existing analysis-page error pattern.

      9. **Not-bracketed and not-converged states.** When the API returns `converged: false` with `iterations: 0` (target not bracketed), the result card shows an amber warning explaining that the target was not reachable within the search interval and suggests widening the bounds. The convergence chart still renders the two boundary evaluations. When `converged: false` with `iterations == maxIterations`, the card shows an amber "did not converge" badge and the chart is drawn over the full trace.

      ### Cross-cutting (AC10-AC12)

      10. **Session form state — goal-seek.** The Goal Seek form retains its last input values across tab switches within the same page session (in-memory is sufficient). Form values reset when the scenario (run / sample model) changes. Mirrors the Sweep tab behaviour. _Optimize session state lives in M-042._

      11. **Vitest coverage for pure logic.** New helpers added to `ui/src/lib/utils/analysis-helpers.ts` (or a sibling `goal-seek-helpers.ts` if the file grows unwieldy) have vitest tests with branch coverage:
          - `defaultSearchBounds(baseline)` — `0.5 × baseline` / `2 × baseline`; guards for `baseline === 0`, negative baselines, non-finite inputs.
          - `validateSearchInterval({lo, hi})` — structured error for missing / non-finite / `lo >= hi`.
          - `intervalMarkerGeometry({ lo, hi, value, width })` — clamping when `value ∉ [lo, hi]`, degenerate `hi === lo`, non-finite inputs. _(Shared with Optimize's per-param range bars in M-042.)_
          - `convergence-chart-geometry.ts` — operates on the **normalized** `Array<{ iteration, metricMean }>` shape defined in AC5. `convergencePath({ trace, width, height, padding, yDomain })` with tests for empty trace, single-point trace, trace with multiple entries at the same `iteration` (goal-seek boundary case: two points at `iteration: 0`), monotonic vs non-monotonic traces, flat metric (all equal), non-finite values, y-domain override vs auto-fit, target-line y-coordinate computation.
          - `analysis-result-card-geometry.ts` (if needed) — whatever pure logic the card uses (badge-colour selection given `converged`, residual formatting). Skip the file if the card is pure markup with no computation worth testing.
          - No mocks; no DOM.
          - `validateOptimizeForm` is out of scope here; it lives in M-042.

      12. **Playwright coverage.** Extend `tests/ui/specs/svelte-analysis.spec.ts` (preferred) or add `svelte-analysis-goal-seek.spec.ts`:
          - Goal Seek happy path: page loads, param selector populates, interval defaults render, Run button disabled until form is complete, run against a real engine returns a result card with `paramValue`, `converged` badge, iterations, **and a rendered convergence chart with at least one plotted point beyond iteration 0**.
          - Goal Seek not-bracketed deterministic repro — uses the tuple recorded in the tracking doc's Notes section (first bundled sample in `SAMPLE_MODELS`, its first discovered const param, `target: 1e12` unreachable). Assert the warning message + the chart rendering only the two boundary points.
          - Graceful skip when Engine API (8081) or Svelte dev server (5173) is down, matching the existing probe-and-skip pattern in `svelte-analysis.spec.ts`.
          - _Optimize Playwright coverage is owned by M-042._

      ### Branch-coverage audit (AC13)

      13. **Line-by-line branch audit** performed in two passes, each captured in the tracking doc's Coverage Notes before its respective commit-approval prompt:
          - **AC13a — Backend pass (already complete, commit `29ac3e9`).** Five goal-seek return paths; pre-loop and main-loop exits in Nelder-Mead; shrink-vs-no-shrink branches. The optimize branches are audited here even though the consumer is M-042, because the implementation lives on this milestone's commits.
          - **AC13b — UI pass (pending).** New frontend components, geometry helpers, form validators, and render-condition branches in the Goal Seek tab.
          Both passes enumerate every reachable branch and match each to a named test (xUnit / vitest / Playwright). Unreachable / defensive-default branches are documented with rationale, following M-040's pattern.

      ## Technical Notes

      ### Backend

      - **`GoalSeekTracePoint` record** in `FlowTime.TimeMachine.Sweep` — `(int Iteration, double ParamValue, double MetricMean, double SearchLo, double SearchHi)`. Serializes to camelCase JSON automatically via existing endpoint serialization settings.
      - **`OptimizeTracePoint` record** in `FlowTime.TimeMachine.Sweep` — `(int Iteration, IReadOnlyDictionary<string, double> ParamValues, double MetricMean)`.
      - **Trace buffer inside the runners** — accumulate in a `List<...>` and hand the result to `MakeResult` / `Converged` / `NotConverged` helpers. Avoid allocating per-iteration closures.
      - **Max trace size** — bounded by `maxIterations + 2` for goal-seek and `maxIterations + 1` for optimize. No separate cap needed.
      - **Serialization** — endpoint response records already use System.Text.Json camelCase; adding `Trace` on both response records picks up the same convention. Verify with a round-trip test.
      - **.NET CLI (M-011) impact** — the `goal-seek` and `optimize` CLI subcommands pipe JSON through; the new `trace` field appears automatically. No CLI code change required; add a CLI test confirming trace is present in the JSON output.

      ### Frontend

      - **API client addition** (`ui/src/lib/api/flowtime.ts`):

        ```ts
        async goalSeek(body: {
          yaml: string;
          paramId: string;
          metricSeriesId: string;
          target: number;
          searchLo: number;
          searchHi: number;
          tolerance?: number;
          maxIterations?: number;
        }) {
          return post<{
            paramValue: number;
            achievedMetricMean: number;
            converged: boolean;
            iterations: number;
            trace: {
              iteration: number;
              paramValue: number;
              metricMean: number;
              searchLo: number;
              searchHi: number;
            }[];
          }>(`${API}/goal-seek`, body);
        }
        ```

        The matching `flowtime.optimize(...)` method is owned by M-042 — draft preserved in that milestone's Technical Notes.

      - **`ConvergenceChart.svelte`** — pure SVG, ~80-120 lines. Consumes the normalized `Array<{ iteration, metricMean }>` shape (see AC5). Geometry in `convergence-chart-geometry.ts` handles y-domain computation, point projection, target-line y-coord, and multi-point-at-same-x placement (goal-seek's two `iteration: 0` entries). Single-series line for simplicity; no legend. Uses `--ft-viz-*` palette tokens; teal when `converged`, amber otherwise; dashed horizontal reference line at `target` when provided. Axis labels: `iteration` on x, `yLabel` prop (caller-supplied, e.g. "metric mean" or "queue.queueTimeMs") on y.

      - **`AnalysisResultCard.svelte`** — compact card using existing density tokens. Header (title + converged badge), primary value (large monospace), meta grid (iterations, tolerance, direction, target if present). No new shadcn components required.

      - **Interval bar + per-param range bars** — extracted into `interval-bar-geometry.ts` with vitest. Reused by Goal Seek's interval visualization (single bar) and by Optimize's per-param table (one mini bar per row) — the file lands here, M-042 reuses it.

      - **Form state** — co-located in the route component using `$state` runes. Promote to a `goal-seek-state.svelte.ts` store only if readability degrades; M-040 kept state local and that's the baseline to beat.

      - **Scenario-change reset** — when `selectedRunId` or `selectedSampleId` changes, reset the Goal Seek form. Wire into the same reactivity that already drives scenario changes in `/analysis`.

      - **Error messaging** — reuse the existing error surface pattern from M-040; do not introduce a new toast or modal system.

      - **Density / styling** — small inputs, tight gutters, 8–12 px steps. Use the analysis page's existing typography scale; no new font sizes.

      ## Out of Scope

      - Optimize tab surface — separate milestone **M-042**.
      - Per-evaluation probe log for optimize (raw reflection/expansion/contraction/shrink intermediate vertices). The exposed trace is per-iteration best only.
      - Multi-objective / Pareto optimization (not in the engine).
      - Constraints on optimization (deferred — tracked in `work/gaps.md`).
      - History panel for past goal-seek / optimize runs.
      - Exporting results (CSV, JSON download).
      - Persisting form values to `localStorage` across browser sessions.
      - Keyboard shortcuts beyond what the analysis page already supports.
      - Server-side parameter discovery (browser-side `discoverConstParams` still owns this).
      - Trace extension on `/v1/sweep` or `/v1/sensitivity` (not needed; not covered by D-047).

      ## Dependencies

      - M-040 (complete) — analysis route shell, tab bar, run/sample picker, param discovery, density tokens, inline-error pattern, sensitivity bar geometry (as a template for the interval bar + convergence chart geometry).
      - `POST /v1/goal-seek`, `POST /v1/optimize` — available on port 8081 against `RustEngine:Enabled=true`. Both covered by existing API tests (`GoalSeekEndpointsTests.cs`, `OptimizeEndpointsTests.cs`) that this milestone extends with trace-shape assertions.
      - D-047 — appended to `work/decisions.md` at start-milestone time; covers AC3.
      - Sample models bundled at `ui/src/lib/utils/sample-models.ts`. At least one sample must have const nodes, a reachable metric target (for the happy-path Playwright goal-seek), and accommodate the unreachable-target case from AC12.

      ## Notes

      - **Branch name vs milestone title.** The milestone branch is `milestone/m-E21-04-goal-seek-optimize` — it keeps its original name after the split because it already carries the Phase 1 backend commit (`29ac3e9`) and is referenced across CLAUDE.md Current Work and status surfaces. The branch name is the one documented mismatch with the renamed milestone folder (`m-E21-04-goal-seek`); all other surfaces reflect the new title.

      ## Coverage Notes

      See `m-E21-04-goal-seek-tracking.md` sections "Phase 1 — Branch-coverage audit" (backend) and "Coverage Notes → UI pass" (frontend) for the full line-by-line audit. Each reachable branch is matched to a named xUnit / vitest / Playwright test; defensive / unreachable branches are enumerated with rationale.
