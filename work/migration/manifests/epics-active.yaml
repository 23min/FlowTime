  - kind: milestone
    id: M-056
    frontmatter:
      title: Phase 3a — Cycle Time & Flow Efficiency
      status: done
      parent: E-10
    body: |
      ## Goal

      Move cycle time computation from the API layer to engine Core, add flow efficiency as a derived metric, and make both available per-class. This answers: "What is the cycle time at this stage?" and "How much of it is queue time vs processing time?"

      ## Context

      FlowTime already computes `flowLatencyMs` in `StateQueryService.cs` (API layer) by combining queue latency and service time. But this computation lives outside the engine core, making it unavailable to analyzers, the future DSL, and other consumers. The building blocks exist — `queueDepth`, `served`, `processingTimeMsSum`, `servedCount` — they just need to be composed in Core.

      For synthetic models (no telemetry), `processingTimeMsSum` is unavailable. Cycle time degrades gracefully to queue time only.

      ## Acceptance Criteria

      1. **AC-1: Cycle time decomposition in Core.** A new `CycleTimeComputer` in `FlowTime.Core/Metrics/` computes per-bin:
         - `queueTimeMs` = `(queueDepth / served) * binMs` (null when served <= 0)
         - `serviceTimeMs` = `processingTimeMsSum / servedCount` (null when unavailable)
         - `cycleTimeMs` = `queueTimeMs + serviceTimeMs` (or just `queueTimeMs` when service time unavailable)
         - Follows the three-tier NaN policy (Tier 2: null for unavailable metrics).

      2. **AC-2: Per-class cycle time.** Cycle time decomposition works with per-class `byClass` data. Each class gets its own `queueTimeMs`, `serviceTimeMs`, `cycleTimeMs` when class-level series are available.

      3. **AC-3: Flow efficiency metric.** `flowEfficiency = serviceTimeMs / cycleTimeMs` per bin per node. Ranges 0 (all queue time) to 1 (no queue time). Null when `cycleTimeMs` is zero, undefined, or `serviceTimeMs` unavailable. Added to `CycleTimeComputer`.

      4. **AC-4: Tests and gate.** Unit tests for `CycleTimeComputer` covering: normal case, zero served (null), missing processingTimeMsSum (graceful), per-class, flow efficiency. Build green; no new test failures introduced. Pre-existing failures unrelated to this milestone (e.g., schema meta-resolution) are excluded from the gate.

      5. **AC-5: Steady-state validation warning.** When computing cycle time over a window, check whether arrival and departure rates are stable enough for Little's Law to be meaningful:
         - Compare average arrival rate in the first half of the window to the second half.
         - If the rates diverge beyond a configurable tolerance (default: 25%), emit a warning annotation on the node: `"littles-law-non-stationary"`.
         - This is a diagnostic signal, not a gate — cycle time is still computed, but flagged as potentially unreliable.
         - Rationale: Little's Law (which underpins `queueTimeMs = Q/λ × binMs`) assumes steady state. Without this check, point estimates silently mislead during transients, ramp-ups, or drain-downs.

      ## Technical Notes

      - `CycleTimeComputer` should be a static class like `LatencyComputer` and `UtilizationComputer`.
      - `binMs` = `binSize * timeUnitToMs(binUnit)` — needs the grid's bin duration in milliseconds.
      - `queueTimeMs` is equivalent to `latencyMinutes * 60000` but computed directly in ms for consistency with `serviceTimeMs`.
      - The existing `StateQueryService` flow latency logic (lines 2633-2789) should delegate to the new Core computer.

      ## Out of Scope

      - Moving the full `StateQueryService` flow latency propagation algorithm to Core (that's graph-level, not per-node).
      - Cycle time distributions (FlowTime is bin-based, not event-based).
      - Post-review analytical projection hardening discovered during verification (logicalType parity, honest metadata, finite-value safety, contract/DTO symmetry, and AC-5 applicability) — tracked in `m-ec-p3a1`.

      ## Dependencies

      - Phase 1 complete ✅
  - kind: milestone
    id: M-057
    frontmatter:
      title: Phase 3a.1 — Analytical Projection Hardening
      status: done
      parent: E-10
    body: |
      ## Goal

      Establish the first correct boundary move for analytical state metrics: Core owns the current analytical capability resolution and derived metric computation used by `/state` and `/state_window`, while the remaining formula-first purification work is explicitly handed to E-16.

      ## Context

      Phase 3a introduced the right analytical primitives: `CycleTimeComputer` computes `queueTimeMs`, `serviceTimeMs`, `cycleTimeMs`, and `flowEfficiency` as pure math in Core. But the **capability decision** — "does this node have queue semantics? service semantics? both?" — still lived in `StateQueryService`, duplicated across snapshot building, window building, metadata emission, stationarity warnings, per-class conversion, and flow-latency composition.

      This milestone fixed that first-order boundary problem by moving the current analytical capability/computation surface into Core and wiring state projection to consume it. During the follow-on architecture pressure test, we decided not to keep expanding p3a1 into the full cleanup epic. Full purification now belongs to E-16.

      That means p3a1 is the bridge milestone, not the final deletion milestone. It delivers the current analytical computation move, finite-value safety, logicalType parity for the current state surfaces, and DTO parity. Compiled semantic references, runtime analytical descriptors, class-truth separation, and client heuristic deletion are owned by E-16.

      ## Acceptance Criteria

      1. **AC-1: Current analytical capabilities resolved in Core.** Core provides an `AnalyticalCapabilities` concept (record, type, or equivalent) that captures what the current state endpoints can compute analytically: queue semantics (Little's Law queue time, latency), service semantics (service time), cycle-time decomposition (queue + service → cycle time, flow efficiency), and stationarity-warning eligibility.

      2. **AC-2: Core computes the current analytical derived metrics for state projection.** Core provides a computation surface that takes capabilities and raw data (for a single bin or a windowed range) and produces the analytical values used by `/state` and `/state_window`: `queueTimeMs`, `serviceTimeMs`, `cycleTimeMs`, `flowEfficiency`, and `latencyMinutes`. This covers both node-level and current per-class breakdowns.

      3. **AC-3: Finite-value safety and metadata honesty for the current analytical payload.** The Core computation guarantees that NaN or Infinity inputs or intermediate results never produce non-null NaN/Infinity outputs. Analytical derived values follow the Phase 1 Tier 2 null policy, and `seriesMetadata` only advertises analytical keys that are actually emitted in the payload.

      4. **AC-4: Stationarity warning policy is explicit in the runtime path.** `littles-law-non-stationary` uses one named runtime configuration source for tolerance, and it is emitted only when `queueTimeMs` is actually present for the window being projected.

      5. **AC-5: Current DTO parity is complete for analytical class fields.** The current state API and Blazor time-travel DTO surfaces expose analytical by-class fields end-to-end so consumers can ingest the projected values without local reconstruction.

      6. **AC-6: Remaining purification work is explicitly handed off to E-16.** Typed semantic references, runtime analytical descriptors, class-truth separation, public analytical contract redesign, client heuristic deletion, and final semantic-parser removal are out of scope for `m-ec-p3a1` and owned by E-16.

      7. **AC-7: Tests and gate.** `dotnet build` and `dotnet test --nologo` are green for the wrapped milestone state.

      ## Technical Notes

      - `AnalyticalCapabilities` remains the bridge abstraction for the current state surfaces. E-16 will replace string-derived inputs with compiled runtime facts.
      - `flowLatencyMs` graph propagation stays in the adapter for this milestone. p3a1 only moves the per-node analytical base values it consumes into Core.
      - Existing non-analytical derived metrics (`utilization`, `throughputRatio`, `retryTax`, `color`) remain in the adapter.
      - Semantic string parsing and logicalType reconstruction that still exist for runtime behavior are tolerated only as bridge behavior. E-16 owns deleting them.
      - This milestone is allowed to update approved snapshots and fixtures to reflect corrected analytical outputs.

      ## Out of Scope

      - Typed semantic references in the compiled/runtime model
      - Runtime analytical descriptors on compiled nodes
      - Class-truth boundary cleanup / wildcard fallback separation
      - Public analytical contract redesign and client heuristic deletion
      - Final semantic-parser deletion from API and UI layers
      - New analytical primitives (WIP limits, variability, constraint enforcement, bottleneck ranking)

      ## Dependencies

      - Phase 1 complete ✅
      - Phase 3a implementation exists and is the input to this hardening pass
      - E-16 follows immediately after wrap and before Phase 3 continues with p3b/p3c/p3d

      ## References

      - `work/epics/E-10-engine-correctness-and-analytics/m-ec-p3a-review.md`
      - `work/epics/E-10-engine-correctness-and-analytics/m-ec-p3a-review-codex.md`
      - `work/epics/E-10-engine-correctness-and-analytics/m-ec-p3a-cycle-time.md`
      - `docs/architecture/nan-policy.md`
      - `work/epics/E-16-formula-first-core-purification/spec.md`
  - kind: milestone
    id: M-058
    frontmatter:
      title: Phase 3b — WIP Limits
      status: done
      parent: E-10
    body: |
      ## Goal

      Add WIP limit modeling to ServiceWithBufferNode so FlowTime can answer: "What happens if we set a WIP limit?" Overflow is configurable — items can be lost, routed to a DLQ, or handled by any downstream node. Also document and test the existing SHIFT-based backpressure pattern.

      ## Context

      Currently, ServiceWithBufferNode queues grow unbounded: `Q[t] = max(0, Q[t-1] + inflow - outflow - loss)`. In real systems, queues have limits — a Kanban board has a WIP cap, a message queue has a max depth, a connection pool has a size limit. When the limit is hit, excess work is either dropped (loss), diverted (DLQ/overflow route), or upstream is throttled (backpressure).

      FlowTime already supports:
      - `loss` series on ServiceWithBufferNode (items removed from system)
      - SHIFT-based backpressure via expressions (t-1 feedback, documented in retry-modeling.md)

      What's missing: automatic WIP limit enforcement with configurable overflow routing.

      ## Acceptance Criteria

      1. **AC-1: WIP limit on ServiceWithBufferNode.** Optional `wipLimit` field (scalar or series reference for time-varying limits). When `Q[t] > wipLimit[t]`:
         ```
         overflow[t] = Q[t] - wipLimit[t]
         Q[t] = wipLimit[t]
         ```
         The overflow amount is tracked as a series.

      2. **AC-2: WIP overflow routing.** Optional `wipOverflow` field on the node definition:
         - If omitted or `"loss"`: overflow is added to the loss series (items disappear).
         - If a node ID: the compiler wires the overflow as inflow to the target node.
         - Cascading: the target can itself have a `wipLimit` and overflow to another target.
         - The compiler validates no cycles are created by overflow wiring.

      3. **AC-3: Model schema updated.** `model.schema.yaml` and `NodeDefinition` support `wipLimit` (number or string series reference) and `wipOverflow` (string node ID or `"loss"`). Template schema updated if applicable.

      4. **AC-4: Backpressure pattern documented and tested.** A doc at `docs/architecture/backpressure-pattern.md` describes the SHIFT-based backpressure approach as a first-class modeling pattern. An integration test demonstrates upstream throttling via t-1 queue feedback.

      5. **AC-5: Tests and gate.** Tests cover: WIP clamping (queue capped at limit), overflow to loss (default), overflow to DLQ node, cascading overflow, time-varying wipLimit (series), backpressure via SHIFT. Full test suite green. Determinism test updated.

      ## Technical Notes

      - **Overflow series architecture:** `ServiceWithBufferNode` returns queue depth (one series per INode contract). The overflow series needs a separate mechanism:
        - **Option A:** Compiler generates a companion `ConstSeriesNode` wired to the overflow data. ServiceWithBufferNode stores overflow in a shared context (e.g., `Dictionary<NodeId, double[]>` passed through evaluation).
        - **Option B:** New `IMultiOutputNode` interface that returns a dictionary of series.
        - Decision during implementation — Option A avoids interface changes.
      - **`wipLimit` resolution:** Follows the same pattern as `Parallelism` — can be a literal number or a series reference resolved by `SemanticLoader`.
      - **Backpressure vs WIP limits:** WIP limits are "push with overflow" (engine-enforced). Backpressure is "pull with throttling" (model-expressed via SHIFT). Both are valid; document when to use each.

      ## Out of Scope

      - Backpressure as an automatic engine feature (already expressible via SHIFT).
      - WIP limit recommendations (DSL epic).
      - UI for configuring WIP limits.

      ## Dependencies

      - Phase 1 complete ✅ (Series immutability)
  - kind: milestone
    id: M-059
    frontmatter:
      title: Phase 3c — Variability Preservation (Cv + Kingman)
      status: done
      parent: E-10
    body: |
      ## Goal

      Preserve the coefficient of variation (Cv) when compiling PMFs, and use it to compute Kingman's approximation for predicted queue waiting time. This answers: "How variable is this stage?" and "What does queueing theory predict about queue behavior here?"

      ## Context

      FlowTime uses PMFs (probability mass functions) to model stochastic arrivals and service times. The `PmfCompiler` reduces each PMF to a series of expected values `E[X]` — the distribution shape is discarded. This loses the **coefficient of variation** (`Cv = σ/μ`), which is arguably the most important parameter in queueing theory.

      **Why Cv matters:** Kingman's formula shows that queue waiting time depends on BOTH utilization AND variability:
      ```
      E[Wq] ≈ (ρ/(1-ρ)) × ((Ca² + Cs²)/2) × E[S]
      ```
      Two nodes at identical utilization can have wildly different queue behavior if their variability differs. A node at 85% utilization with bursty arrivals (Cv=1.5) behaves worse than one at 95% with steady arrivals (Cv=0.3).

      FlowTime is domain-agnostic and must support stochastic models across any domain. Variability preservation is essential for meaningful flow analysis.

      ## Acceptance Criteria

      1. **AC-1: Cv computed from two sources.**
         - **PMF compilation:** When `PmfCompiler` compiles a PMF to a series, compute alongside `E[X]`:
           - `σ` (standard deviation) from the PMF distribution
           - `Cv = σ / μ` (coefficient of variation, where μ = E[X])
           - Store Cv per bin in a companion structure. When μ = 0, Cv = 0 (no variation around zero).
         - **Observed series statistics:** For non-PMF series (telemetry replay, constants, expressions), compute sample Cv from the series values over a configurable sliding window (default: full series). `σ_sample = std(values[window])`, `μ_sample = mean(values[window])`, `Cv = σ_sample / μ_sample`. Constant series produce Cv = 0 by construction. This enables Kingman's approximation for telemetry-driven models, not only synthetic/PMF models.

      2. **AC-2: Cv accessible in evaluation context.** The Cv data is stored alongside the compiled series values so downstream analysis (Kingman, future DSL) can access it. A `CvMetadata` record or similar wraps `{ CoefficientOfVariation: double[], Source: Pmf | Observed | Constant }`. The source tag distinguishes PMF-derived Cv (exact, per-bin from distribution shape) from observed Cv (sample statistic, approximate) and constant Cv (zero by definition).

      3. **AC-3: Kingman's approximation per node.** For ServiceWithBuffer nodes where Cv data is available for both arrivals and service, compute per-bin:
         ```
         E[Wq] ≈ (ρ/(1-ρ)) × ((Ca² + Cs²)/2) × E[S]
         ```
         Where:
         - ρ = utilization (served/capacity)
         - Ca = Cv of arrivals series
         - Cs = Cv of service series
         - E[S] = mean service time (serviceTimeMs)
         
         Exposed as `kingmanPredictedWaitMs` in state responses. Null when any input is unavailable or ρ >= 1.0 (formula diverges).

      4. **AC-4: Tests and gate.** Tests cover: Cv computation from known PMFs (Cv=0 for deterministic, Cv=1 for exponential), Cv computation from observed series (known sample statistics), Cv source tagging (Pmf vs Observed vs Constant), Kingman approximation with known inputs (both PMF and observed Cv), graceful null when inputs missing, ρ >= 1.0 returns null. Full test suite green.

      ## Technical Notes

      - **Cv from PMF:** For a discrete PMF `{(v₁, p₁), (v₂, p₂), ...}`:
        - `μ = Σ(vᵢ × pᵢ)`
        - `σ² = Σ(pᵢ × (vᵢ - μ)²)`
        - `Cv = σ / μ`
      - **Per-bin Cv:** Each bin may have a different PMF (or the same PMF sampled differently). Cv is computed per-bin from the PMF used for that bin.
      - **Constant/expression nodes:** Cv = 0 by construction (deterministic).
      - **Telemetry-driven nodes:** Cv computed from observed series as sample statistics. This is essential for crystal ball / predictive projection use cases where telemetry replay is the primary input. See `docs/notes/predictive-systems-and-uncertainty.md` for the design rationale — without observed Cv, Kingman's formula produces zero-variance predictions for all real-data models.
      - **Kingman divergence:** When ρ ≥ 1.0, the formula produces infinity (queue grows unbounded). Return null with a warning rather than infinity.
      - **Kingman as diagnostic, not prediction:** The formula assumes steady-state M/G/1 queueing. Real systems are transient. Kingman's value is as a **diagnostic** — "queueing theory predicts this node should have X ms wait time; actual is Y ms; the delta suggests the model may be missing something."

      ## Out of Scope

      - Variability-based bottleneck ranking (DSL epic).
      - Multi-server Kingman (M/G/c) — start with single-server approximation.
      - Preserving the full PMF distribution shape (only Cv is preserved).

      ## Dependencies

      - Phase 1 complete ✅
      - Phase 3a helpful (cycle time provides serviceTimeMs for Kingman) but not strictly required
  - kind: milestone
    id: M-060
    frontmatter:
      title: Phase 3d — Constraint Enforcement
      status: done
      parent: E-10
    body: |
      ## Goal

      Wire `ConstraintAllocator` into `Graph.Evaluate` so declared constraints actually cap served throughput per bin. This makes constraints real — models that declare shared resource constraints will see them enforced during evaluation, not silently ignored.

      ## Context

      `ConstraintAllocator` has existed since M-063 with correct proportional allocation logic:
      - If total demand ≤ capacity: each node gets its full demand
      - If total demand > capacity: each node gets `capacity × (its_demand / total_demand)`

      But it has **zero callers in the evaluation pipeline**. It's only used in `StateQueryService` as a view-time filter. The March 2026 deep review flagged this as a design contradiction. Phase 2 downgraded the documentation to "foundations laid, enforcement pending." Phase 3d makes it real.

      No backward compatibility is needed — existing model results are throwaway.

      ## Acceptance Criteria

      1. **AC-1: Constraint allocation during evaluation.** After all nodes in the DAG have been evaluated, apply constraint allocation per bin:
         - For each constraint, collect the unconstrained `served[t]` for all assigned nodes.
         - If total demand exceeds constraint `capacity[t]`, allocate proportionally via `ConstraintAllocator.AllocateProportional`.
         - Cap each node's `served[t]` to its allocation.
         - Store the allocation results in the evaluation context for downstream consumption (state/state_window).

      2. **AC-2: Downstream propagation.** Capped `served` values propagate correctly through the DAG. Nodes that depend on a constrained node's output see the constrained (reduced) values, not the unconstrained originals. This may require a re-evaluation pass for downstream nodes after constraints are applied.

      3. **AC-3: Constraint metadata in evaluation results.** The evaluation result includes per-constraint, per-node, per-bin allocation data so `StateQueryService` can expose constraint status (limited/unlimited) without recomputing.

      4. **AC-4: Tests and gate.** Tests cover: single constraint with two nodes (proportional split), unconstrained case (demand ≤ capacity, no capping), constraint with zero capacity (all nodes get zero), downstream propagation (constrained served affects downstream queue), multiple constraints on different node groups. Full test suite green. Determinism test updated.

      ## Technical Notes

      - **Evaluation order:** Constraints are cross-node — they span multiple nodes in the DAG. The natural approach:
        1. Evaluate all nodes in topological order (unconstrained).
        2. Apply constraints: cap `served` for constrained nodes.
        3. Re-evaluate downstream nodes that depend on constrained outputs.
        
        Step 3 is necessary for correctness — if a ServiceWithBufferNode's `served` (outflow) is capped, its queue depth changes, which affects downstream nodes.

      - **Alternative:** Integrate constraints into the evaluation loop. When evaluating a node, check if it has a constraint. If so, defer final `served` until all nodes in the constraint group are evaluated, then allocate. This avoids re-evaluation but complicates the topological traversal.

      - **Constraint data model:** Constraints are defined in `model.Topology.Constraints` with assigned node IDs and a capacity series. `ConstraintAllocator` takes `Dictionary<string, double>` (demands) and `double` (capacity) per bin — already the right interface.

      - **`StateQueryService` simplification:** Once constraints are enforced at evaluation time, `StateQueryService` no longer needs to apply them at view-time. The allocation results from evaluation can be passed through directly.

      ## Out of Scope

      - New constraint types (only proportional allocation — existing algorithm).
      - Constraint-aware bottleneck analysis (DSL epic).
      - Constraint recommendation ("you should set capacity to X") — future work.
      - MCP constraint patterns (deferred M-065 in gaps.md).

      ## Dependencies

      - Phase 1 complete ✅ (Series immutability)
      - Phase 3b helpful (WIP limits + constraints interact: a constrained node's overflow could hit a WIP limit) but not strictly required
