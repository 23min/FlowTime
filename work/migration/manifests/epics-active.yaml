  - kind: milestone
    id: M-062
    frontmatter:
      title: Run Orchestration
      status: in_progress
      parent: E-11
    body: |
      ## Goal

      Add card-based template selection, run configuration, and model execution to the Svelte UI at `/run`.

      ## Context

      M1-M4 delivered the SvelteKit scaffold, API clients, topology rendering with dag-map, and timeline with heatmap scrubbing. The `/run` route is currently a stub. The Sim API already exposes template listing (`GET /api/v1/templates`), template detail with parameters (`GET /api/v1/templates/{id}`), and run orchestration (`POST /api/v1/orchestration/runs`) including dry-run preview. The Engine API lists completed runs (`GET /v1/runs`). This milestone wires the Svelte UI to those endpoints.

      ## Acceptance Criteria

      1. Templates render as cards in a responsive grid with title, description, domain icon, and version badge
      2. Search input filters cards by name/description in real-time
      3. Selecting a card fetches template detail and shows a configuration panel with: bundle reuse mode (Reuse/Regenerate/Fresh), RNG seed input, and collapsible "Advanced Parameters" section
      4. Can execute a model run and see results (run ID, metadata, warnings, navigation links) when complete
      5. Preview/dry-run mode shows the execution plan without creating a run
      6. Loading, error, and empty states handled gracefully (skeletons, error cards, empty message)
      7. No raw JSON parameter field visible by default (hidden in Advanced section)

      ## Technical Notes

      - Single page with state phases (selecting → configuring → running → success/error/preview), not sub-routes
      - `POST /api/v1/orchestration/runs` is synchronous — blocks until complete, no polling needed
      - Bundle reuse mapping: Reuse → `deterministicRunId:true, overwrite:false`; Regenerate → `deterministicRunId:true, overwrite:true`; Fresh → `deterministicRunId:false`
      - Mode is inferred: telemetry when template has `captureKey`, simulation otherwise — shown as a read-only badge/indicator on the config panel (not a user choice, but visible)
      - Domain icons: map template category/tags/title keywords to Lucide icons via utility function
      - shadcn-svelte components needed: badge, collapsible, radio-group, alert
      - Follow existing patterns: `$state`/`$derived` runes, `onMount` for data fetch, Card/Button/Input from shadcn-svelte

      ## Out of Scope

      - Template parameter validation beyond basic type coercion
      - Run history / run comparison
      - Polling or WebSocket for long-running runs (API is synchronous)
      - Template creation or editing
      - Mobile/responsive layout optimization

      ## Dependencies

      - M1 (scaffold), M2 (API layer), M4 (timeline — established API client patterns)
      - Sim API running at port 8090 with templates available
  - kind: milestone
    id: M-063
    frontmatter:
      title: Dependency Constraints Foundations
      status: done
      parent: E-12
    body: |
      ## Goal

      Introduce a first, minimal dependency-constraint model that allows FlowTime to represent downstream/shared resources **as explicit DAG nodes** without breaking the arrivals/served/queue basis. The engine must expose dependency load and coupling in API outputs, with explicit provenance and warnings for inferred signals.

      ## Problem Statement

      FlowTime currently models node throughput and queue depth but cannot explain bottlenecks caused by shared downstream dependencies (DBs, caches, APIs). This milestone establishes a baseline representation so dependencies can be modeled as constraints, and consumers can observe coupling and saturation without client-side derivation.

      ## Scope

      ### In Scope
      - **Option A only:** Add a dependency node kind and connect it explicitly in the DAG.
      - Preserve the arrivals/served basis for dependency nodes.
      - Expose dependency load in `/state` and `/state_window` with explicit provenance metadata.
      - Surface warnings for inferred or missing dependency signals.
      - Provide a reference template and a golden test fixture that exercises dependency constraints.

      ### Out of Scope
      - **Option B (constraint attached to service nodes)** — deferred to M-064.
      - Full shared-capacity allocation algorithms.
      - Latency-based inference of hidden backlog (Level 3 per epic doc).
      - UI overlays beyond existing topology panels.
      - Telemetry ingestion changes (handled by the Telemetry Ingestion epic).

      ## Proposed Model (MVP)

      Support **Option A (Dependency as Node)** with explicit edges:

      - A dependency is a node type (`dependency`) with arrivals and served series.
      - Upstream services connect to the dependency using **effort edges** (attempt load).
      - Dependency node emits served to the upstream service or downstream hop via **throughput edges**.

      This keeps edge semantics explicit and leverages existing edge metrics.

      ### Retry / Backpressure Guidance (Non‑Looping)

      To keep the graph acyclic while still modeling dependency failures:

      - **Retry load** should be modeled as a derived attempts series (e.g., `CONV(dependency_errors, kernel)`).
      - **Backpressure** should be represented by inflating service time or reducing effective capacity on the caller:
        - Example: `processingTimeMsSum = base_time_ms * (served + retry_attempts)`.
      - **Explicit feedback loops are out of scope** for this milestone (DAG constraint).

      ### Future Compatibility

      - Option B (dependency as constraint) is defined in M-064 and builds on the same series/edge semantics.
      - Derived/inferred signals must be labeled `origin: derived` and surfaced with warnings.

      ## Deliverables

      ### Engine / Contracts
      - Add a `dependency` node kind (or equivalent logical type) with expected series: `arrivals`, `served`, optional `errors`.
      - Ensure edge series metadata (attemptsVolume, failuresVolume, retryRate) applies cleanly to dependency edges.
      - Extend `seriesMetadata` to include dependency-specific series with `origin` and `aggregation`.

      ### API / Schema
      - `/state` and `/state_window` include dependency node series and metadata.
      - Warnings for missing dependency series are emitted consistently (e.g., `missing_dependency_arrivals`).

      ### Tests
      - Golden fixtures for dependency nodes in `/state` and `/state_window`.
      - Contract tests asserting provenance (`origin`) and aggregation for dependency series.
      - Warning tests covering missing dependency inputs.

      ### Documentation
      - Update `work/epics/dependency-constraints/spec.md` with MVP scope and constraints.
      - Add a short usage note in `docs/reference/engine-capabilities.md`.

      ## Decisions Needed

      1. **Node representation:** confirm that the MVP should implement Option A (dependency as node) only.
      2. **Naming:** choose the node kind string (`dependency` vs `resource`).
      3. **Series semantics:** confirm which series are mandatory vs optional (arrivals/served/errors).

      ## Risks

      - Overloading edge semantics for dependency load could blur effort vs throughput if not clearly labeled.
      - Tests and documentation must clearly communicate inferred vs explicit signals.

      ## Test Plan (Must Follow TDD)

      1. Add failing golden test for dependency node in `/state_window` (with metadata).
      2. Add failing golden test for dependency node in `/state` (single bin).
      3. Add failing warning test for missing dependency arrivals/served.
      4. Implement engine + schema updates.
      5. Update goldens and documentation.

      ## Acceptance Criteria

      - Dependency nodes appear in `/state` and `/state_window` with correct series and metadata.
      - Edge semantics for dependency load are explicit and validated.
      - Missing dependency signals emit warnings and are visible to consumers.
      - Tests pass; no UI changes required.
  - kind: milestone
    id: M-064
    frontmatter:
      title: Dependency Constraints (Attached to Services)
      status: done
      parent: E-12
    body: |
      ## Goal

      Add **Option B** dependency constraints: allow services to declare dependency constraints without inserting explicit dependency nodes in the graph. This keeps the topology simple while preserving coupling and bottleneck visibility in the engine outputs.

      ## Problem Statement

      Option A (explicit dependency nodes) is correct but can clutter large graphs. Most telemetry systems (e.g., Azure App Insights) model dependencies **as relationships on a service** rather than explicit nodes in a DAG. We need a first-class constraint model that preserves the arrivals/served basis and exposes shared bottlenecks without graph inflation.

      ## Scope

      ### In Scope
      - Allow service nodes (`service`, `serviceWithBuffer`, `router`) to declare **dependency constraints**.
      - Represent constraints in `/state` and `/state_window` outputs with explicit metadata and warnings.
      - Support **shared dependencies** via a named constraint resource that multiple services can reference.
      - Provide a minimal allocation rule (documented and deterministic) for shared constraints.
      - Minimal UI exposure so Option B can be validated during this milestone.
      - A dedicated Option B template that exercises both full-feature and fallback behavior paths.

      ### Out of Scope
      - UI re-layout or new visual layers (reuse existing inspectors).
      - Latency-based backlog inference (beyond explicit signals).
      - Telemetry ingestion transformations (handled by Telemetry Ingestion epic).

      ## Proposed Model (Option B)

      ### Constraint Declaration
      - Services can list dependency constraints, e.g.:
        - `constraints: [db_main, cache_redis]`
      - Each constraint has its own arrivals/served signals (from telemetry or derived). Optional signals include `errors` and `latency`.
      - Missing constraint signals must emit warnings with explicit provenance.

      ### Engine Semantics
      - Effective service capacity is limited by:
        - service capacity
        - dependency constraint capacity
      - Constraints may also **inflate service time** when retry load is modeled (deterministic rule).
      - When constraints are shared, capacity is allocated using a deterministic rule (e.g., proportional to demand or observed served).
      - Constraints must **not** re‑inject arrivals (no feedback loops in M‑10.02).

      ### Output Contract
      - `/state` and `/state_window` include per-node:
        - `constraints` block with dependency IDs and per-bin constraint metrics (arrivals/served, optional errors/latency).
        - `constraintStatus` indicating if the node was dependency-limited in the bin.
      - Series metadata must flag derived vs explicit sources (`origin` + `aggregation`).

      ### UI Exposure (Permanent)
      - Add a Constraints section in the inspector for nodes with attached constraints.
      - Show per-constraint arrivals/served/errors (if present) and a constraint-limited indicator.
      - No new visual layers; reuse existing inspector styling.

      ## Deliverables

      ### Engine / Contracts
      - Add constraint metadata to node contract (JSON + C# models).
      - Add constraint evaluation logic in the engine for supported node kinds.

      ### API / Schema
      - Extend `time-travel-state` schema with `constraints` on nodes.
      - Ensure `seriesMetadata` for constraint series is provided.

      ### Tests
      - Golden fixtures for dependency constraints on service nodes.
      - Contract tests for constraint metadata and warnings.
      - Deterministic allocation test for shared dependencies.

      ### Documentation
      - Update `work/epics/dependency-constraints/spec.md` with Option B semantics.
      - Add notes to `docs/reference/engine-capabilities.md` for constraint-limited nodes.
      - Document the Option B template and validation expectations in `templates/README.md`.

      ## Decisions Needed

      1. **Allocation rule:** choose a deterministic default (recommend proportional to demand) so tests are stable.
      2. **Constraint schema:** nested block vs referenced external resource.
      3. **Supported node kinds:** confirm scope (`service`, `serviceWithBuffer`, `router`).

      ## Test Plan (Must Follow TDD)

      1. Add failing golden test for `/state_window` with dependency constraints attached to a service.
      2. Add failing test for shared dependency allocation.
      3. Add warning test for missing constraint signals.
      4. Implement engine support and update schema/contracts.
      5. Update goldens and documentation.
      6. Validate Option B in UI using the dedicated template.

      ## Acceptance Criteria

      - Services can declare dependency constraints without explicit dependency nodes.
      - `/state` and `/state_window` expose constraint metrics and limitation status.
      - Shared dependency allocation is deterministic and documented.
      - Warnings surface missing constraint inputs with provenance metadata.
  - kind: milestone
    id: M-065
    frontmatter:
      title: MCP Dependency Pattern Enforcement
      status: done
      parent: E-12
    body: |
      > This milestone was deferred from E-12 wrap and absorbed into the new draft `ai-assisted-authoring` unplanned epic. The MCP-server-side pattern-enforcement scope captured here is the seed of that epic; Plans 3–5 (resource pooling, compiler expansion, feedback loops) referenced as out-of-scope below also move with it. AI-assisted authoring is being treated as a server-side surface consumed by external authoring callers (Claude as a tool, future agent harnesses, scripted authoring pipelines), not a FlowTime-UI feature.

      ## Goal

      Enforce the **dependency pattern matrix** in the MCP server so MCP-assisted modeling emits only supported dependency patterns (Option A or Option B) and blocks unsupported behaviors (Plans 3–5) with clear guidance.

      ## Problem Statement

      MCP modeling currently allows users (or agents) to describe dependencies in many ways, which risks producing ambiguous or incorrect models. We need MCP to enforce **canonical patterns** that match engine capabilities, and to refuse unsupported features (e.g., feedback loops, dependency retries) with actionable alternatives.

      ## Scope

      ### In Scope
      - Add a **dependency pattern selector** in MCP modeling that:
        - maps user intent to Option A or Option B,
        - refuses unsupported patterns with a clear explanation,
        - emits only canonical helper output.
      - Harden MCP validation so engine **info warnings** about dependency contracts become **hard errors** during MCP model generation.
      - Add tests verifying:
        - correct pattern selection,
        - rejection of unsupported behaviors,
        - deterministic helper output.

      ### Out of Scope
      - Implementing Plans 3–5 (resource pooling, compiler expansion, feedback loops).
      - Changes to engine behavior or flow latency logic.

      ## Requirements

      ### Dependency Pattern Matrix
      MCP must implement the matrix documented in `work/epics/completed/ai/mcp-modeling.md`:

      | User intent | MCP pattern | Supported now |
      | --- | --- | --- |
      | Dependency in series | Option A helper | ✅ |
      | Dependency as constraint | Option B helper | ✅ |
      | Dependency retries/feedback loops | Plan 4/5 | ❌ |

      ### Canonical Output Contracts
      - **Option A helper**
        - Dependency node with arrivals/served/errors
        - Effort edge with attempts volume
        - Upstream retry pressure derived (no cycles)
        - Derived series tagged with `origin: derived`
      - **Option B helper**
        - Constraint registry + node references
        - Deterministic allocation rule (as in M‑10.02)
        - No retry modeling

      ### Validation
      MCP must treat the following engine warnings as **hard errors** for model generation:
      - `missing_dependency_arrivals`
      - `missing_dependency_served`
      - `dependency_missing_effort_edges`
      - `dependency_retry_pressure_missing`

      ## Deliverables

      ### MCP Server
      - Implement dependency pattern selection logic.
      - Enforce strict validation mapping for dependency warnings.
      - Provide clear error messaging with suggested alternatives.

      ### Tests
      - Unit tests for pattern selection outcomes.
      - Validation tests that convert dependency warnings into MCP errors.
      - Golden/fixture tests for helper output (Option A/Option B).

      ### Documentation
      - Update MCP modeling docs to reference enforcement behavior (already documented in `work/epics/completed/ai/mcp-modeling.md`).
      - Add release note for M‑10.03.

      ## Test Plan (TDD)

      1. Add failing tests for:
         - Option A selection (dependency in series)
         - Option B selection (dependency as constraint)
         - Rejection for “dependency retries” or “feedback loop” intents
      2. Add failing test that engine dependency warnings are surfaced as MCP errors
      3. Implement selection + validation enforcement
      4. Update docs and release notes

      ## Acceptance Criteria

      - MCP emits only Option A or Option B dependency patterns.
      - Unsupported dependency behaviors are rejected with actionable guidance.
      - Dependency warnings are treated as hard errors in MCP modeling workflows.
      - Tests confirm deterministic output and rejection behavior.
  - kind: decision
    id: D-001
    frontmatter:
      title: dag-map for Svelte UI topology rendering
      status: accepted
    body: |
      **Status:** active
      **Context:** M3 originally planned to wrap topologyCanvas.js (10K LOC from Blazor UI). Initial integration worked but was rough — canvas sizing issues, requires overlay payload before draw, and the approach duplicates the Blazor rendering code.
      **Decision:** Use dag-map library instead. dag-map is our own library with a general-purpose flow visualization roadmap. Extend dag-map with features needed by FlowTime (heatmap mode, click events, hover) rather than wrapping the Blazor-specific canvas JS.
      **Consequences:** M4 (timeline) now depends on dag-map heatmap mode being implemented first. dag-map features must remain general-purpose, not FlowTime-specific. topologyCanvas.js stays in Blazor UI only.
  - kind: decision
    id: D-002
    frontmatter:
      title: pnpm for Svelte UI package management
      status: accepted
    body: |
      **Status:** active
      **Context:** Root repo uses npm (for Playwright tests). The `ui/` project needed a package manager.
      **Decision:** Use pnpm — aligns with shadcn-svelte documentation conventions, already installed in devcontainer (v10.33).
      **Consequences:** `ui/` has pnpm-lock.yaml, not package-lock.json. init.sh runs `pnpm install --frozen-lockfile` for ui/.
  - kind: decision
    id: D-003
    frontmatter:
      title: Manual shadcn-svelte initialization
      status: accepted
    body: |
      **Status:** active
      **Context:** `shadcn-svelte init` CLI is interactive-only (prompts for preset selection), cannot be run non-interactively in CI or automation.
      **Decision:** Manually create `components.json`, `utils.ts`, and `app.css` theme variables. Add components individually via `yes | pnpm dlx shadcn-svelte add <component>`.
      **Consequences:** Works in non-TTY environments. Must manually keep components.json aligned with shadcn-svelte schema on upgrades.
  - kind: decision
    id: D-004
    frontmatter:
      title: Pin bits-ui to 2.15.0
      status: superseded
    body: |
      **Status:** superseded by D-009
      **Context:** bits-ui 2.16.4 has broken dist/types.js — references `../bits/pin-input/pin-input.svelte.js` and `./attributes.js` which don't exist in the published package.
      **Decision:** Pin bits-ui to 2.15.0 until the issue is fixed upstream.
      **Consequences:** Check for fix on bits-ui releases periodically. Can unpin when 2.16.5+ ships.
  - kind: decision
    id: D-005
    frontmatter:
      title: dag-map lineGap default for single-route graphs
      status: accepted
    body: |
      **Status:** active
      **Context:** dag-map's lineGap (parallel line offset at shared nodes) defaults to 5px. For auto-discovered routes, this causes the trunk to wobble even when there's only one visual route.
      **Decision:** Default lineGap to 0 when routes are auto-discovered (not consumer-provided). Only use non-zero lineGap when consumer explicitly provides multiple routes.
      **Consequences:** Single-route graphs render with straight trunks. Multi-route flow layouts still get parallel line separation.
  - kind: decision
    id: D-006
    frontmatter:
      title: Svelte UI heatmap uses derived.utilization from state API
      status: accepted
    body: |
      **Status:** active
      **Context:** The FlowTime state API returns metrics at multiple levels: `metrics.*` (raw), `derived.*` (computed), `byClass.*` (per-class). Needed to pick the right field for heatmap coloring.
      **Decision:** Use `derived.utilization` as primary heatmap metric, `derived.throughputRatio` as fallback. Other focus metrics (SLA, error rate, queue depth) to be added via a metric selector chip.
      **Consequences:** Heatmap works end-to-end for utilization. Need to add metric selector for other derived fields.
  - kind: decision
    id: D-007
    frontmatter:
      title: Fix P0 engine bugs before further Svelte UI work
      status: accepted
    body: |
      **Status:** active
      **Context:** Engine deep review found 3 P0 bugs (shared series mutation, missing capacity dependency, dispatch-unaware invariant). Svelte UI shows data from these APIs — incorrect engine data means incorrect visualization.
      **Decision:** Prioritize Phase 0 bug fixes (BUG-1, BUG-2, BUG-3) before continuing Svelte UI M4 completion or M5/M6.
      **Consequences:** Svelte UI work pauses briefly. Engine correctness gates all downstream work.
  - kind: decision
    id: D-008
    frontmatter:
      title: Run orchestration defaults to simulation mode
      status: accepted
    body: |
      **Status:** active
      **Context:** Telemetry mode requires capture CSV files on disk (under `examples/time-travel/{captureKey}/`). In dev environments these may not exist, causing 500 errors. Simulation mode always works.
      **Decision:** M6 run orchestration defaults to simulation mode for all templates. Telemetry mode support deferred until capture generation workflow is in the UI.
      **Consequences:** Runs always succeed but produce synthetic data. Telemetry mode (real CSV data) needs a separate workflow to generate captures first.
  - kind: decision
    id: D-009
    frontmatter:
      title: Upgrade bits-ui to 2.16.5
      status: accepted
    body: |
      **Status:** active
      **Context:** bits-ui 2.15.0 was missing RadioGroup exports (empty `export {}`). bits-ui 2.16.4 had broken type exports. bits-ui 2.16.5 fixes both issues.
      **Decision:** Upgrade bits-ui from 2.15.0 to 2.16.5. Remove the pin.
      **Consequences:** RadioGroup (and other newer primitives) now available. shadcn-svelte radio-group component works correctly.
  - kind: decision
    id: D-010
    frontmatter:
      title: Epic numbering convention (E-xx)
      status: accepted
    body: |
      **Status:** active
      **Context:** Epics had no IDs, only slugs. Hard to see sequence at a glance in roadmap and folder listings.
      **Decision:** Number epics sequentially starting at E-10. Affects folder name (`work/epics/E-{NN}-<slug>/`), branch name (`epic/E-{NN}-<slug>`), and milestone IDs (`m-E{NN}-<MM>-<slug>`). Forward-only — completed epics before E-10 stay unnumbered. Mid-term/aspirational epics get numbered when sequence is certain.
      **Consequences:** All `.ai/` templates, skills, and paths updated. Active/planned epics need renaming when numbers assigned.
  - kind: decision
    id: D-011
    frontmatter:
      title: dag-map work scoped within consuming epics
      status: accepted
    body: |
      **Status:** active
      **Context:** dag-map is a cross-cutting library that multiple epics need (path highlighting for Path Analysis, edge coloring for Inspector, constraint visualization for Dependency Constraints). Considered making it a separate epic.
      **Decision:** dag-map enhancements are scoped as deliverables within the consuming epic's milestones, not a separate epic. Same pattern as M4 pulling in "dag-map heatmap mode."
      **Consequences:** Each epic that needs dag-map features includes them in its milestone specs. No separate dag-map epic or backlog.
  - kind: decision
    id: D-012
    frontmatter:
      title: Epic sequence E-10 through E-15
      status: accepted
    body: |
      **Status:** active
      **Context:** Needed to assign E-xx numbers to active and planned epics.
      **Decision:** E-10 Engine Correctness, E-11 Svelte UI, E-12 Dependency Constraints, E-13 Path Analysis, E-14 Visualizations, E-15 Telemetry Ingestion. Mid-term epics (E-16+) numbered when sequenced.
      **Consequences:** E-12 is mostly done (M-063/02 complete, only MCP enforcement remains). E-13 Path Analysis includes dag-map path highlighting work. E-14 Visualizations is Svelte chart work (no dag-map). E-15 Telemetry Ingestion is independent but sequenced last.
  - kind: decision
    id: D-013
    frontmatter:
      title: Reprioritize E-10 Phase 3 before E-11 continuation
      status: accepted
    body: |
      **Status:** active
      **Context:** E-10 Phase 3 (analytical primitives: cycle time, WIP limits, variability, constraint enforcement) was paused after Phases 0-2 to work on E-11 Svelte UI. Phase 3 unlocks E-12/E-13/E-14 downstream and the specs are all approved.
      **Decision:** Resume E-10 Phase 3 immediately (p3a → p3b → p3c → p3d). E-11 Svelte UI paused after M6 until Phase 3 completes. Epics and milestones proceed in sequence from here.
      **Consequences:** E-11 M5/M7/M8 deferred. `milestone/m-svui-06` branch needs merge to main first. Next work: create `milestone/m-ec-p3a` from main.
  - kind: decision
    id: D-014
    frontmatter:
      title: Split post-p3a projection hardening into its own milestone
      status: accepted
    body: |
      **Status:** active
      **Context:** Review of M-056 found the core analytical primitive is sound, but the state projection and contract surfaces still have duplicated capability logic, metadata drift, finite-value hardening gaps, and incomplete client symmetry. Folding that cleanup back into p3a would blur the milestone boundary and make later Phase 3 work harder to sequence.
      **Decision:** Track the post-review cleanup as a dedicated follow-on milestone, `m-ec-p3a1`, before continuing to p3b/p3c/p3d. p3a remains the primitive-introduction milestone; p3a1 owns analytical projection and contract hardening.
      **Consequences:** Phase 3 order becomes p3a → p3a1 → p3b → p3c → p3d. Future analytical milestones should build on the hardened projection surface rather than duplicating ad hoc snapshot/window logic.
  - kind: decision
    id: D-015
    frontmatter:
      title: cycleTimeMs coexists with flowLatencyMs
      status: accepted
    body: |
      **Status:** active
      **Context:** Phase 3a introduced `cycleTimeMs` (per-node: queue + service time) alongside the existing `flowLatencyMs` (cumulative: graph-level propagation from entry to node). Needed to decide whether the new metric replaces or coexists with the old.
      **Decision:** Coexist. `cycleTimeMs` answers "how long does work spend at this node?" while `flowLatencyMs` answers "how long does it take for work to get here from entry?" `flowLatencyMs` now uses `CycleTimeComputer` for its per-node base value, but the graph propagation stays in `StateQueryService`.
      **Consequences:** Both fields appear in `NodeDerivedMetrics`. `cycleTimeMs` decomposes into `queueTimeMs` + `serviceTimeMs` with `flowEfficiency` as a ratio. `flowLatencyMs` remains the cumulative metric for end-to-end analysis.
  - kind: decision
    id: D-016
    frontmatter:
      title: Analytical capabilities and computation move to Core
      status: accepted
    body: |
      **Status:** active
      **Context:** Phase 3a review found the same "does this node have queue/service semantics?" decision duplicated 6 ways in `StateQueryService` (snapshot, window, metadata, stationarity warnings, per-class conversion, flow-latency composition) with diverging predicates. The adapter was doing engine work — capability decisions and metric computation are domain knowledge, not projection concerns.
      **Decision:** M-057 moves analytical capability resolution and derived metric computation into `FlowTime.Core`. Core provides an `AnalyticalCapabilities` concept resolved once per node, plus a computation surface (capabilities + raw data → derived metrics with finite-value safety). `StateQueryService` becomes a stateless projector for analytical metrics — it consumes Core output and maps to contract DTOs. `flowLatencyMs` graph propagation stays in the adapter (orchestration concern). Non-analytical derived metrics (utilization, throughputRatio, retryTax) stay in the adapter for now.
      **Consequences:** Capability parity (explicit vs logicalType-resolved `serviceWithBuffer`) is guaranteed by construction. Metadata honesty, stationarity warning eligibility, and finite-value safety are driven by capabilities, not ad-hoc adapter predicates. p3b/p3c/p3d add to Core's computation surface; the adapter stays thin.
  - kind: decision
    id: D-017
    frontmatter:
      title: E-16 owns full purification and the migration is forward-only
      status: accepted
    body: |
      **Status:** active
      **Context:** The p3a1 pressure test showed that moving the current analytical capability/computation surface into Core was the right bridge, but full purification is larger than one E-10 follow-on milestone. Compiled semantic references, class-truth separation, runtime analytical descriptors, contract redesign, and consumer heuristic deletion all need one clear owner. We also do not want compatibility shims for old runs, fixtures, or hint-based contracts to dilute the cleanup.
      **Decision:** Wrap `m-ec-p3a1` as the bridge milestone and assign the full formula-first purification to E-16. E-16 is forward-only: old run directories, generated fixtures, and approved golden snapshots can be deleted and regenerated; contract cleanup does not need additive compatibility phases once the named consumers for a milestone are migrated.
      **Consequences:** E-10 Phase 3 pauses after `m-ec-p3a1` until E-16 completes. Milestone planning should prefer explicit deletion and regeneration over fallback layers. Reviews should treat new compatibility heuristics around the old analytical/runtime boundary as regressions.
  - kind: decision
    id: D-018
    frontmatter:
      title: flowLatencyMs moves to Core in E-16
      status: accepted
    body: |
      **Status:** active (supersedes D-016 for flowLatencyMs specifically)
      **Context:** D-016 kept flowLatencyMs graph propagation in the adapter as an "orchestration concern" during M-057 bridge work. E-16 milestone review found this is graph-level queueing theory: expected sojourn time through a network, computed as topological accumulation of per-node cycle times weighted by edge flow volumes. The Core IS a graph engine — graph-level analytical computation belongs there.
      **Decision:** flowLatencyMs computation moves to Core in M-015. The algorithm (`base = cycleTimeMs[node] + weightedAvg(flowLatencyMs[predecessors], edgeFlowVolume)`) becomes a pure Core evaluator function. The adapter passes topology + series inputs, Core returns results.
      **Consequences:** M-015 scope includes flowLatencyMs migration. D-016 remains active for its other points (non-analytical derived metrics like utilization/throughputRatio/retryTax staying in the adapter was a bridge — E-16 now moves utilization to Core too since effective capacity is flow algebra).
  - kind: decision
    id: D-019
    frontmatter:
      title: Analytical descriptor absorbs AnalyticalCapabilities
      status: accepted
    body: |
      **Status:** active
      **Context:** M-057 introduced `AnalyticalCapabilities` as a Core bridge resolved from `kind + logicalType` strings. E-16 introduces a compiled analytical descriptor produced by the compiler from typed semantic references. The question is whether they coexist or the descriptor replaces capabilities.
      **Decision:** The descriptor absorbs `AnalyticalCapabilities`. Capability flags become compiled descriptor fields. Computation methods (`ComputeBin`, `ComputeWindow`, etc.) move to the Core analytical evaluator (M-015). `AnalyticalCapabilities.Resolve(kind, logicalType)` is deleted — string-based resolution is exactly what E-16 eliminates. `EffectiveKind` is removed as a bridge concept.
      **Consequences:** M-014 deletes `AnalyticalCapabilities`. M-015 builds the evaluator from its computation methods. No coexistence period.
  - kind: decision
    id: D-020
    frontmatter:
      title: Parallelism typing included in E-16 m-E16-01
      status: accepted
    body: |
      **Status:** active
      **Context:** `NodeSemantics.Parallelism` is `object?`, parsed at runtime in both Core (`InvariantAnalyzer`) and API (`GetEffectiveCapacity`, `ParseParallelismScalar`). gaps.md deferred this as a 21-file cross-cut. Parallelism represents Kubernetes pod instances (service replicas) and scales effective capacity — this is flow algebra, not presentation.
      **Decision:** Include Parallelism typing in M-012 as part of typed semantic references. Replace `object?` with a typed reference (numeric constant or series ref) resolved at compile time. Effective capacity computation (`capacity x parallelism`) moves to Core evaluator in M-015.
      **Consequences:** The 21-file cross-cut is acceptable because E-16 is already touching the semantic reference boundary. gaps.md entry for Parallelism can be closed after M-012.
  - kind: decision
    id: D-021
    frontmatter:
      title: Shared runtime parameter foundation is owned once and reused by E-17 and E-18
      status: accepted
    body: |
      **Status:** active
      **Context:** E-17 (Interactive What-If) and E-18 (Headless Pipeline & Optimization) both need the same foundational capability: identify editable parameters in compiled graphs, apply deterministic overrides without recompilation, and expose metadata suitable for either UI controls or programmatic callers. Duplicating that work across two future epics would create drift between the interactive and headless paths.
      **Decision:** Own the shared runtime parameter foundation once in the programmable/headless layer. The foundation includes compiled parameter identity, override points, reevaluation APIs, and the contract for enriching human-facing metadata from authored template parameters when available. E-17 consumes that foundation for sessions, push delivery, and UI controls rather than defining a second runtime parameter model.
      **Consequences:** E-18 foundation work (`m-E18-01/02`) precedes or runs alongside the UI/session-specific work in E-17. Reviews should treat any second, UI-only runtime parameter model as a regression.
  - kind: decision
    id: D-022
    frontmatter:
      title: Chunked evaluation is deferred beyond the first E-18 headless cut
      status: accepted
    body: |
      **Status:** active
      **Context:** The headless and optimization story benefits from a pure callable engine quickly, but chunked evaluation for feedback simulation depends on real stateful execution semantics. The current `IStatefulNode` seam is only a stub and is not sufficient to justify bundling chunked/stateful execution into the initial headless foundation.
      **Decision:** Split E-18 into layers. The first cut covers the shared runtime parameter foundation, evaluation SDK, and headless CLI / sidecar. Advanced analysis modes (sweep, sensitivity, optimization, fitting) build on that. Chunked evaluation waits for a dedicated streaming/stateful execution seam.
      **Consequences:** The sidecar/SDK foundation can ship without solving streaming/stateful execution. Reviews should reject attempts to block the headless foundation on chunked evaluation design.
  - kind: decision
    id: D-023
    frontmatter:
      title: File-backed refs stay opaque and missing class coverage omits byClass
      status: accepted
    body: |
      **Status:** active
      **Context:** E-16 review found two boundary leaks still active after typed semantic references landed: runtime code inferred producer node identity from file stems, and state projection synthesized wildcard `byClass` payloads from aggregate totals even when runs had no explicit class series. Both behaviors blurred the compiler/runtime boundary and made missing class coverage indistinguishable from explicit fallback coverage.
      **Decision:** File-backed compiled references remain opaque at runtime: they provide authored lookup keys, not producer node IDs. State and graph projection only emit wildcard `byClass` when explicit fallback class series exist; runs with missing class coverage omit `byClass` entirely.
      **Consequences:** Logical-type promotion, queue-origin checks, and graph dependency resolution cannot rely on file-name heuristics. Tests and approved snapshots that depended on implicit wildcard totals or file-stem inference must be regenerated forward-only.
  - kind: decision
    id: D-024
    frontmatter:
      title: E-16 explicitly owns the remaining transitional analytical seams
      status: accepted
    body: |
      **Status:** active
      **Context:** After the E-16-01 and E-16-02 cleanup, three transitional seams still remained visible: `RunManifestReader` could recover telemetry-source facts by reparsing raw YAML text, class ingestion still translated legacy `*` / `DEFAULT` fallback markers, and `MetricsService` still carried a second analytical execution path via model-evaluation fallback when state-window resolution failed.
      **Decision:** These are not acceptable permanent bridges. E-16 explicitly owns removing all three: M-012 removes raw-model-text telemetry-source fallback readers, M-013 removes legacy class-fallback translation helpers once regenerated runtime metadata carries explicit fallback labeling, and M-015 removes the duplicate `MetricsService` analytical fallback path in favor of one Core evaluator surface.
      **Consequences:** Review and wrap should treat any of these helpers surviving beyond their owning milestone as an incomplete E-16 implementation, not a tolerable compatibility layer.
  - kind: decision
    id: D-025
    frontmatter:
      title: Pull analytical evaluator extraction into E-16-03
      status: accepted
    body: |
      **Status:** active
      **Context:** Deleting `AnalyticalCapabilities` in M-014 left its computation methods (`ComputeBin`, `ComputeWindow`, metadata gates, stationarity checks) without a truthful owner. Waiting until M-015 would have required either keeping the bridge alive or renaming it in place, which would violate the no-coexistence rule.
      **Decision:** Extract the descriptor-backed `RuntimeAnalyticalEvaluator` in M-014 as the minimal owner for the surviving analytical computation surface. M-015 still owns broader evaluator consolidation (flow-latency migration, emitted-series truth, warning fact cleanup), but not the initial extraction itself.
      **Consequences:** `AnalyticalCapabilities` can be deleted cleanly in M-014. The runtime descriptor now carries typed analytical identity and the evaluator consumes descriptor facts directly. M-015 builds on an existing evaluator instead of performing the first bridge cut.
  - kind: decision
    id: D-026
    frontmatter:
      title: E-16-04 removes legacy analytical run paths forward-only
      status: accepted
    body: |
      **Status:** active
      **Context:** M-015 removes the duplicate analytical fallback in `MetricsService`. One open question was whether unsupported legacy runs should fail with an explicit regeneration message or be tolerated through an upgrade boundary.
      **Decision:** Neither. E-16 remains strictly forward-only: legacy runs that depend on the old analytical/runtime boundary are deleted and replaced with regenerated runs. M-015 removes the fallback path without introducing an "unsupported, regenerate" runtime mode.
      **Consequences:** `MetricsService.ResolveViaModelAsync()` and similar legacy analytical rescue paths are pure cleanup targets, not compatibility seams. Tests, fixtures, and local run directories that still depend on those paths must be regenerated or removed during the milestone.
  - kind: decision
    id: D-027
    frontmatter:
      title: E-16-04 uses one consolidated internal analytical result surface
      status: accepted
    body: |
      **Status:** active
      **Context:** M-015 must move emitted-series truth, effective capacity, utilization, and graph-level flow latency into Core. An open design question was whether Core should return many narrow result types or one consolidated analytical result.
      **Decision:** Use one consolidated internal Core analytical result surface, with explicit nested sections rather than a flat bag of fields. The result owns snapshot/window/by-class analytical outputs, emitted-series truth, effective-capacity facts, and graph-level flow-latency outputs so adapters project one source of truth instead of recomposing partial answers.
      **Consequences:** This does not require one public contract type, and it does not prevent later milestone-specific refinements. The important constraint is that adapters and query surfaces consume one coherent Core result model instead of rebuilding analytical policy from multiple partial calculators.
  - kind: decision
    id: D-028
    frontmatter:
      title: Blazor remains a supported parallel UI surface
      status: accepted
    body: |
      **Status:** active
      **Context:** Initial E-19 planning language assumed E-11 Svelte UI would replace and eventually retire the Blazor UI. The intended product direction is different: Svelte is a parallel UI track for demos and future evaluation, while Blazor remains useful for debugging, operational workflows, and as a plan-B surface if Svelte is not the long-term primary UI.
      **Decision:** Keep `FlowTime.UI` as a supported first-party UI. E-11 builds Svelte in parallel rather than as a replacement. E-19 may remove stale compatibility wrappers and duplicate fallback logic from Blazor, but it does not retire Blazor or strip supported functionality; both UIs must stay aligned with evolving Engine/Sim contracts.
      **Consequences:** Planning docs must not describe Svelte as a committed Blazor replacement. Cleanup milestones target stale compatibility seams, not supported Blazor capabilities. Reviews should treat Blazor functionality regressions caused by cleanup as bugs unless explicitly approved.
  - kind: decision
    id: D-029
    frontmatter:
      title: E-19 owns current-surface orchestration cleanup; E-18 owns the headless foundation
      status: accepted
    body: |
      **Status:** active
      **Context:** Current template-driven run creation lives in `FlowTime.Sim.Service`, with storage-backed drafts, archived run bundles, bundle import flows, and catalog-era residue still visible on active first-party surfaces. The repo also has a planned headless future in E-18. Without an explicit boundary, today's Sim orchestration and archive/import choreography can harden into the accidental programmable contract.
      **Decision:** E-19 owns inventorying, narrowing, and deleting current Sim/UI/catalog/storage compatibility seams and publishing the supported-surface matrix. E-18 owns only the replacement headless foundation: runtime parameter identity, deterministic overrides, reevaluation APIs, evaluation SDK, and headless CLI/sidecar over compiled graphs. Current Sim authoring/orchestration, storage-backed drafts, archived run bundles, and bundle import flows are not the default path forward unless E-19 explicitly retains a surface.
      **Consequences:** Planning docs must treat today's Sim orchestration as either current-surface residue or explicitly retained authoring support, not as the future programmable contract. New consumers of draft/catalog/bundle-ref surfaces should be avoided until E-19 inventory is complete. `docs/architecture/template-draft-model-run-bundle-boundary.md` is the terminology and ownership reference for this boundary.
      **Subsequent update (2026-04-07):** The word "headless" in this decision is retained as historical text. The execution component is now named `FlowTime.TimeMachine` (the Time Machine) — see D-031. The scope of E-18 is unchanged; only the component name is updated.
  - kind: decision
    id: D-030
    frontmatter:
      title: Validation is a first-class, client-agnostic Time Machine operation (E-19 A6)
      status: accepted
    body: |
      **Status:** active
      **Context:** `POST /api/v1/drafts/validate` exists in `FlowTime.Sim.Service` and calls `TemplateInvariantAnalyzer`, which chains through `ModelCompiler`, `ModelParser`, `Graph.Evaluate`, and `InvariantAnalyzer`. The endpoint does use Core correctly, but (a) no UI calls it — only tests exercise it, (b) its name is misleading because it actually runs the graph, not "just validates," and (c) future clients will include MCP servers and external AI agents generating candidate models who need tiered validation (cheap per-iteration checks, heavier pre-run checks). Keeping a Sim-private mislabeled endpoint alive would lock validation into one privileged client just as it is about to be needed by many.
      **Decision:** Retire `POST /api/v1/drafts/validate` in M-025. Preserve every library piece (`ModelSchemaValidator`, `ModelValidator`, `ModelCompiler`, `ModelParser`, `TemplateInvariantAnalyzer`, `InvariantAnalyzer`). Record a hard E-18 dependency: the Time Machine must expose **tiered validation** (Tier 1 schema / Tier 2 compile / Tier 3 analyse) as a first-class operation alongside compile, evaluate, reevaluate, parameter override, and artifact write. All three tiers callable from in-process SDK, CLI, and sidecar protocol with consistent request/response shapes. Client list with no privileged client: Sim UI, Blazor UI, Svelte UI, MCP servers, external AI agents, tests, CI. Validation is not optional for E-18 — without cheap tiers, AI inner loops and editor-time UX both fail for cost reasons.
      **Consequences:** M-025 deletes the HTTP endpoint and its tests; `work/epics/E-18-headless-pipeline-and-optimization/spec.md` gains a "Tiered validation (required scope)" section and the tiered validation work lands in m-E18-01b (per the M-001 split in D-034). The principle is recorded in `docs/architecture/template-draft-model-run-bundle-boundary.md` as part of the M-024 boundary ADR update. Sim's authoring surfaces `/api/v1/templates/{id}/generate` and `/api/v1/drafts/generate` remain unchanged — they validate as a side effect of materialising a model and are not replacements for the first-class validation operation.
  - kind: decision
    id: D-031
    frontmatter:
      title: Execution component is `FlowTime.TimeMachine` (Time Machine), not "Headless"
      status: accepted
    body: |
      **Status:** active
      **Context:** E-18's new execution component was provisionally called "Headless" throughout planning docs. The name is a poor fit: it defines the component by what it isn't (no UI), rather than what it is; it's overloaded in software vocabulary (headless CMS, headless browser); and it implies subordination to some "headed" component, when in fact UIs and other clients will be callers of it. Meanwhile FlowTime's execution semantics map exactly to the formal definition of an abstract machine (instructions = compiled graph, state = time grid + accumulating series, execution = deterministic topological stepping) in the BEAM/JVM sense, and FlowTime's existing Blazor "Time Travel" UI feature pairs naturally with a backend component named "Time Machine." The reevaluation semantics (rewind a compiled model, run it forward with different parameters) are also literally time travel.
      **Decision:** Name the component `FlowTime.TimeMachine` (referred to in prose as "the Time Machine"). This is a new component added by E-18. `FlowTime.Core`, `FlowTime.API`, and `FlowTime.Sim.*` keep their names — no renames in E-19 beyond introducing the new component. `FlowTime.Generator` is a separate case handled by D-032 (Path B extraction and deletion). E-18's directory path `work/epics/E-18-headless-pipeline-and-optimization/` is preserved for historical stability; the epic content is titled *E-18 Time Machine*.
      **Consequences:** M-024 and the E-18 epic spec body use "Time Machine" / `FlowTime.TimeMachine` throughout. D-029's "headless foundation" language is historical and superseded by this entry for naming purposes only — the scope and ownership decisions in D-016 are unchanged. `ROADMAP.md`, `work/epics/epic-roadmap.md`, `CLAUDE.md`, and the boundary ADR under `docs/architecture/` are also synced to the new naming during M-024 wrap. The research note at `docs/research/flowtime-headless-integration.md` is historical and not renamed.
  - kind: decision
    id: D-032
    frontmatter:
      title: '`FlowTime.Generator` fate — Path B (extraction and deletion) in E-18'
      status: accepted
    body: |
      **Status:** active
      **Context:** `FlowTime.Generator` is today's shared orchestration layer between `FlowTime.Sim.Service` and `FlowTime.API`. It owns `RunOrchestrationService`, `RunArtifactWriter`, deterministic run ID logic, RNG seeding, dry-run/plan mode, and both simulation-mode and telemetry-mode code paths. Sim.Service depends on Generator (not Core) for execution. API depends on both Core and Generator. The Time Machine (`FlowTime.TimeMachine`, D-031) is a new E-18 component whose responsibilities overlap Generator's almost completely: compile, evaluate, artifact write, run IDs, RNG seeding, dry-run all appear on both sides. Keeping Generator alive alongside the Time Machine would create two shared orchestration layers doing the same pipeline, violating the no-coexistence discipline established in E-16 and E-19. M-024's shared framing originally left Generator's forward role implicit, which was a gap.
      **Decision:** Path B — extraction and deletion. In **E-18 m-E18-01a** (the dedicated Path B cut, see D-034 for the M-001 split rationale), all of Generator's execution-pipeline responsibilities are extracted into the new `FlowTime.TimeMachine` project: `RunOrchestrationService` becomes Time Machine Compile/Evaluate/ArtifactWrite operations, `RunArtifactWriter` becomes Time Machine canonical run directory writer (preserved unchanged in shape and clear-text-debuggable layout), `RunDirectoryUtilities` and `RunOrchestrationContractMapper` become Time Machine supporting infrastructure, deterministic run ID logic becomes Time Machine run identity, RNG seeding becomes Time Machine parameter/run configuration, simulation-mode code becomes the Time Machine evaluate path, and dry-run/plan mode is preserved as a concrete Time Machine capability (it later folds into tier 2 compile-only validation when m-E18-01b introduces the tiered validation surface — but that folding is m-E18-01b's job, not 01a's). Telemetry-generation code (`TelemetryBundleBuilder`, `TelemetryBundleOptions`, `TelemetryCapture`, `TelemetryGenerationService`, `CaptureManifestWriter`, `RunArtifactReader` from `Capture/`) is extracted alongside the execution code per D-033 — not as a parallel shared layer in the Time Machine, but as the Time Machine's concrete canonical bundle writer plus the concrete `CanonicalBundleSource` reader. In m-E18-01a these exist as concrete classes without an `ITelemetrySource` interface; the interface is introduced later in m-E18-01b. `FlowTime.Sim.Service` and `FlowTime.API` swap their Generator reference for `FlowTime.TimeMachine` (or `FlowTime.Core` directly where API only needs reads). The existing public surfaces `POST /telemetry/captures` and `flowtime telemetry capture` are re-wired to the new home with their request/response contracts unchanged. **`FlowTime.Generator` is deleted in the same milestone cut — no coexistence window.** Path A (rename/promote Generator to TimeMachine) and Path C (shrink Generator to authoring helper) are explicitly rejected: Path A muddles history and conflates rename-with-extend; Path C leaves Generator as a tiny one-consumer project not worth its own boundary. Path B is the cleanest separation.
      **Consequences:** E-18 m-E18-01a is a refactor-only milestone — same behavior, new home. The Time Machine ships in 01a with no new features beyond what Generator already does today; tiered validation (01b) and the runtime parameter foundation with reevaluation (01c) are sequenced as separate additive milestones on top, per D-034. E-18's success criteria gain a grep guard: `rg "FlowTime\.Generator" src/ tests/` returns zero matches after 01a. E-19 is unaffected — Generator is frozen and unchanged during E-19, and M-024's shared framing item 3 records Path B as the decided forward path. The canonical run directory layout at `data/runs/<runId>/` is preserved unchanged (clear-text, debuggable, in-place). Canonical bundle writing is preserved as a concrete capability via the same code that previously lived in Generator's `TelemetryBundleBuilder`. No change to `FlowTime.Core`, the canonical run.json contract, the canonical bundle schema, or the analytical surfaces purified by E-16. Path B is a project-boundary refactor, not a contract or data refactor. The transition window (E-19 → E-18 m-E18-01a) during which Sim.Service still uses Generator for execution is the same transitional execution host behaviour already recorded in A1; when 01a completes, Sim.Service's `/api/v1/orchestration/runs` endpoint is deleted in favour of direct UI-to-Time-Machine calls by default. A temporary thin facade is allowed only if a concrete technical migration constraint is documented in the owning E-18 milestone, with explicit removal criteria.
  - kind: decision
    id: D-033
    frontmatter:
      title: Telemetry as adapter concern; one canonical bundle format; ITelemetrySource introduced, ITelemetrySink 
        deferred
      status: accepted
    body: |
      **Status:** active
      **Context:** `FlowTime.Generator` is, despite its current "shared orchestration" role, originally and primarily a telemetry generator: it contains `TelemetryGenerationService`, `TelemetryBundleBuilder`, `TelemetryBundleOptions`, `TelemetryCapture`, `CaptureManifestWriter`, `RunArtifactReader` (under Capture/), and `GapInjector` (under Processing/). Today it produces canonical bundles in the format defined by E-15 (`model.yaml`, `manifest.json`, `series/`, CSV files; schema at `docs/schemas/telemetry-manifest.schema.json`) via `POST /telemetry/captures` and `flowtime telemetry capture`. The repo also has an unnumbered `telemetry-loop-parity` epic at `work/epics/telemetry-loop-parity/spec.md` that defines the **telemetry loop** as a 4-step round-trip (baseline run → capture bundle → replay → parity comparison) with established vocabulary: capture, replay, parity, baseline run, replay run. The Path B Generator extraction (D-019) needs an explicit answer for where Generator's telemetry-generation code goes and what the contracts look like.
      **Decision:** (1) Telemetry is an **adapter concern outside** the Time Machine. `FlowTime.TimeMachine` contains no external-telemetry-format-specific code (no Prometheus, no OTEL, no BPI event log parsing). External-format ingestion lives in adapter projects under `FlowTime.Telemetry.*`. (2) **Exception**: writing the **canonical bundle format** is a Time Machine **core capability**, not a pluggable adapter, because it serves the telemetry loop that is fundamental to FlowTime's bootstrap/self-consistency/AI-iteration use cases. Canonical bundle writing is a concrete `WriteCanonicalBundle` method on the Time Machine, not behind an interface. (3) **Two artifact kinds preserved**: the canonical run directory (`data/runs/<runId>/model/`, `series/`, `run.json`) is the in-place clear-text debugging surface, always written; the canonical bundle (`model.yaml`, `manifest.json`, `series/`, CSV) is the portable interchange format, written on demand. They are intentionally distinct, with different purposes and potentially different shapes. The bundle format may evolve independently of the run directory format if a future milestone decides interchange needs differ from in-place needs. (4) **`ITelemetrySource` is introduced** by E-18 m-E18-01b as the input contract (after m-E18-01a creates the concrete `CanonicalBundleSource` reader without an interface), with multiple implementations once 01b ships: `CanonicalBundleSource` (replay; lifted from concrete class to interface implementor), `FileCsvSource` (extracted from Core's existing `file:` references), and future Prometheus/OTEL/event-log source adapters delivered by M-003 (and E-15). The contract must carry enough metadata to round-trip the canonical bundle losslessly. (5) **`ITelemetrySink` is explicitly deferred** until a second sink format is required. Per the "don't create abstractions for one-time operations" principle, no sink interface is built on speculation. Canonical bundle writing is a concrete capability, not a pluggable sink. (6) **Path B telemetry extraction**: `TelemetryBundleBuilder`, `TelemetryCapture`, `TelemetryGenerationService`, `CaptureManifestWriter`, `RunArtifactReader` move into the Time Machine's canonical bundle writer and `CanonicalBundleSource`. `GapInjector` becomes an internal transform inside whichever adapter consumes it (or moves to the Telemetry Loop & Parity epic if it primarily drives parity tolerance tests). Existing `POST /telemetry/captures` API and `flowtime telemetry capture` CLI are re-wired to the new home without contract changes. (7) **The telemetry loop is a first-class use case** with three purposes: specification/bootstrap (generate target telemetry from a model to define what the real system must emit), self-consistency testing (round-trip parity), and AI iteration / model fitting (compare generated to observed real telemetry, adjust model, iterate). Round-trip consistency for the canonical bundle format is a hard requirement.
      **Consequences:** E-18 m-E18-01a (extraction cut, per D-032 and D-034) extracts the concrete canonical bundle writer and the concrete `CanonicalBundleSource` reader from Generator into the Time Machine, without an `ITelemetrySource` interface yet. E-18 m-E18-01b introduces the `ITelemetrySource` interface, lifts `CanonicalBundleSource` to implement it, adds `FileCsvSource` as a second implementation, and ships tiered validation. M-003 is reshaped from "Telemetry I/O" to "Telemetry Ingestion Source Adapters" — source-only adapters for real-world formats (Prometheus, OTEL, BPI, etc.), no Time Machine changes, no sinks. m-E18-04 (Optimization & Fitting) gains a hard prerequisite on the Telemetry Loop & Parity epic completing first. The parity harness, drift tolerance rules, and CI gating are explicitly out of E-18's scope and remain owned by the Telemetry Loop & Parity epic. The canonical run directory layout is preserved unchanged; canonical bundle writing is preserved as a Time Machine core capability via the same code that previously lived in Generator. E-15's canonical bundle schema is the alignment dependency. M-024's shared framing item 9 records this principle for downstream E-19 milestones to cite. Open question deferred to m-E18-01a detail design: the exact relationship between `TelemetryBundleBuilder`'s output and the canonical run directory layout (sub-question of how the bundle format derives from or differs from the run directory in concrete terms; the user has confirmed they are conceptually distinct artifacts with different purposes, so any shared shape is incidental rather than required).
  - kind: decision
    id: D-034
    frontmatter:
      title: Split E-18 m-E18-01 into 01a (Path B extraction), 01b (validation + source contract), 01c (parameter 
        foundation + reevaluation)
      status: accepted
    body: |
      **Status:** active
      **Context:** Earlier drafts of E-18 had M-001 carrying every foundation responsibility in one milestone: create `FlowTime.TimeMachine`, extract Generator's execution code, extract Generator's telemetry-generation code, delete Generator, design and implement `ITelemetrySource` contract, implement `CanonicalBundleSource` and `FileCsvSource`, build tiered validation (schema/compile/analyse) as first-class operations, design the shared runtime parameter foundation with stable parameter identity, and implement the reevaluation API. That bundle is realistically three distinct chunks of work with different natures (refactor / additive features / new design), tied together only by sharing the same target project. Sizing them as one milestone hides honest dependency structure and risks the milestone becoming impossible to ship in a single cut. The user explicitly asked whether the M-001 work could be split across additional milestones.
      **Decision:** Split M-001 into three sub-milestones: **01a — Time Machine Creation & Generator Extraction (Path B core cut).** Pure refactor: same behavior as today, new home. Creates `FlowTime.TimeMachine`, extracts execution-pipeline code and telemetry-generation code from Generator (per D-032 and D-033), updates Sim.Service and API references, re-wires `POST /telemetry/captures` and `flowtime telemetry capture` to the new home without contract changes, deletes `FlowTime.Generator`. No new features. Concrete `CanonicalBundleSource` exists without an `ITelemetrySource` interface. Dry-run/plan mode is preserved as a concrete capability. This is the no-coexistence cut Path B requires. **01b — Tiered Validation & Telemetry Source Contract.** Additive features on top of 01a. Defines the `ITelemetrySource` interface rich enough to round-trip the canonical bundle format losslessly. Refactors `CanonicalBundleSource` to implement `ITelemetrySource`. Introduces `FileCsvSource` (extracted from Core's existing `file:` reading) as a second implementation. Implements tiered validation (Tier 1 schema, Tier 2 compile, Tier 3 analyse) as first-class Time Machine operations callable identically from SDK, CLI, and sidecar — satisfying E-19 M-024 A6 (D-030). Folds the dry-run/plan capability inherited from 01a into Tier 2 compile-only validation. **01c — Runtime Parameter Foundation & Reevaluation.** The shared parameter model that E-17 also consumes: compiled parameter identities (stable handles into compiled graphs), parameter override surface, reevaluation API (compile once, evaluate many), optional enrichment contract for template-authored parameter metadata. Substantial new design work. Independent of 01b — could run in parallel after 01a — but listed sequentially in the milestone table for simplicity. Existing M-002 through M-003 are unchanged and depend on the union of 01a, 01b, and 01c being complete (see specific dependencies in each milestone).
      **Consequences:** E-18's milestone table is updated to list m-E18-01a, m-E18-01b, m-E18-01c as three rows. M-002 (Time Machine CLI/Sidecar) depends on 01a + 01b + 01c so it can expose validation and reevaluation through the surfaces. m-E18-03 (Sweep & Sensitivity) depends on 01c (parameter foundation, reevaluation). m-E18-04 (Optimization & Fitting) depends on 01c plus the Telemetry Loop & Parity epic. m-E18-05 (Chunked Evaluation) depends on the stateful execution seam (unchanged). M-003 (Telemetry Ingestion Source Adapters) depends on 01b (the `ITelemetrySource` contract). Body references in the E-18 spec to "M-001" are updated to point at the specific sub-milestone where each responsibility lives. D-032 and D-033 are updated to reference m-E18-01a as the extraction cut. M-024's shared framing item 3 (which says Path B happens in "the same E-18 milestone") still reads correctly because m-E18-01a is that milestone — but if downstream E-19 work needs to cite a specific sub-milestone, it should cite 01a. Splitting does not introduce a coexistence window: 01a is still a single no-coexistence cut, and 01b/01c are additive on top of an already-clean Time Machine without Generator.
  - kind: decision
    id: D-035
    frontmatter:
      title: E-19 shared framing locks the current component roles without renames
      status: accepted
    body: |
      **Status:** active
      **Context:** M-024 needed one authoritative framing for current cleanup so every later deletion or retention call used the same component boundaries.
      **Decision:** No project renames happen in E-19. `FlowTime.Core` remains the pure evaluation library, `FlowTime.API` remains the query/operator surface over canonical runs, `FlowTime.Sim.Service` remains the template authoring surface plus transitional first-party execution host, and `FlowTime.TimeMachine` remains the E-18-owned replacement execution component. Forward-only cleanup deletes obsolete first-party endpoints outright rather than preserving 410, redirect, or advisory tombstone stubs. See `work/epics/E-19-surface-alignment-and-compatibility-cleanup/m-E19-01-supported-surface-inventory.md` and `docs/architecture/supported-surfaces.md`.
      **Consequences:** E-19 narrows current surfaces without redefining the long-term component split. Cleanup milestones cite the shared framing rather than inventing local boundary language.
  - kind: decision
    id: D-036
    frontmatter:
      title: Sim orchestration remains a first-party UI-only bridge until the Time Machine ships
      status: accepted
    body: |
      **Status:** active
      **Context:** `POST /api/v1/orchestration/runs` is the live first-party UI path today, but letting it attract new callers would turn a transitional Sim host into a support obligation.
      **Decision:** Keep Sim orchestration only as a first-party UI bridge. `/api/v1/orchestration/runs` remains supported for Blazor and Svelte, `/api/v1/drafts/run` remains only as the narrower inline-YAML path, no new non-UI callers land on either surface, and both are deleted by default when the Time Machine ships unless an E-18 milestone documents a concrete temporary facade requirement.
      **Consequences:** M-025 narrows `drafts/run` to inline-only, but the final sunset belongs to E-18. New programmable or external integration work must not target Sim orchestration.
  - kind: decision
    id: D-037
    frontmatter:
      title: Stored drafts are retired; only the inline run path may survive temporarily
      status: accepted
    body: |
      **Status:** active
      **Context:** Stored draft CRUD has no supported first-party UI caller. The only live reason to keep `drafts/run` is the explicit inline-YAML “run this now” path.
      **Decision:** Retire stored drafts entirely in M-025. Delete `/api/v1/drafts` CRUD, `StorageKind.Draft`, and `data/storage/drafts/`. Keep only the inline-source `POST /api/v1/drafts/run` path until the Time Machine replacement is ready.
      **Consequences:** Draft persistence is no longer treated as a product promise. If model versioning is wanted later, it must be designed against compiled/runtime identity rather than resurrecting stored drafts.
  - kind: decision
    id: D-038
    frontmatter:
      title: Sim-side archived run bundles and bundle refs are retired from the current surface
      status: accepted
    body: |
      **Status:** active
      **Context:** Sim still writes ZIP/archive bundle residue under `data/storage/runs/` and returns `bundleRef`, but there is no production caller using that archive layer as the real run contract.
      **Decision:** Delete the Sim-side archived run-bundle layer in M-025. Remove ZIP writes to `data/storage/runs/`, remove `bundleRef`/`StorageRef` return values from orchestration responses, and keep the canonical run directory under `data/runs/<runId>/` as the runtime truth.
      **Consequences:** Canonical runs remain the first-party runtime/query artifact. Portable bundle writing survives only as the deliberate E-18 Time Machine capability, not as a current Sim-side archive product surface.
  - kind: decision
    id: D-039
    frontmatter:
      title: Engine bundle-import branches and POST /v1/runs are deleted outright
      status: accepted
    body: |
      **Status:** active
      **Context:** `POST /v1/runs` still carries bundle-import branches that only tests exercise. Preserving the route only to return a rejection stub would still keep a legacy endpoint alive for advisory purposes, which conflicts with the repo's forward-only cleanup rule.
      **Decision:** Delete bundle-import branches from `POST /v1/runs` in M-025 and delete the route itself. No 410-style rejection stub is retained. More generally, E-19 cleanup milestones do not preserve obsolete first-party endpoints solely to tell callers where behavior moved.
      **Consequences:** Current runtime ownership becomes clearer because dead routes disappear instead of lingering as migration hints. If cross-environment import returns later, it must come back as an explicitly designed Time Machine concern instead of surviving as unowned residue.
  - kind: decision
    id: D-040
    frontmatter:
      title: Catalog surfaces are retired from current first-party support
      status: accepted
    body: |
      **Status:** active
      **Context:** Catalog endpoints and UI helpers survive mostly as mock/default residue. Active first-party callers already behave as if catalogs are not used.
      **Decision:** Delete catalog endpoints, services, UI selectors, placeholder `catalogId` plumbing, and `data/catalogs/` usage in M-025.
      **Consequences:** No current first-party caller is allowed to rely on catalogs. If catalog-like behavior is wanted later, it must be redesigned from a real use case rather than preserved through zombie endpoints.
  - kind: decision
    id: D-041
    frontmatter:
      title: Blazor and Svelte stay parallel supported UIs without parity requirements
      status: accepted
    body: |
      **Status:** active
      **Context:** E-19 needed an explicit UI support policy so cleanup work would not silently turn into Blazor retirement or parity gating.
      **Decision:** Keep Blazor and Svelte as parallel supported first-party UIs. Shared contract changes must keep both functional, but feature parity is not required. Blazor-specific debugging/operator workflows remain supported, and cleanup work should remove stale wrappers rather than supported capabilities.
      **Consequences:** M-027 focuses on stale-wrapper removal and contract alignment, not UI retirement. Svelte is not blocked on missing Blazor features, and Blazor is not required to preserve deprecated compatibility paths.
  - kind: decision
    id: D-042
    frontmatter:
      title: Defer `POST /v1/run` and `POST /v1/graph` deletion out of m-E19-02 (AC6 scope narrowing)
      status: accepted
    body: |
      **Status:** active
      **Context:** M-024 A5/matrix scheduled `POST /v1/run` and `POST /v1/graph` for deletion in M-025 on the premise that they are not used by first-party UIs. The audit was route-level and UI-call-site-level; it did not inspect test-file coupling. During M-025 implementation (2026-04-08), grep showed 50 `POST /v1/run` call sites and 2 `POST /v1/graph` call sites across 9 Engine test files (`ProvenanceHashTests`, `ProvenanceHeaderTests`, `ProvenanceEmbeddedTests`, `ProvenancePrecedenceTests`, `ProvenanceStorageTests`, `ProvenanceQueryTests`, `Legacy/ApiIntegrationTests`, `ParityTests`, `CliApiParityTests`). These are the primary run-creation mechanism for Engine-side runtime provenance, CLI ↔ API parity, and legacy integration coverage — directly adjacent to the E-16 purity work that E-19 is built on. Deleting the routes in this milestone would either regress ~50 provenance/parity tests (forward-only test deletion — unacceptable coverage loss) or pull substantial test-migration work that is out of scope for a runtime-cleanup milestone.
      **Decision:** Scope M-025 AC6 down to deleting `GET /v1/debug/scan-directory/{dirName}` only (a genuine zombie route with no callers). Defer `POST /v1/run` and `POST /v1/graph` deletion out of M-025. Retain them as a transitional test-infrastructure surface until the Provenance/Parity/Legacy test suites are migrated to an alternative run-creation path — either a test-only in-process adapter over `Graph.Evaluate` / `RunOrchestrationService` or the supported Sim orchestration endpoint with template fixtures. Update the supported-surfaces matrix row from `delete m-E19-02` to `transitional / deferred (see work/gaps.md)`. Record the deferral and resolution path in `work/gaps.md`. No 410-style rejection stub is added now or later — when deletion eventually happens, it is forward-only per D-039.
      **Consequences:** M-025 ships with 9 ACs executed and AC6 explicitly narrowed; the milestone does not reach `delete` status on `/v1/run` and `/v1/graph`. A follow-up unit of work (candidate name `m-E19-02a-engine-runtime-route-retirement`) must land the test migration before the routes can be removed. This decision also documents a process learning: the M-024 audit was route-level and UI-call-site-level, which is insufficient for runtime-cleanup scope locking — future inventory milestones should include a test-file sweep when an audit row implies route deletion. No new callers should land on `/v1/run` or `/v1/graph` in the interim; new provenance tests should use an in-process path rather than HTTP.
  - kind: decision
    id: D-043
    frontmatter:
      title: Matrix engine provenance — port basics, defer Sim-specific, explore plan hashing later
      status: accepted
    body: |
      **Status:** active
      **Context:** The C# engine has a provenance system (provenance.json, manifest.json with SHA256 hashes, template/parameter tracking) tightly coupled to the Sim→Engine→UI workflow. The Rust matrix engine (E-20) needs a provenance strategy. The plan-as-data representation opens new possibilities — plan hashing would make provenance structural rather than textual.
      **Decision:** Port the basics now (SHA256 of model YAML, per-series hashes in manifest.json) as part of the .NET bridge work. Do NOT port Sim-specific provenance (template IDs, parameter bindings, generatedAt) until the bridge is wired up and Sim actually calls the Rust engine. Plan hashing (two models with different YAML but identical plans get the same hash) is deferred to E-17/E-18 where incremental evaluation makes it meaningful.
      **Consequences:** The Rust engine can produce deterministic, verifiable output (model hash + series hashes) without coupling to the Sim authoring workflow. The bridge patch adds hashing. Sim-specific provenance fields are added when the bridge is exercised by real Sim runs. Plan hashing is a research item for the incremental evaluation milestone.
  - kind: decision
    id: D-044
    frontmatter:
      title: Rust engine architecture — evaluation vs. artifact sink vs. consumer adapters
      status: accepted
    body: |
      **Status:** active
      **Context:** The Rust matrix engine (E-20) currently produces a minimal artifact set (series CSVs, index.json, run.json, manifest.json) via its `writer.rs`. The C# `RunArtifactWriter` (1,287 lines) produces a much richer layout (model/, series/ with per-class CSVs, spec.yaml, provenance.json, metadata.json, aggregates/) but conflates evaluation, class decomposition, invariant analysis, topology normalization, and file writing into one call. For E-17/E-18 (interactive what-if, headless pipelines, parameter sweeps, streaming), the engine must work as a pure function called many times without mandatory file I/O on each call. But artifacts are not optional — they provide durability (crash recovery), audit (what ran, when, with what), and reproducibility (replay from stored input).
      **Decision:** Three-layer architecture with a structured boundary between each:

      1. **Engine core (Rust, pure function).** `eval(model, params) → EvalResult`. Owns: compilation, evaluation, invariant analysis, class decomposition, edge series materialization. No side effects. Deterministic and reproducible. The `EvalResult` struct is the complete output: series values, per-class series, edge series, warnings, grid info, column map, plan metadata.

      2. **Artifact sink (Rust library, mandatory but pluggable).** `sink.write(model_input, eval_result) → ()`. Owns: directory layout, file hashing, manifest stamping, provenance attachment, atomic writes. Guarantees: crash-safe (each result persisted before next eval starts in pipeline mode), auditable, replayable. Backend is pluggable (filesystem now, S3/database future) but the sink itself is not optional in production — it is the durability guarantee. The sink receives the model input and the EvalResult; it never calls the engine.

      3. **Consumer adapters (Rust or C#, per surface).** Read from artifacts or from in-flight EvalResult. Own: JSON API responses, websocket push, CSV export, pipeline array formatting, UI state projection. Adapters are optional and surface-specific.

      The existing `writer.rs` in the Rust CLI is the first artifact sink implementation (filesystem backend, CLI-scoped). The C# `RunArtifactWriter` is the current production sink (richer schema, provenance, classes) but will be replaced once the Rust engine core returns complete EvalResults including per-class and edge series.

      **Consequences:**
      - Rust engine core gaps (per-class decomposition, edge series, `outputs:` filtering) are evaluation-layer work and must land before E-17/E-18.
      - Artifact layout gaps (model/ dir, spec.yaml, metadata.json, provenance.json, per-class CSV naming, full index.json schema) are sink-layer work. The sink can be built incrementally as the engine core returns richer EvalResults.
      - The C# `RunArtifactWriter` remains the production sink until the Rust sink reaches parity. No premature deletion.
      - For E-18 pipeline mode: `compile(model) → Plan; for params in sweep: eval(plan, params) → EvalResult; sink.write(...); yield to consumer`. The sink writes each result as it arrives — crash at iteration N means N-1 results are persisted. The sink and consumer run in parallel on the same EvalResult.
      - `StateQueryService` reads artifacts produced by whichever sink wrote them. The directory layout contract is shared between sinks and consumers, not owned by the engine core.
  - kind: decision
    id: D-045
    frontmatter:
      title: Svelte UI fork — platform for all new telemetry/fit/discovery surfaces; Blazor enters maintenance mode
      status: accepted
    body: |
      **Status:** active
      **Context:** Through E-11 (Svelte UI M1-M4 + M6), E-17 (Interactive What-If on Svelte), and the E-18 analysis endpoints (`/v1/sweep`, `/v1/sensitivity`, `/v1/goal-seek`, `/v1/optimize`, `/v1/validate`), Svelte proved itself the faster and more expressive surface for expert modeling UX: tighter density, better data-viz story, direct ownership of dag-map, and a cleaner path to WebSocket/streaming protocols. Meanwhile the remaining Blazor backlog (E-11 M5 Inspector, M7 Dashboard, M8 Polish) would either duplicate Svelte work or deliver against paradigms (overlay feature-bar) we now consider inferior to the workbench paradigm. D-028 and D-041 previously kept Blazor as an equal parallel UI without parity requirements; with the E-18 analysis surfaces still UI-less and the expert authoring / telemetry / fit roadmap ahead, it is no longer efficient to build new features twice.
      **Decision:** As of 2026-04-15, Svelte UI is the **primary platform** for all new surfaces: workbench/topology evolution, Time Machine analysis (sweep, sensitivity, goal-seek, optimize, validate), telemetry ingestion, model fit, heatmap view, validation surface, and any future expert authoring or discovery work. Blazor UI enters **maintenance mode** — aligned with current Engine/Sim contracts (bug fixes, contract syncs) but no new feature work. E-11 is paused after M6 as a completed historical track: M5 (Inspector) and M8 (Polish) absorb into E-21 (workbench paradigm + polish milestone); M7 (Dashboard) is deferred — the workbench + heatmap views cover the same ground more precisely. New Svelte work is tracked under E-21 — Svelte Workbench & Analysis Surfaces.

      **Active post-fork delivery sequence (Option A, locked 2026-04-15):**
      1. M-010 SessionModelEvaluator (complete, merged)
      2. M-011 .NET Time Machine CLI (complete, merged)
      3. E-21 Svelte Workbench & Analysis Surfaces (in-progress) — the UI parity fork
      4. E-15 Telemetry Ingestion — Gold Builder → Graph Builder → first dataset path
      5. Telemetry Loop & Parity — parity harness (prerequisite for trustworthy fit)
      6. m-E18-XX Model Fit — `FitSpec`/`FitRunner`/`POST /v1/fit` composing `ITelemetrySource` + `Optimizer`
      7. Chunked evaluation (Mode 6) — after the discovery pipeline works end-to-end

      **Consequences:**
      - Supersedes D-028 and D-041: Blazor is no longer a parallel-supported UI for new features; it remains supported for current functionality only.
      - E-21 is now the only integration branch for expert-workbench work; Blazor equivalents will not be built. Feature requests that target Blazor are rejected unless they are bug fixes or contract syncs.
      - Epic sequence lock: m-E18-XX Model Fit does not start until E-15 and Telemetry Loop & Parity have completed, because optimization against real telemetry requires measured drift bounds.
      - Ownership shift: dag-map, density tokens, color architecture, TimelineScrubber, and the workbench-panel paradigm are Svelte-only design surfaces going forward. Blazor does not adopt them.
      - `FlowTime.UI` (Blazor) remains in the repo and in CI; removal is not in scope of any current epic.
      - When a Blazor-era doc or decision references "parallel UI" semantics, treat it as superseded by this decision.
  - kind: decision
    id: D-046
    frontmatter:
      title: E-21 admits read-only run-adjacent model YAML endpoint under run-read surface
      status: accepted
    body: |
      **Status:** active
      **Context:** E-21 — Svelte Workbench & Analysis Surfaces declared `Backend API changes — Svelte UI is a pure consumer` in its epic spec (Scope → Out of Scope and Constraints). During M-040 (Sweep & Sensitivity Surfaces) implementation, the `/analysis` route needs to discover sweepable parameters (const nodes) from a selected run's model YAML. There is no existing endpoint that returns a run's model YAML. Alternatives considered:
      1. Second Sim/artifact round-trip to reconstruct the model path — brittle, tightly couples the UI to artifact directory layout and requires multi-call orchestration for a trivial read.
      2. Upload the YAML from the client — defeats the "pick a run, discover its params" UX and requires the user to keep the YAML synchronized with the stored run.
      3. Server-side `/v1/runs/{runId}/params` endpoint — pushes YAML-parse logic into the server for no material gain over static-file serve.

      The chosen fix is a tiny read-only endpoint that serves the already-persisted `model/model.yaml` for a given run — no compute, no new authoring surface, no new write path. It is directly analogous to the existing run-read surface (run manifest, series CSVs, provenance) and should be classified the same way.
      **Decision:** Admit `GET /v1/runs/{runId}/model` into the supported first-party surface. Treat it as a **read-only run-adjacent endpoint**, not as a new functional feature. Revise the E-21 Scope and Constraints to permit read-only run-adjacent endpoints strictly necessary to consume existing run artifacts; authoring, write, and compute endpoints remain Out of Scope for E-21. This narrow widening applies only to E-21 and only to endpoints that serve artifacts already produced by the engine for a given run.
      **Consequences:**
      - E-21 epic spec Scope → Out of Scope and Constraints are updated to reflect the carve-out; future E-21 milestones may add similar read-only run-adjacent endpoints without needing a new decision, provided they strictly serve existing artifacts.
      - Authoring, orchestration, sweep/optimize/goal-seek/validate compute endpoints, telemetry sinks, and any write-path additions remain out of scope for E-21 and would each need their own decision record.
      - Client-side YAML parsing in the UI (`js-yaml` dependency added by M-040) is accepted as the default: adequate for typical model sizes; a promote-to-server `/v1/runs/{runId}/params` endpoint is possible future work if browser parsing proves fragile.
      - The path-traversal finding in `work/gaps.md` ("Ultrareview findings on `epic/E-21-svelte-workbench-and-analysis` 2026-04-20", Finding 1) applies to this endpoint and to the four sibling endpoints on the same pattern. The shared `GetRunDirectorySafe` helper should cover all five call sites in one pass; this decision does not defer that fix.
  - kind: decision
    id: D-047
    frontmatter:
      title: Additive `trace` field on `/v1/goal-seek` and `/v1/optimize`
      status: accepted
    body: |
      **Status:** active
      **Context:** E-21 epic constraints (Scope / Constraints) restrict UI-side backend work to read-only run-adjacent endpoints per D-046; compute-endpoint shape changes require their own decision. The `/v1/goal-seek` and `/v1/optimize` endpoints already compute per-iteration state (bisection midpoints; Nelder-Mead per-iteration best vertex) and discard it before returning. The Svelte analysis surface needs that state to show users the shape of the search, not just the final number. M-011's .NET Time Machine CLI will want the same information in JSON mode.
      **Decision:** Add an additive `trace` field to both response shapes. For `/v1/goal-seek`, the trace is an ordered list of `{ iteration, paramValue, metricMean, searchLo, searchHi }` entries — two `iteration: 0` boundary evaluations followed by one entry per bisection step with the post-step bracket; when the target is not bracketed the trace contains only the two boundary entries. For `/v1/optimize`, the trace is an ordered list of `{ iteration, paramValues, metricMean }` entries recorded after each per-iteration sort so `paramValues` is the current best vertex and `metricMean` is its unsigned mean (the internal minimize-sign flip is reversed at record time for maximize runs); `iteration: 0` is the initial simplex's best vertex after the pre-loop sort, `iteration: 1..N` are the post-iteration bests. Request shapes, validation rules, 400/503 behaviour, and the existing `paramValue(s)` / `achievedMetricMean` / `converged` / `iterations` fields remain unchanged. The trace captures per-iteration best state only — not the raw per-evaluation probe log.
      **Consequences:** M-041 implements the trace plumbing through `GoalSeeker`, `Optimizer`, and the endpoint response records; existing API tests gain trace-shape assertions; the .NET CLI passthroughs inherit the field for free via the existing JSON pipe-through. Backwards compatibility: additive only — existing consumers that ignore unknown fields continue to work. The E-21 epic spec Scope / Constraints section is updated to reference this decision alongside D-046 as the two explicit carve-outs from "Svelte UI is a pure consumer."
      **Out of scope of this decision:** the per-evaluation probe log (reflection / expansion / contraction / shrink intermediate vertices); any change to `/v1/sweep`, `/v1/sensitivity`, or other compute endpoints.
  - kind: decision
    id: D-048
    frontmatter:
      title: E-23 Model Validation Consolidation — delete `ModelValidator`, do not delegate
      status: accepted
    body: |
      **Status:** active
      **Context:** Mid-session during M-044 Validation Surface scoping, an evidence-gathering survey (test at `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs`) discovered that every one of the twelve current templates produces tier-3 validation errors (`/grid/start: All values fail against the false schema`) under `TimeMachineValidator.Validate(..., ValidationTier.Analyse)` while every template also runs successfully under `POST /v1/run`. Root cause: two validators with overlapping scope silently disagreeing — `ModelValidator.Validate` (hand-rolled, imperative, uses `.IgnoreUnmatchedProperties()`, does not consult the schema; called from `POST /v1/run`) and `ModelSchemaValidator.Validate` (reads `docs/schemas/model.schema.yaml` and runs full JSON-schema evaluation; called from `POST /v1/validate` via `TimeMachineValidator`). Git history shows `ModelValidator` landed in `6432057 feat(core): implement schema validation (M2.9 Phase 2 Step 2)` as the pre-schema home-rolled checker; `ModelSchemaValidator` was added later once the JSON schema existed. The migration to schema-first was never completed — the two validators coexist, and the schema forbids `grid.start` which Sim deliberately emits (`SimModelBuilder.cs:34-36` copies `window.start` into `grid.start`) and the Engine's `ModelParser.cs:62` consumes (Blazor's time-travel UX and Svelte's `StateWindowResponse.timestampsUtc` both depend on this chain, so removing `grid.start` from Sim would regress both UIs). The failure mode is strictly worse than "two schemas drift apart" — one authoritative schema exists, but a parallel hand-rolled validator covers the same contract surface and silently disagrees. This directly violates the Truth-Discipline guard in `.ai-repo/rules/project.md`: *"Do not restate a canonical contract in many places from memory — point to the owning doc."*
      **Decision:** Promote the cleanup to a first-class mini-epic **E-23 Model Validation Consolidation** with three milestones (M-046 Schema Alignment, M-047 Call-Site Migration, M-048 Delete `ModelValidator`). Endpoint: `ModelSchemaValidator.Validate` is the **only** validator in the codebase for model YAML. `ModelValidator` is **deleted outright**, not delegated — per user instruction and the 2026-04-23 "API stability does not mean keep old functions around" guard. Every rule currently enforced by `ModelValidator` (schemaVersion const, legacy-field rejection for top-level `arrivals`/`route`, required `grid`, etc.) is expressed declaratively in `docs/schemas/model.schema.yaml`. Schema is updated to allow `grid.start` as an optional ISO-8601 string so it matches runtime reality. `SimModelBuilder`'s `window.start → grid.start` copy is unchanged (Sim is correct as-is). E-21 Svelte Workbench is paused at M-043 (complete on milestone branch, merge-to-epic deferred) to prioritise E-23 — M-044 Validation Surface becomes the reentry point and consumes the consolidated validator. Survey test is committed to `main` as a bootstrap canary BEFORE E-23 milestones start so the test history predates the cleanup and the red-to-green transition is visible across the epic's commit series. Sibling-checkout grep of `/workspaces/flowtime-sim-vnext` for `ModelValidator` references returned zero hits — deletion is safe for the sister repo. In-repo grep shows 85 `ModelValidator` references across `*.cs` / `*.md` files that M-047 will migrate. Rejected alternative: delegation (`ModelValidator.Validate` wraps `ModelSchemaValidator.Validate`) — fails the "API stability ≠ keep old functions around" guard and preserves the shape of the coexistence problem.
      **Consequences:** E-21 pauses; M-044 Validation Surface cannot plan active pre-run validation until E-23 lands, but the passive run-warning path it already had is unaffected. All 85 in-repo `ModelValidator` call sites migrate to `ModelSchemaValidator` in M-047. The `docs/schemas/model.schema.yaml` file becomes load-bearing for every validation decision — when a rule needs changing (e.g. adding a new required field, banning a new legacy shape), it is a schema edit, not a code edit. Error-message phrasing changes slightly (`ModelSchemaValidator` produces `/path: <rule failure>` messages vs `ModelValidator`'s hand-rolled strings); tests that assert on exact messages need a one-time reconciliation in M-047. The survey test `TemplateWarningSurveyTests` is a permanent regression guard for any future validator drift — if a new validator appears, or if Sim and the schema drift again, the survey's per-template `val-err` column flags it immediately.
  - kind: decision
    id: D-049
    frontmatter:
      title: E-23 paused; E-24 Schema Alignment created to deliver foundational schema-reality convergence
      status: accepted
    body: |
      **Status:** active
      **Context:** During M-046 Schema Alignment, the bisection-style investigation across the twelve templates under `templates/*.yaml` surfaced **16 distinct schema-vs-reality error shapes** (726 total validator errors), only one of which — `/grid/start: All values fail against the false schema` — the E-23 epic context had anticipated. The root causes cluster into five classifications, not a single "add missing field" pattern:

      1. **Architectural seam (4 shapes, 48 errors):** `SimModelArtifact` is serialized directly as the `POST /v1/run` payload, mixing Sim-bundle traceability fields (`window`, `mode`, `metadata`, `generator`) with the Engine submission shape. The schema's root `additionalProperties: false` rejects them correctly; the defect is the conflation, not the schema.
      2. **Systematic rule violation (4 shapes, 72 errors):** The `provenance` block in `docs/schemas/model.schema.yaml` declares snake_case field names (`generated_at`, `model_id`, `template_id`, `template_version`) while Sim's `SimProvenance` emits camelCase via YamlDotNet default conventions. Sim, the Engine reader, and the project rule ("JSON payloads and schemas use camelCase") all agree with camelCase; the schema is the inconsistent surface.
      3. **Validator defect (4 shapes, ~231 errors):** `ModelSchemaValidator.ParseScalar` (`src/FlowTime.Core/Models/ModelSchemaValidator.cs:222-246`) and the mirrored `TemplateSchemaValidator.ParseScalar` (`src/FlowTime.Sim.Core/Templates/TemplateSchemaValidator.cs:173-197`) both coerce quoted numeric literals (e.g. `expr: "0"`) to JSON integers before schema evaluation, then fail the `type: string` declaration. YAML 1.2 node resolution distinguishes `ScalarStyle.Plain` (coercible) from quoted/block styles (must resolve as string); the validators ignore the distinction. Prior art for the fix exists at `src/FlowTime.Core/Models/ParallelismReference.cs:97`.
      4. **Emitter drift (2 shapes, 375 errors):** Sim's `EnsureSemanticsOutputs` auto-adds `outputs[]` entries shaped `{id, series}` while the schema requires `{series, as}` with `as` as the required filename — this single method produces 366 of the 495 non-C-defect errors (74% of non-defect noise). Separately, Sim emits `classes: []` for templates with no class definitions while the schema declares `classes: minItems: 1` (9 errors).
      5. **Emitter redundancy (1 shape):** `SimProvenance` emits `schemaVersion` inside the provenance block in addition to the top-level `schemaVersion`, and `provenance.mode` duplicates top-level `mode`.

      Applying the user's explicit direction — **"absolutely correct, future-proof. No fixes because they are easy. Do the right thing."** — requires per-field design decisions on the correct resolution side (schema / Sim emitter / Engine parser / validator). This is substantially broader than E-23's consolidation thesis, which assumed the divergence was a single missing schema field and could be fixed by schema-widening alone. The survey agent that produced the evidence is `a07d52c12dcaf3538`; the full-shape audit is captured at `work/epics/E-23-model-validation-consolidation/m-E23-01-schema-alignment-tracking.md` → "AC4 canary re-run, full-shape audit (2026-04-24)".

      **Decision:** Pause E-23 at M-046 and promote the foundational convergence work to a new epic **E-24 Schema Alignment** (`work/epics/E-24-schema-alignment/spec.md`) with six milestones: M-049 Inventory & Design Decisions (doc-only), M-050 Engine Submission Payload Separation (architectural), M-051 Schema Realignment (camelCase + decided shapes), M-052 Sim Emission Discipline (emitter corrections), M-053 Parser/Validator Scalar-Style Fix (mirrored in both validators), m-E24-06 Canary Green + Hard Assertion (close + E-23 resume gate). The uncommitted M-046 artefacts on branch `milestone/m-E23-01-schema-alignment` (three schema edits: `grid.start`, `nodes[].metadata`, `nodes[].source`; two `work/gaps.md` entries; the tracking doc) are stashed as preserved input material for M-049 — each schema edit is re-examined in M-049 under the foundational framework before any survives into M-051. E-23 resumes after E-24 closes; at that point M-047 (call-site migration) and M-048 (`ModelValidator` delete) become byte-trivial because `ModelSchemaValidator`, the schema, Sim's emitter, and the Engine's reader will actually agree. E-24 integration branch `epic/E-24-schema-alignment` created from `main`; milestone specs drafted; status surfaces reconciled.

      **Consequences:** E-24 is the active epic. E-23 enters `paused` with `depends_on: E-24-schema-alignment`. M-046 spec remains `in-progress` in its frontmatter on the `milestone/m-E23-01-schema-alignment` branch (as stashed) — reconciliation of that file's status to `paused (pending E-24)` happens whenever the branch is next touched. Every foundational divergence identified by the survey gets a design decision recorded in M-049 before any code, schema, or emitter change lands. The "easy option" (schema pass-through widening) is explicitly rejected in favour of emitter correction or architectural separation on a per-field basis. The canary `TemplateWarningSurveyTests` promotes from informational diagnostic to hard-asserting regression guard at m-E24-06's close; a non-zero `val-err` thereafter is a failing build. Downstream: M-044 Validation Surface consumes the consolidated validator once both E-24 and E-23 close; E-15 Telemetry Ingestion starts from a ratified `nodes[].source` forward contract rather than inheriting a forward-declared placeholder. This decision directly applies the 2026-04-23 Truth Discipline guard at the schema layer: schema does not become a place where semantics live without Engine consumers; compatibility shims (snake_case aliases, `SimModelArtifact` on the wire, dual-shape acceptance) are rejected the same way they were rejected for validator delegation.
  - kind: decision
    id: D-050
    frontmatter:
      title: E-24 internal planning — Option E (unify) ratified over Option A (two types + projection)
      status: accepted
    body: |
      **Status:** active
      **Context:** The initial E-24 draft (D-049) scoped six milestones around **Option A**: preserve `SimModelArtifact` and `ModelDefinition` as two distinct types, introduce a projection layer (`SimModelArtifact.ToEngineSubmission()`), and let the schema describe only the submission payload. A follow-on investigation into `SimModelArtifact`'s purpose (agent `a5aa3dfe26394aff5`) established that the two-type split was accidental, not designed: `SimModelArtifact` was introduced in commit `ce9ec9e` (Oct 2025) shaped to the template schema rather than to `model.schema.yaml` (which predated it by a month and already described what the Engine consumes); `docs/schemas/README.md:34` claims parity that the code does not deliver; no C# type boundary exists between the two shapes — the only interface is a YAML string; each feature addition since has paid a duplication tax (e.g. commit `51a99b9` added classes to both types in the same commit, +23 / +28 lines). The only field with genuine dual concern is `provenance`, and both sides already agree on the keys, they just disagree on casing. Option A would have preserved the accidental split, converted the leak into a designed feature, and accepted the ongoing duplication tax.

      **Decision:** Within E-24 planning, ratify **Option E: unify**. Collapse `SimModelArtifact` and `ModelDefinition` into a single unified post-substitution model type. One C# type. One YAML schema (`docs/schemas/model.schema.yaml`) describing it. One validator (`ModelSchemaValidator`) validating it on both sides. `Template` (authoring-time, pre-substitution) stays distinct — that separation is load-bearing. Forward-only — no migration of stored bundles; Sim regenerates from templates going forward. camelCase throughout per project rule. E-24's milestone count collapses from six to five:

      1. **M-049 Inventory & Design Decisions** (doc-only) — unchanged in concept, refreshed to record per-field decisions under the unification framework and to resolve six open questions (unified-type home, unified-type name, `outputs[].as` semantics, `nodes[].source` forward contract, provenance shape, canary variant).
      2. **M-050 Unify Model Type** (architectural, largest milestone) — replaces the prior "Engine Submission Payload Separation" milestone. Introduces the unified type, rewrites `SimModelBuilder` to emit it directly, switches Engine intake to parse it directly, deletes `SimModelArtifact` and satellites (`SimNode`, `SimOutput`, `SimProvenance`, `SimTraffic`, `SimArrival`, `SimArrivalPattern`), drops leaked-state fields from emission, regenerates fixtures.
      3. **M-051 Schema Unification** (schema) — rewrites `docs/schemas/model.schema.yaml` to describe the unified type in camelCase, rewrites `docs/schemas/README.md`, audits `docs/architecture/`.
      4. **M-052 Parser/Validator Scalar-Style Fix** (validator) — unchanged in concept, renumbered from M-053. Independent of unification.
      5. **M-053 Canary Green + Hard Assertion** (close) — unchanged in concept, renumbered from m-E24-06. E-23 resume gate.

      The old M-052 "Sim Emission Discipline" is absorbed into the new M-050 (emitter changes fall out of building the unified type directly).

      **Consequences:** E-24 now has five milestones, not six. The epic spec is rewritten around Option E framing (spec.md at epic-branch tip reflects this decision). M-049 ratifies the ADRs: **ADR-E-24-01 Unify the post-substitution model type**, **ADR-E-24-02 Forward-only regeneration**, **ADR-E-24-03 Schema declares only consumed fields**, **ADR-E-24-04 (candidate) `ScalarStyle.Plain` gates numeric/boolean coercion in `ParseScalar`**. The unified type absorbs every currently-used field across both old types (minus leaked state); the final field list is named in M-049 before M-050 starts. `SimModelArtifact` and its satellite types are deleted outright in M-050 per Truth Discipline — no coexistence window, no transitional dual-type state. Forward-only stance means every test fixture and sample bundle authoring the old two-type shape is regenerated in M-050; any fixture that cannot be regenerated is deleted rather than patched. Under unification, the M-046 "architectural seam" (48 errors) and "emitter redundancy" (1 shape) classifications collapse entirely; "emitter drift" (375 errors) collapses because `outputs[]` shape is owned by the unified type's serializer; "systematic rule violation" (72 errors) collapses with the schema rewrite; "validator defect" (~231 errors) survives to M-052 as planned. E-23 pause and M-047/M-048 dependencies remain unchanged; at E-24 close both become mechanical cleanup because `ModelSchemaValidator`, the schema, Sim's emitter, and the Engine's reader will literally share a single type definition. Investigation agent: `a5aa3dfe26394aff5`. Survey agent (upstream context): `a07d52c12dcaf3538`.
  - kind: decision
    id: D-051
    frontmatter:
      title: E-24 Schema Alignment closed; E-23 Model Validation Consolidation ready to resume
      status: accepted
    body: |
      **Status:** active
      **Context:** E-24 ran five milestones across two days (started 2026-04-24, closed 2026-04-25). Each milestone landed all of its ACs as drafted; the final canary survey collapsed from 726 → 0 validator errors at `ValidationTier.Analyse` across all twelve shipped templates. M-053 (final milestone) promoted `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs::Survey_Templates_For_Warnings` from an informational diagnostic into a hard-asserting build-time gate: a non-zero `val-err` count from the in-process tier-3 validator now fails the build. Regression-catching was verified end-to-end by transient un-wire of M-052's `QuotedAmbiguousStringEmitter` — the canary failed with 231 errors across all twelve templates, exactly matching the M-052 pre-fix baseline; restoring the wiring returned the canary to green. The full `.NET` solution suite remained green (1,749 passed / 9 skipped pre-existing / 0 failed) throughout. All three AC4 grep audits (snake_case provenance keys in `model.schema.yaml`; `SimModelArtifact` in C# sources; `SimNode`/`SimOutput`/`SimProvenance`/`SimTraffic`/`SimArrival`/`SimArrivalPattern` in C# sources) report zero in-tree hits. `docs/schemas/model.schema.md` was the one stale active doc remaining post-m-E24-03; its provenance section was rewritten to the canonical 7-field nested camelCase form ratified in M-049 Q5/A4 and a historical note was added explicitly naming the deprecated snake_case keys for reader continuity. `docs/schemas/README.md` and `docs/architecture/run-provenance.md` (both updated by M-051) were verified current.

      **Decision:** Close E-24 Schema Alignment. Flip E-23 Model Validation Consolidation from `paused` to `ready-to-resume`. The original three-milestone E-23 plan (M-046 Schema Alignment / M-047 Call-Site Migration / M-048 Delete `ModelValidator`) is preserved with one substantive change: M-046's work has been largely absorbed by E-24 (specifically by M-051 schema rewrite and M-053 canary commit + hard-assertion promotion); M-047 and M-048 are now byte-trivial mechanical cleanup because `ModelSchemaValidator`, the schema, Sim's emitter, and the Engine's reader literally share a single unified type definition (`ModelDto` / `ProvenanceDto` in `FlowTime.Contracts`). E-23 reentry needs a status-reconciliation pass on the `milestone/m-E23-01-schema-alignment` branch's stashed input material before M-047 starts: re-examine the three uncommitted schema edits (`grid.start`, `nodes[].metadata`, `nodes[].source`) — `grid.start` and `nodes[].metadata` have landed via M-051; `nodes[].source` was deliberately omitted per Q4 (forward contract for E-15); reconcile the M-046 spec frontmatter to reflect this absorption; then start M-047 from the appropriate branch tip. No deltas were observed between M-049's design decisions and the final landed state — every Q1–Q6 / A1–A5 ratification held through implementation, including `outputs[].as` optional (Q3), `nodes[].source` absent (Q4), nested 7-field camelCase provenance (Q5/A4), and `ModelDto` in `FlowTime.Contracts` (Q1). All five E-24 ADRs ratified during their owning milestones (ADR-E-24-01/02/03 in M-049; ADR-E-24-04/05 in M-052).

      **Consequences:** E-24 enters the completed-but-not-yet-archived state — the integration branch `epic/E-24-schema-alignment` will be merged to `main` separately (next deployer-scope action) and only then archived to `work/epics/completed/E-24-schema-alignment/` per project rule. E-23 status surfaces flip in one pass: epic spec frontmatter `paused` → `ready-to-resume`, milestone-table entries flipped to `ready` for M-047 / M-048, ROADMAP and epic-roadmap E-23 sections updated. CLAUDE.md Current Work flips E-24 to in-progress-with-m-E24-05-final and E-23 to ready-to-resume. The canary is now live as a regression gate — any future schema, emitter, or validator change that re-introduces validator errors at `ValidationTier.Analyse` on any shipped template fails CI immediately; the diagnostic message names every offender with template id, error count, and a sample first error. Downstream: M-044 Validation Surface (Svelte) becomes ready when E-23 closes; E-15 Telemetry Ingestion starts from the ratified `nodes[].source` forward contract rather than inheriting a forward-declared placeholder (M-049 Q4). The 2026-04-23 Truth Discipline guard (*"'API stability' does not mean 'keep old functions around.'"*) was applied through E-24 at every relevant seam: `SimModelArtifact` and its six satellites deleted outright (no shim); the snake_case provenance keys not retained as aliases; `ModelDefinition` collapsed into `ModelDto` rather than preserved alongside; bundle migration explicitly forward-only with no compatibility reader.
  - kind: decision
    id: D-052
    frontmatter:
      title: E-23 rescoped — m-E23-01 reframed from "schema-alignment" to "rule-coverage audit"
      status: accepted
    body: |
      **Status:** active
      **Context:** Post-E-24 review of E-23's specification (2026-04-26) surfaced that the original M-046 milestone — titled "schema-alignment" — was largely absorbed by E-24 M-051 (`model.schema.yaml` rewrite) and M-053 (canary hard-assertion). What was *not* absorbed: the rule-by-rule audit of `ModelValidator.cs` that would prove `ModelSchemaValidator` + the schema together enforce every rule the deleted validator currently enforces. Without that audit, M-047 (call-site migration) and M-048 (`ModelValidator` delete) risk silently dropping rules that exist only as imperative checks in `ModelValidator.cs` (~25 rules across 214 lines). The user reframed the spirit of E-23 to its proper scope: *"After E24 and E23, hopefully our schema story is coherent and we don't have 'embedded schemas' anymore (different rules in different places)."* That reframing extends the audit scope beyond just `ModelValidator.cs` to every place where structural model rules live outside the canonical schema: parser tolerations in `ModelParser.cs`, silent emission defaults in `SimModelBuilder.cs` (post-E-24), and post-parse orchestration checks in `RunOrchestrationService.cs` and `GraphService.cs`. The original M-046 slug also collided with E-24's "schema-alignment" — a literal name collision that misframes both the work and the relationship between the epics.

      **Decision:** Replace the original M-046 milestone with a new M-046 milestone. The new milestone is doc-first: enumerate every rule embedded outside the canonical schema (in `ModelValidator.cs`, `ModelParser.cs`, `SimModelBuilder.cs`, `RunOrchestrationService.cs`, `GraphService.cs`); for each rule record file:line, plain-English content, current schema status, and disposition; land schema additions (with citation comments) and `ModelSchemaValidator` adjuncts (alongside `ValidateClassReferences`) where the audit shows they are needed; commit a negative-case canary `RuleCoverageRegressionTests` that proves `ModelSchemaValidator` actually catches every audited rule before M-047 routes production traffic through it. No call-site changes in M-046. M-047 and M-048 stay structurally as drafted — M-047 refreshed to start with a fresh `grep` rather than relying on cached line numbers (E-24 rewrites shifted them); M-048 refreshed to reference both canaries (E-24's `TemplateWarningSurveyTests` survey canary + M-046's `RuleCoverageRegressionTests` negative-case canary) as the green-confirmation gate. Epic spec rewritten with explicit "Spirit and history" section reframing E-23's goal as eliminating *embedded schemas* generally, with `ModelValidator` deletion as the most visible instance. The pre-pivot stashed input material (branch `milestone/m-E23-01-schema-alignment` + `stash@{0}`) is now historical — most absorbed by E-24, none required as input for the new audit; should be retired when E-23 resumes. Branch deletion is held for human approval per project rule (destructive operation).

      **Consequences:** E-23 retains three milestones but the slate is rebuilt around audit-first discipline, not schema-edit-first. The slug collision with E-24 is resolved (`m-E23-01-rule-coverage-audit` vs. E-24's "schema-alignment"). Future readers of E-23 see a clear spirit statement on the epic's first page that ties the work to the user's reframing: schema is the only declarative source, `ModelSchemaValidator` is the only runtime evaluator, every rule has exactly one canonical home. ADR-E-23-02 ("Schema as the single structural contract; adjuncts are the named exception") is now ratifiable at M-046 close with the enumerated adjunct list as the artefact; ADR-E-23-03 (parser/emitter rules need written justification) is ratified only if the audit produces a non-empty `parser-justified` set. Surface sync: epic spec rewritten; M-046 file replaced (new file at `m-E23-01-rule-coverage-audit.md`; old `m-E23-01-schema-alignment.md` deleted via `git rm`); M-047 and M-048 lightly refreshed; CLAUDE.md, ROADMAP.md, and epic-roadmap.md E-23 sections rewritten to reflect the rescope. The `milestone/m-E23-01-schema-alignment` git branch and `stash@{0}` are flagged for retirement at E-23 resume; the new milestone starts fresh from post-E-24 `main` with no stash dependency.
  - kind: decision
    id: D-053
    frontmatter:
      title: Testing-rigor approach — Phase 2 baseline canary first; full golden-output canon deferred
      status: accepted
    body: |
      **Status:** active
      **Context:** During M-045 dogfooding the user observed three `edge_flow_mismatch_incoming` warnings on the previously-clean `transportation-basic` template. Two gaps were filed: (1) the regression itself, and (2) a structural argument that surveyed-output-only canaries cannot detect drift and we need deterministic golden-output assertions before E-22 Model Fit. The `patch/edge-flow-mismatch` investigation diagnosed (1) as **improved analyser coverage surfacing a latent template inconsistency**, not an engine bug — pre-E-24 the engine wasn't emitting per-edge `flowVolume` series so the analyser's conservation check silently skipped; post-E-24 the series is emitted, the check runs, and finds real divergence between expr-layer arrivals (`hub_dispatch * splitAirport`) and edge-layer flows (uniform-1/3 from `weight: 1` edges). 8+ shipped templates affected; `transportation-basic-classes` worst at 8 run-warnings. The patch left the underlying template-vs-engine authority question open for a future engine milestone; the question is which side is canonical for edge flow volumes (expr nodes encode splits, topology edge weights would need to mirror them).

      **Decision:** Adopt the **Phase 2 baseline canary** as the testing-rigor approach for now. Defer full per-template golden-output pinning until either (a) the engine truth-gate work picks up the canary's findings as scoped milestones, or (b) the gate proves insufficient at catching a class of drift. Concretely: extend `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs::Survey_Templates_For_Warnings` Phase 2 (live-API survey) to hard-assert per-template `run-warn` counts against an `ExpectedRunWarnings` baseline dictionary maintained in the test source. The dictionary's xmldoc names accepted-for-now non-zero baselines with rationale pointers to `work/gaps.md`. Drift in either direction (regression upward, or sanctioned-fix downward without baseline update) fails the build with a clear before/after message. The Phase 1 (in-process tier-3) `val-err == 0` hard assertion from E-24 M-053 is retained.

      **Why baseline-canary, not full-golden-canon:** the regression that motivated the gap had a single specific failure shape — *count of run-warnings per template diverged from previously-observed count*. A baseline canary catches that exact shape with one dictionary edit per template and a few lines of assertion code; a full golden-output canon (per-series per-bin numeric pinning + warning-set pinning + manifest-field pinning + tolerance comparison + regenerate workflow) is a milestone-scale investment that buys broader coverage but at a per-deliberate-change tax. The patch deliberately scoped to the lighter intervention because the intervention sufficed for the observed failure mode and unblocks E-15 / E-22 sequencing. If a future regression slips past the baseline gate (e.g. same warning count but different warning content; or numeric drift inside a stable warning count), that is the empirical signal to invest in full canon. Until then, the gate is enough.

      **Consequences:** The `Survey_Templates_For_Warnings` canary now actively prevents the class of silent drift that produced the M-045 finding — any future change that bumps any template's run-warning count above its baseline (or below without a deliberate baseline edit) fails CI. The 9 known-non-zero baselines locked in 2026-05-01 (`transportation-basic`, `transportation-basic-classes`, `it-system-microservices`, `manufacturing-line`, `network-reliability`, `supply-chain-incident-retry`, `supply-chain-multi-tier`, `supply-chain-multi-tier-classes`, `warehouse-picker-waves`) trace back to the edge-flow-mismatch investigation; resolving the underlying expr-vs-edge-weight authority question lowers them all to zero in the same commit that makes the design call. **E-15 Telemetry Ingestion is no longer testing-rigor-blocked** — the baseline canary is the gate that the gap entry argued was needed. **E-22 Model Fit may still want full golden-output canon** when it lands (model-fit accuracy depends on detectable engine-output stability at numeric precision, which baseline-counts don't catch); that decision lives at E-22 plan time. The two gaps filed in M-045 dogfooding remain open in `work/gaps.md`: the transportation-basic gap retains the design question and the affected-template list; the testing-rigor gap is materially answered by this decision but not yet closed (full canon is still future scope when warranted). Patch landed: `patch/edge-flow-mismatch`, single PR back to `main`.
  - kind: gap
    id: G-001
    frontmatter:
      title: Path Analysis / Path Filters
      status: open
    body: |
      ### Why this is a gap
      FlowTime now emits edge time bins and derived sink/path latency, but there is no formal architecture for **path analysis**:

      - Which paths are used (per class, per time window)?
      - How much flow traverses each path?
      - What are the dominant or toxic routes?
      - Can we extract a subgraph that is “active” for a given class/time window?

      Today, clients (UI/MCP) can inspect nodes and edges, but cannot ask for **path-level** answers without custom, client-side logic.

      ### Path filters vs path analysis

      - **Path filters** are a *subgraph extraction* feature:
        - Given a start/end node, class, and time window, return only the nodes/edges that carry flow.
        - This is a query/selection problem and could be exposed as an API option.

      - **Path analysis** is broader and deeper:
        - Path discovery, path frequency, ranking, and decomposition.
        - Dominant route identification, path changes over time, and route anomalies.
        - May require additional aggregation and/or derived outputs beyond edge time bins.

      Path filters can be built from edge time bins, but they still need **well-defined query semantics**
      (e.g., thresholds, class handling, time window behavior) that are not yet specified.

      ### Relationship to Edge-Time-Bin epic
      Edge time bins provide the necessary *inputs* for path analysis, but do not define
      how to aggregate or query paths. A formal epic is needed to standardize this.

      ### Proposed direction
      Create a dedicated epic, tentatively **Path Analysis & Subgraph Queries**, to cover:

      - Server-side path/subgraph query semantics (path filters).
      - Path-level aggregations (counts, shares, dominant routes).
      - Optional derived outputs with provenance (for MCP and UI).

      This epic should be coordinated with:
      - `work/epics/completed/edge-time-bin/` (inputs)
      - `work/epics/anomaly-detection/` (pathologies)
      - `work/epics/completed/ai/` (MCP consumption)

      ### Immediate implications
      - MCP should remain **pass-through** for edge data in M-08.05.
      - Any path filters or summary helpers should be **server-side** (authoritative),
        and should live in a follow-up epic or milestone.

      ---
  - kind: gap
    id: G-002
    frontmatter:
      title: Summary Helpers (Edge/Path Analytics)
      status: open
    body: |
      There is no API contract for **summary helpers** such as:

      - Edge retry ratios (retryVolume / flowVolume).
      - Conservation deltas at node boundaries.
      - Path or route summaries.

      These would be useful for MCP and UI, but require a contract that clearly labels
      values as derived. This gap is best addressed alongside path analysis.

      ---
  - kind: gap
    id: G-003
    frontmatter:
      title: Dependency Constraint Enforcement (Deferred M-10.03)
      status: open
    body: |
      ### What was planned
      M-065 scoped MCP-side pattern enforcement: a dependency pattern selector routing user intent to Option A or Option B, rejecting unsupported patterns (feedback loops, retries), and promoting engine warnings to hard errors during MCP model generation.

      ### Why deferred
      1. The engine review (2026-03) found that `ConstraintAllocator` has **zero callers** in the evaluation pipeline — constraints are declared in models but silently ignored at runtime. MCP-side enforcement alone doesn't fix this.
      2. The sequenced plan recommends wiring `ConstraintAllocator` into `Graph.Evaluate()` (Phase 3.5) before MCP enforcement adds value.
      3. Near-term priority is correctness bugs and analytical primitives (Phases 0–3 of the sequenced plan).

      ### When to revisit
      After Phase 3.5 (runtime constraint enforcement) is complete. At that point, M-065 should be re-scoped to include both runtime enforcement and MCP guardrails.

      ### Reference
      - Spec: `work/epics/E-12-dependency-constraints/M-10.03-dependency-mcp-pattern-enforcement.md`
      - Review: `docs/architecture/reviews/review-sequenced-plan-2026-03.md` (Phase 3.5, Phase 4.1)

      ---
  - kind: gap
    id: G-004
    frontmatter:
      title: dag-map Layout Quality (Svelte UI)
      status: open
    body: |
      ### Wiggly trunk in dag-map bezier layout
      The main trunk path in dag-map's `layoutMetro` wobbles vertically when branches push the Y-positions around. Visible on the FlowTime "Transportation Network" model (12 nodes). The trunk should be a straight horizontal line with branches diverging above/below.

      ### No class differentiation from FlowTime API
      The FlowTime `/v1/runs/{id}/graph` endpoint returns node `kind` (service, queue, dlq) but not flow classes. dag-map's layout engine uses `cls` to assign route colors and lane spread. Without meaningful classes, all nodes land on one route.

      ### Possible fixes
      - dag-map: improve trunk stability in layoutMetro (prioritize trunk straightness)
      - FlowTime API: expose class-to-node mapping so dag-map can assign routes
      - dag-map: add heatmap mode so coloring comes from metrics, not static classes

      ---
  - kind: gap
    id: G-005
    frontmatter:
      title: dag-map Features Needed for Svelte UI M5+
      status: open
    body: |
      - ~~**Heatmap mode**: per-node/edge metric coloring~~ **Done** (dag-map `metrics`/`edgeMetrics`/`colorScales`)
      - **Click/tap events**: callback with node ID (M5 blocker for inspector). `data-id` attributes exist; need event delegation in Svelte wrapper or library-level callback.
      - **Hover tooltips**: on stations (M5 blocker for inspector)
      - **Selected node highlighting**: visual state (M5 blocker for inspector)
      - **Node shape differentiation**: custom shapes per node kind (service=rect, queue=diamond, dlq=triangle). Possible via `renderNode` callback.

