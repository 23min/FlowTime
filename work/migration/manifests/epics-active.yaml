entities:
  - kind: epic
    id: E-13
    frontmatter:
      title: Path Analysis & Subgraph Queries
      status: proposed
    body: |
      ## 1. Summary

      This epic defines **path analysis** as a first‑class capability in FlowTime: answering end‑to‑end journey questions across one or more routes in the DAG, over time, using FlowTime’s per‑bin node and edge artifacts.

      Path analysis is built on EdgeTimeBin, Classes‑as‑Flows, and the stable post-E-16 fact surfaces exposed by the server. It is consumed by both the UI and MCP server. It is not a replacement for edge overlays; it is a higher‑order analysis layer.

      ---

      ## 2. Motivation

      Edge time bins enable truth‑based edge overlays and conservation checks, but they do not answer questions like:

      - “For the **Order** flow, what was the dominant end‑to‑end path from `Orders.Create → Billing.Settle` at 10:00–14:00, and where did it bottleneck?”
      - “What fraction of volume went via path A vs path B during a surge window?”
      - “Which path contributed most to backlog‑hours and SLA misses?”
      - “If we reroute 15% around `Auth.Validate`, what happens to end‑to‑end latency on the Order journey?”

      Path analysis introduces formal query semantics and derived outputs so these questions are answerable in a consistent, explainable way.

      ---

      ## 3. Definitions

      ### 3.1 Path

      A **path** is a sequence of nodes/edges in the DAG. Path queries can be:

      - **Explicit**: caller supplies a sequence of edges or nodes.
      - **Set‑based**: “all paths from A to B,” optionally constrained (e.g., must pass through X).
      - **Policy‑based**: “top K paths by volume” within a window.

      ### 3.2 Path Filters vs Path Analysis

      - **Path Filters** are *subgraph extraction*: return only the nodes/edges that participate in a selected path or set of paths.
      - **Path Analysis** includes *metrics and attribution* (dominant paths, bottlenecks, path pain, latency estimates).

      Path filters are a subset of path analysis but still require defined semantics (thresholds, class handling, missing edge data behavior).

      ---

      ## 4. Scope

      ### In Scope

      - **Path query object** definition for explicit, set‑based, and policy‑based paths.
      - **Derived path metrics** that are honest and explainable using existing per‑bin artifacts.
      - **Subgraph responses** suitable for UI overlays and MCP consumption.
      - **Provenance metadata** for derived path metrics (origin/aggregation).

      ### Out of Scope (v1)

      - Full process‑mining algorithms or conformance checking.
      - Probabilistic end‑to‑end latency distributions.
      - Cross‑run path inference at scale.

      ---

      ## 5. Path Metrics (v1)

      These metrics are designed to be **derived without pretending**:

      ### A. Volume Split

      - Per‑path volume can be computed using edge time bins.
      - For explicit paths, **path flow** can be approximated by the tightest edge (min‑cut) or by the entry edge, with explicit provenance.

      ### B. Bottleneck Attribution

      Per bin, define a binding score for each node in the path:

      - `binding = 1(Q[t-1] > 0)` OR `utilization[t] ≈ 1`
      - or `shortfall = max(0, arrivals[t] - capacity[t])`

      Path bottleneck per bin = argmax(binding/shortfall) among nodes on the path.

      ### C. Path “Pain”

      Sum backlog‑hours along the path:

      ```
      pathPain = Σ_nodes Σ_t Q_node[t] * Δt
      ```

      This is interpretable and ties directly to incident analysis.

      ### D. End‑to‑End Latency Estimate (v1)

      A pragmatic latency estimate per bin:

      ```
      W_path[t] ≈ Σ_i W_i[t]
      W_i[t] ≈ Q_i[t] / max(ε, served_i[t]) * bin_minutes
      ```

      This is directional and explainable. v2+ can introduce delay kernels / convolution across edges.

      ---

      ## 6. API & Data Contracts

      Path analysis requires a **server‑side contract** so clients don’t compute their own semantics:

      - Path query input (`from`, `to`, `classId`, constraints, window).
      - Path analysis output (path list, metrics, subgraph).
      - Clear provenance metadata for derived metrics.

      This should be exposed as a **dedicated analysis endpoint** (preferred), not overloaded onto `/state_window`.

      ---

      ## 7. UI Integration

      Path analysis enables a distinctive UI mode:

      - Highlight chosen path(s).
      - Edge width = flow.
      - Node color = bottleneck score / SLA risk.
      - Scrubber shows dominant path changes over time.

      ---

      ## 8. MCP Integration

      MCP should consume **server‑provided path outputs** (authoritative), not compute path metrics itself.

      ---

      ## 9. Dependencies

      - Stable post-E-16 server-provided state/graph facts and contracts
      - EdgeTimeBin (edge series + quality + warnings)
      - Classes as Flows (per-class edge series)
      - Derived sink/path latency (v1 signal for end-to-end latency)
      - Resumed Phase 3 p3c + p3b for richer diagnostics and what-if path work

      ---

      ## 10. Roadmap / Milestones (TBD)

      This epic will be broken into milestones once the query contract and minimal metrics are approved.

      Suggested phases:
      1. Path query contract + subgraph responses on stable post-E-16 fact surfaces.
      2. Volume split + bottleneck attribution (v1) once edge facts are authoritative.
      3. Path pain + latency estimate (v1), then richer comparison/what-if path work after p3c + p3b.
      4. UI + MCP integration; overlay-aware comparisons can layer on later.

      ---

      ## 11. Open Questions

      - How should path volume be defined (min‑cut vs entry edge vs explicit normalization)?
      - How to handle missing edge data or approximate edge quality?
      - Where should path outputs be stored (derived on demand vs persisted in run artifacts)?
      - What is the minimal API footprint that still enables UI/MCP consumption?
  - kind: epic
    id: E-14
    frontmatter:
      title: Visualizations (Chart Gallery / Demo Lab)
      status: cancelled
    body: |
      This spec is retained as historical planning context only. Live ownership for analytical visualization work now sits with the UI Analytical Views epic.

      ## Intent

      Provide a dedicated UI page where we can prototype role-focused charts (exec, SRE, support) using FlowTime-derived metrics, and clearly show which insights come from FlowTime output versus raw telemetry.

      ## Goals

      - Create a single "Visualization Lab" page with chart panels grouped by role.
      - Support horizon/stacked charts for volume, queue depth, SLA, latency, retry volume, and utilization.
      - Use bespoke SVG or canvas charts (no charting library dependencies) for full control.
      - Allow quick toggles for flow/class selection and time window.
      - Contrast FlowTime-derived views with raw telemetry views where available.
      - Keep chart definitions and data wiring deterministic and repeatable for demos.
      - Keep charting code isolated from other UI modules and fed only by API output (to validate the engine semantics surface).

      ## Non-Goals

      - No new analytics pipeline; reuse existing engine and API outputs.
      - No third-party charting library dependencies.

      ## Data Sources

      - `/state_window` for per-bin node and edge metrics.
      - Edge metrics for flow/attempt/retry volumes.
      - Warnings/quality flags for contextual overlays.
      - Raw telemetry comparisons only after Telemetry Ingestion is available.

      ## UI Concept (v1)

      - Role tabs (Exec, SRE, Support) each with curated chart bundles.
      - A simple control strip: window, flow/class, metric set.
      - Chart cards with consistent titles, units, and provenance text.

      ## Milestones

      - To be defined when the epic is scheduled.
  - kind: epic
    id: E-15
    frontmatter:
      title: Telemetry Ingestion, Topology Inference, and Canonical Bundles
      status: proposed
    body: |
      > **Status note:** capture is shipped; ingestion pipeline is not

      ## Goal

      Build the pipeline that takes real-world data — event logs, traces, sensor feeds — and produces the two things FlowTime needs: a `/graph` topology and Gold-format time-binned series. This epic owns ingestion, topology inference, validation, and bundle assembly.

      ## Context

      FlowTime currently assumes topology is hand-built and telemetry fills series for known nodes. This works for synthetic models but blocks two capabilities:

      1. **Domain-agnostic adoption** — FlowTime should work for any process with entities flowing through a system: IT microservices, business workflows, transit networks, logistics.
      2. **Validation against real data** — Synthetic models validate correctness but not usefulness. Real data proves FlowTime's analytical primitives produce answers that matter.

      The March 2026 dataset fitness research (`work/epics/E-15-telemetry-ingestion/reference/dataset-fitness-and-ingestion-research.md`) identifies process mining event logs, distributed systems traces, and physical network telemetry as candidate validation datasets.

      ## Scope

      ### In Scope

      **Gold Builder (raw data → binned facts)**
      - Bronze → Silver → Gold pipeline: raw payloads → normalized events → binned facts per node per time window
      - Mapping rules from raw telemetry to canonical node series
      - Manifest generation and data quality warnings
      - Class coverage metadata and gap-fill policy
      - Support for multiple source types: event logs, time-series, OD pairs, API feeds

      **Graph Builder (data → topology)**
      - Topology inference from case traces (directly-follows graph)
      - Topology inference from origin-destination pairs
      - Topology join with external structure sources (GTFS, OSM, service registries)
      - Edge confidence scoring and provenance metadata
      - Human curation: accept/reject edges, pin known edges, merge/split nodes, annotate node kinds

      **Bundle Assembly**
      - Deterministic bundle generation (same inputs → same hashes)
      - Schema validation against published schemas
      - Canonical bundle format: `model.yaml`, `manifest.json`, `series/`, CSV files

      **Validation Dataset Integration**
      - Process mining event log ingestion (BPI Challenge format)
      - At least one non-IT dataset path (transit, traffic, or logistics)

      ### Out of Scope
      - Engine semantic derivations (utilization, latency, retry governance) — owned by engine
      - Overlay scenarios and derived runs — owned by overlays epic
      - UI workflows beyond topology rendering and basic data availability signals
      - Real-time / streaming ingestion (batch-first)

      ## Current State (2026-03)

      - **Capture exists**: API `/telemetry/captures` and CLI `flowtime telemetry capture` can generate telemetry bundles from existing runs.
      - **Bundle contract exists**: `docs/schemas/telemetry-manifest.schema.json` defines the canonical manifest.
      - **Gold schema defined**: Per node, per time bin: timestamp, node, flow, arrivals, served, errors, optional queue_depth/capacity_proxy.
      - **TelemetryLoader service** (ADX/KQL or lake ingestion) is not implemented.
      - **Graph Builder** does not exist.
      - **No external dataset has been ingested** into FlowTime yet.

      ## Design Principles

      - **Deterministic outputs**: same inputs yield same bundle hashes.
      - **Schema-first**: ingestion must validate against published schemas.
      - **No semantics**: ingestion is responsible for aggregation and alignment, not derived metrics (bottleneck ID, cycle time, etc. are engine-side).
      - **Topology as artifact with provenance**: inferred edges carry confidence scores; the graph is versioned and curable, not a fixed truth.
      - **Honest about gaps**: missing data, low-confidence edges, and inferred values are explicitly surfaced as warnings — never silently hidden.

      ## Recommended Sequencing

      - Build Gold Builder plus one replayable dataset path first; this epic should not wait on later UI or optimization work.
      - Follow the first dataset path immediately with Telemetry Loop & Parity so synthetic-vs-replay drift is measured before fitting, optimization, or anomaly automation.
      - Treat resumed Phase 3 primitives as leverage layers that make ingested data more valuable, not as prerequisites for canonical bundle generation.

      ## Canonical Bundle Contract

      Bundles consist of:
      - `model.yaml`
      - `manifest.json` (window, grid, files, warnings)
      - `series/index.json`
      - CSV series files

      Ingestion rules ensure:
      - Stable series naming and units
      - Consistent bin alignment and gap handling
      - Explicit warnings for missing or low-quality data

      ## Dependencies

      - **Canonical telemetry contracts and post-E-16 fact surfaces**: ingestion outputs must align with stable series semantics and authoritative graph/category facts.
      - **Phase 3 analytical primitives** (in progress): bottleneck ID, cycle time, WIP limits — these make ingested data interesting rather than just displayable, but are not required to produce canonical bundles.
      - **dag-map spike**: informs how inferred topologies render in the UI.

      ## Suggested Milestone Decomposition

      ### M1: Gold Builder v1
      - Ingest a single process mining event log (BPI Challenge 2012) into Gold format
      - Bronze → Silver → Gold pipeline for event log sources
      - Bin alignment, gap handling, data quality warnings
      - Output: canonical bundle that FlowTime engine can consume

      ### M2: Graph Builder v1
      - Infer topology from directly-follows relations in event log traces
      - Output `/graph` with nodes, edges, confidence scores
      - Human curation hooks (accept/reject/pin)
      - First end-to-end demo: real dataset → topology + Gold → UI renders graph

      ### M3: External topology join
      - Join telemetry with external structure source (GTFS, OSM, or service registry)
      - Support OD-pair and physical-adjacency topology construction
      - Second dataset path (transit or traffic)

      ### M4: Data quality and operational tooling
      - Gap detection, zero-fill policies, class coverage metadata
      - CLI/SDK wrappers for ingestion
      - Ingestion diagnostics and provenance

      ### M5: TelemetryLoader service
      - Service endpoint for batch ingestion from data lake / ADX / parquet sources
      - Production-grade validation and bundle assembly

      ## Validation Datasets (Identified)

      | Dataset | Domain | Why | Milestone |
      |---------|--------|-----|-----------|
      | BPI Challenge 2012 | Loan applications | Topology from traces, 13K cases, rework loops | M1, M2 |
      | Road Traffic Fines | Municipal process | 150K cases, very high volume, clear bottlenecks | M1, M2 |
      | PeMS + OpenStreetMap | Road traffic | Physical network, massive vehicle volume | M3 |
      | MTA Ridership + GTFS | Transit passengers | Passengers as entities, incidents, schedule backbone | M3 |
      | Alibaba Cluster Trace 2018 | Microservices | IT validation, millions of requests, trace-based topology | Future |

      See `work/epics/E-15-telemetry-ingestion/reference/dataset-fitness-and-ingestion-research.md` for the full evaluation and dataset fitness checklist.

      ## References

      - `work/epics/E-15-telemetry-ingestion/reference/dataset-fitness-and-ingestion-research.md` — Dataset fitness research
      - `work/epics/completed/time-travel/telemetry-generation-explicit.md` — Existing telemetry capture
      - `docs/reference/engine-capabilities.md` — Engine capabilities
      - `docs/schemas/telemetry-manifest.schema.json` — Bundle manifest schema
      - `work/epics/E-10-engine-correctness-and-analytics/spec.md` — Phase 3 analytical primitives (dependency)
  - kind: epic
    id: E-18
    frontmatter:
      title: Time Machine
      status: active
    body: |
      > **Naming note.** This epic was originally filed as "Headless Pipeline and Optimization." The component is now named `FlowTime.TimeMachine` (the Time Machine). The directory path `work/epics/E-18-headless-pipeline-and-optimization/` is preserved for historical stability; cross-doc references use that path. The decision is recorded in `work/decisions.md` and in `work/epics/E-19-surface-alignment-and-compatibility-cleanup/m-E19-01-supported-surface-inventory.md` (A6 + shared framing).

      ## Goal

      Make FlowTime usable as a pure callable function — embeddable in pipelines, optimization loops, model discovery workflows, and digital twin architectures. The **Time Machine** (`FlowTime.TimeMachine`) is a new first-class execution component that scripts, UIs, MCP servers, and AI agents can drive programmatically. It owns compile, tiered validation, evaluate, reevaluate with parameter overrides, and canonical artifact write.

      FlowTime's execution component is an abstract machine in the BEAM / JVM sense: instructions (the compiled graph), state (the time grid plus accumulating series), deterministic topological stepping through time. "Time Machine" also aligns with the existing Blazor "Time Travel" UI feature — the Time Travel UI navigates runs the Time Machine produces — and the reevaluation semantics (rewind a compiled model, run it forward with different parameters) are literally time travel.

      ## Context

      FlowTime's engine is deterministic: given a model, parameters, and input series, it produces the same output every time. After E-16 purifies the engine into a compiled, typed, pure evaluation surface, treating it as a callable function becomes natural:

      ```
      f(model, parameters, inputs) → outputs
      ```

      This is the same relationship a circuit simulator (SPICE) has with its netlist: compile once, evaluate many times, vary parameters programmatically. SPICE built an entire ecosystem of analysis modes on this foundation — parameter sweeps, Monte Carlo, optimization, model fitting. FlowTime can do the same for queueing networks.

      This epic owns the shared runtime parameter foundation used by both the programmable Time Machine layer and the interactive UI layer. The parameter model, override surface, and reevaluation API should be built once here and consumed by E-17, not implemented twice.

      ## The core insight

      Every advanced use case is a composition of "call the evaluation function with different inputs":

      | Use case | Loop shape |
      |----------|-----------|
      | **Parameter sweep** | Evaluate N times with different parameter values, compare outputs |
      | **Optimization** | Vary parameters to minimize an objective function over FlowTime outputs |
      | **Sensitivity analysis** | Perturb each parameter, measure output change (numerical gradient) |
      | **Model discovery** | Fit model parameters to match observed telemetry (inverse modeling) |
      | **Monte Carlo** | Sample parameters from distributions, evaluate N times, characterize output distribution |
      | **Digital twin** | Continuously calibrate model from production telemetry, use for prediction and what-if |
      | **Feedback simulation** | Evaluate chunk by chunk, let a controller (autoscaler, circuit breaker) adjust parameters between chunks |

      ## Scope

      ### In Scope

      - **Time Machine CLI mode** — FlowTime as a pipeline-friendly command: model + params in, results out (JSON/CSV)
      - **Shared runtime parameter foundation** — compiled parameter identities, override points, reevaluation API, and optional enrichment contract for template-authored parameter metadata reused by E-17
      - **Iteration protocol** — keep compiled graph alive, accept new parameter sets per iteration without recompile
      - **Tiered validation as a first-class operation** — schema / compile / analyse tiers callable from the same Time Machine surface as compile/evaluate/reevaluate. Client-agnostic: Sim UI, Blazor UI, Svelte UI, MCP servers, external AI agents, tests, and CI are all first-class callers on equal footing. Detailed requirement below in *Tiered validation (required scope)*. Originates from E-19 M-024 decision A6.
      - **Parameter sweep** — evaluate over a grid of parameter values
      - **Optimization** — find parameter values that minimize/maximize an objective subject to constraints
      - **Model fitting** — given observed telemetry, calibrate model parameters to match (system identification)
      - **Sensitivity analysis** — compute ∂output/∂parameter numerically
      - **Pipeline SDK** — `FlowTime.Core` as the embeddable evaluation library, surfaced via `FlowTime.TimeMachine` as the first-class execution component with a clean API
      - **Chunked evaluation** — evaluate bins in chunks for feedback simulation (autoscaler, circuit breaker scenarios)

      Real-telemetry fitting/optimization is part of this epic, but it is not the first cut: when E-18 consumes real telemetry rather than synthetic or fixture data, that branch should sit downstream of E-15's first dataset path and Telemetry Loop & Parity so calibration is grounded in measured replay drift.

      ### Out of Scope

      - UI for interactive parameter exploration (E-17)
      - WebSocket/SignalR push channel (E-17)
      - New analytical primitives
      - Rewriting the DAG evaluator foundation
      - Chunked/stateful execution semantics in the first Time Machine cut — treat them as a later layer once a dedicated streaming/stateful seam exists

      ## Execution Layers

      To minimize risk, execute this epic in three layers:

      1. **Foundation layer:** shared runtime parameter foundation + evaluation SDK + tiered validation + Time Machine CLI / sidecar.
      2. **Analysis layer:** parameter sweep, sensitivity, optimization, and fitting on top of the foundation.
      3. **Stateful layer:** chunked evaluation and richer telemetry adapters only after a dedicated streaming/stateful execution seam exists.

      ## Tiered validation (required scope)

      **Origin.** This requirement was decided in E-19 M-024 as decision A6. E-19 retires the existing `POST /api/v1/drafts/validate` endpoint (Sim-private, mislabeled, unused by any UI, only exercised by tests) and records a hard dependency that E-18 must expose validation as a first-class, client-agnostic Time Machine operation alongside compile, evaluate, reevaluate, parameter override, and artifact write.

      **Principle.** Validation — answering *"is this YAML a correct FlowTime model?"* — is a first-class, client-agnostic operation. `FlowTime.Core` owns the authoritative answer. The Time Machine surfaces it. No single client is privileged as the validation host. Sim UI, Blazor UI, Svelte UI, MCP servers, external AI agents, tests, and CI are all first-class callers on equal footing.

      **Three tiers.** The Time Machine must expose all three of the following through its in-process SDK, CLI, and sidecar protocol, with consistent request and response shapes:

      - **Tier 1 — schema.** YAML parses, JSON schema validates, class references resolve. Cheap, no compile. Intended for per-keystroke editor feedback and per-iteration AI inner-loop feedback. Backed by `FlowTime.Core.Models.ModelSchemaValidator`.
      - **Tier 2 — compile.** Model compiles into a `Graph`: topology resolves, dependencies resolve, expression nodes compile. No execution. Catches structural errors. Backed by `FlowTime.Core.Compiler.ModelCompiler` + `FlowTime.Core.Models.ModelParser`.
      - **Tier 3 — analyse.** Full invariant analysis: compile + deterministic evaluation + invariant checks (capacity, conservation, runtime warnings). Catches semantic issues that only emerge after evaluation. Backed by `FlowTime.Sim.Core.Analysis.TemplateInvariantAnalyzer` composed into the Time Machine (the analyzer logic is correct; only its hosting moves).

      **Why tiered is required, not optional.** Without cheap tiers, every client needing "just check this" pays the full evaluate cost. That:
      - Breaks AI inner-loop performance (agents generating candidate models iterate thousands of times).
      - Makes editor-time UX expensive (IDE red-squiggles on every keystroke is unacceptable if each keystroke compiles and evaluates a graph).
      - Discourages clients from validating at all, which is worse than cheap validation.

      Validation and compile-only are natural siblings of compile-then-evaluate. They share the front end of the pipeline and differ only in where they stop.

      **Client list (none privileged):**
      - **Sim UI** (Blazor, Svelte) — template authoring, editor-time feedback.
      - **Blazor UI, Svelte UI** — editor-time feedback on inline YAML, pre-run "check" action.
      - **MCP servers** — expose `validate_model` (and friends) as tools for Claude and other models to call.
      - **External AI agents** — programmatic inner loop: generate → validate (tier 1 or 2) → refine → validate (tier 3) → run.
      - **Tests, CI** — pre-run well-formedness gates, regression checks on model fixtures.
      - **The Time Machine itself** — compile operations share the tier-2 path.

      **What this milestone does not design.** Concrete wire format (JSON shape of the validation response, error envelope, line/column mapping) is a Foundation Layer implementation detail. What must be true is that the three tiers exist, are callable via all three surfaces (SDK, CLI, sidecar), and treat every client the same.

      **Library pieces preserved by E-19 for E-18 to compose:**
      - `FlowTime.Core.Models.ModelSchemaValidator` (tier 1)
      - `FlowTime.Core.Models.ModelValidator` (tier 2 adjacent — schemaVersion/grid/structure + legacy field detection)
      - `FlowTime.Core.Compiler.ModelCompiler`, `FlowTime.Core.Models.ModelParser` (tier 2)
      - `FlowTime.Sim.Core.Analysis.TemplateInvariantAnalyzer`, `InvariantAnalyzer` (tier 3 logic)

      These stay intact. E-19 only removes the HTTP wrapper on Sim; the validation capability itself moves forward to compose into the Time Machine.

      ## Analysis Modes (SPICE-inspired)

      ### Mode 1: Sweep

      ```bash
      flowtime evaluate model.yaml --sweep "parallelism=1,2,4,8,16" --output sweep-results.json
      ```

      Embarrassingly parallel. Produces a table of (parameter_value → key_metrics).

      ### Mode 2: Optimize

      ```bash
      flowtime optimize model.yaml \
        --objective "min(avg(node.queue.queueTimeMs))" \
        --constraint "max(node.queue.utilization) < 0.8" \
        --vary "parallelism=1..32" "serviceRate=50..500" \
        --output optimal.json
      ```

      Gradient-free optimization (Nelder-Mead, Bayesian) over FlowTime as the evaluation function.

      ### Mode 3: Fit

      ```bash
      flowtime fit model.yaml --observed production-metrics.json \
        --fit-params "serviceRate,routingWeight" \
        --output calibrated-model.yaml
      ```

      System identification: given real telemetry, find the parameter values that make the model match reality. Uses least-squares or similar fitting over the residual between predicted and observed series.

      ### Mode 4: Sensitivity

      ```bash
      flowtime sensitivity model.yaml \
        --params "parallelism,serviceRate,arrivalRate" \
        --metric "avg(queueTimeMs)" \
        --perturbation 0.05 \
        --output sensitivity.json
      ```

      Numerical gradient: perturb each parameter by ±5%, measure output change. Answers "which parameter has the most impact on latency?"

      ### Mode 5: Monte Carlo

      ```bash
      flowtime montecarlo model.yaml \
        --distribution "serviceRate=normal(100,15)" \
        --distribution "arrivalRate=normal(80,10)" \
        --samples 1000 \
        --output distribution.json
      ```

      Stochastic parameter variation. Answers "given uncertainty in our estimates, what's the 95th percentile of queue time?"

      ### Mode 6: Feedback / chunked evaluation

      ```bash
      flowtime simulate model.yaml --chunked --chunk-size 60 \
        --controller autoscaler.py \
        --output trace.json
      ```

      Evaluate 60 bins, pass state to controller script, controller adjusts parameters, evaluate next 60 bins. Simulates closed-loop control.

      ## Telemetry integration

      Telemetry is an adapter concern that lives **outside** the Time Machine's pure execution scope, with one exception: writing the canonical bundle format is a Time Machine core capability (see below). Everything else — ingesting Prometheus metrics, OpenTelemetry traces, custom event logs, real-world capture feeds — lives in adapter projects that depend on the Time Machine, not inside it.

      ### Two distinct artifact kinds

      - **Canonical run directory** (`data/runs/<runId>/model/`, `series/`, `run.json`) — the Time Machine's internal operational truth for a run. Always written unconditionally on every run. **Clear-text, debuggable, inspectable.** Used by the Query API, Time Travel UI, run listings, and human debugging. This is FlowTime's authoritative in-place run record.
      - **Canonical bundle** (`model.yaml`, `manifest.json`, `series/index.json`, CSV files) — a portable, interchange-oriented artifact defined by the E-15 canonical bundle schema (`docs/schemas/telemetry-manifest.schema.json`). Written on demand, not on every run. **Different shape from the canonical run directory, and intentionally so**: the bundle's purpose (portable telemetry interchange, telemetry loop participation, archival) is distinct from the run directory's purpose (debugging, internal operational truth). The bundle format may evolve independently of the run directory format.

      The canonical run directory and the canonical bundle are **not two representations of the same thing**. They share content (both contain the model and the series) but their shapes, purposes, and lifecycles differ. Both are preserved.

      ### The telemetry loop (established vocabulary)

      See the `telemetry-loop-parity` epic at `work/epics/telemetry-loop-parity/spec.md` for the authoritative definition. In brief:

      > 1. Model and Sim produce a **baseline run** (canonical run directory on disk).
      > 2. **Telemetry capture** generates a canonical bundle from that baseline (Time Machine core capability).
      > 3. **Telemetry replay** creates a new run from the bundle (`ITelemetrySource` implementation for the canonical bundle, fed into the Time Machine as input).
      > 4. Outputs of the baseline run and the replay run are compared for **parity** (owned by the Telemetry Loop & Parity epic).

      The loop has three distinct primary use cases:

      1. **Specification / bootstrap.** You have a model but no real telemetry yet. Capture generates telemetry in the canonical format; the generated telemetry becomes the instrumentation specification for the real system — "these are the series at this cadence that the real system must emit so a replay produces the same result."
      2. **Self-consistency testing.** You have a model and a capture+replay pair. Round-trip the model through the loop and verify parity. Drift is a bug in capture, replay, or the Time Machine's determinism.
      3. **AI iteration / model fitting.** An AI agent proposes a candidate model. Capture generates telemetry from the candidate. Compare the generated telemetry to **real observed telemetry** from production. Adjust the model and iterate. The Time Machine provides the forward model; the loop provides the comparison surface.

      All three use cases require the capture and replay sides to be **round-trip consistent** for the canonical bundle format, modulo documented tolerances (owned by the Telemetry Loop & Parity epic).

      ### Contract asymmetry: `ITelemetrySource` yes, `ITelemetrySink` deferred

      - **`ITelemetrySource` is introduced by E-18 m-E18-01b** as the input contract. (m-E18-01a extracts the concrete `CanonicalBundleSource` reader from Generator without an interface; 01b lifts it to implement `ITelemetrySource` and adds a second implementation.) Multiple implementations from day one of 01b:
        - `CanonicalBundleSource` — reads canonical bundles (the telemetry loop's replay step). Concrete class created in 01a, lifted to implement `ITelemetrySource` in 01b.
        - `FileCsvSource` — reads `file:`-referenced CSV data (already what Core does today for model inputs). Extracted to implement `ITelemetrySource` in 01b.
        - Future: `FlowTime.Telemetry.Prometheus`, `FlowTime.Telemetry.Otel`, `FlowTime.Telemetry.BpiEventLog`, and other real-world ingestion adapters — **direct-source bypasses** of the E-15 Gold Builder pipeline. They implement `ITelemetrySource` against a live source without writing a canonical bundle to disk, and are alternatives to E-15's general path (raw → Gold → `CanonicalBundleSource`), not part of E-15 scope. Deferred until a concrete client need surfaces.
        - The contract must carry enough metadata to round-trip the canonical bundle format losslessly (modulo documented precision/format drift). This is a non-trivial design task in m-E18-01b, not a throwaway tiny interface.
      - **`ITelemetrySink` is explicitly deferred.** Only one sink format exists — the canonical bundle — and writing it is a Time Machine core capability, not a pluggable adapter. Canonical bundle writing is always done via a concrete `CanonicalBundleWriter` inside the Time Machine, not behind an interface. An `ITelemetrySink` interface will be introduced only when a second sink format is required (speculative — Prometheus push, OTEL emit, custom external system push). Per the "don't create abstractions for one-time operations" principle, no sink interface is built on speculation.

      ### Determinism boundary is at the source

      Live telemetry adapters (Prometheus queries, OTEL streams, Kafka consumers) are non-deterministic by nature. FlowTime's determinism story requires the Time Machine to see deterministic inputs. Resolution: **adapters snapshot live data at a well-defined point and expose the snapshot through `ITelemetrySource`**. The Time Machine sees only the snapshot, not the live feed. Snapshot provenance (source, query, timestamp, hash) is recorded in the run artifacts so the run can be reproduced exactly.

      This matches today's capture-directory flow, generalised: the adapter can produce the snapshot however it wants.

      ### Milestone ownership

      - **m-E18-01a** (Path B core cut) extracts the concrete canonical bundle writer and concrete `CanonicalBundleSource` reader from Generator into the Time Machine, alongside the execution-pipeline extraction. No `ITelemetrySource` interface yet — the reader is a concrete class. This is enough to enable the telemetry loop end-to-end over the canonical bundle format using today's existing capture and replay code, just rehosted.
      - **m-E18-01b** (Tiered Validation & Telemetry Source Contract) introduces `ITelemetrySource` as the formal interface. Lifts `CanonicalBundleSource` to implement it. Adds `FileCsvSource` as a second implementation. Tiered validation lands in this milestone.
      - **M-003** (reshaped from "Telemetry I/O" to "Telemetry Ingestion Source Adapters") delivers source-only adapters for real-world formats. Depends on the `ITelemetrySource` contract from 01b. No Time Machine changes. No sinks. Specific formats (Prometheus, OTEL, BPI event logs, GTFS, …) chosen when the milestone is scheduled, not now.
      - **m-E18-04** (Optimization & Fitting) depends on the Telemetry Loop & Parity epic being complete — optimization against real telemetry requires measured drift bounds. This is a hard prerequisite, not a soft one.

      ### Non-goals for E-18

      - **No real-world format sinks.** FlowTime does not generate Prometheus-format or OTEL-format telemetry from runs. If ever needed, add later as optional downstream adapters behind `ITelemetrySink` when it exists.
      - **No parity harness.** Drift measurement, tolerance rules, CI gating, regression reporting all belong to the Telemetry Loop & Parity epic.
      - **No topology inference from ingested telemetry.** Owned by E-15's Graph Builder.
      - **No Gold Builder pipeline.** Owned by E-15.

      ## Architecture

      ```
      FlowTime.Core (E-16: pure compiled engine; unchanged by E-18)
      ├── ModelSchemaValidator.Validate(yaml) → ValidationResult         (tier 1)
      ├── ModelCompiler.Compile(model) → CompiledModel                   (tier 2 front)
      ├── ModelParser.ParseModel(compiled) → (TimeGrid, Graph)           (tier 2 back)
      ├── Graph.Evaluate(grid) → EvaluatedState
      ├── Analyze(state) → AnalyticalFacts
      │
      │  E-17/E-18 shared foundation:
      ├── IdentifyParameters(graph) → Parameter[]
      ├── Reevaluate(graph, param_overrides) → EvaluatedState
      │
      │  E-18 specific:
      ├── EvaluateChunk(graph, state_at_t, bins[t..t+n]) → state_at_t+n
      └── ComputeObjective(state, objective_expr) → double

      FlowTime.TimeMachine (NEW — execution component)
      ├── ValidateSchema(yaml) → Result                                  (tier 1, from Core)
      ├── ValidateCompile(yaml) → Result                                 (tier 2, from Core)
      ├── Analyse(yaml) → Result                                         (tier 3, composes TemplateInvariantAnalyzer)
      ├── Compile(yaml) → CompiledGraphHandle
      ├── Evaluate(handle, params, seed) → Run
      ├── Reevaluate(handle, overrides) → Run
      ├── WriteRunDirectory(run, path) → RunId                           (canonical run dir, always written, clear-text)
      ├── WriteCanonicalBundle(run) → BundlePath                         (canonical bundle, on demand, for telemetry loop)
      ├── ITelemetrySource interface                                     (input contract, multiple implementations)
      ├── CanonicalBundleSource : ITelemetrySource                       (replay side of the telemetry loop)
      ├── FileCsvSource : ITelemetrySource                               (file: references in models)
      ├── CLI with pipeline-friendly I/O
      ├── Iteration protocol (keep graph alive across many evaluate/reevaluate calls)
      ├── Sidecar protocol (optional) — long-lived process driven over a wire protocol
      └── Analysis mode dispatch (sweep, optimize, fit, sensitivity, montecarlo, chunked)

      FlowTime.Pipeline (NEW — embeddable SDK; thin layer over the Time Machine)
      ├── Sweep(graph, param_grid) → results[]
      ├── Optimize(graph, objective, constraints, ranges) → optimal
      ├── Fit(graph, observed, fit_params) → calibrated
      ├── Sensitivity(graph, params, perturbation) → gradients
      ├── MonteCarlo(graph, distributions, N) → distribution[]
      └── ChunkedEvaluate(graph, chunk_size, controller_fn) → trace

      FlowTime.Telemetry.* (NEW — adapter projects, source-only, real-world ingestion)
      ├── FlowTime.Telemetry.Prometheus  : ITelemetrySource              (future, m-E18-06 / E-15)
      ├── FlowTime.Telemetry.Otel        : ITelemetrySource              (future, m-E18-06 / E-15)
      └── FlowTime.Telemetry.BpiEventLog : ITelemetrySource              (future, m-E18-06 / E-15)

      FlowTime.Generator (DELETED in E-18)
      └── Execution code → FlowTime.TimeMachine
      └── Telemetry-generation code → canonical bundle writer + CanonicalBundleSource (in TimeMachine or its own adapter)
      └── See "Generator migration" below

      ITelemetrySink (DEFERRED — not introduced until a second sink format exists)
      └── Canonical bundle writing is a concrete Time Machine capability, not a pluggable adapter.
      ```

      ## Core and Time Machine relationship

      Core and Time Machine are strictly layered. The dependency direction is **Time Machine → Core, never reverse.**

      - **`FlowTime.Core` is the library of pure deterministic operations.** In BEAM/JVM terms it is the instruction set and execution kernel as a library: `ModelSchemaValidator` (tier 1), `ModelCompiler` + `ModelParser` (tier 2), `Graph.Evaluate` (the execution kernel), expression compilation, analytical facts, and invariant analyzer rules. No HTTP, no orchestration, no storage, no client awareness. Core does not know what a "client" is.
      - **`FlowTime.TimeMachine` is the hosted machine.** It loads programs (YAML models → compiled graphs via Core), drives them through time (via Core's `Graph.Evaluate`), manages iteration and reevaluation protocols, handles parameter identity and override, writes canonical artifacts, and exposes the whole thing as a client-agnostic API with three surfaces (SDK, CLI, sidecar). The Time Machine is where the abstract machine's hosting concerns live: state lifetimes, run identity, RNG seeding, artifact layout, and multi-client API shapes.
      - **The Time Machine composes; it never reimplements.** If the Time Machine needs a pure computational primitive that Core is missing, the primitive is added to Core as a pure library function, not to the Time Machine as a parallel implementation. This preserves Core's invariants and prevents two sources of truth for any given computation.
      - **Core remains pure and stable.** Nothing added by E-18 gives Core HTTP, orchestration, storage, or client awareness. Core stays UI-less, host-less, and I/O-less beyond YAML parsing.

      ## Generator migration (Path B: extraction and deletion)

      **Origin.** This is recorded as decision D-032 and referenced from E-19 M-024's shared framing (item 3). The forward fate of `FlowTime.Generator` was previously left implicit.

      **Current state (pre-E-18).** `FlowTime.Generator` is the shared orchestration layer used by both `FlowTime.Sim.Service` and `FlowTime.API`. It owns `RunOrchestrationService`, `RunArtifactWriter`, deterministic run ID logic, RNG seeding, and dry-run/plan mode. Sim.Service does not reference `FlowTime.Core` directly — only via Generator. API references both Core and Generator.

      **Problem.** Generator's responsibilities — compile, evaluate, artifact write, run IDs, RNG seeding, dry-run — overlap the Time Machine's scope almost completely. Keeping Generator alive alongside the Time Machine would create two shared orchestration layers doing the same pipeline, which violates the no-coexistence discipline established in E-16 and E-19.

      **Decision (Path B — extraction and deletion).** In E-18 m-E18-01a (the dedicated Path B cut), the following is done in a single milestone:

      1. **Extract execution-pipeline code into `FlowTime.TimeMachine`** (new project):
         - `RunOrchestrationService` → Time Machine's Compile + Evaluate + ArtifactWrite operations (split along the tier boundary)
         - `RunArtifactWriter` → Time Machine's canonical run directory writer (always written, unchanged from today's clear-text layout — preserved for debugging value)
         - `RunDirectoryUtilities`, `RunOrchestrationContractMapper` → Time Machine supporting infrastructure
         - Deterministic run ID logic → Time Machine's run identity service
         - RNG seeding → Time Machine's parameter and run configuration
         - Dry-run / plan mode → Time Machine's tier 2 validation (compile-only)
         - Simulation-mode code → Time Machine's evaluate path

      2. **Extract telemetry-generation code into the canonical bundle adapter** (new project `FlowTime.Telemetry.Bundle`, or as part of the Time Machine if design review prefers):
         - `TelemetryBundleBuilder`, `TelemetryBundleOptions` → canonical bundle writer. Not behind `ITelemetrySink` (which is deferred) — a concrete writer. Called when the Time Machine is asked to produce a bundle.
         - `TelemetryCapture`, `TelemetryGenerationService` → canonical bundle writing orchestration, combined with the writer.
         - `CaptureManifestWriter` → canonical bundle manifest production (part of the writer).
         - `RunArtifactReader` (under today's Generator `Capture/`) → `CanonicalBundleSource`, the replay-side `ITelemetrySource` implementation for the canonical bundle format.
         - `GapInjector`, `GapInjectorOptions` → realism transform applied inside the canonical bundle adapter (or deferred to the Telemetry Loop & Parity epic if the transform is about driving parity tolerance tests rather than realistic bundle generation). The final location is an m-E18-01a decision.

      3. **Update callers**:
         - `FlowTime.Sim.Service` replaces its `FlowTime.Generator` reference with a `FlowTime.TimeMachine` reference. Sim.Service now depends on Time Machine for execution and keeps its own authoring/template responsibilities.
         - `FlowTime.API` replaces its `FlowTime.Generator` reference with `FlowTime.TimeMachine` (or drops the dependency entirely if API only needs Core-level reads).
         - The existing `POST /telemetry/captures` API endpoint and `flowtime telemetry capture` CLI surface are re-wired to call the extracted capture capability at its new home. The public surface does not change as part of Path B; only the implementation moves.

      4. **Delete `FlowTime.Generator`** in the same milestone. No stranded empty project. No "Generator and Time Machine coexist" window.

      **No coexistence window.** Path B deliberately rejects a transition state in which both `FlowTime.Generator` and `FlowTime.TimeMachine` exist in the tree. The extraction and deletion happen in one milestone cut, matching the E-16 no-coexistence pattern. If a milestone cannot extract cleanly in one pass, the correct response is to resize the milestone, not to introduce a coexistence shim.

      **Relationship with Sim's transitional execution host.** During E-19 (before E-18 ships), `FlowTime.Sim.Service`'s `/api/v1/orchestration/runs` endpoint remains the transitional execution host and routes through `FlowTime.Generator`. When E-18 completes the Path B migration, that endpoint is deleted in favour of the UI calling the Time Machine directly by default. A temporary thin facade is allowed only if a concrete technical migration constraint is documented in the owning E-18 milestone, with explicit removal criteria. That choice is made in the E-18 milestone that deletes Generator, not in E-19.

      **What Path B does not do.** Path B does not require any change to `FlowTime.Core`, the canonical run directory layout (`data/runs/<runId>/model/`, `series/`, `run.json`), the canonical run.json contract, the canonical bundle schema (`docs/schemas/telemetry-manifest.schema.json`), or the analytical surfaces purified by E-16. Those all stay unchanged. Path B is a project-boundary refactor, not a contract or data refactor. Canonical run directories stay clear-text and debuggable. Canonical bundles stay in their E-15-defined shape (which may evolve independently of the run directory if a future milestone decides the bundle needs a different shape for interchange purposes, but that is not Path B's concern).

      ## Success Criteria

      - [ ] The Time Machine can be called as a CLI in a shell pipeline: `cat model.yaml | flowtime evaluate --params '{"parallelism":4}' | jq '.nodes.queue.derived.queueTimeMs'`
      - [ ] The Time Machine exposes tiered validation (schema / compile / analyse) via SDK, CLI, and sidecar, callable identically from Sim UI, Blazor UI, Svelte UI, MCP servers, external AI agents, tests, and CI. No client is privileged.
      - [ ] Tier 1 (schema) returns validation results without compiling the model. Tier 2 (compile) returns without executing. Tier 3 (analyse) returns full invariant analysis. Each tier has a consistent request/response shape.
      - [ ] Parameter sweeps produce correct comparative results without recompilation per evaluation
      - [ ] An optimization loop can find parameter values that satisfy an objective + constraints
      - [ ] Model fitting against parity-validated real telemetry produces a calibrated model that predicts within tolerance
      - [ ] Chunked evaluation enables feedback simulation with external controller logic
      - [ ] All evaluation modes use the pure Core engine through the Time Machine — no adapter-side analytical computation, no Sim-private execution path
      - [ ] `FlowTime.Generator` is deleted. Its responsibilities are extracted into `FlowTime.TimeMachine` (and the canonical bundle adapter project) in a single milestone cut with no coexistence window. Sim.Service and API reference `FlowTime.TimeMachine` (or Core directly) instead of Generator. `rg "FlowTime\.Generator" src/ tests/` returns zero matches.
      - [ ] The canonical run directory (`data/runs/<runId>/model/`, `series/`, `run.json`) is preserved unchanged. It remains clear-text and debuggable as today.
      - [ ] The canonical bundle format (`model.yaml`, `manifest.json`, `series/`, CSV files) is produced by the Time Machine's canonical bundle writer and consumed by `CanonicalBundleSource`, and the two are round-trip consistent: capturing a baseline run and replaying its bundle produces the same outputs modulo documented drift tolerances owned by the Telemetry Loop & Parity epic.
      - [ ] `ITelemetrySource` is defined and has at least two implementations at milestone completion: `CanonicalBundleSource` and `FileCsvSource` (for `file:`-referenced CSV model inputs).
      - [ ] `ITelemetrySink` is **not** introduced on speculation. It is documented as deferred until a second sink format is required.
      - [ ] `FlowTime.TimeMachine` contains no external-telemetry-format-specific code (no Prometheus, OTEL, BPI-format parsing or emission). All external format knowledge lives in adapter projects under `FlowTime.Telemetry.*`. `rg -i "prometheus|opentelemetry|otel" src/FlowTime.TimeMachine/` returns zero matches.
      - [ ] The existing `POST /telemetry/captures` API endpoint and `flowtime telemetry capture` CLI command continue to work after Generator deletion, backed by the extracted canonical bundle writer. Their public request/response contracts are unchanged.

      ## Milestones

      Plan v2 (2026-04-10): once the Rust engine (E-20) became the evaluation path, the original C#-Core-centric milestone plan was reshaped. The current milestone structure lives here. `milestone-plan-v2.md` documents the remapping from v1 → v2.

      | ID | Title | Status | Summary |
      |----|-------|--------|---------|
      | M-001 | Parameterized Evaluation (Rust) | **complete** (merged to main 2026-04-10) | `ParamTable` in Plan. Compiler extracts tweakable parameters from const nodes, traffic arrivals, WIP limits. `evaluate_with_params(plan, overrides)` pure function. Parameter metadata (id, kind, default, bounds). Foundation for everything that follows. |
      | M-002 | Engine Session + Streaming Protocol (Rust) | **complete** (merged to main 2026-04-10) | `flowtime-engine session` persistent CLI mode. Length-prefixed MessagePack over stdin/stdout. Commands: `compile`, `eval`, `patch`, `get_params`, `get_series`, `validate_schema`. Session holds compiled Plan + current state. |
      | M-003 | Tiered Validation | **complete** (merged to main) | `TimeMachineValidator` (schema / compile / analyse tiers); `POST /v1/validate`; Rust `validate_schema` session command. Satisfies E-19 M-024 A6 (D-030). |
      | M-004 | FlowTime.TimeMachine Extraction (Path B) | **complete** (merged to main) | `FlowTime.TimeMachine` project created; `FlowTime.Generator` deleted outright. Path B, no coexistence window. Per D-032. |
      | M-005 | Telemetry Source Contract | **complete** (merged to main) | `ITelemetrySource` interface + `CanonicalBundleSource` + `FileCsvSource`. 23 tests. `ITelemetrySink` explicitly **not** introduced — see D-033. |
      | M-006 | Parameter Sweep | **complete** (merged to main) | `SweepSpec`/`SweepRunner`/`ConstNodePatcher`; `IModelEvaluator` / `RustModelEvaluator`; `POST /v1/sweep`. 35 tests. |
      | M-007 | Sensitivity Analysis | **complete** (merged to main) | `ConstNodeReader`; `SensitivitySpec`/`SensitivityRunner` (central difference); `POST /v1/sensitivity`. 39 tests. |
      | M-008 | Goal Seeking | **complete** (merged to main) | `GoalSeekSpec`/`GoalSeeker` (bisection); `POST /v1/goal-seek`. 33 tests. (Added 2026-04; not in original plan.) |
      | M-009 | Multi-parameter Optimization | **complete** (merged to main) | `OptimizeSpec`/`Optimizer` (Nelder-Mead, N parameters); `POST /v1/optimize`. 29 unit + 10 API tests. |
      | M-010 | SessionModelEvaluator | **complete** (merged to epic 2026-04-15) | Persistent `flowtime-engine session` subprocess; MessagePack over stdin/stdout; compile-once/eval-many. `RustEngine:UseSession` config switch (default true); `RustModelEvaluator` retained as fallback. 44 new tests. |
      | M-011 | .NET Time Machine CLI | **complete** (merged to epic 2026-04-15) | `flowtime validate/sweep/sensitivity/goal-seek/optimize` as pipeable JSON-over-stdio commands byte-compatible with `/v1/` endpoints. `--no-session` fallback. 72 CLI unit + 10 integration tests. |
      | m-E18-XX | Model Fit | **planned** — blocked on E-15 + Telemetry Loop & Parity | `FitSpec`/`FitRunner`/`POST /v1/fit` composing `ITelemetrySource` + `Optimizer`. Infrastructure exists; assembly requires telemetry ingestion (E-15) and parity harness first. |
      | m-E18-05 | Chunked Evaluation (Mode 6) | **deferred** — after discovery pipeline works end-to-end | Bin-chunk evaluation for feedback simulation with external controllers. Requires a real stateful execution seam. Sequenced after Model Fit per Option A (D-045). |

      ### Deferred from v1 (not on current critical path)

      These v1 milestones were superseded or deferred when the Rust engine became the evaluation path. Some have since been re-admitted under different IDs (M-003, M-004, M-005 above).

      - **m-E18-01a** Generator extraction — superseded by **M-004** (same outcome, different entry point).
      - **m-E18-01b** Tiered validation & telemetry source contract — split across **M-003** (validation) and **M-005** (telemetry source contract).
      - **m-E18-01c** Runtime parameter foundation — replaced by **M-001** (Rust-native, not C#).
      - **m-E18-04** Optimization & Fitting as a single milestone — split into **M-008** (goal seek), **M-009** (N-parameter optimize), and **m-E18-XX** (model fit).
      - **Telemetry Ingestion Source Adapters** (v1 M-003 idea) — moved to **E-15** scope; not an E-18 milestone.

      ## Risks & Open Questions

      | Risk / Question | Impact | Mitigation |
      |----------------|--------|------------|
      | Optimization solver choice (Nelder-Mead vs Bayesian vs gradient-free) | Medium | Start with Nelder-Mead (simple, derivative-free), add Bayesian later |
      | Model fitting convergence for complex topologies | High | Start with small models, add diagnostics for fit quality |
      | Chunked evaluation requires a real stateful execution seam, not just the current `IStatefulNode` stubs | High | Defer chunked evaluation to the epic's stateful layer; do not block foundation or analysis layers on it |
      | Objective expression language design | Medium | Start with simple predefined metrics, add expression support later |
      | Telemetry format proliferation | Low | Start with CSV (already supported) and JSON, add OTEL later |

      ## Dependencies

      - **E-16 Formula-First Core Purification** — must complete first. Provides the pure compiled engine that the Time Machine hosts.
      - **E-19 M-024 Supported Surface Inventory** — provides the A6 tiered-validation requirement, the Path B Generator extraction commitment (D-032), the telemetry-as-adapter framing (D-033), and the Time Machine naming decision (D-031) that this epic builds on.
      - **E-15 Telemetry Ingestion** — provides the canonical bundle schema (`docs/schemas/telemetry-manifest.schema.json`) that this epic's `CanonicalBundleSource` and canonical bundle writer must conform to. The schema already exists; this is an alignment dependency rather than a sequencing dependency.
      - **E-17 Interactive What-If Mode** consumes the shared runtime parameter foundation built here; it should not duplicate the runtime parameter model or reevaluation API.
      - **Telemetry Loop & Parity** (`work/epics/telemetry-loop-parity/spec.md`, currently unnumbered) — **hard prerequisite for m-E18-04 (Optimization & Fitting)**. Optimization and fitting against real telemetry require measured drift bounds, which only the parity harness can provide. Soft dependency for m-E18-01a through m-E18-03 (those milestones can ship without parity automation, but the loop's existence shapes the contract design in 01b).

      ## Analogies

      FlowTime's relationship to these analysis modes is the same as SPICE's relationship to circuit analysis:
      - The engine is the forward model (netlist → simulation)
      - Every analysis mode is a different way of calling the forward model
      - The engine doesn't need to know about optimization — it just evaluates purely
      - The analysis framework wraps the engine with different calling patterns

      ## References

      - SPICE analysis modes (.DC, .AC, .TRAN, .STEP, .MC, .OPTIM) as architectural precedent
      - Control theory system identification (Ljung, "System Identification: Theory for the User")
      - [work/epics/E-16-formula-first-core-purification/reference/formula-first-engine-refactor-plan.md](../E-16-formula-first-core-purification/reference/formula-first-engine-refactor-plan.md)
      - [docs/research/flowtime-headless-integration.md](../../../docs/research/flowtime-headless-integration.md)
  - kind: epic
    id: E-22
    frontmatter:
      title: Time Machine — Model Fit & Chunked Evaluation
      status: proposed
    body: |
      ## Goal

      Close out the remaining Time Machine analysis modes — **model fitting** against real telemetry and **chunked evaluation** for feedback simulation — and crystallize the resulting surface as a clean embeddable **`FlowTime.Pipeline` SDK**. These are the last two analysis modes in the E-18 Time Machine architecture; delivering them completes the "FlowTime as a callable function" arc.

      ## Context

      E-18 delivered 11 milestones covering parameterized evaluation, engine session protocol, tiered validation, parameter sweep, sensitivity, goal seek, N-parameter optimization, `SessionModelEvaluator`, and the .NET Time Machine CLI. All are on `main`. The analysis layer works end-to-end for synthetic runs.

      Two scope items remained in E-18 and are explicitly carried into E-22:

      - **Model Fit** (`FitSpec`/`FitRunner`/`POST /v1/fit`) — composes `ITelemetrySource` + `Optimizer` with residual as the objective. Infrastructure exists; the composition is the new work. **Blocked on** E-15 Telemetry Ingestion (first repeatable dataset path) and the Telemetry Loop & Parity epic (validated drift bounds — fitting against real telemetry without measured drift would produce falsely precise results).

      - **Chunked Evaluation** (Mode 6) — bin-chunk evaluation for feedback simulation with external controllers. The Rust engine session (M-002) is the seam, but the chunk-step protocol on top of it is not designed.

      A third scope item was decided (2026-04-20) to land alongside Fit and Chunked so the completed surface is exposed as a clean embeddable API:

      - **`FlowTime.Pipeline` SDK wrapper** — thin project exposing `Sweep`, `Sensitivity`, `GoalSeek`, `Optimize`, `Fit`, `ChunkedEvaluate` as a programmatic embedding surface over the Time Machine internals. Callers today reach into `FlowTime.TimeMachine.Sweep.*` directly; the SDK crystallizes the external contract.

      E-22 is sequenced per D-045 (Option A): `E-21 (active) → E-15 Telemetry Ingestion → Telemetry Loop & Parity → E-22`.

      ### Supersedes

      Closes out E-18 placeholder `m-E18-XX Model Fit` and `m-E18-05 Chunked Evaluation`. E-18 itself remains the archived parent epic (11 delivered milestones recorded there as "complete"); E-22 is the forward-looking epic that completes its scope.

      ### Related

      - **E-15 Telemetry Ingestion** (`work/epics/E-15-telemetry-ingestion/`) — hard prerequisite for Fit. Provides the first repeatable dataset path and replayable canonical bundle via Gold Builder → Graph Builder.
      - **Telemetry Loop & Parity** (`work/epics/unplanned/telemetry-loop-parity/spec.md`) — hard prerequisite for Fit. Provides measured drift bounds between synthetic and replayed runs; without those bounds, fit quality cannot be meaningfully reported. Currently unnumbered; will take its own epic slot when scheduled.
      - **E-21 Svelte Workbench & Analysis Surfaces** — builds UI for fit results once Fit's API contract is stable. Not in E-22 scope; E-21 milestone allocation is independent.

      ## Scope

      ### In Scope

      - `FitSpec` + `FitRunner` + `POST /v1/fit` composing `ITelemetrySource` + `Optimizer` with residual objective (RMSE / MAE / configurable) against a user-selected series
      - `flowtime fit` .NET CLI command, pipeable JSON-in/JSON-out, byte-compatible with `POST /v1/fit`
      - Chunked evaluation protocol: stateful `chunk_step` session command on the Rust engine that advances a compiled plan by N bins, yielding partial results
      - `ChunkSpec` + `ChunkRunner` + `POST /v1/chunked-eval` (final name TBD) driving the chunk-step protocol from .NET with external-controller integration
      - `flowtime chunked-eval` .NET CLI command matching the API contract
      - `FlowTime.Pipeline` project — thin embeddable SDK exposing `Sweep`, `Sensitivity`, `GoalSeek`, `Optimize`, `Fit`, `ChunkedEvaluate` as a clean programmatic API over the Time Machine internals; surfaces no HTTP, no CLI parsing, no artifact layout
      - Migration of existing internal callers (the API endpoints, the .NET CLI commands) to the `FlowTime.Pipeline` SDK so the SDK is dogfooded from day one
      - Test coverage matching E-18 standard: 100% branch coverage on pure runners; integration tests for Rust chunk-step protocol; API contract tests for `/v1/fit` and `/v1/chunked-eval`
      - Documentation: `docs/architecture/time-machine-analysis-modes.md` extended with Fit and Chunked sections; `FlowTime.Pipeline` SDK embedding guide

      ### Out of Scope

      - **Optimization constraints** (`--constraint "max(node.queue.utilization) < 0.8"`) — tracked in `work/gaps.md`; candidate for a later analysis-layer patch against `OptimizeSpec`/`GoalSeekSpec`/`FitSpec`
      - **Monte Carlo** (Mode 5) — sampling parameters from distributions, characterizing output distribution. Lower priority than Fit; tracked in gaps
      - **`FlowTime.Telemetry.*` direct-source adapters** (Prometheus, OpenTelemetry, BPI event logs) — E-15 Gold Builder covers the general batch path; adapters are narrower shortcuts to build only when a concrete client asks
      - **Tiered validation parity across Sim UI / Blazor UI / Svelte UI / MCP / external agents** — validation surface work; closer to E-21 M-043 (Validation Surface) and future Blazor maintenance
      - **Canonical bundle round-trip parity AC** (E-18 unchecked AC: capture baseline → replay bundle = same outputs modulo drift) — owned by Telemetry Loop & Parity, not E-22
      - **Fit-result UI** — lands in E-21 (or a later Svelte milestone) once Fit's API is stable; E-22 delivers only the contract
      - **Fitting algorithms beyond the existing optimizer** — Fit uses the existing Nelder-Mead `Optimizer` with a residual objective. Gradient-based or Bayesian fitters are future work
      - **Time grid alignment across heterogeneous sources** — assumes E-15 Gold Builder presents series on a common grid; grid alignment belongs to E-15
      - **Streaming / push UI for chunked evaluation** — chunked delivers a pull contract (caller drives chunk_step); WebSocket push for live simulation is a separate E-17-style track

      ## Constraints

      - Builds on the existing Rust engine session protocol (M-002). No changes to the MessagePack framing; `chunk_step` is a new command alongside `compile`, `eval`, `patch`, `get_params`, `get_series`, `validate_schema`
      - `FlowTime.Pipeline` is a pure SDK: no HTTP server, no CLI parsing, no artifact writing. It may compose services from other projects but its public API is in-process method calls returning strongly-typed results
      - Fit against real telemetry is gated by the Telemetry Loop & Parity harness reporting drift within documented tolerance. A failing parity harness blocks Fit acceptance — reported fit residuals without parity validation are not trustworthy
      - Byte-for-byte API ↔ CLI parity per the E-18 CLI convention: `flowtime fit < request.json` produces the same JSON as `POST /v1/fit`
      - .NET 9 / C# 13; invariant culture; camelCase JSON payloads (project-rule: `project.md:43`)
      - No reintroduction of the deprecated `FlowTime.Generator` project (D-032 Path B remains authoritative)

      ## Success Criteria

      - [ ] `POST /v1/fit` accepts `(model YAML, telemetry source spec, target series, parameter overrides to fit, residual metric)` and returns a fitted parameter set plus fit quality (residual, iterations, convergence flag)
      - [ ] `flowtime fit` CLI command produces byte-identical output to `POST /v1/fit` for equivalent inputs
      - [ ] Fit results against a parity-validated telemetry fixture produce residuals within documented tolerance; the tolerance bound is set by the Telemetry Loop & Parity harness output
      - [ ] Rust engine session responds to `chunk_step { bins: N }` command by advancing the compiled plan N bins and returning partial series; state persists across calls within a session
      - [ ] `POST /v1/chunked-eval` drives the chunk-step protocol from .NET, exposing either a polling pull or a request/response-per-chunk model (choice is a design task for the milestone)
      - [ ] External controller integration demonstration: a fixture controller consumes chunk outputs, writes back parameter patches, and the next chunk reflects the patch — end-to-end test, not just unit coverage
      - [ ] `FlowTime.Pipeline` project compiles as a standalone library; its public API exposes `Sweep`, `Sensitivity`, `GoalSeek`, `Optimize`, `Fit`, `ChunkedEvaluate` as strongly-typed methods
      - [ ] All `/v1/*` API endpoints added by E-18 are rewritten to call through `FlowTime.Pipeline` rather than `FlowTime.TimeMachine.*` internals directly; the SDK is dogfooded from day one
      - [ ] All Time Machine CLI commands (`flowtime validate/sweep/sensitivity/goal-seek/optimize/fit/chunked-eval`) are rewritten to call through `FlowTime.Pipeline`
      - [ ] 100% branch coverage on new pure runners (`FitRunner`, `ChunkRunner`); integration tests cover the Rust chunk-step protocol; API contract tests cover `/v1/fit` and `/v1/chunked-eval`
      - [ ] `docs/architecture/time-machine-analysis-modes.md` updated with Fit and Chunked Evaluation sections reflecting the shipped behavior
      - [ ] `FlowTime.Pipeline` embedding guide documents a concrete use case (e.g., hosted in a notebook, in an Azure Function, in a script) with a complete working example
      - [ ] On epic completion, E-18's `m-E18-05 Chunked Evaluation` and `m-E18-XX Model Fit` placeholder rows are struck through; E-18 epic status flips to `complete` and the epic is archived under `work/epics/completed/`

      ## Risks & Open Questions

      | Risk / Question | Impact | Mitigation |
      |-----------------|--------|------------|
      | Telemetry Loop & Parity epic has not been scheduled; without it Fit cannot be meaningfully validated | **Hard block** | Telemetry Loop & Parity must be scheduled and completed before Fit AC can be closed. E-22 does not start Fit until TLP ships |
      | E-15 first-dataset-path timeline is uncertain | High | E-15 is on the critical path per Option A. E-22 planning proceeds; E-22 implementation is gated on E-15 delivering at least one end-to-end canonical bundle dataset |
      | Chunked evaluation semantics for stateful nodes (e.g., queues carrying over bin boundaries) need design; the current `IStatefulNode` stubs may not suffice | Medium | First milestone of chunked scope is a design spike: document chunk-boundary state-transfer semantics before implementation |
      | Residual metric choice (RMSE vs. MAE vs. weighted) may not generalize across queueing topologies | Medium | Start with RMSE as default; make the residual a configurable strategy in `FitSpec`; document tradeoffs |
      | `FlowTime.Pipeline` SDK surface may be over-scoped if designed before external embedders give feedback | Medium | Keep the SDK minimal: expose only the methods that existing API/CLI callers need. Defer Monte Carlo, direct-source adapters, and any speculative surface |
      | Rust `chunk_step` may reveal gaps in the stateful execution seam that require refactoring inside the engine core, not just protocol work | Medium | Scope a Rust-side design spike first; if the seam needs reshaping, split into a foundation milestone before the .NET chunk runner |
      | Pipeline SDK rewrite of existing API/CLI callers may introduce regressions | Medium | Dogfood migration is done one endpoint at a time with full existing test coverage asserting behavior identity before and after |

      ## Milestones

      Sequencing: Fit first (unblocks the largest downstream set — E-15 dataset path leads directly into fit validation). Chunked second (independent Rust protocol work; runs after Fit only to avoid Rust-engine contention on a single milestone branch). Pipeline SDK third so it crystallizes against the final surface including Fit and Chunked.

      | ID | Title | Status | Depends on |
      |----|-------|--------|-----------|
      | m-E22-01-model-fit | Model Fit | not started | E-15 first dataset path complete; Telemetry Loop & Parity harness validated |
      | m-E22-02-chunked-evaluation | Chunked Evaluation | not started | m-E22-01 (sequencing only; no hard code dependency); M-002 session protocol (already delivered) |
      | m-E22-03-pipeline-sdk | `FlowTime.Pipeline` SDK Wrapper | not started | m-E22-01 + m-E22-02 complete (SDK reflects the final surface) |

      ## ADRs

      - (none yet — ADRs will be captured under `work/decisions.md` as they arise during milestone planning)

      ## References

      - E-18 epic spec: `work/epics/E-18-headless-pipeline-and-optimization/spec.md`
      - E-18 gap analysis: `work/epics/E-18-headless-pipeline-and-optimization/e18-gap-analysis.md`
      - Analysis modes architecture: `docs/architecture/time-machine-analysis-modes.md`
      - Telemetry Loop & Parity: `work/epics/unplanned/telemetry-loop-parity/spec.md`
      - E-15 Telemetry Ingestion: `work/epics/E-15-telemetry-ingestion/`
      - Option A delivery sequence: `work/decisions.md` → D-045
      - Headless engine architecture: `docs/architecture/headless-engine-architecture.md`
  - kind: epic
    id: E-16
    frontmatter:
      title: Formula-First Core Purification
      status: done
    body: |
      ## Goal

      Purify FlowTime's execution boundary so semantic meaning and analytical truth are compiled into Core once and consumed as facts everywhere else. This epic turns the existing "spreadsheet for flows" mental model into an enforceable architecture: parser/compiler resolve references, the core evaluates pure vector formulas, and adapters and clients stop reconstructing domain meaning from strings.

      ## Context

      E-10 established the right direction for engine correctness and analytical primitives, and `m-ec-p3a1` correctly identified that duplicated analytical logic in `StateQueryService` was a design problem rather than just a missing helper. We are now wrapping `m-ec-p3a1` as a bridge milestone: it moved the current analytical capability/computation surface into Core, but the review and plan pressure test confirmed that the full purification work is larger and should be owned entirely by E-16.

      The deeper structural issue remains:

      - runtime analytical identity is still inferred late from raw semantic strings
      - `StateQueryService` still carries parser-style context so it can reconstruct meaning
      - API contracts still expose hints (`kind`, `nodeLogicalType`) instead of authoritative analytical facts
      - UI/client code still re-implements queue/service classification and node category heuristics

      That means the current architecture is still vulnerable to the same class of drift that p3a1 was meant to fix. If we continue directly into the remaining E-10 Phase 3 work on top of that boundary, we will multiply the cleanup cost and likely accumulate more duct tape.

      This work should therefore be treated as a dedicated epic, not hidden inside another correctness milestone. The point is not a rewrite. The point is to move semantic truth earlier into the compile/evaluate pipeline, make deletion of the current heuristics an explicit deliverable, and do it in a forward-only cut rather than layering on compatibility shims.

      ## Scope

      ### In Scope

      - Typed semantic references in the compiled runtime model
      - A compiled analytical descriptor on runtime nodes
      - A pure Core analytical evaluator that owns emitted derived metrics and warning facts
      - Purification of `/state`, `/state_window`, and `/graph` contracts so clients can consume authoritative analytical and categorical facts
      - Removal of analytical identity reconstruction from `StateQueryService`
      - Separation of real by-class truth from wildcard fallback projection
      - Removal of raw-model-text metadata recovery and duplicate analytical fallback paths once regenerated runtime metadata and evaluator surfaces exist
      - Deletion audits and review gates that prevent reintroduction of heuristics

      ### Out of Scope

      - New analytical primitives such as WIP limits, variability, or constraint enforcement themselves
      - SIM/orchestration extraction and run packaging boundary work
      - A rewrite of the DAG evaluator or expression language foundation
      - Broad UI redesign unrelated to analytical truth and contract purity
      - Changes to deterministic artifact semantics unless explicitly versioned

      ## Constraints

      - No rewrite-from-scratch. This must be a strangler refactor around the existing deterministic DAG/compiler foundation.
      - Forward-only migration. Existing runs, generated fixtures, and approved snapshots that depend on the old analytical/runtime boundary may be deleted and regenerated; no backward-compatibility shim is required.
      - No new runtime behavior may depend on reparsing raw semantic strings after compile.
      - Each milestone must delete an old heuristic path; do not preserve old inference paths once the replacement exists.
      - Contract changes may remove or replace old hint fields in the same forward-only milestone when the named consumers for that milestone are migrated and tested.

      ## Success Criteria

      - [x] Runtime nodes carry compiled semantic references and an authoritative analytical descriptor.
      - [x] `StateQueryService` no longer parses raw semantic references or reconstructs analytical identity for runtime behavior.
      - [x] Core owns analytical evaluation, emitted derived keys, and warning eligibility facts for snapshot, window, and by-class outputs.
      - [x] API contracts publish authoritative analytical and node-category facts across current state and graph surfaces so first-party consumers stop classifying behavior from `kind + logicalType`.
      - [x] Fallback wildcard class data is explicit and distinguishable from real by-class truth.
      - [x] Runtime metadata readers and analytical query surfaces no longer recover required facts from raw model text or maintain duplicate model-evaluation fallback paths for analytical behavior.
      - [x] Remaining E-10 Phase 3 milestones can build on compiled facts instead of adapter heuristics.
      - [x] End-to-end pipeline validation proves Sim → Compiler → Runtime → API → Consumer works correctly: Sim-produced YAML (unchanged authoring surface) compiles through the new typed-reference compiler, evaluates correctly, and projects through purified contracts to consumers.

      ## End-to-End Validation Strategy

      E-16 changes Core/Compiler/API but not Sim's authoring surface. The full pipeline must be validated end-to-end even though Sim code is not modified:

      - **Sim → Compiler boundary:** Sim-produced YAML with raw string references compiles correctly through the new typed-reference compiler. At minimum, run all existing Sim templates through the new compiler and verify no regressions.
      - **Compiler → Runtime boundary:** Compiled typed references produce the same evaluated series as the old raw-string path. Parity tests per milestone.
      - **Runtime → API boundary:** Purified state projection (snapshot, window, by-class) produces the same analytical outputs. End-to-end API tests with `WebApplicationFactory<Program>`.
      - **Runtime → Graph/API boundary:** Graph projection and current-state projection both consume compiled facts instead of re-deriving category or analytical identity from strings.
      - **API → Consumer boundary:** First-party Blazor/JS consumers read from the new fact surface and produce the same behavior as the old `kind + logicalType` heuristic path.
      - **Model / template boundary:** Typed parallelism and reference cleanup must validate through model DTOs, template substitution, and graph projection surfaces; E-16 is not treated as a Core/API-only refactor in implementation planning.
      - **Integration test suite:** `tests/FlowTime.Integration.Tests` should include at least one scenario that exercises the full Sim-template → engine-run → state-query → contract-assertion path to guard against boundary drift.

      Each milestone is individually shippable, but the final milestone (M-017) must include a cross-cutting integration pass before declaring the epic complete.

      ## Risks & Open Questions

      | Risk / Question | Impact | Mitigation |
      |----------------|--------|------------|
      | Compiler/runtime model refactor touches many files across Core and API | High | Sequence compiler-first slices, keep each milestone shippable, and use deletion lists to constrain scope |
      | Contract purification may ripple into UI/client code, graph consumers, and golden tests | High | Keep the first-party consumer scope explicit and migrate all current state + topology consumers in the contract milestone |
      | Existing templates and fixtures rely on loose reference shapes | Medium | Regenerate runs, fixtures, and approved snapshots forward-only rather than carrying compatibility fallbacks |
      | Should the public contract expose the analytical descriptor directly or a smaller fact surface? | Medium | Decide in the contract milestone and ship one forward-only fact surface for the named current-state consumers |
      | How much warning policy belongs in the analytical evaluator vs a separate analyzer package? | Medium | Resolve explicitly during the evaluator milestone and document the ownership boundary |

      ## Milestones

      **Sequencing note:** `m-E16-01` through `m-E16-05` are the architecture gate between wrapped `m-ec-p3a1` and the rest of E-10 Phase 3. `m-E16-01` introduces typed references and parallelism typing; `m-E16-03` is the descriptor-driven deletion point for analytical-identity heuristics; `m-E16-06` publishes the final contract/consumer cut across state and graph surfaces.

      | ID | Title | Summary | Depends On | Status |
      |----|-------|---------|------------|--------|
      | [M-012](M-012.md) | Compiled Semantic References | Replace raw runtime semantic strings with typed references and regenerate dependent runs/fixtures forward-only. | none | completed |
      | [M-013](M-013.md) | Class Truth Boundary | Separate real by-class truth from wildcard fallback before descriptor and evaluator work depend on it. | M-012 | completed |
      | [M-014](M-014.md) | Runtime Analytical Descriptor | Compile authoritative analytical identity onto runtime nodes and delete adapter-side logical-type reconstruction. | M-013 | completed |
      | [M-015](M-015.md) | Core Analytical Evaluation | Move analytical values and emitted-series truth into a pure Core evaluator for snapshot, window, and by-class outputs. | M-014 | completed |
      | [M-016](M-016.md) | Analytical Warning Facts & Primitive Cleanup | Move warning facts into Core analyzers and finish analytical primitive ownership cleanup. | M-015 | completed |
      | [M-017](M-017.md) | Analytical Contract & Consumer Purification | Publish authoritative analytical facts and delete named current-state consumer heuristics in one forward-only cut. | M-016 | completed |

      **Forward-only rule:** old run directories, generated fixtures, and approved golden snapshots are not compatibility obligations for this epic. When the runtime boundary changes, regenerate them.

      ## Why This Is a Separate Epic

      E-10 is still the right umbrella for correctness and analytical primitives, but it did not explicitly own the deeper architectural purification that p3a1 exposed. Treating this as a separate epic does three useful things:

      1. It gives boundary cleanup explicit success criteria rather than burying it in feature work.
      2. It makes deletion of heuristics and duplicate policy a first-class deliverable.
      3. It prevents the remaining Phase 3 work (`p3d` -> `p3c` -> `p3b`) from normalizing an impure adapter/client boundary.

      In short: E-10 found the wound, `m-ec-p3a1` stabilized the current bridge, and E-16 now owns closing it properly.

      ## References

      - [reference/formula-first-engine-refactor-plan.md](reference/formula-first-engine-refactor-plan.md)
      - [docs/concepts/nodes-and-expressions.md](../../../docs/concepts/nodes-and-expressions.md)
      - [docs/architecture/expression-language-design.md](../../../docs/architecture/expression-language-design.md)
      - [work/epics/E-10-engine-correctness-and-analytics/M-057.md](../E-10-engine-correctness-and-analytics/M-057.md)
      - [work/epics/E-10-engine-correctness-and-analytics/spec.md](../E-10-engine-correctness-and-analytics/spec.md)
  - kind: epic
    id: E-17
    frontmatter:
      title: Interactive What-If Mode
      status: done
    body: |
      **Completed:** 2026-04-12
      **Branch merged:** `epic/E-17-interactive-what-if-mode` → `main`

      ## Goal

      Enable live, interactive recalculation in FlowTime — change a parameter and see results update instantly across the entire model, like a spreadsheet.

      ## Context

      After E-16, the engine will be a pure compiled evaluation surface: typed references, compiled descriptors, pure evaluators. The evaluation itself is already fast enough for live interaction. What's missing is one shared runtime parameter foundation: parameter identity and override points in compiled graphs, reevaluation APIs, and optional enrichment from authored template parameter metadata. Sessions, push delivery, and UI controls build on that foundation.

      The circuit simulator analogy: SPICE compiles a netlist once, then allows parameter sweeps and interactive probing without re-reading the schematic. FlowTime should do the same.

      ## Scope

      ### In Scope

      - Parameter identification in compiled graphs — which nodes are user-editable constants?
      - Runtime parameter model — change parameter values without recompilation
      - Server-side session management — keep compiled graph alive across requests
      - Re-evaluation API — accept parameter changes, return updated results
      - Push channel (WebSocket/SignalR) for live UI updates
      - UI parameter controls — sliders, numeric inputs bound to model parameters
      - Analytical re-evaluation through the pure Core evaluator after parameter change
      - Parameter metadata enrichment from authored template parameters when available (titles, ranges, defaults, descriptions)

      ### Out of Scope

      - Optimization loops and automated parameter search (E-18)
      - Headless CLI and pipeline embedding (E-18)
      - Model topology changes at runtime (requires recompilation — that's fine)
      - New analytical primitives
      - Bin-by-bin / chunked evaluation (future: feedback simulation)

      ## Constraints

      - Evaluation must feel instantaneous (< 50ms end-to-end for parameter change → UI update)
      - No recompilation for parameter value changes — only for structural model changes
      - The push channel must not require polling
      - Parameter identity, override points, and deterministic reevaluation must be derivable from the compiled graph. Human-facing labels, ranges, defaults, and descriptions may be enriched from template parameter metadata when available.

      ## Success Criteria

      - [ ] User can change a model parameter via UI control and see all metrics, charts, and heatmaps update live
      - [ ] Parameter changes do not trigger recompilation — only re-evaluation
      - [ ] Compiled graph stays alive in a server-side session; no re-parse/re-compile per interaction
      - [ ] Analytical results (cycle time, flow efficiency, warnings) update through the pure Core evaluator
      - [ ] UI parameter controls are generated from model metadata, not hand-coded per template

      ## Milestones

      | ID | Title | Status | Summary |
      |----|-------|--------|---------|
      | M-018 | WebSocket Engine Bridge | complete | .NET WebSocket proxy over persistent Rust `flowtime-engine session` subprocess; MessagePack compile/eval/get_series round-trip |
      | M-019 | Svelte Parameter Panel | complete | SvelteKit `/what-if` page with live-bound sliders, example model picker, series mini-charts, latency badge |
      | M-020 | Live Topology + Charts | complete | Dag-map topology graph with heatmap, per-series charts with hover tooltips, layout stability across tweaks |
      | M-021 | Warnings Surface | complete | Engine warnings flow through session protocol into banner, details panel, and topology node badges; capacity-constrained example model drives the demo loop |
      | M-022 | Edge Heatmap | complete | Color topology edges by their throughput series mean; wires up the already-present `edgeMetrics` prop in dag-map-view |
      | M-023 | Time Scrubber | complete | Bin-position slider switches heatmap (nodes + edges) from mean to per-bin value; vertical crosshair on all charts |

      **Final polish (post-m-E17-06):** Advanced demo models (SaaS API platform, e-commerce order pipeline with chained throughput); edge color semantic fixed to destination node load; zero-anchored heatmap normalization; sidebar model picker; warnings as non-shifting overlay with bezier connectors and pulsing animation. 200 vitest.

      ## Dependencies

      - E-16 (Formula-First Core Purification) — must complete first
      - Shared runtime parameter foundation — owned once and shared with E-18; E-17 consumes it rather than defining a second runtime parameter model

      ## References

      - [work/epics/E-16-formula-first-core-purification/reference/formula-first-engine-refactor-plan.md](../E-16-formula-first-core-purification/reference/formula-first-engine-refactor-plan.md)
      - SPICE interactive analysis modes as architectural precedent
  - kind: epic
    id: E-19
    frontmatter:
      title: Surface Alignment & Compatibility Cleanup
      status: done
    body: |
      ## Goal

      Tighten the remaining non-analytical legacy and compatibility surfaces after E-16 so FlowTime exposes current Engine/Sim contracts consistently across first-party UI, Sim, docs, schemas, and examples without carrying stale fallback layers or stripping supported Blazor capability.

      ## Context

      E-16 purifies analytical truth and contract facts, but broader repo surfaces still carry compatibility debt that sits outside the formula-first boundary:

      - first-party Blazor/UI clients still contain endpoint and metrics fallback paths
      - parallel Svelte and Blazor surfaces need an explicit shared-contract discipline so one UI does not silently drift from the other
      - active UI/template code still carries demo generation and schema-migration residue such as `binMinutes`-based templates
      - Sim and UI surfaces still expose transitional endpoint or discovery helpers whose purpose is no longer clearly distinguished from true supported behavior
      - Sim still publicly owns template-driven run creation while Engine `/runs` now imports canonical bundles and reads canonical run artifacts
      - storage-backed drafts and archived run bundles are active first-party surfaces, but their supported status versus transitional status is not explicit
      - catalog-era runtime seeding, endpoints, and UI clients still exist even where active callers say catalogs are no longer used
      - template vs draft vs model vs run vs bundle terminology is ambiguous enough that the current Sim orchestration path can be mistaken for the future Time Machine contract
      - docs, schemas, and examples still keep some deprecated material on current surfaces instead of moving it to archive/historical space

      These are not analytical truth seams, so they should not be folded back into E-16. But they also should not remain unowned. If left alone, temporary compatibility layers become a de facto product support promise and the parallel UI surfaces will drift.

      This epic creates an explicit post-purification cleanup lane: once E-16 finishes, FlowTime should tighten the rest of its first-party surfaces around one current contract and a small set of explicitly supported user paths. That includes keeping Blazor current as a supported debugging/plan-B surface, not retiring it.

      ## Scope

      ### In Scope

      - Inventory of first-party compatibility and legacy seams outside E-16's analytical boundary
      - Explicit supported-surface policy across Engine, Sim, Svelte UI, Blazor UI, docs, schemas, and examples
      - Explicit boundary between current Sim authoring/orchestration surfaces and the future E-18 Time Machine foundation
      - Retirement of first-party UI and Sim runtime fallback paths that are no longer required once canonical endpoints and contracts exist
      - Retention/deletion decisions for storage-backed drafts, archived run bundles, bundle import paths, runtime catalogs, and catalog-era caller residue
      - Removal or archival of deprecated schema, demo, template, and example material from active current surfaces
      - Blazor UI alignment work so `FlowTime.UI` stays current with evolving Engine/Sim contracts without carrying stale compatibility wrappers
      - Tests, grep audits, and documentation updates that prevent reintroduction of deleted compatibility layers

      ### Out of Scope

      - Analytical truth, emitted-series logic, by-class purity, warning fact ownership, or consumer fact publication already owned by E-16
      - New analytical primitives from E-10 Phase 3 (`p3d`, `p3c`, `p3b`)
      - Delivering missing Svelte UI product features themselves; E-11 still owns additive Svelte buildout
      - Blazor UI retirement or functionality removal as a cleanup goal
      - The new Time Machine runtime parameter foundation, reevaluation API, evaluation SDK, CLI/sidecar, or optimization/fitting modes owned by E-18
      - Chunked/stateful execution semantics and streaming/stateful seams owned by later E-18 layers or dedicated streaming work
      - Additive backward-compatibility phases for deprecated surfaces
      - Generic low-level library fallbacks with no product-contract meaning (for example layout placement fallbacks) unless they are later promoted into a first-party compatibility promise

      ## Constraints

      - Starts after E-16 establishes purified current contracts; runtime/API cleanup milestones should consume those contracts rather than redefine them
      - Does not block E-10 Phase 3 resume by default; this runs as a parallel post-purification cleanup lane unless a specific milestone intentionally touches a shared contract gate
      - Svelte and Blazor run in parallel; shared client and contract changes must keep both UIs aligned rather than privileging only one surface
      - Forward-only: archive or delete deprecated surfaces instead of carrying new compatibility shims
      - Remove stale wrappers and fallback logic without deleting supported Blazor debugging/operator workflows unless a separate decision explicitly approves it
      - Each milestone must make the supported-vs-historical boundary narrower, not broader

      ## Boundary To E-18

      E-19 and E-18 are adjacent but they do different work:

      - **E-19** narrows or deletes the current first-party residue around Sim authoring/orchestration, storage-backed drafts, archived bundle refs, runtime catalogs, and ambiguous caller paths. It decides what remains supported on today's surfaces.
      - **E-18** builds the replacement Time Machine foundation: runtime parameter identity, deterministic overrides, reevaluation APIs, evaluation SDK, and CLI/sidecar over compiled graphs.

      The current Sim orchestration path is therefore not the default path forward for Time Machine evaluation. If an E-19 deletion depends on new capability, that dependency should be made explicit against E-18 rather than preserving the current residue indefinitely.

      ## Current Findings To Use

      | Surface / Residue | Current Role | Risk If Left Unowned | E-19 Intent |
      |------------------|--------------|----------------------|-------------|
      | Sim `/api/v1/orchestration/runs` and `/api/v1/drafts/run` | Current first-party template-driven run creation | Transitional Sim execution APIs harden into a support obligation before the Time Machine replacement ships | Inventory, narrow, retain only if explicitly supported as an authoring surface |
      | `data/storage/drafts` and draft CRUD endpoints | Saved editable YAML working copies | Hidden product surface with unclear support and lifecycle | Decide whether draft authoring is a supported Sim feature or transitional residue |
      | `data/storage/runs` and `bundleRef`-based archive flow | Portable archived run bundles | Duplicates canonical runs and makes the archive path look like the primary run contract | Decide whether bundle refs stay as an interchange/import surface or are retired |
      | Engine `/runs` import path via bundle path/archive/ref | Canonical bundle import, not template orchestration | Confused with Time Machine run creation | Keep only if import is explicitly supported; document it as import, not evaluation ownership |
      | Runtime catalogs, catalog endpoints, and UI catalog clients | Residue from earlier Sim/catalog direction | Zombie compatibility surface that invites new callers | Retire from active first-party paths unless an explicit support case survives inventory |
      | Template/draft/model/run/bundle terminology drift | Ambiguous product language | Wrong architecture hardens by naming accident | Publish one boundary ADR and use it as the inventory baseline |

      ## Success Criteria

      - [x] One explicit supported compatibility matrix exists for Engine, Sim, Svelte UI, Blazor UI, docs, schemas, and examples
      - [x] One explicit terminology and ownership matrix exists for template, draft, model, run, bundle, and catalog surfaces
      - [x] First-party clients no longer maintain duplicate endpoint, metrics, or health fallback logic where the canonical contract exists (M-027: stale `IFlowTimeSimApiClient.RunAsync`/`GetIndexAsync`/`GetSeriesAsync` deleted and callers rewired to supported `CreateRunAsync` + Engine query surface)
      - [x] Current Sim orchestration/storage/catalog residue is either explicitly supported with scope boundaries or removed from active first-party paths
      - [x] Active UI/template surfaces no longer generate or promote deprecated schema shapes such as `binMinutes`-based demo templates (M-026: Blazor mock template service, sample fixture, CLI verbose label, and UI test keys all rewritten to `binSize`/`binUnit`)
      - [x] Legacy examples, docs, and schema references are either archived/historical or deleted; current docs present one canonical surface (M-026: schema-migration example YAMLs moved to `examples/archive/`; stale `docs/ui/template-integration-spec.md` moved to `docs/archive/ui/`; active docs cleaned)
      - [x] Blazor UI support policy is explicit: it remains a supported debugging/plan-B surface and consumes current Engine/Sim contracts without stale compatibility wrappers
      - [x] E-18 planning remains clean: no current Sim draft/catalog/bundle choreography is treated as the default programmable/Time Machine contract
      - [x] Grep and regression audits prove targeted legacy/fallback helpers are removed or isolated to historical/archive surfaces only (M-025: 21 guards; M-026: 11 guards; M-027: 11 guards, all 43 passing)

      ## Risks & Open Questions

      | Risk / Question | Impact | Mitigation |
      |----------------|--------|------------|
      | Which operational fallbacks are true compatibility seams vs useful local-dev resilience? | Medium | Milestone 1 creates the supported-surface inventory and keeps only explicitly justified operational resilience |
      | Parallel Svelte and Blazor work may drift if sync ownership stays implicit | High | Keep milestone 4 about Blazor support alignment, plus shared contract audits, rather than retirement |
      | Some docs/examples are still useful as migration references | Low | Move them to archive/historical locations instead of keeping them on current surfaces |
      | Consumers outside first-party UI may still read deprecated endpoints/fields | Medium | Make the supported-surface policy explicit before deletion milestones start |

      ## Sequencing

      This epic starts immediately after E-16 as a post-purification cleanup lane. It should run in parallel with resumed E-10 Phase 3 work and final E-11 parity work, not silently replace them.

      - E-16 removes analytical truth and consumer-fact reconstruction seams.
      - E-19 removes the remaining non-analytical legacy, fallback, and current-surface debt around those purified contracts.
      - E-11 continues as a parallel UI track; E-19 keeps both first-party UIs aligned to the same current Engine/Sim contracts.

      ## Milestones

      | ID | Title | Summary | Depends On | Status |
      |----|-------|---------|------------|--------|
      | M-024 | Supported Surface Inventory, Boundary ADR & Exit Criteria | Inventory compatibility seams, define supported vs historical surfaces, publish the terminology/ownership ADR, and pin retention/deletion gates for drafts, bundles, catalogs, and import paths. | E-16 | completed |
      | M-025 | Sim Authoring & Runtime Boundary Cleanup | Narrow Sim to explicitly supported authoring/orchestration surfaces, remove transitional catalog/runtime callers, and keep Engine import/query ownership explicit. | M-024 | completed |
      | M-026 | Schema, Template & Example Retirement | Remove or archive deprecated schema, demo template, and example material from active current surfaces. | M-024 | completed |
      | M-027 | Blazor Support Alignment | Remove stale `FlowTime.UI` compatibility wrappers, keep Blazor aligned with current Engine/Sim contracts, and define clear supported debugging/operator workflows alongside the parallel Svelte UI. | M-025, M-026 | completed |

      ## Candidate Retention / Decision Matrix

      ### Retain Only If Explicitly Supported

      - Repo-backed templates and template metadata served by Sim as an authoring surface
      - Engine `/v1/runs/*` query/read endpoints over canonical run artifacts
      - Blazor and Svelte as parallel first-party UIs consuming current contracts
      - Storage-backed drafts only if saved draft authoring remains a supported user workflow

      ### Decide In `m-E19-01`

      - Sim `/api/v1/orchestration/runs` as a supported authoring convenience vs transitional surface
      - Sim `/api/v1/drafts/*` lifecycle and whether storage-backed drafts remain a product promise
      - `data/storage/runs` and `bundleRef` as an explicit interchange/import surface vs transitional archive residue
      - Engine bundle import endpoints as supported import workflows vs temporary migration surfaces
      - Runtime catalog seeding, catalog endpoints, and catalog-aware UI clients

      ### Delete / Archive Candidates

      - `FlowTime.UI` client fallbacks and legacy endpoint probes that duplicate canonical Engine/Sim contracts
      - stale metrics/state reconstruction in first-party Blazor consumers that survive E-16
      - demo/template generation paths that still emit deprecated schema fields on active surfaces
      - active catalog selection, mock catalog services, and placeholder `CatalogId = "default"` callers that are no longer part of the supported path
      - active docs/examples that present deprecated schema shapes as current guidance
      - Sim service compatibility shims whose only purpose is preserving transitional first-party clients that have already been replaced
      - docs or examples that imply the current Sim orchestration/storage choreography is the future programmable/Time Machine contract

      ## References

      - `work/epics/E-16-formula-first-core-purification/spec.md`
      - `work/epics/E-11-svelte-ui/spec.md`
      - `work/epics/E-18-headless-pipeline-and-optimization/spec.md`
      - `docs/architecture/template-draft-model-run-bundle-boundary.md`
      - `ROADMAP.md`
      - `work/gaps.md`
  - kind: epic
    id: E-20
    frontmatter:
      title: Matrix Engine
      status: done
    body: |
      > **Status note:** M-028–10 all complete

      **Owner:** Engine

      ## Goal

      Replace the C# object-graph evaluation engine with a Rust-based column-store + evaluation-plan engine. The new engine reads the same YAML model files, produces identical output artifacts, and ships as a standalone CLI binary (`flowtime-engine`). This is the foundation for E-17 (Interactive What-If) and E-18 (Time Machine).

      ## Context

      The current C# engine (`FlowTime.Core`) evaluates models via an object graph: `INode` implementations, `Dictionary<NodeId, Series>` memoization, defensive copies, and class hierarchy dispatch. It works correctly (1287 tests, all passing) but the representation fights the domain:

      - **Defensive copying**: `Series` clones on construction AND on `ToArray()` — two allocations per node per evaluation.
      - **Hash lookups during evaluation**: `Dictionary<NodeId, Series>` instead of direct array indexing.
      - **No incremental re-evaluation**: changing one input requires re-evaluating the entire graph.
      - **Feedback subgraphs require special handling**: the bin-by-bin evaluator added in E-10 p3b is correct but is a bridge to the matrix model where bin-sequential evaluation is the default.
      - **No plan introspection**: the evaluation is opaque code, not inspectable data.

      The research doc (`docs/research/engine-rewrite-language-and-representation.md`) establishes that the engine is fundamentally an array programming problem. All series live in one contiguous matrix (`double[seriesCount × binCount]`), and the evaluation plan is an ordered list of operations that read input columns and write output columns.

      ### Why Rust

      - Ownership eliminates all defensive copying — `&[f64]` slices are immutable by construction.
      - `enum Op` + `match` replaces 6 class files and an interface hierarchy with ~80 lines.
      - Compiles to native CLI binary (zero runtime, ~5-10 MB) and to WebAssembly (engine in browser for E-17).
      - Single allocation during evaluation regardless of model size.
      - SIMD opportunity for element-wise operations (70-80% of typical models).

      ### Why now

      E-17 (Interactive What-If) needs incremental re-evaluation (<50ms response). E-18 (Time Machine) needs parameter sweeps (1 compile + N partial replays). Both are economically different with the matrix model vs without it. Building E-17/E-18 on the object graph means building them twice.

      The bin-by-bin feedback evaluator from E-10 p3b validates the approach — it IS the matrix model scoped to feedback subgraphs.

      ## Scope

      ### In scope

      1. **Rust crate** (`flowtime-core`) implementing:
         - YAML model deserialization (same schema as C# `ModelDefinition`)
         - Model compilation: YAML → column map + evaluation plan
         - Topology synthesis (same logic as `ModelCompiler`: queue nodes, retry echo, WIP overflow routing, cycle validation)
         - Expression parsing and compilation to plan ops
         - Evaluation: execute plan against flat matrix
         - Derived metrics as additional plan ops (utilization, latency, throughput ratio, cycle time, flow efficiency, Cv, Kingman)
         - Invariant analysis (conservation checks, non-negativity, capacity bounds) as matrix column arithmetic
         - WIP limit enforcement with overflow routing
         - Feedback subgraph evaluation (bin-by-bin — the default mode for sequential ops)
         - SHIFT-based backpressure (falls out naturally from bin-sequential evaluation)
         - Constraint allocation (proportional allocation when demand > capacity)
         - Router flow materialization
         - Dispatch schedule gating
         - Artifact writing: per-series CSVs, `series/index.json`, `run.json` (warnings, metadata)
         - Tiered validation: schema validation → compilation → analysis (dry-run without artifact writing)

      2. **CLI binary** (`flowtime-engine`) with commands:
         - `eval <model.yaml> --output <dir>` — full evaluation + artifact writing
         - `validate <model.yaml>` — tiered validation (schema → compile → analyse), no artifacts
         - `plan <model.yaml>` — print the evaluation plan (for inspection/debugging)
         - stdin/stdout support for pipeline composition

      3. **Parity test harness**: a set of reference models (extracted from the C# test suite) with approved output artifacts. The Rust engine must produce bitwise-identical outputs. If discrepancies are found that reveal C# bugs, fix C# and update the approved outputs.

      4. **Integration bridge**: the .NET API calls the Rust binary as a subprocess, reads its output artifacts, and serves existing API responses. No API contract changes.

      ### Out of scope

      - API hosting (stays in C#/.NET)
      - Topology metadata projection for `/graph` endpoint (stays in C#)
      - UI work
      - WebAssembly compilation (future — architecture supports it, but not this epic)
      - In-process FFI from .NET to Rust (future optimization)
      - E-17 interactive features (parameter sessions, push channel)
      - E-18 advanced modes (sweep, optimize, fit) — though the plan structure enables them

      ## Architecture

      ### Data representation

      ```
      State = f64[series_count × bin_count]    // flat 1D, row-major
      ```

      Each row is a series. Each column is a time bin. All series contiguous in memory.

      ### Evaluation plan

      ```rust
      enum Op {
          Const { out: usize, values: Vec<f64> },
          VecAdd { out: usize, a: usize, b: usize },
          VecSub { out: usize, a: usize, b: usize },
          VecMul { out: usize, a: usize, b: usize },
          VecDiv { out: usize, a: usize, b: usize },
          VecMin { out: usize, a: usize, b: usize },
          VecMax { out: usize, a: usize, b: usize },
          Clamp { out: usize, val: usize, lo: usize, hi: usize },
          Shift { out: usize, input: usize, lag: usize },
          Convolve { out: usize, input: usize, kernel: Vec<f64> },
          QueueRecurrence { out: usize, inflow: usize, outflow: usize, loss: Option<usize>, init: f64, wip_limit: Option<usize>, overflow_out: Option<usize> },
          DispatchGate { out: usize, input: usize, period: usize, phase: usize, capacity: Option<usize> },
          ScalarAdd { out: usize, input: usize, k: f64 },
          ScalarMul { out: usize, input: usize, k: f64 },
          Floor { out: usize, input: usize },
          Ceil { out: usize, input: usize },
          Round { out: usize, input: usize },
          Mod { out: usize, a: usize, b: usize },
          Step { out: usize, input: usize, threshold: usize },
          Pulse { out: usize, period: usize, phase: usize, amplitude: Option<usize> },
          // Router ops, constraint allocation ops, derived metric ops...
      }
      ```

      ### Evaluator

      ```rust
      fn evaluate(plan: &[Op], bins: usize, series_count: usize) -> Vec<f64> {
          let mut state = vec![0.0; series_count * bins];
          for op in plan {
              execute(op, &mut state, bins);
          }
          state
      }
      ```

      ### Column map

      Bidirectional mapping between human-readable series names and integer column indices. Produced once during compilation.

      ### Pipeline

      ```
      YAML model
        │
        │  deserialize
        ▼
      ModelDefinition (Rust structs)
        │
        │  compile: topo-sort + assign column indices + emit ops
        ▼
      EvaluationPlan + ColumnMap
        │
        │  execute: fill the matrix
        ▼
      State Matrix (f64[series_count × bins])
        │
        │  derive: append derived metric ops, re-execute tail
        ▼
      Full Matrix (with derived columns)
        │
        │  analyse: conservation checks, warnings
        ▼
      Warnings
        │
        │  write: column map tells you which column is which series
        ▼
      Artifacts (CSVs + index.json + run.json)
      ```

      ## Constraints

      - The YAML model schema does not change. Existing models must work unmodified.
      - Output artifacts must be bitwise-identical to C# output (modulo discovered C# bugs).
      - The Rust crate must compile on Linux x86_64 (devcontainer target). macOS and Windows are nice-to-have.
      - No external runtime dependencies (no JVM, no .NET, no Python). Single static binary.
      - The .NET API integration must not require changes to API contracts or client code.

      ## Risks

      1. **Expression parser parity**: The C# expression parser (`FlowTime.Expressions`) supports a specific syntax. The Rust parser must match it exactly. Mitigation: extract expression test cases as a shared fixture.
      2. **Floating-point parity**: Different compilers may produce different results for the same math. Mitigation: use IEEE 754 double precision, avoid platform-specific optimizations, test with bitwise comparison.
      3. **YAML deserialization edge cases**: `serde_yaml` may handle edge cases differently from the C# YAML deserializer. Mitigation: test with all existing model fixtures.
      4. **Model compiler complexity**: `ModelCompiler` has significant logic (queue synthesis, retry echo, WIP overflow routing, constraint wiring). Mitigation: port method-by-method with test parity at each step.
      5. **Devcontainer Rust toolchain**: Need to add Rust to the devcontainer. Mitigation: `rustup` + `cargo` install is straightforward.

      ## Success Criteria

      - [ ] `flowtime-engine eval` produces bitwise-identical artifacts to C# engine on all reference models
      - [ ] `flowtime-engine validate` reports the same warnings/errors as C# validation
      - [ ] `flowtime-engine plan` prints a human-readable evaluation plan
      - [ ] All reference models evaluate correctly (parity harness green)
      - [ ] .NET API can call the Rust binary and serve identical API responses
      - [ ] Single static binary, no runtime dependencies
      - [ ] Evaluation performance equal to or faster than C# (not a hard gate, but expected)
      - [ ] Feedback subgraphs (SHIFT-based backpressure) work without special-casing — bin-sequential evaluation handles them naturally

      ## Dependencies

      - E-10 complete (provides the analytical primitives the Rust engine must reproduce)
      - E-16 complete (provides the pure evaluation model the Rust engine implements)

      ## References

      - `docs/research/engine-rewrite-language-and-representation.md` — detailed research and design
      - `src/FlowTime.Core/` — current C# engine (source of truth for semantics)
      - `src/FlowTime.Core/Compiler/ModelCompiler.cs` — compilation logic to port
      - `src/FlowTime.Core/Execution/Graph.cs` — evaluation logic to replace
      - `src/FlowTime.Core/Expressions/` — expression system to port
      - `tests/FlowTime.Core.Tests/` — test cases defining expected behavior

      ## Milestones

      | ID | Title | Summary | Status |
      |----|-------|---------|--------|
      | M-028 | Scaffold, types, and parsers | Rust crate, model types with serde, YAML deserialization, expression parser. Reference model fixtures. Devcontainer Rust toolchain. | complete |
      | M-029 | Compiler and core evaluator | Column map, topo sort, plan generation for const/expr nodes. Evaluator loop + element-wise ops. First end-to-end parity on simple models. | complete |
      | M-030 | Topology and sequential ops | Queue synthesis, QueueRecurrence, Shift, Convolve, DispatchGate, PMF, WIP limits with overflow. Feedback subgraphs (bin-sequential). | complete |
      | M-031 | Routing and constraints | Router flow materialization, constraint allocation, multi-class flow distribution — all as plan ops. | complete |
      | M-032 | Derived metrics and analysis | Utilization, latency, cycle time, Cv, Kingman as plan ops. Invariant analysis as column arithmetic. Warnings. | complete |
      | M-033 | Artifacts, CLI, and integration | CSV/JSON artifact writer. CLI (eval, validate, plan). | complete |
      | M-034 | .NET subprocess bridge | SHA256 hashing + manifest.json. RustEngineRunner subprocess bridge. Config switch. Parity tests. | complete |
      | M-035 | Full parity harness | All 21 fixtures tested against C# engine. `outputs:` filtering. Green/red parity matrix. | complete |
      | M-036 | Per-class decomposition and edge series | Per-class columns, edge metrics, class assignment. Engine core feature-complete. | complete |
      | M-037 | Artifact sink parity | Full directory layout. StateQueryService compatible. RunArtifactWriter replaceable. | complete |

      ### Milestone progression

      Each milestone delivers a progressively more capable engine, testable against C# reference output at every stage:

      - After **M1**: parse any model YAML and any expression — data layer complete
      - After **M2**: evaluate simple models (const + expr) — first correct series output
      - After **M3**: evaluate models with queues, SHIFT, WIP, backpressure — core flow dynamics
      - After **M4**: evaluate models with routers, constraints, classes — full flow algebra
      - After **M5**: produce derived metrics and warnings — full analytical layer
      - After **M6**: produce artifacts, run from CLI — standalone binary
      - After **M7**: .NET can call the Rust engine as a subprocess — bridge operational
      - After **M8**: parity verified against all fixtures — no surprises before core work
      - After **M9**: engine returns complete results (classes, edges) — evaluation-complete
      - After **M10**: artifact sink produces full layout — C# RunArtifactWriter replaceable, E-17/E-18 unblocked
  - kind: epic
    id: E-21
    frontmatter:
      title: Svelte Workbench & Analysis Surfaces
      status: done
    body: |
      **Completed:** 2026-04-28

      ## Goal

      Transform the Svelte UI from a Blazor-parallel clone into the primary platform for expert flow analysis and Time Machine surfaces, using a workbench paradigm (topology as navigation + inspection panel) instead of the Blazor overlay approach.

      ## Context

      The fork decision (2026-04-15) declared Svelte the platform for all new surfaces and Blazor maintenance-only. E-11 delivered M1-M4 + M6: scaffold, API layer, topology via dag-map, timeline with heatmap scrubbing, and run orchestration. E-17 added the what-if page with live parameter manipulation (200 vitest + 26 Playwright).

      What exists in Svelte today:
      - SvelteKit + shadcn-svelte + Tailwind v4, dark/light theme toggle
      - Topology DAG via dag-map with heatmap overlays and timeline scrubbing
      - Run orchestration (template cards, bundle reuse)
      - What-if page (E-17 — WebSocket parameter panel with real-time topology updates)
      - Routes: `/`, `/health`, `/run`, `/what-if`, `/time-travel/topology`, `/time-travel/dashboard`, `/time-travel/artifacts`, `/engine-test`

      What's missing:
      - Node/edge inspection (no way to click a node and see its metrics)
      - Analysis surfaces for Time Machine APIs (sweep, sensitivity, goal-seek, optimize, validate — all built in E-18 but with no UI)
      - Heatmap view (nodes-x-bins temporal pattern grid)
      - Compact, information-dense layout (current shadcn defaults are too spacious for a technical workbench)
      - Distinctive visual identity (current theme is generic shadcn)

      The UI paradigm proposal (`work/epics/unplanned/ui-workbench/reference/ui-paradigm.md`) established the direction: topology as navigation surface (structure + one color dimension), workbench panel for depth (click-to-pin cards), and layered views (heatmap, decomposition, comparison). E-21 implements that paradigm and adds the first Time Machine analysis surfaces.

      ### Supersedes

      - **E-11 M5** (Inspector & Feature Bar) — evolves into M-038/02 workbench paradigm
      - **E-11 M7** (Dashboard) — deferred; workbench + heatmap cover the same ground better
      - **E-11 M8** (Polish) — absorbed into M-045

      E-11 remains paused at M6 as a completed historical track.

      ### Relationship to other unplanned epics

      - **UI Workbench & Topology Refinement** (`work/epics/unplanned/ui-workbench/spec.md`) — M-038 and M-039 implement its goals (G1-G5)
      - **UI Analytical Views** (`work/epics/unplanned/ui-analytical-views/spec.md`) — M-043 delivers the heatmap view; decomposition and comparison views are future extensions
      - **Expert Authoring Surface** (`work/epics/unplanned/expert-authoring-surface/spec.md`) — not in E-21 scope; depends on E-21's workbench and validation surface being in place

      ## Scope

      ### In Scope

      - Compact design system replacing shadcn spacing defaults — information-dense, calm chrome, rich data-viz colors
      - Workbench panel with click-to-pin node/edge cards, sparklines, metric display
      - Metric selector and class filter replacing Blazor's 15-toggle feature bar
      - dag-map library enhancements (click/hover events, selected state) — we own dag-map
      - Analysis page with tabbed Time Machine surfaces: sweep, sensitivity, goal-seek, optimize
      - Heatmap view (nodes-x-bins grid, first layered view)
      - Validation surface with tiered diagnostic display and topology warning badges
      - Dark/light theme with distinctive palette (calm chrome, vivid data colors)
      - Visual polish pass for demo-ready quality

      ### Out of Scope

      - Expert authoring surface (CodeMirror + inline lenses — separate future epic)
      - Executive/BI dashboard (separate surface consuming FlowTime data, not this UI)
      - Blazor changes beyond maintenance-mode contract alignment
      - Model fitting UI (`POST /v1/fit` — blocked on Telemetry Loop & Parity)
      - Chunked evaluation / streaming UI
      - Backend API changes other than read-only run-adjacent endpoints (see Constraints). Authoring, orchestration, compute, write paths, telemetry sinks — all out of scope.
      - Mobile/responsive layout
      - E-15 telemetry ingestion UI (parallel track, not E-21 scope)
      - dag-map layout engine changes (separate `ui-layout` epic)
      - Decomposition view, comparison view, flow balance view (future layered views beyond heatmap)

      ## Design Direction

      ### Audience

      | Audience | Surface | Relationship to E-21 |
      |----------|---------|---------------------|
      | Expert modeler | Svelte workbench | Primary user. Compact, data-dense, keyboard-aware. |
      | Demo viewer | Same workbench | The demo IS the tool. No separate demo mode. Must look like a serious technical instrument. |
      | Executive / BI | Separate surface (future) | Not this UI. Consumes FlowTime data exports/API. Out of scope. |

      ### Density

      The shadcn-svelte defaults produce a consumer-product aesthetic: generous padding (`p-4`/`p-6`), large text, wide spacing, friendly rounded corners. A workbench needs the opposite: tight padding, smaller type, information density. Every pixel of chrome padding is a pixel not showing data.

      Concrete changes from current state:
      - Main content padding: `p-6` (24px) → `p-2` (8px) or context-dependent
      - Sidebar: 280px → ~200px expanded, ~40px collapsed
      - Border radius: `0.5rem` → `0.25rem` or less
      - Working text size: `text-xs` (12px) as default body, `text-sm` (14px) for emphasis
      - Component padding: tighten all shadcn component internals
      - Spacing scale: use 2/4/6/8/12px steps, not 4/8/12/16/24px

      ### Color Architecture

      Two separate token layers:

      **Chrome tokens** (backgrounds, borders, text) — calm, restrained, few colors:
      - Dark mode: near-black backgrounds (`hsl(220 10% 4%)`-range), subtle dark grid/border lines, muted light gray text (not bright white)
      - Light mode: warm light gray backgrounds, subtle borders, dark text
      - Minimal accent color usage in chrome — the frame should recede

      **Data-viz tokens** (heatmaps, charts, sparklines, topology overlays) — where vibrancy lives:
      - Hue families: teal/cyan, pink/magenta, coral/red, blue, green, gold/amber
      - Designed for legibility against both dark and light backgrounds
      - Consistent across all data surfaces (topology heatmap, sparklines, analysis charts, heatmap grid)
      - Sequential scales for metric mapping (single-hue ramps)
      - Diverging scales for comparison/delta views

      Reference inspiration: o16g.com/data/ dark palette (see `reference-palette.png` alongside this spec). The goal is "quantitative instrument" not "friendly SaaS dashboard."

      ### Theming Iteration

      The token architecture must make major theme changes easy:
      - All spacing from semantic tokens, not inline Tailwind values
      - Chrome and data-viz as independent palettes
      - Theme presets possible by swapping one CSS import
      - User will bring visual examples for palette iteration — the system must accommodate this without touching component code

      ## Constraints

      - .NET 9 backend APIs are the source of truth. Svelte UI is primarily a consumer. Two explicit carve-outs are admitted: (1) per **D-046**, E-21 may add **read-only run-adjacent endpoints** that strictly serve already-persisted run artifacts (e.g. `GET /v1/runs/{runId}/model`); (2) per **D-047**, E-21 may extend existing compute-endpoint response shapes with **additive** fields that expose state the endpoint already computes internally (specifically the `trace` field on `/v1/goal-seek` and `/v1/optimize`). Authoring, orchestration, new compute endpoints, write-path endpoints, and non-additive shape changes to existing compute endpoints remain out of scope and need their own decision record if ever proposed.
      - dag-map enhancements must remain general-purpose (not FlowTime-specific API)
      - Existing what-if page (E-17) must continue working after workbench changes
      - Existing run orchestration (E-11 M6) must continue working
      - Playwright tests required for every milestone that ships UI changes
      - Vitest for pure logic (helpers, store derivations, protocol encoding)
      - Must work in existing devcontainer (Node 20, ports 5173/8081)

      ## Success Criteria

      - [ ] Clicking a node in the topology opens a workbench card with metrics and sparkline
      - [ ] All five Time Machine analysis modes are accessible from the UI (sweep, sensitivity, goal-seek, optimize, validate)
      - [ ] Heatmap view shows nodes-x-bins temporal patterns with shared color scale
      - [ ] Layout is visibly more compact than current shadcn defaults — no "air"
      - [ ] Dark and light themes both work with calm chrome and vivid data colors
      - [ ] A non-technical viewer watching a demo finds the tool visually serious and information-rich
      - [ ] Existing what-if and run orchestration pages still function correctly
      - [ ] dag-map click/hover events are implemented in the library, not as wrapper hacks

      ## Risks & Open Questions

      | Risk / Question | Impact | Mitigation |
      |----------------|--------|------------|
      | Compact density feels cramped or hard to read | Med | Start with defined density tokens; adjust after user testing. Semantic tokens make changes cheap. |
      | dag-map library changes take longer than expected | Med | dag-map click/hover can be wired externally as a fallback while library work proceeds. Don't block workbench on it. |
      | Color palette needs multiple iterations to land | Low | Token architecture makes palette swaps cheap. User will bring examples. |
      | Analysis API calls are slow for large sweeps (session evaluator helps) | Med | Show progress/loading state. `SessionModelEvaluator` (M-010) is the default and is fast for moderate sweeps. |
      | Heatmap SVG performance with many nodes x bins | Low | 20 nodes x 100 bins = 2000 rects, well within SVG limits. Add row virtualization if measured problems appear. |
      | What-if page assumes current spacing/layout | Med | Audit what-if page during density pass. It may need minor layout adjustments. |

      ## Milestones

      | ID | Title | Summary | Status |
      |----|-------|---------|--------|
      | M-038 | Workbench Foundation | Density system, dag-map events (library), topology as navigation (one color dimension), workbench panel with click-to-pin node cards | **complete** (merged 2026-04-17) |
      | M-039 | Metric Selector & Edge Cards | Metric chip bar, edge click-to-pin, edge cards, class filter | **complete** (merged 2026-04-17) |
      | M-040 | Sweep & Sensitivity Surfaces | `/analysis` route with tabs, sweep config + results, sensitivity bar chart | **complete** (merged 2026-04-17; ultrareview follow-ups 2026-04-20) |
      | M-041 | Goal Seek Surface | Goal-seek panel, shared convergence chart + result card, `trace` on `/v1/goal-seek` and `/v1/optimize` (per D-047) | **complete** (2026-04-22) |
      | M-042 | Optimize Surface | N-param Nelder-Mead surface reusing shared convergence chart + result card from M-041; per-param range table | **complete** (2026-04-22) |
      | M-043 | Heatmap View | Nodes-x-bins grid, row sorting, click-to-jump, view switcher (topology/heatmap), shared full-window color scale, shared node-mode toggle | **complete** (2026-04-24) |
      | M-044 | Validation Surface (Svelte) | Consumer-side type widening on `state_window` warnings; validation panel as left column inside workbench panel; topology node + edge warning indicators; workbench-card warning surfaces; bidirectional cross-link via shared view-state store; Playwright real-bytes fixture for AC1 round-trip. No backend work. | **complete** (2026-04-28) |
      | M-045 | Visual Polish & Dark Mode QA | Topology keyboard + ARIA retrofit, full bidirectional cross-link (node + edge), dark mode audit, loading skeletons, transitions rule, elevation normalization | **complete** (2026-04-28) |

      ## ADRs

      - ADR-E21-01: New epic E-21 rather than resuming E-11. E-11 was "clone Blazor in Svelte." E-21 is "build the workbench paradigm + new surfaces." E-11's remaining milestones (M5/M7/M8) are absorbed with different scope.
      - ADR-E21-02: dag-map click/hover events implemented in the library (we own dag-map) rather than external wrapper hacks. Cleaner API, reusable for non-FlowTime consumers.
      - ADR-E21-03: Analysis surfaces use tabbed interface at `/analysis` route rather than separate routes. Tabs enable comparison and reduce navigation.
      - ADR-E21-04: Dashboard (E-11 M7) deferred. Workbench + heatmap view cover per-node overview better than a dedicated dashboard page.
      - ADR-E21-05: Density pass is M-038 scope, not polish. Building on spacious defaults and compressing later cascades through every component.
  - kind: epic
    id: E-23
    frontmatter:
      title: Model Validation Consolidation
      status: done
    body: |
      ## Goal

      Make `docs/schemas/model.schema.yaml` the **only declarative source of structural truth** about the post-substitution model, and `ModelSchemaValidator` the **only runtime evaluator**. Eliminate every "embedded schema" — every place outside the canonical schema where model rules are re-encoded. After E-23 closes:

      - One schema. Declared in `model.schema.yaml`.
      - One validator. `ModelSchemaValidator.Validate`, with named adjuncts (alongside `ValidateClassReferences`) for any rule JSON Schema draft-07 cannot express.
      - Zero parallel imperative validators. `ModelValidator.cs` is deleted.
      - Every rule has exactly one canonical home. No silent rules in parsers, emitters, or post-parse orchestration paths.

      ## Spirit and history

      The discovery driving E-23 was that FlowTime did not have a central model schema every component agreed on. Different files enforced different — sometimes contradictory — versions of "what is a valid model." E-24 Schema Alignment fixed two of those embedments: it unified the **type** (`SimModelArtifact` + `ModelDefinition` collapsed to `ModelDto`/`ProvenanceDto` in `FlowTime.Contracts`) and consolidated the **schema document** (`model.schema.yaml` rewritten top-to-bottom against `ModelDto`, hard-asserted at `val-err == 0` across the twelve templates per `TemplateWarningSurveyTests`).

      E-23 closes the loop. After E-24 there is still a parallel imperative validator on the live `/v1/run` and CLI paths (`src/FlowTime.Core/Models/ModelValidator.cs`, 214 lines, ~25 rules) plus latent rules in the parser, emitter, and orchestration layers that have never been audited against the schema. E-23 audits those embedments, lifts every rule into either the schema or a named `ModelSchemaValidator` adjunct, migrates every call site to `ModelSchemaValidator`, and deletes `ModelValidator` outright.

      This is the same Truth Discipline spirit that drove E-24's type unification: the canonical contract owns the rule; nothing else does. The 2026-04-23 guard added to `.ai-repo/rules/project.md` (*"'API stability' does not mean 'keep old functions around.'"*) is the explicit prohibition on retaining `ModelValidator` as a dead alternative entry point once `ModelSchemaValidator` covers it. The companion guards (*"Do not restate a canonical contract in many places from memory"*, *"Do not let adapter/UI projection become the only place where semantics exist"*) extend the same discipline to the parser, emitter, and orchestration layers.

      ## Context

      Two validators ship today in `FlowTime.Core`:

      - **`ModelValidator.Validate`** (`src/FlowTime.Core/Models/ModelValidator.cs`) — hand-rolled, imperative, uses YamlDotNet `IgnoreUnmatchedProperties()`. Does not consult the JSON schema. Used by `POST /v1/run` (`src/FlowTime.API/Program.cs:657`), the Engine CLI (`src/FlowTime.Cli/Program.cs:76`), and `TimeMachineValidator` tier-1 (`src/FlowTime.TimeMachine/Validation/TimeMachineValidator.cs:50`).
      - **`ModelSchemaValidator.Validate`** (`src/FlowTime.Core/Models/ModelSchemaValidator.cs`) — reads `docs/schemas/model.schema.yaml` and performs full JSON-schema evaluation plus the `ValidateClassReferences` adjunct. Used inside `TimeMachineValidator.ValidateSchema` (line 46), reachable from `POST /v1/validate` and the `flowtime validate` CLI command.

      Post-E-24 they validate the same C# type (`ModelDto`) against semantically the same input. That is the foundation E-23 builds on. What E-23 must still do:

      1. **Audit every rule embedment.** `ModelValidator`'s 25 rules are the obvious target, but parser tolerations, silent emission defaults, and post-parse orchestration checks are equally embedments. Each one is a place where model truth lives outside the canonical schema and can therefore drift.
      2. **Lift each rule to its canonical home.** Schema-expressible rules go to `model.schema.yaml`. Cross-reference / runtime-data rules go to `ModelSchemaValidator` adjuncts. A rule that legitimately cannot be a model rule (e.g., scalar-style coercion is YAML representation concern, not model rule — already addressed by E-24 M-052) gets a written justification.
      3. **Migrate every production call site.** `POST /v1/run`, Engine CLI, `TimeMachineValidator` tier-1, plus four test surfaces flip from `ModelValidator.Validate` to `ModelSchemaValidator.Validate`.
      4. **Delete `ModelValidator.cs` outright.** No delegation shim, no dead alternative entry point.

      The historical context — the pause for E-24, the original M-046 "schema-alignment" milestone, the stashed input material on branch `milestone/m-E23-01-schema-alignment` — is captured in `D-2026-04-24-036` (E-23 paused, E-24 created), `D-2026-04-24-037` (Option E unify ratified), and `D-2026-04-25-038` (E-24 closed, E-23 ready to resume). Those decisions stand; this spec rewrite is the post-E-24 reformulation, not a contradiction of them.

      ## Scope

      ### In Scope

      - **Embedment audit.** Every rule encoded in `ModelValidator.cs`, `ModelParser.cs`, `SimModelBuilder.cs` (post-E-24), `RunOrchestrationService.cs`, and `GraphService.cs` is enumerated and dispositioned. Per-rule outcome: schema-covered, schema-add, adjunct, parser-justified, or drop.
      - **Schema additions.** Every rule classified `schema-add` lands in `docs/schemas/model.schema.yaml` with a citation comment so the rule's provenance is traceable.
      - **Adjunct additions.** Every rule classified `adjunct` lands as a named method on `ModelSchemaValidator` alongside `ValidateClassReferences`, invoked from `Validate`, with at least one negative-case unit test.
      - **Call-site migration.** Production: `POST /v1/run`, Engine CLI, `TimeMachineValidator` tier-1. Tests: `tests/FlowTime.Integration.Tests/SimToEngineWorkflowTests.cs`, `tests/FlowTime.Tests/Schema/{TargetSchemaValidationTests,SchemaVersionTests,SchemaErrorHandlingTests}.cs`.
      - **Error-message phrasing audit.** `ModelValidator` returns flat strings (`"Grid must specify bins"`); `ModelSchemaValidator` returns JSON-schema-shaped messages (`/grid/bins: Required properties are missing: [bins]`). Tests asserting on phrasing get updated; UI / CLI consumers that surface raw strings get audited and adjusted (or none, if no consumer regex-parses validator output).
      - **`ModelValidator` deletion.** `src/FlowTime.Core/Models/ModelValidator.cs` is removed; `ValidationResult` (currently bottom of that file) is moved to its own file.
      - **Negative-case canary.** A new test catalogue feeds a deliberately-invalid model snippet for each non-trivial audited rule and asserts `ModelSchemaValidator.Validate(...).IsValid == false`. Locks in the audit's coverage claim.
      - **Survey canary remains green.** `TemplateWarningSurveyTests.Survey_Templates_For_Warnings` continues to report `val-err == 0` across all twelve templates at `ValidationTier.Analyse` — E-24's hard assertion stays in place; nothing in E-23 may break it.

      ### Out of Scope

      - Any change to `SimModelBuilder`'s emission of `grid.start` from `window.start`. Sim is correct; E-24 already aligned the schema (`grid.start` declared optional). E-23 does not modify Sim emission.
      - Any change to Blazor or Svelte UI. Both remain untouched. M-044 Validation Surface (E-21) consumes the consolidated validator after E-23 closes; that is the next epic's concern.
      - New validator features: line/column mapping, LSP integration, incremental validation, per-field suggestions, compile-time rule extraction, schema-draft migration. The goal is consolidation, not expansion.
      - `Template`-layer validation. `TemplateSchemaValidator` validates pre-substitution authoring templates against `template.schema.json` — that is genuinely a different contract and stays distinct. E-23 only touches post-substitution model validation.
      - Reintroducing any deprecated schema fields (`binMinutes`, snake_case provenance, two-type YAML, etc.). Per project rules.
      - External-consumer compatibility. No camelCase aliases, no dual-shape acceptance, no migration mode. Forward-only per `ADR-E-24-02`.

      ## Constraints

      - **`ModelValidator` is deleted, not delegated.** No forwarding shim. No "temporary alias." Single consolidation endpoint after E-23: `ModelSchemaValidator.Validate`.
      - **Schema-first preference for rule placement.** When a rule is expressible in JSON Schema draft-07, it belongs in the schema, not as an adjunct. Adjuncts are the exception (cross-reference checks, runtime-data conditionals), not the default.
      - **Parser-justified is a written justification, not a default.** Any rule left in parser/emitter code must answer "why is it not a model rule?" in the M-046 audit doc. "Hard to move" is not a justification.
      - **Byte-for-byte parity on the `/v1/run` success path.** Currently-valid models receive byte-identical responses post-migration. Error responses preserve HTTP status (400) and JSON shape (`{ "error": "..." }`); error phrasing may change (covered by phrasing audit in M-047).
      - **Survey canary stays green at every milestone close.** `TemplateWarningSurveyTests` continues to report `val-err == 0` at `ValidationTier.Analyse`. A non-zero count fails the build.
      - **No reintroduction of `FlowTime.Generator` or any variant of the deleted provenance pipeline.** Per `D-2026-04-07-019` Path B.

      ## Success Criteria

      - [ ] Embedment audit recorded in `m-E23-01-rule-coverage-audit-tracking.md`. Every rule in `ModelValidator.cs`, `ModelParser.cs`, `SimModelBuilder.cs`, `RunOrchestrationService.cs`, and `GraphService.cs` has a row with: file:line citation, plain-English rule, current schema status (yes/no/partial with line cite), and final disposition (schema-covered, schema-add, adjunct, parser-justified, drop).
      - [ ] Every rule classified `schema-add` is declared in `docs/schemas/model.schema.yaml` with a citation comment. Every rule classified `adjunct` is implemented as a named method on `ModelSchemaValidator` and invoked from `Validate`, with at least one negative-case unit test.
      - [ ] Negative-case canary (`tests/FlowTime.Core.Tests/Schema/RuleCoverageRegressionTests.cs` or analogous) covers every non-trivial audited rule. Each test feeds a deliberately-invalid model snippet and asserts `ModelSchemaValidator.Validate(...).IsValid == false` plus the expected error contains the rule's identifying substring.
      - [ ] `src/FlowTime.Core/Models/ModelValidator.cs` is deleted. `grep -rn "ModelValidator\b" --include="*.cs"` outside `.claude/worktrees/` returns zero hits.
      - [ ] `ModelSchemaValidator.Validate` is the single model-YAML validator called from `POST /v1/run`, `POST /v1/validate`, the Engine CLI, the `flowtime validate` Time Machine CLI, `TimeMachineValidator`, and all test paths.
      - [ ] `POST /v1/run` produces byte-identical success responses for all currently-valid models post-migration. For currently-invalid models, error responses preserve HTTP 400 and `{ "error": "..." }` shape; error phrasing may differ and is covered by an explicit phrasing audit in M-047.
      - [ ] `TemplateWarningSurveyTests.Survey_Templates_For_Warnings` reports `val-err == 0` across all twelve templates at `ValidationTier.Analyse`. (E-24's hard assertion stays green.)
      - [ ] Full `.NET` test suite passes: `dotnet test FlowTime.sln` is green. UI vitest and Playwright remain green (Svelte and Blazor surfaces untouched).
      - [ ] `ValidationResult` is moved out of the deleted `ModelValidator.cs` into its own file `src/FlowTime.Core/Models/ValidationResult.cs` (pure relocation, no API change), since it remains the shared result type used by `ModelSchemaValidator` and `TimeMachineValidator`.

      ## Open Questions

      | Question | Blocking? | Resolution path |
      |----------|-----------|-----------------|
      | Does every rule in `ModelValidator` have an equivalent JSON Schema draft-07 expression, or do some land as adjuncts? | Yes — gates M-046 outcome | M-046 rule audit answers per-rule. Audit output is the first deliverable. Default leaning: most rules express cleanly (enums, ranges, const, `additionalProperties: false`). Cross-reference rules (e.g., node-id uniqueness within `nodes[]`) land as adjuncts because draft-07's `uniqueItems` only matches identical scalars, not "objects with same `id`". |
      | Are there parser tolerations in `ModelParser.cs` that constitute unwritten rules? | Yes — gates M-046 outcome | M-046 reads `ModelParser.cs` (733 lines) for `IgnoreUnmatchedProperties`, `??` defaults, conditional branches that swallow missing data. Each becomes an audit row. |
      | Are there orchestration-layer checks in `RunOrchestrationService` / `GraphService` that should be model rules? | Yes — gates M-046 outcome | M-046 surveys the post-parse path. Likely findings: class-reference checks (already in `ValidateClassReferences`), output-id uniqueness, etc. Each becomes an audit row. |
      | Should M-047 and M-048 collapse into one milestone, or stay split for rollback safety? | No — sequencing detail | Default: stay split. M-047 leaves `ModelValidator.cs` on disk as a single-revert safety net during the call-site flip; M-048 deletes it once green. If the M-046 audit shows the migration is byte-trivial on every site, the user can collapse before M-047 starts. |
      | Do non-test callers of `ModelValidator` exist in sibling repositories (MCP, external tools)? | Unknown — gates the delete | M-046 audit includes a cross-repo grep against sibling checkouts visible to this workspace (treated read-only per project rule). If callers exist, E-23 either absorbs them or coordinates deletion with the sibling. |

      ## Risks (optional)

      | Risk | Impact | Mitigation |
      |------|--------|------------|
      | A rule embedded in `ModelValidator` (or parser, or emitter) is silently dropped when `ModelValidator.cs` is deleted because it had no schema or adjunct equivalent | High | M-046 audit is the primary defense — every rule must classify into schema-covered, schema-add, adjunct, parser-justified, or drop. Negative-case canary in M-046 AC6 is the secondary defense — proves `ModelSchemaValidator` actually catches every rule the audit claims. Tertiary defense: keep `ModelValidator.cs` on disk through M-047 so revert is one commit. |
      | Error-phrasing change breaks a downstream consumer (Blazor surfacing validation messages verbatim, CLI scripts grep'ing stdout) | Medium | M-047 includes an error-phrasing audit + UI/CLI consumer scan. Tests asserting exact phrasing get relaxed to semantic assertions (`errors.Should().Contain(e => e.Contains("bins"))`). |
      | `ModelSchemaValidator` per-request cost is materially higher than `ModelValidator`'s hand-rolled checks at hot paths like `POST /v1/run` | Low | M-047 records a before/after timing of `POST /v1/run` against a representative template. If latency grows by more than ~2 ms the audit doc records it; if materially more, escalate. No mitigation work planned until we have a number. |
      | External consumers (VSCode YAML plugin, docs tooling) read `docs/schemas/model.schema.yaml` directly and break on schema additions | Low | Additions are permissive (new optional rules tightening invalid cases that were already accidentally invalid). External consumers accept more, not less. Document the schema bump in the milestone tracking doc. |
      | Post-E-24 line numbers in `Program.cs` / `TimeMachineValidator.cs` shift from what the spec recorded; M-047 references stale lines | Low | M-047 spec instructs starting with a fresh `grep -rn "ModelValidator\.Validate" --include="*.cs"` to enumerate live call sites at start-milestone time, not relying on cached line numbers. |

      ## Milestones

      Sequencing: rule-coverage audit first (doc-only with schema and adjunct additions where the audit shows they are needed), then call-site migration (mechanical with phrasing audit), then `ModelValidator` deletion (cleanup + assertion that nothing calls it anymore). Three milestones.

      - [M-046](./M-046.md) — Audit every embedment of model rules across `ModelValidator.cs`, `ModelParser.cs`, `SimModelBuilder.cs`, and post-parse orchestration. Land schema additions and `ModelSchemaValidator` adjuncts so every rule has a single canonical home. Negative-case canary catalogue locks coverage in. · **completed (2026-04-26 on `milestone/m-E23-01-rule-coverage-audit`)** — 94 rules audited, 16 schema-add edits, 12 adjunct methods (+ silent-error fallback), 26-test regression catalogue, AC1-AC9 closed · depends on: —
      - [M-047](./M-047.md) — Switch every production call site and test from `ModelValidator.Validate` to `ModelSchemaValidator.Validate`. Audit error-message phrasing and update test assertions / UI consumers as needed. `ModelValidator.cs` left on disk as a single-revert safety net. · **completed (2026-04-26 on `milestone/m-E23-02-call-site-migration`)** — 3 production sites + 28 test calls migrated; `TimeMachineValidator` redundant-delegation block removed; scope-expansion fixes for `ProvenanceService.StripProvenance` (real production round-trip bug surfaced by the new strict validator) + 2 stale fixtures + 1 documented-future test flip; +16 net new tests (10 strip branch-coverage + 2 integration regression + 4 strip sub-case). Both canaries green. AC1-AC8 closed (AC9 deferred — optional). · depends on: M-046
      - [M-048](./M-048.md) — Delete `ModelValidator.cs` and any dedicated `ModelValidator`-only test files that survived M-047. Move `ValidationResult` to its own file. Assert `grep` returns zero callers. Archive E-23. · **completed (2026-04-26 on `milestone/m-E23-03-delete-model-validator`)** — `ModelValidator.cs` deleted; `ValidationResult` (14 lines) relocated to `src/FlowTime.Core/Models/ValidationResult.cs` keeping namespace `FlowTime.Core`; AC3 grep clean (7 historical-comment hits, zero live references); both canaries green; full suite **1862 / 0 / 9** — identical to M-047 tip. Epic-folder archived to `work/epics/completed/E-23-model-validation-consolidation/` on merge to main. · depends on: M-047

      ## ADRs

      - **ADR-E-23-01 — Delete, do not delegate.** Target state is a single validator (`ModelSchemaValidator`). `ModelValidator` is deleted rather than rewired to forward to `ModelSchemaValidator`, because: (1) a forwarding shim is a new compatibility layer the 2026-04-23 Truth Discipline guard explicitly forbids, (2) there are no external-surface users of `ModelValidator` that justify a shim, (3) a delete is cheaper to maintain than a forward for all future readers. Recorded in `work/decisions.md` before M-046 begins.
      - **ADR-E-23-02 — Schema as the single structural contract; adjuncts are the named exception.** `ModelSchemaValidator` reads `model.schema.yaml` and performs JSON-schema evaluation plus named adjunct methods (`ValidateClassReferences` is the prior art). Any structural rule not expressible in JSON Schema draft-07 lands as an adjunct method, not as a second parallel validator and not as silent parser/emitter logic. Adjuncts are named, invoked from `Validate`, and individually unit-tested. Ratified at M-046 audit close, with the enumerated adjunct list as the ratification artefact.
      - **ADR-E-23-03 (candidate) — Parser/emitter rules need written justification.** If the M-046 audit classifies any rule as `parser-justified` (left in parser or emitter code rather than lifted to schema or adjunct), this ADR records the rationale framework: the rule is a YAML representation concern, not a model concern, and would not survive a non-YAML serialization of `ModelDto`. Deferred pending M-046 audit findings — recorded only if the audit produces a non-empty `parser-justified` set.

      ## References

      ### Source-code pointers

      - `src/FlowTime.Core/Models/ModelValidator.cs` — slated for deletion (214 lines, ~25 imperative rules)
      - `src/FlowTime.Core/Models/ModelSchemaValidator.cs` — consolidation target (263 lines)
      - `src/FlowTime.Core/Models/ModelParser.cs` — parser audited in M-046 (733 lines)
      - `src/FlowTime.Sim.Core/Templates/SimModelBuilder.cs` — emitter audited in M-046 (458 lines)
      - `src/FlowTime.TimeMachine/Validation/TimeMachineValidator.cs` — tiered validator, drops the `ModelValidator` delegation in M-047
      - `src/FlowTime.API/Program.cs` — `POST /v1/run` call site (re-enumerate at M-047 start)
      - `src/FlowTime.Cli/Program.cs` — Engine CLI call site (re-enumerate at M-047 start)
      - `docs/schemas/model.schema.yaml` — schema, target for audit-driven additions
      - `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs` — survey canary (committed, hard-asserting per E-24 M-053)

      ### Decisions and ADRs

      - `D-2026-04-24-035` — E-23 ratification (delete-not-delegate discipline)
      - `D-2026-04-24-036` — E-23 paused, E-24 created
      - `D-2026-04-24-037` — Option E (unify) ratified within E-24
      - `D-2026-04-25-038` — E-24 closed, E-23 ready to resume
      - E-24 ADRs: ADR-E-24-01 Unify · ADR-E-24-02 Forward-only · ADR-E-24-03 Schema declares only consumed fields · ADR-E-24-04 `ScalarStyle.Plain` gates `ParseScalar` · ADR-E-24-05 `QuotedAmbiguousStringEmitter`

      ### Related epics

      - **E-24 Schema Alignment** (closed 2026-04-25): `work/epics/completed/E-24-schema-alignment/spec.md` — unified the type and the schema; E-23 builds on that foundation.
      - **E-21 Svelte Workbench** (paused at M-044): `work/epics/E-21-svelte-workbench-and-analysis/spec.md` — M-044 Validation Surface consumes the consolidated `ModelSchemaValidator` once E-23 closes.

      ### Truth Discipline

      - `.ai-repo/rules/project.md` → Truth Discipline Guards — the 2026-04-23 *"'API stability' does not mean 'keep old functions around.'"* guard plus *"Do not restate a canonical contract in many places from memory"* and *"Do not let adapter/UI projection become the only place where semantics exist"*.
  - kind: epic
    id: E-24
    frontmatter:
      title: Schema Alignment
      status: done
    body: |
      ## Goal

      Unify FlowTime's post-substitution model representation. One C# type. One YAML schema. One validator. `SimModelArtifact` is **deleted**. Sim builds the unified model type directly; the Engine accepts and parses the same type. Every field has exactly one declaration site. `TemplateWarningSurveyTests` reports `val-err=0` across all twelve templates at `ValidationTier.Analyse`, promoted to a hard build-time assertion. `ModelValidator` deletion (E-23) then becomes a mechanical cleanup.

      ## Context

      ### The split is accidental drift, not a designed interface

      An investigation into `SimModelArtifact`'s purpose (agent `a5aa3dfe26394aff5`) established that the current two-type split was never a deliberate architectural decision:

      - **`SimModelArtifact` was born in commit `ce9ec9e` (Oct 2025)** shaped to Sim's authoring-time template schema (`template.schema.json`) — not to `docs/schemas/model.schema.yaml`, which predated it by a month and already described what the Engine consumes. The two types never shared a contract.
      - **`docs/schemas/README.md:34` claims parity that the code does not deliver.** The file asserts that `SimModelArtifact` and `ModelDefinition` describe the same shape. Reality: the only boundary between them is a YAML string, and that YAML string fails the Engine's own schema validation in every one of the twelve shipped templates today.
      - **No C# type boundary exists.** `SimModelArtifact` is serialized to YAML in Sim; the Engine parses that YAML into `ModelDefinition`. No shared interface, no projection method, no round-trip contract. Drift is the default; alignment has never been enforced.
      - **Each feature addition paid a duplication tax.** Commit `51a99b9` added classes to both types in the same commit (+23 lines to `SimModelArtifact`, +28 to `ModelDefinition`). `ModelDefinition` acquired `wipLimit` / `wipLimitSeries` / `wipOverflow` that `SimModelArtifact` lacks. `SimModelArtifact` acquired `window` / `generator` / `mode` / top-level `metadata` that no Engine consumer reads.
      - **Only `provenance` has genuine dual concern** — both sides already agree on the keys, they just disagree on casing (snake_case in the schema, camelCase in `SimProvenance` emission and in Sim's Engine `ProvenanceMetadata` reader).

      The M-046 bisection survey (agent `a07d52c12dcaf3538`, evidence at `work/epics/E-23-model-validation-consolidation/m-E23-01-schema-alignment-tracking.md` → "AC4 canary re-run, full-shape audit (2026-04-24)") surfaced 16 distinct divergence shapes and 726 validator errors across the twelve templates. Most of those divergences dissolve under unification; a few (the `ParseScalar` defect, the `outputs[].as` semantic, the `nodes[].source` forward contract) are substantive decisions that survive.

      ### Option A was rejected; Option E was ratified

      The initial epic draft proposed **Option A**: keep the two types, introduce a projection layer (`SimModelArtifact.ToEngineSubmission()`), let the schema describe only the submission payload. Option A preserves the accidental split — it makes the leak a designed feature and accepts the ongoing duplication tax for every future field addition. The user rejected Option A in favor of **Option E: unify**. One type. One schema. One validator. `SimModelArtifact` deleted outright. Sim builds the unified type directly; the Engine parses it.

      Unification is the foundationally-right answer because:

      1. **The split has no defender.** No code is protected by `SimModelArtifact`'s existence; no external consumer has a reason to care which type shape is on the wire. The only artefact the split produces is drift.
      2. **Forward-only is cheap.** The biggest historical cost of unification (migration of stored bundles) is removed by the user's forward-only stance: existing bundle YAML is obsolete; Sim regenerates from templates going forward.
      3. **`Template` stays distinct.** Authoring-time templates (pre-substitution, parameters, Liquid expressions) are genuinely a different contract. `Template` remains its own type with its own schema (`template.schema.json`). The merge target is `SimModelArtifact → unified model`, not `Template → unified model`.

      ### Truth Discipline precedent

      The 2026-04-23 Truth Discipline guard (*"'API stability' does not mean 'keep old functions around.'"*) already rejected delegation shims in E-23. Option E extends the same discipline to types: once `SimModelArtifact` has no callers outside its own graph, it is deleted in the same change. No coexistence window, no "temporary" dual-type state, no projection layer that becomes permanent.

      ## Scope

      ### In Scope

      - **Unify the post-substitution model type.** A single unified type replaces `SimModelArtifact` entirely. Exact home (`FlowTime.Core`, `FlowTime.Contracts`, or a new `FlowTime.Contracts.Model` namespace) is decided by M-049; the constraint is "one type, discoverable from both Sim and the Engine."
      - **`Template` remains distinct.** Authoring templates (pre-substitution) stay at their current shape and schema (`template.schema.json`). Unification applies only to the post-substitution model.
      - **Sim builds the unified type directly.** `SimModelBuilder` is rewritten to emit the unified type. `SimNode`, `SimOutput`, `SimProvenance`, `SimTraffic`, `SimArrival`, `SimArrivalPattern` are deleted in the same change — Truth Discipline: no callers left, delete.
      - **Engine intake reads the unified type.** `ModelDefinition` either becomes the unified type or is replaced by it. Whichever path, exactly one type is used on both sides.
      - **One schema: `docs/schemas/model.schema.yaml`.** camelCase throughout. `provenance` is declared as a first-class block inside the unified schema with camelCase keys. Fields emitted by Sim today with no Engine consumer (`window`, `generator`, top-level `metadata`, top-level `mode`) are **dropped from emission** — they are leaked authoring state, not schema pass-through candidates. Any genuinely traceability-worthy field moves into the `provenance` block.
      - **One validator: `ModelSchemaValidator`.** Validates both Sim's emitted output and the Engine's intake. Sim's `TemplateSchemaValidator` continues to validate the *authoring template* (pre-substitution) — that is genuinely a different contract — but the Sim→Engine model output uses the same validator the Engine uses.
      - **`ParseScalar` scalar-style fix** in both `ModelSchemaValidator` and `TemplateSchemaValidator`. Unification does not eliminate this defect; it is an independent validator bug that lands in the same epic for convergence. Mirrored fix, mirrored tests. The test-side coercion helper in `tests/FlowTime.TimeMachine.Tests/TemplateSchemaValidationTests.cs:134-169` is updated or replaced so tests do not silently mask the fix.
      - **Canary promoted to hard assertion** at epic close. `TemplateWarningSurveyTests` fails the build on non-zero `val-err`.
      - **Forward-only discipline.** No migration of stored bundles. No compatibility reader for the old two-type YAML shape. Any code path that reads the old shape is identified and either regenerates from template or is deleted if nothing current needs it.
      - **Docs alignment.** `docs/schemas/README.md` rewritten to reflect the unified reality. `docs/architecture/` entries that describe the "two schemas" world are corrected or archived.

      ### Out of Scope (firm)

      - **`ModelValidator` deletion.** Stays with E-23 (M-048, post-E-24 resume). E-24 makes the deletion mechanical; it does not perform it.
      - **Bundle / run migration.** Forward-only per user direction. Existing stored bundles are obsolete. Sim regenerates from templates. No migration code is written; the forward-only stance is documented in the spec and any residual migration helper that surfaces during M-050 is deleted rather than kept.
      - **UI work.** No Blazor changes. No Svelte changes. `nodes[].metadata` remains a load-bearing `GraphService` concern — its schema declaration is already correct on the Engine side and stays.
      - **New validator features.** No line/column mapping, no LSP integration, no compile-time rule extraction, no per-field suggestions.
      - **`Template` redesign.** Authoring-time template schema and type remain unchanged.
      - **E-15 Telemetry Ingestion runtime.** E-24 decides the `nodes[].source` contract under unification so E-15 starts aligned; E-15's actual implementation is not part of this epic.
      - **Deprecated schema fields.** No reintroduction of `binMinutes` or other previously-retired shapes. Forward-only.
      - **External-consumer compatibility windows.** No camelCase aliases in provenance. No dual-field acceptance. No migration mode. The schema changes in one cut.

      ## Constraints

      - **Exactly one type, one schema, one validator.** Any deviation from "exactly one" needs a written design justification in M-049's tracking doc.
      - **Forward-only.** No compatibility reader, no "accept either shape" branch, no version-detection logic. If something changes shape, runs and fixtures are regenerated.
      - **"Right, not easy" applied per field.** For every field currently on `SimModelArtifact`, M-049 records: current emission site, whether any Engine consumer reads it, the decision (keep + declare, drop entirely, or move into `provenance`), and the rationale. The "easy option" is named as rejected; the "foundationally-right option" is chosen.
      - **Truth Discipline guard at the type layer.** No compatibility shim. No temporary accommodation. When a type or function has no callers after the refactor, it is deleted in the same change — not retained as a dead alternative entry point.
      - **Mirrored fixes.** The `ParseScalar` defect has two homes (`ModelSchemaValidator`, `TemplateSchemaValidator`). Fix both in the same milestone or drift re-opens. Same constraint applies to the test-side coercion helper.
      - **camelCase everywhere.** No snake_case survives in `docs/schemas/model.schema.yaml` at epic close. `grep -rn "generated_at\|model_id\|template_id\|template_version" docs/schemas/model.schema.yaml` returns zero hits.
      - **Byte-identical `POST /v1/run` success** for every currently-valid template (after Sim regenerates its template outputs under the unified type). Error responses may have different phrasing; HTTP status codes and JSON shape remain unchanged.

      ## Success Criteria

      - [ ] `SimModelArtifact` is deleted. `grep -rn "SimModelArtifact" --include="*.cs"` returns zero hits.
      - [ ] `SimNode`, `SimOutput`, `SimProvenance`, `SimTraffic`, `SimArrival`, `SimArrivalPattern` are deleted. A sibling `grep` confirms.
      - [ ] One C# type represents the post-substitution model. `SimModelBuilder` emits it directly; the Engine parses it directly. `ModelDefinition` either *is* the unified type or has been replaced by it.
      - [ ] `docs/schemas/model.schema.yaml` declares exactly one model shape including its `provenance` block. camelCase throughout. `grep -rn "generated_at\|model_id\|template_id\|template_version" docs/schemas/model.schema.yaml` returns zero hits.
      - [ ] `ModelSchemaValidator` is the single runtime validator for post-substitution model YAML. `TemplateSchemaValidator` is limited to pre-substitution templates (`template.schema.json`).
      - [ ] `TemplateWarningSurveyTests.Survey_Templates_For_Warnings` reports `val-err=0` across all twelve templates at `ValidationTier.Analyse`. The test is a hard `Assert` — non-zero `val-err` fails the build.
      - [ ] `POST /v1/run` returns byte-identical success responses for every currently-valid template in `templates/*.yaml` with default parameters. Error responses may have different phrasing for currently-invalid models; HTTP status codes and response JSON shape remain unchanged.
      - [ ] `ModelSchemaValidator.ParseScalar` and `TemplateSchemaValidator.ParseScalar` both honor `YamlScalarNode.Style`. Dedicated scalar-style tests cover `Plain` / `SingleQuoted` / `DoubleQuoted` variants for scalars that look like bool / int / double. The test-side coercion helper in `tests/FlowTime.TimeMachine.Tests/TemplateSchemaValidationTests.cs` is updated or replaced so tests do not mask the fix.
      - [ ] Full `.NET` test suite passes: `dotnet test FlowTime.sln` is green with zero regressions. Any pre-existing flakes remain the same flakes — E-24 introduces no new timing sensitivity.
      - [ ] `docs/schemas/README.md` accurately describes one-schema reality. Any `docs/architecture/` entry that described a two-schema world is corrected or archived.
      - [ ] E-23 can resume cleanly. `ModelSchemaValidator` and the unified type agree by construction; M-047 (call-site migration) and M-048 (`ModelValidator` delete) become byte-trivial mechanical cleanup.

      ## Open Questions

      The six design questions below are resolved by M-049 as written design decisions before any other milestone starts. Each answer goes into the M-049 tracking doc with its rejected alternative named.

      | Question | Blocking? | Resolution path |
      |----------|-----------|-----------------|
      | Where does the unified type live? `FlowTime.Core`, `FlowTime.Contracts`, or a new `FlowTime.Contracts.Model` namespace? | Yes — gates M-050 | M-049 decides. Default leaning: `FlowTime.Contracts` — it is the shared-contracts project and Sim already references it. Decision is recorded with the rejected options. |
      | Does `ModelDefinition` become the unified type, or is it replaced by a new type? `ModelDefinition` has `wipLimit` fields `SimModelArtifact` lacks; `SimModelArtifact` has Sim-only fields that are dropping. The unified type is their union minus leaked state. | Yes — gates M-050 | M-049 decides. Default leaning: extend `ModelDefinition` in place and rename if the expanded scope warrants. Decision captures the name, the namespace, and any members that need introduction or rename. |
      | `outputs[].as` semantics under unification: optional (reflecting that auto-added outputs need no filename) or required (every output declares a filename)? Today `EnsureSemanticsOutputs` auto-adds entries without `as`, producing 366 of 495 non-defect validator errors. | Yes — gates M-050 and M-051 | M-049 decides. Two clean options: (a) `as` is optional and auto-added outputs omit it; (b) `as` is required and the emitter synthesizes a default (e.g. `as = "{id}.csv"`) for auto-added outputs. The decision cites the Engine consumer (if any) that reads `as`. |
      | `nodes[].source` forward contract: drop entirely until E-15 lands and defines it, or declare as optional in the unified schema now? Sim currently emits empty-string defaults that YamlDotNet does not auto-omit. | No — scoped to M-049 | M-049 decides. Default leaning: drop — E-24's discipline is "schema declares what has a consumer." E-15 declares the field when it builds the consumer. If dropped, Sim omits emission via `OmitDefaults` or `ShouldSerialize` guard. |
      | Provenance shape in the unified schema: flat or nested? `SimProvenance` nests `parameters` as a sub-dictionary. Engine's `ProvenanceMetadata` is flat. Unification requires one shape. | Yes — gates M-051 | M-049 decides. Default leaning: nested `parameters` sub-map (matches Sim's current shape and preserves author-intent grouping). Decision cites both sides' current shape and the reader adjustments required. |
      | Canary: integration test against live Engine API (current shape) or fast unit-style check (`ModelSchemaValidator.Validate(...)` in-process)? Under unification, the unit-level variant becomes attractive because render-and-validate is fully in-process. | No — scoped to M-053 | M-053 decides. Default: keep the integration test; add a parallel fast unit variant if CI cost becomes visible. The hard-assertion gate in M-053 is whichever variant runs in CI. |

      ## Risks (optional)

      | Risk | Impact | Mitigation |
      |------|--------|------------|
      | The unified type touches more Engine-side code than anticipated (every consumer of `ModelDefinition` + every producer of `SimModelArtifact`). | Medium | M-049's inventory enumerates every call site before M-050 plans the type-unification change. If the scope is large, M-050 subdivides deliberately — the split plan is written before work begins, not after. |
      | Forward-only means existing run fixtures in `tests/` and sample bundles in `docs/samples/` produce the obsolete two-type YAML shape and stop validating. | Medium | Forward-only regeneration: M-050 regenerates every fixture and sample under the unified shape in the same milestone. No compatibility reader survives. Anything that cannot be regenerated is deleted rather than patched. |
      | `ParseScalar` fix regresses a test that was accidentally relying on coercion (e.g. a quoted integer). | Low | M-052 runs the full solution suite immediately after the fix. Any regression is investigated case-by-case — correct response is to update the test to author the scalar correctly. `tests/FlowTime.TimeMachine.Tests/TemplateSchemaValidationTests.cs` is the known hotspot; its coercion helper is updated in the same milestone as the validator fix. |
      | `outputs[].as` decision forces a cascade: if optional, every Engine consumer that reads `as` is audited; if required with synthesized default, the filename convention must be stable and discoverable. | Medium | M-049 decides before any code lands. The chosen side names the convention (if synthesize) or the consumer audit (if drop required). M-051 lands the schema edit; M-050 lands any emitter synthesis. |
      | External consumers (VSCode YAML plugin, docs tooling) read `docs/schemas/model.schema.yaml` directly and break on the snake_case → camelCase rename. | Low | The schema is consumed internally. Sibling checkouts are read-only per project rule; a quick `grep` in `/workspaces/flowtime-sim-vnext` for `generated_at` / `model_id` surfaces any drift before M-051 lands the rename. |

      ## Milestones

      Sequencing: design decisions first (M-049 is doc-only), then type unification (M-050 is the largest architectural change), then schema consolidation (M-051 describes what M-050 built), then validator defect (M-052 is independent and mirrored), then canary close (M-053 makes the zero assertion permanent and flips E-23 to ready-to-resume). M-052 can be parallelized with M-050 / M-051 if desired, but the conservative default is serial after M-051 so the canary run in M-053 operates on a fully-converged stack.

      - [M-049](./M-049.md) — **complete (2026-04-25, commit `c43e8c0`).** Doc-only milestone. Every field on `SimModelArtifact` and `ModelDefinition` got a recorded decision (keep / drop / move); the six open questions answered (Q1–Q6 + A1–A5); unified type home (`FlowTime.Contracts`), name (`ModelDto`), and provenance shape (nested, 7 fields, camelCase) named. No code, no schema changes. · depends on: —
      - [M-050](./M-050.md) — **complete (2026-04-25, commits `131dd35` / `c4064bf` / `3806097` / `dece22f`).** All 14 ACs landed. `ModelDto` + `ProvenanceDto` introduced in `FlowTime.Contracts`; `SimModelBuilder` rewritten to emit `ModelDto` directly; Engine intake routed through `ModelDto`; `SimModelArtifact` + 6 satellites deleted; leaked-state fields (`window`, `generator`, top-level `metadata`, top-level `mode`) dropped from emission; fixtures regenerated; YamlDotNet bumped to 17.0.1 across 6 projects. AC8 residual histogram: 587 errors → M-051, 89 → M-052, 0 → M-050 emitter regressions. 1,755 tests passing. Three follow-up gaps filed (`work/gaps.md`): `ProvenanceEmbedder`, `GridDefinition.StartTimeUtc` rename, Template-layer `Legacy*` aliases — none on critical path. · depends on: M-049
      - [M-051](./M-051.md) — **complete (2026-04-25, commit `d6a3263`).** All 14 ACs landed. `docs/schemas/model.schema.yaml` rewritten top-to-bottom (927 → 1059 lines) against the unified `ModelDto`; nested 7-field camelCase `provenance` block; `grid.start` declared optional; `nodes[].metadata` declared; `nodes[].source` absent (Q4); `outputs[].as` made optional (Q3); leaked-state root keys absent; every property carries DTO-source + consumer citations. `docs/schemas/README.md` rewritten. `docs/architecture/run-provenance.md` updated for camelCase + 7-field shape. Canary: 676 → 231 errors at Analyse — schema-rewrite shapes 587 → **0**, ParseScalar residuals 89 → 231 (newly-reachable inner errors after `nodes[].metadata` declaration; same defect class — M-052 owns), 0 emitter regressions. 1,750 tests passing. · depends on: M-050
      - [M-052](./M-052.md) — **complete (2026-04-25, commit `a7c984f`).** All 9 ACs landed. `ParseScalar` honors `YamlScalarNode.Style` in both `ModelSchemaValidator` and `TemplateSchemaValidator` (mirrored guard); test-side coercion helper in `TemplateSchemaValidationTests.cs` rewritten to delegate through the same rule. Round-trip closure required the emitter half: sibling `QuotedAmbiguousStringEmitter` plugged into `TemplateService.CreateYamlSerializer` next to `FlowSequenceEventEmitter`, forcing `ScalarStyle.DoubleQuoted` on string source values whose literal would re-resolve as YAML 1.2 null/bool/int/float (D-m-E24-04-03 / ADR-E-24-05). Canary: **231 → 0 errors** at `ValidationTier.Analyse` across 12 templates; histogram empty; step-4 emitter regressions: 0. **+64 new tests** (18 Engine ParseScalar + 17 Sim ParseScalar + 29 emitter round-trip). Full `.NET` suite green. · depends on: M-051 (conservative; could have run parallel to M-050 / M-051)
      - [M-053](./M-053.md) — **complete (2026-04-25)**. All 8 ACs landed. Canary `TemplateWarningSurveyTests.Survey_Templates_For_Warnings` rewritten so that the in-process tier-3 (`Analyse`) loop runs unconditionally and asserts `val-err == 0` (and zero render failures); the live-API run-warn collection becomes a strictly evidence-only phase 2 that gracefully skips on `/v1/healthz` probe failure. Regression-catching verified by transient un-wire of `QuotedAmbiguousStringEmitter` — the canary fails with 231 errors across all 12 templates exactly matching the M-052 pre-fix histogram, then returns to green on restore. Full `.NET` suite green (1,749 passed / 9 skipped pre-existing / 0 failed). All three AC4 grep audits clean. `docs/schemas/model.schema.md` provenance section rewritten to canonical 7-field nested camelCase form. E-23 status flipped from `paused` to `ready-to-resume`. `D-2026-04-25-038` logs E-24 close. **E-24 epic now closed; all five milestones complete.** · depends on: M-052

      ## ADRs

      - **ADR-E-24-01 — Unify the post-substitution model type.** `SimModelArtifact` and `ModelDefinition` collapse to one type. `Template` (authoring-time, pre-substitution) stays distinct. Rationale: the split is accidental drift per commit history, has no type boundary, and has compounded a duplication tax since October 2025. Rejected alternative (Option A): keep both types with a projection layer — preserves the accidental leak as a designed feature and accepts the ongoing duplication tax. Ratified in M-049.
      - **ADR-E-24-02 — Forward-only regeneration.** No compatibility reader for the old two-type YAML shape. Existing stored bundles are obsolete; Sim regenerates from templates going forward. Rationale: the biggest historical cost of unification (bundle migration) is removed by forward-only; compatibility readers are the shape the Truth Discipline guard explicitly rejects. Rejected alternative: migration window with dual-shape acceptance. Ratified in M-049.
      - **ADR-E-24-03 — Schema declares only consumed fields.** Fields emitted by Sim with no Engine consumer are dropped from emission, not declared as schema pass-through. Rationale: Truth Discipline — the schema is the contract; the contract declares what exists, not what is tolerated. Rejected alternative: declare `window` / `mode` / `generator` / top-level `metadata` in the schema as optional pass-through. Ratified in M-049.
      - **ADR-E-24-04 — `ScalarStyle.Plain` gates numeric / boolean coercion in `ParseScalar`.** YAML 1.2 resolution requires honoring scalar style; quoted strings must short-circuit to string. Rejected alternative: tag-based inference (`!!str`, `!!int`) — YAML's resolver already embeds the distinction in `Style`; a second inference layer is redundant. Ratified in M-052 (2026-04-25, commit `a7c984f`).
      - **ADR-E-24-05 — `QuotedAmbiguousStringEmitter` (round-trip symmetry on the emitter side).** Sibling `IEventEmitter` plugged into `TemplateService.CreateYamlSerializer` next to `FlowSequenceEventEmitter`. Activates on `eventInfo.Source.Type == typeof(string)` and forces `ScalarStyle.DoubleQuoted` when the literal text would re-resolve as a YAML 1.2 plain non-string scalar (null forms, bool, int, float). The ambiguity classifier mirrors the validator's plain-scalar coercion attempt-order exactly; the two halves of the round-trip pair are symmetric by construction. Rejected alternatives: per-field `[YamlMember]` annotations (no surface for `Dictionary<string, string>` values, rots when new DTO fields ship), post-hoc YAML rewriting (brittle regex on serializer output), `coerceQuotedLiterals` opt-in flag (forbidden by spec — "the correct behavior is the only behavior"), wider emitter quoting all strings (corrupts legitimate plain-text wire shape). Prior art: `FlowSequenceEventEmitter` (commit `c57b597`, 2025-10-24) at the sequence-style boundary; this is the symmetric scalar-style sibling. Ratified in M-052 (2026-04-25, commit `a7c984f`).

      ## References

      ### Upstream input

      - **`SimModelArtifact` purpose investigation (agent `a5aa3dfe26394aff5`):** established that the split was accidental, not designed. Commit `ce9ec9e` (Oct 2025) introduced `SimModelArtifact` shaped to the template schema, not `model.schema.yaml` which predated it. `docs/schemas/README.md:34` claimed parity the code does not deliver. No C# type boundary exists — the only interface between Sim and Engine is a YAML string, and that YAML string fails the Engine's own schema validation in every shipped template today.
      - **Survey agent `a07d52c12dcaf3538`:** produced the 16-row divergence table and the full-shape audit (726 total validator errors). Captured in `work/epics/E-23-model-validation-consolidation/m-E23-01-schema-alignment-tracking.md` → "AC4 canary re-run, full-shape audit (2026-04-24)".
      - **M-046 tracking doc:** held on branch `milestone/m-E23-01-schema-alignment` as stashed input material for M-049. Contains the rule audit, the ParseScalar defect prior-art investigation, and the full-shape audit that motivated this epic.
      - **Uncommitted schema edits on `milestone/m-E23-01-schema-alignment`:** three additions to `docs/schemas/model.schema.yaml` (`grid.start`, `nodes[].metadata`, `nodes[].source`) — treated as input material for M-049's design-decision review, not as commitments. Under unification, `grid.start` probably stands (Engine consumer confirmed); `nodes[].metadata` stays as a load-bearing `GraphService` concern; `nodes[].source` probably reverts (no consumer until E-15).

      ### Epic and decision context

      - **E-23 Model Validation Consolidation:** `work/epics/E-23-model-validation-consolidation/spec.md` — paused at M-046 pending E-24. M-047 and M-048 become mechanical once E-24 closes.
      - **D-048:** E-23 ratification — established the "delete, do not delegate" discipline that E-24 extends to types.
      - **D-049:** E-23 pause and E-24 creation. Within E-24 planning, **Option E (unify)** was ratified over **Option A (two types with projection)**.

      ### Truth Discipline

      - `.ai-repo/rules/project.md` → Truth Discipline Guards — precedence hierarchy, camelCase rule, "API stability ≠ keep old functions around" (2026-04-23), "Do not restate a canonical contract in many places from memory", "Do not let adapter/UI projection become the only place where semantics exist", "Do not keep 'temporary' compatibility shims without explicit deletion criteria."

      ### Source-code pointers

      - `src/FlowTime.Sim.Core/Templates/SimModelArtifact.cs` — slated for deletion (and its satellite types `SimNode`, `SimOutput`, `SimProvenance`, `SimTraffic`, `SimArrival`, `SimArrivalPattern`)
      - `src/FlowTime.Sim.Core/Templates/SimModelBuilder.cs` — the Sim emitter; rewritten to produce the unified type directly
      - `src/FlowTime.Core/Models/ModelDefinition.cs` — Engine-side model type; either becomes the unified type or is replaced
      - `src/FlowTime.Core/Models/ModelParser.cs` — Engine intake; switches to parse the unified type directly
      - `src/FlowTime.Sim.Service/Program.cs:1079` — Sim wire-serialization site; produces the unified type
      - `src/FlowTime.TimeMachine/Orchestration/RunOrchestrationService.cs:627` — Engine-side intake; parses the unified type
      - `src/FlowTime.Core/Models/ModelSchemaValidator.cs:222-246` — `ParseScalar` defect site
      - `src/FlowTime.Sim.Core/Templates/TemplateSchemaValidator.cs:173-197` — mirrored `ParseScalar` defect
      - `src/FlowTime.Core/Models/ParallelismReference.cs:97` — prior art for honoring `ScalarStyle.Plain`
      - `tests/FlowTime.TimeMachine.Tests/TemplateSchemaValidationTests.cs:134-169` — test-side coercion helper that masks the defect
      - `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs` — the canary (committed to `main` per D-048)
      - `docs/schemas/model.schema.yaml` — the schema under unification
      - `docs/schemas/README.md:34` — the parity claim the code does not deliver; rewritten at M-051

      ### Downstream impact

      - **E-23 resume:** `ModelSchemaValidator` and the unified type agree by construction once E-24 closes. M-047 call-site migration becomes a mechanical `sed`-scale change; M-048 `ModelValidator` delete becomes a one-file removal with its dedicated tests.
      - **M-044 Validation Surface (E-21):** consumes the single consolidated `ModelSchemaValidator` once both E-24 and E-23 close.
      - **E-15 Telemetry Ingestion:** starts from a ratified `nodes[].source` forward contract (M-049's decision) rather than inheriting a forward-declared placeholder with no consumer.
  - kind: epic
    id: E-10
    frontmatter:
      title: Engine Correctness & Analytical Primitives
      status: done
    body: |
      ## Goal

      Fix known correctness bugs, harden engineering quality, and build the analytical primitives layer that enables downstream epics (Path Analysis, Anomaly Detection, Scenario Overlays, UI Analytical Views) to deliver their full value.

      ## Context

      The March 2026 engine deep review (`docs/architecture/reviews/engine-deep-review-2026-03.md`) found:
      - 3 P0 correctness bugs (shared series mutation, missing capacity dependency, dispatch-unaware invariant analyzer)
      - Engineering debt (duplicate topo-sort, inconsistent NaN policy, PCG modulo bias, no convergence guard)
      - Documentation drift (6 undocumented expression functions, overstated constraint claims)
      - A missing **analytical layer** — FlowTime can answer "how much flow?" but not "where is the bottleneck?", "what is flow efficiency?", or "what if we set a WIP limit?"

      The existing near-term epics (Path Analysis, UI Analytical Views, Anomaly Detection, Scenario Overlays) implicitly depend on these analytical capabilities. Without them, those epics can only work with raw throughput/queue data.

      ## Scope

      ### In Scope

      **Phase 0 — Correctness (P0 bugs)**
      1. Fix BUG-1: Clone outflow series before dispatch mutation
      2. Fix BUG-2: Include CapacitySeriesId in ServiceWithBufferNode.Inputs
      3. Fix BUG-3: Make InvariantAnalyzer.ValidateQueue dispatch-aware
      4. Regression tests for all three bugs
      5. End-to-end determinism test (same template + seed = bitwise-identical artifacts)

      **Phase 1 — Engineering Foundation**
      1. Cache topological order in Graph constructor
      2. Precompute Topology adjacency lists
      3. Define and enforce NaN/Infinity/div-by-zero policy (all 8 locations)
      4. Resolve Series immutability (remove public setter, add Clone())
      5. Fix PCG32.NextInt modulo bias
      6. Add router convergence guard (max-iteration limit)
      7. Add expression function tests (MOD, FLOOR, CEIL, ROUND, STEP, PULSE)
      8. Remove #pragma warning disable, Console.WriteLine; type Parallelism properly

      **Phase 2 — Documentation Honesty** (parallel with Phase 1)
      1. Update expression-language-design.md with all 11 functions
      2. Update expression-extensions-roadmap.md (6 candidates → shipped)
      3. Downgrade constraint claims to "foundations laid"
      4. Clarify time-travel scope as "artifact query"
      5. Label catalog architecture doc as aspirational/draft
      6. Locate/create model.schema.yaml
      7. Standardize JSON Schema meta-version

      **Phase 3 — Analytical Primitives**
      1. Bottleneck identification: cross-node utilization comparison, WIP accumulation, system constraint flagging
      2. Cycle time decomposition: per-ServiceWithBuffer queueTime + processingTime, flow efficiency
      3. Analytical projection hardening bridge: move the current state-query analytical capability/computation surface into Core, stabilize snapshot/window outputs, and hand the remaining formula-first purification work to E-16
      4. WIP limit modeling: optional wipLimit on ServiceWithBufferNode (block arrivals or divert to loss)
      5. Variability preservation: preserve Cv alongside E[X] when compiling PMFs (Kingman's approximation)
      6. Wire ConstraintAllocator into evaluation pipeline: declared constraints actually cap served per bin
      7. Starvation/blocking detection helpers: flag bins with queue=0 but capacity>0, or arrivals=0 but upstream queue>0

      ### Out of Scope

      - New epics (Path Analysis, Anomaly Detection, etc.) — this epic provides their foundation
      - UI changes
      - MCP changes (M-065 deferred to gaps.md)

      ## Constraints

      - Phase 0 must complete before any other work
      - Phase 1 and Phase 2 can run in parallel
      - Phase 3 depends on Phase 1 (especially Series immutability fix for WIP limits)
      - Remaining Phase 3 expansion resumes after E-16 completion in the order `p3d` -> `p3c` -> `p3b`
      - All changes must maintain determinism — the end-to-end determinism test gates everything

      ## Success Criteria

      - [ ] Zero known correctness bugs
      - [ ] End-to-end determinism test passes
      - [ ] Documentation matches code — no overstated claims
      - [ ] FlowTime can answer: "Where is the bottleneck?", "What is flow efficiency?", "What if we set a WIP limit?", "How variable is this stage?"
      - [ ] Existing test suite green, no regressions

      ## Risks & Open Questions

      | Risk / Question | Impact | Mitigation |
      |----------------|--------|------------|
      | Series immutability change may break callers | High | BUG-1 fix provides the test; audit all Series.Values usage |
      | WIP limit semantics (block vs divert) need design | Medium | Start with simplest option (divert to loss), iterate |
      | ConstraintAllocator may need redesign for eval pipeline | Medium | `p3d` scope accounts for this |

      ## Milestones

      | ID | Title | Status |
      |----|-------|--------|
      | m-ec-p0 | Phase 0: Correctness bugs + determinism test | complete |
      | M-054 | Phase 1: Engineering foundation | complete |
      | M-055 | Phase 2: Documentation honesty | complete |
      | M-056 | Phase 3a: Cycle time & flow efficiency | complete |
      | M-057 | Phase 3a.1: Analytical projection hardening | complete |
      | M-058 | Phase 3b: WIP limits | complete |
      | M-059 | Phase 3c: Variability (Cv + Kingman) | complete |
      | M-060 | Phase 3d: Constraint enforcement | complete |

      **Architecture gate:** `m-ec-p3a1` is the bridge milestone that moved the current analytical capability/computation surface into Core. E-16 owned the remaining formula-first purification work exposed by that review, and with E-16 complete Phase 3 resumes with `p3d` -> `p3c` -> `p3b`.

      ## References

      - `docs/architecture/reviews/engine-deep-review-2026-03.md` — Full deep review
      - `docs/architecture/reviews/engine-review-findings.md` — Initial review findings
      - `docs/architecture/reviews/review-sequenced-plan-2026-03.md` — Sequenced plan (historical rationale)
      - `work/gaps.md` — Deferred M-065 (depends on runtime constraint enforcement in `p3d`)
  - kind: epic
    id: E-11
    frontmatter:
      title: Svelte UI — Parallel Frontend Track
      status: proposed
    body: |
      ## Goal

      Build a SvelteKit + shadcn-svelte application in parallel with the Blazor WebAssembly frontend, delivering a polished, modern UI for demos and future evaluation while keeping the existing .NET backend APIs untouched.

      ## Context

      The current Blazor UI (FlowTime.UI) is functionally complete but visually rough:
      - 213+ `!important` CSS overrides fighting MudBlazor's styling
      - Inconsistent spacing, typography, and elevation — no design system discipline
      - 2,830 lines in a single `app.css` with ad-hoc values
      - Hard-coded colors mixed with theme variables; fragile dark mode

      The UI was generated iteratively with AI assistance and has accumulated CSS debt that makes incremental fixes risky — previous attempts to "fix spacing" caused cascading regressions. A visual-layer rewrite is safer than patchwork.

      **Why Svelte:** After evaluating MudBlazor v9, Fluent UI Blazor, Radzen, Blazor Blueprint, and Tailwind-for-Blazor, the Svelte + shadcn-svelte stack was chosen for:
      - shadcn-svelte provides the polished, modern aesthetic needed for impressive demos
      - Svelte's compiler approach eliminates framework runtime overhead — ideal for the topology visualization (canvas + SVG)
      - The timeline (HTML/SVG) maps naturally to Svelte's reactive SVG bindings
      - The existing `topologyCanvas.js` (2,000+ LOC) can be reused directly — no IJSRuntime bridge needed
      - Full access to the JS/TS component ecosystem (Tailwind, Radix-like primitives via Bits UI)
      - The Blazor UI is already a standalone API client with no project references to the backend — clean parallel-surface addition without backend refactoring

      **Design direction:** Left sidebar navigation (similar to Claude, ChatGPT, Azure Portal) with modern spacing, shadows, and transitions. Not the "MudBlazor default look" — a clean, enterprise-grade aesthetic via shadcn-svelte's design tokens and Tailwind.

      Svelte is a parallel UI track, not a committed Blazor retirement plan. `FlowTime.UI` remains supported for debugging, operational use, and as a plan-B surface, so shared Engine/Sim contract changes must keep both UIs current.

      ## Scope

      ### In Scope

      - SvelteKit application in `ui/` directory (alongside existing `src/FlowTime.UI/`)
      - Layout shell: collapsible left sidebar, top bar with breadcrumbs/actions, theme toggle
      - Time-Travel Topology page: timeline (SVG), canvas visualization, inspector, feature bar, overlays
      - Time-Travel Dashboard: SLA metrics per node
      - Time-Travel Artifacts: run list, detail view, file viewer
      - Run Orchestration: model execution page
      - Home page and Health page
      - TypeScript API clients for FlowTime API (:8080) and FlowTime Sim API (:8090)
      - Dark/light theme with system preference detection
      - Reuse of existing JS: `topologyCanvas.js`, `horizonChart.js`, `theme.js` (adapted)
      - DevContainer integration (port 5173 forwarding, dev scripts)

      ### Out of Scope

      - Template Studio (TemplateRunner, gallery, dynamic forms) — deferred
      - Learning Center (8 educational pages) — deferred
      - ApiDemo page, Simulate page — deferred
      - dag-map topology renderer — deferred (WIP in lib/dag-map, integrate last)
      - Backend API changes — zero changes to FlowTime.API or FlowTime.Sim.Service
      - Blazor UI removal or functional strip-down — `FlowTime.UI` remains a supported parallel surface and must stay aligned with current Engine/Sim behavior
      - Mobile/responsive layout — desktop-first, responsive is a follow-up

      ## Constraints

      - .NET 9 backend APIs are the source of truth — Svelte UI is a pure consumer
      - Must work in the existing devcontainer (Node 20 already available)
      - Canvas JS (`topologyCanvas.js`) reuse is mandatory — no rewrite of the rendering engine
      - shadcn-svelte + Tailwind CSS v4 as the styling foundation
      - TypeScript required (no plain JS)
      - The Blazor UI must remain functional and reasonably current throughout — no breaking the existing app or allowing shared contract drift

      ## Success Criteria

      - [ ] Svelte UI renders the topology page with timeline, canvas, inspector, and feature bar at feature parity with Blazor
      - [ ] Dark/light theme works correctly across all pages
      - [ ] All API integrations work against the existing FlowTime API and Sim API
      - [ ] Demo workflow is smooth: navigate to artifacts, select a run, view topology, scrub timeline, inspect nodes
      - [ ] Visual quality is a clear step up from the Blazor UI — clean spacing, consistent elevation, smooth transitions
      - [ ] Lighthouse performance score >= 90 on the topology page
      - [ ] No changes required to any backend project
      - [ ] Shared Engine/Sim contract changes needed for Svelte do not leave Blazor behind on supported workflows

      ## Risks & Open Questions

      | Risk / Question | Impact | Mitigation |
      |----------------|--------|------------|
      | topologyCanvas.js integration complexity — canvas callbacks, viewport state | High | M3 is dedicated to this; spike early if needed |
      | shadcn-svelte component gaps (missing something MudBlazor had) | Med | Bits UI primitives allow building custom components; Tailwind fills gaps |
      | Svelte 5 runes learning curve | Med | Start with simple pages (M1-M2) before tackling complex state (M3) |
      | Two UIs running in parallel increases cognitive overhead | Low | Clear folder separation (`ui/` vs `src/FlowTime.UI/`); Blazor UI is frozen, not actively developed |
      | dag-map integration timing unclear | Low | Explicitly deferred; topology canvas works standalone |

      ## Milestones

      | ID | Title | Summary | Status |
      |----|-------|---------|--------|
      | M-061 | Project scaffold & shell | SvelteKit + shadcn-svelte + Tailwind + layout shell with sidebar | **done** |
      | m-svui-02-api-and-pages | API layer & simple pages | TypeScript API clients, stores, Home, Health, Artifacts pages | **done** |
      | m-svui-03-topology | Topology via dag-map | dag-map SVG rendering with dark/light theme, run selector | **done** |
      | m-svui-04-timeline | Timeline & playback | SVG timeline, bin scrubbing, dag-map heatmap mode for metric overlays | **done** |
      | m-svui-05-inspector | Inspector & feature bar | Node inspector with sparklines, feature bar overlay settings, legend | not started |
      | M-062 | Run orchestration | Card-based template selection, bundle reuse, domain icons | not started |
      | m-svui-07-dashboard | Dashboard & class views | SLA dashboard, class selector, per-node metric panels | not started |
      | m-svui-08-polish | Visual polish & dark mode QA | Transitions, consistent elevation, dark mode audit, accessibility pass | not started |

      ## ADRs

      - ADR-SVUI-01: Chose SvelteKit + shadcn-svelte over Blazor Blueprint, Fluent UI Blazor, and Tailwind-for-Blazor. Rationale: demo-quality visuals, Svelte's SVG/canvas strengths, escape from Blazor component library limitations. See conversation context.
      - ADR-SVUI-02: ~~Reuse existing canvas JS~~ **Superseded.** Use dag-map library for topology rendering instead of topologyCanvas.js. dag-map is our own library with a general-purpose flow visualization roadmap (heatmap, variant explorer, Sankey). topologyCanvas.js stays in Blazor only. Extending dag-map keeps features reusable for non-FlowTime consumers.
      - ADR-SVUI-03: `ui/` at repo root (not inside `src/`) to keep clear separation from the .NET solution structure. The devcontainer already has Node 20.
      - ADR-SVUI-04: Use pnpm (not npm) for `ui/` — aligns with shadcn-svelte conventions, already installed in devcontainer.
      - ADR-SVUI-05: Manual shadcn-svelte init (CLI is interactive-only in non-TTY). Created components.json + utils.ts manually, components added via `yes | pnpm dlx shadcn-svelte add`.
      - ADR-SVUI-06: Pinned bits-ui to 2.15.0 — v2.16.4 has broken dist/types.js exports (missing attributes.js, pin-input references).

      ## Milestone Details

      ### M1 — Project Scaffold & Shell (M-061)
      **Goal:** Standing SvelteKit app with sidebar layout and theme toggle.

      Deliverables:
      - SvelteKit project in `ui/` with TypeScript, Tailwind v4, shadcn-svelte initialized
      - Root layout with collapsible left sidebar (nav groups: Time Travel, Tools)
      - Top bar with breadcrumb area and theme toggle (dark/light/system)
      - Empty route stubs for all in-scope pages
      - DevContainer: port 5173 forwarded, `npm run dev` works
      - Design tokens defined: spacing scale (4/8/12/16/24/32/48px), elevation levels, transition durations

      Acceptance criteria:
      - `npm run dev` serves the app at localhost:5173
      - Sidebar collapses/expands with smooth transition
      - Theme toggle persists to localStorage and respects system preference
      - All route stubs render without errors

      **Estimated effort:** 1 week

      ### M2 — API Layer & Simple Pages (m-svui-02-api-and-pages)
      **Goal:** Data flows from APIs to UI. Simple pages are functional.

      Deliverables:
      - TypeScript API client modules (`lib/api/flowtime.ts`, `lib/api/sim.ts`)
      - Shared types generated from or aligned with existing API contracts
      - Svelte stores for: run list, selected run, health status, theme, feature flags
      - Home page with navigation panels
      - Health page showing both API statuses (green/red indicators)
      - Artifacts list page with run cards, filtering, selection
      - Artifact detail page with metadata display
      - File viewer for artifact contents

      Acceptance criteria:
      - Health page shows live status from both APIs (or graceful error when API is down)
      - Artifacts list loads and displays runs from the API
      - Selecting a run navigates to detail view
      - API error states show user-friendly messages

      **Estimated effort:** 1.5-2 weeks

      ### M3 — Topology via dag-map (m-svui-03-topology)
      **Goal:** Topology page renders run graph using the dag-map library.

      Deliverables:
      - `DagMapView.svelte` component wrapping dag-map's `dagMap()` function
      - Graph API integration: fetch `/v1/runs/{id}/graph`, strip port-qualified edge IDs
      - Dark/light theme-reactive rendering (transparent paper, shadcn-matched colors)
      - Run selector dropdown on topology page
      - API types for graph, state snapshot, state window (foundation for M4)

      Acceptance criteria:
      - Selecting a run renders its topology as a dag-map SVG
      - Dark/light theme toggle updates the graph colors
      - All route stubs still render without errors

      **Completed:** 2026-03-30

      ### M4 — Timeline & Playback (m-svui-04-timeline)
      **Goal:** Scrub through time bins with full playback controls.

      **Dependency:** dag-map heatmap mode (per-node/edge metric coloring). Must be implemented in dag-map first — see dag-map ROADMAP.md "Heatmap mode" vision item.

      Deliverables:
      - dag-map heatmap mode: `metrics: Map<nodeId, { value, label }>` + color gradient
      - `Timeline.svelte` component with SVG track, tick marks, labels
      - Range input for bin scrubbing with pointer indicator
      - Playback controls: play/pause, next/previous bin, loop toggle
      - Speed selector chips (0.5x, 1x, 2x, 4x)
      - Focus metric chips (Arrivals, SLA, Utilization, etc.)
      - Bin change fetches state from API, maps metrics to dag-map heatmap

      Acceptance criteria:
      - Dragging the timeline scrubs through bins and updates node colors via dag-map heatmap
      - Play button auto-advances bins at the selected speed
      - Loop wraps around at the end
      - Changing focus metric updates the color overlay

      **Estimated effort:** 2-3 weeks (includes dag-map heatmap mode)

      ### M5 — Inspector & Feature Bar (m-svui-05-inspector)
      **Goal:** Node inspection and overlay configuration.

      Deliverables:
      - `Inspector.svelte` — slide-in panel showing selected node details
      - Sparkline charts (reuse horizonChart.js or rebuild in SVG)
      - Metric blocks with provenance tooltips
      - Constraint badges and warning indicators
      - Dependency list for selected node
      - `FeatureBar.svelte` — collapsible left panel with overlay settings
      - Metric selection, color basis, edge quality filters
      - Class visibility toggles
      - Color scale configuration
      - Legend overlay component

      Acceptance criteria:
      - Clicking a node opens the inspector with its metrics
      - Sparklines show metric history for the selected node
      - Feature bar toggles control what the canvas displays
      - Changing color basis updates canvas overlay in real-time
      - Inspector can be pinned open or dismissed

      **Estimated effort:** 1.5-2 weeks

      ### M6 — Run Orchestration (M-062)
      **Goal:** Card-based template selection with rich metadata and bundle reuse options.

      Deliverables:
      - Card grid for template selection: name, domain icon, version, short description
      - Search/filter bar for the card grid
      - Selected card expands to show: full description, bundle reuse toggle, RNG seed
      - Bundle reuse options: Reuse (default) / Regenerate / Fresh run
      - Run execution with state tracking (pending → running → complete)
      - Preview/dry-run mode ("Preview" button, clearer than "Plan Model")
      - Raw parameters field hidden (too debug-oriented) — accessible via "Advanced" expandable section if needed
      - Domain icons: inferred from template category or metadata

      Acceptance criteria:
      - Templates render as cards with description and domain icon
      - Search filters cards by name/description
      - Selecting a card shows run options (reuse mode, seed)
      - Can execute a model and see results when complete
      - Loading, error, and empty states handled gracefully
      - No raw JSON parameter field visible by default

      ### M7 — Dashboard & Class Views (m-svui-07-dashboard)
      **Goal:** SLA dashboard and class-based metric views.

      Deliverables:
      - Dashboard page with per-node SLA indicators
      - Class selector component (multi-select filter)
      - Per-node metric summary panels
      - Class-filtered topology view

      Acceptance criteria:
      - Dashboard shows SLA status for all nodes in a run
