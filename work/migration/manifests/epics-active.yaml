      - Sidebar collapse/expand is smooth
      - A non-technical stakeholder finds the demo workflow visually polished

      **Estimated effort:** 1 week
  - kind: epic
    id: E-12
    frontmatter:
      title: Dependency Constraints & Shared Resources
      status: done
    body: |
      **Completed:** 2026-05-01

      > Closure note (2026-05-01): M-063 + M-064 delivered the Option A (dependency-as-node) and Option B (dependency-as-constraint) representations. M-065 (MCP Pattern Enforcement) was dropped from this epic and absorbed into the new draft `ai-assisted-authoring` unplanned epic at `work/epics/unplanned/ai-assisted-authoring/spec.md` along with the original M-065 Plans 3–5 (resource pooling, compiler expansion, feedback loops). E-12 ships with both representations functional; AI-driven authoring hardening is the successor scope and lives outside the FlowTime UI surface (MCP-server-side, consumed by external authoring callers).

      ## Goal

      Model downstream dependencies (databases, caches, external APIs, shared services) as **constraints** that can limit throughput and introduce hidden backlog/latency. Preserve FlowTime’s minimal basis (arrivals/served/queue depth) while making coupling and bottlenecks visible.

      ## Problem Statement

      Real systems fail or degrade because of **shared dependencies**:
      - A DB saturates and multiple services slow down together.
      - A downstream API throttles and creates hidden backlog upstream.
      - Latency rises even when local service capacity is available.

      Without dependency modeling, FlowTime can explain *what* slowed down but not *why*.

      ## Principles

      - **Effects over mechanisms:** Model observable constraints rather than internal implementation details.
      - **Effective capacity:** Capture limiting factors (dependency capacity) even when internal queues are not directly observable.
      - **Earned complexity:** Start with minimal signals; add inference only when needed.
      - **Make wrongness visible:** Derived/inferred signals must be labeled and warnings surfaced.
      - **Minimal basis, explicit mechanisms:** Arrivals/served/queue depth show *where* pressure accumulates; explicit mechanism models explain *why* it accumulates (e.g., retries, throttling, batching).

      ## Core Concept

      A dependency is represented as a **resource constraint** that consumes load and emits completions.

      Two compatible representations:

      ### Option A — Dependency as a Node (M-063)
      Model the dependency as a node in the graph with arrivals/served:

      ```
      Service A -> Dependency DB -> Service A -> Next Hop
      ```

      - Works well for shared dependencies.
      - Increases graph complexity; best with grouping/overlay UI.
      - **M-063 MVP contract:** dependency nodes require `arrivals` + `served` (optional `errors`), no queue, no capacity, no retry semantics.
      - **Option A canonical pattern (enforced):**
        - Dependency node represents **external call outcomes** only (arrivals/served/errors).
        - Upstream retry pressure is represented on **effort edges** and caller attempts.
        - Flow latency can propagate across effort edges **only when flow volume is present**.
        - Dependency latency is modeled explicitly (if needed) via its own processing-time series.

      ### Option B — Dependency as a Constraint on a Service (M-064)
      Attach dependency constraints to a service node:

      - Service capacity is limited by dependency capacity.
      - Fewer nodes; simpler UI.
      - Still supports shared constraints via a shared resource object.
      - **Allocation rule (M-064):** proportional to demand per bin across all constrained nodes.
      - **No retries or latency inflation in Option B:** constraint series are informational only; they do not introduce retry loops or extra queue semantics.
      - Constraints are **not** flow nodes. They are resources that cap served throughput.

      Both options can coexist; the engine should support both.

      ## MCP Pattern Helpers (Option A)

      To avoid ambiguous modeling, MCP should expose **pattern helpers** that emit the canonical Option A structure:

      ```
      CreateDependencyNodeSeries(
        callerNode: "ProducerB",
        dependencyNode: "DependencyDb",
        callDurationMs: 180000,
        errorSeriesId: "dependency_errors",
        retryKernel: [0.6, 0.3, 0.1]   // optional, to derive retry pressure
      )
      ```

      This helper must:
      - create the dependency node and effort edge
      - derive caller attempts and processing time inflation
      - keep the model acyclic
      - tag derived series as `origin: derived`

      If callers want more advanced behavior (shared allocation, feedback loops), that is **out of scope** for Option A and should be deferred to future milestones.

      ## Signal Model (Minimal Basis)

      Dependencies still use the minimal basis:

      - **Arrivals:** calls started to the dependency.
      - **Served:** calls completed successfully.
      - **Latency:** optional, used as a saturation indicator.
      - **Errors/Throttles:** optional, used as a constraint signal.

      Queue depth is typically inferred or marked as unknown.

      ## Option B Constraint Registry (Attached Constraints)

      Option B introduces a **constraint registry** in the model:

      ```
      topology:
        constraints:
          - id: db_main
            semantics:
              arrivals: db_main_arrivals
              served: db_main_served
              errors: db_main_errors
        nodes:
          - id: ProducerB
            kind: service
            constraints: [db_main]
      ```

      Constraints are **series-backed resources** with their own arrivals/served/errors/latency series.
      The engine allocates capacity per bin across constrained nodes and marks **constraint-limited** status
      when allocation < demand.

      ## Inference Levels (Incremental)

      **Level 0:** No dependency nodes. Service throughput only.  
      **Level 1:** Dependency node with arrivals/served derived from telemetry.  
      **Level 2:** Shared dependency with allocation across upstream services.  
      **Level 3 (optional):** Latency-based inference of hidden backlog pressure.

      ## Edge Semantics (Dependency Load)

      Dependencies rely on explicit **edge semantics**:

      - **Throughput edges**: successful flow to downstream services.
      - **Effort edges**: attempt load to dependencies.

      This epic depends on the edge semantics contract (M-07.04) so that dependency load is explicit and validated.

      ## MVP Warnings (M-063)

      - `missing_dependency_arrivals`: dependency arrivals were not provided.
      - `missing_dependency_served`: dependency served was not provided.

      These are emitted as **info** warnings and indicate that dependency load/utilization cannot be computed.

      ## UI Expectations

      - Dependencies should be visually distinct (resource layer or node type).
      - Service inspectors should show whether the service is **dependency-limited**.
      - Shared dependencies should show capacity allocation or proportional load.
      - Option B should render a **constraint chip** (e.g., `C | db_main`) and constraint series in the inspector.
      - Constraint chips convey whether the node is limited in the current bin (visual state + tooltip).

      ## Telemetry Compatibility

      Telemetry ingestion should map observed dependency calls into arrivals/served for dependency nodes or effort edges. Where signals are inferred, provenance must mark `origin: derived` and expose warnings.

      ## Success Criteria (Epic-Level)

      - Shared dependencies can be represented without breaking the minimal basis.
      - Dependency load and coupling are visible in the topology and API.
      - Inference is explicit and warnings make uncertainty visible.
  - kind: milestone
    id: M-001
    frontmatter:
      title: Parameterized Evaluation
      status: done
      parent: E-18
    body: |
      ## Goal

      The Rust engine can compile a model once and re-evaluate it many times with different parameter values without recompiling. This is the critical primitive that every downstream use case builds on — interactive what-if, parameter sweeps, optimization, sensitivity analysis. The Plan becomes a reusable program; parameters are its inputs.

      ## Context

      The current `compile(model) → Plan` bakes all constants into `Op::Const { out, values }` at compile time. To change an arrival rate from 10 to 15, you must recompile the entire model. Compilation is O(nodes) with topological sorting, expression parsing, and constraint resolution — unnecessary work when only a scalar value changed.

      After this milestone, the Plan carries a `ParamTable` that lists every user-visible constant. `evaluate_with_params(plan, overrides)` writes overrides into the state matrix before the eval loop, then runs the same bin-major evaluation. The Plan is immutable and shareable; only the parameter values change.

      ### Where constants come from in the compiler

      The compiler creates `Op::Const` from seven sources:

      | Source | Example | Parameter? |
      |--------|---------|-----------|
      | `kind: const` node values | `values: [10, 20, 30]` | Yes — primary user input |
      | Traffic arrival `ratePerBin` | `ratePerBin: 20` | Yes — class arrival rate |
      | PMF expected value | `pmf: { values, probabilities }` | Yes — derived from PMF definition |
      | WIP limit scalar | `wipLimit: 50` | Yes — topology constraint |
      | Queue initial condition | `initialCondition: { queueDepth: 5 }` | Yes — initial state |
      | Expression literal | `8` in `MIN(arrivals, 8)` | Yes — inline constant in formula |
      | Compiler-generated temps | Internal proportional alloc, router weight columns | No — derived, not user-visible |

      The distinction: a parameter is a constant that traces back to a user-authored value in the model YAML. Compiler-generated intermediate constants (temp columns, normalized weights) are NOT parameters.

      ## Acceptance Criteria

      1. **AC-1: ParamTable struct.** `Plan` gains a `params: ParamTable` field. `ParamTable` contains a `Vec<ParamEntry>` where each entry has:
         - `id: String` — stable identifier matching the model YAML source (e.g., `"arrivals"` for a const node, `"arrivals.Order"` for a traffic class rate, `"Queue.wipLimit"` for a topology WIP limit)
         - `column: usize` — the column index in the state matrix this parameter fills
         - `default: ParamValue` — original value from the model (`Scalar(f64)` for uniform, `Vector(Vec<f64>)` for per-bin)
         - `kind: ParamKind` — `ConstNode`, `ArrivalRate`, `WipLimit`, `InitialCondition`, `ExprLiteral`

      2. **AC-2: Compiler populates ParamTable.** The compiler registers parameters for:
         - Every `kind: const` node (id = node id, value from `values` field)
         - Every `traffic.arrivals` entry with `ratePerBin` (id = `"{nodeId}.{classId}"`)
         - Every topology node with scalar `wipLimit` (id = `"{topoNodeId}.wipLimit"`)
         - Every topology node with `initialCondition.queueDepth` (id = `"{topoNodeId}.init"`)
         - Expression literals are NOT parameters (they're inline formula constants, not model inputs)

      3. **AC-3: `evaluate_with_params` function.** New public function:
         ```rust
         pub fn evaluate_with_params(plan: &Plan, overrides: &[(String, ParamValue)]) -> Vec<f64>
         ```
         - Applies overrides to matching param IDs before the eval loop
         - `Scalar(v)` fills all bins with `v`; `Vector(vs)` writes per-bin values
         - Unmatched override IDs are ignored (forward-compatible)
         - Unknown param IDs do not cause errors
         - Returns the filled state matrix (same shape as `evaluate`)

      4. **AC-4: Equivalence.** `evaluate_with_params(plan, &[])` (no overrides) produces identical results to `evaluate(plan)`. A Rust test asserts bitwise equality.

      5. **AC-5: Full post-eval pipeline.** `eval_model` is refactored to accept optional overrides. When overrides are provided, it calls `evaluate_with_params` instead of `evaluate`, then runs the same post-eval pipeline: class decomposition normalization, proportional allocation propagation, edge series computation, analysis warnings. A new public entry point:
         ```rust
         pub fn eval_model_with_params(
             model: &ModelDefinition,
             overrides: &[(String, ParamValue)]
         ) -> Result<EvalResult, CompileError>
         ```

      6. **AC-6: Parameter override affects downstream.** Overriding a const node's value propagates through all downstream expressions, queue recurrences, per-class decomposition, and edge series. Test: override `arrivals` from 10 to 20 → verify `served`, `queue_depth`, per-class series, and edge flow all change correctly.

      7. **AC-7: Class arrival rate override.** Overriding a class arrival rate (e.g., `"arrivals.Order"` from 6 to 12) changes the class fraction and propagates through normalization and downstream decomposition. Test: change one class rate, verify normalization invariant still holds.

      8. **AC-8: WIP limit override.** Overriding `"{topoNodeId}.wipLimit"` changes the queue's WIP limit and affects overflow. Test: lower WIP limit → verify overflow increases.

      9. **AC-9: Parameter schema extraction.** New public function:
         ```rust
         pub fn extract_params(plan: &Plan) -> &ParamTable
         ```
         Returns the plan's parameter table. Clients use this to discover what can be tweaked, with IDs, kinds, and defaults. This is what the UI will use to auto-generate controls.

      10. **AC-10: Compile-once, eval-many pattern.** Demonstrate the pattern with a Rust test that compiles once, evaluates 10 times with different arrival rates, and verifies each result is independent (no state leakage between evaluations). Measure that subsequent evals are faster than the first (no recompilation).

      ## Out of Scope

      - Session management or persistent process (M-002)
      - Streaming protocol or MessagePack framing (M-002)
      - CLI interface changes (M-002)
      - UI parameter controls (M-019)
      - Parameter bounds, display names, or template metadata enrichment (future — the parameter table carries IDs and defaults only)
      - Expression literal parameterization (inline `8` in `MIN(arrivals, 8)` stays baked — parameterizing expression constants requires expression-tree rewriting, which is a different problem)
      - Structural model changes (adding/removing nodes requires recompilation — by design)

      ## Key References

      - `engine/core/src/plan.rs` — Plan struct, Op enum, ColumnMap
      - `engine/core/src/eval.rs` — `evaluate()` function, bin-major loop
      - `engine/core/src/compiler.rs` — `compile()`, `eval_model()`, all `Op::Const` emission sites
      - `docs/architecture/headless-engine-architecture.md` — overall architecture
      - `work/epics/E-18-headless-pipeline-and-optimization/milestone-plan-v2.md` — milestone sequence
  - kind: milestone
    id: M-002
    frontmatter:
      title: Engine Session + Streaming Protocol
      status: done
      parent: E-18
      depends_on:
        - M-001
    body: |
      ## Goal

      The Rust engine runs as a persistent process that accepts commands and streams results. `flowtime-engine session` reads length-prefixed MessagePack messages from stdin, holds a compiled Plan in memory, and writes responses to stdout. This is the headless pipeline component — the same protocol works over stdin/stdout (CLI pipes) and WebSocket (UI, via M-018 proxy).

      ## Context

      After M-001, the engine can compile once and evaluate many times with different parameters via `evaluate_with_params(plan, overrides)`. But every invocation is still a batch subprocess: spawn → parse YAML → compile → evaluate → write files → exit. The overhead of process spawn + file I/O dominates latency (100-500ms). For interactive use, we need a persistent process that holds the compiled Plan and responds to parameter changes in microseconds.

      The session is a stateful loop:

      ```
      stdin → [compile] → hold Plan → [eval overrides] → stdout
                                     → [eval overrides] → stdout
                                     → [eval overrides] → stdout
                                     → EOF → exit
      ```

      ### Why MessagePack

      - **Binary f64 arrays.** A 1,000-bin series is 8KB as binary vs ~8KB+ as JSON text (with formatting overhead and parse cost). MessagePack encodes `Vec<f64>` as a binary ext type — zero parsing, memcpy-fast.
      - **Length-prefixed framing.** 4-byte big-endian length prefix before each message. No newline ambiguity, no incomplete-line bugs.
      - **Cross-language.** Native libraries: Rust (`rmp-serde`), JavaScript (`@msgpack/msgpack`), C# (`MessagePack-CSharp`), Python (`msgpack`).
      - **Pipe-friendly.** Works over stdin/stdout for CLI composition, over WebSocket for UI.

      ## Acceptance Criteria

      1. **AC-1: `session` CLI command.** `flowtime-engine session` enters a persistent loop reading from stdin and writing to stdout. No file arguments required. Exits cleanly on stdin EOF or SIGTERM.

      2. **AC-2: Length-prefixed MessagePack framing.** Each message is `[4-byte big-endian length][MessagePack payload]`. Both requests (stdin) and responses (stdout) use this framing. Stderr is reserved for human-readable log messages (not protocol).

      3. **AC-3: `compile` command.** Request: `{ method: "compile", params: { yaml: "<model YAML>" } }`. Response: `{ result: { params: [{ id, kind, default }], series: [{ id, bins, values }], bins, grid } }`. Compiles the model, holds the Plan in session state, evaluates with defaults, returns the parameter schema and initial series.

      4. **AC-4: `eval` command.** Request: `{ method: "eval", params: { overrides: { "arrivals": 15.0, "Queue.wipLimit": 30.0 } } }`. Response: `{ result: { series: { "arrivals": <f64 array>, "served": <f64 array>, ... }, elapsed_us } }`. Re-evaluates with overrides, returns updated series. Must not recompile. Series values are MessagePack binary arrays (not JSON text arrays).

      5. **AC-5: `get_params` command.** Request: `{ method: "get_params" }`. Response: `{ result: { params: [{ id, kind, default }] } }`. Returns the current parameter table from the compiled Plan.

      6. **AC-6: `get_series` command.** Request: `{ method: "get_series", params: { names: ["arrivals", "served"] } }`. Response: `{ result: { series: { "arrivals": <f64 array>, "served": <f64 array> } } }`. Returns specific series from the current evaluation state. If no names provided, returns all non-internal series.

      7. **AC-7: Error handling.** Invalid requests return `{ error: { code, message } }`. Specific errors: `not_compiled` (eval before compile), `compile_error` (bad YAML), `unknown_method`. The session continues after errors — it does not exit.

      8. **AC-8: Session state.** The session holds: compiled Plan, current parameter overrides, current state matrix (from most recent eval). `compile` replaces the entire session state. `eval` updates overrides and state. Multiple `eval` calls are independent (no accumulation).

      9. **AC-9: Performance.** For a model with 8 bins and ~10 series, `eval` with scalar overrides completes in under 1ms (excluding I/O). A Rust benchmark test evaluates 1,000 times in a loop and asserts total < 1 second.

      10. **AC-10: Integration test.** A Rust integration test spawns `flowtime-engine session` as a subprocess, sends compile + eval + eval (with different overrides) + get_params via the MessagePack protocol over stdin/stdout, and verifies all responses are correct.

      ## Technical Notes

      ### Dependencies to add

      - `rmp-serde` (MessagePack serialization for Rust) — workspace dependency
      - `serde` derive on request/response types

      ### Module structure

      - `engine/core/src/session.rs` — Session struct, state management, command dispatch
      - `engine/core/src/protocol.rs` — Request/Response types, MessagePack framing (read/write)
      - `engine/cli/src/main.rs` — `cmd_session()` entry point

      ### Message envelope

      ```rust
      #[derive(Serialize, Deserialize)]
      struct Request {
          method: String,
          #[serde(default)]
          params: serde_json::Value, // flexible params per method
      }

      #[derive(Serialize)]
      struct Response {
          #[serde(skip_serializing_if = "Option::is_none")]
          result: Option<serde_json::Value>,
          #[serde(skip_serializing_if = "Option::is_none")]
          error: Option<ErrorInfo>,
      }
      ```

      Note: We use `serde_json::Value` as the flexible inner type even though the wire format is MessagePack. MessagePack and JSON share the same data model (maps, arrays, strings, numbers, bools, null). `rmp-serde` serializes/deserializes `serde_json::Value` correctly.

      ### Series encoding

      Series data (`Vec<f64>`) serializes naturally as MessagePack arrays of floats. For very large series, a future optimization could use MessagePack binary ext type for raw f64 bytes, but the standard array encoding is correct and sufficient for this milestone.

      ### Post-eval pipeline

      After `evaluate_with_params`, the session must also run:
      - Class decomposition normalization + proportional allocation
      - Edge series computation
      - Analysis warnings

      This means the session calls the same post-eval pipeline as `eval_model_with_params`. The simplest approach: the session stores the compiled Plan and the ModelDefinition, and each `eval` call runs `eval_model_with_params` reusing the model but with the new overrides.

      For the compile-once optimization (skip recompilation), a future milestone can cache the Plan separately. For now, recompiling per eval is acceptable if latency is under the AC-9 target.

      ## Out of Scope

      - WebSocket transport (M-018)
      - .NET bridge for session mode (M-018)
      - UI parameter controls (M-019)
      - Parameter sweep batch mode (m-E18-03)
      - Request IDs / multiplexing (single-client, sequential for now)
      - Authentication or access control
      - TLS/encryption

      ## Key References

      - `engine/core/src/compiler.rs` — `compile()`, `eval_model_with_params()`
      - `engine/core/src/plan.rs` — `ParamTable`, `ParamValue`
      - `engine/core/src/eval.rs` — `evaluate_with_params()`
      - `engine/cli/src/main.rs` — existing CLI command dispatch
      - `docs/architecture/headless-engine-architecture.md` — protocol design
      - [rmp-serde crate](https://crates.io/crates/rmp-serde) — MessagePack for Rust
      - [MessagePack spec](https://msgpack.org/) — wire format
  - kind: milestone
    id: M-003
    frontmatter:
      title: Tiered Validation
      status: done
      parent: E-18
    body: |
      ## Goal

      Expose model validation as a first-class, client-agnostic Time Machine operation.
      Three tiers callable from the .NET SDK and from a new `POST /v1/validate` HTTP
      endpoint. Tier 1 (schema) is also added to the Rust engine session protocol so
      the Svelte What-If UI can get cheap per-edit feedback without a full compile.

      ## Scope

      **Tier 1 — Schema:** YAML parses + JSON schema validates + class references resolve.
      Backed by `ModelSchemaValidator.Validate` + `ModelValidator.Validate` in Core.
      Cheap: no compile, no eval.

      **Tier 2 — Compile:** Schema (tier 1) + model compiles into a Graph.
      Backed by `ModelCompiler.Compile` + `ModelParser.ParseModel` in Core.
      Catches structural errors (unresolved references, expression errors).

      **Tier 3 — Analyse:** Compile (tier 2) + deterministic evaluation + invariant
      checks. Backed by `TemplateInvariantAnalyzer.Analyze` in Sim.Core.
      Catches semantic issues (conservation violations, capacity breaches).

      **In scope:**
      - `src/FlowTime.TimeMachine/Validation/` — `TimeMachineValidator` (static service),
        `ValidationResult`, `ValidationError`, `ValidationWarning`, `ValidationTier` enum
      - `src/FlowTime.API/Endpoints/ValidationEndpoints.cs` — `POST /v1/validate`
      - Rust engine session — new `validate_schema` command (tier 1 via session protocol)
      - Unit tests: `tests/FlowTime.TimeMachine.Tests/Validation/`
      - API tests: `tests/FlowTime.Api.Tests/ValidationEndpointsTests.cs`
      - Rust integration tests: session `validate_schema` command

      **Out of scope:**
      - Line/column mapping in error messages
      - Editor LSP integration
      - Svelte UI changes (validate button) — separate UI milestone

      ## Contract

      ### HTTP Endpoint

      ```
      POST /v1/validate
      Content-Type: application/json

      {
        "yaml": "...",
        "tier": "schema" | "compile" | "analyse"
      }
      ```

      Response (200 always, errors in body):

      ```json
      {
        "tier": "schema",
        "isValid": false,
        "errors": [
          { "message": "Unknown class reference: 'premium'" }
        ],
        "warnings": []
      }
      ```

      Tier 3 analyse response includes warnings in addition to errors:

      ```json
      {
        "tier": "analyse",
        "isValid": true,
        "errors": [],
        "warnings": [
          { "nodeId": "Queue", "code": "high_utilization", "message": "..." }
        ]
      }
      ```

      ### Session Protocol Command (`validate_schema`)

      ```
      request: { method: "validate_schema", params: { yaml: "..." } }
      response (valid):   { result: { is_valid: true, errors: [] } }
      response (invalid): { result: { is_valid: false, errors: ["..."] } }
      ```

      Tier 2 (compile) is already served by the existing `compile` command, which
      returns `error: { code: "compile_error", ... }` on failure.

      ## Acceptance Criteria

      - [x] `TimeMachineValidator.Validate(yaml, ValidationTier.Schema)` returns errors for invalid YAML
      - [x] `TimeMachineValidator.Validate(yaml, ValidationTier.Compile)` catches structural errors (bad node refs, bad expressions)
      - [x] `TimeMachineValidator.Validate(yaml, ValidationTier.Analyse)` returns warnings from invariant analyzer
      - [x] `POST /v1/validate` responds 200 with `{ isValid, tier, errors, warnings }` for all three tiers
      - [x] Invalid tier value → 400 Bad Request
      - [x] Empty/null yaml → 400 Bad Request
      - [x] Rust session `validate_schema` returns `{ is_valid, errors }` without full compile
      - [x] `rg "FlowTime\.Generator" src/ tests/` still zero (no regressions)
      - [x] `dotnet test FlowTime.sln` all green; Rust `cargo test` all green
