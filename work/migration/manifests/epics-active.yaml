  - kind: gap
    id: G-029
    frontmatter:
      title: Template-layer `Legacy*` aliases (Sim authoring-time)
      status: addressed
    body: |
      ### Why this was a gap

      Surfaced during M-050 (D-m-E24-02-03, 2026-04-25). `src/FlowTime.Sim.Core/Templates/Template.cs` carries three `Legacy*` properties on the authoring-time `Template` types, each paired with a `ShouldSerialize*` shim:

      | Property | YAML alias | C# canonical |
      |---|---|---|
      | `Template.Node.LegacyExpression` (line 264) | `expression:` | `Expr` (emits as `expr:`) |
      | `TemplateOutput.LegacySource` (line 339) | `source:` (in outputs) | `Series` (emits as `series:`) |
      | `TemplateOutput.LegacyFilename` (line 348) | `filename:` | `As` (emits as `as:`) |

      All three are **dead aliases**:
      - `expression:` — zero hits in `templates/*.yaml` (production), zero hits in `tests/**/*.yaml`. Real templates use `expr:`. Note: `examples/*.yaml` and `engine/fixtures/*.yaml` have hits for `expression:`, but those go through the Engine's `ModelParser`, not through `Template`.
      - `source:` (in outputs) — zero hits in production templates and tests. The `source:` matches in production templates (9 hits) are all on **nodes** (`nodes[].source: ${telemetryFooSource}`), a separate mechanism on `Template.Node`, not on `TemplateOutput`.
      - `filename:` — zero hits in production templates or tests.

      The paired `ShouldSerialize*` methods are no-ops at the YAML emitter — YamlDotNet does not honor the `ShouldSerialize{X}()` convention (it is a Json.NET / `XmlSerializer` pattern). See D-m-E24-02-03 for the YamlDotNet investigation.

      ### Why deferred from M-050

      `Template` is authoring-time, pre-substitution. E-24's scope is the post-substitution model boundary (the unified `ModelDto`). Touching `Template` would scope-creep the milestone.

      ### Status

      **Resolved 2026-04-25** via `chore/e-24-cleanup-wave` patch branch:
      - `Template.Node.LegacyExpression` (and `ShouldSerializeLegacyExpression`) deleted.
      - `TemplateOutput.LegacySource` (and `ShouldSerializeLegacySource`) deleted.
      - `TemplateOutput.LegacyFilename` (and `ShouldSerializeLegacyFilename`) deleted.
      - Pre-delete sweep confirmed zero live consumers in production templates and Sim tests; the one `filename:` hit in `tests/FlowTime.Sim.Tests/ArtifactHashingTests.cs` flows through `ModelHasher` (raw YAML deserialization to `object?`), not through `Template`. The `LegacyExpression`-named test in `tests/FlowTime.Tests/Schema/TargetSchemaValidationTests.cs:182` exercises Engine-side `ModelValidator`, not Sim's `Template`, and is unaffected.

      ---
  - kind: gap
    id: G-030
    frontmatter:
      title: FFI-based engine evaluator (alternative to subprocess)
      status: open
    body: |
      ### Why this is a gap

      The current `IModelEvaluator` seam has two implementations — `RustModelEvaluator` (fresh subprocess per eval) and `SessionModelEvaluator` (persistent `flowtime-engine session` subprocess via MessagePack over stdio). Both share one property: the engine is a separate OS process, with IPC on every call.

      For Studio (E-23 as proposed), this boundary gets expensive:

      - **Per-session memory multiplies.** “One Rust process per session” with ~50 concurrent sessions = 50 process address spaces. The alternative — a pooled subprocess with session affinity — is real complexity that does not serve users.
      - **Session IR wants direct access to engine state.** Node identity, per-node cache, and generation counters live in Rust (per M-046). The .NET session service projects patches onto that state via IPC round-trips. A shared-memory boundary would let the service hand the evaluator `&mut Graph` or an `Arc<Session>` directly.
      - **Cold start matters for short-lived embedders.** `FlowTime.Pipeline` SDK callers pay subprocess startup per invocation unless they keep a session open; an in-process library pays zero.
      - **Container profile.** On cloud-agnostic hosting (Hetzner, plain Docker), collapsing engine + service into one process shrinks image size and PID footprint.

      ### Alternative shape

      Rust engine compiled as a **cdylib** (or `staticlib` for .NET AOT scenarios), loaded into the hosting process via FFI:

      - .NET host → P/Invoke or a managed wrapper around a stable C ABI.
      - Rust host → same crate linked directly (no FFI needed if the service is also Rust — see below).
      - Python/Node/Go embedders → same C ABI via their native-interop story.

      Keeps the language-boundary benefit (engine correctness isolated from service churn) without the process boundary.

      ### Why this may or may not be worth doing

      Worth it if any of these bite:

      - Per-session memory at `N=50` concurrent sessions exceeds budget.
      - Cold-start latency on short-lived pipeline invocations shows up in traces.
      - The subprocess pool-with-affinity logic grows into a distinct subsystem rather than a small helper.

      Not worth it if:

      - Sessions are few and long-lived (the subprocess boundary amortizes).
      - The managed wrapper surface area (marshalling complex types, lifetime of native handles, allocator mismatches) exceeds the subprocess complexity it replaces.

      ### Immediate implications

      - Keep `IModelEvaluator` as the seam; do not let subprocess assumptions leak past it.
      - Before committing to “one Rust process per session” in M-046/M-047, prototype an FFI-based evaluator alongside the subprocess one and measure memory + cold start at realistic `N`.
      - A language reconsideration for the service layer (see “Backend language choice for session service” below) interacts with this decision: if the service ends up in Rust, FFI collapses to a direct link and the IPC discussion ends.

      ---
  - kind: gap
    id: G-031
    frontmatter:
      title: Backend language choice for session service
      status: open
    body: |
      ### Why this is a gap

      The current stack is Rust engine + .NET session layer. The .NET choice is historical — it predates the Rust engine and predates Studio's scope expansion. Under cloud-agnostic deployment (Docker on Hetzner or similar) and with the Pipeline SDK's “embeddable into .NET only” framing challenged, the first-principles calculus shifts:

      - **Pipeline SDK embedding reach.** A Rust crate + C ABI reaches .NET (P/Invoke), Python (ctypes / PyO3), Node (NAPI), Go (cgo), and any other runtime. A .NET assembly reaches .NET only. Broader embedder reach is strictly better for “FlowTime as a callable function” positioning.
      - **Container profile on cloud-agnostic hosting.** Rust: ~10 MB static binary, sub-second cold start. .NET AOT-trimmed: ~80 MB, multi-second cold start. On managed Azure the gap is absorbed; on plain Docker hosting it is visible.
      - **Collapsing the engine/service divide.** If the service is Rust, the “engine as subprocess” discussion ends — the session service owns the engine state directly via a linked crate.
      - **Studio's .NET scope is mostly net-new.** Session IR, patch vocabulary, WS multiplex, snapshot/resume do not exist today. The rewrite cost is “build Studio in Rust from scratch” rather than “port a mature .NET layer to Rust.” The existing analysis runners (SweepRunner, Nelder-Mead, etc., ~1,600 LOC) are near-pure math and port cleanly.

      ### Status

      Open question. Not scheduled. Worth deciding before M-046 scope lands so the implementation substrate is settled.

      ### Resolution path

      Prototype spike:

      1. `axum` or `actix-web` service exposing the current `/v1/sweep` shape, wrapping the Rust engine as a linked crate (no subprocess).
      2. Measure: cold start, steady-state memory at N=50 sessions, end-to-end sweep latency vs .NET + subprocess baseline, container image size.
      3. Re-evaluate with data. If Rust wins decisively on memory + deployment profile and the async-Rust complexity for WS fan-out is tractable, Studio (E-23) is the natural place to land the shift — it is mostly new scope anyway.

      ### Immediate implications

      - Do not treat “.NET session service” as settled in the Studio architecture doc. Mark it as an assumption pending spike.
      - Keep the `IModelEvaluator` seam language-neutral in spirit — it is currently .NET-flavored but the pattern (compile-once-eval-many with parameter patches) ports directly.
      - Do not expand the .NET layer with anything that would be load-bearing to keep on .NET specifically. Structural patch handling, session IR, and WS multiplex should be written as if any language could host them.

      ---
  - kind: gap
    id: G-032
    frontmatter:
      title: '`transportation-basic` regressed: `edge_flow_mismatch_incoming` × 3 after E-24 unification'
      status: open
    body: |
      ### Why this is a gap

      Running the `transportation-basic` template (titled "Transportation Network with Hub Queue") today (2026-04-28) emits **three** analyser warnings of code `edge_flow_mismatch_incoming` (severity `warning`):

      ```
      Arrivals do not match sum of incoming edge flows. Edges: queue_to_airport.   (LineAirport,    Δ ≈ 1.89)
      Arrivals do not match sum of incoming edge flows. Edges: queue_to_downtown.  (LineDowntown,   Δ ≈ 9.46)
      Arrivals do not match sum of incoming edge flows. Edges: queue_to_industrial.(LineIndustrial, Δ ≈ 7.57)
      ```

      The analyser is asserting the conservation invariant `arrivals[t] == sum(incoming_edges_after_lag[t])` at the three downstream service nodes (`LineAirport`, `LineDowntown`, `LineIndustrial`) fed by the central hub queue. The mismatch values are **not** floating-point noise — they're 1.89, 9.46, 7.57 in absolute units. Real semantic divergence.

      Comparing run artifacts on disk for the **same template** under **default parameters**:

      | Run | Date | Warning count | `edge_flow_mismatch_incoming` |
      |---|---|---|---|
      | `run_20260424T124735Z_25e2fe28` | 2026-04-24 | 0 | 0 |
      | `run_20260424T124839Z_ef75aea3` | 2026-04-24 | 0 | 0 |
      | `run_20260424T142044Z_f6d43b90` | 2026-04-24 | 0 | 0 |
      | `run_20260424T150244Z_b2f4c995` | 2026-04-24 | 0 | 0 |
      | `run_20260428T165413Z_6ed5974e` | 2026-04-28 | 3 | 3 |

      Four prior runs of the same template emitted **zero** warnings. Today's run emits **three**.

      ### What did NOT change in the regression window

      - `git log -- src/FlowTime.Core/Analysis/InvariantAnalyzer.cs` — last commit is `044d2bc` (E-16-03 era, pre-window). Conservation logic untouched. The mismatch tolerance is unchanged.
      - `git log -- templates/transportation-basic.yaml` — last commit `a06ed88` (M-06.01 era). Template YAML and default parameters unchanged.

      ### What DID change in the regression window

      Between 2026-04-24 (last clean runs) and 2026-04-28 (offending run), **E-24 Schema Alignment** merged to main on 2026-04-25 (D-051). Relevant commits in `src/FlowTime.Core/`:

      - `131dd35` — M-050 step 1: `ProvenanceDto`, `OutputDto` cleanup, YamlDotNet 17.0.1
      - `5a2a31d` — post-m-E24-02 cleanup: delete `ProvenanceEmbedder`, rename `GridDefinition.StartTimeUtc` → `Start`, drop `Template Legacy*` aliases
      - `a7c984f` — M-052: `ParseScalar` honors ScalarStyle; quote type-ambiguous strings on emit
      - `b3efda0` — M-046 part 1: close `ModelSchemaValidator` silent-error blind spot + restructure node-kind clusters
      - `d42f649` — M-046 AC4: 12 cross-reference/cross-array adjuncts on `ModelSchemaValidator`
      - `4fe8d45` — M-048: delete `ModelValidator`; relocate `ValidationResult`

      The shape of the model passing Sim → Engine changed. The pre-E-24 runs' `spec.yaml` carries `generator: flowtime-sim`, `topology:` block, `classes: []` (the legacy `SimModelArtifact` shape). The post-E-24 run's `spec.yaml` is the unified `ModelDto` form — no `topology:` block, single-level `values:`. Same source template, same parameters, materially different compiled-graph shape.

      ### Likely cause (hypothesis — needs Engine-team confirmation)

      E-24's model unification changed how the queue-and-route flow compiles into the runtime DAG. The conservation invariant now fails at the three downstream service nodes by a small but non-trivial margin. Specific suspect: how the central queue's outgoing edges, lag, and the downstream `arrivals` series wire together post-unification — the unified shape may emit a slightly different routing semantic for `serviceWithBuffer` → service hop than the pre-unification pipeline did.

      Alternative benign reading: the analyser is correctly detecting a real model property that was always present but didn't fire pre-unification because the lag handling or edge volume computation produced an exactly-canceling difference. In that case the "regression" is actually the analyser working *better* post-unification, not worse. The 1.89 / 9.46 / 7.57 magnitudes lean against this — they're at non-trivial scale.

      ### Status

      **Diagnosed 2026-05-01 in `patch/edge-flow-mismatch`.** Hypothesis (2) is correct — **a real model issue in `transportation-basic` (and at least 8 sibling templates) that was masked pre-E-24 and is now correctly surfaced.** The fix is template- or engine-side and requires a design decision on which authority wins (expr layer vs topology edge weights). Not blocking — gated by the Phase 2 baseline canary added in the same patch.

      **Mechanism, confirmed by reading run artifacts side-by-side:**

      - `arrivals_airport[t]` (LineAirport's incoming series) is byte-identical between the clean (pre-E-24, 2026-04-24) and dirty (post-E-24, 2026-04-28) runs at value `2.270` per bin (= `hub_dispatch * splitAirport (0.3)` per the template's expr nodes).
      - `hub_dispatch[t]` (HubQueue's served, the source of all three line-arrivals) is also byte-identical at value `7.567` per bin.
      - The `queue_to_airport` edge declaration is byte-identical (`from: HubQueue:out, to: LineAirport:in, weight: 1`).
      - **The pre-E-24 run has no per-edge `flowVolume` series at all** (48 series files); the post-E-24 run has 11 such files (59 total) including `edge_queue_to_airport_flowVolume` at value `2.522` per bin (= `hub_dispatch / 3`, the engine's weight-uniform apportionment).
      - The analyser's incoming-conservation check (`src/FlowTime.Core/Analysis/InvariantAnalyzer.cs:323-335`) reads `edgeFlowSeries[edgeId]`. Pre-E-24, the series wasn't there → `TrySumEdgeFlows` returned `false` → the check **silently skipped**. Post-E-24, the series is there → the check runs → finds `2.270 != 2.522` → emits `edge_flow_mismatch_incoming`.

      **The divergence is real**, not a tolerance artifact. The template uses parameter-driven splits in the expr layer (`splitAirport=0.3`, `splitIndustrial=0.2`, downtown implicit `0.5`) but every queue→line edge has `weight: 1`, so the engine's weight-based edge-flow computation produces uniform 1/3 splits. The conservation invariant `arrivals == sum(incoming_edges_after_lag)` correctly detects the mismatch.

      **The "regression" is improved analyser coverage**, not a new bug. Edge `flowVolume` series began being emitted somewhere in the E-23 / E-24 commit chain (the writers `EdgeFlowMaterializer.cs` + `RunArtifactWriter.cs` weren't directly touched in the window — likely a downstream effect of the model-unification changes that gave the materializer the structural information it needed).

      ### Outstanding design question

      Which authority wins for edge flow volumes — **expr nodes** (`arrivals_airport = hub_dispatch * splitAirport`) or **topology edge weights** (`queue_to_airport: weight: 1`)?

      Three options:

      1. **Edge weights win.** Templates must encode splits in edge weights, not in expr arithmetic. Current templates need editing (8+ templates affected). Pro: edges are the canonical structural language; expr nodes inflating splits manually is redundant. Con: 8+ templates to fix; possibly other modeling patterns to reconsider.
      2. **Expr authority wins.** Engine should not auto-derive edge flow from weights when an expr node already produces the receiver's `arrivals` series. The conservation check would need to skip edges whose target's `arrivals` is computed (not derived). Pro: templates as-is are correct; minimal change. Con: changes the engine's edge-volume semantics for an entire class of models.
      3. **Both surfaces are normative; the template should make them agree.** Templates use parameters in BOTH places (expr splits AND edge weights). The author commits to the redundancy and tooling helps keep them in sync. Pro: single source of truth conceptually. Con: more verbose templates; tooling needed.

      This is an Engine architecture call, not something the M-045 patch resolves. The Phase 2 canary baseline locks in current state so future drift is detected; the design call lives in a future engine milestone (likely the same "engine truth gate" or testing-rigor follow-up that will eventually look at golden-output canaries).

      **Affected templates (run-warn count under the Phase 2 canary, captured 2026-05-01):**

      | Template | run-warn |
      |---|---|
      | `transportation-basic-classes` | 8 |
      | `supply-chain-multi-tier` | 2 |
      | `supply-chain-multi-tier-classes` | 2 |
      | `it-system-microservices` | 1 |
      | `manufacturing-line` | 1 |
      | `network-reliability` | 1 |
      | `supply-chain-incident-retry` | 1 |
      | `transportation-basic` | 1 |
      | `warehouse-picker-waves` | 1 |

      The 1.89 / 9.46 / 7.57 worst-case mismatch values originally cited from `data/runs/run_20260428T165413Z_6ed5974e` for `transportation-basic` are still informative as the magnitude signal.

      ### Quick-win canary added (2026-05-01, `patch/edge-flow-mismatch`)

      Phase 2 of `Survey_Templates_For_Warnings` now hard-asserts a per-template `run-warn` baseline against `ExpectedRunWarnings`. Any drift (upward or downward) fails the build with a clear before/after message. The 9 known-non-zero baselines above are encoded with rationale pointing back to this gap entry. Fix the underlying template/engine question and the baselines drop to zero in the same commit; ship a different change that bumps any baseline and the test fails until the dictionary is updated deliberately. **The canary now actively prevents the class of silent drift that produced this finding.**

      ### Why the build-time canary did not catch this

      `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs::Survey_Templates_For_Warnings` (E-24 M-053) hard-asserts **`val-err == 0`** across all twelve shipped templates. `edge_flow_mismatch_incoming` has severity `warning`, not error — so it never fails the canary. The canary collects val-warn counts as diagnostic output but does not assert on them. **A val-warn delta of +3 on `transportation-basic` slipped through silently.**

      This is a known weakness of the canary: it gates on validator errors only, not on analyser warnings. See sibling gap entry below for the broader testing-rigor argument.

      ### Reference

      - Offending run (today): `data/runs/run_20260428T165413Z_6ed5974e/run.json` — three `edge_flow_mismatch_incoming` items in `warnings[]`.
      - Clean baseline (pre-E-24): `data/runs/run_20260424T150244Z_b2f4c995/run.json` — empty `warnings[]`.
      - Analyser source: `src/FlowTime.Core/Analysis/InvariantAnalyzer.cs:323-335` (incoming-edge conservation check) and `:330` (warning message).
      - Template: `templates/transportation-basic.yaml`.
      - Canary: `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs`.

      ### Immediate implications

      - Plan an Engine-side investigation milestone — likely a small "E-24 follow-up" or new E-25 micro-milestone — before further analyser/engine work that depends on the conservation invariant being clean across all shipped templates.
      - Treat any new appearances of `edge_flow_mismatch_incoming` (or `_outgoing`) on previously-clean templates as a regression signal until this is resolved.
      - Do NOT delete the offending run artifact (`run_20260428T165413Z_6ed5974e`) — it is the reproduction case.
      - m-E21 / m-E22 work can proceed in parallel; this regression is engine-side and does not block consumer-surface work.

      ---
  - kind: gap
    id: G-033
    frontmatter:
      title: 'Tests are too weak: surveyed-output-only canaries cannot detect drift; need deterministic golden-output assertions'
      status: open
    body: |
      ### Why this is a gap

      The `transportation-basic` regression above (`edge_flow_mismatch_incoming` × 3 after E-24 unification) was caught **by accident**: only because four prior run artifacts from 2026-04-24 happened to still be on disk for byte-comparison against today's run. **If those runs had been pruned, the regression would have been invisible to the test suite** — the build-time canary `Survey_Templates_For_Warnings` would still have reported `val-err == 0` and passed.

      This exposes a structural weakness in the testing rigor:

      1. **The canary asserts existence-of-error-class, not output-equivalence.** It says "no template produces a validator error". It does NOT say "this template produces this specific output for this specific parameter set." A regression that shifts the output without producing a validator error slips through.
      2. **The canary gates on `val-err == 0` only.** Analyser warnings, run-time warnings, and per-bin numeric output drift are all unscored. A model could go from "12 warnings" to "0 warnings" or vice-versa, and from "arrivals=10.0" to "arrivals=10.5", and the canary would not budge.
      3. **No golden-output fixtures.** The repo has 12 shipped templates that are surveyed-but-not-asserted-against. There is no fixture that says "for `transportation-basic` with `splitAirport=0.4`, `splitIndustrial=0.3`, `hubRetryRate=0.2`, the `arrivals[Router]` series at bin 12 is exactly X.XX, and the warning set is exactly {Y, Z}."

      The user-stated intent is correct: **tests need to create models for which the test deterministically knows what the output should be, and compare against that.** Today's tests largely don't do that for the engine-template integration surface.

      ### What "stronger" looks like

      A golden-output canary for each shipped template, with:

      - A pinned parameter set (chosen for both numeric-stability and analytical-coverage — including some that should produce known warnings, some that should be clean).
      - A pinned expected output bundle: per-series per-bin numeric values (or a tight tolerance), full warning set with codes + message + nodeId + edgeIds + severity, run manifest fields.
      - A byte-identical (or tight-tolerance numeric) assertion. A drift fails the build with a clear diff showing which series at which bin moved by how much, and which warnings appeared / disappeared.
      - Forward-only regeneration when a deliberate engine change shifts numeric output: a `--regenerate` mode the engineer runs after a sanctioned change, producing a reviewable diff that becomes the new pinned expected output. (Pattern matches `dotnet test --update-snapshots` style.)

      This is the standard "approval testing" / "golden master" pattern. The `Survey_Templates_For_Warnings` canary is the lightweight version of this; it needs to be promoted to the strict version.

      ### Where the bar is already set higher (precedents in this repo)

      - `tests/FlowTime.Adapters.Synthetic.Tests/FileSeriesReaderTests.cs` and similar — assert exact CSV byte content against pinned fixtures.
      - `tests/FlowTime.Sim.Tests/Templates/RouterTemplateRegressionTests.cs`, `TransitNodeTemplateTests.cs`, `EvaluationIntegrityTemplateTests.cs` — assert specific structural properties per template.
      - M-044 AC1 real-bytes fixture (`FLOWTIME_E2E_TEST_RUNS=1`) — pinned wire-format round-trip on `state_window` warnings.

      These cover narrow surfaces. They do NOT cover the **end-to-end** "render template at default params → run engine → byte-compare full output bundle" loop that would have caught the regression above.

      ### Status

      **Open.** Worth planning into a near-term milestone. Strongly suggest scoping into an explicit testing-rigor milestone before further engine evolution (E-22 Time Machine: Model Fit + Chunked Evaluation, E-15 Telemetry Ingestion, future Cloud Deployment work). Each of those will introduce more compilation paths, more analytical surfaces, more places where silent drift can hide.

      ### Proposed shape (for milestone planning)

      **Milestone scope (rough; needs proper planning):**

      1. **Pick a representative parameter set per template.** Default params are usually fine but some templates may need explicit "happy path" + "deliberately-broken" pairs to lock both the clean-output and the warning-emission paths.
      2. **Generate the expected output bundle** by running the engine **once** at a sanctioned point in time (post-E-24, post-E-23, post-E-21 wrap is a reasonable baseline). Capture: full per-series per-bin numeric table (or tight-tolerance representation), full warning set, manifest summary fields.
      3. **Pin the expected bundles** under `tests/fixtures/golden-templates/<template-id>/` with documentation of the parameter set + capture date + capture commit hash.
      4. **Write the test:** parameterized over the 12 templates, each runs the engine and byte-compares (or tolerance-compares numeric series) against the pinned bundle.
      5. **Add a `--regenerate` mode** for sanctioned-change workflow: after a deliberate engine change shifts output, the engineer regenerates the bundles and the diff becomes the PR review artifact.
      6. **Make the canary fail on val-warn delta**, not just val-err. Even before the full golden pinning lands, a per-template `val-warn` count delta gate would have caught today's regression: 0→3 on `transportation-basic` would have failed the build.

      **Out of scope (deliberately):**

      - Floating-point exact equality across platforms. Tolerance-based numeric comparison is fine and is what every other comparable engine canary uses.
      - Pinning intermediate compilation-IR. The pinned artifact is the **observable engine output** (series + warnings), not the intermediate compiled DAG. The IR can change freely as long as the output stays equivalent.

      ### Reference

      - Today's regression case: `data/runs/run_20260428T165413Z_6ed5974e` vs `data/runs/run_20260424T150244Z_b2f4c995` (same template, default params, divergent warning counts).
      - Existing canary: `tests/FlowTime.Integration.Tests/TemplateWarningSurveyTests.cs::Survey_Templates_For_Warnings`.
      - Pattern precedents in this repo: see "Where the bar is already set higher" above.
      - User-stated intent (this conversation, 2026-04-28): "Tests need to create models for which the test deterministically know what the output should be and compare against that."

      ### Immediate implications

      - Do **not** delete the per-template run artifacts in `data/runs/` until a golden-output canary is in place — they are the only reproduction surface for retroactive drift detection.
      - Treat any new analyser-warning regression on a previously-clean template as a **hard regression** until the canary is strict enough to catch it automatically.
      - Plan this milestone into the near-term sequence — preferably before E-22 (Model Fit) starts, since model-fit work will compare engine output against telemetry and silently-drifting output would corrupt fit results without warning.

      ---
